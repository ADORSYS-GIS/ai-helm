# API keys for LONG-RUNNING in-cluster services authenticating to the gateway's
# internal plane (ADR-0021). Authorino's `apiKey` identity (internal AuthConfig)
# matches Secrets labeled `kuadrant.io/apikey-for=internal-gateway` in
# converse-gateway (the Authorino namespace) and validates the request's
# `Authorization: Bearer <key>` against the Secret's `api_key` value. One Secret
# per service → each gets its own account/burst bucket. Store patched per env.
#
# Why apiKey (not a k8s SA token) for these: long-running services can't easily
# present a *rotating* projected SA token without a sidecar; a static key has no
# rotation. One-time tasks (cron-jobs) use their SA token instead (no Secret here).
#
# librechat: the SAME value LibreChat already sends as CONVERSE_OPENAI_API_KEY
# (ssegning-aws `ai/camer/digital/prod/env` / converse_openai_api_key), so its
# existing static bearer is accepted as-is — no LibreChat change, no sidecar.
# (This is a plain kustomize CR, NOT Helm — the {{ .apiKey }} below is ESO's own
# Go template, evaluated by the External Secrets Operator at sync time.)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: internal-key-librechat
  namespace: converse-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE # ← patched per env (cluster.yaml: secretStore)
    kind: ClusterSecretStore
  target:
    name: internal-key-librechat
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          # Matched by the internal AuthConfig's apiKey.selector.
          kuadrant.io/apikey-for: internal-gateway
      data:
        api_key: "{{ .apiKey }}"
  data:
    - secretKey: apiKey
      remoteRef:
        key: ai/camer/digital/prod/env
        property: converse_openai_api_key
