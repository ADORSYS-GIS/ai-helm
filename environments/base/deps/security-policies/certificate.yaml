# CA-trust helper for Authorino → lightbridge-opa.
#
# The Authorino instance (kuadrant-policies-main, converse-gateway) mounts the
# `authz-tls` secret's `ca.crt` (as /etc/pki/tls/certs/lightbridge-ca.crt) to
# verify the lightbridge-opa metadata endpoint
# (https://lightbridge-opa.converse.svc.cluster.local:3000), whose server cert
# is signed by the internal `self-signed-ca` ("Home SSegning Root CA"). OPA
# auth is HTTP Basic (sharedSecretRef lightbridge-opa-auth), so Authorino needs
# NO client cert — only to TRUST that CA.
#
# `authz-tls` exists in `converse` (where lightbridge-opa runs) but NOT in
# `converse-gateway` (where Authorino runs) → the pod is stuck ContainerCreating
# ("secret authz-tls not found"). We issue a leaf from the SAME internal CA here
# with secretName `authz-tls`; Authorino consumes only its ca.crt (= the same
# Home Root CA that signed lightbridge-opa). Same approach as the redis CA.
# The issuer is patched per env to the internal-CA ClusterIssuer.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authorino-lightbridge-ca
  namespace: converse-gateway
spec:
  secretName: authz-tls
  commonName: authorino-lightbridge-ca
  dnsNames:
    - authorino-lightbridge-ca
  issuerRef:
    name: PLACEHOLDER_INTERNAL_CA # ← patched per env (internal-CA ClusterIssuer)
    kind: ClusterIssuer
