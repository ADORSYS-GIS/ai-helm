# Base: app-scoped dependency CRs for the security-policies (Authorino) umbrella.
# The authz-tls CA secret Authorino mounts to trust lightbridge-opa. Issuer
# patched per env.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - certificate.yaml
  # apiKey Secret(s) for long-running in-cluster services on the internal plane.
  - external-secret.yaml
