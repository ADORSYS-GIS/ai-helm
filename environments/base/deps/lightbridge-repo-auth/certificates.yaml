# App-scoped dependency: ingress TLS Certificate for the lightbridge-repo-auth
# GitHub webhook front door (ADR-0047). Issuer patched per env. cert-manager
# writes the named Secret the chart's Traefik Ingress references.
# Only the webhook host is public; /v1/resolve stays ClusterIP-only.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lightbridge-repo-auth-tls
  namespace: converse
spec:
  secretName: repo-auth.ai.camer.digital-tls
  issuerRef:
    name: PLACEHOLDER_ISSUER # ← patched per env (cluster.yaml: clusterIssuer)
    kind: ClusterIssuer
  dnsNames:
    - repo-auth.ai.camer.digital
