# App-scoped dependency: egress NetworkPolicy for the Alloy collector.
#
# Alloy is the cluster's sole telemetry collector and MUST reach:
#   - the Kubernetes API server — for discovery.kubernetes (nodes), the
#     prometheus.operator.servicemonitors/podmonitors informers, AND the
#     kubelet/cAdvisor/apiserver scrapes (all proxied through the API server at
#     the Service ClusterIP), and
#   - every pod it scrapes, in any namespace — CoreDNS pod IPs (:9153) plus all
#     ServiceMonitor/PodMonitor targets (kube-state-metrics, node-exporter,
#     Envoy, etc.).
#
# Under the namespace `allow-dns` default-deny-egress baseline, Alloy gets DNS
# only, so without this its prometheus.operator.* informers fail
# (`failed to configure informers: ... Get "https://10.43.0.1:443/api": i/o
# timeout`), node discovery returns 0 targets, and Mimir ends up with only the
# static apiserver `up` series — i.e. Grafana metric panels are empty. This
# additive policy (unions with allow-dns / allow-same-namespace) restores it.
#
# ⚠️ CILIUM CAVEAT (prod, v1.19): node IPs carry the `remote-node`/`host`
# identity, so a plain `ipBlock` does NOT match the API server here — the real
# allow is the sibling CiliumNetworkPolicy (kube-apiserver + cluster entities).
# This portable policy still grants DNS on any CNI and the API/scrape rules work
# on non-Cilium CNIs. CIDRs are patched per env (cluster.yaml nodeCIDR/serviceCIDR).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alloy-allow
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alloy
  policyTypes:
    - Egress
    - Ingress
  egress:
    # Kubernetes API server (ClusterIP → DNATs to control-plane nodes :6443).
    - to:
        - ipBlock:
            cidr: 10.0.0.0/24 # ← nodeCIDR, patched per env
        - ipBlock:
            cidr: 10.43.0.0/16 # ← serviceCIDR, patched per env
      ports:
        - protocol: TCP
          port: 6443
        - protocol: TCP
          port: 443
    # Scrape targets in any namespace (CoreDNS pod IPs + every
    # ServiceMonitor/PodMonitor target). A collector legitimately fans out
    # cluster-wide; this is the plain-NP equivalent of the Cilium `cluster`
    # entity in the sibling policy.
    - to:
        - namespaceSelector: {}
    # DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  ingress:
    # OTLP push from in-cluster OpenTelemetry collectors / SDKs (traces/logs/
    # metrics). Cross-namespace senders are blocked by the default-deny-ingress
    # baseline otherwise, so Alloy's OTLP receiver gets no spans and Tempo is
    # empty. Same-namespace ingress is already covered by allow-same-namespace.
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
