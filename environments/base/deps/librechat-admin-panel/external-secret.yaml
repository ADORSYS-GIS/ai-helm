# App-scoped dependency: the admin panel's session secret, materialised from
# the external secret store. This is an APP-SCOPED secret owned by the umbrella
# (ADR-0018) — distinct from platform/shared secrets, which stay external in
# ai-ops-secrets.git. The store itself (ssegning-aws) is defined externally;
# this repo references it by name only and the store name is patched per env.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librechat-admin-panel-secret
  namespace: converse-chat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE # ← patched per env (cluster.yaml: secretStore)
    kind: ClusterSecretStore
  target:
    name: librechat-admin-panel-secret
    creationPolicy: Owner
  data:
    - secretKey: session_secret
      remoteRef:
        # Remote key/property are owned in the external store, not here.
        key: prod/converse-chat/librechat-admin-panel
        property: session_secret
