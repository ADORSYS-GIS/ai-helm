# App-scoped dependency: egress NetworkPolicy for kube-state-metrics.
#
# Same story as grafana-operator: kube-state-metrics watches the Kubernetes API
# server to generate object metrics, but the namespace `allow-dns` baseline is
# default-deny-egress (DNS only), so ksm can't reach the API and crashloops
# (`failed to create client: ... Get https://10.43.0.1:443/version: i/o timeout`,
# exit 1). This additive policy grants it the egress it needs (unions with
# `allow-dns`). ksm only needs the API server + DNS (it serves its own metrics
# on an ingress port; no other egress).
#
# ⚠️ CILIUM CAVEAT (prod, v1.19): node IPs carry the `remote-node`/`host`
# identity, so a plain `ipBlock` does NOT match the API server here — the real
# allow is the sibling CiliumNetworkPolicy (kube-apiserver entity). This
# portable policy still grants DNS on any CNI and the API rule works on
# non-Cilium CNIs. CIDRs are patched per env (cluster.yaml nodeCIDR/serviceCIDR).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kube-state-metrics-allow-egress
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  policyTypes:
    - Egress
  egress:
    # Kubernetes API server (ClusterIP → DNATs to control-plane nodes :6443).
    - to:
        - ipBlock:
            cidr: 10.0.0.0/24 # ← nodeCIDR, patched per env
        - ipBlock:
            cidr: 10.43.0.0/16 # ← serviceCIDR, patched per env
      ports:
        - protocol: TCP
          port: 6443
        - protocol: TCP
          port: 443
    # DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
