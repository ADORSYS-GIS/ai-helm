# apprise-api notification channels, materialised from the external store.
#
# Produces the `apprise-channels` secret the apprise-api Deployment mounts at
# /apprise-config. The key `alerts.cfg` is read on POST /notify/alerts — its
# value is the Apprise channel config (one URL per line, e.g.
# discord://WEBHOOK_ID/WEBHOOK_TOKEN), which is what grafana-apprise-adapter
# targets for alert delivery.
#
# ⚠️ PLACEHOLDER remoteRef — store the Apprise channel URL(s) in the
# ssegning-aws store and fill the key/property below. Until then ESO reports
# SecretSyncedError and the apprise-api pod stays ContainerCreating (no
# clobber — apprise-channels doesn't exist yet). secretStore patched per env.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apprise-channels
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE # ← patched per env (cluster.yaml: secretStore)
    kind: ClusterSecretStore
  target:
    name: apprise-channels
    creationPolicy: Owner
  data:
    # `alerts.cfg` becomes a file in /apprise-config; value = the channel
    # URL(s) for POST /notify/alerts (one Apprise URL per line).
    - secretKey: alerts.cfg
      remoteRef:
        key: TODO_REPLACE # ← ssegning-aws key holding the Apprise channel URL(s)
        property: TODO_REPLACE
