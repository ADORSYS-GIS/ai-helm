# App-scoped Coder secrets, materialised from the external store.
#
# These were previously provisioned by the wholesale `secrets` Application
# (ai-ops-secrets.git), REMOVED 2026-06-04. Re-homed in-chart per the umbrella
# pattern (ADR-0018): app-scoped secrets live in the app's deps overlay,
# referencing ssegning-aws by name (store patched per env → ssegning-aws).
#
# The maintainer must populate these properties under the consolidated
# ssegning-aws key `ai/camer/digital/prod/env`:
#   coder_oidc_client_id     — the Keycloak `coder` client's clientId (= "coder")
#   coder_oidc_client_secret — that client's secret (from Keycloak)
#   coder_admin_username     — bootstrap admin user (postStart create-admin-user)
#   coder_admin_password      — bootstrap admin password
# Until populated, the ExternalSecret sits SecretSyncedError and the coder pod
# stays CreateContainerConfigError (secret not found).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-keycloak-secret
  namespace: coder
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE # ← patched per env (cluster.yaml: secretStore)
    kind: ClusterSecretStore
  target:
    name: coder-keycloak-secret
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef: { key: ai/camer/digital/prod/env, property: coder_oidc_client_id }
    - secretKey: client_secret
      remoteRef: { key: ai/camer/digital/prod/env, property: coder_oidc_client_secret }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-admin-secret
  namespace: coder
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE
    kind: ClusterSecretStore
  target:
    name: coder-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef: { key: ai/camer/digital/prod/env, property: coder_admin_username }
    - secretKey: password
      remoteRef: { key: ai/camer/digital/prod/env, property: coder_admin_password }
