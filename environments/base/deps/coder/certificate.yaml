# App-scoped dependency: ingress TLS Certificate for Coder.
# Covers both the apex host and the workspace wildcard. Issuer patched per env.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: coder-tls
  namespace: coder
spec:
  secretName: coder.ai-v2.camer.digital-tls
  issuerRef:
    name: PLACEHOLDER_ISSUER # ← patched per env (cluster.yaml: clusterIssuer)
    kind: ClusterIssuer
  dnsNames:
    - coder.ai-v2.camer.digital # ← patched per env (cluster.yaml: domainBase)
    - "*.coder-ai-v2.camer.digital" # workspace wildcard
