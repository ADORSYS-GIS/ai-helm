# App-scoped dependency: the Redis password the Envoy rate-limit service needs.
#
# Envoy Gateway's rateLimitDeployment patch injects REDIS_AUTH via
# secretKeyRef(redis-ha-redis-auth / redis-password), but the source Secret
# only exists in the `redis-system` namespace (created by home-os). ESO is
# namespace-scoped for ExternalSecrets, so each consumer namespace needs its
# own. This materialises a per-namespace copy in `envoy-gateway-system` from
# the SAME external store — a mirror of the redis-system ExternalSecret
# (remoteRef prod/meta/test-app#redis_password). secret-store name is patched
# per environment by the overlay.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-ha-redis-auth
  namespace: envoy-gateway-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE # ← patched per env (cluster.yaml: secretStore)
    kind: ClusterSecretStore
  target:
    name: redis-ha-redis-auth
    creationPolicy: Owner
    # Retain the synced Secret if this ExternalSecret is removed, so a prune
    # doesn't knock the rate-limit service offline mid-flight.
    deletionPolicy: Retain
  data:
    - secretKey: redis-password
      remoteRef:
        key: prod/meta/test-app
        property: redis_password
