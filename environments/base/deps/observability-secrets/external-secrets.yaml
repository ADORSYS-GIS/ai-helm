# Observability stack secrets, materialised from the external store.
#
# S3 creds (mimir/loki/tempo) point at the SAME ssegning-aws material Keycloak's
# CNPG backups use — key `prod/meta/test-app`, properties
# `s3_backup_cnpg_client_id` / `s3_backup_cnpg_secret` (the Hetzner Object
# Storage access/secret keys). Same bucket (`ssegning-k8s-state`), different
# folders. secretStore name is patched per environment by the overlay
# (→ ssegning-aws).
#
# grafana-admin / grafana-keycloak resolve against the consolidated ssegning-aws
# secret `ai/camer/digital/prod/env` (admin user/password + the Keycloak
# "grafana" realm-client secret). The grafana chart (charts/observability child)
# consumes grafana-admin via admin.existingSecret (keys admin-user /
# admin-password) and grafana-keycloak via envFromSecrets — so the latter's key
# MUST be the env-var name the grafana.ini OAuth block reads
# (`GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET`), not a friendlier `client-secret`.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mimir-s3
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE # ← patched per env (cluster.yaml: secretStore)
    kind: ClusterSecretStore
  target:
    name: mimir-s3
    creationPolicy: Owner
  data:
    - secretKey: MIMIR_S3_ACCESS_KEY_ID
      remoteRef: { key: prod/meta/test-app, property: s3_backup_cnpg_client_id }
    - secretKey: MIMIR_S3_SECRET_ACCESS_KEY
      remoteRef: { key: prod/meta/test-app, property: s3_backup_cnpg_secret }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-s3
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE
    kind: ClusterSecretStore
  target:
    name: loki-s3
    creationPolicy: Owner
  data:
    - secretKey: LOKI_S3_ACCESS_KEY_ID
      remoteRef: { key: prod/meta/test-app, property: s3_backup_cnpg_client_id }
    - secretKey: LOKI_S3_SECRET_ACCESS_KEY
      remoteRef: { key: prod/meta/test-app, property: s3_backup_cnpg_secret }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tempo-s3
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE
    kind: ClusterSecretStore
  target:
    name: tempo-s3
    creationPolicy: Owner
  data:
    - secretKey: TEMPO_S3_ACCESS_KEY
      remoteRef: { key: prod/meta/test-app, property: s3_backup_cnpg_client_id }
    - secretKey: TEMPO_S3_SECRET_KEY
      remoteRef: { key: prod/meta/test-app, property: s3_backup_cnpg_secret }
---
# Grafana admin login — consumed via admin.existingSecret (userKey/passwordKey).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef: { key: ai/camer/digital/prod/env, property: grafana_admin_user }
    - secretKey: admin-password
      remoteRef: { key: ai/camer/digital/prod/env, property: grafana_admin_password }
---
# Grafana ⇄ Keycloak generic_oauth — injected via envFromSecrets, so the data
# key IS the env var name grafana.ini reads ($__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-keycloak
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE
    kind: ClusterSecretStore
  target:
    name: grafana-keycloak
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef: { key: ai/camer/digital/prod/env, property: grafana_keycloak_client_secret }
