# Observability stack secrets, materialised from the external store.
#
# ⚠️ PLACEHOLDER remoteRefs — every `key:` below is a TODO. Fill in the real
# ssegning-aws paths/properties (they live in ai-ops-secrets.git), then flip
# the `observability-secrets` child to `enabled: true` in
# charts/observability/values.yaml. Until then this overlay is NOT deployed
# (the child is disabled) so it cannot clobber the currently-working,
# externally-provisioned Secrets of the same names.
#
# secretStore name is patched per environment by the overlay (→ ssegning-aws).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mimir-s3
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE # ← patched per env (cluster.yaml: secretStore)
    kind: ClusterSecretStore
  target:
    name: mimir-s3
    creationPolicy: Owner
  data:
    - secretKey: MIMIR_S3_ACCESS_KEY_ID
      remoteRef: { key: TODO_REPLACE, property: TODO_REPLACE } # ← ssegning-aws
    - secretKey: MIMIR_S3_SECRET_ACCESS_KEY
      remoteRef: { key: TODO_REPLACE, property: TODO_REPLACE }
