# Companion to the cluster's manual default-deny baseline (BOTH `allow-dns`
# deny-egress AND `default-deny-ingress`).
#
# The observability stack is a multi-component mesh â€” Mimir
# querierâ†”query-frontendâ†”ingesterâ†”store-gateway over gRPC, Alloyâ†’Loki/Mimir/Tempo
# writes, Grafanaâ†’stores reads â€” all same-namespace pod-to-pod. The baseline
# blocks that traffic on BOTH sides: the bare default-deny-ingress blocks the
# receiver, and `allow-dns` (egress-deny, DNS only) blocks the sender. So
# querierâ†’query-frontend:9095 times out â†’ "number of queriers connected to
# query-frontend is 0" â†’ no data in Grafana. The stores' charts ship no
# NetworkPolicies of their own.
#
# Restore intra-namespace traffic in BOTH directions (any obs pod â†” any obs pod).
# Additive with the baseline: DNS egress (allow-dns), the S3 egress allows
# (mimir/loki/tempo), Grafana's grafana.com/googleapis egress, and the
# cross-namespace per-app ingress allows (Traefikâ†’grafana, the ACME solver) all
# still apply.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
