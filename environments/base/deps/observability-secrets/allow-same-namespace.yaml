# Companion to the cluster's manual default-deny-ingress baseline.
#
# The observability namespace carries a `default-deny-ingress` NetworkPolicy
# (podSelector {}, no allow rules ‚Äî a hetzner-k8s baseline, NOT ArgoCD-managed),
# but nothing restores intra-namespace ingress. The observability stack is a
# multi-component mesh ‚Äî Mimir querier‚Üîquery-frontend‚Üîingester‚Üîstore-gateway over
# gRPC, Alloy‚ÜíLoki/Mimir/Tempo writes, and Grafana‚Üístores reads ‚Äî all
# same-namespace pod-to-pod. Under the bare deny-ingress those connections time
# out (e.g. "number of queriers connected to query-frontend is 0" ‚Üí no data in
# Grafana). This allows ingress to any observability pod from any other pod in
# the same namespace, which is what the stores' charts assume (they ship no
# NetworkPolicies of their own). Cross-namespace ingress (Traefik‚Üígrafana, the
# ACME solver) stays governed by the per-app allows.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
