# App-scoped dependencies: ingress TLS Certificates for the lightbridge
# self-service and MCP front doors. Issuers patched per env. cert-manager
# writes the named Secrets the chart's raw Ingress objects reference.
# (The api-main / api-mcp / api-usage sub-ingresses are disabled in the chart
# values, so they get no Certificate here.)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lightbridge-self-service-tls
  namespace: converse
spec:
  secretName: self-service.ai.camer.digital-tls
  issuerRef:
    name: PLACEHOLDER_ISSUER # ← patched per env (cluster.yaml: clusterIssuer)
    kind: ClusterIssuer
  dnsNames:
    - self-service.ai.camer.digital
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lightbridge-mcp-tls
  namespace: converse
spec:
  secretName: mcp.ai.camer.digital-tls
  issuerRef:
    name: PLACEHOLDER_ISSUER # ← patched per env (cluster.yaml: clusterIssuer)
    kind: ClusterIssuer
  dnsNames:
    - mcp.ai.camer.digital
