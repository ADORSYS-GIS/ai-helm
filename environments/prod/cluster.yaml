# ─────────────────────────────────────────────────────────────────────────
# environments/prod/cluster.yaml — SOURCE OF TRUTH for prod (Hetzner k3s)
# ─────────────────────────────────────────────────────────────────────────
# Per-environment knobs that used to be hardcoded across many charts. This
# file is the human-readable record; the values are applied two ways:
#
#   • Dependency CRs (Certificate / app-scoped ExternalSecret) — patched in by
#     the kustomize overlays under `environments/prod/deps/<app>/`. Keep those
#     patch values in sync with this file. (Graduating to kustomize
#     `replacements` sourced from this file is the multi-env hardening step —
#     see ADR-0018.)
#   • Workload Helm charts — when a knob actually diverges between
#     environments, expose it via a per-env values file consumed through a
#     multi-source `$values` ref (Source C). Today nothing diverges on prod
#     (single cluster), so no per-env workload values exist yet.
#
# Adding a second environment = copy `environments/prod/` to
# `environments/<env>/` and change the values below + the overlay patches.
# ─────────────────────────────────────────────────────────────────────────

environment: prod
cluster: hetzner-k3s            # control plane: https://k8s.ssegning.com:6443
argocdDestination: home-remote  # workloads target the registered home-remote cluster (ADR-0017)

# cert-manager ClusterIssuer for ingress TLS. Defined externally in home-os
# (charts/cert → cert-home-cert-http / self-signed-ca / cert-cloudflare).
clusterIssuer: cert-home-cert-http

# The only ClusterSecretStore on-cluster (AWS-backed, external). App-scoped
# ExternalSecrets reference it by name; this repo never defines the store.
secretStore: ssegning-aws

# Ingress controller class — Traefik is installed externally (traefik ns).
ingressClass: traefik

# PVCs use the cluster's default StorageClass on prod (empty = default).
# A second env with a non-default class sets this and threads it via $values.
storageClass: ""

# ── Network egress CIDRs (for app-scoped egress NetworkPolicies) ────────────
# This cluster enforces a default-deny-egress baseline per namespace (an
# `allow-dns` NetworkPolicy that permits DNS egress only). Workloads that must
# reach the API server (e.g. grafana-operator) ship their own additive egress
# policy via their deps overlay, which needs these CIDRs. Keep in sync with the
# patches in environments/prod/deps/<app>/.
#   • nodeCIDR    — Hetzner private network; control-plane nodes (10.0.0.10-12)
#                   host the API-server endpoints on :6443 (post-DNAT target).
#   • serviceCIDR — k3s Service CIDR; the API-server ClusterIP
#                   (kubernetes.default → 10.43.0.1:443) lives here (pre-DNAT).
nodeCIDR: 10.0.0.0/24
serviceCIDR: 10.43.0.0/16

# ── Platform domain — SOURCE OF TRUTH for this environment's hostnames ──────
# Every ingress host / access URL / TLS SAN follows `<sub>.<domainBase>`
# (e.g. grafana.ai-v2.camer.digital, coder.ai-v2.camer.digital, api.…); the
# Coder workspace wildcard is `*.coder-<domainBase>`.
#
# To change the platform domain: change it here, then sweep the literal across
# charts/ + environments/ (the hostnames live inside upstream-chart
# valuesObjects that contain Go-template syntax — Alloy River config, Grafana
# $__env{} — so they can't be safely `tpl`-templated from this one value;
# keep this the documented knob and do a guided find-replace).
#   grep -rl '<old-domain>' charts/ environments/ | xargs sed -i '' \
#     's/<old-domain>/<new-domain>/g'
# A second environment overrides hostnames via a per-env $values file
# (ADR-0018 Source C) layered onto the workload charts.
domainBase: ai-v2.camer.digital
