# prod overlay: app-scoped deps for opencode-k8s-agent.
# Keep values in sync with environments/prod/cluster.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/opencode-k8s-agent

patches:
  # internal-CA issuer (same root that signs the api-internal listener's TLS) —
  # its ca.crt is what the agent trusts to reach the internal gateway.
  - target:
      kind: Certificate
      name: opencode-k8s-internal-ca
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: self-signed-ca
