# prod overlay: app-scoped deps for the grafana umbrella.
# Keep values in sync with environments/prod/cluster.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/grafana

patches:
  # clusterIssuer: cert-route53 (DNS-01) — NOT cert-home-cert-http (HTTP-01).
  # This cluster's Traefik does an unconditional :80→:443 redirect, which 301s
  # the ACME HTTP-01 /.well-known/acme-challenge/ self-check to HTTPS (no cert
  # yet) and it times out → the cert never issues → no grafana pod. ai.camer.digital
  # is hosted on Route53, so DNS-01 via cert-route53 (home-os charts/cert) is the
  # fix. Needs the `route53-secret` IAM creds in kube-system on Hetzner.
  - target:
      kind: Certificate
      name: grafana-tls
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: cert-route53
      - op: replace
        path: /spec/dnsNames/0
        value: grafana.ai.camer.digital
