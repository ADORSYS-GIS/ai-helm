# prod overlay: app-scoped deps for the grafana umbrella.
# Keep values in sync with environments/prod/cluster.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/grafana

patches:
  # clusterIssuer: cert-home-cert-http (ACME HTTP-01 via Traefik) — same issuer
  # LibreChat (ai.camer.digital) uses successfully. NOTE: a brand-new host hits
  # a one-time bootstrap deadlock under Traefik's :80→:443 redirect — the cert
  # can't issue until the host serves HTTPS, which needs the cert. Break it once
  # by seeding a self-signed `grafana.ai.camer.digital-tls` secret; cert-manager
  # then completes HTTP-01 and overwrites it, and renewals self-sustain.
  - target:
      kind: Certificate
      name: grafana-tls
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: cert-home-cert-http
      - op: replace
        path: /spec/dnsNames/0
        value: grafana.ai.camer.digital
