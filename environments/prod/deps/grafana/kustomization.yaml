# prod overlay: app-scoped deps for the grafana umbrella.
# Keep values in sync with environments/prod/cluster.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/grafana
  # Cilium egress allow so Grafana's dashboard-download init can reach grafana.com
  # under the observability deny-egress baseline.
  - ciliumnetworkpolicy.yaml

patches:
  # clusterIssuer: cert-home-cert-http (ACME HTTP-01 via Traefik) — the same
  # issuer LibreChat (ai.camer.digital) + lightbridge use successfully on this
  # Traefik. (The cert only ever looked stuck because grafana's pod was down —
  # a malformed probe rejected by Server-Side Apply, since fixed — so HTTP-01
  # had no backend host to validate against; it was never an issuer problem.)
  - target:
      kind: Certificate
      name: grafana-tls
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: cert-home-cert-http
      - op: replace
        path: /spec/dnsNames/0
        value: grafana.ai.camer.digital
