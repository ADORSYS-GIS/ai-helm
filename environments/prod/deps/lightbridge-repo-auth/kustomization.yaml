# prod overlay: app-scoped deps for lightbridge-repo-auth (ADR-0047).
# Keep values in sync with environments/prod/cluster.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/lightbridge-repo-auth

patches:
  # clusterIssuer: cert-home-cert-http (ACME HTTP-01, public cert)
  - target:
      kind: Certificate
      name: lightbridge-repo-auth-tls
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: cert-home-cert-http
