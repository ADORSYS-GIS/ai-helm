# prod (Cilium) — the egress allow that ACTUALLY unblocks grafana-operator.
#
# This cluster runs Cilium (v1.19), which gives node IPs the special
# `remote-node`/`host` identity rather than a CIDR/world identity. With the
# default `policy-cidr-match-mode` (empty), a plain k8s NetworkPolicy `ipBlock`
# CIDR therefore does NOT match traffic to the Kubernetes API server (its
# endpoints live on the control-plane *nodes*). So the portable ipBlock policy
# in base/ is inert here for the API-server rule. Cilium's supported way to
# allow API-server egress is the reserved `kube-apiserver` entity.
#
# Self-contained (apiserver + DNS + intra-namespace) so the operator's egress
# works on Cilium regardless of the base policy; it unions with the base k8s
# NetworkPolicy and the cluster's `allow-dns` baseline.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana-operator-allow-egress
  namespace: observability
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-operator
  egress:
    # Kubernetes API server ("detect platform" at startup + all reconcile).
    - toEntities:
        - kube-apiserver
    # DNS.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Grafana admin API + any intra-namespace target (Grafana CR external mode).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
