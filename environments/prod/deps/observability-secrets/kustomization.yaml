# prod overlay: observability stack ExternalSecrets.
# Patches secretStore=ssegning-aws onto every ExternalSecret. Keep in sync
# with environments/prod/cluster.yaml (secretStore).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/observability-secrets
  # Cilium egress for the stores to reach Hetzner Object Storage (the deny-egress
  # baseline blocks external S3 otherwise). Sync-wave -3 (this app) lands it
  # before the stores start.
  - ciliumnetworkpolicy.yaml

patches:
  - target:
      kind: ExternalSecret
      name: ".*"
    patch: |-
      - op: replace
        path: /spec/secretStoreRef/name
        value: ssegning-aws
