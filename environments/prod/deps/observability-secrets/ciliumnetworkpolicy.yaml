# prod (Cilium) — egress to Hetzner Object Storage for the observability stores.
#
# Same default-deny-egress baseline (`allow-dns`) that broke grafana-operator/ksm
# also blocks egress to EXTERNAL object storage (Cilium `world`), so mimir / loki
# / tempo crashloop trying to reach the S3 endpoint. This grants the store
# components egress to Hetzner Object Storage.
#
# toFQDNs needs the DNS L7 rule below so Cilium's DNS proxy learns the
# endpoint→IP mapping. matchPattern covers both path-style
# (`nbg1.your-objectstorage.com`) and virtual-hosted-style
# (`<bucket>.nbg1.your-objectstorage.com`) names.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: observability-stores-allow-s3-egress
  namespace: observability
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [mimir, loki, tempo]
  egress:
    # DNS (with L7 visibility so toFQDNs can resolve the endpoint).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    # Hetzner Object Storage over HTTPS.
    - toFQDNs:
        - matchPattern: "*.your-objectstorage.com"
        - matchName: "your-objectstorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
