# prod overlay: app-scoped deps for the eg (Envoy Gateway) umbrella.
# Keep values in sync with environments/prod/cluster.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/eg

patches:
  # secretStore: ssegning-aws
  - target:
      kind: ExternalSecret
      name: redis-ha-redis-auth
    patch: |-
      - op: replace
        path: /spec/secretStoreRef/name
        value: ssegning-aws
  # internal-CA issuer (same root that signs redis-ha's TLS cert) — its ca.crt
  # is what the rate-limit pod trusts to reach the TLS-only Redis.
  - target:
      kind: Certificate
      name: ratelimit-redis-ca
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: self-signed-ca
