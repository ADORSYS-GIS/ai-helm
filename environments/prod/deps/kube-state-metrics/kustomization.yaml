# prod overlay: app-scoped deps for the kube-state-metrics child.
# Keep CIDRs in sync with environments/prod/cluster.yaml (nodeCIDR / serviceCIDR).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/kube-state-metrics
  # Cilium-specific: the API-server egress allow that actually works on this
  # cluster (plain ipBlock can't match node-identity IPs under Cilium).
  - ciliumnetworkpolicy.yaml

patches:
  # API-server egress CIDRs (Hetzner private network + k3s Service CIDR).
  - target:
      kind: NetworkPolicy
      name: kube-state-metrics-allow-egress
    patch: |-
      - op: replace
        path: /spec/egress/0/to/0/ipBlock/cidr
        value: 10.0.0.0/24
      - op: replace
        path: /spec/egress/0/to/1/ipBlock/cidr
        value: 10.43.0.0/16
