# prod overlay: app-scoped deps for the lightbridge-backend umbrella.
# Keep values in sync with environments/prod/cluster.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/deps/lightbridge-backend

patches:
  # clusterIssuer: cert-home-cert-http (both certs)
  - target:
      kind: Certificate
      name: lightbridge-self-service-tls
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: cert-home-cert-http
  - target:
      kind: Certificate
      name: lightbridge-mcp-tls
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: cert-home-cert-http
