apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: lightbridge-usage-db-restore
  namespace: converse
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  instances: 2
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: lightbridge-usage-db
    major: 17
  storage:
    storageClass: linode-block-storage
    size: 10Gi
  resources:
    limits:
      cpu: 300m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 500Mi
  postgresql:
    shared_preload_libraries:
      - timescaledb
  postgresUID: 70
  postgresGID: 70
  # Plugins can be enabled - the ObjectStore approach doesn't conflict
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: lightbridge-usage-db
        serverName: lightbridge-usage-db-restore
  bootstrap:
    recovery:
      source: lightbridge-usage-db-backup
      # Uncomment for Point-in-Time Recovery (pick ONE target):
      # recoveryTarget:
      #   targetTime: "2026-05-22T12:19:00Z"       # RFC 3339 UTC timestamp
      #   # targetName: "before-migration-v42"      # named restore point
      #   # targetXID: "12345"                      # transaction ID
      #   # targetLSN: "0/1234568"                  # WAL position
      #   # exclusive: false                        # true = stop before target
      #   # backupID: "20260522T020000"              # force specific base backup
  externalClusters:
    - name: lightbridge-usage-db-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: lightbridge-usage-db
          serverName: lightbridge-usage-db