name: Release Helm Charts

on:
  push:
    branches:
      - "**"
    paths:
      - "charts/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          # Aligned with helm-lint.yaml. Helm 3 line; Helm 4 readiness is a
          # separate audit follow-up (see docs/2026-currency-audit.md item 13).
          version: v3.15.4

      - name: Add Repos from Charts Automatically
        run: |
          set -e
            repos=$(find charts -name 'Chart.yaml' -exec yq e '.dependencies[].repository' {} \; | sort -u)
            for repo in $repos; do
              if [[ "$repo" == oci://* ]]; then
                echo "Skipping OCI registry: $repo"
                continue
              fi
              if [[ "$repo" == file://* ]]; then
                echo "Skipping local chart: $repo"
                continue
              fi
              name=$(basename "$repo" | tr -cd '[:alnum:]-')
              if [ -z "$name" ]; then
                echo "Error: Could not generate valid name for $repo"
                exit 1
              fi
              echo "Adding repo: $name -> $repo"
              helm repo add "$name" "$repo" || { echo "Failed to add $repo"; exit 1; }
            done
            helm repo update || { echo "Failed to update repos"; exit 1; }

      - name: Build chart dependencies
        run: |
           set -e
            for dir in charts/*; do
              if [ -f "$dir/Chart.yaml" ]; then
                echo "Building dependencies for $dir"
                helm dependency build "$dir" || { echo "Failed to build $dir"; exit 1; }
              fi
            done
      
      - name: Lint charts
        run: |
          set -e
          for dir in charts/*; do
            if [ -f "$dir/Chart.yaml" ]; then
              chart_type=$(yq e '.type // "application"' "$dir/Chart.yaml")
              if [[ "$chart_type" == "library" ]]; then
                echo "Skipping library chart: $dir"
                continue
              fi
              echo "Linting $dir"
              helm lint "$dir" || { echo "Linting failed for $dir"; exit 1; }
            fi
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'charts/'
          scanners: 'vuln,secret,misconfig'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          # Trivy auto-detects a plain `.trivyignore` but NOT `.trivyignore.yaml`,
          # so the structured (path-scoped) ignore file must be named explicitly.
          # It scopes the KSV-0109 false positives to two specific ConfigMap
          # templates — see .trivyignore.yaml for the justification.
          trivyignores: '.trivyignore.yaml'

      - name: Configure Git
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run chart-releaser
        if: github.event_name == 'workflow_dispatch'
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
