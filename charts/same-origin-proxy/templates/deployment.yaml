apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    app: {{ .Values.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      annotations:
        # ConfigMap edits don't reload Caddy — roll the pod when the Caddyfile changes.
        checksum/caddyfile: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: caddy
          image: {{ .Values.image | quote }}
          command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            # Pin Caddy's data/config dirs to the writable emptyDir mounts below,
            # so the read-only root FS doesn't block any stray Caddy write.
            - name: XDG_DATA_HOME
              value: /data
            - name: XDG_CONFIG_HOME
              value: /config
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 20
      volumes:
        - name: caddyfile
          configMap:
            name: {{ .Values.name }}-caddy
        - name: data
          emptyDir: {}
        - name: config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
