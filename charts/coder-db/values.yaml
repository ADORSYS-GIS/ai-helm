resources:
  - |
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: coder-cnpg
      namespace: coder
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      instances: 2
      storage:
        storageClass: linode-block-storage
        size: 10Gi
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
      bootstrap:
        initdb:
          database: coder
          owner: coder
