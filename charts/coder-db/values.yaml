cluster:
  name: coder-cnpg
  instances: 2
  storage:
    size: 10Gi
  bootstrap:
    initdb:
      database: coder
      owner: coder
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: coder-barman-store
        serverName: coder-cnpg

objectStore:
  name: coder-barman-store
  destinationPath: s3://ai-ops-backups/coder-cnpg-backups/
  endpointURL: https://s3.ssegning.me
  secretName: coder-s3-config
