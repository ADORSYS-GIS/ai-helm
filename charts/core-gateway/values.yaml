gateway:
  apiHostname: dummy.example.com

# ────────────────────────────────────────────────────────────────────────
# Envoy data plane (the proxy pods that actually serve client traffic).
# Sized for ≥2000 concurrent HTTP/2 clients — the previous static 2
# replicas + placeholder resources were the real capacity ceiling.
# ────────────────────────────────────────────────────────────────────────
envoyProxy:
  # Horizontal autoscaling for the proxy pods. When set, this supersedes a
  # static replica count. NOTE: the HPA in the `eg` app (charts/apps) scales
  # the Envoy Gateway *controller* — this scales the data plane that serves
  # requests, which is the one that matters for client capacity.
  hpa:
    minReplicas: 3
    maxReplicas: 20
    cpuUtilization: 60
  # Real production resources (the chart shipped placeholder values tagged
  # "cleared for local tests").
  resources:
    requests:
      cpu: "1"
      memory: 512Mi
    limits:
      cpu: "4"
      memory: 2Gi
  pdb:
    maxUnavailable: 1
  # Spread proxy pods across nodes so a single node drain doesn't take a
  # large slice of capacity. Soft (ScheduleAnyway) so it never blocks
  # scheduling.
  topologySpread:
    enabled: true
    maxSkew: 1
  # Graceful shutdown. Longer drain than the 30s default so long-lived
  # HTTP/2 streams (SSE / token streams) aren't cut mid-flight on rollouts.
  shutdown:
    drainTimeout: 60s
    minDrainDuration: 15s

  # ── Data-plane LoadBalancer Service (cluster-specific knob) ──────────────
  # Rendered into the EnvoyProxy's provider.kubernetes.envoyService. `type`
  # stays LoadBalancer everywhere; `annotations` are the per-cluster bit —
  # here Hetzner Cloud's hcloud-cloud-controller-manager annotations so the
  # Service provisions a Hetzner LB on the PRIVATE network with health checks.
  #
  # Configurable / portable: on a non-Hetzner cluster, override
  # `envoyProxy.service.annotations` (set to {} for a plain LB, or your
  # provider's annotations) via the core-gateway app's valuesObject in
  # charts/apps, or a per-env $values file (ADR-0018 Source C). Safe default:
  # if annotations is empty the key is omitted entirely (no behaviour change).
  service:
    type: LoadBalancer
    annotations:
      # Hetzner LB name (must be unique within the Hetzner project).
      load-balancer.hetzner.cloud/name: "core-gateway"
      # Region the LB is created in (match the cluster's location).
      load-balancer.hetzner.cloud/location: "nbg1"
      # Route LB→node traffic over the private network (the ask).
      load-balancer.hetzner.cloud/use-private-ip: "true"
      load-balancer.hetzner.cloud/health-check-interval: "10s"
      load-balancer.hetzner.cloud/health-check-timeout: "5s"
      load-balancer.hetzner.cloud/health-check-retries: "3"

# ────────────────────────────────────────────────────────────────────────
# ClientTrafficPolicy — downstream (client → gateway) connection tuning.
# Sized for ≥2000 concurrent users (laptops, long-lived opencode sessions)
# + GitHub CI runners, all multiplexing over HTTP/2.
#
# Rendered by templates/client-traffic-policy.yaml. Every block is
# optional — drop one and that section is omitted (Envoy defaults apply).
# ────────────────────────────────────────────────────────────────────────
clientTrafficPolicy:
  # Per-connection read/write buffer. Large to absorb big request/response
  # bodies + streaming without back-pressuring the socket.
  bufferLimit: 500Mi

  # HTTP/2 multiplexing — the headline knob. Each client holds a small
  # number of HTTP/2 connections and multiplexes many concurrent streams
  # (requests) over each, so 2000+ clients stay cheap on socket count while
  # still getting high per-client request concurrency.
  http2:
    # Max concurrent streams (in-flight requests) per HTTP/2 connection.
    # Envoy default is 100; raised for heavy multiplexing (parallel tool
    # calls from agents, CI fan-out).
    maxConcurrentStreams: 1000
    # Flow-control windows — raised from Envoy defaults (64Ki stream /
    # 1Mi connection) for higher streaming throughput (LLM token streams,
    # SSE) without window stalls. Connection window = 16× stream window so
    # many busy streams can fill the pipe concurrently.
    initialStreamWindowSize: 1Mi
    initialConnectionWindowSize: 16Mi

  connection:
    # Concurrent downstream connection ceiling for the listener. Generous —
    # far above 2000 laptops (≈1–2 HTTP/2 conns each) + CI runners — but
    # bounded so a connection flood can't exhaust the proxy. Raise if the
    # fleet outgrows it.
    connectionLimit: 100000
    # Grace period before forcibly closing a connection once the limit is
    # hit (lets in-flight requests drain).
    closeDelay: 1s

  # Keep idle client connections alive (laptops behind NAT / corporate
  # load balancers, long-lived opencode sessions) so they aren't silently
  # dropped and forced to reconnect.
  tcpKeepalive:
    probes: 3
    idleTime: 5m
    interval: 30s

  # Long idle timeouts: streaming responses (SSE / token streams) and idle
  # agent sessions hold connections open well beyond a typical web idle.
  timeout:
    tcpIdleTimeout: 1h
    # Time allowed to receive the full set of request headers.
    httpRequestReceivedTimeout: 60s
    httpIdleTimeout: 1h

# ────────────────────────────────────────────────────────────────────────
# BackendTrafficPolicy — upstream (gateway → model backends) resilience.
# Protects backends + keeps client latency stable under load: one slow or
# failing provider shouldn't stall everyone. Rendered by
# templates/backendtrafficpolicy.yaml (targets the Gateway → applies to all
# routes). Per-model budget rate limits stay in charts/ai-model.
# ────────────────────────────────────────────────────────────────────────
backendTrafficPolicy:
  bufferLimit: 100Mi

  # Spread load across a backend's endpoints by in-flight request count —
  # better tail latency than round-robin when request durations vary wildly
  # (streaming LLM responses do).
  loadBalancer:
    type: LeastRequest

  # Circuit breaking — generous ceilings (budget rate limits do the real
  # throttling; these just stop unbounded queue/connection explosion to a
  # single backend cluster so a stuck provider fails fast instead of
  # piling up).
  circuitBreaker:
    maxConnections: 50000
    maxPendingRequests: 50000
    maxParallelRequests: 50000
    maxParallelRetries: 1000

  # Passive health check (outlier detection) — eject a backend endpoint
  # that starts throwing 5xx / gateway errors, so clients stop hitting it.
  outlierDetection:
    consecutive5XxErrors: 5
    consecutiveGatewayErrors: 5
    interval: 10s
    baseEjectionTime: 30s
    maxEjectionPercent: 50

  # Reuse upstream connections to the model backends (cut TLS/handshake
  # churn) and keep them warm.
  tcpKeepalive:
    probes: 3
    idleTime: 5m
    interval: 30s

  # Compress responses to clients (model lists, large JSON, non-streamed
  # bodies) — meaningful bandwidth savings across thousands of laptops.
  compression:
    - Gzip
