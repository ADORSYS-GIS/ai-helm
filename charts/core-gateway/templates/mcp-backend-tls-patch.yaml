{{- /*
EnvoyPatchPolicy that repairs upstream TLS for external HTTPS MCP backends
(ADR-0039). AIEG stamps a `dummy.transport_socket` (empty UpstreamTlsContext,
no SNI) on the cluster it generates for each external MCP backend; EG's
BackendTLSPolicy never reaches it. This patch — applied at the end of the xDS
pipeline — replaces that socket with a real one carrying the upstream SNI +
system-CA validation, so the gateway can complete the TLS handshake to
CDN-fronted MCP servers. Must live in the Gateway's namespace.

⚠️ RSA upstreams only: context7's ECDSA cert is rejected by Envoy's BoringSSL
regardless, so it is self-hosted, not listed here. See the values comment.
*/ -}}
{{- $m := .Values.mcpBackendTls | default dict -}}
{{- if and $m.enabled $m.backends }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}-mcp-backend-tls
  namespace: {{ .Release.Namespace }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "core-gateway.fullname" . }}
  type: JSONPatch
  jsonPatches:
    {{- range $m.backends }}
    # {{ .name }} → SNI {{ .sni }}
    - type: "type.googleapis.com/envoy.config.cluster.v3.Cluster"
      name: {{ printf "httproute/%s/ai-eg-mcp-br-%s-%s/rule/0" $m.mcpNamespace .name .name | quote }}
      operation:
        op: replace
        path: "/transport_socket"
        value:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: {{ .sni | quote }}
            common_tls_context:
              validation_context:
                trusted_ca:
                  filename: {{ $m.systemCaPath | quote }}
    {{- end }}
{{- end }}
