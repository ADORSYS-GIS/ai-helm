apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "core-gateway.fullname" . }}-traces
  namespace: {{ .Release.Namespace }}
spec:
  # REQUIRED: the otel-operator v1beta1 webhook rejects a collector with an
  # empty mode ("the OpenTelemetry Collector mode is set to , which does not
  # support modification"). Set it explicitly. Configurable; default deployment.
  # NOTE: `mode` is immutable on an existing collector — if one was already
  # created with empty/other mode, delete it once so ArgoCD recreates it.
  mode: {{ (.Values.otelCollector | default dict).mode | default "deployment" }}
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: { }

    exporters:
      # Forward traces to Grafana Alloy, which fans out to Tempo.
      otlp/alloy:
        endpoint: "alloy.observability.svc.cluster.local:4317"
        tls:
          insecure: true

      debug: { }

    service:
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - batch
          exporters:
            - otlp/alloy
            - debug
# NOTE: the `-usage` OpenTelemetryCollector was removed. Usage/billing
# metering now goes through the Envoy AI Gateway + OAuth2 path, not a
# dedicated OTel access-log pipeline to lightbridge-usage. The Envoy
# access logs that fed it are pointed straight at Alloy (-> Loki) for the
# per-user observability of ADR-0005 — see templates/envoy-proxy.yaml.
