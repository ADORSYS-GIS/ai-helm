apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "core-gateway.fullname" . }}-phoenix
  namespace: {{ .Release.Namespace }}
spec:
  # mode: deployment  # optional; defaults to deployment in most setups
  env:
    - name: PHOENIX_API_KEY
      valueFrom:
        secretKeyRef:
          name: pheonix-otel-key
          key: token

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      batch:
        send_batch_size: 512
        timeout: 5s

    exporters:
      # Phoenix HTTP ingest endpoint:
      # - If Phoenix is inside the cluster, keep http://
      otlphttp/phoenix:
        endpoint: "http://phoenix-svc.converse-monitoring.svc.cluster.local:6006"
        headers:
          # Phoenix docs: Bearer auth; lowercase header for compatibility.
          authorization: "Bearer ${env:PHOENIX_API_KEY}"
        sending_queue:
          enabled: true
          queue_size: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Fan traces out to Grafana Alloy as well, which forwards them to Tempo.
      otlp/alloy:
        endpoint: "alloy.observability.svc.cluster.local:4317"
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlphttp/phoenix
            - otlp/alloy
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "core-gateway.fullname" . }}-usage-queue
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "core-gateway.fullname" . }}-usage
  namespace: {{ .Release.Namespace }}
spec:
  volumes:
    - name: authz-tls
      secret:
        secretName: authz-tls
        items:
          - key: ca.crt
            path: ca.crt
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
    - name: queue-storage
      persistentVolumeClaim:
        claimName: {{ include "core-gateway.fullname" . }}-usage-queue
  volumeMounts:
    - name: authz-tls
      mountPath: /etc/otel/tls
      readOnly: true
    - name: queue-storage
      mountPath: /var/otel/storage
  config:
    extensions:
      file_storage/queue:
        directory: /var/otel/storage
        timeout: 10s
        compaction:
          on_start: true
          on_rebound: true
          rebound_needed_threshold_mib: 100

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      batch:
        send_batch_size: 512
        timeout: 5s

    exporters:
      otlphttp/lightbridge_usage:
        logs_endpoint: "https://lightbridge-usage.converse.svc.cluster.local:3000/v1/otel/logs"
        tls:
          ca_file: /etc/otel/tls/ca.crt
        sending_queue:
          enabled: true
          storage: file_storage/queue
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Fan logs out to Grafana Alloy as well, which forwards them to Loki.
      otlp/alloy:
        endpoint: "alloy.observability.svc.cluster.local:4317"
        tls:
          insecure: true
        sending_queue:
          enabled: true
          storage: file_storage/queue
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      extensions:
        - file_storage/queue
      pipelines:
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlphttp/lightbridge_usage
            - otlp/alloy