---
apiVersion: v1
kind: LimitRange
metadata:
  name: core-gateway-defaults
  namespace: {{ include "common.names.namespace" $ }}
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "200m"
        memory: "256Mi"
      max:
        cpu: "2"
        memory: "2Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: core-gateway-quota
  namespace: {{ include "common.names.namespace" $ }}
spec:
  hard:
    requests.cpu: "1"
    requests.memory: "1Gi"
    limits.cpu: "3"
    limits.memory: "4Gi"
    count/pods: "15"
---
