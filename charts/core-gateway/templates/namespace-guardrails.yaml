---
apiVersion: v1
kind: LimitRange
metadata:
  name: core-gateway-defaults
  namespace: {{ include "common.names.namespace" $ }}
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "200m"
        memory: "256Mi"
      max:
        cpu: "2"
        memory: "2Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: core-gateway-quota
  namespace: {{ include "common.names.namespace" $ }}
spec:
  hard:
    requests.cpu: "1"
    requests.memory: "1Gi"
    limits.cpu: "3"
    limits.memory: "4Gi"
    count/pods: "15"
---
# redis-system: intentionally NOT governed here. Redis is deployed and
# owned by an external repo (home-os). This repo must not impose a
# LimitRange / ResourceQuota on a namespace it doesn't own — doing so
# could throttle or block the externally-managed redis-ha pods. Consumers
# only reach the redis-ha-redis service; they don't manage the namespace.
---
# cnpg-system: intentionally NOT governed here. CloudNativePG (operator +
# Barman Cloud plugin) is deployed and owned externally; this repo must
# not impose a LimitRange / ResourceQuota on a namespace it doesn't own.
# This repo only defines CNPG `Cluster` CRs (e.g. charts/coder-db) that
# the external operator reconciles.
---
# envoy-gateway-system
apiVersion: v1
kind: LimitRange
metadata:
  name: envoy-gateway-system-defaults
  namespace: envoy-gateway-system
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "50m"
        memory: "128Mi"
      default:
        cpu: "200m"
        memory: "512Mi"
      max:
        cpu: "4"
        memory: "4Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: envoy-gateway-system-quota
  namespace: envoy-gateway-system
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "6"
    limits.memory: "10Gi"
    count/pods: "15"
---
