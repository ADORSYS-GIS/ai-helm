{{- if .Values.gateway.apiHostname }}
# TLS certificate for the Gateway's `api-https` listener
# ({{ .Values.gateway.apiHostname }}). Issued explicitly here rather than via
# the cert-manager Gateway-API shim annotation, so it does NOT depend on
# cert-manager's `--enable-gateway-api` feature being turned on in the (external,
# home-os) cert-manager. cert-manager writes the `<fullname>-api-tls` Secret that
# the Gateway listener references (charts/core-gateway/templates/gateway.yaml).
#
# Issuer must be an ACME issuer that can actually validate this PUBLIC domain.
# Two supported modes (see values + acme-issuer.yaml):
#   • acmeHttp01.enabled → the in-chart ns-scoped ACME Issuer solving HTTP-01
#     through this Gateway (no DNS token; needs cert-manager --enable-gateway-api).
#   • else → an external issuer named `.Values.gateway.issuer` of kind
#     `.Values.gateway.issuerKind` (e.g. a DNS-01 ClusterIssuer like cert-cloudflare).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "core-gateway.fullname" . }}-api-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ include "core-gateway.fullname" . }}-api-tls
  dnsNames:
    - {{ .Values.gateway.apiHostname | quote }}
  issuerRef:
  {{- if .Values.gateway.acmeHttp01.enabled }}
    name: {{ include "core-gateway.fullname" . }}-acme
    kind: Issuer
  {{- else }}
    name: {{ .Values.gateway.issuer | default "self-signed-ca" }}
    kind: {{ .Values.gateway.issuerKind | default "ClusterIssuer" }}
  {{- end }}
{{- end }}
