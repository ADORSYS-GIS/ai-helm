apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}-telemetry-lua
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "core-gateway.fullname" . }}
  lua:
    - type: Inline
      inline: |
        function envoy_on_response(response_handle)
          local metadata = response_handle:streamInfo():dynamicMetadata()
          local ai_gateway_meta = metadata:get("io.envoy.ai_gateway")
          
          -- Defensively check type to satisfy validator and handle all metadata formats
          if ai_gateway_meta and type(ai_gateway_meta) == "table" then
            -- Find the identifier key whose value is 1 (integer or string)
            for k, v in pairs(ai_gateway_meta) do
              local cost_key = k:match("^active_model_(.*)")
              if cost_key and tonumber(v) == 1 then
                -- This is the confirmed active model for this request
                local cost_val = ai_gateway_meta[cost_key]
                if cost_val then
                  metadata:set("io.envoy.ai_gateway", "llm_custom_total_cost", cost_val)
                end
                break -- Exit early once the single active model is found
              end
            end
          end
        end