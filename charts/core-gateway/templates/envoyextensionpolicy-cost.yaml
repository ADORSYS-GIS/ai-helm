apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}-telemetry-lua
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "core-gateway.fullname" . }}
  lua:
    - type: Inline
      inline: |
        function envoy_on_response(response_handle)
          local metadata = response_handle:streamInfo():dynamicMetadata()
          local ai_gateway_meta = metadata:get("io.envoy.ai_gateway")
          if ai_gateway_meta then
            -- Find the static identifier key set by the AIGatewayRoute
            for k, _ in pairs(ai_gateway_meta) do
              local cost_key = k:match("^active_model_(.*)")
              if cost_key then
                -- cost_key is the 'safe' name (e.g. cost_te3_small)
                local cost_val = ai_gateway_meta[cost_key]
                if cost_val then
                  metadata:set("io.envoy.ai_gateway", "llm_custom_total_cost", cost_val)
                end
                break
              end
            end
          end
        end