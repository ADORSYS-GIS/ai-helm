apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}-telemetry-lua
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "core-gateway.fullname" . }}
  lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          -- Phase 1: Capture the authoritative route name from the match header
          local route_name = request_handle:headers():get("x-ai-eg-model")
          if route_name then
            -- Store it in a dedicated Lua metadata namespace for the response phase
            request_handle:streamInfo():dynamicMetadata():set("io.heron.telemetry", "active_route", route_name)
          end
        end

        function envoy_on_response(response_handle)
          local stream_info = response_handle:streamInfo()
          local metadata = stream_info:dynamicMetadata()
          
          -- Get the route name we captured in the request phase
          local herons_meta = metadata:get("io.heron.telemetry")
          local ai_gateway_meta = metadata:get("io.envoy.ai_gateway")
          
          if herons_meta and herons_meta["active_route"] and ai_gateway_meta then
            local route_name = herons_meta["active_route"]
            
            -- Construct the exact CEL cost key used in AIGatewayRoute
            -- (Matching the logic in metadataKeySafe: s/[-.]/_/g)
            local safe_key = "cost_" .. route_name:gsub("[-.]", "_")
            
            local final_cost = ai_gateway_meta[safe_key]
            
            if final_cost then
              metadata:set("io.envoy.ai_gateway", "llm_custom_total_cost", final_cost)
              
              -- Compatibility fallback
              pcall(function() 
                if stream_info.setDynamicMetadata then
                   stream_info:setDynamicMetadata("io.envoy.ai_gateway", "llm_custom_total_cost", final_cost)
                end
              end)

              -- Verification headers
              response_handle:headers():add("x-telemetry-status", "success")
              response_handle:headers():add("x-telemetry-route", route_name)
              response_handle:headers():add("x-telemetry-cost", tostring(final_cost))
            else
              response_handle:headers():add("x-telemetry-status", "cost-not-found")
              response_handle:headers():add("x-telemetry-key-tried", safe_key)
            end
          else
             response_handle:headers():add("x-telemetry-status", "context-missing")
          end
        end