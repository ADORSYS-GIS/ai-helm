apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}-telemetry-lua
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "core-gateway.fullname" . }}
  lua:
    - type: Inline
      inline: |
        function envoy_on_response(response_handle)
          local stream_info = response_handle:streamInfo()
          local metadata = stream_info:dynamicMetadata()
          local ai_gateway_meta = metadata:get("io.envoy.ai_gateway")
          
          if ai_gateway_meta and type(ai_gateway_meta) == "table" then
            local model_id = ai_gateway_meta["model_name_override"]
            
            if model_id then
              -- Normalize for matching
              local norm_id = model_id:gsub("[-/.]", "_")
              
              -- Use a priority-based match (longest key name that is a suffix of the override or vice versa)
              local best_cost = nil
              local longest_match_len = -1
              
              for k, v in pairs(ai_gateway_meta) do
                local cost_suffix = k:match("^cost_(.*)")
                if cost_suffix then
                  -- Check if suffix matches perfectly OR is contained as a unique identifier
                  if norm_id:find(cost_suffix, 1, true) or cost_suffix:find(norm_id, 1, true) then
                    if #cost_suffix > longest_match_len then
                      best_cost = v
                      longest_match_len = #cost_suffix
                    end
                  end
                end
              end
              
              if best_cost then
                metadata:set("io.envoy.ai_gateway", "llm_custom_total_cost", best_cost)
                
                -- Support newer/older Envoy driver variations
                pcall(function() 
                  if stream_info.setDynamicMetadata then
                    stream_info:setDynamicMetadata("io.envoy.ai_gateway", "llm_custom_total_cost", best_cost)
                  end
                end)
                
                -- Proof of performance headers
                response_handle:headers():add("x-telemetry-status", "success")
                response_handle:headers():add("x-telemetry-id", model_id)
                response_handle:headers():add("x-telemetry-cost", tostring(best_cost))
              else
                response_handle:headers():add("x-telemetry-status", "no-model-match")
              end
            else
              response_handle:headers():add("x-telemetry-status", "no-override-found")
            end
          end
        end