apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}-telemetry-lua
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "core-gateway.fullname" . }}
  lua:
    - type: Inline
      inline: |
        function envoy_on_response(response_handle)
          local metadata = response_handle:streamInfo():dynamicMetadata()
          local ai_gateway_meta = metadata:get("io.envoy.ai_gateway")
          
          if ai_gateway_meta then
            if type(ai_gateway_meta) == "table" then
              -- Find the active model marker
              for k, v in pairs(ai_gateway_meta) do
                local marker_key = k:match("^active_model_(.*)")
                -- Robust comparison to avoid 1 vs "1" trap
                if marker_key and tostring(v) == "1" then
                  local cost_val = ai_gateway_meta[marker_key]
                  if cost_val then
                    metadata:set("io.envoy.ai_gateway", "llm_custom_total_cost", cost_val)
                    -- response_handle:logInfo("Telemetry: mapped " .. marker_key .. " to general cost")
                  end
                  return
                end
              end
            else
              -- response_handle:logWarn("Telemetry: io.envoy.ai_gateway is not a table, got " .. type(ai_gateway_meta))
            end
          else
            -- response_handle:logWarn("Telemetry: io.envoy.ai_gateway namespace missing")
          end
        end