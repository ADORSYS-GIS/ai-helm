{{- $btp := .Values.backendTrafficPolicy | default dict -}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "core-gateway.fullname" . }}
  {{- with $btp.loadBalancer }}
  loadBalancer:
    type: {{ .type }}
  {{- end }}
  {{- with $btp.circuitBreaker }}
  circuitBreaker:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $btp.outlierDetection }}
  # Outlier detection = Envoy Gateway's passive health check.
  healthCheck:
    passive:
      {{- toYaml . | nindent 6 }}
  {{- end }}
  {{- with $btp.tcpKeepalive }}
  tcpKeepalive:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $btp.compression }}
  compression:
    {{- range . }}
    - type: {{ . }}
    {{- end }}
  {{- end }}
  {{- with $btp.requestTimeout }}
  # Whole-request ceiling for routes governed by THIS gateway-wide policy
  # (non-model routes — model routes carry their own per-model BTP that replaces
  # this one). ADR-0034.
  timeout:
    http:
      requestTimeout: {{ . | quote }}
  {{- end }}
  connection:
    bufferLimit: {{ $btp.bufferLimit | default "100Mi" | quote }}
  retry:
    numRetries: {{ (default dict $btp.retry).numRetries | default 1 }}
    perRetry:
      backOff:
        baseInterval: 100ms
        maxInterval: 10s
      # 300s default (ADR-0034): a single try must outlast a long generation —
      # the hardcoded 30s cut them. Configurable via retry.perRetryTimeout.
      timeout: {{ (default dict $btp.retry).perRetryTimeout | default "300s" }}
    retryOn:
      httpStatusCodes:
        - 500
        - 502
        - 503
        - 504
      triggers:
        - connect-failure
        - retriable-status-codes
