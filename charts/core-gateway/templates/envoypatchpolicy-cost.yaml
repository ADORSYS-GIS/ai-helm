apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}-cost-aggregation
  namespace: {{ .Release.Namespace }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "core-gateway.fullname" . }}
  type: JSONPatch
  jsonPatches:
    {{/* Patch for HTTP (port 80) */}}
    - type: "type.googleapis.com/envoy.config.listener.v3.Listener"
      name: {{ printf "%s/%s/http" $.Release.Namespace (include "core-gateway.fullname" $) }}
      operation:
        op: add
        path: "/filter_chains/0/filters/0/typed_config/http_filters/0"
        value: &luaFilter
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inline_code: |
              function envoy_on_response(response_handle)
                local metadata = response_handle:streamInfo():dynamicMetadata()
                local ai_gateway_meta = metadata:get("io.envoy.ai_gateway")
                if ai_gateway_meta then
                  -- Iterate through all metadata keys in the ai_gateway namespace
                  for k, v in pairs(ai_gateway_meta) do
                    -- If we find a key starting with "cost_", copy it to "llm_custom_total_cost"
                    -- This allows the access log to use a single stable key.
                    if type(k) == "string" and k:sub(1, 5) == "cost_" then
                      metadata:set("io.envoy.ai_gateway", "llm_custom_total_cost", v)
                      break
                    end
                  end
                end
              end

    {{/* Patches for HTTPS (port 443) - multiple filter chains due to separate hostnames/certs */}}
    {{- range $chain := (list "0" "1") }}
    - type: "type.googleapis.com/envoy.config.listener.v3.Listener"
      name: {{ printf "%s/%s/api-https" $.Release.Namespace (include "core-gateway.fullname" $) }}
      operation:
        op: add
        path: {{ printf "/filter_chains/%s/filters/0/typed_config/http_filters/0" $chain }}
        value: *luaFilter
    {{- end }}
---