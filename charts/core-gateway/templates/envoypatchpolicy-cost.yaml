apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: {{ include "core-gateway.fullname" . }}-cost-aggregation
  namespace: {{ .Release.Namespace }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "core-gateway.fullname" . }}
  type: JSONPatch
  jsonPatches:
    {{/* Patch for HTTP (port 80) - usually a redirector, uses default_filter_chain */}}
    - type: "type.googleapis.com/envoy.config.listener.v3.Listener"
      name: {{ printf "%s/%s/http" $.Release.Namespace (include "core-gateway.fullname" $) }}
      operation:
        op: add
        path: "/default_filter_chain/filters/0/typed_config/http_filters/0"
        value: &luaFilter
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inline_code: |
              function envoy_on_request(request_handle)
                local model_name = request_handle:headers():get("x-ai-eg-model")
                if model_name then
                  -- Persist the request header into dynamic metadata to access it during the response phase
                  request_handle:streamInfo():dynamicMetadata():set("envoy.filters.http.lua", "req_model_name", model_name)
                end
              end

              function envoy_on_response(response_handle)
                local metadata = response_handle:streamInfo():dynamicMetadata()
                local ai_gateway_meta = metadata:get("io.envoy.ai_gateway")
                if ai_gateway_meta then
                  local lua_meta = metadata:get("envoy.filters.http.lua")
                  if lua_meta and lua_meta["req_model_name"] then
                    local model_name = lua_meta["req_model_name"]
                    
                    -- model_name precisely matches the $routeName mathematically
                    -- Translate back to the exact CEL Helm template format (e.g. cost_te3_small)
                    local safe_name = model_name:gsub("-", "_"):gsub("%.", "_")
                    local exact_key = "cost_" .. safe_name
                    
                    local cost_val = ai_gateway_meta[exact_key]
                    if cost_val then
                      metadata:set("io.envoy.ai_gateway", "llm_custom_total_cost", cost_val)
                    end
                  end
                end
              end

    {{/* Patches for HTTPS (port 443) - multiple filter chains due to separate hostnames/certs */}}
    {{- range $chain := (list "0" "1") }}
    - type: "type.googleapis.com/envoy.config.listener.v3.Listener"
      name: {{ printf "%s/%s/api-https" $.Release.Namespace (include "core-gateway.fullname" $) }}
      operation:
        op: add
        path: {{ printf "/filter_chains/%s/filters/0/typed_config/http_filters/0" $chain }}
        value: *luaFilter
    {{- end }}
---