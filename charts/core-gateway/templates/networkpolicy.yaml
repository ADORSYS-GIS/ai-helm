{{- if (index .Values.policies "envoy-gateway-system-security").enabled }}
---
# NetworkPolicy for Envoy Gateway namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: envoy-gateway-system-security
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Intra-namespace ingress
    - from:
        - podSelector: {}
    # External ingress on standard ports
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
  egress:
    # DNS to kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-namespace egress
    - to:
        - podSelector: {}
    # Access to envoy-ai-gateway-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-ai-gateway-system
      ports:
        - port: 1063
          protocol: TCP
        - port: 9443
          protocol: TCP
        - port: 9090
          protocol: TCP
    # Kubernetes API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 6443
          protocol: TCP
{{- end }}

