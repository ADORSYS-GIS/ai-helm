{{- if .Values.networkPolicy.enabled }}
---
# NetworkPolicy for OpenTelemetry collector pods in converse-gateway namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: converse-gateway-otel-security
  namespace: converse-gateway
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: opentelemetry-operator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress from Envoy Gateway proxies
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/managed-by: envoy-gateway
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
  egress:
    # DNS to kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Access to converse-monitoring (TensorBoard)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: converse-monitoring
      ports:
        - port: 6006
          protocol: TCP
    # Access to converse (lightbridge)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: converse
      ports:
        - port: 3000
          protocol: TCP
{{- end }}

{{- if (index .Values.policies "converse-gateway-authorino-security").enabled }}
---
# NetworkPolicy for Authorino pods in converse-gateway namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: converse-gateway-authorino-security
  namespace: converse-gateway
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      authorino-resource: kuadrant-policies-main
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress from Envoy Gateway proxies
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 50051
          protocol: TCP
        - port: 5001
          protocol: TCP
        - port: 8083
          protocol: TCP
    # Webhook calls from Kubernetes API server
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 8443
          protocol: TCP
  egress:
    # DNS to kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-namespace egress
    - to:
        - podSelector: {}
    # Access to converse (lightbridge OPA)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: converse
      ports:
        - port: 3000
          protocol: TCP
{{- end }}

