apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ include "core-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- $ep := .Values.envoyProxy | default dict }}
  provider:
    type: Kubernetes
    kubernetes:
      envoyPDB:
        maxUnavailable: {{ (default dict $ep.pdb).maxUnavailable | default 1 }}
      {{- with $ep.hpa }}
      # Autoscale the data plane on CPU. envoyHpa supersedes a static
      # envoyDeployment.replicas, so 2000+ clients aren't funnelled through
      # a fixed pod count. (The HPA in the `eg` app scales the Envoy Gateway
      # *controller* — not this, the data plane that serves requests.)
      envoyHpa:
        minReplicas: {{ .minReplicas }}
        maxReplicas: {{ .maxReplicas }}
        metrics:
          - type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: {{ .cpuUtilization | default 60 }}
      {{- end }}
      envoyDeployment:
        container:
          resources:
            {{- toYaml ($ep.resources | default dict) | nindent 12 }}
        {{- if (default dict $ep.topologySpread).enabled }}
        pod:
          topologySpreadConstraints:
            - maxSkew: {{ $ep.topologySpread.maxSkew | default 1 }}
              topologyKey: kubernetes.io/hostname
              # Soft: spread across nodes when possible, never block scheduling.
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  gateway.envoyproxy.io/owning-gateway-name: {{ include "core-gateway.fullname" . }}
        {{- end }}
      envoyService:
        type: LoadBalancer
  shutdown:
    drainTimeout: {{ (default dict $ep.shutdown).drainTimeout | default "60s" }}
    minDrainDuration: {{ (default dict $ep.shutdown).minDrainDuration | default "15s" }}
  logging:
    level:
      default: warn
      
  telemetry:
    # Expose Envoy proxy metrics on :19001/stats/prometheus (the default).
    # Stated explicitly so the scrape contract with the PodMonitor in
    # templates/podmonitors-observability.yaml is documented in one place.
    metrics:
      prometheus: {}
    accessLog:
      settings:
        - sinks:
            - type: OpenTelemetry
              openTelemetry:
                # Send access logs straight to Alloy (→ Loki) for per-user
                # observability (ADR-0005). The old `-usage` OTel collector
                # middleman (→ lightbridge-usage billing) was removed —
                # usage/billing is handled via the AI Gateway + OAuth2 path.
                host: alloy.observability.svc.cluster.local
                port: 4317
                resources:
                  k8s.cluster.name: "converse-llm-1"
          matches:
            - "request.headers['x-ai-eg-model'] != ''"
          format:
            type: JSON
            json:
              gen_ai.request.model: "%REQ(X-AI-EG-MODEL)%"
              gen_ai.request.model_override: "%DYNAMIC_METADATA(io.envoy.ai_gateway:model_name_override)%"
              gen_ai.provider.name: "%DYNAMIC_METADATA(io.envoy.ai_gateway:backend_name)%"
              gen_ai.usage.total_tokens: "%DYNAMIC_METADATA(io.envoy.ai_gateway:llm_total_token)%"
              gen_ai.usage.input_tokens: "%DYNAMIC_METADATA(io.envoy.ai_gateway:llm_input_token)%"
              gen_ai.usage.output_tokens: "%DYNAMIC_METADATA(io.envoy.ai_gateway:llm_output_token)%"
              gen_ai.usage.custom_total_cost: "%DYNAMIC_METADATA(io.envoy.ai_gateway:llm_custom_total_cost)%"
              # Some Common fields
              start_time: "%START_TIME%"
              method: "%REQ(:METHOD)%"
              x-envoy-origin-path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              protocol: "%PROTOCOL%"
              response_code: "%RESPONSE_CODE%"
              response_flags: "%RESPONSE_FLAGS%"
              response_code_details: "%RESPONSE_CODE_DETAILS%"
              connection_termination_details: "%CONNECTION_TERMINATION_DETAILS%"
              upstream_transport_failure_reason: "%UPSTREAM_TRANSPORT_FAILURE_REASON%"
              bytes_received: "%BYTES_RECEIVED%"
              bytes_sent: "%BYTES_SENT%"
              duration: "%DURATION%"
              x-envoy-upstream-service-time: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
              x-forwarded-for: "%REQ(X-FORWARDED-FOR)%"
              user-agent: "%REQ(USER-AGENT)%"
              x-request-id: "%REQ(X-REQUEST-ID)%"
              ":authority": "%REQ(:AUTHORITY)%"
              upstream_host: "%UPSTREAM_HOST%"
              upstream_cluster: "%UPSTREAM_CLUSTER%"
              upstream_local_address: "%UPSTREAM_LOCAL_ADDRESS%"
              downstream_local_address: "%DOWNSTREAM_LOCAL_ADDRESS%"
              downstream_remote_address: "%DOWNSTREAM_REMOTE_ADDRESS%"
              requested_server_name: "%REQUESTED_SERVER_NAME%"
              route_name: "%ROUTE_NAME%"
              # LightBridge
              api_key_id: "%REQ(X-API-KEY-ID)%"
              project_id: "%REQ(X-PROJECT-ID)%"
              account_id: "%REQ(X-ACCOUNT-ID)%"
              billing_plan: "%REQ(X-BILLING-PLAN)%"
              # LibreChat Downstream Headers
              lc_user_id: "%REQ(X-USER-ID)%"
              lc_user_email: "%REQ(X-USER-EMAIL)%"
              lc_user_role: "%REQ(X-USER-ROLE)%"
              lc_user_name: "%REQ(X-USER-NAME)%"
              # Authorino-injected OIDC claim headers (ADR-0011).
              # user_id + azp are promoted to Loki labels by Alloy
              # (ADR-0005). The rest ride in the body and are queried via
              # LogQL `| json`. See docs/per-user-observability.md.
              # IDENTITY
              user_id:              "%REQ(X-OIDC-USER-ID)%"
              user_name:            "%REQ(X-OIDC-USER-NAME)%"
              azp:                  "%REQ(X-OIDC-AZP)%"
              oidc_iss:             "%REQ(X-OIDC-ISS)%"
              # AUTHORIZATION
              oidc_roles_realm:     "%REQ(X-OIDC-ROLES-REALM)%"
              oidc_resource_access: "%REQ(X-OIDC-RESOURCE-ACCESS)%"
              oidc_scope:           "%REQ(X-OIDC-SCOPE)%"
              # TRACING
              oidc_jti:             "%REQ(X-OIDC-JTI)%"
              # PROFILE (PII — see ADR-0011)
              oidc_email:           "%REQ(X-OIDC-EMAIL)%"
              oidc_name:            "%REQ(X-OIDC-NAME)%"
