apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "core-gateway.fullname" $ }}
  namespace: {{ .Release.Namespace }}
  annotations:
    # NOTE: TLS for the api-https listener is issued by an explicit Certificate
    # (templates/certificate.yaml) writing `<fullname>-api-tls`, NOT via the
    # cert-manager Gateway-API shim — so we deliberately do NOT set
    # `cert-manager.io/cluster-issuer` here (it would double-manage the secret
    # if the shim were enabled). `.Values.gateway.issuer` drives the Certificate.
    aigateway.envoyproxy.io/gateway-config: {{ include "core-gateway.fullname" $ }}-config
spec:
  gatewayClassName: {{ .Values.gateway.className | default "core-gateway" }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ include "core-gateway.fullname" . }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: api-https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.apiHostname }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ include "core-gateway.fullname" . }}-api-tls
            kind: Secret
            group: ''
      allowedRoutes:
        namespaces:
          from: All
