apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
{{- $gateway := .Values.gateway | default dict }}
{{- $apiHostname := $gateway.apiHostname | default "" }}
{{- $serviceApiHostname := $gateway.serviceApiHostname | default "" }}
metadata:
  name: {{ include "core-gateway.fullname" $ }}
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $gateway.issuer | default "self-signed-ca" }}
spec:
  gatewayClassName: {{ $gateway.className | default "core-gateway" }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ include "core-gateway.fullname" . }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

    {{- /*
      Gateway API validation requires the combination (port, protocol, hostname) to be unique per listener.
      If neither hostname is provided, render a single HTTPS listener (no hostname) to keep the chart deployable.
    */}}
    {{- if and (eq $apiHostname "") (eq $serviceApiHostname "") }}
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ include "core-gateway.fullname" . }}-tls
            kind: Secret
            group: ''
      allowedRoutes:
        namespaces:
          from: All
    {{- else }}
    {{- if $apiHostname }}
    - name: api-https
      protocol: HTTPS
      port: 443
      hostname: {{ $apiHostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ include "core-gateway.fullname" . }}-api-tls
            kind: Secret
            group: ''
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
    {{- if $serviceApiHostname }}
    - name: service-https
      protocol: HTTPS
      port: 443
      hostname: {{ $serviceApiHostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ include "core-gateway.fullname" . }}-service-tls
            kind: Secret
            group: ''
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
    {{- end }}
