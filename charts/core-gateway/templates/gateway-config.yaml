---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: GatewayConfigList
metadata:
  name: {{ include "core-gateway.fullname" $ }}-config-list
  namespace: {{ .Release.Namespace }}
items:
  - apiVersion: aigateway.envoyproxy.io/v1alpha1
    kind: GatewayConfig
    metadata:
      name: {{ include "core-gateway.fullname" $ }}-config
      namespace: {{ .Release.Namespace }}
    spec:
      extProc:
        kubernetes:
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://core-gateway-phoenix-collector.converse-gateway:4318"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_SERVICE_NAME
              value: "{{ include "core-gateway.fullname" $ }}"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"