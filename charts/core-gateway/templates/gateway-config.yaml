{{- $extProc := .Values.extProc | default dict -}}
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: GatewayConfigList
metadata:
  name: {{ include "core-gateway.fullname" $ }}-config-list
  namespace: {{ .Release.Namespace }}
items:
  - apiVersion: aigateway.envoyproxy.io/v1alpha1
    kind: GatewayConfig
    metadata:
      name: {{ include "core-gateway.fullname" $ }}-config
      namespace: {{ .Release.Namespace }}
    spec:
      extProc:
        kubernetes:
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "core-gateway.fullname" $ }}-traces-collector.{{ .Release.Namespace }}.svc.cluster.local:4318"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_SERVICE_NAME
              value: "{{ include "core-gateway.fullname" $ }}"
          # ExtProc is the AI Gateway's per-request brain (token counting, cost
          # CEL, routing, metadata) and holds state for the whole stream — it
          # must not be the data-path bottleneck (ADR-0034). Values-driven; the
          # default restores generous headroom (limit = burst ceiling, not a
          # reservation) without inflating the scheduled request.
          resources:
            {{- toYaml ($extProc.resources | default (dict "requests" (dict "cpu" "250m" "memory" "256Mi") "limits" (dict "cpu" "2000m" "memory" "512Mi"))) | nindent 12 }}