---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "core-gateway.fullname" . }}-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ include "core-gateway.fullname" . }}
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
