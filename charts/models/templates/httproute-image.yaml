{{- range $routeName, $routeConfig := .Values.models }}
{{- if and (default true $routeConfig.enabled) $routeConfig.image $routeConfig.image.enabled }}
{{- $activeBackends := dict -}}
{{- range $bKey, $bVal := $routeConfig.backends }}
{{- if (default true $bVal.enabled) }}
{{- $_ := set $activeBackends $bKey $bVal }}
{{- end }}
{{- end }}
{{- $modelName := "" }}
{{- range $bKey, $bVal := $activeBackends }}
{{- if not $modelName }}
{{- $modelName = $bVal.modelNameOverride | default $routeName }}
{{- end }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $routeName }}-image
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gatewayRef.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/images/generations
          headers:
            - type: Exact
              name: x-ai-eg-model
              value: {{ $routeConfig.modelMatch | default $routeName }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /inference/v1/image_generation/{{ $modelName }}
      backendRefs:
        {{- range $bKey, $bVal := $activeBackends }}
        {{- $backendBase := index $.Values.backends $bVal.ref }}
        - group: gateway.envoyproxy.io
          kind: Backend
          name: {{ $backendBase.resourceName }}
        {{- end }}
{{- end }}
{{- end }}
