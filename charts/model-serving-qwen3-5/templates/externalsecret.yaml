{{- /*
The API key llama-server enforces (--api-key-file). UNLIKE huggingfaceserver,
llama-server validates the Bearer natively, so there is no Caddy sidecar — this
Secret is mounted as a FILE at /etc/llama/api_key (see values: persistence.api-key)
and passed via --api-key-file. ESO pulls it from the ssegning-aws ClusterSecretStore.
Wave -2: before the pod. The maintainer populates the property in AWS SM; until then
the ExternalSecret sits in SecretSyncedError.
*/ -}}
{{- if and .Values.apiKey.enabled .Values.apiKey.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.apiKey.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: {{ .Values.apiKey.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.apiKey.externalSecret.secretStore | default "ssegning-aws" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.apiKey.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.apiKey.dataKey }}
      remoteRef:
        key: {{ required "apiKey.externalSecret.key is required" .Values.apiKey.externalSecret.key | quote }}
        property: {{ required "apiKey.externalSecret.property is required" .Values.apiKey.externalSecret.property | quote }}
{{- end }}
