# observability App-of-Apps orchestrator values. See ADR-0020. The chart owns
# no workload resources — it renders one child Application per entry below.
#
# ── Shared ArgoCD wiring for the child Applications ──────────────────────────
argocd:
  # Namespace the child Application CRs live in (where ArgoCD watches them).
  namespace: argocd
  project: ai
  # depsOverlay source (ADR-0055) for the child deps overlays (alloy /
  # kube-state-metrics / grafana-operator / grafana): the values repo @ main.
  # Leaf charts come from OCI per-child (see each child's `source`); the
  # observability-secrets overlay sets its own values-repo source too.
  repoURL: https://github.com/adorsys-gis/ai-helm-values
  targetRevision: main
  destination:
    # home-remote cluster (ADR-0017 guard). Children may override .namespace
    # but all observability children use `observability`.
    name: home-remote
    allowInCluster: false
    namespace: observability

# PodSecurity enforce level applied to the observability namespace via ArgoCD
# managedNamespaceMetadata on EVERY child — Alloy (hostPath /var/log) and
# node-exporter (host /proc,/sys,/) need `privileged` under k3s's cluster-wide
# baseline default. The per-cluster-kind knob: set "" to skip labelling, or
# another level for a different cluster. (ADR-0018 / ADR-0020.)
podSecurityEnforce: privileged

# ── Children ─────────────────────────────────────────────────────────────────
# Each entry is a full app spec (same schema as charts/apps applications[]):
# name, additionalAnnotations (sync-wave), source/sources, syncPolicy,
# destination.namespace. Rendered as a workload Application targeting
# home-remote. Sync-waves preserved from the pre-split flat apps.
children:
  # --- observability-secrets: ExternalSecrets feeding the stack ---
  # S3 creds (mimir/loki/tempo) + grafana admin/keycloak, from ssegning-aws.
  # Wave -3 so the secrets exist before the backends (wave -2) start.
  #
  # ⚠️ DISABLED until the real remoteRefs are filled. The placeholders in
  # environments/base/deps/observability-secrets/external-secrets.yaml would
  # otherwise (creationPolicy: Owner) fight the externally-provisioned Secrets
  # of the same names and, with failing fetches, break the live stack. To
  # activate: fill the ssegning-aws keys, ensure the external provisioner
  # (ai-ops-secrets) no longer manages these Secrets, then set enabled: true.
  - name: observability-secrets
    enabled: true
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-3"
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      # Deps overlay (ExternalSecrets + the allow-same-namespace NetworkPolicy) —
      # from the values repo @ main (ADR-0055), like the other environments/ deps.
      repoURL: https://github.com/adorsys-gis/ai-helm-values
      targetRevision: main
      path: environments/prod/deps/observability-secrets
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: Prometheus Operator CRDs ---
  # CRDs only (no operator) — registers ServiceMonitor, PodMonitor, etc.
  - name: prometheus-operator-crds
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-3"
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 29.0.0
      chart: prometheus-operator-crds
      helm:
        releaseName: prometheus-operator-crds
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - Replace=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: Grafana Alloy ---
  # Unified telemetry collector — discovers ServiceMonitors and scrapes metrics.
  - name: alloy
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    # Alloy watches the API server (discovery + ServiceMonitor/PodMonitor
    # informers) and scrapes targets across every namespace. Under the
    # default-deny-egress baseline (allow-dns only) those informers time out
    # (`Get "https://10.43.0.1:443/api": i/o timeout`) and metrics stay empty.
    # This overlay ships the additive egress allow (CiliumNetworkPolicy
    # kube-apiserver + cluster entities + DNS), same pattern as kube-state-metrics
    # / grafana-operator. See docs/2026-06-07-observability-datasource-audit.md §6.
    depsOverlay: environments/prod/deps/alloy
    source:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 1.8.2
      chart: alloy
      helm:
        releaseName: alloy
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: kube-state-metrics ---
  # Exposes Kubernetes object state (kube_pod_*, kube_deployment_*, kube_node_*,
  # etc.) as Prometheus metrics. This is NOT the same as metrics-server — the
  # metrics-server app only serves the Kubernetes Metrics API (kubectl top / HPA)
  # and is not scrapeable. Without kube-state-metrics the Kubernetes and
  # Infrastructure dashboards have no source data.
  # Its ServiceMonitor is discovered automatically by Alloy.
  - name: kube-state-metrics
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    # ksm watches the API server to generate object metrics; under the namespace
    # default-deny-egress baseline (allow-dns) it can't reach it and crashloops
    # (`Get https://10.43.0.1:443/version: i/o timeout`). This overlay ships an
    # additive egress allow (CiliumNetworkPolicy kube-apiserver entity + DNS),
    # same pattern as grafana-operator. See docs/2026-hetzner-cutover.md.
    depsOverlay: environments/prod/deps/kube-state-metrics
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 7.4.0
      chart: kube-state-metrics
      helm:
        releaseName: kube-state-metrics
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: prometheus-redis-exporter (rate-limit quota) ---
  # Exposes the Envoy AI Gateway rate-limit service's LIVE per-account budget
  # counters, which live ONLY in redis-ha (one key per x-account-id × model ×
  # plan × 30-day window, value = micro-USD spent; ADR-0021/0035). SCANs the
  # monthly-budget keys and exports them as gateway_ratelimit_spend_micro_usd;
  # the ServiceMonitor's metricRelabelings parse account_id/model/plan/plane/
  # window out of the key (see the values file). Feeds the `AI Gateway —
  # rate-limit quota` dashboard (observability-dashboards). ADR-0070.
  #
  # depsOverlay ships the app-scoped deps: the redis-password ExternalSecret
  # (redis-ha-redis-auth, observability ns), a self-signed-ca CA leaf for TLS
  # trust (redis-exporter-redis-ca), and Cilium egress to redis-system:6379 +
  # scrape ingress on :9121 (the observability default-deny baseline blocks both
  # otherwise). Its ServiceMonitor is discovered automatically by Alloy.
  - name: prometheus-redis-exporter
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    depsOverlay: environments/prod/deps/prometheus-redis-exporter
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 6.26.0
      chart: prometheus-redis-exporter
      helm:
        releaseName: prometheus-redis-exporter
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: prometheus-node-exporter ---
  # DaemonSet exposing per-node hardware/OS metrics (node_cpu_*, node_memory_*,
  # node_filesystem_*, node_network_*). Required by the K8s Nodes / Global
  # dashboards. Its ServiceMonitor is discovered automatically by Alloy.
  - name: node-exporter
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      # 4.55.0 per audit (16 minors bump; metrics surface stable).
      targetRevision: 4.55.0
      chart: prometheus-node-exporter
      helm:
        releaseName: node-exporter
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: grafana-operator ---
  # Installs the grafana-operator controller + its CRDs (Grafana,
  # GrafanaDashboard, GrafanaFolder, GrafanaDatasource, GrafanaContactPoint,
  # GrafanaAlertRuleGroup). The operator runs cluster-wide.
  #
  # The cluster's actual Grafana workload is still the `grafana` app below
  # (vanilla grafana/grafana chart, sync-wave 0). The operator manages content
  # only — it talks to grafana via the admin API in EXTERNAL mode. The wiring
  # lives in the `observability-dashboards` app (sync-wave 1) which ships the
  # `Grafana` CR and folders / dashboards / datasources.
  #
  # Cutover from sidecar-discovered dashboards: not applicable here — the
  # existing grafana app loads dashboards via the chart's `dashboards:` map
  # (file-provider, baked into the deployment), not via the sidecar. New
  # dashboards go through CRs; existing in-values dashboards stay until
  # migrated one-by-one. See docs/grafana-operator-and-dashboards.md.
  #
  # NOTE: chart version pinned to a known-good. Verify against
  # `helm search repo grafana-operator` before bumping.
  - name: grafana-operator
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    # The operator MUST reach the Kubernetes API server at startup ("detect
    # platform"). The cluster's default-deny-egress baseline (the namespace
    # `allow-dns` NetworkPolicy permits DNS egress only) blocked that call, so
    # the pod hung 32s on the API dial and the 30s liveness probe killed it ~2s
    # before the error logged — presenting as a silent exit-2 CrashLoop. This
    # overlay ships an additive egress NetworkPolicy granting the operator pod
    # API-server (+ intra-namespace + DNS) egress. See docs/2026-hetzner-cutover.md.
    depsOverlay: environments/prod/deps/grafana-operator
    source:
      # OCI chart path must include the chart name (grafana-operator).
      # This ArgoCD resolves the artifact from repoURL as-is and does NOT
      # append `chart:` to the path (matches the coder/envoy OCI apps here)
      # — with the chart name left out, it pulled `grafana/helm-charts`
      # and GHCR returned 403. See the envoy-* apps for the same shape.
      repoURL: oci://ghcr.io/grafana/helm-charts/grafana-operator
      # 5.23.0 — latest. ⚠️ TAG-NAMING GOTCHA: tags ≤ 5.20.0 are prefixed `v`
      # (`v5.20.0`); from 5.21 onward the `v` was DROPPED (`5.23.0`). That's why
      # a prior `v5.23.0` pin failed with ArgoCD ComparisonError ("not found") —
      # the tag is `5.23.0`, not `v5.23.0`. Verify before bump:
      #   curl -s "https://ghcr.io/token?scope=repository:grafana/helm-charts/grafana-operator:pull" | jq -r .token
      #   then GET https://ghcr.io/v2/grafana/helm-charts/grafana-operator/tags/list (numeric-sort!)
      targetRevision: 5.23.0
      chart: grafana-operator
      helm:
        releaseName: grafana-operator
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability: Mimir — long-term metrics store + built-in Alertmanager
  # Sync wave -1: backends before Grafana
  # Secrets required (via ESO):
  #   mimir-s3:
  #     MIMIR_S3_ACCESS_KEY_ID: <linode-or-custom-s3-access-key>
  #     MIMIR_S3_SECRET_ACCESS_KEY: <linode-or-custom-s3-secret-key>
  # Buckets to create before first sync:
  #   converse-mimir-blocks, converse-mimir-alertmanager, converse-mimir-ruler
  # ─────────────────────────────────────────────────────────────────────────────
  - name: mimir
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-2"
    source:
      repoURL: https://grafana.github.io/helm-charts
      # 5.8.0 — latest within the 5.x major. ⚠️ NOT bumped to 6.x: mimir-distributed
      # 6.0 is a BREAKING migration — our top-level `nginx` block must be migrated
      # to the unified `gateway` deployment first, and the rollout-operator CRDs
      # must be installed or the operator explicitly disabled (else the release
      # errors). Do that as a dedicated, tested change before going to 6.x.
      # See https://grafana.com/docs/helm-charts/mimir-distributed/latest/migration-guides/migrate-helm-chart-5.x-to-6.0/
      targetRevision: 5.8.0
      chart: mimir-distributed
      helm:
        releaseName: mimir
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability: Loki — log aggregation store
  # Sync wave -1: alongside Mimir, before Grafana
  # Secrets required (via ESO):
  #   loki-s3:
  #     LOKI_S3_ACCESS_KEY_ID: <key>
  #     LOKI_S3_SECRET_ACCESS_KEY: <secret>
  # Buckets to create: converse-loki-chunks, converse-loki-ruler
  # ─────────────────────────────────────────────────────────────────────────────
  - name: loki
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-2"
    source:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 7.0.0
      chart: loki
      helm:
        releaseName: loki
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability: Tempo — distributed trace store
  # Sync wave -1: alongside Mimir and Loki, before Grafana
  # Secrets required (via ESO):
  #   tempo-s3:
  #     TEMPO_S3_ACCESS_KEY: <key>
  #     TEMPO_S3_SECRET_KEY: <secret>
  # Bucket to create: converse-tempo-traces
  # ─────────────────────────────────────────────────────────────────────────────
  - name: tempo
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-2"
    source:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 1.24.4
      chart: tempo
      helm:
        releaseName: tempo
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability: Grafana — visualization, dashboards, unified alerting
  # Sync wave 0: after backends are up
  # Secrets required (via ESO):
  #   grafana-admin:
  #     admin-user:     admin
  #     admin-password: <strong-password>
  #   grafana-keycloak:   (injected via envFromSecrets → key = env var name)
  #     GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: <keycloak-client-secret-for-grafana-realm-client>
  # Keycloak client to create: "grafana" in the camer-digital realm,
  #   redirect URI: https://grafana.ai.camer.digital/login/generic_oauth
  # ─────────────────────────────────────────────────────────────────────────────
  - name: grafana
    valuesFromRepo: true   # values in ai-helm-values (ADR-0056)
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "0"
    # Umbrella (ADR-0018): app-scoped ingress Certificate via the overlay.
    depsOverlay: environments/prod/deps/grafana
    source:
      repoURL: https://grafana.github.io/helm-charts
      # 10.5.15 — latest. Chart major 9→10 is mostly template changes; the
      # bundled Grafana app only moves 12.1.1 → 12.3.1 (we don't pin image.tag),
      # and our valuesObject renders clean against it.
      targetRevision: 10.5.15
      chart: grafana
      helm:
        releaseName: grafana
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: dashboards / folders (grafana-operator CRs) ---
  # Owns ONLY operator CRs (Grafana external-mode, GrafanaFolder, future
  # GrafanaDashboard / GrafanaDatasource / GrafanaContactPoint /
  # GrafanaAlertRuleGroup). No workloads — the actual grafana pod is owned by
  # the `grafana` app above.
  # Sync-wave 1: depends on grafana-operator (-1) AND the grafana app (0)
  # being healthy. Grafana CR in external mode hits the admin API on first
  # reconcile.
  - name: observability-dashboards
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "1"
    source:
      # OCI chart-float (ADR-0055): full chart path in repoURL + chart "." (#453).
      repoURL: oci://ghcr.io/adorsys-gis/charts/observability-dashboards
      chart: "."
      targetRevision: ">=0.0.0"
      helm:
        releaseName: observability-dashboards
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true
