{{- if .Values.authConfigs }}
{{- range $name, $config := .Values.authConfigs }}
---
apiVersion: authorino.kuadrant.io/v1beta3
kind: AuthConfig
metadata:
  name: {{ include "common.names.name" $ }}-{{ $name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{ include "common.labels.standard" $ | nindent 4 }}
spec:
  {{- with $config.hosts }}
  hosts:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- with $config.authentication }}
  authentication:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- /* metadata: iterate per-entry so we can honor _skipForServiceAccounts */}}
  {{- with $config.metadata }}
  metadata:
    {{- range $stepName, $stepCfg := . }}
    {{ $stepName | quote }}:
      {{- include "kuadrant-policies.authStep" (dict "step" $stepCfg "saClients" $config.serviceAccountClients) | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- /* authorization: same per-entry treatment */}}
  {{- with $config.authorization }}
  authorization:
    {{- range $stepName, $stepCfg := . }}
    {{ $stepName | quote }}:
      {{- include "kuadrant-policies.authStep" (dict "step" $stepCfg "saClients" $config.serviceAccountClients) | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- with $config.response }}
  response:
    {{- toYaml . | nindent 4 }}
  {{- end }}

{{- end }}
{{- end }}
