{{- if .Values.networkPolicy.enabled }}
---
# NetworkPolicy for Authorino operator namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authorino-system-security
  namespace: authorino-system
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress from envoy-gateway-system (Envoy proxies calling Authorino)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 50051
          protocol: TCP
        - port: 5001
          protocol: TCP
        - port: 8083
          protocol: TCP
    # Webhook calls from Kubernetes API server
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 8443
          protocol: TCP
    # Intra-namespace ingress
    - from:
        - podSelector: {}
  egress:
    # DNS to kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-namespace egress
    - to:
        - podSelector: {}
    # Access to converse (lightbridge)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: converse
      ports:
        - port: 3000
          protocol: TCP
    # Kubernetes API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 6443
          protocol: TCP
{{- end }}
