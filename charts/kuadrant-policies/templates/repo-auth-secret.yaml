{{- /*
The X-Internal-Token Authorino presents to lightbridge-repo-auth /v1/resolve
(ADR-0047). Lives in the Authorino namespace and is referenced by the `main`
AuthConfig's `repobinding` metadata `sharedSecretRef`.

⚠️ This Secret MUST exist before the AuthConfig is applied: a `sharedSecretRef`
to a missing Secret makes the whole AuthConfig fail readiness → no hosts linked
→ gateway-wide 404 (the exact failure that forced the OPA removal, 2026-06-04).
The remote property must therefore exist in ssegning-aws before releasing.
*/ -}}
{{- with .Values.repoAuthInternalSecret }}
{{- if .enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .secretName | default "lightbridge-repo-auth-internal" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "common.labels.standard" $ | nindent 4 }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .secretStore | default "ssegning-aws" }}
  target:
    name: {{ .secretName | default "lightbridge-repo-auth-internal" }}
    creationPolicy: Owner
  data:
    - secretKey: internal-token
      remoteRef:
        key: {{ .remoteKey | default "ai/camer/digital/prod/env" }}
        property: {{ .property | default "repo_auth_resolve_internal_token" }}
{{- end }}
{{- end }}
