{{- if .Values.securityPolicies }}
{{- range $name, $config := .Values.securityPolicies }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "common.names.name" $ }}-{{ $name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{ include "common.labels.standard" $ | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $config.gatewayName }}
      sectionName: api-https
  extAuth:
    grpc:
      backendRefs:
        - name: {{ $config.authorinoService }}
          port: 50051
          kind: Service
          weight: 1
          group: ''
{{- end }}
{{- end }}
