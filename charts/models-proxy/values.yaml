global:
  litellm:
    version: "v1.82.3-stable"
  configmap:
    name: "litellm-config"

proxy:
  defaultPodOptions:
    automountServiceAccountToken: false
    tolerations:
      - key: ai.camer.digital/offline-work
        operator: Equal
        value: dev-container
        effect: NoSchedule
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

  service:
    litellm:
      enabled: true
      annotations: { }
      type: ClusterIP
      controller: litellm
      ports:
        http:
          enabled: true
          port: 4000
          targetPort: 4000

  controllers:
    litellm:
      type: deployment
      strategy: RollingUpdate
      replicas: 1
      podDisruptionBudget:
        maxUnavailable: 0
      pod:
        labels:
          app: proxy-app
      containers:
        litellm:
          image:
            repository: docker.litellm.ai/berriai/litellm
            tag: "{{ .Values.global.litellm.version }}"
          args:
            - --config
            - /app/config.yaml
          env:
            PUID: "1000"
            PGID: "1000"
            TZ: "Europe/Berlin"

            LITELLM_MODE: "production"

            REDIS_URL: "redis://redis-master.redis-system.svc.cluster.local:6379"

            OPENAI_API_KEY:
              secretKeyRef:
                name: openai-api-key
                key: apiKey

            GEMINI_API_KEY:
              secretKeyRef:
                name: gemini-api-key
                key: apiKey

            FIREWORKS_API_KEY:
              secretKeyRef:
                name: fireworks-api-key-01
                key: apiKey

            #LITELLM_MASTER_KEY:
            #  secretKeyRef:
            #    name: proxy-api-key
            #    key: apiKey

          resources:
            limits:
              cpu: 4
              memory: 4Gi
            requests:
              cpu: 2
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false

  persistence:
    config:
      enabled: true
      type: configMap
      name: '{{ .Values.global.configmap.name }}'
      advancedMounts:
        litellm:
          litellm:
            - path: /app/config.yaml
              subPath: config.yaml
              readOnly: true
    # Gemini thought signature patch - single source of truth for entire lifecycle
    # Use proxy.persistence["gemini-patch"].enabled to enable/disable
    # Use proxy.persistence["gemini-patch"].name to customize the ConfigMap name (optional)
    gemini-patch:
      enabled: true
      name: litellm-gemini-plugin
      type: configMap
      advancedMounts:
        litellm:
          litellm:
            - path: /app/litellm_gemini_patch.py
              subPath: litellm_gemini_patch.py
              readOnly: true
    # Fireworks tool-calling patch - fixes tool call loop issues with glm-5 and other Fireworks models
    # Use proxy.persistence["fireworks-patch"].enabled to enable/disable
    # Use proxy.persistence["fireworks-patch"].name to customize the ConfigMap name (optional)
    fireworks-patch:
      enabled: true
      name: litellm-fireworks-plugin
      type: configMap
      advancedMounts:
        litellm:
          litellm:
            - path: /app/litellm_fireworks_patch.py
              subPath: litellm_fireworks_patch.py
              readOnly: true

  serviceAccount:
    default:
      enabled: false

networkPolicy:
  enabled: true
  # Namespace(s) that should be allowed to access the proxy
  ingressNamespaces:
    - envoy-gateway-system
    - envoy-ai-gateway-system
    - default
  egressDestinations:
    # Google Gemini API
    - cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # OpenAI API
    - cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

config:
  litellm_settings:
    cache: True
    cache_params: # set cache params for redis
      type: redis
      namespace: "litellm.caching.caching"
    drop_params: true  # Required for Gemini 3 - drops unsupported params to prevent API errors
  model_list:
    # Explicit allowlist of supported models/providers
    # Add new models here following the pattern below
    # Models synchronized with ai-models overrides
    - model_name: "gemini/gemini-3.1-pro"
      litellm_params:
        model: "gemini/gemini-3.1-pro"
    - model_name: "gemini/gemini-3.1-flash-lite"
      litellm_params:
        model: "gemini/gemini-3.1-flash-lite"
    - model_name: "gemini/gemini-3-flash"
      litellm_params:
        model: "gemini/gemini-3-flash"
    - model_name: "gemini/gemini-2.5-pro"
      litellm_params:
        model: "gemini/gemini-2.5-pro"
    - model_name: "gemini/gemini-2.5-flash"
