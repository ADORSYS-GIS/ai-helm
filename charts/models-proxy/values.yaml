global:
  litellm:
    version: "main-v1.82.4-nightly"
  configmap:
    name: "litellm-config"

proxy:
  defaultPodOptions:
    automountServiceAccountToken: false

  service:
    litellm:
      enabled: true
      annotations: { }
      type: ClusterIP
      controller: litellm
      ports:
        http:
          enabled: true
          port: 4000
          targetPort: 4000

  controllers:
    litellm:
      type: deployment
      strategy: RollingUpdate
      replicas: 1
      pod:
        labels:
          app: proxy-app
      containers:
        litellm:
          image:
            repository: docker.litellm.ai/berriai/litellm
            tag: "{{ .Values.global.litellm.version }}"
          args:
            - --config
            - /app/config.yaml
          env:
            PUID: "1000"
            PGID: "1000"
            TZ: "Europe/Berlin"

            LITELLM_MODE: "production"

            REDIS_URL: "redis://redis-master.redis-system.svc.cluster.local:6379"

            OPENAI_API_KEY:
              secretKeyRef:
                name: openai-api-key
                key: apiKey

            GEMINI_API_KEY:
              secretKeyRef:
                name: gemini-api-key
                key: apiKey

            #LITELLM_MASTER_KEY:
            #  secretKeyRef:
            #    name: proxy-api-key
            #    key: apiKey

          resources:
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false

  persistence:
    config:
      enabled: true
      type: configMap
      name: '{{ .Values.global.configmap.name }}'
      advancedMounts:
        litellm:
          litellm:
            - path: /app/config.yaml
              subPath: config.yaml
              readOnly: true
    # Gemini thought signature patch - single source of truth for entire lifecycle
    # Use proxy.persistence.gemini_patch.enabled to enable/disable
    # Use proxy.persistence.gemini_patch.name to customize the ConfigMap name (optional)
    gemini_patch:
      enabled: true
      name: litellm-gemini-plugin
      type: configMap
      advancedMounts:
        litellm:
          litellm:
            - path: /app/litellm_gemini_patch.py
              subPath: litellm_gemini_patch.py
              readOnly: true

  serviceAccount:
    default:
      enabled: false

config:
  litellm_settings:
    cache: True
    cache_params: # set cache params for redis
      type: redis
      namespace: "litellm.caching.caching"
    drop_params: true  # Required for Gemini 3 - drops unsupported params to prevent API errors
  model_list:
    - model_name: "*"
      litellm_params:
        model: "*"
        # api_key: "os.environ/GEMINI_API_KEY"
    # ── Wildcard passthrough (optional – keeps upstream model names working)
    - model_name: "gemini/*"
      litellm_params:
        model: "gemini/*"
        # api_key: "os.environ/GEMINI_API_KEY"
        