networkPolicy:
  enabled: true
  # Namespace(s) that should be allowed to access the proxy
  ingressNamespaces:
    - converse-gateway
    - default
  egressDestinations:
    # Google Gemini API
    - cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # OpenAI API
    - cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
