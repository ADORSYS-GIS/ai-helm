apiVersion: v1
kind: Secret
metadata:
  name: librechat-mcp-coder-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  client_id: REPLACE_WITH_CODER_CLIENT_ID
  client_secret: REPLACE_WITH_CODER_CLIENT_SECRET
---
apiVersion: batch/v1
kind: Job
metadata:
  name: librechat-mcp-coder-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: librechat-mcp-coder
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              
              CODER_URL="http://coder.coder.svc.cluster.local:8080"
              CALLBACK_URL="https://ai.camer.digital/api/mcp/coder_mcp/oauth/callback"
              
              echo "Creating OAuth application in Coder..."
              
              RESPONSE=$(curl -s -X POST \
                -H "Authorization: Bearer ${CODER_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"title\": \"LibreChat MCP\",
                  \"redirect_uris\": [\"${CALLBACK_URL}\"],
                  \"icon\": \"https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/adorsys-icon-primary.jpg\"
                }" \
                "${CODER_URL}/api/v2/applications")
              
              echo "Response: ${RESPONSE}"
              
              CLIENT_ID=$(echo ${RESPONSE} | grep -o '"client_id":"[^"]*' | cut -d'"' -f4)
              CLIENT_SECRET=$(echo ${RESPONSE} | grep -o '"client_secret":"[^"]*' | cut -d'"' -f4)
              
              if [ -z "${CLIENT_ID}" ] || [ -z "${CLIENT_SECRET}" ]; then
                echo "Failed to extract credentials from response"
                exit 1
              fi
              
              kubectl delete secret librechat-mcp-coder-credentials -n {{ .Release.Namespace }} 2>/dev/null || true
              kubectl create secret generic librechat-mcp-coder-credentials \
                -n {{ .Release.Namespace }} \
                --from-literal=client_id="${CLIENT_ID}" \
                --from-literal=client_secret="${CLIENT_SECRET}"
              
              echo "Successfully created Coder MCP credentials"
          env:
            - name: CODER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: coder-admin-secret
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
