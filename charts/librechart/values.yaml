# librechart orchestrator — emits one ApplicationSet that generates child
# Applications for each leaf chart. Pattern mirrors the ai-models split
# (ADR-0012); rationale specific to LibreChat in ADR-0014.
#
# Leaf charts carry their own values defaults (no per-app valuesObject
# overrides flow from here today). If env-specific overrides become a
# need, add a `helmValuesByChild` map and inline the override per element
# in the ApplicationSet template.

# ────────────────────────────────────────────────────────────────────────
# ArgoCD wiring for the generated child Applications.
# ────────────────────────────────────────────────────────────────────────
argocd:
  # Namespace the ApplicationSet (and the children it generates) live in.
  namespace: argocd
  # ArgoCD project the children belong to.
  project: ai
  # OCI chart-float (ADR-0055): children source the leaf charts from the OCI
  # registry on a floating semver range — full chart path in repoURL + chart "."
  # (the applicationset builds `<chartRegistry>/<chartName>`).
  chartRegistry: oci://ghcr.io/adorsys-gis/charts
  chartVersionRange: ">=0.0.0"
  destination:
    # The home-remote cluster every child Application targets. Repo
    # invariant (ADR-0017): workloads NEVER deploy to the cluster ArgoCD
    # runs in. The destination helper hard-fails the render if this
    # resolves to `in-cluster` / `https://kubernetes.default.svc` unless
    # `allowInCluster: true` is set.
    name: home-remote
    # Escape hatch — only set true if you genuinely want in-cluster.
    allowInCluster: false
    namespace: converse
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

# ────────────────────────────────────────────────────────────────────────
# Children. Order in the list doesn't matter to ArgoCD (sync-wave drives
# ordering), but keeping low-to-high here for readability.
# ────────────────────────────────────────────────────────────────────────
children:
  # chartName = the OCI chart name (was chartPath: charts/<name>). The
  # applicationset sources oci://<chartRegistry>/<chartName> @ range (ADR-0055).
  - name: librechat-search
    chartName: librechat-search
    syncWave: "-1"
    enabled: true

  - name: librechat-app
    chartName: librechat-app
    syncWave: "0"
    enabled: true

  - name: librechat-opencode-wellknown
    chartName: librechat-opencode-wellknown
    syncWave: "1"
    enabled: true
