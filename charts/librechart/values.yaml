global:
  librechat:
    version: "v0.8.4"
  rag_librechat:
    version: "v0.7.2"
  mongo:
    replicaCount: 2
    replicaSetName: rs0
  configmap:
    name: "librechat-config"

librechat:
  ingress:
    librechat:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: cert-home-cert-http
      className: traefik
      hosts:
        - host: ai.camer.digital
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: librechat
                port: http
      tls:
        - secretName: ai.camer.digital-tls
          hosts:
            - ai.camer.digital

  service:
    librechat:
      enabled: true
      annotations: { }
      type: ClusterIP
      controller: librechat
      ports:
        http:
          enabled: true
          port: 3080
          targetPort: 3080

    rag-api:
      enabled: false
      annotations: { }
      type: ClusterIP
      controller: rag-api
      ports:
        http:
          enabled: true
          port: 8000
          targetPort: 8000

  controllers:
    librechat:
      type: deployment
      strategy: RollingUpdate
      replicas: 2
      pod:
        labels:
          app: librechat-app
      containers:
        librechat:
          image:
            repository: ghcr.io/danny-avila/librechat
            tag: "{{ .Values.global.librechat.version }}"
            pullPolicy: Always
          env:
            PUID: "1000"
            PGID: "1000"
            TZ: "Europe/Berlin"

            ALLOW_EMAIL_LOGIN: "false"
            ALLOW_REGISTRATION: "false"
            ALLOW_SOCIAL_LOGIN: "true"
            ALLOW_SOCIAL_REGISTRATION: "true"
            REFRESH_TOKEN_EXPIRY: 5184000000 # "(1000 * 60 * 60 * 24) * 60 => 60 days"

            OPENID_ISSUER: "https://accounts.camer.digital/realms/camer-digital"
            OPENID_CALLBACK_URL: "/oauth/openid/callback"
            OPENID_SCOPE: "openid profile email librechat"
            #OPENID_REQUIRED_ROLE: "user" # Now we're in open beta; everyone can connect and test
            OPENID_REQUIRED_ROLE_TOKEN_KIND: "access"
            OPENID_REQUIRED_ROLE_PARAMETER_PATH: "librechat_roles"
            OPENID_AUTO_REDIRECT: "true"

            OPENAI_API_KEY: "user_provided"
            #OPENAI_MODELS: "gpt-3.5-turbo-0125,gpt-3.5-turbo-0301,gpt-3.5-turbo,gpt-4,gpt-4-0613,gpt-4-vision-preview,gpt-3.5-turbo-0613,gpt-3.5-turbo-16k-0613,gpt-4-0125-preview,gpt-4-turbo-preview,gpt-4-1106-preview,gpt-3.5-turbo-1106,gpt-3.5-turbo-instruct,gpt-3.5-turbo-instruct-0914,gpt-3.5-turbo-16k"

            #GOOGLE_KEY: "user_provided"
            #GOOGLE_MODELS: "gemini-3-pro-preview,gemini-3-pro-image-preview,gemini-3-flash-preview,gemini-2.5-flash,gemini-2.5-flash-lite,gemini-2.5-pro"

            #DEBUG_LOGGING: true
            #DEBUG_CONSOLE: true

            LOGIN_MAX: "50"
            LOGIN_WINDOW: "1"

            CD_MCP_CLIENT_ID:
              secretKeyRef:
                name: librechat-mcp-cd-credentials
                key: client_id
            CD_MCP_SECRET_ID:
              secretKeyRef:
                name: librechat-mcp-cd-credentials
                key: client_secret

            GITHUB_MCP_CLIENT_ID:
              secretKeyRef:
                name: librechat-mcp-github
                key: client_id
            GITHUB_MCP_SECRET_ID:
              secretKeyRef:
                name: librechat-mcp-github
                key: client_secret

            CODERS_MCP_CLIENT_ID:
              secretKeyRef:
                name: librechat-mcp-coder-credentials
                key: client_id
            CODERS_MCP_SECRET:
              secretKeyRef:
                name: librechat-mcp-coder-credentials
                key: client_secret

            OPENID_CLIENT_ID:
              secretKeyRef:
                name: librechat-openid-config
                key: client_id
            OPENID_CLIENT_SECRET:
              secretKeyRef:
                name: librechat-openid-config
                key: client_secret
            OPENID_SESSION_SECRET:
              secretKeyRef:
                name: librechat-openid-config
                key: session_secret

            # DEBUG_OPENID_REQUESTS: "true"

            # Optional: redirects the user to the end session endpoint after logging out
            OPENID_USE_END_SESSION_ENDPOINT: "true"

            #RAG_API_URL: "http://{{ .Release.Name }}-rag-api:8000"

            DOMAIN_CLIENT: &url "https://ai.camer.digital"
            DOMAIN_SERVER: *url
            NO_INDEX: "true"
            # TRUST_PROXY: "-1"

            USE_REDIS: "true"
            REDIS_KEY_PREFIX: "librechat-prod-v2"
            REDIS_URI: "redis://redis-master.redis-system.svc.cluster.local:6379"
            FORCED_IN_MEMORY_CACHE_NAMESPACES: "APP_CONFIG,CONFIG_STORE,STARTUP_CONFIG"

            SEARCH: true
            MEILI_HOST: "http://{{ .Release.Name }}-search:7700"
            MEILI_MASTER_KEY:
              secretKeyRef:
                name: librechat-meili-config
                key: MEILI_MASTER_KEY

            MONGO_URI: '{{ include "mongo_uri" $ }}'

            CREDS_KEY:
              secretKeyRef:
                name: librechat-config
                key: creds_key
            CREDS_IV:
              secretKeyRef:
                name: librechat-config
                key: creds_iv
            JWT_SECRET:
              secretKeyRef:
                name: librechat-config
                key: jwt_secret
            JWT_REFRESH_SECRET:
              secretKeyRef:
                name: librechat-config
                key: jwt_refresh_secret

            CONVERSE_OPENAI_API_KEY:
              secretKeyRef:
                name: librechat-main-config
                key: converse_openai_api_key

            # Web Search Configuration - Reference environment variables from secrets
            # Search Provider: Serper (you can also use SearXNG)
            SERPER_API_KEY:
              secretKeyRef:
                name: librechat-websearch-config
                key: serper_api_key

            # Scraper: Firecrawl
            FIRECRAWL_API_KEY:
              secretKeyRef:
                name: librechat-websearch-config
                key: firecrawl_api_key

            # Reranker: Jina (you can also use Cohere)
            JINA_API_KEY:
              secretKeyRef:
                name: librechat-websearch-config
                key: jina_api_key

            # Image Generation Configuration - Reference environment variables from secrets
            #  Image Generation
            IMAGE_GEN_OAI_API_KEY:
              secretKeyRef:
                name: librechat-main-config
                key: converse_openai_api_key

            # OpenAI-compatible Converse LLM API base URL
            IMAGE_GEN_OAI_BASEURL: https://api.ai.camer.digital/v1
            IMAGE_GEN_OAI_MODEL: gpt-image-1


            AWS_REGION:
              secretKeyRef:
                name: librechat-s3-config
                key: s3_region_name
            AWS_ACCESS_KEY_ID:
              secretKeyRef:
                name: librechat-s3-config
                key: s3_access_key_id
            AWS_SECRET_ACCESS_KEY:
              secretKeyRef:
                name: librechat-s3-config
                key: s3_secret_access_key
            AWS_BUCKET_NAME:
              secretKeyRef:
                name: librechat-s3-config
                key: s3_bucket_name
            AWS_ENDPOINT_URL: "https://s3.camer.digital"
            AWS_FORCE_PATH_STYLE: "true"

          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
          probes:
            liveness:
              enabled: true
              path: /health
              type: HTTP
              spec:
                httpGet:
                  port: http
            readiness:
              enabled: true
              path: /health
              type: HTTP
              spec:
                httpGet:
                  port: http
            startup:
              enabled: true
              path: /health
              type: HTTP
              spec:
                httpGet:
                  port: http
                failureThreshold: 30
                periodSeconds: 5

    rag-api:
      enabled: false
      type: statefulset
      strategy: RollingUpdate
      replicas: 1
      pod:
        labels:
          app: librechat-app
      containers:
        rag-api:
          image:
            repository: ghcr.io/danny-avila/librechat-rag-api-dev-lite
            tag: "{{ .Values.global.rag_librechat.version }}"
            pullPolicy: Always
          env:
            PUID: "1000"
            PGID: "1000"
            TZ: "Europe/Berlin"

            RAG_OPENAI_BASEURL: "https://services.api.ai.camer.digital/v1"
            RAG_OPENAI_API_KEY:
              secretKeyRef:
                name: librechat-main-config
                key: converse_openai_api_key

            EMBEDDINGS_MODEL: "text-embedding-3-small"
            EMBEDDING_BATCH_SIZE: 750

          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
          probes:
            liveness:
              enabled: true
              path: /
              type: HTTP
              spec:
                httpGet:
                  port: http
            readiness:
              enabled: true
              path: /
              type: HTTP
              spec:
                httpGet:
                  port: http
            startup:
              enabled: true
              path: /
              type: HTTP
              spec:
                httpGet:
                  port: http
                failureThreshold: 30
                periodSeconds: 5

  persistence:
    config:
      enabled: true
      type: configMap
      name: '{{ .Values.global.configmap.name }}'
      advancedMounts:
        librechat:
          librechat:
            - path: /app/librechat.yaml
              subPath: librechat
              readOnly: true

config:
  version: 1.3.5
  cache: true
  fileStrategy: "s3"
  interface:
    endpointsMenu: true
    modelSelect: true
    parameters: true
    presets: true
    agents:
      use: true
      create: true
      share: true
      public: true
    mcpServers:
      use: true
      create: true
      share: false
      public: false

  mcpSettings:
    allowedDomains:
      - "coder.coder.svc.cluster.local"
      - "coder.ai.camer.digital"
      - "ai.camer.digital"

  # Balance settings
  balance:
    enabled: false               # Enable token credit balances for users
    startBalance: 20000          # Initial tokens credited upon registration
    autoRefillEnabled: false     # Enable automatic token refills
    refillIntervalValue: 30      # Numerical value for refill interval
    refillIntervalUnit: "days"   # Time unit for refill interval (days, hours, etc.)
    refillAmount: 10000          # Tokens added during each refill

  # Web Search Configuration
  webSearch:
    # Search Provider Configuration - use environment variable references
    serperApiKey: "${SERPER_API_KEY}"
    # Alternative: SearXNG (uncomment if using)
    # searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
    # searxngApiKey: "${SEARXNG_API_KEY}"

    # Scraper Configuration
    firecrawlApiKey: "${FIRECRAWL_API_KEY}"
    # Optional: Custom Firecrawl instance
    # firecrawlApiUrl: "${FIRECRAWL_API_URL}"

    # Reranker Configuration - Jina (or use Cohere)
    jinaApiKey: "${JINA_API_KEY}"
    # Optional: Custom Jina instance
    # jinaApiUrl: "${JINA_API_URL}"
    # Alternative: Cohere
    # cohereApiKey: "${COHERE_API_KEY}"

    # General Settings
    safeSearch: 0  # Options: 0 (OFF), 1 (MODERATE - default), 2 (STRICT)

  mcpServers:
    github_issues:
      title: "GH Issues"
      type: "streamable-http"
      description: "Provides access to GitHub issues across all repositories the user has access to, with support for filtering by organization, repository, assignee, and more."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/issues"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai.camer.digital/api/mcp/github_issues/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    github_projects:
      title: "GH Project"
      type: "streamable-http"
      description: "Provides access to GitHub projects across all repositories the user has access to, with support for filtering by organization, repository, assignee, and more."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/projects"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai.camer.digital/api/mcp/github_projects/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    github_pull_requests:
      title: "GH PR"
      type: "streamable-http"
      description: "Provides access to GitHub pull requests across all repositories the user has access to, with support for filtering by organization, repository, assignee, and more."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/pull_requests"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai.camer.digital/api/mcp/github_pull_requests/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    github_repos:
      title: "GH Reps"
      type: "streamable-http"
      description: "Provides access to GitHub repositories across all repositories the user has access to, with support for filtering by organization, repository, assignee, and more."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/repos"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai.camer.digital/api/mcp/github_repos/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    github_github_support_docs_search:
      title: "GH Docs"
      type: "streamable-http"
      description: "Provides access to search across GitHub's support documentation, enabling users to find relevant articles and resources based on their queries."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/github_support_docs_search"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai.camer.digital/api/mcp/github_github_support_docs_search/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    lightbridge_self_service:
      title: "LightBridge API KEYs"
      description: "LightBridge Self Service API-KEYs"
      type: "streamable-http"
      initTimeout: 150000
      url: "https://mcp.ai.camer.digital/mcp"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/adorsys-icon-primary.jpg
      chatMenu: false
      serverInstructions: |
        Provides utilities to CRUD accounts, projects, and API keys.
        - API keys are used to interact with the backend at `https://api.ai.camer.digital/v1` 
        - Backend is OpenAI compatible
        - Api-keys belongs to projects, and projects belongs to Accounts.
        - Billing account is usually arbitrary and mostly used for humain billing.
        - Before creating an account, check if one exist. Same for projects.
        - Most users don't have multiple accounts. Most users have single project.
      oauth:
        authorization_url: https://accounts.camer.digital/realms/camer-digital/protocol/openid-connect/auth
        token_url: https://accounts.camer.digital/realms/camer-digital/protocol/openid-connect/token
        client_id: ${CD_MCP_CLIENT_ID}
        client_secret: ${CD_MCP_SECRET_ID}
        redirect_uri: https://ai.camer.digital/api/mcp/lightbridge_self_service/oauth/callback
        scope: "email openid offline_access"

    coder_mcp:
      title: "Coder"
      description: "Coder - Development environments in your cloud"
      type: "streamable-http"
      initTimeout: 150000
      url: "http://coder.coder.svc.cluster.local:8080/api/experimental/mcp/http"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/adorsys-icon-primary.jpg
      chatMenu: false
      requiresOAuth: true
      serverInstructions: |
        Provides development environment management capabilities.
      oauth:
        authorization_url: https://coder.ai.camer.digital/oauth2/authorize
        token_url: https://coder.ai.camer.digital/oauth2/tokens
        client_id: ${CODERS_MCP_CLIENT_ID}
        client_secret: ${CODERS_MCP_SECRET}
        redirect_uri: https://ai.camer.digital/api/mcp/coder_mcp/oauth/callback
        scope: "openid profile email offline_access"

  fileConfig:
    endpoints:
      assistants:
        fileLimit: 5
        fileSizeLimit: 10  # Maximum size for an individual file in MB
        totalSizeLimit: 50  # Maximum total size for all files in a single request in MB
        supportedMimeTypes:
          - "image/.*"
          - "application/pdf"
      openAI:
        disabled: false  # Disables file uploading to the OpenAI endpoint
      default:
        totalSizeLimit: 20
      YourCustomEndpointName:
        fileLimit: 2
        fileSizeLimit: 5
    serverFileSizeLimit: 100  # Global server file size limit in MB
    avatarSizeLimit: 2  # Limit for user avatar image size in MB
  rateLimits:
    fileUploads:
      ipMax: 100
      ipWindowInMinutes: 60  # Rate limit window for file uploads per IP
      userMax: 50
      userWindowInMinutes: 60  # Rate limit window for file uploads per user
    #registration:
    #socialLogins: [ "openid" ]
  endpoints:
    all:
      streamRate: 5
      titlePromptTemplate: |
        ### Task:
        Generate a concise, 3-5 word title with an emoji summarizing the chat history.
        
        ### Guidelines:
        - The title should clearly represent the main theme or subject of the conversation.
        - Always use emojis that enhance understanding of the topic, but avoid quotation marks or special formatting.
        - Write the title in the chat's primary language; default to English if multilingual.
        - Prioritize accuracy over excessive creativity; keep it clear and simple.
        - The title should be short and funny.
        - The emoji should come first.
        
        ### Output:
        Format "<emoji> your concise title here"
          ### Examples:
          - 📉 Stock Market Trends
          - 🍪 Perfect Chocolate Chip Recipe
          - 🎧 Evolution of Music Streaming
          - 👨🏿‍💻 Remote Work Productivity Tips
          - 🧠 Artificial Intelligence in Healthcare
          - 🎮 Video Game Development Insights
        
        ### Chat History:
        Human: {input}
        Assistant: {output}
    agents:
      recursionLimit: 50
      maxRecursionLimit: 100
      disableBuilder: false
      # (optional) Agent Capabilities available to all users. Omit the ones you wish to exclude. Defaults to list below.
      # capabilities: ["execute_code", "file_search", "actions", "tools", "artifacts", "ocr", "chain", "web_search"]
      # (optional) File citation configuration for file_search capability
      maxCitations: 20          # Maximum total citations in responses (1-50)
      maxCitationsPerFile: 7    # Maximum citations from each file (1-10)
      minRelevanceScore: 0.45   # Minimum relevance score threshold (0.0-1.0)
    assistants:
      disableBuilder: false # Disable Assistants Builder Interface by setting to `true`
      pollIntervalMs: 750  # Polling interval for checking assistant updates
      timeoutMs: 180000  # Timeout for assistant operations
      # Should only be one or the other, either `supportedIds` or `excludedIds`
      #supportedIds: [ "asst_supportedAssistantId1", "asst_supportedAssistantId2" ]
      #excludedIds: ["asst_excludedAssistantId"]
    custom:
      - name: "Converse"
        apiKey: "${CONVERSE_OPENAI_API_KEY}"
        baseURL: "https://services.api.ai.camer.digital/v1"
        models:
          default:
            # - "gpt-5-codex-mini"  # Disabled: GPT model not currently available
            # - "te3-small"  # Disabled: te3 model not currently available
            - "kimi-k2.5"
            - "gemini-3.1-pro"
            - "gemini-3-flash"
            - "cogito-671b-v2-p1"
            - "gemini-2-5-flash-lite"
            - "gemini-2.5-flash"
            - "kimi-k2-thinking"
            - "deepseek-v3p2"
            - "kimi-k2-instruct-0905"
            - "glm-5"
            - "qwen3-vl-30b-a3b-instruct"
            - "qwen3-vl-30b-a3b-thinking"
            - "minimax-m2p5"
            - "gemini-2.5-flash-lite"
            # - "gpt-5-nano"  # Disabled: GPT model not currently available
            - "qwen3-embedding-8b"
            - "gemini-2.5-flash-image"
            - "gemini-2.5-pro"
            # - "gpt-5-mini"  # Disabled: GPT model not currently available
            - "gemini-3.1-flash-lite"
            # - "gpt-5.3-codex"  # Disabled: GPT model not currently available
            - "gpt-image-1"
            - "qwen3-8b"
            - "qwen3-reranker-8b"
            # - "te3-large"  # Disabled: te3 model not currently available
          fetch: false
        iconURL: "https://s3.ssegning.me/ai-ops-backups/public/chicken-leg.png"
        titleConvo: false
        titleMethod: "completion"
        titleModel: "qwen3-vl-30b-a3b-instruct"
        summarize: true
        summaryModel: "qwen3-vl-30b-a3b-instruct"
        forcePrompt: true
        modelDisplayLabel: "Converse AI"
        headers:
          X-ACCOUNT-ID: 'LIBRECHAT'
          X-PROJECT-ID: 'sso:{{ `{{` }}LIBRECHAT_USER_OPENIDID{{ `}}` }}'
          X-User-ID: '{{ `{{` }}LIBRECHAT_USER_ID{{ `}}` }}'
          X-User-Email: '{{ `{{` }}LIBRECHAT_USER_EMAIL{{ `}}` }}'
          X-User-Role: '{{ `{{` }}LIBRECHAT_USER_ROLE{{ `}}` }}'
  modelSpecs:
    enforce: false
    prioritize: false
    list:
      - name: "moe-orchestrator"
        label: "MoE Orchestrator"
        group: "MoE Lab"
        groupIcon: "openAI"
        description: "Best entry point for the experimental MoE flow. It coordinates the specialist presets and returns one final answer."
        preset:
          endpoint: "Converse"
          model: "qwen3-vl-30b-a3b-instruct"
          temperature: 0.2
          promptPrefix: |
            You are the orchestrator in a Mixture-of-Experts workflow.
            Your job is to:
            1. clarify the task and constraints,
            2. decide which specialists should contribute,
            3. compare specialist outputs critically,
            4. resolve disagreements,
            5. produce one final, actionable answer.

            Output sections:
            - Task framing
            - Constraints
            - Specialist routing plan
            - Compared recommendations
            - Final answer
            - Risks and follow-up

      - name: "moe-strategy"
        label: "Strategy Expert"
        group: "MoE Specialists"
        groupIcon: "openAI"
        description: "Explores solution directions and trade-offs. Best when you want alternatives before implementation."
        preset:
          endpoint: "Converse"
          model: "kimi-k2-thinking"
          temperature: 0.6
          promptPrefix: |
            You are the Strategy expert.
            Produce 3 strong solution options.
            For each option include:
            - core idea
            - why it fits
            - trade-offs
            - implementation complexity

      - name: "moe-creative"
        label: "Creative Expert"
        group: "MoE Specialists"
        description: "Generates wider and less conventional approaches when you want more exploration."
        preset:
          endpoint: "Converse"
          model: "cogito-671b-v2-p1"
          temperature: 0.9
          promptPrefix: |
            You are the Creative expert.
            Generate diverse alternatives, including:
            - standard option
            - low-cost option
            - high-upside option
            - unconventional but plausible option
            - fallback option

      - name: "moe-analysis"
        label: "Analysis Expert"
        group: "MoE Specialists"
        description: "Critiques proposals for feasibility, risks, and hidden assumptions."
        preset:
          endpoint: "Converse"
          model: "deepseek-v3p2"
          temperature: 0.1
          promptPrefix: |
            You are the Analysis expert.
            Critically evaluate each proposal.
            Include:
            - hidden assumptions
            - failure modes
            - cost and scaling risks
            - maintainability concerns
            - recommendation

      - name: "moe-vision"
        label: "Vision Expert"
        group: "MoE Specialists"
        description: "Best for multimodal tasks, screenshots, PDFs, and UI critique."
        preset:
          endpoint: "Converse"
          model: "qwen3-vl-30b-a3b-thinking"
          temperature: 0.2
          promptPrefix: |
            You are the Vision expert.
            Focus on multimodal understanding.
            When images, screenshots, PDFs, or layouts are involved:
            - extract the important details
            - identify inconsistencies
            - explain findings clearly

      - name: "moe-fast"
        label: "Fast Expert"
        group: "MoE Specialists"
        description: "Low-latency helper for quick drafting, summaries, and lightweight classification."
        preset:
          endpoint: "Converse"
          model: "qwen3-8b"
          temperature: 0.2
          promptPrefix: |
            You are the Fast expert.
            Be concise, structured, and efficient.
            Prefer direct answers and compact summaries.

  modelSpecs:
    enforce: false
    prioritize: false
    list:
      - name: "moa-orchestrator"
        label: "MoA Orchestrator"
        #default: true
        group: "MoA"
        description: "Entry agent that coordinates specialists and produces the final plan."
        webSearch: true
        fileSearch: true
        #mcpServers: [ "sequential-thinking" ]
        preset:
          endpoint: "Converse"
          model: "glm-5"
          temperature: 0.2
          promptPrefix: |
            You are the entry agent in a Mixture-of-Agents workflow.
            Your job is to:
            1. gather constraints first,
            2. request ideation and brainstorming paths,
            3. send every serious path to rejection,
            4. send surviving paths to security review,
            5. require a TDD-first implementation plan for the chosen path,
            6. synthesize one final plan.

            Output sections:
            - Problem framing
            - Constraints discovered
            - Candidate paths
            - Rejected paths and why
            - Selected path
            - Security review
            - TDD plan
            - Milestones
            - Open risks

      - name: "moa-ideation"
        label: "Ideation"
        group: "MoA Specialists"
        description: "Generates a few strong strategic options."
        preset:
          endpoint: "Converse"
          model: "kimi-k2.5"
          temperature: 0.7
          promptPrefix: |
            You are the Ideation agent.
            Produce 3 to 5 strong solution directions.
            Prefer clarity over volume.
            For each direction include:
            - core idea
            - why it could work
            - assumptions
            - expected upside
            - likely implementation complexity

      - name: "moa-brainstorming"
        label: "Brainstorming"
        group: "MoA Specialists"
        description: "Expands the option space with variants and unconventional ideas."
        preset:
          endpoint: "Converse"
          model: "cogito-671b-v2-p1"
          temperature: 0.95
          promptPrefix: |
            You are the Brainstorming agent.
            Generate a broad set of candidate approaches and variations.
            Prefer diversity and novelty.
            Include:
            - standard option
            - low-cost option
            - high-upside option
            - weird but plausible option
            - fallback option

      - name: "moa-rejection"
        label: "Rejection"
        group: "MoA Specialists"
        description: "Finds worst-case scenarios and fatal flaws."
        preset:
          endpoint: "Converse"
          model: "glm-5"
          temperature: 0.1
          promptPrefix: |
            You are the Rejection agent.
            Your task is to reject weak paths.
            For each proposed path:
            - find worst-case scenario
            - identify hidden assumptions
            - identify cost, reliability, maintainability, and scaling risks
            - state kill criteria
            - state what mitigation would be required to save the idea

      - name: "moa-constraint-research"
        label: "Constraint Research"
        group: "MoA Specialists"
        description: "Researches technical and operational constraints."
        webSearch: true
        fileSearch: true
        preset:
          endpoint: "Converse"
          model: "kimi-k2.5"
          temperature: 0.2
          promptPrefix: |
            You are the Constraint Research agent.
            Identify constraints before architecture is chosen.
            Research:
            - technical limitations
            - dependency and vendor constraints
            - runtime and deployment constraints
            - cost and latency constraints
            - legal/compliance implications if relevant
            Output only verified or clearly labeled assumptions.

      - name: "moa-security"
        label: "Security"
        group: "MoA Specialists"
        description: "Threat-models every serious path."
        webSearch: true
        preset:
          endpoint: "Converse"
          model: "gemini-2.5-flash"
          temperature: 0.1
          promptPrefix: |
            You are the Security agent.
            Threat-model the proposed design.
            Review:
            - authn/authz
            - secrets handling
            - data flow and trust boundaries
            - prompt injection / tool abuse
            - dependency and supply-chain risks
            - multitenancy and isolation
            - logging and auditability
            Output:
            - threat list
            - risk severity
            - mandatory controls
            - residual risk

      - name: "moa-tdd"
        label: "TDD"
        group: "MoA Specialists"
        description: "Turns the selected path into a strict test-first plan."
        executeCode: true
        preset:
          endpoint: "Converse"
          model: "gemini-2.5-flash"
          temperature: 0.1
          promptPrefix: |
            You are the TDD agent.
            Your role is mandatory before implementation.
            Convert the selected design into a test-first execution plan.
            Produce:
            - acceptance criteria
            - failing tests to write first
            - unit/integration/e2e split
            - fixtures, mocks, and test data
            - definition of done
            - rollout validation checks
# MongoDB Parameters
db:
  enabled: false
  auth:
    enabled: false
  persistence:
    size: 30Gi
    storageClass: ~
  architecture: replicaset
  replicaSet:
    name: rs0
    members: 2

search:
  enabled: true
  persistence:
    enabled: true
    storageClass: ~
  auth:
    # Use an existing Kubernetes secret for the MEILI_MASTER_KEY
    existingMasterKeySecret: "librechat-meili-config"
  environment:
    MEILI_ENV: "production"
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
