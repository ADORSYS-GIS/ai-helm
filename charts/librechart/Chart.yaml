apiVersion: v2
name: librechart
description: |
  Orchestrator chart for the LibreChat stack. Renders ONE ArgoCD
  ApplicationSet that fans out to three leaf Applications:

    1. librechat-search             — Meilisearch (sync-wave -1)
    2. librechat-app                — LibreChat + MongoDB (sync-wave 0)
    3. librechat-opencode-wellknown — nginx serving opencode well-known JSON
                                       so `opencode auth login` resolves
                                       at https://ai.camer.digital/opencode
                                       (sync-wave 1)

  See ADR-0014 for the split rationale. The chart owns NO resources
  directly; it owns the ApplicationSet that owns everything.

  Audit fix: pre-split Chart.yaml carried `name: chat` while the
  directory is `librechart`; aligned to `name: librechart`.
type: application
version: 2.0.0
appVersion: "v0.8.5"
keywords:
  - llm
  - chat
  - librechat
  - applicationset
maintainers:
  - name: ai-helm

dependencies:
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
