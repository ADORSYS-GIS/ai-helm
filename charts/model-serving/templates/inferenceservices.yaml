apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ include "model-serving.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "model-serving.labels" . | nindent 4 }}
  annotations:
    # Deployment mode: Serverless delegates lifecycle to Knative;
    # RawDeployment creates a plain K8s Deployment instead.
    serving.kserve.io/deploymentMode: {{ .Values.inferenceService.deploymentMode | quote }}
    {{- if and (eq .Values.inferenceService.deploymentMode "Serverless") .Values.inferenceService.scaleDownDelay }}
    # Grace period before Knative scales a cold replica back to zero.
    autoscaling.knative.dev/scale-down-delay: {{ .Values.inferenceService.scaleDownDelay | quote }}
    {{- end }}
spec:
  predictor:
    minReplicas: {{ .Values.inferenceService.minReplicas }}
    maxReplicas: {{ .Values.inferenceService.maxReplicas }}

    {{- if .Values.inferenceService.timeout }}
    timeout: {{ .Values.inferenceService.timeout }}
    {{- end }}

    {{- if eq .Values.inferenceService.deploymentMode "Serverless" }}
    # Knative Pod Autoscaler target — one in-flight request per replica by default.
    scaleTarget: {{ .Values.inferenceService.scaleTarget | default 1 }}
    scaleMetric: {{ .Values.inferenceService.scaleMetric | default "concurrency" }}
    {{- end }}

    {{- with .Values.inferenceService.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}

    {{- with .Values.inferenceService.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}

    model:
      modelFormat:
        {{- toYaml .Values.model.format | nindent 8 }}

      # Resolved runtime name: either the explicit override from
      # inferenceService.runtime or the chart-managed ServingRuntime.
      runtime: {{ include "model-serving.inferenceRuntimeRef" . }}

      storageUri: {{ include "model-serving.resolvedStorageUri" . | trim | quote }}

      {{- if .Values.inferenceService.resources }}
      # Predictor-level resource overrides take precedence over the
      # ServingRuntime container defaults.
      resources:
        {{- toYaml .Values.inferenceService.resources | nindent 8 }}
      {{- end }}
