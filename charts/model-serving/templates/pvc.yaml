{{- /*
The weights volume. Pre-seeded once by the seed Job, then mounted by the
InferenceService via storageUri pvc:// — so pod starts never download.
RWO is safe here: the model pins to the single GPU node, and RWO = one node /
many pods (ReadWriteOncePod is the strict variant), so rolling Knative
revisions mount cleanly. Wave -1: before the seed Job. NOT pruned on its own
(it holds the weights) — guard deletions.
*/ -}}
{{- if .Values.pvc.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.pvc.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  accessModes:
    - {{ .Values.pvc.accessMode | default "ReadWriteOnce" }}
  {{- with .Values.pvc.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.pvc.size | default "25Gi" }}
{{- end }}
