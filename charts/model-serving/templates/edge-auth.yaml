{{- /*
Edge auth — a tiny Caddy reverse-proxy (plain pod) that IS the public entrypoint.

The model ksvc is cluster-local. This proxy:
  1. validates `Authorization: Bearer <vllm api key>` inline (KServe won't), 401 else;
  2. reverse-proxies over HTTPS to the cluster-local model (in-cluster HTTP is
     301'd by Traefik's redirect → https + skip-verify), preserving scale-from-zero.

It's a plain Deployment+Service (not a Knative Service — simpler, no
"Uninitialized" ksvc/DomainMapping failure mode), exposed by a Traefik
IngressRoute for the clean domain. The IngressRoute is ROUTING ONLY — no auth
middleware, the proxy does auth. Traefik accepts the proxy's normal ClusterIP
Service (the earlier "externalName services not allowed" was the Knative *model*
service, not this). cert-manager (cert-cloudflare DNS-01) issues the TLS. See ADR-0022.
*/ -}}
{{- if .Values.edgeAuth.enabled }}
{{- $ea := .Values.edgeAuth }}
{{- $name := include "model-serving.name" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  Caddyfile: |
    {
      admin off
      auto_https off
    }
    :8080 {
      @unauthorized not header Authorization "Bearer {env.MODEL_API_KEY}"
      respond @unauthorized 401

      reverse_proxy https://{{ $ea.internalHost }} {
        header_up Host {{ $ea.internalHost }}
        transport http {
          tls_insecure_skip_verify
          dial_timeout 10s
          response_header_timeout {{ $ea.proxy.responseTimeout | default "300s" }}
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ $ea.proxy.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}-proxy
  template:
    metadata:
      labels:
        app: {{ $name }}-proxy
        {{- include "common.labels.standard" . | nindent 8 }}
    spec:
      containers:
        - name: proxy
          image: {{ $ea.proxy.image | quote }}
          # caddy image default CMD runs /etc/caddy/Caddyfile (no args override).
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.secretName }}
                  key: {{ .Values.apiKey.dataKey }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy
          {{- with $ea.proxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ $name }}-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  selector:
    app: {{ $name }}-proxy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $ea.tls.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  secretName: {{ $ea.tls.secretName }}
  issuerRef:
    name: {{ $ea.tls.issuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ $ea.host }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $name }}-edge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  entryPoints:
    - {{ $ea.entryPoint | default "websecure" }}
  routes:
    - kind: Rule
      match: Host(`{{ $ea.host }}`)
      services:
        - name: {{ $name }}-proxy
          port: 8080
  tls:
    secretName: {{ $ea.tls.secretName }}
{{- end }}
