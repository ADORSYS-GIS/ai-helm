{{- /*
Edge auth — the model's public entrypoint (the ksvc is cluster-local).

A Traefik IngressRoute terminates the public domain and applies a forwardAuth
middleware that validates the gateway's `Authorization: Bearer <vllm api key>`
(KServe's huggingfaceserver won't enforce it), then proxies to the cluster-local
Knative service with the Host rewritten so Knative routing + scale-from-zero
still work. The forwardAuth target is a tiny stock Caddy that returns 200 iff
the bearer matches, else 401. See ADR-0022.
*/ -}}
{{- if .Values.edgeAuth.enabled }}
{{- $ea := .Values.edgeAuth }}
{{- $name := include "model-serving.name" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-authcheck
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  Caddyfile: |
    {
      admin off
      auto_https off
    }
    :8080 {
      @authorized header Authorization "Bearer {env.MODEL_API_KEY}"
      handle @authorized {
        respond 200
      }
      handle {
        respond 401
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-authcheck
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ $ea.authCheck.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}-authcheck
  template:
    metadata:
      labels:
        app: {{ $name }}-authcheck
        {{- include "common.labels.standard" . | nindent 8 }}
    spec:
      containers:
        - name: authcheck
          image: {{ $ea.authCheck.image | quote }}
          # No command/args override: the caddy image's default CMD is already
          # `caddy run --config /etc/caddy/Caddyfile --adapter caddyfile`. (The
          # image has no separate ENTRYPOINT, so setting args dropped the `caddy`
          # binary → exec "run": not found.)
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.secretName }}
                  key: {{ .Values.apiKey.dataKey }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy
          {{- with $ea.authCheck.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ $name }}-authcheck
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-authcheck
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  selector:
    app: {{ $name }}-authcheck
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $name }}-edge-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  forwardAuth:
    address: http://{{ $name }}-authcheck.{{ .Release.Namespace }}.svc.cluster.local:8080/
---
# Rewrite Host to the cluster-local Knative hostname so Knative's networking
# (route match + activator scale-from-zero) accepts the proxied request.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $name }}-edge-host
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      Host: {{ $ea.internalHost | quote }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $name }}-edge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  entryPoints:
    - {{ $ea.entryPoint | default "websecure" }}
  routes:
    - kind: Rule
      match: Host(`{{ $ea.host }}`)
      middlewares:
        - name: {{ $name }}-edge-auth
        - name: {{ $name }}-edge-host
      services:
        - name: {{ $ea.service }}
          port: {{ $ea.servicePort | default 80 }}
          passHostHeader: false
  tls:
    secretName: {{ $ea.tls.secretName }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $ea.tls.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  secretName: {{ $ea.tls.secretName }}
  issuerRef:
    name: {{ $ea.tls.issuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ $ea.host }}
{{- end }}
