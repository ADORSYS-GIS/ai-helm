{{- /*
Edge — the cert-manager Certificate + Traefik IngressRoute that expose the model
publicly. The WORKLOAD (the model + the Caddy auth-proxy sidecar) is a single
StatefulSet rendered by the bjw-template subchart (values under `modelServing:`);
this file only renders the two CRDs bjw doesn't do natively.

The IngressRoute forwards to the bjw Service (`edgeAuth.serviceName:servicePort` =
the Caddy sidecar on :8081). Routing only — no auth middleware; the sidecar
validates the Bearer (the model image ignores VLLM_API_KEY) and reverse-proxies
to the model over localhost in the same pod. cert-manager (cert-cloudflare DNS-01)
issues the TLS. See ADR-0029.

Manual prerequisite: a DNS record for `host` → the home cluster's public entry.
*/ -}}
{{- if .Values.edgeAuth.enabled }}
{{- $ea := .Values.edgeAuth }}
{{- $name := include "model-serving.name" . }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $ea.tls.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  secretName: {{ $ea.tls.secretName }}
  issuerRef:
    name: {{ $ea.tls.issuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ $ea.host }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $name }}-edge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  entryPoints:
    - {{ $ea.entryPoint | default "websecure" }}
  routes:
    - kind: Rule
      match: Host(`{{ $ea.host }}`)
      services:
        - name: {{ $ea.serviceName }}
          port: {{ $ea.servicePort }}
  tls:
    secretName: {{ $ea.tls.secretName }}
{{- end }}
