{{- /*
Edge auth — a tiny Caddy reverse-proxy that IS the public entrypoint.

The model ksvc is cluster-local. This proxy is a PUBLIC Knative Service (so it
gets Knative's working public domain + auto-TLS, no Traefik IngressRoute), which:
  1. validates `Authorization: Bearer <vllm api key>` inline (KServe won't), 401 else;
  2. reverse-proxies over HTTPS to the cluster-local model (in-cluster HTTP is
     301'd by Traefik's redirect, so we go https + skip-verify), preserving
     Knative scale-from-zero.
A DomainMapping gives it a clean stable domain. The Hetzner gateway points at
that domain and sends the Bearer (securityType: APIKey). See ADR-0022.
*/ -}}
{{- if .Values.edgeAuth.enabled }}
{{- $ea := .Values.edgeAuth }}
{{- $name := include "model-serving.name" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  Caddyfile: |
    {
      admin off
      auto_https off
    }
    :8080 {
      @unauthorized not header Authorization "Bearer {env.MODEL_API_KEY}"
      respond @unauthorized 401

      reverse_proxy https://{{ $ea.internalHost }} {
        header_up Host {{ $ea.internalHost }}
        transport http {
          tls_insecure_skip_verify
          dial_timeout 10s
          response_header_timeout {{ $ea.proxy.responseTimeout | default "300s" }}
        }
      }
    }
---
# The public, authenticated entrypoint — a tiny Caddy Knative Service.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: {{ $name }}-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: {{ $ea.proxy.minScale | default 1 | quote }}
        autoscaling.knative.dev/max-scale: {{ $ea.proxy.maxScale | default 2 | quote }}
    spec:
      containers:
        - image: {{ $ea.proxy.image | quote }}
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.secretName }}
                  key: {{ .Values.apiKey.dataKey }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy
          {{- with $ea.proxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ $name }}-proxy
{{- if $ea.domainMapping.enabled }}
---
# Clean stable domain → the proxy ksvc (Knative auto-TLS issues the cert).
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: {{ $ea.host }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  ref:
    name: {{ $name }}-proxy
    kind: Service
    apiVersion: serving.knative.dev/v1
{{- end }}
{{- end }}
