{{- /*
One-time weight download into the PVC, as an ArgoCD **Sync hook**.

Why a hook, not a plain resource: the Job controller stamps `controller-uid`
into spec.template.labels after creation, so an ArgoCD-tracked Job is perpetually
OutOfSync and ArgoCD tries to PATCH the (immutable) template →
"field is immutable (retried 5 times)" and the whole app sync fails. As a hook
with `BeforeHookCreation`, ArgoCD deletes the prior Job and recreates it (no
patch) and does NOT drift-track it. sync-wave 0 keeps ordering within the Sync
phase: PVC (-1, normal) → seed hook (0, ArgoCD waits for it to complete) →
InferenceService (1, normal). Idempotent: `hf download` skips files already
present, so each run resumes/re-verifies against the persistent PVC.
*/ -}}
{{- if and .Values.pvc.enabled .Values.seedJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-{{ include "model-serving.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: {{ .Values.seedJob.backoffLimit | default 6 }}
  # A stuck/rate-limited download dies and retries instead of hanging forever.
  activeDeadlineSeconds: {{ .Values.seedJob.activeDeadlineSeconds | default 3600 }}
  template:
    metadata:
      labels:
        {{- include "common.labels.standard" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.seedJob.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seed
          image: "{{ .Values.seedJob.image.repository }}:{{ .Values.seedJob.image.tag }}"
          imagePullPolicy: {{ .Values.seedJob.image.pullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              MODEL_DIR="/models/{{ .Values.model.storagePath }}"
              mkdir -p "$MODEL_DIR"
              echo "Seeding {{ .Values.model.hfRepo }} -> $MODEL_DIR (skips files already present)"
              # huggingface_hub 1.x: the CLI is `hf` (huggingface-cli is removed)
              # and the accelerator is Xet (hf_transfer is gone — the `[hf_transfer]`
              # extra doesn't exist and HF_HUB_ENABLE_HF_TRANSFER is a no-op now).
              # HF_XET_HIGH_PERFORMANCE enables Xet's fast path; HF_TOKEN (if set)
              # lifts the anonymous rate limit that otherwise throttles the pull.
              pip install --no-cache-dir -q --root-user-action=ignore "huggingface_hub[hf_xet]>=1.0"
              hf download {{ .Values.model.hfRepo }} --local-dir "$MODEL_DIR"
              echo "Seed complete."
          env:
            - name: HF_XET_HIGH_PERFORMANCE
              value: "1"
            {{- if .Values.seedJob.hfToken.enabled }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seedJob.hfToken.secretName }}
                  key: {{ .Values.seedJob.hfToken.dataKey }}
            {{- end }}
          volumeMounts:
            - name: models
              mountPath: /models
          {{- with .Values.seedJob.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.name }}
{{- end }}
