{{- /*
One-time weight download into the PVC (sync-wave 0). ArgoCD waits for it to
complete before the InferenceService (wave 1) syncs, so the model never starts
against an empty volume. Idempotent: huggingface-cli download skips files
already present, so a re-run just re-verifies. No ttlSecondsAfterFinished — a
TTL'd Job would vanish and ArgoCD would recreate (re-download) it; instead the
completed Job lingers and re-seeding is `kubectl delete job` + sync.
*/ -}}
{{- if and .Values.pvc.enabled .Values.seedJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-{{ include "model-serving.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: {{ .Values.seedJob.backoffLimit | default 6 }}
  # A stuck/rate-limited download dies and retries instead of hanging forever.
  activeDeadlineSeconds: {{ .Values.seedJob.activeDeadlineSeconds | default 3600 }}
  template:
    metadata:
      labels:
        {{- include "common.labels.standard" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.seedJob.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seed
          image: "{{ .Values.seedJob.image.repository }}:{{ .Values.seedJob.image.tag }}"
          imagePullPolicy: {{ .Values.seedJob.image.pullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              MODEL_DIR="/models/{{ .Values.model.storagePath }}"
              mkdir -p "$MODEL_DIR"
              echo "Seeding {{ .Values.model.hfRepo }} -> $MODEL_DIR (skips files already present)"
              # huggingface_hub 1.x: the CLI is `hf` (huggingface-cli is removed).
              # hf_transfer = the Rust accelerator (faster + resilient on the big
              # safetensors shards). HF_TOKEN (if set) lifts the anonymous
              # rate limit that otherwise stalls the download partway through.
              pip install --no-cache-dir -q --root-user-action=ignore "huggingface_hub[hf_transfer]>=1.0"
              hf download {{ .Values.model.hfRepo }} --local-dir "$MODEL_DIR"
              echo "Seed complete."
          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
            {{- if .Values.seedJob.hfToken.enabled }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seedJob.hfToken.secretName }}
                  key: {{ .Values.seedJob.hfToken.dataKey }}
            {{- end }}
          volumeMounts:
            - name: models
              mountPath: /models
          {{- with .Values.seedJob.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.name }}
{{- end }}
