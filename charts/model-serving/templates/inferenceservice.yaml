{{- /*
The KServe InferenceService (Knative Serverless). vLLM + in-pod LMCache on the
GPU, weights mounted from the pre-seeded PVC (storageUri pvc://). Knative +
net-gateway-api + cert-manager expose it at a public TLS FQDN
(<name>-<ns>--sls.ssegning.com); the Hetzner gateway reaches it as an ordinary
OpenAI backend (charts/ai-models, prefix /openai/v1). Wave 1: after the seed Job.
*/ -}}
{{- if .Values.inferenceService.enabled }}
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ include "model-serving.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  predictor:
    minReplicas: {{ .Values.inferenceService.minReplicas | default 1 }}
    maxReplicas: {{ .Values.inferenceService.maxReplicas | default 1 }}
    {{- with .Values.inferenceService.runtimeClassName }}
    runtimeClassName: {{ . }}
    {{- end }}
    {{- with .Values.inferenceService.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    model:
      modelFormat:
        name: {{ .Values.inferenceService.modelFormat }}
      {{- $runtime := .Values.inferenceService.runtime }}
      {{- if .Values.servingRuntime.enabled }}{{ $runtime = .Values.servingRuntime.name }}{{ end }}
      {{- with $runtime }}
      runtime: {{ . }}
      {{- end }}
      storageUri: {{ include "model-serving.storageUri" . | quote }}
      {{- with .Values.inferenceService.args }}
      args:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      env:
        {{- include "model-serving.modelEnv" . | nindent 8 }}
      {{- with .Values.inferenceService.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
