{{- /*
The KServe InferenceService (Knative Serverless). vLLM + in-pod LMCache on the
GPU, weights mounted from the pre-seeded PVC (storageUri pvc://). Knative +
net-gateway-api + cert-manager expose it at a public TLS FQDN
(<name>-<ns>--sls.ssegning.com); the Hetzner gateway reaches it as an ordinary
OpenAI backend (charts/ai-models, prefix /openai/v1). Wave 1: after the seed Job.
*/ -}}
{{- if .Values.inferenceService.enabled }}
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ include "model-serving.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.inferenceService.clusterLocal }}
    {{- /* Make the Knative service cluster-local: Knative stops publishing the
           open public FQDN (KServe's huggingfaceserver ignores VLLM_API_KEY, so a
           public route = an UNAUTHENTICATED GPU on the internet). The public,
           AUTHENTICATED entrypoint is a Traefik HTTPRoute + forwardAuth in
           home-os; the Hetzner gateway reaches the model through that. ADR-0022. */}}
    networking.knative.dev/visibility: cluster-local
    {{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    {{- range $k, $v := .Values.inferenceService.knativeAnnotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  predictor:
    {{- /* NOT `| default 1`: that turns minReplicas:0 into 1 (0 is "empty" in
           Go templates), which would keep the revision warm and never free the
           single GPU. values.yaml always sets these, so reference them directly. */}}
    minReplicas: {{ .Values.inferenceService.minReplicas }}
    maxReplicas: {{ .Values.inferenceService.maxReplicas }}
    {{- with .Values.inferenceService.runtimeClassName }}
    runtimeClassName: {{ . }}
    {{- end }}
    {{- with .Values.inferenceService.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    model:
      modelFormat:
        name: {{ .Values.inferenceService.modelFormat }}
      {{- $runtime := .Values.inferenceService.runtime }}
      {{- if .Values.servingRuntime.enabled }}{{ $runtime = .Values.servingRuntime.name }}{{ end }}
      {{- with $runtime }}
      runtime: {{ . }}
      {{- end }}
      storageUri: {{ include "model-serving.storageUri" . | quote }}
      {{- with .Values.inferenceService.args }}
      args:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      env:
        {{- include "model-serving.modelEnv" . | nindent 8 }}
      {{- with .Values.inferenceService.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.inferenceService.probes }}
      {{- with .startup }}
      startupProbe:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .readiness }}
      readinessProbe:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .liveness }}
      livenessProbe:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
{{- end }}
