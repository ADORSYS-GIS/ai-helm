{{- /*
Model server — a PLAIN Deployment (NOT a KServe InferenceService / Knative;
ADR-0029). Runs the stock kserve/huggingfaceserver image (vLLM + in-pod LMCache)
ALWAYS-ON on the single dedicated GPU, weights mounted read-only from the
pre-seeded PVC (subPath). `strategy: Recreate` so the old pod releases the GPU
before the new one starts (only ONE Qwen3-4B fits in the 12Gi A2000 — a rolling
update would deadlock). A plain ClusterIP Service makes the model cluster-local
by construction; the public, authenticated entrypoint is the Caddy edge-proxy
(edge-auth.yaml). Wave 1: after the seed Job (wave 0).
*/ -}}
{{- if .Values.server.enabled }}
{{- $name := include "model-serving.name" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: {{ .Values.server.replicas | default 1 }}
  strategy:
    # Single GPU ⇒ the old pod MUST release VRAM before the new one starts.
    type: Recreate
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        {{- include "common.labels.standard" . | nindent 8 }}
      annotations:
        prometheus.kserve.io/port: "8080"
        prometheus.kserve.io/path: "/metrics"
    spec:
      {{- with .Values.server.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kserve-container
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy | default "IfNotPresent" }}
          {{- with .Values.server.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "model-serving.modelEnv" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.probes }}
          {{- with .startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          volumeMounts:
            - name: model-store
              mountPath: {{ .Values.server.modelDir }}
              subPath: {{ .Values.model.storagePath }}
              readOnly: true
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
{{- end }}
