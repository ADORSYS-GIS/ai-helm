{{- if .Values.servingRuntime.enabled }}
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: {{ include "model-serving.runtimeName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "model-serving.labels" . | nindent 4 }}
spec:
  multiModel: false
  disabled: false

  protocolVersions:
    {{- toYaml .Values.servingRuntime.protocolVersions | nindent 4 }}

  supportedModelFormats:
    {{- toYaml .Values.servingRuntime.supportedModelFormats | nindent 4 }}

  {{- with .Values.servingRuntime.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- with .Values.servingRuntime.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  containers:
    - name: kserve-container
      image: "{{ .Values.servingRuntime.image.repository }}:{{ .Values.servingRuntime.image.tag }}"
      imagePullPolicy: {{ .Values.servingRuntime.image.pullPolicy }}

      ports:
        - name: http1
          containerPort: {{ .Values.servingRuntime.port }}
          protocol: TCP

      resources:
        {{- toYaml .Values.servingRuntime.resources | nindent 8 }}

      env:
        - name: HF_HOME
          value: {{ .Values.servingRuntime.hfHome | default "/hf-cache" | quote }}
        {{- if .Values.model.huggingFaceToken.secretName }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.model.huggingFaceToken.secretName }}
              key: {{ .Values.model.huggingFaceToken.secretKey | default "token" }}
        {{- end }}
        {{- range $key, $val := .Values.servingRuntime.env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end }}

      startupProbe:
        httpGet:
          path: /health
          port: {{ .Values.servingRuntime.port }}
        initialDelaySeconds: {{ .Values.servingRuntime.probes.startup.initialDelaySeconds }}
        periodSeconds: {{ .Values.servingRuntime.probes.startup.periodSeconds }}
        timeoutSeconds: {{ .Values.servingRuntime.probes.startup.timeoutSeconds }}
        failureThreshold: {{ .Values.servingRuntime.probes.startup.failureThreshold }}

      readinessProbe:
        httpGet:
          path: /health
          port: {{ .Values.servingRuntime.port }}
        initialDelaySeconds: {{ .Values.servingRuntime.probes.readiness.initialDelaySeconds }}
        periodSeconds: {{ .Values.servingRuntime.probes.readiness.periodSeconds }}
        timeoutSeconds: {{ .Values.servingRuntime.probes.readiness.timeoutSeconds }}

      livenessProbe:
        httpGet:
          path: /health
          port: {{ .Values.servingRuntime.port }}
        initialDelaySeconds: {{ .Values.servingRuntime.probes.liveness.initialDelaySeconds }}
        periodSeconds: {{ .Values.servingRuntime.probes.liveness.periodSeconds }}
        timeoutSeconds: {{ .Values.servingRuntime.probes.liveness.timeoutSeconds }}
{{- end }}
