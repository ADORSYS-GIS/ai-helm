global:
  nameOverride: ""
  fullnameOverride: ""

model:
  name: "phi-2"
  storageUri: "hf://microsoft/phi-2"
  format:
    name: huggingface
  args:
    - --device=cpu
    - --dtype=float32
    - --host=0.0.0.0
    - --max-model-len=2048
    - --port=8080
  volumeMounts: []
  huggingFaceToken:
    secretName: ""
    secretKey: "token"

  storage:
    pvc:
      enabled: true
      nameOverride: ""
      accessModes:
        - ReadWriteOnce
      size: "10Gi"
      storageClassName: ""
      subPath: ""
      mountPath: "/mnt/models"

    downloader:
      enabled: false
      image:
        repository: kserve/storage-initializer
        tag: v0.14.1
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: "1"
          memory: "4Gi"
        limits:
          cpu: "2"
          memory: "8Gi"
      backoffLimit: 3
      activeDeadlineSeconds: 7200

chatTemplate:
  enabled: true
  configMapName: "phi2-chat-template"

servingRuntime:
  enabled: true
  nameOverride: ""
  image:
    repository: substratusai/vllm
    tag: main-cpu
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    limits:
      cpu: "4"
      memory: "16Gi"
    requests:
      cpu: "2"
      memory: "8Gi"
  hfHome: "/hf-cache"
  protocolVersions:
    - v1
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: true
      priority: 1
  env:
    HF_HUB_DOWNLOAD_TIMEOUT: "600"
    VLLM_CPU_KVCACHE_SPACE: "4"
  probes:
    startup:
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 60
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
    liveness:
      initialDelaySeconds: 300
      periodSeconds: 30
      timeoutSeconds: 5
  nodeSelector: {}
  tolerations: []

inferenceService:
  deploymentMode: Serverless
  maxReplicas: 3
  scaleMetric: concurrency
  scaleTarget: 10
  scaleDownDelay: "0s"
  timeout: 300
  runtime: ""
  runtimeClassName: "nvidia"
  annotations: {}
  volumes: []

adapters:
  metrics:
    enabled: false
    serviceMonitor:
      labels: {}
      portName: "http-userport"
      path: /metrics
      interval: "30s"
      scrapeTimeout: "10s"

# bjw-s app-template: extension point for supplementary workloads.
# https://bjw-s-labs.github.io/helm-charts/docs/app-template/
serving:
  enabled: true
  global:
    createDefaultServiceAccount: false
  configMaps:
    phi2-chat-template:
      enabled: true
      forceRename: phi2-chat-template
      data:
        chat_template.jinja: |
          {% for message in messages %}
          {% if message['role'] == 'user' %}
          User: {{ "{{" }} message['content'] {{ "}}" }}
          {% elif message['role'] == 'assistant' %}
          Assistant: {{ "{{" }} message['content'] {{ "}}" }}
          {% elif message['role'] == 'system' %}
          System: {{ "{{" }} message['content'] {{ "}}" }}
          {% endif %}
          {% endfor %}
          {% if add_generation_prompt %}
          Assistant:
          {% endif %}
