# charts/model-serving — self-hosted Qwen3-4B on the home GPU.
# See ADR-0022 (federation) + ADR-0028 (pricing) + ADR-0029 (serving mode) +
# ADR-0030 (one StatefulSet via bjw-template) + docs/self-hosted-model-serving.md.
#
# Shape: a hybrid bjw-template chart (like charts/librechat-app).
#   - The bjw-template subchart (values under `modelServing:`) renders the WHOLE
#     workload: the model StatefulSet (model + Caddy proxy sidecar), the seed
#     Job (a bjw `job` controller, ArgoCD Sync hook), the Service, and the
#     Ingress.
#   - The chart's own templates/ render only the resources bjw doesn't do
#     natively: the weights PVC, the ExternalSecrets, and the Caddyfile ConfigMap.
#
# Sync-wave ordering (this Application's resources, on the HOME cluster):
#   -2  ExternalSecret (vllm-local-api-key + hf-token)  — before any pod
#   -1  PVC (qwen3-4b-models, RWX)                        — weights volume
#    0  seed Job (download-once into the PVC)             — ArgoCD Sync hook
#    1  StatefulSet (model + proxy) + Service + Ingress   — mounts the PVC

global:
  # Used by the chart's OWN templates' labels (common.labels.standard).
  labels:
    app: model-serving
    team: adorsys-gis

model:
  # Logical model name — the served model id + the StatefulSet/Service name.
  name: qwen3-4b
  # HuggingFace repo (Qwen3-4B is Apache-2.0 → no token needed for access).
  hfRepo: Qwen/Qwen3-4B
  # Sub-path inside the PVC where weights are seeded and mounted from.
  storagePath: Qwen3-4B

# ─────────────────────────────────────────────────────────────────────────────
# Weights volume (own templates/pvc.yaml). RWX so the seed Job + the model STS
# can mount it concurrently.
pvc:
  enabled: true
  name: qwen3-4b-models
  storageClassName: longhorn
  accessMode: ReadWriteMany        # RWX — Longhorn supports it (was RWO)
  size: 25Gi                       # ~8GB BF16 + headroom for a future AWQ variant

# Seed Job — the bulk of its config now lives in the bjw `seed` controller
# below. These top-level values only drive the chart's own templates: the
# `enabled` gate + the optional HF-token ExternalSecret (templates/
# externalsecret-hf-token.yaml). The HF token lifts the anonymous HF Hub rate
# limit on the ~8GB pull.
seedJob:
  enabled: true
  hfToken:
    enabled: true
    secretName: hf-token
    dataKey: token
    externalSecret:
      enabled: true
      secretStore: ssegning-aws
      refreshInterval: 1h
      key: ai/camer/digital/prod/env
      property: hf_token

# ─────────────────────────────────────────────────────────────────────────────
# The vLLM API key Secret (own templates/externalsecret.yaml). NOTE: the
# huggingfaceserver image IGNORES VLLM_API_KEY (serves OpenAI itself), so it does
# NOT gate the model — the Caddy sidecar does, validating this same key. By-name
# from ssegning-aws; never embedded.
apiKey:
  enabled: true
  secretName: vllm-local-api-key
  dataKey: api_key
  externalSecret:
    enabled: true
    secretStore: ssegning-aws
    refreshInterval: 1h
    key: ai/camer/digital/prod/env
    property: vllm_local_api_key

# Caddy sidecar config (own templates/configmap-caddy.yaml). Only the upstream
# timeout is tunable; the public host/TLS now live in `modelServing.ingress`.
edgeAuth:
  enabled: true
  # Caddy upstream timeout — must exceed a deploy-time restart (STS reloads
  # multi-GB weights) + a long generation. Keep ≥ the ai-models qwen3-4b-local
  # timeout.requestTimeout (both 600s). Path: Envoy → Ingress → Caddy → model.
  proxyResponseTimeout: 600s

# ═════════════════════════════════════════════════════════════════════════════
# bjw-template subchart (alias `modelServing`) — the whole workload.
# ═════════════════════════════════════════════════════════════════════════════
modelServing:
  global:
    # Pin resource names (StatefulSet/Service/Ingress = qwen3-4b).
    fullnameOverride: qwen3-4b

  # GPU pinning for the pods. No nvidia.com/gpu resource — the PoC node has no
  # device plugin; runtimeClassName + nodeSelector are how a pod gets the GPU.
  # (The seed Job inherits these too; harmless — it just doesn't use the GPU.)
  defaultPodOptions:
    runtimeClassName: nvidia
    nodeSelector:
      gpu-node: "true"

  controllers:
    # ── The model server (StatefulSet) — model + Caddy proxy sidecar ──────────
    main:
      type: statefulset
      replicas: 1                            # always-on, single instance (one GPU)
      annotations:
        argocd.argoproj.io/sync-wave: "1"
      containers:
        # 1) the model server (vLLM + in-pod LMCache)
        model:
          image:
            repository: kserve/huggingfaceserver
            tag: v0.18.0-gpu                 # vLLM 0.19.0 + aligned LMCache (see ADR-0022)
            pullPolicy: IfNotPresent
          args:
            - --model_name=qwen3-4b
            - --model_dir=/mnt/models        # the PVC mount (replaces KServe storageUri)
            - --backend=vllm
            - --dtype=float16                # Ampere: no hardware FP8
            - --max-model-len=16384
            - --max-num-seqs=4
            - --gpu-memory-utilization=0.90
            - --swap-space=1
            - --enforce-eager
            - --enable-auto-tool-choice      # agentic tool calling (Qwen3 → hermes)
            - --tool-call-parser=hermes
            - '--kv-transfer-config={"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
            # NO --kv-cache-dtype=fp8 (Ampere/dlpack BufferError every prefill).
            # NOT --reasoning-parser qwen3 (conflicts w/ hermes; vllm#19513/#19051).
          env:
            LMCACHE_USE_EXPERIMENTAL: "True"
            LMCACHE_LOCAL_CPU: "True"
            LMCACHE_MAX_LOCAL_CPU_SIZE: "1"  # GB host RAM for offloaded KV
            VLLM_API_KEY:                    # ignored by the image; kept for a future vLLM-native server
              secretKeyRef:
                name: vllm-local-api-key
                key: api_key
          ports:
            - name: http
              containerPort: 8080            # huggingfaceserver REST port
          # ── Probes for a SLOW-LOADING model server ──────────────────────────
          # `custom: true` so bjw uses our spec verbatim (without it bjw derives
          # the probe from the SERVICE port 8081 = the proxy, not the model).
          #
          # ⚠️ Do NOT use tcpSocket here. KServe's huggingfaceserver binds :8080
          # EARLY (the HTTP server comes up before the multi-GB weights finish
          # loading), so a tcpSocket probe passes within seconds → the
          # startupProbe stops gating almost immediately → readiness/liveness run
          # against a still-loading model → the pod gets killed/SIGTERM'd mid-load
          # and loops. Instead probe the model-readiness HTTP endpoint, which only
          # returns 200 once the model is actually loaded (KServe Open-Inference
          # `/v2/health/ready`; this is the endpoint KServe's own probes use).
          #
          #   startup   = the GATE. httpGet /v2/health/ready, with a budget that
          #               covers the worst-case weight load (failureThreshold ×
          #               periodSeconds = 120 × 15s = 30 min). Until it passes,
          #               readiness + liveness are disabled, so nothing kills the
          #               pod while it loads. "Started" now means "loaded".
          #   readiness = same endpoint → the Service only routes once truly ready
          #               (the pod is Ready only when BOTH containers are; the
          #               always-up proxy can't make it Ready early).
          #   liveness  = tcpSocket :8080 — kernel-level, so it does NOT false-fail
          #               when the loaded model is busy generating (an httpGet
          #               liveness would restart a healthy-but-busy server). Gated
          #               by startup, it never runs during the load.
          #
          # ⚠️ Confirm /v2/health/ready against the running image on first deploy.
          # If it 404s / returns 200-while-loading, switch startup+readiness to
          # `/v2/models/qwen3-4b/ready` (model-scoped) or vLLM's `/health`.
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                httpGet: { path: /v2/health/ready, port: 8080 }
                periodSeconds: 15
                failureThreshold: 120         # ~30 min worst-case weight load
                timeoutSeconds: 5
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet: { path: /v2/health/ready, port: 8080 }
                periodSeconds: 15
                timeoutSeconds: 10
                failureThreshold: 3
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket: { port: 8080 }
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              # nvidia.com/gpu: "1"   # PoC node has no device-plugin for this
              cpu: "3"
              memory: 6Gi

        # 2) the Caddy auth-proxy sidecar — validates the Bearer the model image
        # ignores, then reverse-proxies to the model over localhost:8080.
        proxy:
          image:
            repository: caddy
            tag: 2-alpine
            pullPolicy: IfNotPresent
          env:
            MODEL_API_KEY:
              secretKeyRef:
                name: vllm-local-api-key
                key: api_key
          ports:
            - name: edge
              containerPort: 8081
          probes:
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket: { port: 8081 }
                periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }

    # ── The weight seed Job (bjw `job` controller, ArgoCD Sync hook) ──────────
    # A Job (not a tracked resource) via the hook annotations: a plain tracked
    # Job goes perpetually OutOfSync (the controller stamps controller-uid into
    # the immutable template); BeforeHookCreation makes ArgoCD delete+recreate.
    seed:
      type: job
      annotations:
        argocd.argoproj.io/hook: Sync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
        argocd.argoproj.io/sync-wave: "0"
      pod:
        restartPolicy: OnFailure             # a Job must NOT be Always (bjw's default)
      job:
        backoffLimit: 6
        activeDeadlineSeconds: 3600           # a stuck download dies + retries
      containers:
        seed:
          image:
            repository: python
            tag: "3.12-slim"
            pullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          # NOTE: repo + sub-path are hardcoded (this runs in the bjw subchart
          # scope, which can't read the parent's .Values.model.*). Keep in sync
          # with model.hfRepo / model.storagePath above.
          args:
            - |
              MODEL_DIR="/models/Qwen3-4B"
              mkdir -p "$MODEL_DIR"
              echo "Seeding Qwen/Qwen3-4B -> $MODEL_DIR (skips files already present)"
              # huggingface_hub 1.x: CLI is `hf`; accelerator is Xet ([hf_xet]).
              # Do NOT set HF_XET_HIGH_PERFORMANCE — its parallel chunk buffering
              # OOM-killed the seed at 2Gi (exit 137). HF_TOKEN lifts the rate limit.
              pip install --no-cache-dir -q --root-user-action=ignore "huggingface_hub[hf_xet]>=1.0"
              hf download Qwen/Qwen3-4B --local-dir "$MODEL_DIR"
              echo "Seed complete."
          env:
            HF_TOKEN:
              secretKeyRef:
                name: hf-token
                key: token
          resources:
            requests: { cpu: "1", memory: 1Gi }
            limits:   { cpu: "2", memory: 4Gi }   # ≤4Gi: 2Gi OOM-killed the pull

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        edge:
          port: 8081
          targetPort: 8081          # → the Caddy sidecar

  # Public entrypoint — a plain k8s Ingress (className traefik), no Traefik
  # IngressRoute CRD / DomainMapping. cert-manager's ingress-shim issues the TLS
  # cert from the `cert-cloudflare` ClusterIssuer (DNS-01) into the tls secret.
  # ⚠️ the host MUST match charts/ai-models vllmLocal.hostname; ensure a DNS
  # record → the home cluster.
  ingress:
    main:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: cert-cloudflare
      hosts:
        - host: qwen3-4b--poc.ssegning.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: edge
      tls:
        - secretName: qwen3-model-edge-tls
          hosts:
            - qwen3-4b--poc.ssegning.com

  persistence:
    # The pre-seeded RWX weights PVC (own templates/pvc.yaml), mounted into BOTH
    # the seed Job (rw, full volume at /models) and the model container (ro,
    # subPath at /mnt/models). RWX makes the concurrent mount safe.
    model-store:
      enabled: true
      existingClaim: qwen3-4b-models
      advancedMounts:
        main:
          model:
            - path: /mnt/models
              subPath: Qwen3-4B
              readOnly: true
        seed:
          seed:
            - path: /models
    # The Caddyfile ConfigMap (own templates/configmap-caddy.yaml) → the proxy.
    caddyfile:
      enabled: true
      type: configMap
      name: qwen3-4b-caddy
      advancedMounts:
        main:
          proxy:
            - path: /etc/caddy
