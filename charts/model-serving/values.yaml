global:
  nameOverride: ""
  fullnameOverride: ""

model:
  name: "phi-2"
  storageUri: "hf://microsoft/phi-2"
  format:
    name: vllm
  huggingFaceToken:
    secretName: ""
    secretKey: "token"

  storage:
    pvc:
      enabled: true
      nameOverride: ""
      accessModes:
        - ReadWriteOnce
      size: "10Gi"
      storageClassName: ""
      subPath: ""

    downloader:
      enabled: false
      image:
        repository: kserve/storage-initializer
        tag: v0.14.1
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: "1"
          memory: "4Gi"
        limits:
          cpu: "2"
          memory: "8Gi"
      backoffLimit: 3
      activeDeadlineSeconds: 7200

servingRuntime:
  enabled: true
  nameOverride: ""
  image:
    repository: substratusai/vllm
    tag: main-cpu
    pullPolicy: IfNotPresent
  port: 8080
  args:
    - --tensor-parallel-size=1
    - --dtype=float32
    - --max-model-len=2048
    - --device=cpu
  env:
    HF_HUB_DOWNLOAD_TIMEOUT: "600"
    VLLM_CPU_KVCACHE_SPACE: "4"
  resources:
    limits:
      cpu: "8"
      memory: "16Gi"
    requests:
      cpu: "4"
      memory: "8Gi"
  probes:
    liveness:
      initialDelaySeconds: 90
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

inferenceService:
  deploymentMode: Serverless
  minReplicas: 1
  maxReplicas: 3
  scaleMetric: concurrency
  scaleTarget: 1
  scaleDownDelay: "0s"
  timeout: 300
  runtime: ""
  resources: {}
  nodeSelector: {}
  tolerations: []

adapters:
  metrics:
    enabled: false
    serviceMonitor:
      labels: {}
      portName: "http-userport"
      path: /metrics
      interval: "30s"
      scrapeTimeout: "10s"

# bjw-s app-template: extension point for supplementary workloads.
# https://bjw-s-labs.github.io/helm-charts/docs/app-template/
serving:
  enabled: false
