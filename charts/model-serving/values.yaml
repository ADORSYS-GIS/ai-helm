# charts/model-serving — self-hosted Qwen3-4B on the home GPU.
# See ADR-0022 (federation) + ADR-0028 (pricing) + ADR-0029 (serving mode:
# plain workload, not KServe/Knative) + docs/self-hosted-model-serving.md.
#
# Shape: a hybrid bjw-template chart (like charts/librechat-app).
#   - The WORKLOAD is a single StatefulSet rendered by the `bjw-template`
#     subchart (values under `modelServing:`): TWO containers in ONE pod — the
#     model server + the Caddy auth-proxy sidecar (proxy → model over localhost).
#   - The chart's own templates/ render the resources bjw doesn't do natively:
#     the weights PVC, the ExternalSecrets, the seed Job (an ArgoCD hook), and
#     the edge Certificate + Traefik IngressRoute.
#
# Sync-wave ordering (this Application's resources, on the HOME cluster):
#   -2  ExternalSecret (vllm-local-api-key)   — key must exist before the pod
#   -1  PVC (qwen3-4b-models)                  — weights volume
#    0  seed Job (download-once into the PVC)  — ArgoCD waits for it to complete
#    1  StatefulSet (model + proxy) + Service  — mounts the PVC, never downloads

global:
  # Used by the chart's OWN templates' labels (common.labels.standard).
  labels:
    app: model-serving
    team: adorsys-gis

model:
  # Logical model name — the served model id + the StatefulSet/Service name.
  name: qwen3-4b
  # HuggingFace repo the seed Job downloads (Qwen3-4B is Apache-2.0 → no token).
  hfRepo: Qwen/Qwen3-4B
  # Sub-path inside the PVC where weights are seeded and mounted from.
  storagePath: Qwen3-4B

# ─────────────────────────────────────────────────────────────────────────────
# Weights volume — pre-seeded once (own templates/pvc.yaml), then mounted
# read-only by the model container. NOT hf:// at runtime.
pvc:
  enabled: true
  name: qwen3-4b-models
  storageClassName: longhorn
  accessMode: ReadWriteOnce        # safe: the STS pins to the single GPU node
  size: 25Gi                       # ~8GB BF16 + headroom for a future AWQ variant

# One-time download Job (own templates/seed-job.yaml), an ArgoCD Sync hook
# (sync-wave 0). Idempotent: `hf download` resumes/skips files already on the PVC.
seedJob:
  enabled: true
  image:
    repository: python
    tag: "3.12-slim"
    pullPolicy: IfNotPresent
  nodeSelector:
    gpu-node: "true"
  backoffLimit: 6
  activeDeadlineSeconds: 3600
  # Optional HF token (lifts the anonymous rate limit on the ~8GB pull). The
  # ExternalSecret syncs property `hf_token` (ssegning-aws ai/camer/digital/prod/env)
  # into the `hf-token` Secret; the seed Job consumes it as HF_TOKEN.
  hfToken:
    enabled: true
    secretName: hf-token
    dataKey: token
    externalSecret:
      enabled: true
      secretStore: ssegning-aws
      refreshInterval: 1h
      key: ai/camer/digital/prod/env
      property: hf_token
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi              # ≤4Gi: 2Gi OOM-killed the pull (exit 137)

# ─────────────────────────────────────────────────────────────────────────────
# The vLLM API key Secret (own templates/externalsecret.yaml). NOTE: the
# huggingfaceserver image IGNORES VLLM_API_KEY (serves OpenAI itself), so it does
# NOT gate the model — the Caddy sidecar does, validating this same key. By-name
# from ssegning-aws; never embedded.
apiKey:
  enabled: true
  secretName: vllm-local-api-key
  dataKey: api_key
  externalSecret:
    enabled: true
    secretStore: ssegning-aws
    refreshInterval: 1h
    key: ai/camer/digital/prod/env
    property: vllm_local_api_key

# ─────────────────────────────────────────────────────────────────────────────
# Edge (own templates/edge-auth.yaml): the cert-manager Certificate + Traefik
# IngressRoute for the public domain. The IngressRoute targets the bjw Service
# (`qwen3-4b:8081` = the Caddy sidecar). Routing only — the sidecar does auth.
edgeAuth:
  enabled: true
  # ⚠️ SET THE REAL DOMAIN (+ DNS → the home cluster) — must match ai-models
  # vllmLocal.hostname. Pattern: <model>--poc.ssegning.com.
  host: qwen3-4b--poc.ssegning.com
  entryPoint: websecure
  # The bjw Service + port the IngressRoute forwards to (the Caddy sidecar).
  serviceName: qwen3-4b
  servicePort: 8081
  tls:
    issuer: cert-cloudflare        # ClusterIssuer (DNS-01) — works on the home cluster
    secretName: qwen3-model-edge-tls
  # Caddy upstream timeout (templates/configmap-caddy.yaml). Must exceed a
  # deploy-time restart (STS reloads multi-GB weights) + a long generation, so
  # the proxy doesn't 504 before the model responds. Keep ≥ the ai-models
  # qwen3-4b-local timeout.requestTimeout (both 600s). Path: Envoy → Caddy → model.
  proxyResponseTimeout: 600s

# ═════════════════════════════════════════════════════════════════════════════
# bjw-template subchart (alias `modelServing`) — the merged StatefulSet.
# ═════════════════════════════════════════════════════════════════════════════
modelServing:
  global:
    # Pin resource names so the own-template IngressRoute can reference the
    # Service deterministically (edgeAuth.serviceName above must match).
    fullnameOverride: qwen3-4b

  # GPU pinning for the (single) pod. No nvidia.com/gpu resource — the PoC node
  # has no device plugin; runtimeClassName + nodeSelector are how the pod gets
  # the GPU.
  defaultPodOptions:
    runtimeClassName: nvidia
    nodeSelector:
      gpu-node: "true"

  controllers:
    main:
      # StatefulSet: on a single replica, RollingUpdate deletes pod-0 and
      # recreates it — STS never runs two pods of the same ordinal, so there's
      # never two model containers fighting for the single 12Gi GPU (the
      # single-instance guarantee; ADR-0029). Trade-off: ~1-2min deploy gap.
      type: statefulset
      replicas: 1                            # always-on, single instance (one GPU)
      annotations:
        argocd.argoproj.io/sync-wave: "1"   # after the seed Job (wave 0)

      containers:
        # ── 1) the model server (vLLM + in-pod LMCache) ──────────────────────
        model:
          image:
            repository: kserve/huggingfaceserver
            # v0.18.0-gpu = vLLM 0.19.0 + an aligned LMCache. NOT v0.17.x
            # (vLLM 0.15.1) — the LMCache `get_kv_events` skew. See ADR-0022.
            tag: v0.18.0-gpu
            pullPolicy: IfNotPresent
          # The image ENTRYPOINT is the hf model server; these are flags.
          args:
            - --model_name=qwen3-4b
            - --model_dir=/mnt/models        # the PVC mount (replaces KServe storageUri)
            - --backend=vllm
            - --dtype=float16                # Ampere: no hardware FP8
            - --max-model-len=16384
            - --max-num-seqs=4
            - --gpu-memory-utilization=0.90
            - --swap-space=1
            - --enforce-eager
            # Agentic tool calling: tool_choice:"auto" 400s without these.
            # Qwen3 → hermes parser. (NOT --reasoning-parser qwen3 — conflicts
            # with the hermes tool parser; vllm#19513/#19051.)
            - --enable-auto-tool-choice
            - --tool-call-parser=hermes
            - '--kv-transfer-config={"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
            # NO --kv-cache-dtype=fp8 (Ampere/dlpack BufferError every prefill).
          env:
            LMCACHE_USE_EXPERIMENTAL: "True"
            LMCACHE_LOCAL_CPU: "True"
            LMCACHE_MAX_LOCAL_CPU_SIZE: "1"  # GB host RAM for offloaded KV
            # Ignored by the image, but kept so a future vLLM-native server works.
            VLLM_API_KEY:
              secretKeyRef:
                name: vllm-local-api-key
                key: api_key
          ports:
            - name: http
              containerPort: 8080            # huggingfaceserver REST port
          # `custom: true` so bjw uses our spec VERBATIM. Without it, bjw
          # auto-derives the probe from the SERVICE port (8081 = the proxy) — but
          # the model listens on 8080, and a probe against 8081 (the always-up
          # Caddy) would mark the model Ready before its weights finish loading.
          probes:
            # Long startup so the multi-GB weight load isn't killed mid-load.
            startup:
              enabled: true
              custom: true
              spec:
                tcpSocket: { port: 8080 }
                periodSeconds: 15
                failureThreshold: 40          # ~10 min
                timeoutSeconds: 5
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket: { port: 8080 }
                periodSeconds: 15
                timeoutSeconds: 10
                failureThreshold: 3
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket: { port: 8080 }
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              # nvidia.com/gpu: "1"   # the PoC node has no device-plugin for this
              cpu: "3"
              memory: 6Gi

        # ── 2) the Caddy auth-proxy sidecar ──────────────────────────────────
        # Validates `Authorization: Bearer <vllm key>` (the image won't), 401 else,
        # then reverse-proxies to the model over localhost:8080 (same pod). It is
        # the only exposed port; the model's :8080 is pod-local only.
        proxy:
          image:
            repository: caddy
            tag: 2-alpine
            pullPolicy: IfNotPresent
          # caddy image default CMD runs /etc/caddy/Caddyfile (mounted below).
          env:
            MODEL_API_KEY:
              secretKeyRef:
                name: vllm-local-api-key
                key: api_key
          ports:
            - name: edge
              containerPort: 8081
          probes:
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket: { port: 8081 }
                periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        edge:
          port: 8081
          targetPort: 8081          # → the Caddy sidecar

  persistence:
    # Pre-seeded weights PVC (created by templates/pvc.yaml), mounted read-only
    # into the model container at /mnt/models (subPath = model.storagePath).
    model-store:
      enabled: true
      existingClaim: qwen3-4b-models
      advancedMounts:
        main:
          model:
            - path: /mnt/models
              subPath: Qwen3-4B
              readOnly: true
    # The Caddyfile ConfigMap (own templates/configmap-caddy.yaml) mounted into
    # the proxy container at /etc/caddy. Name matches model.name + "-caddy".
    caddyfile:
      enabled: true
      type: configMap
      name: qwen3-4b-caddy
      advancedMounts:
        main:
          proxy:
            - path: /etc/caddy
