# charts/model-serving — self-hosted Qwen3-4B on the home GPU.
# See ADR-0022 + docs/2026-self-hosted-gpu-inference.md.
#
# Sync-wave ordering (this Application's resources, on the HOME cluster):
#   -2  ExternalSecret (vllm-local-api-key)   — key must exist before the model pod
#   -1  PVC (qwen3-4b-models)                  — weights volume
#    0  seed Job (download-once into the PVC)  — ArgoCD waits for it to complete
#    1  InferenceService (vLLM + LMCache)      — mounts pvc://, never downloads

global:
  # Used only for chart labels; the actual namespace comes from the Application.
  labels:
    app: model-serving
    team: adorsys-gis

model:
  # Logical model name (used for the InferenceService/Knative service name → FQDN).
  name: qwen3-4b
  # HuggingFace repo the seed Job downloads (Qwen3-4B is Apache-2.0 → no token).
  hfRepo: Qwen/Qwen3-4B
  # Sub-path inside the PVC where weights are seeded and mounted from.
  storagePath: Qwen3-4B

# ─────────────────────────────────────────────────────────────────────────────
# Weights volume — pre-seeded once, then mounted read-mostly. NOT hf:// at runtime.
pvc:
  enabled: true
  name: qwen3-4b-models
  storageClassName: longhorn
  accessMode: ReadWriteOnce        # safe: model pins to the single GPU node (§3a)
  size: 25Gi                       # ~8GB BF16 + headroom for a future AWQ variant

# One-time download Job, run as an ArgoCD Sync hook (sync-wave 0) — see
# templates/seed-job.yaml for why a hook (Jobs can't be plain ArgoCD resources:
# the controller-uid label drift makes ArgoCD try to patch the immutable
# template and the sync fails). Idempotent: `hf download` resumes/skips files
# already on the persistent PVC, so re-running on each sync is cheap.
seedJob:
  enabled: true
  image:
    repository: python
    tag: "3.12-slim"
    pullPolicy: IfNotPresent
  # Pin to the GPU node so the RWO Longhorn volume binds where the model runs.
  nodeSelector:
    gpu-node: "true"
  backoffLimit: 6
  # A stuck/rate-limited download dies + retries instead of hanging forever.
  activeDeadlineSeconds: 3600
  # Optional HuggingFace token — lifts the anonymous rate limit that otherwise
  # stalls the ~8GB download partway through. Qwen3-4B is public so a token is
  # NOT required for access, only for reliable throughput. Strongly recommended.
  # Enabled: the maintainer populated property `hf_token` under
  # ssegning-aws `ai/camer/digital/prod/env`. The ExternalSecret below syncs it
  # into the `hf-token` Secret; the seed Job consumes it as HF_TOKEN.
  hfToken:
    enabled: true
    secretName: hf-token
    dataKey: token
    externalSecret:
      enabled: true
      secretStore: ssegning-aws
      refreshInterval: 1h
      key: ai/camer/digital/prod/env
      property: hf_token
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      # 4Gi: the ~8GB pull streams to the PVC; Xet keeps a few chunk buffers +
      # the safetensors verify in RAM. 2Gi OOM-killed it (exit 137); 4Gi is
      # enough without HF_XET_HIGH_PERFORMANCE and fits the 8Gi home-lab host.
      memory: 4Gi

# ─────────────────────────────────────────────────────────────────────────────
# Namespace-scoped ServingRuntime (vLLM + LMCache). Shipped with the app because
# this KServe install has no ClusterServingRuntimes. Mirrors KServe v0.17's
# kserve-huggingfaceserver. The InferenceService below binds to it by name.
servingRuntime:
  enabled: true
  name: huggingfaceserver
  image:
    repository: kserve/huggingfaceserver
    # v0.18.0-gpu bundles vLLM 0.19.0 (v0.17.x = vLLM 0.15.1). LMCache isn't
    # separately pinned in the huggingfaceserver lockfile (it rides in via the
    # vLLM extra), and on v0.17.0 the pair is skewed — vLLM's lmcache_connector
    # calls `_lmcache_engine.get_kv_events()` which the bundled LMCache lacks
    # ("AttributeError: 'LMCacheConnectorV1Impl' object has no attribute
    # get_kv_events"), crashing every prefill. A newer image should ship an
    # aligned LMCache. If v0.18.0 still skews, try v0.19.0-rc0-gpu (vLLM 0.20.0)
    # or disable LMCache (lmcache.enabled:false) for vanilla vLLM. See ADR-0022.
    tag: v0.18.0-gpu
    pullPolicy: IfNotPresent
  # Base requests only — the InferenceService overrides with the GPU resources.
  resources:
    requests: { cpu: "1", memory: 2Gi }
    limits: { cpu: "1", memory: 2Gi }

# ─────────────────────────────────────────────────────────────────────────────
inferenceService:
  enabled: true
  # Cluster-local: do NOT publish a public Knative FQDN. KServe's huggingfaceserver
  # serves the OpenAI API itself and IGNORES VLLM_API_KEY, so a public route is an
  # UNAUTHENTICATED GPU on the internet (confirmed: no-auth + wrong-key both 200).
  # The public, authenticated entrypoint is a Traefik HTTPRoute + forwardAuth on
  # the home cluster (home-os) that validates the gateway's Bearer key and proxies
  # to this cluster-local service. See ADR-0022.
  clusterLocal: true
  modelFormat: huggingface
  # Bind to the namespaced ServingRuntime above (set automatically from
  # servingRuntime.name when servingRuntime.enabled).
  runtime: huggingfaceserver
  # GPU pinning — the Knative podspec-runtimeclassname / -nodeselector feature
  # flags are enabled on the home cluster (home-os charts/cd KnativeServing).
  runtimeClassName: nvidia
  nodeSelector:
    gpu-node: "true"
  # Scale-to-zero on a single GPU (home-lab). minReplicas:0 means an idle
  # revision releases the GPU, so deploying a new revision doesn't deadlock on
  # the old one holding VRAM (only ONE Qwen3-4B fits in the 12Gi A2000) — the
  # old revision scales to 0 and the new one starts. Trade-off: a cold start
  # (~30-60s reloading the PVC weights) on the first request after idle. See
  # ADR-0022 (single-revision-at-a-time rationale).
  minReplicas: 0
  maxReplicas: 1

  # Knative autoscaler tuning (KServe propagates these onto the revision). Short
  # window + immediate scale-down so an IDLE old revision releases the GPU fast,
  # minimising two-revisions-on-one-GPU during a rollout. (minReplicas:0 is what
  # lets it reach zero; this just makes it quick.) NOTE: Knative is blue-green by
  # design, so this is best-effort — a HARD "never two revisions" guarantee needs
  # KServe RawDeployment + a Recreate strategy, which changes the public FQDN
  # mechanism (see ADR-0022). Acceptable for a single-GPU home-lab PoC.
  knativeAnnotations:
    autoscaling.knative.dev/window: "30s"
    autoscaling.knative.dev/scale-down-delay: "0s"
    autoscaling.knative.dev/scale-to-zero-pod-retention-period: "0s"

  # Probe tuning. On a cold start (minReplicas:0) the pod reloads multi-GB
  # weights from the PVC, which exceeds the default probe timeouts → Knative's
  # queue-proxy (:8012) reports "context deadline exceeded" and the pod is
  # killed/restarted before it finishes loading. A long startupProbe holds off
  # readiness/liveness until the model server is up; tcpSocket avoids guessing a
  # health path. ~10 min startup budget (40 × 15s).
  probes:
    startup:
      tcpSocket: { port: 8080 }
      periodSeconds: 15
      failureThreshold: 40
      timeoutSeconds: 5
    readiness:
      tcpSocket: { port: 8080 }
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 3
    liveness:
      tcpSocket: { port: 8080 }
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 6

  # vLLM / huggingfaceserver passthrough args, tuned for a 12GB A2000 (Ampere:
  # no hardware FP8 → BF16/FP16 + AWQ-Marlin only). Exact arg spellings may need
  # a nudge against the installed runtime version — this is the test-pass knob.
  args:
    - --model_name=qwen3-4b
    - --backend=vllm
    - --dtype=float16
    - --max-model-len=16384
    - --max-num-seqs=4
    - --gpu-memory-utilization=0.90
    # NO --kv-cache-dtype=fp8: the A2000 is Ampere (no hardware FP8); flashinfer
    # can't pass fp8 KV tensors through dlpack → "BufferError: float8 types are
    # not supported by dlpack" on every prefill. KV cache stays fp16.
    # Cap vLLM's CPU swap (default 4Gi) — the home-lab host has only 8Gi total.
    - --swap-space=1
    - --enforce-eager
    - '--kv-transfer-config={"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
    # AWQ optimization only (community quant): --quantization=awq_marlin
  extraEnv: []
  # Sized for an 8Gi home-lab host (weights live in the 12Gi A2000 VRAM, not
  # host RAM). Host RAM = vLLM runtime (~2-3Gi) + LMCache CPU offload
  # (lmcache.maxLocalCpuSizeGb) + vLLM --swap-space. Keep the limit well under
  # 8Gi so the OS/kubelet/other pods fit. 12Gi/16Gi could not even schedule.
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      #nvidia.com/gpu: "1" # <-- the PoC server do not support this
      cpu: "3"
      memory: 6Gi

# In-pod LMCache (NOT the standalone lmcache_experimental_server — that's the
# multi-replica shared-KV tool, irrelevant on one GPU). CPU-DRAM offload +
# prefix reuse across requests.
lmcache:
  enabled: true
  useExperimental: true
  localCpu: true
  maxLocalCpuSizeGb: 1          # GB of host RAM for offloaded KV (8Gi home-lab host)

# ─────────────────────────────────────────────────────────────────────────────
# The vLLM API key Secret. NOTE: KServe's huggingfaceserver IGNORES VLLM_API_KEY
# (it serves OpenAI itself, not via vLLM's api-server), so this env does NOT gate
# the model — the real gate is edgeAuth below (a Traefik forwardAuth that
# validates this same key). The Hetzner gateway's BackendSecurityPolicy sends it
# as `Authorization: Bearer`. By-name from ssegning-aws; never embedded.
apiKey:
  enabled: true
  secretName: vllm-local-api-key
  dataKey: api_key
  envVar: VLLM_API_KEY
  externalSecret:
    enabled: true
    secretStore: ssegning-aws
    refreshInterval: 1h
    key: ai/camer/digital/prod/env
    property: vllm_local_api_key

# ─────────────────────────────────────────────────────────────────────────────
# Edge auth (the public entrypoint). The model ksvc is cluster-local (above), so
# this tiny Caddy reverse-proxy — a PUBLIC Knative Service — is the only way in.
# It validates the gateway's `Authorization: Bearer <vllm-local-api-key>` inline
# (KServe won't enforce it) → 401 if wrong, else reverse-proxies over HTTPS to
# the cluster-local model (in-cluster HTTP gets 301'd by Traefik's redirect, so
# https + skip-verify), preserving Knative scale-from-zero. A DomainMapping gives
# it a clean stable domain. No Traefik IngressRoute/middleware. See ADR-0022.
#
# Manual prerequisite: a DNS record for `host` → the home cluster's public entry
# (Knative auto-TLS via cert-cloudflare issues the cert).
edgeAuth:
  enabled: true
  # ⚠️ SET THE REAL DOMAIN (+ add the DNS record) — must match ai-models
  # vllmLocal.hostname. Pattern: <model>--poc.ssegning.com.
  host: qwen3-4b--poc.ssegning.com
  # cluster-local model the proxy forwards to (https + Host header for Knative).
  internalHost: qwen3-4b-predictor.converse-poc.svc.cluster.local
  domainMapping:
    enabled: true
  proxy:
    image: caddy:2-alpine          # stock; default CMD runs /etc/caddy/Caddyfile
    minScale: 1                     # tiny + always warm (the MODEL behind it scales from 0)
    maxScale: 2
    responseTimeout: 300s          # allow the model's cold start (scale-from-zero)
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 200m, memory: 128Mi }
