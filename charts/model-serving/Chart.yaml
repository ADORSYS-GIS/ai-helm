apiVersion: v2
name: model-serving
description: |
  Self-hosted LLM on the home GPU: a plain Deployment (always-on, Recreate)
  running the kserve/huggingfaceserver image (vLLM + in-pod LMCache), fed
  weights from a pre-seeded PVC so pod starts are a local mount (no per-start
  HuggingFace download). NOT KServe/Knative — serverless is the wrong fit for a
  single owned dedicated GPU (ADR-0029); a Caddy auth-proxy enforces the Bearer
  the model image ignores.

  Deployed by an ai-helm Application that — unusually — targets the HOME
  cluster (where the GPU lives), the single sanctioned exception to ADR-0017.
  The model is federated into the Hetzner Envoy AI Gateway as an ordinary
  OpenAI backend via the Caddy proxy's public FQDN (see charts/ai-models). The
  *why* is ADR-0022 (federation) + ADR-0029 (serving mode); the *how* (VRAM
  math, flags, runbook) is docs/self-hosted-model-serving.md.
type: application
version: 0.2.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0-0"
keywords:
  - llm
  - vllm
  - lmcache
  - huggingfaceserver
  - inference
  - gpu
maintainers:
  - name: ai-helm

dependencies:
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
