apiVersion: v2
name: model-serving
description: >
  Deploys a vLLM model via KServe + Knative. KServe and Knative operators
  are assumed to be installed at the infrastructure level. This chart provisions
  the model-scoped resources (ServingRuntime, InferenceService) and exposes
  optional adapters for TLS (cert-manager Certificate) and observability
  (Prometheus ServiceMonitor).
type: application
version: 0.1.0
appVersion: "v0.6.4.post1"
kubeVersion: ">=1.28.0-0"

keywords:
  - vllm
  - kserve
  - knative
  - llm
  - inference
  - ai

maintainers:
  - name: Koufan-De-King
    url: https://github.com/adorsys/ai-helm

sources:
  - https://github.com/adorsys/ai-helm

dependencies:
  # bjw-s app-template: extension point for supplementary workloads and
  # standard K8s resources (ServiceAccount, ConfigMap, rawResources, etc.)
  # that sit alongside the KServe CRDs. Disabled unless serving.enabled=true.
  - name: app-template
    version: "4.6.2"
    alias: serving
    repository: https://bjw-s-labs.github.io/helm-charts
    condition: serving.enabled
