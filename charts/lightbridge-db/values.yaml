# lightbridge-db — CNPG Cluster (lightbridge-main-db) + barman ObjectStore +
# ScheduledBackup + PodMonitor. Leaf chart of the lightbridge orchestrator
# (ADR-0019). Moved verbatim from the old flat app's rawRessources EXCEPT the
# ObjectStore, which is modernised to Hetzner Object Storage (the old MinIO
# s3.ssegning.me / ai-ops-backups is decommissioned). The usage DB is dropped.
#
# Namespace is `converse` (the orchestrator targets that namespace; these CRs
# pin it explicitly to match the old flat-app behaviour).

resources:
  # ────────────────────────────────────────────────────────────────────
  # The primary CNPG cluster. Spec verbatim from the old flat app's
  # rawRessources (instances 2, postgresql:18.4-system-trixie, 5Gi storage,
  # archive_timeout 30min, the barman WAL-archiver plugin, the resources
  # block). Backs up via the barman ObjectStore below.
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: lightbridge-main-db
      namespace: converse
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      instances: 2
      imageName: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
      storage:
        size: "5Gi"
      plugins:
        # `enabled: true` is set explicitly: the CNPG operator defaults it on,
        # and ArgoCD compares `plugins` as an atomic LIST — so without it here
        # the live list item (which has enabled:true) never matches the chart's
        # → permanent OutOfSync. (managedFieldsManagers can't ignore a field
        # inside a list item, hence matching it directly.)
        - name: barman-cloud.cloudnative-pg.io
          enabled: true
          isWALArchiver: true
          parameters:
            barmanObjectName: lightbridge-main-db
            serverName: lightbridge-main-db
      postgresql:
        parameters:
          archive_timeout: "30min"
      resources:
        limits:
          cpu: 300m
          memory: 1Gi
        requests:
          cpu: 200m
          memory: 500Mi
      # Declarative role for lightbridge-repo-auth (ADR-0047): a dedicated login
      # role, isolated from the bootstrap `app` role. Password from the
      # basic-auth Secret below (ESO-provisioned); CNPG creates/maintains the
      # role and the `repoauth` Database (below) is owned by it.
      managed:
        roles:
          - name: repoauth
            ensure: present
            login: true
            passwordSecret:
              name: repo-auth-db-role
          # Dedicated login role for lightbridge-code-intelligence
          # (charts/lightbridge-code-intelligence), isolated from `app`/`repoauth`.
          # Owns the `codeintel` Database below; password from the basic-auth Secret
          # `lightbridge-codeintel-db-role` (ESO-provisioned, below).
          - name: codeintel
            ensure: present
            login: true
            passwordSecret:
              name: lightbridge-codeintel-db-role
  # ────────────────────────────────────────────────────────────────────
  # barman-cloud ObjectStore — MODERNISED TO HETZNER OBJECT STORAGE.
  #
  # The old store pointed at the now-decommissioned MinIO (s3.ssegning.me,
  # bucket ai-ops-backups). It now uses Hetzner Object Storage (Ceph-RGW):
  # shared bucket `ssegning-k8s-state`, endpoint nbg1.your-objectstorage.com,
  # same pattern Keycloak's CNPG backup uses. NO top-level `region` field — it
  # isn't in the barmancloud ObjectStore schema (a literal there breaks ArgoCD's
  # diff: ".spec.configuration.region: field not declared in schema").
  # ⚠️ The barman-cloud plugin's defaulting webhook DOES inject an
  # `s3Credentials.region` ref → {name: lightbridge-cnpg-s3, key: s3_region_name}
  # server-side (the valid per-credential field), and reads that key at backup
  # time — so the `lightbridge-cnpg-s3` Secret MUST carry `s3_region_name`
  # (provisioned as a literal in charts/lightbridge-secrets) or every
  # ScheduledBackup fails `missing key s3_region_name`. Left undeclared here so
  # ArgoCD doesn't diff the webhook-owned default.
  # No trailing slash on destinationPath (MinIO/Ceph ListObjectsV2 quirk).
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: barmancloud.cnpg.io/v1
    kind: ObjectStore
    metadata:
      name: lightbridge-main-db
      namespace: converse
      annotations:
        argocd.argoproj.io/sync-wave: "1"
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      retentionPolicy: "180d"
      configuration:
        destinationPath: s3://ssegning-k8s-state/lightbridge-main-db
        endpointURL: https://nbg1.your-objectstorage.com
        s3Credentials:
          accessKeyId:
            name: lightbridge-cnpg-s3
            key: s3_access_key_id
          secretAccessKey:
            name: lightbridge-cnpg-s3
            key: s3_secret_access_key
  # ────────────────────────────────────────────────────────────────────
  # Daily scheduled backup (verbatim from the old flat app).
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: postgresql.cnpg.io/v1
    kind: ScheduledBackup
    metadata:
      name: lightbridge-main-db-daily
      namespace: converse
      annotations:
        argocd.argoproj.io/sync-wave: "3"
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      immediate: true
      schedule: "0 0 2 * * *"
      backupOwnerReference: self
      cluster:
        name: lightbridge-main-db
      method: plugin
      pluginConfiguration:
        name: barman-cloud.cloudnative-pg.io
  # ────────────────────────────────────────────────────────────────────
  # PodMonitor so Grafana Alloy scrapes the CloudNativePG per-instance
  # metrics exporter (port 9187, name "metrics"). Verbatim from the old
  # flat app. Manual PodMonitors are the recommended approach now that
  # .spec.monitoring.enablePodMonitor is deprecated.
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: monitoring.coreos.com/v1
    kind: PodMonitor
    metadata:
      name: lightbridge-main-db
      namespace: converse
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      selector:
        matchLabels:
          cnpg.io/cluster: lightbridge-main-db
      podMetricsEndpoints:
        - port: metrics
          interval: 30s
  # ────────────────────────────────────────────────────────────────────
  # lightbridge-repo-auth (ADR-0047): a `repoauth` Database owned by the
  # managed role above, plus the role's basic-auth Secret (username +
  # password) consumed by BOTH CNPG (passwordSecret) and the app.
  # NOTE: the ESO `password` template braces are double-escaped so Helm's
  # `tpl` (this whole string is tpl'd) leaves `{{ .password }}` for ESO —
  # an un-escaped `{{ }}` here breaks render (CLAUDE.md tpl-brace trap).
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: postgresql.cnpg.io/v1
    kind: Database
    metadata:
      name: repoauth
      namespace: converse
      annotations:
        argocd.argoproj.io/sync-wave: "3"
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      cluster:
        name: lightbridge-main-db
      name: repoauth
      owner: repoauth
      ensure: present
  - |
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: repo-auth-db-role
      namespace: converse
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: ssegning-aws
      target:
        name: repo-auth-db-role
        creationPolicy: Owner
        template:
          type: kubernetes.io/basic-auth
          data:
            username: "repoauth"
            password: "{{ "{{ .password }}" }}"
      data:
        - secretKey: password
          remoteRef:
            key: ai/camer/digital/prod/env
            property: repo_auth_db_password
  # ────────────────────────────────────────────────────────────────────
  # lightbridge-code-intelligence: a `codeintel` Database owned by the
  # managed `codeintel` role above, plus the role's basic-auth Secret
  # (username + password) consumed by BOTH CNPG (passwordSecret) and the
  # control plane. Mirrors the repoauth pattern (ADR-0047).
  # NOTE(pgvector): semantic search needs the `vector` extension, which the
  # current CNPG image does not ship — declare it on this Database once the
  # cluster image bundles pgvector (see charts/lightbridge-code-intelligence).
  # Double-escaped tpl braces leave `{{ .password }}` for ESO (CLAUDE.md trap).
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: postgresql.cnpg.io/v1
    kind: Database
    metadata:
      name: codeintel
      namespace: converse
      annotations:
        argocd.argoproj.io/sync-wave: "3"
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      cluster:
        name: lightbridge-main-db
      name: codeintel
      owner: codeintel
      ensure: present
  - |
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: lightbridge-codeintel-db-role
      namespace: converse
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: ssegning-aws
      target:
        name: lightbridge-codeintel-db-role
        creationPolicy: Owner
        template:
          type: kubernetes.io/basic-auth
          data:
            username: "codeintel"
            password: "{{ "{{ .password }}" }}"
      data:
        - secretKey: password
          remoteRef:
            key: ai/camer/digital/prod/env
            property: codeintel_db_password
