{{- if .Values.realm.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak-baseline.realm.configMapName" . }}
  namespace: {{ .Values.global.keycloak.namespace | default "keycloak" }}
  labels:
    {{- include "keycloak-baseline.labels" . | nindent 4 }}
    app.kubernetes.io/component: realm-config
data:
  {{ .Values.realm.name }}-realm.json: |
    {{- include "keycloak-baseline.realm.json" . | nindent 4 }}
  testing-realm-realm.json: |
    {
      "realm": "testing-realm",
      "enabled": true,
      "displayName": "Testing Realm",
      "displayNameHtml": "<div class='kc-logo-text'><span>Testing Realm</span></div>",
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginTheme": "keycloak",
      "accessTokenLifespan": 300,
      "clients": [],
      "roles": { "realm": [] },
      "groups": [],
      "clientScopes": []
    }
{{- end -}}