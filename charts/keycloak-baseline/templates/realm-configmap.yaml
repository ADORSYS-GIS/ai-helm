{{- $kc := index .Values "keycloak-config" -}}
{{- $realm := $kc.realm | default "platform" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-baseline-realm
  namespace: {{ .Release.Namespace }}
  labels:
    helm.sh/chart: keycloak-baseline-{{ .Chart.Version }}
    app.kubernetes.io/name: keycloak-baseline
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: realm-config
data:
  {{ $realm }}-realm.yaml: |
    id: {{ $realm }}
    realm: {{ $realm }}
    enabled: {{ $kc.realmConfig.enabled }}
    displayName: {{ $kc.realmConfig.displayName }}
    displayNameHtml: {{ $kc.realmConfig.displayNameHtml }}
    sslRequired: {{ $kc.realmConfig.sslRequired }}
    registrationAllowed: {{ $kc.realmConfig.registrationAllowed }}
    registrationEmailAsUsername: {{ $kc.realmConfig.registrationEmailAsUsername }}
    verifyEmail: {{ $kc.realmConfig.verifyEmail }}
    resetPasswordAllowed: {{ $kc.realmConfig.resetPasswordAllowed }}
    loginTheme: {{ $kc.realmConfig.loginTheme }}
    accountTheme: {{ $kc.realmConfig.accountTheme }}
    adminTheme: {{ $kc.realmConfig.adminTheme }}
    emailTheme: {{ $kc.realmConfig.emailTheme }}
    passwordPolicy: {{ $kc.realmConfig.passwordPolicy }}
    accessTokenLifespan: {{ $kc.realmConfig.accessTokenLifespan }}
    ssoSessionMaxLifespan: {{ $kc.realmConfig.ssoSessionMaxLifespan }}
    ssoSessionIdleTimeout: {{ $kc.realmConfig.ssoSessionIdleTimeout }}
    attributes:
    {{- range $key, $value := $kc.realmConfig.attributes }}
      {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- /* Only include clients section if ANY client is enabled */ -}}
    {{- $enabledClients := list }}
    {{- range $name, $client := $kc.clients }}
    {{- if $client.enabled }}
    {{- $enabledClients = append $enabledClients $client }}
    {{- end }}
    {{- end }}
    {{- range $name, $sa := $kc.serviceAccounts }}
    {{- if $sa.enabled }}
    {{- $saWithDefaults := merge $sa (dict "serviceAccountsEnabled" true) }}
    {{- $enabledClients = append $enabledClients $saWithDefaults }}
    {{- end }}
    {{- end }}
    {{- if gt (len $enabledClients) 0 }}
    clients:
      {{- range $client := $enabledClients }}
      - clientId: {{ $client.clientId }}
        name: {{ $client.name }}
        description: {{ $client.description }}
        enabled: true
        publicClient: {{ $client.publicClient | default false }}
        standardFlowEnabled: {{ $client.standardFlowEnabled | default true }}
        implicitFlowEnabled: {{ $client.implicitFlowEnabled | default false }}
        directAccessGrantsEnabled: {{ $client.directAccessGrantsEnabled | default false }}
        serviceAccountsEnabled: {{ $client.serviceAccountsEnabled | default false }}
        redirectUris:
          {{- range $client.redirectUris }}
          - {{ . }}
          {{- end }}
        webOrigins:
          {{- range $client.webOrigins }}
          - {{ . }}
          {{- end }}
        protocol: openid-connect
        {{- if $client.pkce }}
        attributes:
          pkce.code.challenge.method: {{ $client.pkce }}
        {{- end }}
      {{- end }}
    {{- end }}