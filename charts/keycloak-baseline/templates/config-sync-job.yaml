{{- if .Values.keycloakConfigCli.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "keycloak-baseline.fullname" . }}-config-sync
  namespace: {{ .Values.global.keycloak.namespace | default "keycloak" }}
  labels:
    {{- include "keycloak-baseline.labels" . | nindent 4 }}
    app.kubernetes.io/component: config-sync
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "keycloak-baseline.labels" . | nindent 8 }}
        app.kubernetes.io/component: config-sync
    spec:
      serviceAccountName: {{ include "keycloak-baseline.fullname" . }}-config-sync
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-keycloak
          image: curlimages/curl:8.13.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Keycloak to be ready..."
              until curl -sf http://{{ .Values.keycloakConfigCli.keycloakService | default "keycloak" }}.{{ .Values.global.keycloak.namespace | default "keycloak" }}.svc.cluster.local:8080/realms/master > /dev/null 2>&1; do
                echo "Keycloak not ready, waiting..."
                sleep 5
              done
              echo "Keycloak is ready!"
      containers:
        - name: keycloak-config-cli
          image: {{ .Values.keycloakConfigCli.image.repository | default "docker.io/adorsys/keycloak-config-cli" }}:{{ .Values.keycloakConfigCli.image.tag | default "latest" }}
          env:
            - name: KEYCLOAK_URL
              value: "http://{{ .Values.keycloakConfigCli.keycloakService | default "keycloak" }}.{{ .Values.global.keycloak.namespace | default "keycloak" }}.svc.cluster.local:8080"
            - name: KEYCLOAK_USER
              value: {{ .Values.keycloakConfigCli.adminUser | default "admin" | quote }}
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakConfigCli.adminSecret | default "keycloak-admin" }}
                  key: password
            - name: IMPORT_VARIABLE_ENABLED
              value: "true"
            - name: IMPORT_ENABLED
              value: "true"
          volumeMounts:
            - name: realm-config
              mountPath: /config
      volumes:
        - name: realm-config
          configMap:
            name: {{ include "keycloak-baseline.realm.configMapName" . }}
{{- end }}
---
{{- if .Values.keycloakConfigCli.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "keycloak-baseline.fullname" . }}-config-sync
  namespace: {{ .Values.global.keycloak.namespace | default "keycloak" }}
  labels:
    {{- include "keycloak-baseline.labels" . | nindent 4 }}
    app.kubernetes.io/component: config-sync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "keycloak-baseline.fullname" . }}-config-sync
  namespace: {{ .Values.global.keycloak.namespace | default "keycloak" }}
  labels:
    {{- include "keycloak-baseline.labels" . | nindent 4 }}
    app.kubernetes.io/component: config-sync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ .Values.keycloakConfigCli.adminSecret | default "keycloak-admin" }}"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ include "keycloak-baseline.realm.configMapName" . }}"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "keycloak-baseline.fullname" . }}-config-sync
  namespace: {{ .Values.global.keycloak.namespace | default "keycloak" }}
  labels:
    {{- include "keycloak-baseline.labels" . | nindent 4 }}
    app.kubernetes.io/component: config-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "keycloak-baseline.fullname" . }}-config-sync
subjects:
  - kind: ServiceAccount
    name: {{ include "keycloak-baseline.fullname" . }}-config-sync
    namespace: {{ .Values.global.keycloak.namespace | default "keycloak" }}
{{- end }}
