# Keycloak Baseline Values
# ========================
# This chart provides reusable Keycloak baseline configuration using BJWS app-template.

global:
  nameOverride: keycloak-baseline

rbac:
  enabled: false
serviceAccount:
  enabled: false
networkPolicy:
  enabled: false
serviceMonitors:
  enabled: false
ingress:
  enabled: false
service:
  enabled: false
pvc:
  enabled: false

# Keycloak Realm Configuration
#=========================
keycloak-config:
  url: "http://keycloak.keycloak.svc.cluster.local:8080"
  realm: "platform"

  # Realm-level configuration with defaults
  realmConfig:
    enabled: true
    displayName: "Platform Services"
    displayNameHtml: "<div class='kc-logo-text'><span>Platform Services</span></div>"
    sslRequired: "external"
    registrationAllowed: false
    registrationEmailAsUsername: true
    verifyEmail: true
    resetPasswordAllowed: true
    loginTheme: "keycloak"
    accountTheme: "keycloak"
    adminTheme: "keycloak"
    emailTheme: "keycloak"
    passwordPolicy: "length(12) and upperCase(1) and lowerCase(1) and digits(1) and specialChars(1) and notEmail()"
    accessTokenLifespan: 300
    ssoSessionMaxLifespan: 36000
    ssoSessionIdleTimeout: 1800
    attributes:
      darkMode: "true"

  clients:
    phoenix:
      enabled: false
      clientId: "phoenix"
      name: "Phoenix"
      description: "Phoenix AI Dashboard"
      publicClient: false
      standardFlowEnabled: true
      implicitFlowEnabled: false
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: false
      redirectUris: []
      webOrigins: []
      pkce: "S256"
    converse:
      enabled: false
      clientId: "converse"
      name: "Converse Chats"
      description: "LibreChat Backend"
      publicClient: false
      standardFlowEnabled: true
      implicitFlowEnabled: false
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: false
      redirectUris: []
      webOrigins: []
    coder:
      enabled: false
      clientId: "coder"
      name: "Coder"
      description: "Coder Development Environment"
      publicClient: false
      standardFlowEnabled: true
      implicitFlowEnabled: false
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: false
      redirectUris: []
      webOrigins: []
    selfServiceMcpApi:
      enabled: false
      clientId: "self-service-mcp-api"
      name: "Self Service MCP API"
      description: "MCP service API client"
      publicClient: false
      standardFlowEnabled: false
      implicitFlowEnabled: false
      directAccessGrantsEnabled: true
      serviceAccountsEnabled: true
      redirectUris: []
      webOrigins: []

  serviceAccounts:
    aiGateway:
      enabled: false
      clientId: "ai-gateway"
      name: "AI Model Gateway"
      description: "AI gateway service account"
    mcpOrchestrator:
      enabled: false
      clientId: "mcp-orchestrator"
      name: "MCP Orchestrator"
      description: "MCP orchestration service"

# Keycloak config-sync CronJob (app-template dependency)
# =====================================================
config-sync:
  controllers:
    configSync:
      type: cronjob
      cronjob:
        schedule: "0 * * * *"
        concurrencyPolicy: Forbid
      containers:
        main:
          image:
            repository: docker.io/adorsys/keycloak-config-cli
            tag: "latest-26"
          env:
            KEYCLOAK_URL:
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
            KEYCLOAK_USER:
              value: "admin"
            KEYCLOAK_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: password
            IMPORT_VARIABLE_ENABLED:
              value: "true"
            IMPORT_ENABLED:
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

  persistence:
    config:
      type: configMap
      name: keycloak-baseline-realm
      globalMounts:
        - path: /config
          readOnly: true
