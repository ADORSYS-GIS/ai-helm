# Keycloak Baseline Values
# ========================
# This chart provides reusable Keycloak baseline configuration using BJWS app-template.

global:
  nameOverride: keycloak-baseline

rbac:
  enabled: false
serviceAccount:
  enabled: false
networkPolicy:
  enabled: false
serviceMonitors:
  enabled: false
ingress:
  enabled: false
service:
  enabled: false
pvc:
  enabled: false

# Keycloak Realm Configuration
#=========================
keycloak:
  url: "http://keycloak.keycloak.svc.cluster.local:8080"
  realm: "platform"

  clients:
    phoenix:
      enabled: false
      clientId: "phoenix"
      name: "Phoenix"
      description: "Phoenix AI Dashboard"
      publicClient: false
      standardFlowEnabled: true
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: false
      redirectUris: []
      webOrigins: []
      pkce: "S256"
    converse:
      enabled: false
      clientId: "converse"
      name: "Converse Chats"
      description: "LibreChat Backend"
      publicClient: false
      standardFlowEnabled: true
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: false
      redirectUris: []
      webOrigins: []
    coder:
      enabled: false
      clientId: "coder"
      name: "Coder"
      description: "Coder Development Environment"
      publicClient: false
      standardFlowEnabled: true
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: false
      redirectUris: []
      webOrigins: []
    selfServiceMcpApi:
      enabled: false
      clientId: "self-service-mcp-api"
      name: "Self Service MCP API"
      description: "MCP service API client"
      publicClient: false
      standardFlowEnabled: false
      directAccessGrantsEnabled: true
      serviceAccountsEnabled: true
      redirectUris: []
      webOrigins: []

  serviceAccounts:
    aiGateway:
      enabled: false
      clientId: "ai-gateway"
      name: "AI Model Gateway"
      description: "AI gateway service account"
    mcpOrchestrator:
      enabled: false
      clientId: "mcp-orchestrator"
      name: "MCP Orchestrator"
      description: "MCP orchestration service"

  realmRoles:
    platform:
      - name: "platform-user"
      - name: "platform-admin"
      - name: "platform-viewer"

  clientRoles:
    phoenix:
      - name: "admin"
      - name: "user"
      - name: "viewer"
    converse:
      - name: "admin"
      - name: "user"
    coder:
      - name: "admin"
      - name: "user"

  groups:
    platformAdmins:
      name: "PlatformAdmins"
    phoenix:
      - name: "PhoenixAdmin"
      - name: "PhoenixUser"
      - name: "PhoenixViewer"
    librechat:
      - name: "LibreChatAdmin"
      - name: "LibreChatUser"

app-template:
  controllers:
    configSync:
      type: cronjob
      cronjob:
        schedule: "0 * * * *"
        concurrencyPolicy: Forbid
      containers:
        main:
          image:
            repository: docker.io/adorsys/keycloak-config-cli
            tag: "6.5.0-26.5.4"
          env:
            KEYCLOAK_URL:
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
            KEYCLOAK_USER:
              value: "admin"
            KEYCLOAK_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: password
            IMPORT_VARIABLE_ENABLED:
              value: "true"
            IMPORT_ENABLED:
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

  persistence:
    config:
      type: configMap
      name: keycloak-baseline-realm
      globalMounts:
        - path: /config
          readOnly: true