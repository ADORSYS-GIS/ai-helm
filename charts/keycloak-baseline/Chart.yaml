apiVersion: v2
name: keycloak-baseline
description: Reusable Keycloak baseline for enterprise AI services and internal apps
type: application
version: 0.2.0
appVersion: "1.0.0"

keywords:
  - keycloak
  - oidc
  - sso
  - authentication

maintainers:
  - name: Adorsys
    email: support@adorsys.com

dependencies:
  - name: app-template
    alias: keycloak
    version: "3.x.x"
    repository: https://bjw-s-labs.github.io/helm-charts/
    condition: keycloak.enabled
