# ExternalSecret that materialises `librechat-s3-config` (LibreChat S3 file
# storage). Same Hetzner Object Storage as Keycloak/observability — shared
# bucket `ssegning-k8s-state` (LibreChat namespaces its own keys: images/,
# files/…), creds from the SAME ssegning-aws material. region + bucket are plain
# config (templated into the secret); only the access/secret keys are fetched.
s3ExternalSecret:
  enabled: true
  secretStore: ssegning-aws
  refreshInterval: 1h
  region: us-east-1
  bucket: ssegning-k8s-state
  remoteRef:
    key: prod/meta/test-app
    accessKeyIdProperty: s3_backup_cnpg_client_id
    secretAccessKeyProperty: s3_backup_cnpg_secret

# ExternalSecret materialising `redis-ha-redis-auth` (key `redis-password`) in
# this namespace — LibreChat reads it as REDIS_PASSWORD. The shared redis-ha
# (home-os, redis-system) is password-protected AND TLS-only; the password is the
# platform secret `prod/meta/test-app` / `redis_password` (NOT the consolidated
# app secret). Each redis consumer namespace needs its own copy (see CLAUDE.md).
# NOTE: redis-ha is TLS-only — LibreChat must also connect over TLS and trust the
# internal self-signed-ca (a cert-manager Certificate mounting ca.crt); this
# ExternalSecret provides only the password.
redisExternalSecret:
  enabled: true
  secretStore: ssegning-aws
  refreshInterval: 1h
  secretName: redis-ha-redis-auth
  remoteRef:
    key: prod/meta/test-app
    passwordProperty: redis_password

# Internal-CA trust bundle. Several in-cluster endpoints LibreChat talks to use
# TLS signed by the internal "Home Root CA" (the `self-signed-ca` ClusterIssuer):
# redis-ha (rediss://) AND the api-internal gateway listener (ADR-0021). We issue
# a throwaway leaf from that issuer and mount only its `ca.crt` at mountPath —
# REDIS_CA + NODE_EXTRA_CA_CERTS both point at it. Mirrors the Envoy rate-limit
# redis-CA pattern (environments/.../deps/eg). (No client cert needed.)
internalCaTrust:
  enabled: true
  caIssuer: self-signed-ca
  caIssuerKind: ClusterIssuer
  secretName: librechat-internal-ca
  mountPath: /etc/internal-ca

# User-owned secrets LibreChat (+ search) need, materialised as chart-owned
# ExternalSecrets. Each property resolves against the consolidated ssegning-aws
# secret `ai/camer/digital/prod/env` (one property per key); ensure every
# property below exists there or the ExternalSecret sits in SecretSyncedError
# and the workload won't start. Set a secret's block to {} (or remove keys) if
# you provision it elsewhere; set librechatSecrets.enabled=false to skip all.
librechatSecrets:
  enabled: true
  secretStore: ssegning-aws
  refreshInterval: 1h
  # secretName -> { secretKey -> {key, property} }  (ssegning-aws remoteRef)
  secrets:
    librechat-main-config:
      converse_openai_api_key: { key: ai/camer/digital/prod/env, property: converse_openai_api_key }
    librechat-config:
      creds_key: { key: ai/camer/digital/prod/env, property: librechat_config_creds_key }
      creds_iv: { key: ai/camer/digital/prod/env, property: librechat_config_creds_iv }
      jwt_secret: { key: ai/camer/digital/prod/env, property: librechat_config_jwt_secret }
      jwt_refresh_secret: { key: ai/camer/digital/prod/env, property: librechat_config_jwt_refresh_secret }
    librechat-openid-config:
      client_id: { key: ai/camer/digital/prod/env, property: librechat_openid_config_client_id }
      client_secret: { key: ai/camer/digital/prod/env, property: librechat_openid_config_client_secret }
      session_secret: { key: ai/camer/digital/prod/env, property: librechat_openid_config_session_secret }
    librechat-meili-config:
      MEILI_MASTER_KEY: { key: ai/camer/digital/prod/env, property: librechat_meili_config_meili_master_key }
    librechat-mcp-cd-credentials:
      client_id: { key: ai/camer/digital/prod/env, property: librechat_mcp_cd_credentials_client_id }
      client_secret: { key: ai/camer/digital/prod/env, property: librechat_mcp_cd_credentials_client_secret }
    librechat-mcp-github:
      client_id: { key: ai/camer/digital/prod/env, property: librechat_mcp_github_client_id }
      client_secret: { key: ai/camer/digital/prod/env, property: librechat_mcp_github_client_secret }
    librechat-mcp-coder-credentials:
      client_id: { key: ai/camer/digital/prod/env, property: librechat_mcp_coder_credentials_client_id }
      client_secret: { key: ai/camer/digital/prod/env, property: librechat_mcp_coder_credentials_client_secret }
    librechat-websearch-config:
      serper_api_key: { key: ai/camer/digital/prod/env, property: librechat_websearch_config_serper_api_key }
      firecrawl_api_key: { key: ai/camer/digital/prod/env, property: librechat_websearch_config_firecrawl_api_key }
      jina_api_key: { key: ai/camer/digital/prod/env, property: librechat_websearch_config_jina_api_key }

global:
  librechat:
    version: "v0.8.5"
  rag_librechat:
    version: "v0.7.2"
  mongo:
    replicaCount: 1
    replicaSetName: rs0
  configmap:
    name: "librechat-config"

librechat:
  ingress:
    librechat:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: cert-home-cert-http
      className: traefik
      hosts:
        - host: ai-v2.camer.digital
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: librechat
                port: http
      tls:
        - secretName: ai-v2.camer.digital-tls
          hosts:
            - ai-v2.camer.digital

  rawResources:
    hpa:
      enabled: true
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      spec:
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: librechat
          minReplicas: 1
          maxReplicas: 4
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 70
            - type: Resource
              resource:
                name: memory
                target:
                  type: Utilization
                  averageUtilization: 80

  service:
    librechat:
      enabled: true
      annotations: { }
      type: ClusterIP
      controller: librechat
      ports:
        http:
          enabled: true
          port: 3080
          targetPort: 3080

    rag-api:
      enabled: false
      annotations: { }
      type: ClusterIP
      controller: rag-api
      ports:
        http:
          enabled: true
          port: 8000
          targetPort: 8000

  controllers:
    librechat:
      type: deployment
      strategy: RollingUpdate
      replicas: 2
      podDisruptionBudget:
        minAvailable: 1
      pod:
        labels:
          app: librechat-app
      containers:
        librechat:
          image:
            repository: ghcr.io/danny-avila/librechat
            tag: "{{ .Values.global.librechat.version }}"
            pullPolicy: Always
          env:
            PUID: "1000"
            PGID: "1000"
            TZ: "Europe/Berlin"

            # Trust the internal CA (Home Root CA, self-signed-ca) for in-cluster
            # TLS — both the api-internal gateway listener (the Converse / image-gen
            # baseURLs below) and redis-ha. ca.crt is mounted at /etc/internal-ca
            # from the librechat-internal-ca cert (templates/certificate-internal-ca.yaml).
            NODE_EXTRA_CA_CERTS: "/etc/internal-ca/ca.crt"

            ALLOW_EMAIL_LOGIN: "false"
            ALLOW_REGISTRATION: "false"
            ALLOW_SOCIAL_LOGIN: "true"
            ALLOW_SOCIAL_REGISTRATION: "true"
            REFRESH_TOKEN_EXPIRY: 5184000000 # "(1000 * 60 * 60 * 24) * 60 => 60 days"

            OPENID_ISSUER: "https://auth.verif.fyi/realms/camer-digital"
            OPENID_CALLBACK_URL: "/oauth/openid/callback"
            OPENID_SCOPE: "openid profile email librechat"
            #OPENID_REQUIRED_ROLE: "user" # Now we're in open beta; everyone can connect and test
            OPENID_REQUIRED_ROLE_TOKEN_KIND: "access"
            OPENID_REQUIRED_ROLE_PARAMETER_PATH: "librechat_roles"
            OPENID_AUTO_REDIRECT: "true"
            OPENID_REUSE_TOKENS: "true"
            OPENID_AUDIENCE: "converse"

            #OPENAI_API_KEY: "user_provided"
            #OPENAI_MODELS: "gpt-3.5-turbo-0125,gpt-3.5-turbo-0301,gpt-3.5-turbo,gpt-4,gpt-4-0613,gpt-4-vision-preview,gpt-3.5-turbo-0613,gpt-3.5-turbo-16k-0613,gpt-4-0125-preview,gpt-4-turbo-preview,gpt-4-1106-preview,gpt-3.5-turbo-1106,gpt-3.5-turbo-instruct,gpt-3.5-turbo-instruct-0914,gpt-3.5-turbo-16k"

            #GOOGLE_KEY: "user_provided"
            #GOOGLE_MODELS: "gemini-3-pro-preview,gemini-3-pro-image-preview,gemini-3-flash-preview,gemini-2.5-flash,gemini-2.5-flash-lite,gemini-2.5-pro"

            #DEBUG_LOGGING: true
            #DEBUG_CONSOLE: true

            LOGIN_MAX: "50"
            LOGIN_WINDOW: "1"

            CD_MCP_CLIENT_ID:
              secretKeyRef:
                name: librechat-mcp-cd-credentials
                key: client_id
            CD_MCP_SECRET_ID:
              secretKeyRef:
                name: librechat-mcp-cd-credentials
                key: client_secret

            GITHUB_MCP_CLIENT_ID:
              secretKeyRef:
                name: librechat-mcp-github
                key: client_id
            GITHUB_MCP_SECRET_ID:
              secretKeyRef:
                name: librechat-mcp-github
                key: client_secret

            CODERS_MCP_CLIENT_ID:
              secretKeyRef:
                name: librechat-mcp-coder-credentials
                key: client_id
            CODERS_MCP_SECRET:
              secretKeyRef:
                name: librechat-mcp-coder-credentials
                key: client_secret

            OPENID_CLIENT_ID:
              secretKeyRef:
                name: librechat-openid-config
                key: client_id
            OPENID_CLIENT_SECRET:
              secretKeyRef:
                name: librechat-openid-config
                key: client_secret
            OPENID_SESSION_SECRET:
              secretKeyRef:
                name: librechat-openid-config
                key: session_secret

            DEBUG_OPENID_REQUESTS: "true"

            # Optional: redirects the user to the end session endpoint after logging out
            OPENID_USE_END_SESSION_ENDPOINT: "true"

            #RAG_API_URL: "http://{{ .Release.Name }}-rag-api:8000"

            DOMAIN_CLIENT: &url "https://ai-v2.camer.digital"
            DOMAIN_SERVER: *url
            NO_INDEX: "true"
            # TRUST_PROXY: "-1"

            USE_REDIS: "true"
            REDIS_KEY_PREFIX: "librechat-prod-v2"
            # redis-ha is TLS-ONLY (port 0 / tls-port 6379), server cert from the
            # internal self-signed-ca. Connect with the `rediss://` scheme and
            # trust that CA via REDIS_CA (ca.crt mounted from the internalCaTrust
            # cert at /etc/internal-ca). Plaintext `redis://` gets reset.
            REDIS_URI: "rediss://redis-ha-redis.redis-system.svc.cluster.local:6379"
            REDIS_CA: "/etc/internal-ca/ca.crt"
            # redis-ha requires auth. LibreChat applies REDIS_PASSWORD on top
            # of REDIS_URI. Secret `redis-ha-redis-auth` (key `redis-password`)
            # exists in this namespace (converse) via the redisExternalSecret
            # above (mirrors the redis-system one).
            REDIS_PASSWORD:
              secretKeyRef:
                name: redis-ha-redis-auth
                key: redis-password
            FORCED_IN_MEMORY_CACHE_NAMESPACES: "APP_CONFIG,CONFIG_STORE,STARTUP_CONFIG"

            SEARCH: true
            # Meilisearch runs in a separate Application (charts/librechat-search) but
            # exposes a fixed in-namespace Service. The release-name for that chart is
            # `librechat-search`, so the Service follows the chart's standard pattern.
            MEILI_HOST: "http://librechat-search:7700"
            MEILI_MASTER_KEY:
              secretKeyRef:
                name: librechat-meili-config
                key: MEILI_MASTER_KEY

            MONGO_URI: '{{ include "mongo_uri" $ }}'

            CREDS_KEY:
              secretKeyRef:
                name: librechat-config
                key: creds_key
            CREDS_IV:
              secretKeyRef:
                name: librechat-config
                key: creds_iv
            JWT_SECRET:
              secretKeyRef:
                name: librechat-config
                key: jwt_secret
            JWT_REFRESH_SECRET:
              secretKeyRef:
                name: librechat-config
                key: jwt_refresh_secret

            CONVERSE_OPENAI_API_KEY:
              secretKeyRef:
                name: librechat-main-config
                key: converse_openai_api_key

            # Web Search Configuration - Reference environment variables from secrets
            # Search Provider: Serper (you can also use SearXNG)
            SERPER_API_KEY:
              secretKeyRef:
                name: librechat-websearch-config
                key: serper_api_key

            # Scraper: Firecrawl
            FIRECRAWL_API_KEY:
              secretKeyRef:
                name: librechat-websearch-config
                key: firecrawl_api_key

            # Reranker: Jina (you can also use Cohere)
            JINA_API_KEY:
              secretKeyRef:
                name: librechat-websearch-config
                key: jina_api_key

            # Image Generation Configuration - Reference environment variables from secrets
            #  Image Generation
            IMAGE_GEN_OAI_API_KEY:
              secretKeyRef:
                name: librechat-main-config
                key: converse_openai_api_key

            # OpenAI-compatible Converse LLM API base URL
            # Internal plane (ADR-0021): in-cluster, via the api-internal listener.
            IMAGE_GEN_OAI_BASEURL: https://core-gateway-internal.envoy-gateway-system.svc.cluster.local/v1
            IMAGE_GEN_OAI_MODEL: gemini-2.5-flash-image


            AWS_REGION:
              secretKeyRef:
                name: librechat-s3-config
                key: s3_region_name
            AWS_ACCESS_KEY_ID:
              secretKeyRef:
                name: librechat-s3-config
                key: s3_access_key_id
            AWS_SECRET_ACCESS_KEY:
              secretKeyRef:
                name: librechat-s3-config
                key: s3_secret_access_key
            AWS_BUCKET_NAME:
              secretKeyRef:
                name: librechat-s3-config
                key: s3_bucket_name
            # Hetzner Object Storage (nbg1) — the shared `ssegning-k8s-state`
            # bucket (see s3ExternalSecret below). Path-style for Ceph-RGW.
            AWS_ENDPOINT_URL: "https://nbg1.your-objectstorage.com"
            AWS_FORCE_PATH_STYLE: "true"

          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
          probes:
            liveness:
              enabled: true
              path: /health
              type: HTTP
              spec:
                httpGet:
                  port: http
            readiness:
              enabled: true
              path: /health
              type: HTTP
              spec:
                httpGet:
                  port: http
            startup:
              enabled: true
              path: /health
              type: HTTP
              spec:
                httpGet:
                  port: http
                failureThreshold: 30
                periodSeconds: 5

    rag-api:
      enabled: false
      type: statefulset
      strategy: RollingUpdate
      replicas: 1
      pod:
        labels:
          app: librechat-app
      containers:
        rag-api:
          image:
            repository: ghcr.io/danny-avila/librechat-rag-api-dev-lite
            tag: "{{ .Values.global.rag_librechat.version }}"
            pullPolicy: Always
          env:
            PUID: "1000"
            PGID: "1000"
            TZ: "Europe/Berlin"

            RAG_OPENAI_BASEURL: "http://envoy-converse-gateway-core-gateway-c480b207.envoy-gateway-system.svc.cluster.local/v1"
            RAG_OPENAI_API_KEY:
              secretKeyRef:
                name: librechat-main-config
                key: converse_openai_api_key

            EMBEDDINGS_MODEL: "text-embedding-3-small"
            EMBEDDING_BATCH_SIZE: 750

          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
          probes:
            liveness:
              enabled: true
              path: /
              type: HTTP
              spec:
                httpGet:
                  port: http
            readiness:
              enabled: true
              path: /
              type: HTTP
              spec:
                httpGet:
                  port: http
            startup:
              enabled: true
              path: /
              type: HTTP
              spec:
                httpGet:
                  port: http
                failureThreshold: 30
                periodSeconds: 5

  persistence:
    config:
      enabled: true
      type: configMap
      name: '{{ .Values.global.configmap.name }}'
      advancedMounts:
        librechat:
          librechat:
            - path: /app/librechat.yaml
              subPath: librechat
              readOnly: true
    # Internal-CA ca.crt (Home Root CA) for in-cluster TLS — redis-ha (REDIS_CA)
    # AND the api-internal gateway listener (NODE_EXTRA_CA_CERTS), both pointing
    # at /etc/internal-ca/ca.crt. Secret created by
    # templates/certificate-internal-ca.yaml (parent chart). Name hardcoded here
    # because this block renders in the bjw-s subchart context, where the
    # parent-level `.Values.internalCaTrust` is unset.
    internal-ca:
      enabled: true
      type: secret
      name: librechat-internal-ca
      advancedMounts:
        librechat:
          librechat:
            - path: /etc/internal-ca
              readOnly: true

  networkpolicies:
    librechat:
      enabled: true
      controller: librechat
      policyTypes:
        - Ingress
        - Egress
      rules:
        ingress:
          - {}
        egress:
          - {}

# ────────────────────────────────────────────────────────────────────────
# librechat.yaml config — mounted at /app/librechat.yaml via the
# ConfigMap rendered in templates/configmap.yaml.
# ────────────────────────────────────────────────────────────────────────
config:
  version: 1.3.5
  cache: true
  fileStrategy: "s3"
  interface:
    endpointsMenu: true
    modelSelect: true
    parameters: true
    presets: true
    agents:
      use: true
      create: true
      share: true
      public: true
    mcpServers:
      use: true
      create: true
      share: false
      public: false

  # Balance settings
  balance:
    enabled: false               # Enable token credit balances for users
    startBalance: 20000          # Initial tokens credited upon registration
    autoRefillEnabled: false     # Enable automatic token refills
    refillIntervalValue: 30      # Numerical value for refill interval
    refillIntervalUnit: "days"   # Time unit for refill interval (days, hours, etc.)
    refillAmount: 10000          # Tokens added during each refill

  # Web Search Configuration
  webSearch:
    # Search Provider Configuration - use environment variable references
    serperApiKey: "${SERPER_API_KEY}"
    # Alternative: SearXNG (uncomment if using)
    # searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
    # searxngApiKey: "${SEARXNG_API_KEY}"

    # Scraper Configuration
    firecrawlApiKey: "${FIRECRAWL_API_KEY}"
    # Optional: Custom Firecrawl instance
    # firecrawlApiUrl: "${FIRECRAWL_API_URL}"

    # Reranker Configuration - Jina (or use Cohere)
    jinaApiKey: "${JINA_API_KEY}"
    # Optional: Custom Jina instance
    # jinaApiUrl: "${JINA_API_URL}"
    # Alternative: Cohere
    # cohereApiKey: "${COHERE_API_KEY}"

    # General Settings
    safeSearch: 0  # Options: 0 (OFF), 1 (MODERATE - default), 2 (STRICT)

  mcpServers:
    github_issues:
      title: "GH Issues"
      type: "streamable-http"
      description: "Provides access to GitHub issues across all repositories the user has access to, with support for filtering by organization, repository, assignee, and more."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/issues"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai-v2.camer.digital/api/mcp/github_issues/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    github_projects:
      title: "GH Project"
      type: "streamable-http"
      description: "Provides access to GitHub projects across all repositories the user has access to, with support for filtering by organization, repository, assignee, and more."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/projects"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai-v2.camer.digital/api/mcp/github_projects/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    github_pull_requests:
      title: "GH PR"
      type: "streamable-http"
      description: "Provides access to GitHub pull requests across all repositories the user has access to, with support for filtering by organization, repository, assignee, and more."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/pull_requests"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai-v2.camer.digital/api/mcp/github_pull_requests/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    github_repos:
      title: "GH Reps"
      type: "streamable-http"
      description: "Provides access to GitHub repositories across all repositories the user has access to, with support for filtering by organization, repository, assignee, and more."
      initTimeout: 150000
      url: "https://api.githubcopilot.com/mcp/x/repos"
      iconPath: https://raw.githubusercontent.com/ADORSYS-GIS/ai-helm/main/assets/images/GitHub_Invertocat_White.png
      oauth:
        authorization_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        client_id: ${GITHUB_MCP_CLIENT_ID}
        client_secret: ${GITHUB_MCP_SECRET_ID}
        redirect_uri: https://ai-v2.camer.digital/api/mcp/github_repos/oauth/callback
        scope: "repo repo:status repo_deployment public_repo repo:invite security_events admin:repo_hook write:repo_hook read:repo_hook admin:org write:org read:org admin:org_hook read:public_key write:public_key admin:public_key gist notifications user read:user user:email user:follow project read:project delete_repo write:packages read:packages delete:packages admin:gpg_key write:gpg_key read:gpg_key codespace workflow read:audit_log"
    github_github_support_docs_search:
      title: "GH Docs"
