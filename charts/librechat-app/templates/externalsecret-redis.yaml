{{- if .Values.redisExternalSecret.enabled }}
# redis-ha-redis-auth — password for the shared redis-ha (home-os, redis-system),
# materialised in this namespace so LibreChat can read REDIS_PASSWORD. redis-ha
# is password-protected + TLS-only; this provides the password only (TLS trust of
# the internal self-signed-ca is a separate cert-manager Certificate). The value
# is the platform secret prod/meta/test-app / redis_password — every redis
# consumer namespace needs its own copy (CLAUDE.md).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.redisExternalSecret.secretName | default "redis-ha-redis-auth" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.redisExternalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.redisExternalSecret.secretStore | default "ssegning-aws" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.redisExternalSecret.secretName | default "redis-ha-redis-auth" }}
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: {{ .Values.redisExternalSecret.remoteRef.key | quote }}
        property: {{ .Values.redisExternalSecret.remoteRef.passwordProperty | quote }}
{{- end }}
