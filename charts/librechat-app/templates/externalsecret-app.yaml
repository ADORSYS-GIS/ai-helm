{{- if .Values.librechatSecrets.enabled }}
{{- $store := .Values.librechatSecrets.secretStore }}
{{- $refresh := .Values.librechatSecrets.refreshInterval | default "1h" }}
{{- range $secretName, $keys := .Values.librechatSecrets.secrets }}
{{- if $keys }}
---
# Scaffold for the user-owned secret `{{ $secretName }}`. Fill the remoteRef
# key/property in values (librechatSecrets.secrets) — until then this won't sync.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "common.labels.standard" $ | nindent 4 }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    {{- range $secretKey, $ref := $keys }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        key: {{ $ref.key | quote }}
        property: {{ $ref.property | quote }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
