{{- if .Values.s3ExternalSecret.enabled }}
# librechat-s3-config — S3 file storage creds for LibreChat (fileStrategy: s3).
# Builds the Secret the app's AWS_* envs reference (charts/librechat-app
# values.yaml). region + bucket are plain config templated in; only the
# access/secret keys are fetched from ssegning-aws (the SAME material Keycloak's
# CNPG backups + the observability stores use — Hetzner Object Storage).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librechat-s3-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.s3ExternalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.s3ExternalSecret.secretStore }}
    kind: ClusterSecretStore
  target:
    name: librechat-s3-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        s3_region_name: {{ .Values.s3ExternalSecret.region | quote }}
        s3_bucket_name: {{ .Values.s3ExternalSecret.bucket | quote }}
        s3_access_key_id: "{{ `{{ .accessKeyId }}` }}"
        s3_secret_access_key: "{{ `{{ .secretAccessKey }}` }}"
  data:
    - secretKey: accessKeyId
      remoteRef:
        key: {{ .Values.s3ExternalSecret.remoteRef.key | quote }}
        property: {{ .Values.s3ExternalSecret.remoteRef.accessKeyIdProperty | quote }}
    - secretKey: secretAccessKey
      remoteRef:
        key: {{ .Values.s3ExternalSecret.remoteRef.key | quote }}
        property: {{ .Values.s3ExternalSecret.remoteRef.secretAccessKeyProperty | quote }}
{{- end }}
