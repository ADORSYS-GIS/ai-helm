{{- /*
Per-backend API-key ExternalSecrets.

Each APIKey backend's BackendSecurityPolicy references a Secret by name
(`secretRef.name`) holding the provider key under the `apiKey` data key. This
template lets the backends chart OWN those Secrets via the External Secrets
Operator (pulled from the `ssegning-aws` ClusterSecretStore) instead of relying
on an out-of-band app (the old `aii-secret`) to provision them.

Behaviour:
  - Gated on `.Values.externalSecrets.enabled` (default true).
  - One ExternalSecret per UNIQUE `secretRef.name` — deduped, because several
    backends can share a key (e.g. deepinfra-01 + deepinfra-02 both use
    `deepinfra-api-key-only`). Two ExternalSecrets owning the same target Secret
    would fight, so the first backend that names a given secret wins.
  - Only emitted for backends that carry an `externalSecret: {key, property}`
    block (the ssegning-aws remoteRef coordinates). Backends without one keep
    relying on an externally-provided Secret (no ExternalSecret rendered).
  - GCPCredentials backends are skipped (their secret shape differs; none use
    it today).

⚠️ Cutover: while the old `aii-secret` app still provisions these same Secret
names, having ESO own them here too means two owners. Remove them from
`aii-secret` as each backend's ExternalSecret here goes live.
*/ -}}
{{- if .Values.externalSecrets.enabled }}
{{- $store   := .Values.externalSecrets.secretStore | default "ssegning-aws" }}
{{- $refresh := .Values.externalSecrets.refreshInterval | default "1h" }}
{{- $dataKey := .Values.externalSecrets.apiKeyDataKey | default "apiKey" }}
{{- $seen := dict }}
{{- range $backendName, $cfg := .Values.backends }}
{{- if and (not (eq $cfg.enabled false)) $cfg.externalSecret $cfg.secretRef $cfg.secretRef.name (ne $cfg.type "GCPCredentials") }}
{{- $secretName := $cfg.secretRef.name }}
{{- if not (hasKey $seen $secretName) }}
{{- $_ := set $seen $secretName true }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "common.labels.standard" $ | nindent 4 }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ $dataKey }}
      remoteRef:
        key: {{ required (printf "backend %q externalSecret.key is required" $backendName) $cfg.externalSecret.key | quote }}
        property: {{ required (printf "backend %q externalSecret.property is required" $backendName) $cfg.externalSecret.property | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
