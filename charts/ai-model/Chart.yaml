apiVersion: v2
name: ai-model
description: |
  Renders one AI model on the gateway: AIGatewayRoute + BackendTrafficPolicy
  for a single `modelName`. Designed to be instantiated N times by the
  orchestrating ApplicationSet in charts/ai-models — one Application per
  enabled model.

  Per-model rate limits, pricing strategy, and backend routing all flow
  via values. The shared cost-expression helpers live in this chart's
  _helpers.tpl (consolidated from the pre-split ai-models chart).
type: application
version: 1.0.0
appVersion: "1.0.0"
# Render-only LEAF chart: the orchestrating ApplicationSet in charts/ai-models
# (ADR-0012) injects per-model values that the templates `fail`-guard on
# (modelName, gatewayRef, backendsInventory, ≥2 enabled backends, pricing,
# plans). With the default (empty) values.yaml the chart intentionally refuses
# to render, so it can't be lint/render-tested standalone. CI (.github/
# workflows/helm-lint.yaml) reads this annotation and lint+renders the chart via
# its ci/*-values.yaml fixtures instead of the default values.
annotations:
  ai-helm.adorsys-gis.github.io/lint-mode: ci-values
keywords:
  - ai-gateway
  - envoy-ai-gateway
maintainers:
  - name: ai-helm

dependencies:
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
