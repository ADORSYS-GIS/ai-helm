{{- /*
BackendTrafficPolicy — per-model rate limiting (ADR-0021).

Up to THREE rule families per plan, all composed (Envoy denies if ANY matched
bucket is exhausted):

  1. burst requests/min — keyed on x-account-id + x-billing-plan (per user per model).
  2. burst tokens/min   — keyed on x-account-id + x-billing-plan, cost = the llm_total_token
                          response metadata (TotalToken) the AIGatewayRoute emits.
  3. monthly budget     — keyed on (x-account-id, x-billing-plan) ONLY — no
                          model selector — so the budget is a SINGLE shared
                          counter across ALL models (ADR-0035). micro-USD,
                          cost = llm_custom_total_cost response metadata.
                          Emitted ONLY for plans that carry a budget →
                          service/internal stay uncapped.

x-billing-plan (stamped by the AuthConfig from Keycloak's billing_plan claim (from group attribute)) selects the plan.

Budget per plan = global plan default (.Values.plans.<plan>.monthlyBudgetUsd) — no per-model overrides for shared budget
else the global plan default (.Values.plans.<plan>.monthlyBudgetUsd). Burst
(rules 1+2) remains per-model; comes from .Values.plans.<plan>.burst.

⚠️ Every clientSelectors header spells out `invert: false` explicitly, even
though it's the zero value. The BackendTrafficPolicy CRD schema declares
`default: false` for this field, so the k8s API server stamps it onto the
LIVE object on every apply regardless of what we send — omitting it here
made ArgoCD's diff perpetually see "live has extra fields" and every model
Application showed a permanent, cosmetic OutOfSync. Spelling it out here
makes the rendered manifest match what the API server actually stores.
*/ -}}
{{- $modelName := .Values.modelName -}}
{{- $plans := .Values.plans -}}
{{- $costKey := "llm_custom_total_cost" -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $modelName }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $modelName }}
  {{- /*
  Per-model upstream timeout.
  */ -}}
  {{- $t := .Values.timeout | default dict }}
  timeout:
    http:
      requestTimeout: {{ $t.requestTimeout | default "600s" | quote }}
      {{- with $t.connectionIdleTimeout }}
      connectionIdleTimeout: {{ . | quote }}
      {{- end }}
  rateLimit:
    type: Global
    global:
      rules:
        {{- range $planName, $planCfg := $plans }}
        {{- $burst := default dict $planCfg.burst }}
        {{- /* ── 1. burst: requests/min (per-user per model) ── */}}
        {{- with $burst.requestsPerMin }}
        - clientSelectors:
            - headers:
                - invert: false
                  name: x-account-id
                  type: Distinct
                - invert: false
                  name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - invert: false
                  name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ int64 . }} # {{ $planName }} burst req/min per model
            unit: Minute
          cost:
            request:
              from: Number
              number: 1
        {{- end }}
        {{- /* ── 2. burst: tokens/min (per-user per model) ── */}}
        {{- with $burst.tokensPerMin }}
        - clientSelectors:
            - headers:
                - invert: false
                  name: x-account-id
                  type: Distinct
                - invert: false
                  name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - invert: false
                  name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ int64 . }} # {{ $planName }} burst tokens/min per model
            unit: Minute
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token
        {{- end }}
        {{- /* ── 3. monthly budget (SHARED across all models per user, micro-USD) ── */}}
        {{- $budgetUsd := $planCfg.monthlyBudgetUsd }}
        {{- with $budgetUsd }}
        {{- $limit := mulf . 1000000 | int64 }}
        - clientSelectors:
            - headers:
                - invert: false
                  name: x-account-id
                  type: Distinct
                - invert: false
                  name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
          limit:
            requests: {{ $limit }} # {{ $planName }} monthly budget ${{ . }} — shared across ALL models
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ $costKey }}
        {{- end }}
        {{- end }}
