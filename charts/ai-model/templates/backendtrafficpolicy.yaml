{{- /*
BackendTrafficPolicy — per-model rate limiting (ADR-0021).

Up to THREE rule families per plan, all composed (Envoy denies if ANY matched
bucket is exhausted):

  1. burst requests/min — keyed on x-account-id (per user / SA), cost = 1/request.
  2. burst tokens/min   — keyed on x-account-id, cost = the llm_total_token
                          response metadata (TotalToken) the AIGatewayRoute emits.
  3. monthly budget     — keyed on (x-account-id, x-billing-plan) ONLY — no
                          model selector — so the budget is a SINGLE shared
                          counter across ALL models (ADR-0035). micro-USD,
                          cost = llm_custom_total_cost response metadata.
                          Emitted ONLY for plans that carry a budget →
                          service/internal stay uncapped.

x-billing-plan (stamped by the AuthConfig from Keycloak) selects the plan.

Budget per plan = per-model override (.Values.rateLimitBudgeting.<plan>, USD)
else the global plan default (.Values.plans.<plan>.monthlyBudgetUsd). Burst
(rules 1+2) remains per-model; comes from .Values.plans.<plan>.burst.
*/ -}}
{{- $modelName := .Values.modelName -}}
{{- $overrides := default dict .Values.rateLimitBudgeting -}}
{{- $plans := .Values.plans -}}
{{- $costKey := "llm_custom_total_cost" -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $modelName }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $modelName }}
  {{- /*
  Per-model upstream timeout. A route-scoped BackendTrafficPolicy REPLACES the
  gateway-wide one for its route (Envoy Gateway = closest-wins, no merge), so
  without this a model route falls back to Envoy's DEFAULT ~15s route timeout →
  a slow/cold backend returns 504 "upstream request timeout". We therefore ALWAYS
  emit requestTimeout, defaulting to 600s (ADR-0034) so cloud models get a real
  budget too — not just the self-hosted ones that set it explicitly. Override per
  model via .Values.timeout.requestTimeout (e.g. shorter for rerankers/embeddings,
  longer to ride a cold start). connectionIdleTimeout is opt-in.
  */ -}}
  {{- $t := .Values.timeout | default dict }}
  timeout:
    http:
      requestTimeout: {{ $t.requestTimeout | default "600s" | quote }}
      {{- with $t.connectionIdleTimeout }}
      connectionIdleTimeout: {{ . | quote }}
      {{- end }}
  rateLimit:
    type: Global
    global:
      rules:
        {{- range $planName, $planCfg := $plans }}
        {{- $burst := default dict $planCfg.burst }}
        {{- /* ── 1. burst: requests/min (per-user) ── */}}
        {{- with $burst.requestsPerMin }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ int64 . }} # {{ $planName }} burst req/min for {{ $modelName | quote }}
            unit: Minute
          cost:
            request:
              from: Number
              number: 1
        {{- end }}
        {{- /* ── 2. burst: tokens/min (per-user, dynamic from llm_total_token) ── */}}
        {{- with $burst.tokensPerMin }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ int64 . }} # {{ $planName }} burst tokens/min for {{ $modelName | quote }}
            unit: Minute
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token
        {{- end }}
        {{- /* ── 3. monthly budget (per-person, micro-USD) — skipped ⇒ uncapped ── */}}
        {{- $budgetUsd := or (index $overrides $planName) $planCfg.monthlyBudgetUsd }}
        {{- with $budgetUsd }}
        {{- $limit := mulf . 1000000 | int64 }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
          limit:
            requests: {{ $limit }} # {{ $planName }} monthly budget ${{ . }} — shared across ALL models
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ $costKey }}
        {{- end }}
        {{- end }}
