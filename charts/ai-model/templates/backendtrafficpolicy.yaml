{{- /*
BackendTrafficPolicy — per-model rate limiting (ADR-0021).

Up to THREE rule families per plan, all composed (Envoy denies if ANY matched
bucket is exhausted):

  1. burst requests/min — keyed on x-account-id (per user / SA), cost = 1/request.
  2. burst tokens/min   — keyed on x-account-id, cost = the llm_total_token
                          response metadata (TotalToken) the AIGatewayRoute emits.
  3. monthly budget     — keyed on x-org-id (per org), micro-USD, cost = the
                          cost_<model> response metadata (the pricing CEL, which
                          already yields micro-USD). Emitted ONLY for plans that
                          carry a budget → service/internal stay uncapped.

x-billing-plan (stamped by the AuthConfig from Keycloak) selects the plan.

Budget per plan = per-model override (.Values.rateLimitBudgeting.<plan>, USD)
else the global plan default (.Values.plans.<plan>.monthlyBudgetUsd). Burst
comes from .Values.plans.<plan>.burst.
*/ -}}
{{- $modelName := .Values.modelName -}}
{{- $overrides := default dict .Values.rateLimitBudgeting -}}
{{- $plans := .Values.plans -}}
{{- $costKey := include "ai-model.metadataKeySafe" $modelName -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $modelName }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $modelName }}
  {{- /*
  Per-model upstream timeout (optional). A route-scoped BackendTrafficPolicy
  REPLACES the gateway-wide one for its route (Envoy Gateway = closest-wins, no
  merge), so without this a model route falls back to Envoy's DEFAULT ~15s route
  timeout → a slow/cold backend returns 504 "upstream request timeout". Set
  `timeout.requestTimeout` high enough to ride a cold start + a long generation
  (e.g. the self-hosted model scaling from zero). Unset ⇒ Envoy default.
  */ -}}
  {{- with .Values.timeout }}
  timeout:
    http:
      {{- with .requestTimeout }}
      requestTimeout: {{ . | quote }}
      {{- end }}
      {{- with .connectionIdleTimeout }}
      connectionIdleTimeout: {{ . | quote }}
      {{- end }}
  {{- end }}
  rateLimit:
    type: Global
    global:
      rules:
        {{- range $planName, $planCfg := $plans }}
        {{- $burst := default dict $planCfg.burst }}
        {{- /* ── 1. burst: requests/min (per-user) ── */}}
        {{- with $burst.requestsPerMin }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ int64 . }} # {{ $planName }} burst req/min for {{ $modelName | quote }}
            unit: Minute
          cost:
            request:
              from: Number
              number: 1
        {{- end }}
        {{- /* ── 2. burst: tokens/min (per-user, dynamic from llm_total_token) ── */}}
        {{- with $burst.tokensPerMin }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ int64 . }} # {{ $planName }} burst tokens/min for {{ $modelName | quote }}
            unit: Minute
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token
        {{- end }}
        {{- /* ── 3. monthly budget (per-org, micro-USD) — skipped ⇒ uncapped ── */}}
        {{- $budgetUsd := or (index $overrides $planName) $planCfg.monthlyBudgetUsd }}
        {{- with $budgetUsd }}
        {{- $limit := mulf . 1000000 | int64 }}
        - clientSelectors:
            - headers:
                - name: x-org-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ $limit }} # {{ $planName }} monthly budget ${{ . }} for {{ $modelName | quote }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ $costKey }}
        {{- end }}
        {{- end }}
