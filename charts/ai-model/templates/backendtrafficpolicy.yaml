{{- /*
BackendTrafficPolicy — per-model, per-plan rate limiting via Global Rate Limit.

Weighted/Tiered models: limits expressed in micro-USD (budget * 1e6).
Flat models: limits in USD (budget used directly).
*/ -}}
{{- $modelName := .Values.modelName -}}
{{- $modelBudgets := default dict .Values.rateLimitBudgeting -}}
{{- $strategy := .Values.pricing.strategy -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $modelName }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $modelName }}
  rateLimit:
    type: Global
    global:
      rules:
        {{- if $modelBudgets }}
        {{- $freeBudget := index $modelBudgets "free" | default (index $.Values.plans "free" "monthlyBudgetUsd" | default 30) }}
        {{- $proBudget := index $modelBudgets "pro" | default (index $.Values.plans "pro" "monthlyBudgetUsd" | default 200) }}

        {{- $freeLimit := mulf $freeBudget 1000000 | int64 }}
        {{- $proLimit := mulf $proBudget 1000000 | int64 }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: "free"
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ $freeLimit }} # custom free budget for {{ $modelName | quote }} / ${{ $freeBudget }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-model.metadataKeySafe" $modelName }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: "pro"
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ $proLimit }} # custom pro budget for {{ $modelName | quote }} / ${{ $proBudget }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-model.metadataKeySafe" $modelName }}
        {{- else }}
        {{- range $planName, $planConfig := $.Values.plans }}
        {{- $budget := $planConfig.monthlyBudgetUsd | default 30 }}
        {{- $planLimit := mulf $budget 1000000 | int64 }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $modelName | quote }}
          limit:
            requests: {{ $planLimit }} # {{ $planName | quote }} budget for {{ $modelName | quote }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-model.metadataKeySafe" $modelName }}
        {{- end }}
        {{- end }}
