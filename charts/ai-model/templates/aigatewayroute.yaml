{{- /* Required-field guards */ -}}
{{- if not .Values.modelName }}{{- fail "ai-model: .Values.modelName is required" -}}{{- end -}}
{{- if not .Values.gatewayRef.name }}{{- fail "ai-model: .Values.gatewayRef.name is required" -}}{{- end -}}
{{- if not .Values.backendsInventory }}{{- fail "ai-model: .Values.backendsInventory is required (the parent's backends map, for resourceName lookup)" -}}{{- end -}}
{{- $modelName := .Values.modelName -}}
{{- /* Route-level request budget. The AIGatewayRoute CRD DEFAULTS
       rules[].timeouts.request to 60s when unset, and that route timeout takes
       PRECEDENCE over the BackendTrafficPolicy upstream timeout — so without an
       explicit value here, long generations are cut at 60s no matter what the
       per-model BTP says (ADR-0034). Default 600s; per-model override via
       .Values.timeout.requestTimeout. */ -}}
{{- $reqTimeout := (.Values.timeout | default dict).requestTimeout | default "600s" -}}
{{- /* Filter and validate backends */ -}}
{{- $activeBackends := dict -}}
{{- range $bKey, $bVal := .Values.backends }}
  {{- if not (eq $bVal.enabled false) }}
    {{- $_ := set $activeBackends $bKey $bVal -}}
  {{- end }}
{{- end }}
{{- $minBackends := default 2 .Values.minBackends | int -}}
{{- if lt (len $activeBackends) $minBackends -}}
{{- fail (printf "Model '%s' must have at least %d enabled backends. Found: %d" $modelName $minBackends (len $activeBackends)) -}}
{{- end }}
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: {{ $modelName }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayRef.name }}
      namespace: {{ .Values.gatewayRef.namespace }}
      {{- with .Values.gatewayRef.sectionName }}
      # Pin to the HTTPS listener so model traffic is HTTPS-only; the :80
      # listener is left to the http→https redirect + the ACME solver.
      sectionName: {{ . }}
      {{- end }}
    {{- with .Values.gatewayRef.internalSectionName }}
    # Internal plane (ADR-0021): also attach to the api-internal listener so the
    # same model backends serve in-cluster callers. The per-host AuthConfig sets
    # the tier; the BackendTrafficPolicy (targeting this route) is shared.
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gatewayRef.name }}
      namespace: {{ $.Values.gatewayRef.namespace }}
      sectionName: {{ . }}
    {{- end }}
  llmRequestCosts:
    - metadataKey: llm_input_token
      type: InputToken
    - metadataKey: llm_cached_input_token
      type: CachedInputToken
    - metadataKey: llm_output_token
      type: OutputToken
    - metadataKey: llm_total_token
      type: TotalToken
    # Standard AIEG cost key — read by the Envoy access log format
    # (%DYNAMIC_METADATA(io.envoy.ai_gateway:llm_custom_total_cost)%) and by
    # the BackendTrafficPolicy monthly-budget rate-limit rule.  All models
    # share this single key; current Envoy prevents the multi-route metadata
    # deduplication issue that previously forced per-model key names.
    - metadataKey: llm_custom_total_cost
      type: CEL
      cel: {{ include "ai-model.costExpression" (dict "modelName" $modelName "pricing" .Values.pricing) | quote }}

  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: {{ $modelName }}
      {{- with .Values.timeout }}
      timeouts:
        {{- with .requestTimeout }}
        request: {{ . | quote }}
        {{- end }}
      {{- end }}
      modelsOwnedBy: GIS AI Models
      # Explicit route timeout (ADR-0034) — overrides the CRD's 60s default,
      # which would otherwise cut long streaming generations. backendRequest
      # must be <= request (CRD CEL rule); model routes carry no retries, so
      # equal is correct.
      timeouts:
        request: {{ $reqTimeout | quote }}
        backendRequest: {{ $reqTimeout | quote }}
      backendRefs:
        {{- range $bKey, $bVal := $activeBackends }}
        {{- $backendBase := index $.Values.backendsInventory $bVal.ref }}
        {{- if not $backendBase }}
        {{- fail (printf "Model '%s' references backend '%s' not present in backendsInventory" $modelName $bVal.ref) }}
        {{- end }}
        - name: {{ $backendBase.resourceName }}
          {{- if $bVal.modelNameOverride }}
          modelNameOverride: {{ $bVal.modelNameOverride }}
          {{- end }}
          weight: {{ $bVal.weight | default 1 }}
          priority: {{ $bVal.priority | default 0 }}
        {{- end }}
