# A single model. Instantiated per-model by charts/ai-models's
# ApplicationSet. ADR-0012 explains the split.

# Required ─────────────────────────────────────────────────────────────────
# Name of the model — used as the AIGatewayRoute / BackendTrafficPolicy
# object name AND as the `x-ai-eg-model` header value the gateway matches on.
modelName: ""

# Kind of model: text | multimodal | embedding | reranker. Informational;
# not consumed by template logic today but kept for downstream observability.
kind: text

# Required: backendsInventory provides the resourceName lookup for each
# backend ref. Mirrors the parent's `backends:` map. Without it, AIGatewayRoute
# can't resolve a backend's Service name.
backendsInventory: {}
# Example:
#   fw-01:
#     resourceName: fw-backend-01-svc
#   deepinfra-01:
#     resourceName: deepinfra-backend-01-svc

# Required: the upstream backends + priorities this model routes to.
backends: {}
# Example:
#   fw-01:
#     ref: fw-01
#     priority: 0
#     modelNameOverride: "accounts/fireworks/models/glm-5p1"
#     # weight: 1
#     # enabled: true   (default)

# Required: which Gateway this route attaches to.
gatewayRef:
  name: ""
  namespace: ""
  # Optional: pin the AIGatewayRoute to a specific Gateway listener (e.g.
  # "api-https") so it's HTTPS-only. Empty = attach to all listeners.
  sectionName: ""

# Required: pricing strategy. Drives the cost CEL expression rendered by
# AIGatewayRoute. See _helpers.tpl for the supported strategies
# (weighted, tieredWeighted, flat).
pricing: {}
# Example weighted:
#   strategy: weighted
#   standard:
#     inputPer1M: 0.60
#     cachedInputPer1M: 0.12
#     outputPer1M: 2.08

# Optional minimum-backends invariant (HA safety). Default 2.
minBackends: 2

# Per-model timeouts (ADR-0034). `requestTimeout` feeds BOTH the AIGatewayRoute
# route timeout (rules[].timeouts.request — else the CRD's 60s default cuts long
# streams) AND the per-model BackendTrafficPolicy upstream timeout
# (spec.timeout.http — else Envoy's ~15s default 504s a slow/cold backend).
# DEFAULTS to 600s in both templates when unset, so every model (cloud included)
# gets a real budget; override here per model.
#   timeout:
#     requestTimeout: 600s          # whole-request budget (cold start + generation)
#     connectionIdleTimeout: 1h     # idle upstream connection (keeps streams open)
timeout: {}

# Optional: per-model rate-limit overrides. When absent, the model inherits
# from `plans` below.
rateLimitBudgeting: {}
# Example:
#   free: 10
#   pro: 50

# Required: monthly-budget defaults across plans (in USD). Used when the
# model doesn't override via `rateLimitBudgeting:`.
plans: {}
# Example:
#   free:
#     monthlyBudgetUsd: 30
#   pro:
#     monthlyBudgetUsd: 200
