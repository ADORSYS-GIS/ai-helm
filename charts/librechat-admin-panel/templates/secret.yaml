{{- if .Values.sessionSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.names.fullname" . }}-secret
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
type: Opaque
data:
  session_secret: {{ .Values.sessionSecret | b64enc | quote }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.names.fullname" . }}-secret
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
type: Opaque
data:
  session_secret: {{ randAlphaNum 32 | b64enc | quote }}
{{- end }}