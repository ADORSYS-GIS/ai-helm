{{- /*
ESO ExternalSecret for the Discord webhook URL the GrafanaContactPoint injects
(ADR-0059). Pulls one property from the consolidated app key in `ssegning-aws`
into Secret `<webhookSecret.secretName>` key `<webhookSecret.key>`. Until the
maintainer populates that property in AWS Secrets Manager, the secret won't
sync and the contact point's url stays the placeholder (alerts evaluate but
don't deliver) — nothing else breaks.

Populate: ssegning-aws  key ai/camer/digital/prod/env
          property grafana_discord_webhook_url = https://discord.com/api/webhooks/...
*/ -}}
{{- if and .Values.alerting.enabled .Values.alerting.webhookSecret.enabled }}
{{- $w := .Values.alerting.webhookSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $w.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "observability-dashboards.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $w.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $w.secretStore | default "ssegning-aws" }}
    kind: ClusterSecretStore
  target:
    name: {{ $w.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ $w.key | default "url" }}
      remoteRef:
        key: {{ $w.remoteKey | quote }}
        property: {{ $w.property | quote }}
{{- end }}
