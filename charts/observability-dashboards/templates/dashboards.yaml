{{- /*
GrafanaDashboard CRs. Each entry is rendered into one CR; supply the dashboard
JSON via exactly ONE of:
  - file:    path to a JSON file under the chart (read via .Files.Get).
             Preferred — keeps the JSON source diffable in git.
  - json:    inline JSON string (use only for trivial dashboards).
  - jsonRef: reference to a pre-existing ConfigMap.

values.yaml shape:

dashboards:
  - name: envoy-ai-gateway-per-user      # CR / k8s object name
    folderRef: ai-gateway                # GrafanaFolder name (see folders.yaml)
    file: files/envoy-ai-gateway/per-user.json    # relative to chart root
    # or
    json: |
      { "title": "...", "panels": [...] }
    # or
    jsonRef:
      configMapRef:
        name: <configmap>
        key:  <key>
    resyncPeriod: 5m                     # optional
    allowCrossNamespaceImport: false     # optional, default false
*/ -}}
{{- range .Values.dashboards }}
{{- $sources := 0 -}}
{{- if .file }}{{ $sources = add $sources 1 }}{{ end -}}
{{- if .json }}{{ $sources = add $sources 1 }}{{ end -}}
{{- if .jsonRef }}{{ $sources = add $sources 1 }}{{ end -}}
{{- if ne $sources 1 }}
{{- fail (printf "observability-dashboards: dashboard %q requires EXACTLY one of .file / .json / .jsonRef (got %d)" .name $sources) }}
{{- end }}
{{- $body := "" -}}
{{- if .file -}}
  {{- $body = $.Files.Get .file -}}
  {{- if eq $body "" -}}
    {{- fail (printf "observability-dashboards: dashboard %q references missing file %q" .name .file) -}}
  {{- end -}}
{{- else if .json -}}
  {{- $body = .json -}}
{{- end }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "observability-dashboards.labels" $ | nindent 4 }}
spec:
  instanceSelector:
    {{- include "observability-dashboards.instanceSelectorYaml" $ | nindent 4 }}
  {{- with .folderRef }}
  folderRef: {{ . | quote }}
  {{- end }}
  {{- with .resyncPeriod }}
  resyncPeriod: {{ . | quote }}
  {{- end }}
  {{- with .allowCrossNamespaceImport }}
  allowCrossNamespaceImport: {{ . }}
  {{- end }}
  {{- if $body }}
  json: |
    {{- $body | nindent 4 }}
  {{- end }}
  {{- with .jsonRef }}
  {{- if .configMapRef }}
  configMapRef:
    name: {{ .configMapRef.name | quote }}
    key:  {{ .configMapRef.key | quote }}
  {{- end }}
  {{- end }}
{{- end }}
