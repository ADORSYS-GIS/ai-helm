{{- range .Values.folders }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "observability-dashboards.labels" $ | nindent 4 }}
spec:
  title: {{ .title | quote }}
  instanceSelector:
    {{- include "observability-dashboards.instanceSelectorYaml" $ | nindent 4 }}
  {{- with .resyncPeriod }}
  resyncPeriod: {{ . | quote }}
  {{- end }}
  {{- with .allowCrossNamespaceImport }}
  allowCrossNamespaceImport: {{ . }}
  {{- end }}
{{- end }}
