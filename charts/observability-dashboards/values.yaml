# Pointer to the existing Grafana the operator should manage in EXTERNAL mode.
# We do not let the operator stand up a new Grafana — the `grafana` Application
# (vanilla grafana/grafana chart) already runs one with OIDC/datasources/etc.
grafana:
  # Unique name for the Grafana CR; CRs target it via instanceSelector.
  name: grafana-external
  # In-cluster URL of the existing grafana Service.
  url: http://grafana.observability.svc.cluster.local
  # Secret holding admin credentials (must already exist; created by the
  # `grafana` app via grafana-admin ExternalSecret).
  adminSecret:
    name: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  # Label every Grafana CR carries. GrafanaDashboard / GrafanaFolder CRs match
  # against this via `spec.instanceSelector.matchLabels.dashboards: <value>`.
  instanceLabel:
    key: dashboards
    value: grafana-external

# Initial folder set. Each folder becomes a GrafanaFolder CR; dashboards
# placed in a folder reference it by `spec.folderRef`.
# Add new folders here as new dashboard areas appear.
folders:
  - name: ai-gateway
    title: "AI Gateway"
  - name: applications
    title: "Applications"
  # Collector + tracing health (Alloy, Tempo) — purpose-built dashboards-as-code
  # for our single-binary/DaemonSet deployment, since the upstream Alloy (jsonnet
  # only) and Tempo (distributed-oriented) mixins don't fit. (GitOps/ArgoCD folder
  # removed — ArgoCD runs on the homeos cluster, not here.)
  - name: collectors
    title: "Collectors & Tracing"

# Dashboards. Each entry becomes one GrafanaDashboard CR. Supply the JSON via
# `file:` (preferred — keeps the source diffable in git), `json:` (inline) or
# `jsonRef:` (ConfigMap reference). See templates/dashboards.yaml.
dashboards:
  - name: envoy-ai-gateway-per-user
    folderRef: ai-gateway
    file: files/envoy-ai-gateway/per-user.json
    resyncPeriod: 5m
  # Alloy collector health (metrics/logs/traces pipelines, OTLP receiver,
  # clustering). Targets confirmed alloy_*/prometheus_remote_storage_*/
  # loki_write_*/otelcol_receiver_* series; datasource UID hardcoded to `mimir`.
  - name: alloy-collector
    folderRef: collectors
    file: files/collectors/alloy-collector.json
    resyncPeriod: 5m
  # Tempo single-binary health (ingest, queries, flushes, S3 backend). Targets
  # confirmed tempo_*/tempodb_* series for our single-binary deployment.
  - name: tempo-single-binary
    folderRef: collectors
    file: files/collectors/tempo-single-binary.json
    resyncPeriod: 5m

# Future: datasources, contactPoints, alertRules can land here.
datasources: []
