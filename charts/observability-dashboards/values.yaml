# Pointer to the existing Grafana the operator should manage in EXTERNAL mode.
# We do not let the operator stand up a new Grafana — the `grafana` Application
# (vanilla grafana/grafana chart) already runs one with OIDC/datasources/etc.
grafana:
  # Unique name for the Grafana CR; CRs target it via instanceSelector.
  name: grafana-external
  # In-cluster URL of the existing grafana Service.
  url: http://grafana.observability.svc.cluster.local
  # Secret holding admin credentials (must already exist; created by the
  # `grafana` app via grafana-admin ExternalSecret).
  adminSecret:
    name: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  # Label every Grafana CR carries. GrafanaDashboard / GrafanaFolder CRs match
  # against this via `spec.instanceSelector.matchLabels.dashboards: <value>`.
  instanceLabel:
    key: dashboards
    value: grafana-external

# Initial folder set. Each folder becomes a GrafanaFolder CR; dashboards
# placed in a folder reference it by `spec.folderRef`.
# Add new folders here as new dashboard areas appear.
# resyncPeriod makes the operator periodically re-assert each folder into
# Grafana. REQUIRED here because Grafana is stateless (emptyDir, ADR-0023): every
# Grafana pod roll wipes operator-pushed folders, and the operator's cached
# "ApplySuccessful" status otherwise leaves them un-recreated until a manual
# operator restart — which then makes folderRef dashboards fail "folder not
# found". With a resyncPeriod the folder self-heals within the period, before the
# dashboards (which already carry their own resyncPeriod) retry.
folders:
  - name: ai-gateway
    title: "AI Gateway"
    resyncPeriod: 5m
  - name: applications
    title: "Applications"
    resyncPeriod: 5m
  # Collector + tracing health (Alloy, Tempo) — purpose-built dashboards-as-code
  # for our single-binary/DaemonSet deployment, since the upstream Alloy (jsonnet
  # only) and Tempo (distributed-oriented) mixins don't fit. (GitOps/ArgoCD folder
  # removed — ArgoCD runs on the homeos cluster, not here.)
  - name: collectors
    title: "Collectors & Tracing"
    resyncPeriod: 5m

# Dashboards. Each entry becomes one GrafanaDashboard CR. Supply the JSON via
# `file:` (preferred — keeps the source diffable in git), `json:` (inline) or
# `jsonRef:` (ConfigMap reference). See templates/dashboards.yaml.
dashboards:
  - name: envoy-ai-gateway-per-user
    folderRef: ai-gateway
    file: files/envoy-ai-gateway/per-user.json
    resyncPeriod: 5m
  # Cost × model with daily granularity (stacked daily bars), default 30d window.
  - name: envoy-ai-gateway-cost-by-model
    folderRef: ai-gateway
    file: files/envoy-ai-gateway/cost-by-model.json
    resyncPeriod: 5m
  # Per-actor (user OR repo via display_name) consumption: cost per month/day +
  # which models + which channels. Input variables: actor / azp / model.
  - name: envoy-ai-gateway-actor-consumption
    folderRef: ai-gateway
    file: files/envoy-ai-gateway/actor-consumption.json
    resyncPeriod: 5m
  # User x tokens x cost: per-actor table (requests/tokens/cost) + per-day
  # stacked breakdowns + cost/tokens leaderboards. Filters: azp, model.
  - name: envoy-ai-gateway-user-tokens-cost
    folderRef: ai-gateway
    file: files/envoy-ai-gateway/user-tokens-cost.json
    resyncPeriod: 5m
  # The gamified "App Scoreboard" (ADR-0060, Phase 3): budget-burn gauge,
  # leaderboards, token-intensity heatmap, per-actor spend histogram, daily-spend
  # heartbeat, plan-share pie, firing-alerts list, Tempo request traces, a
  # dashboard-list hub + AI-governance news/narration. Same Mimir metrics
  # (ADR-0058) + Tempo + unified alerting. $budget variable (default $3000/mo).
  - name: envoy-ai-gateway-scoreboard
    folderRef: ai-gateway
    file: files/envoy-ai-gateway/scoreboard.json
    resyncPeriod: 5m
  # Alloy collector health (metrics/logs/traces pipelines, OTLP receiver,
  # clustering). Targets confirmed alloy_*/prometheus_remote_storage_*/
  # loki_write_*/otelcol_receiver_* series; datasource UID hardcoded to `mimir`.
  - name: alloy-collector
    folderRef: collectors
    file: files/collectors/alloy-collector.json
    resyncPeriod: 5m
  # Tempo single-binary health (ingest, queries, flushes, S3 backend). Targets
  # confirmed tempo_*/tempodb_* series for our single-binary deployment.
  - name: tempo-single-binary
    folderRef: collectors
    file: files/collectors/tempo-single-binary.json
    resyncPeriod: 5m

# Future: datasources, contactPoints, alertRules can land here.
datasources: []

# ---------------------------------------------------------------------------
# Unified alerting → Discord (ADR-0059). Provisioned via grafana-operator CRs
# (templates/alerting*.yaml) so it survives stateless-Grafana rolls. The
# webhook URL comes from ESO (populate the SM property below); until then the
# contact point keeps a placeholder url (rules evaluate, delivery is a no-op).
# Rules use the compact shape {datasourceUid, expr, op, threshold, ...}; the
# template expands each into Grafana's A=query / B=reduce / C=threshold model.
# Thresholds are first-pass — tune live once alerts are firing.
# ---------------------------------------------------------------------------
alerting:
  enabled: true
  resyncPeriod: 5m

  contactPoint:
    name: discord
    type: discord
    settings:
      title: "{{ .CommonLabels.alertname }} [{{ .Status }}]"
      message: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"

  webhookSecret:
    enabled: true
    secretName: grafana-discord-webhook
    key: url
    secretStore: ssegning-aws
    remoteKey: ai/camer/digital/prod/env
    property: grafana_discord_webhook_url
    refreshInterval: 1h

  notificationPolicy:
    groupBy: [grafana_folder, alertname]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h

  ruleGroups:
    - name: ai-gateway-health
      folderRef: ai-gateway
      interval: 1m
      rules:
        - uid: aigw-no-traffic
          title: AI Gateway — no attributed traffic (15m)
          datasourceUid: mimir
          # `or vector(0)`: if the metric has NO series (pipeline dead / fresh
          # rollout), bare rate() returns no data → noDataState OK → the alert
          # meant to catch exactly that would stay green. Default to 0 so the
          # `< threshold` condition actually trips.
          expr: sum(rate(loki_process_custom_gen_ai_requests[15m])) or vector(0)
          fromSeconds: 1200
          op: lt
          threshold: 0.0001
          for: 15m
          severity: critical
          summary: "No AI Gateway requests recorded in 15m — gateway down or the attribution/metrics pipeline is broken."

    - name: ai-gateway-errors
      folderRef: ai-gateway
      interval: 1m
      rules:
        - uid: aigw-5xx-surge
          title: AI Gateway — 5xx surge (5m)
          datasourceUid: loki
          datasourceType: loki
          expr: 'sum(rate({service_name="envoy-ai-gateway"} | json | response_code=~"5.."[5m]))'
          fromSeconds: 600
          op: gt
          threshold: 0.2
          for: 10m
          severity: warning
          summary: "AI Gateway 5xx rate > 0.2/s for 10m."
        - uid: aigw-p95-latency
          title: AI Gateway — p95 latency high (5m)
          datasourceUid: loki
          datasourceType: loki
          expr: 'quantile_over_time(0.95, {service_name="envoy-ai-gateway"} | json | unwrap duration | __error__="" [5m]) by ()'
          fromSeconds: 600
          op: gt
          threshold: 120000
          for: 10m
          severity: warning
          summary: "AI Gateway p95 latency > 120s for 10m (LLM streaming is slow; ~40s is normal here — this catches genuinely stuck/timeout requests)."

    - name: ai-gateway-cost
      folderRef: ai-gateway
      interval: 5m
      rules:
        - uid: cost-daily-high
          title: AI Gateway — daily spend high
          datasourceUid: mimir
          expr: sum(increase(loki_process_custom_gen_ai_usage_cost_micro_usd[24h]))/1e6
          fromSeconds: 86400
          op: gt
          threshold: 300
          for: 30m
          severity: warning
          summary: "AI Gateway spend over the last 24h exceeded $300."
        - uid: cost-monthly-burn
          title: AI Gateway — monthly burn high
          datasourceUid: mimir
          expr: sum(increase(loki_process_custom_gen_ai_usage_cost_micro_usd[30d]))/1e6
          fromSeconds: 2592000
          op: gt
          threshold: 6000
          for: 1h
          severity: warning
          summary: "AI Gateway 30-day spend exceeded $6000 (budget knob — set to your actual monthly budget; run-rate ~$5k)."

    - name: stack-health
      folderRef: collectors
      interval: 1m
      rules:
        - uid: observability-component-down
          title: Observability component down
          datasourceUid: mimir
          expr: count(up{namespace="observability"} == 0) or vector(0)
          fromSeconds: 600
          op: gt
          threshold: 0
          for: 5m
          severity: critical
          summary: "One or more observability scrape targets are down (up==0)."

    - name: cluster-health
      folderRef: collectors
      interval: 1m
      rules:
        - uid: pod-crashlooping
          title: Pod crashlooping
          datasourceUid: mimir
          expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~"observability|converse|envoy-gateway-system|apps|lightbridge-agents"}[15m]))
          fromSeconds: 900
          op: gt
          threshold: 3
          for: 10m
          severity: warning
          summary: "A pod restarted >3 times in 15m (crashloop)."
        - uid: node-not-ready
          title: Node not ready
          datasourceUid: mimir
          expr: min(kube_node_status_condition{condition="Ready",status="true"})
          fromSeconds: 600
          op: lt
          threshold: 1
          for: 5m
          severity: critical
          summary: "A Kubernetes node is not Ready."
        - uid: node-memory-high
          title: Node memory pressure
          datasourceUid: mimir
          expr: max(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
          fromSeconds: 600
          op: gt
          threshold: 0.92
          for: 10m
          severity: warning
          summary: "A node is using >92% of memory for 10m (baseline runs ~87%)."
