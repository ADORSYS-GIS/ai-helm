apiVersion: v2
name: librechat-opencode-wellknown
description: |
  Tiny nginx pod that serves the opencode `.well-known/opencode` JSON
  so users can run `opencode auth login https://ai.camer.digital/opencode`.

  The JSON is shipped as a ConfigMap and mounted into the nginx pod
  read-only. See ADR-0014 + `docs/opencode-well-known.md` for the
  contract details (opencode's well-known is NOT OIDC discovery — it's
  an opencode-proprietary descriptor with an `auth.command` + `config`
  shape).

  Leaf chart under the `librechart` orchestrator. Independent
  Application (sync-wave 1).
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - opencode
  - well-known
  - nginx
maintainers:
  - name: ai-helm

dependencies:
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
