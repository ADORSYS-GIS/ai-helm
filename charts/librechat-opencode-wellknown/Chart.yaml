apiVersion: v2
name: librechat-opencode-wellknown
description: |
  Tiny nginx pod that serves the opencode `.well-known/opencode` JSON
  so users can run `opencode auth login https://ai.camer.digital/opencode`.

  The JSON is shipped as a ConfigMap and mounted into the nginx pod
  read-only. See ADR-0014 + `docs/opencode-well-known.md` for the
  contract details (opencode's well-known is NOT OIDC discovery — it's
  an opencode-proprietary descriptor with an `auth.command` + `config`
  shape).

  Leaf chart under the `librechart` orchestrator. Independent
  Application (sync-wave 1).
type: application
version: 2.0.0
appVersion: "1.0.0"
keywords:
  - opencode
  - well-known
  - nginx
maintainers:
  - name: ai-helm

dependencies:
  # bjw-s app-template renders the Deployment, Service, and Ingress.
  # The well-known JSON + nginx config live in two ConfigMaps emitted
  # by this chart's own `templates/configmap.yaml` (the content is
  # dynamically built from `.Values.wellKnown`, which app-template's
  # `configMaps:` block can't templatize). app-template references
  # those two ConfigMaps by name via `persistence` (type: configMap).
  - name: app-template
    version: '4.6.2'
    repository: https://bjw-s-labs.github.io/helm-charts
    alias: opencode-wellknown

  # `common` library kept only for `common.labels.standard` used inside
  # templates/configmap.yaml. Drop once we standardize on bjw-s labels.
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
