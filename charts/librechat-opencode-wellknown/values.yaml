# Static JSON served at `https://ai.camer.digital/opencode/.well-known/opencode`
# so `opencode auth login https://ai.camer.digital/opencode` works.
#
# The contract is opencode-proprietary (NOT OIDC discovery) and undocumented
# upstream; the agent that researched the source identified two consumer
# shapes:
#   1. `auth.command` / `auth.env` — spawned locally by opencode CLI;
#      stdout is the bearer token. Since we use @vymalo/opencode-oauth2 to
#      handle OAuth in-config, this is a NO-OP STUB (opencode reads
#      something from .well-known, the plugin then takes over).
#   2. `config` — inline opencode config merged at bootstrap. Carries the
#      provider definition + the OAuth2 plugin wiring.
#
# See ADR-0014 + docs/opencode-well-known.md.

# ────────────────────────────────────────────────────────────────────────
# The well-known JSON itself — used by `templates/configmap.yaml` to
# build the `content` ConfigMap that the nginx pod mounts. Lives at the
# ROOT (not under the `opencode-wellknown:` sub-chart key) so the
# template helper can read it directly.
# ────────────────────────────────────────────────────────────────────────
wellKnown:
  auth:
    # Stub. The plugin manages auth; opencode never reads this token
    # because the plugin's chat.headers hook overrides Authorization
    # per request. Keep the field to satisfy opencode's auth-login
    # schema check.
    command:
      - sh
      - "-c"
      - "echo plugin-managed"
    env: OPENAI_API_KEY

  config:
    $schema: https://opencode.ai/config.json
    # The org-wide DEFAULT agent: the neutral `assistant` PRIMARY (ADR-0074,
    # which broadens the single-frontend-primary of ADR-0048 into a FLEET of
    # selectable primaries). On `opencode auth login` this merges UNDER each
    # user's own config, so a user who sets their own default_agent keeps it;
    # otherwise they start on `assistant`. Must name a `mode: primary`, visible
    # agent (opencode hard-fails otherwise — agent/agent.ts).
    # ⚠️ NOT `general`: `general` is an opencode BUILT-IN general-purpose
    # SUBAGENT (the task tool's default delegate); defining `agent.general`
    # would clobber it (same trap as `plan`/`build` — see the @planner note).
    # So the neutral default is `assistant`. Every primary is kept LEAN — the
    # deny-baseline keeps MCP/browser tool schemas OFF all primaries and behind
    # subagents, so no primary carries the 27 browser_* schemas every turn.
    default_agent: assistant
    plugin:
      # opencode auto-installs each via `bun install` at startup; cached
      # under ~/.cache/opencode/node_modules/. No user action needed.
      #
      # VERSION-PINNED on purpose. opencode treats a `name@x.y.z` spec as an
      # exact pin — it installs that version and runs NO stale/latest checks,
      # whereas a bare `name` floats to @latest and silently refreshes when
      # the cache goes stale (per opencode's plugin install spec). Pinning
      # makes this org-wide push deterministic: every user runs the same
      # plugin code we validated, and a publish upstream can't change
      # behaviour under us mid-rollout. Bump these deliberately (and
      # re-validate) rather than letting them drift. The four @vymalo/*
      # plugins share one version line (released together, currently 0.8.0 —
      # the "OpenCode Toolbelt" suite; see ADR-0050 for the 0.7.3→0.8.0 bump).
      # The lone exception is opencode-skills-collection (kept @latest — see
      # its note below).
      - "@vymalo/opencode-oauth2@0.8.0"
      # Enriches the model catalog with context length, pricing,
      # modalities, capability flags. See ADR-0015.
      - "@vymalo/opencode-models-info@0.8.0"
      # Reads the IETF draft-03 `x-ratelimit-*` response headers our
      # Envoy AI Gateway emits (the per-model BackendTrafficPolicy,
      # ADR-0021) and makes opencode rate-limit-aware: on a short burst
      # reset it waits the quota out, and on a days-away monthly-budget
      # reset it fails fast — see the per-model-scoped `rateLimit.tiers`
      # under the provider options below.
      - "@vymalo/opencode-ratelimit@0.8.0"
      # Gives an agent a real browser: registers `browser_*` tools (open
      # tabs, click, type, scroll, screenshot — in named tab groups) backed
      # by a localhost WebSocket bridge a companion browser EXTENSION dials
      # into. This REPLACES the removed local chrome-devtools MCP as the
      # live-browser capability (owned by the `@browser` subagent, which the
      # frontend primary delegates to). LOCAL — the bridge runs on
      # the user's machine (127.0.0.1:4517) and each user installs the
      # extension once (Releases page / web stores) + pastes the bridge
      # URL+token into it; a user without that setup just sees the tools fail
      # to connect (accepted, same trade-off the local MCP had). Needs Node
      # ≥22. CONFIG goes
      # in the plugin TUPLE's second arg — this plugin reads its options from
      # there (NOT from provider.options.meta like the others), i.e.
      # opencode's `[name, {opts}]` install form, which toJson renders as a
      # JSON 2-tuple. Part of the 0.8.0 vymalo line — pin matches the three
      # above.
      #
      # TWO independent token levers, at different scopes:
      #   • `groups` (here) = GLOBAL registration — only a registered tool can
      #     be allowed at all. We register ALL FOUR groups: `page` (observe, 8) +
      #     `control` (interact/navigate, 19) + `debug` (6) + `interactive` (1)
      #     = 34 tools.
      #     ⚠️ `debug` includes `browser_eval` (arbitrary in-page JS) plus
      #     console/network/cookies — a sharp, powerful surface pushed org-wide
      #     by the maintainer's explicit call. It's scoped to the `@browser`
      #     subagent only (the deny-baseline keeps it off every other agent).
      #     `interactive` (new in 0.8.0, opt-in like `debug`) is just
      #     `browser_request_feedback`: the agent asks the human to respond ON
      #     THE PAGE (confirm / choose / point / element / region / comment) and
      #     BLOCKS up to 300s for the answer — a human-in-the-loop tool that fits
      #     the design loop. Far tamer than `debug` (no arbitrary JS); also
      #     scoped to `@browser` only (ADR-0050).
      #   • per-agent `permission` (below) = PER-AGENT injection. opencode DOES
      #     scope the injected tool set per agent (verified opencode 1.17.6:
      #     session/llm/request.ts `resolveTools` → `Permission.disabled` drops
      #     a tool from that agent's injected `tools`/`activeTools` when its
      #     effective rule is a `*`-pattern DENY; the agent's own rules merge
      #     LAST and win via findLast). A string-form `"glob": "deny"` → pattern
      #     `*` → tool removed from injection; `"glob": "allow"` re-injects it.
      #     Applies uniformly to built-in / MCP / PLUGIN tools by name. (Only the
      #     *string* form gives pattern `*`; the nested `{sub: deny}` form would
      #     gate execution but NOT remove from injection — we use string form.)
      # ⇒ the deny-baseline genuinely keeps browser_* OUT of every agent that
      # doesn't re-allow it. The full page+control+debug+interactive surface (34
      # tools) is allowed ONLY on the `@browser` subagent below — NOT on the lean
      # `frontend` primary — so the heavy 34-tool set is injected only into
      # `@browser`'s context when the primary delegates to it, and never into the
      # default context every turn.
      #
      # ⚠️ Do NOT ALSO add a browser server to `mcp:` below. opencode-browser is
      # a DUAL package — the same `browser_*` catalog ships as this plugin AND as
      # an MCP server. Connecting both registers the 34 tools TWICE (same names),
      # doubling them in every agent that allows `browser_*`. The PLUGIN is the
      # right form here: it's local-only (bridge + extension on the user's box,
      # so it can't ride the remote gateway /mcp/* routes anyway) and its opencode
      # adapter saves screenshots to disk for the model to read. One source only.
      - - "@vymalo/opencode-browser@0.8.0"
        - port: 4517
          groups:
            - page
            - control
            - debug
            - interactive
      # Dynamic Context Pruning — auto-compresses/dedups stale tool
      # outputs and prunes failed-tool inputs from the running context.
      # Zero-config (sensible defaults); provider-agnostic. Pushed
      # org-wide it lowers per-request token spend against the ADR-0021
      # per-user budgets — a cost win for every session. Users can tune
      # via an optional ~/.config/opencode/dcp.jsonc.
      - "@tarquinen/opencode-dcp@3.1.12"
      # Curated skills bundle (1000+) behind a token-efficient
      # "SkillPointer" loader (~80k → ~255 startup tokens vs. inlining
      # them). Zero-config. PINNED like the rest for a fully deterministic
      # org-wide rollout — nobody's skill set shifts under them between
      # releases. ⚠️ Trade-off: the package IS the skill catalog, so this
      # freezes the available skills at this version — BUMP IT DELIBERATELY
      # (re-validate) when you want the latest catalog; leaving it on @latest
      # would auto-sync new skills but reintroduces non-determinism. Users
      # can opt into risk-filtering via an optional
      # ~/.config/opencode/skill-filter.jsonc (all skills load by default).
      - "opencode-skills-collection@3.0.45"
    provider:
      camer-digital:
        name: "Camer Digital"
        options:
          baseURL: "https://api.ai.camer.digital/v1"
          # The opencode-ratelimit plugin's `wait` tier (below) pauses
          # INSIDE this provider's fetch, so opencode's own
          # header/chunk timeouts bound it — a default ~10s timeout
          # would abort a ~60s burst-reset wait and turn a cooperative
          # pause into a cancellation. Raise both above our largest
          # wait window (per the plugin README). 90s comfortably covers
          # the 60s per-minute reset and is harmless for normal traffic
          # (the gateway budget is 600s, ADR-0034; our self-hosted GPU
          # model also cold-starts slowly).
          headerTimeout: 90000
          chunkTimeout: 90000
          oauth2:
            issuer: "https://auth.verif.fyi/realms/camer-digital"
            clientId: "opencode-cli"
            scopes:
              - openid
              - profile
              - offline_access
            # Explicit device_code; the plugin defaults to
            # authorization_code which binds a local callback port and
            # breaks headless / remote-dev use.
            authFlow: device_code
            syncIntervalMinutes: 60
            # DISABLED 2026-06-13 — back to Chat Completions
            # (`/v1/chat/completions`, the plugin default). When `true` this
            # routes inference through the OpenAI **Responses API**
            # (`/v1/responses`) by registering the provider with the native
            # `@ai-sdk/openai` instead of `@ai-sdk/openai-compatible` (plugin
            # ≥ 0.7.1, vymalo/opencode-oauth2#37) and turning on the streaming
            # SSE index-repair for the `output_index`/`content_index` fields
            # our Envoy AI Gateway omits. It was enabled (release-2026.06.13)
            # then turned back off — re-enable by flipping to `true` if/when
            # we want the Responses path again. Provider-wide (one boolean, no
            # per-model granularity).
            responseApi: false
          meta:
            # Relative path → resolves to baseURL + "models/info" =
            # https://api.ai.camer.digital/v1/models/info (the
            # ai-models-info chart serves this).
            # NOT vanilla /v1/models — opencode-models-info needs the
            # richer OpenRouter shape, not OpenAI's `id/object/owned_by`.
            modelsInfoUrl: "models/info"
            # TTL (24h default upstream); override if you want fresher
            # catalogs:
            # modelsInfoTtlSeconds: 3600
            # Force our endpoint's `name` to win over the normalized label
            # the oauth2 plugin pre-stamps (vymalo/opencode-models-info#38,
            # needs plugin ≥ 0.7.1 — pinned 0.8.0 above). models-info merges
            # upstream-wins, and oauth2's model discovery auto-stamps a
            # normalized `name` (e.g. id `adorsys-coder` → "Adorsys Coder")
            # BEFORE the models-info hook runs; upstream-wins then can't tell
            # that from handwritten config, so our `/v1/models/info` `name`
            # (= each model's branded `info.displayName`, e.g. "Adorsys Coder
            # (MiniMax M2.7)", ADR-0044) never landed — the UI showed the
            # plain normalized label. Listing `name` here exempts ONLY that
            # field from upstream-wins so the endpoint value replaces it. (A
            # field only changes when the endpoint actually provides it; a
            # missing value never blanks an existing one.)
            modelsInfoOverwrite:
              - name
            # @vymalo/opencode-ratelimit config. Needs the `scope` + `tiers`
            # schema (plugin ≥ 0.6.1; we pin 0.8.0 in the plugin list
            # above). headerPrefix "x-ratelimit" matches
            # Envoy's draft-03 header names — plugin default.
            #
            # `scope: model` keys rate-limit state per model, matching
            # our per-model BackendTrafficPolicy buckets (every selector
            # carries `x-ai-eg-model`, ADR-0021) — exhausting one model
            # no longer gates the whole `camer-digital` provider.
            #
            # `tiers` resolve the burst-vs-budget ambiguity the plugin
            # otherwise can't (both arrive only as `x-ratelimit-reset`).
            # First tier whose maxResetSeconds ≥ the observed reset wins:
            #   • ≤120s  → a per-minute burst (ADR-0021 burst buckets):
            #     WAIT it out (up to 65s, bounded so it stays under the
            #     90s header/chunk timeout above) and retry a few times.
            #   • longer → a monthly *budget* reset (unit: Month, days
            #     away, ADR-0021/0035) or anything else: ERROR FAST so
            #     the 429 surfaces to the user immediately instead of
            #     freezing.
            rateLimit:
              enabled: true
              scope: model
              headerPrefix: "x-ratelimit"
              tiers:
                - maxResetSeconds: 120
                  action: wait
                  maxWaitMs: 65000
                  maxRetries: 3
                - maxResetSeconds: null
                  action: error

    # ────────────────────────────────────────────────────────────────────
    # MCP servers (ADR-0042, scoping ADR-0044, OPT-IN default ADR-0074). Two axes:
    #   • CONNECTIVITY — `enabled` here decides whether opencode connects to
    #     the server AT ALL. A tool only exists if its server is connected.
    #     ⚠️ As of ADR-0074 EVERY server ships `enabled: false` — MCPs are now
    #     OPT-IN. The org-wide well-known no longer auto-connects a dozen npx
    #     servers + remotes for every user; a user enables ONLY the servers a
    #     workflow needs (drop the JSON into their own opencode.json, or we
    #     flip one here when a team standardises on it). This keeps day-one
    #     startup lean (no cold `npx` installs, no remote OAuth prompts) and
    #     the tool surface honest. The `agent` wiring below is kept INTACT so
    #     enabling a server is a one-line flip — its specialist subagent is
    #     already there to handle it.
    #   • ACCESS — WHO may call a connected tool is decided per-agent under
    #     `config.agent.*.permission`, on top of the global `permission`
    #     deny-baseline that keeps the PRIMARY agents lean. So even once
    #     enabled, a server is NOT on a primary; it lives behind its specialist
    #     subagent (brave→web-search, context7→doc-research/iac,
    #     terraform→iac). `enabled: false` (the default now) = not connected →
    #     no agent can use it until a user opts in.
    mcp:
      # Remote — the gateway's /mcp/<name> routes (ADR-0038): Keycloak JWT
      # via the opencode-cli client, RFC 9728 discovery on the route. All
      # remotes share one OAuth client, so the block is defined once
      # (&mcpOAuth) and reused (*mcpOAuth) — add a remote by copying three
      # lines, not the credential.
      brave:
        type: remote
        url: "https://api.ai.camer.digital/mcp/brave"
        oauth: &mcpOAuth
          clientId: opencode-cli
          scope: "openid profile offline_access"
        enabled: false           # OFF by default (opt-in); handled by the web-search agent
      context7:
        type: remote
        url: "https://api.ai.camer.digital/mcp/context7"
        oauth: *mcpOAuth
        enabled: false           # OFF by default (opt-in); handled by doc-research + iac agents
      refero:
        type: remote
        url: "https://api.ai.camer.digital/mcp/refero"
        oauth: *mcpOAuth
        enabled: false           # OFF by default (opt-in); handled by the @design subagent
      firecrawl:
        type: remote
        url: "https://api.ai.camer.digital/mcp/firecrawl"
        oauth: *mcpOAuth
        enabled: false           # OFF by default (opt-in); handled by the @web-search subagent (scrape)
      terraform:
        type: remote
        url: "https://api.ai.camer.digital/mcp/terraform"
        oauth: *mcpOAuth
        enabled: false           # OFF by default (opt-in); handled by the iac agent

      # ── Local servers (ADR-0071) ───────────────────────────────────────
      # Run on the USER's own machine — opencode CLI spawns each via `npx`
      # (`type: local`, stdout/stdin stdio transport), NOT through the gateway
      # /mcp/* routes. So no OAuth anchor, no remote rate-limit — they're a
      # client-side capability, same trade-off as @vymalo/opencode-browser
      # (a user without the toolchain just sees the tool fail to spawn).
      #
      # NPM-ONLY batch (this ADR): every server here is a self-contained Node
      # package runnable with bare `npx` — no Python, no API key. The
      # Python-backed candidates the maintainer also asked about
      # (mem0, MCP-Mathematics → `uvx`; pdfmux → npm wrapper that still needs
      # `pip install pdfmux` + an LLM key) are DEFERRED to a later batch
      # ("observe the python plugins then") — do NOT add them as local npx
      # servers; they need a different (sidecar/uvx) packaging decision.
      #
      # NOT version-pinned (unlike the `plugin:` list, which is): MCP servers
      # are separate processes behind a tool-protocol boundary (lower blast
      # radius than in-process plugins), so they float to @latest like the
      # remotes. Pin a `name@x.y.z` here if drift ever bites.
      #
      # Each ships `enabled: false` (opt-in, ADR-0074); when a user enables it
      # it is still DENIED on the primaries by the baseline below and re-allowed
      # ONLY on its dedicated subagent — so no primary ever carries these tool
      # schemas (ADR-0044/0048 lean-context model, multi-primary by ADR-0074).
      memory:
        type: local
        # Official knowledge-graph memory server. MEMORY_FILE_PATH points at
        # opencode's DATA dir — `~/.local/share/opencode` is where opencode
        # writes auth.json on `opencode auth login` (the step every user runs
        # to GET this config), so the directory reliably exists before the
        # first @memory write. (NOT `~/.config/opencode`: that's the OPTIONAL
        # global-config dir, absent for a login-only user — and the memory
        # server creates the file but not missing parent dirs → first write
        # would ENOENT.) Stable PER-USER (cross-project) graph.
        command:
          - npx
          - "-y"
          - "@modelcontextprotocol/server-memory"
        environment:
          MEMORY_FILE_PATH: "{env:HOME}/.local/share/opencode/memory.json"
        enabled: false           # OFF by default (opt-in); handled by the @memory subagent
      sequentialthinking:
        type: local
        # Official structured-reasoning server (one tool). Scoped to @planner
        # — the primary delegates hard "think this through / design X" problems
        # to it instead of carrying the tool itself. (NOT named `plan`: that is
        # an opencode BUILT-IN primary agent — see the @planner subagent.)
        command:
          - npx
          - "-y"
          - "@modelcontextprotocol/server-sequential-thinking"
        enabled: false           # OFF by default (opt-in); handled by the @planner subagent
      mobile:
        type: local
        # Mobile-Next: drives iOS Simulators / Android Emulators / physical
        # devices via accessibility tree + screenshots. Needs the user's
        # mobile toolchain (Xcode CLT / Android platform-tools) + Node ≥22 —
        # users without it just see the tools fail to connect (accepted, same
        # as the browser bridge). Returns screenshots → scoped to the @mobile
        # subagent, which pins a multimodal model.
        # `timeout` here is opencode's TOOL-FETCH timeout (initial tool listing
        # from the server), default 5000ms — NOT a per-call timeout. Raised
        # because mobile-mcp enumerates simulators/emulators/devices at startup
        # (+ a possible cold `npx` install), which can exceed 5s and would
        # otherwise drop the whole server before any tool is usable.
        command:
          - npx
          - "-y"
          - "@mobilenext/mobile-mcp@latest"
        timeout: 60000
        enabled: false           # OFF by default (opt-in); handled by the @mobile subagent

      # ── No-key local batch (ADR-0072) ──────────────────────────────────
      # Same `type: local` npx form as the ADR-0071 batch, but selected for
      # ZERO setup: each runs with bare `npx` and needs NO API key / token /
      # signup, so it works for EVERY user on day one (devs + marketing + PO)
      # — the lowest-friction servers to push org-wide. Each is still denied
      # on the lean primary and re-allowed only on its dedicated subagent.
      # Verified npm-only + not deprecated (registry check 2026-06-29).
      git:
        type: local
        # Local git on the working tree (status/diff/log/commit/branch/stash)
        # as structured tools — shells out to the `git` binary (present
        # everywhere). Fills the gap left by the DEPRECATED official GitHub
        # npm server. Scoped to the @vcs subagent.
        command:
          - npx
          - "-y"
          - "@cyanheads/git-mcp-server"
        enabled: false           # OFF by default (opt-in); handled by the @vcs subagent
      drawio:
        type: local
        # OFFICIAL draw.io server — generates editable diagrams (XML / CSV /
        # Mermaid syntax) and an editor URL; pure node, NO browser binary, NO
        # token. Great for non-coder POs. Scoped to the @diagram subagent.
        command:
          - npx
          - "-y"
          - "@drawio/mcp"
        enabled: false           # OFF by default (opt-in); handled by the @diagram subagent
      shadcn:
        type: local
        # shadcn/ui v4 component source / usage / install metadata
        # (React/Svelte/Vue/RN). Keyless (rate-limited); a user who exports
        # GITHUB_PERSONAL_ACCESS_TOKEN locally gets the higher GitHub API
        # limit automatically — we don't inject it (empty-string passthrough
        # risk), it's an opt-in local env var. Scoped to the @ui subagent.
        command:
          - npx
          - "-y"
          - "@jpisnice/shadcn-ui-mcp-server"
        enabled: false           # OFF by default (opt-in); handled by the @ui subagent
      reddit:
        type: local
        # Reddit reader — anonymous READ mode needs no credentials (~10
        # req/min); a user wanting higher limits / posting sets REDDIT_*
        # locally. Social listening / audience research. Scoped to @content.
        command:
          - npx
          - "-y"
          - "reddit-mcp-server"
        enabled: false           # OFF by default (opt-in); handled by the @content subagent
      youtube:
        type: local
        # YouTube transcript fetcher (public transcript endpoints, no key) —
        # repurpose video → blog/social/summaries. Scoped to @content.
        command:
          - npx
          - "-y"
          - "@sinco-lab/mcp-youtube-transcript"
        enabled: false           # OFF by default (opt-in); handled by the @content subagent
      rss:
        type: local
        # RSS/Atom feed reader (no key) — news monitoring, content curation,
        # competitor-blog watching. Scoped to @content.
        command:
          - npx
          - "-y"
          - "rss-mcp"
        enabled: false           # OFF by default (opt-in); handled by the @content subagent

      # ── Atlassian: per-user token local batch (ADR-0073) ───────────────
      # Jira + Confluence as `type: local` npx servers (author @aashari). Per
      # ADR-0073 these are PER-USER: the user exports their own Atlassian
      # credentials and we pass them through with {env:...} — both servers
      # share the SAME three vars, so the user sets them ONCE:
      #   ATLASSIAN_SITE_NAME   (the "your-company" part of *.atlassian.net)
      #   ATLASSIAN_USER_EMAIL  (their Atlassian account email)
      #   ATLASSIAN_API_TOKEN   (id.atlassian.com → API tokens)
      # A user who hasn't set them sees @atlassian fail when invoked (same
      # accepted trade-off as the other local servers). GitHub is NOT here —
      # it has no npx server (the official npm one is deprecated → Go binary),
      # so it goes on a centralized gateway /mcp/github route backed by a
      # GitHub App (ADR-0073 phase 2; out-of-band App + secret). Both servers
      # scoped to the @atlassian subagent.
      jira:
        type: local
        command:
          - npx
          - "-y"
          - "@aashari/mcp-server-atlassian-jira"
        environment:
          ATLASSIAN_SITE_NAME: "{env:ATLASSIAN_SITE_NAME}"
          ATLASSIAN_USER_EMAIL: "{env:ATLASSIAN_USER_EMAIL}"
          ATLASSIAN_API_TOKEN: "{env:ATLASSIAN_API_TOKEN}"
        enabled: false           # OFF by default (opt-in); handled by the @atlassian subagent
      confluence:
        type: local
        command:
          - npx
          - "-y"
          - "@aashari/mcp-server-atlassian-confluence"
        environment:
          ATLASSIAN_SITE_NAME: "{env:ATLASSIAN_SITE_NAME}"
          ATLASSIAN_USER_EMAIL: "{env:ATLASSIAN_USER_EMAIL}"
          ATLASSIAN_API_TOKEN: "{env:ATLASSIAN_API_TOKEN}"
        enabled: false           # OFF by default (opt-in); handled by the @atlassian subagent

    # ────────────────────────────────────────────────────────────────────
    # Global permission baseline (ADR-0044) — keeps EVERY primary agent LEAN:
    # every MCP/browser tool is denied at the root, so no primary carries them.
    # Each role subagent below re-allows exactly its own (agent permission
    # overrides root via findLast). edit/bash keep opencode's defaults for
    # primaries (each primary further scopes its own). The denies are kept for
    # ALL servers even though every one now ships `enabled: false` (ADR-0074,
    # opt-in): the moment a user enables a server, this baseline still keeps it
    # off the primaries and behind its subagent — no edit needed to stay lean.
    # (`.env` reads are already denied by opencode.)
    permission:
      "brave_*": deny
      "context7_*": deny
      "terraform_*": deny
      "refero_*": deny
      # firecrawl is opt-in like the rest now (ADR-0074) — so it MUST be denied
      # here too, else enabling it would inject `firecrawl_*` onto every primary
      # (opencode tools default to enabled unless a rule restricts them). It's
      # re-allowed only on @web-search (web fetch/scrape companion to brave).
      "firecrawl_*": deny
      # Removes browser_* from the INJECTED tool set of every agent that doesn't
      # re-allow it (request.ts `resolveTools` → `Permission.disabled`: a
      # string-form `*`-deny drops the tool from `tools`/`activeTools`). Works
      # for plugin tools exactly as for MCP — keyed on tool name. Only the
      # `@browser` subagent re-allows it (the lean `frontend` primary does NOT).
      # (At call time plugin tools aren't ctx.ask-gated like MCP tools, but
      # that's moot for a denied tool — the model never receives it.)
      "browser_*": deny
      # Local npx servers (ADR-0071) — same deny-then-re-allow discipline as
      # the remotes: each stays OUT of the primary's injected toolset and is
      # re-allowed only on its dedicated subagent (@memory / @planner / @mobile).
      "memory_*": deny
      "sequentialthinking_*": deny
      "mobile_*": deny
      # No-key local batch (ADR-0072) — same deny-then-re-allow: off the
      # primary, re-allowed only on @vcs / @diagram / @ui / @content.
      "git_*": deny
      "drawio_*": deny
      "shadcn_*": deny
      "reddit_*": deny
      "youtube_*": deny
      "rss_*": deny
      # Atlassian per-user batch (ADR-0073) — off the primary, re-allowed
      # only on @atlassian.
      "jira_*": deny
      "confluence_*": deny

    # ────────────────────────────────────────────────────────────────────
    # Agents (ADR-0044, topology revised by ADR-0048, FLEET by ADR-0074). Two
    # tiers:
    #  • PRIMARIES (`mode: primary`) — the user-selectable agents (default
    #    `assistant`; see `default_agent` above). The fleet block further down
    #    holds them: assistant / frontend / backend / devops / marketing / docs
    #    / ux / architect / enemy / tester / security. Each is lean — it holds
    #    only edit + a scoped bash whitelist and DELEGATES tool-heavy work.
    #  • SUBAGENTS (`mode: subagent`) — the delegated workers a primary
    #    dispatches via the task tool / `@name`; these OWN the MCP/browser tools
    #    (one per server). Defined FIRST below. Each subagent is a WHITELIST: it
    #    allows only its tools + its file/bash scope; everything else falls back
    #    to the deny-baseline above (which is why the tools never leak onto a
    #    primary). The subagent wiring is unchanged by ADR-0074 — only the
    #    primary count grew + every MCP is now opt-in (enabled:false).
    #
    # MODELS — pin ONLY where vision is required (ADR-0048, no-risk rule):
    #  • An agent whose tools return IMAGES it must interpret PINS a multimodal
    #    model — guaranteeing vision no matter the user's session model. Only
    #    `@browser` (browser_screenshot), `@design` (refero_get_screen_image)
    #    and `@mobile` (device screenshots) qualify; each pins the branded
    #    multimodal alias `adorsys-frontend` (`camer-digital/adorsys-frontend` →
    #    charts/ai-models, swappable THERE).
    #  • EVERY OTHER agent — ALL primaries AND all non-visual role subagents —
    #    carries NO `model` and INHERITS the user's session model. (Simpler +
    #    risk-free; a role no longer forces a cheap model — it runs on whatever
    #    the user picks.) A user can override per agent locally.
    agent:
      web-search:
        mode: subagent
        description: >-
          Searches the web (Brave) and scrapes/extracts page content
          (Firecrawl), returning a concise, source-cited summary. Read-only —
          never writes files or runs shell. Delegate for "look this up / find
          current info / scrape this page" tasks. (Both servers are opt-in;
          `@web-search` is inert until the user enables `brave`/`firecrawl`.)
        temperature: 0.3
        prompt: >-
          You are a web-research specialist. Use the Brave MCP tools to search
          and read sources, and the Firecrawl MCP tools to scrape/extract a
          specific page's content when a search snippet isn't enough, then
          return a concise, cited summary. You cannot write files or run shell
          commands — do not attempt to.
        permission:
          edit: deny
          bash: deny
          webfetch: allow
          "brave_*": allow
          "firecrawl_*": allow
      doc-research:
        mode: subagent
        description: >-
          Researches a topic (Context7 library docs + reading the repo) and
          writes documentation. May write ONLY under docs/. Delegate for
          "document X / update the docs" tasks.
        temperature: 0.3
        prompt: >-
          You are a documentation specialist. Read freely and use the Context7
          MCP for authoritative library docs. You may create or edit files
          ONLY under docs/ — every other path is denied; do not edit code.
        permission:
          edit:
            "*": deny
            "docs/**": allow
          bash: deny
          "context7_*": allow
      iac:
        mode: subagent
        description: >-
          Authors and plans infrastructure-as-code (Terraform/OpenTofu). Read
          + write; runs terraform/tofu via shell with guardrails. Delegate for
          "write/plan the infrastructure" tasks.
        temperature: 0.2
        prompt: >-
          You are an infrastructure-as-code specialist. Use Context7 for
          provider docs and the Terraform MCP for registry lookups. You may
          edit files and run the SAFE terraform/tofu subcommands (init,
          validate, plan, fmt, show, output); `apply` requires the user's
          approval and `destroy` is blocked. Never run other destructive
          shell (rm, etc.); pause for approval on anything unrecognized.
        permission:
          edit: allow
          # Only the SAFE, read-only-ish subcommands auto-run; `apply` falls to
          # the `*: ask` default (needs human approval) and `destroy` is denied
          # outright — never auto-apply/destroy infra from an org-wide default.
          bash:
            "*": ask
            "terraform init*": allow
            "terraform validate*": allow
            "terraform plan*": allow
            "terraform fmt*": allow
            "terraform show*": allow
            "terraform output*": allow
            "terraform providers*": allow
            "tofu init*": allow
            "tofu validate*": allow
            "tofu plan*": allow
            "tofu fmt*": allow
            "terraform destroy*": deny
            "tofu destroy*": deny
            "rm *": deny
          "context7_*": allow
          "terraform_*": allow
      reviewer:
        mode: subagent
        description: >-
          Reviews code/changes for correctness, security, and maintainability
          and returns findings. Can READ the working diff itself (read-only git:
          status/diff/log/show) so it reviews what actually changed, plus
          `helm lint`/`helm template` to sanity-check chart renders. Never edits
          files. Delegate for "review this / what's wrong with X / review my
          changes" tasks.
        temperature: 0.1
        prompt: >-
          You are a code reviewer. Establish what changed FIRST — run
          `git status`/`git diff` (and `git log`/`git show` for context) to see
          the working diff — then read the changed files and the surrounding
          code and report concrete correctness, security, and maintainability
          findings with file:line references and a severity for each. For Helm
          charts you may `helm lint`/`helm template` to confirm a change still
          renders. Use Context7 to confirm correct API usage. You run ONLY those
          read-only inspection commands and never edit files — do not attempt
          other shell or any write.
        permission:
          edit: deny
          # Read-only inspection only: see the diff + render-check charts. `*`
          # stays denied (last-match-wins), so nothing mutating slips through.
          bash:
            "*": deny
            "git status*": allow
            "git diff*": allow
            "git log*": allow
            "git show*": allow
            "git branch*": allow
            "helm lint*": allow
            "helm template*": allow
          "context7_*": allow
      test:
        mode: subagent
        description: >-
          Writes and runs tests (TDD): adds failing tests, makes them pass, and
          runs the suite. Can edit code but only AUTO-runs test commands.
          Delegate for "write tests / run the tests / TDD this" tasks.
        temperature: 0.2
        prompt: >-
          You are a test-driven-development specialist. Write a failing test
          first, then the minimal code to pass it, and run the suite to verify.
          Use Context7 for testing-library docs. You may run test commands
          freely; anything else needs approval, and never run destructive shell.
        permission:
          edit: allow
          bash:
            "*": ask
            "npm test*": allow
            "npm run test*": allow
            "pnpm test*": allow
            "pnpm run test*": allow
            "bun test*": allow
            "yarn test*": allow
            "go test*": allow
            "pytest*": allow
            "uv run pytest*": allow
            "cargo test*": allow
            "vitest*": allow
            "jest*": allow
            "helm lint*": allow
            "helm template*": allow
            "rm *": deny
          "context7_*": allow
      skill:
        mode: subagent
        description: >-
          Authors and refines opencode skills (skill definitions) and helps pick
          the right skill for a task. Writes ONLY under the skills directory.
          Delegate for "write/refine a skill" tasks.
        temperature: 0.3
        prompt: >-
          You are an opencode skill author. Create and refine skill definitions
          under the skills directory, and use the skill tool to test discovery.
          Use Context7 for any library facts a skill needs. You may write ONLY
          under the skills directory — every other path is denied.
        permission:
          edit:
            "*": deny
            ".opencode/skills/**": allow
            "skills/**": allow
          bash: deny
          skill: allow
          "context7_*": allow
      # ── Local-MCP role subagents (ADR-0071). Non-visual → NO model pin,
      #    inherit the session model. Read-only on code (no edit/bash) so
      #    they stay safe to delegate to org-wide. ─────────────────────────
      memory:
        mode: subagent
        description: >-
          Persists and recalls facts in a knowledge graph (entities,
          relations, observations) via the local Memory MCP. Read/write the
          GRAPH only — never edits files or runs shell. Delegate for
          "remember this / what do you know about X / recall …" tasks.
        temperature: 0.2
        prompt: >-
          You are a memory specialist backed by a knowledge-graph MCP. Use the
          memory_* tools to create/search/read entities, relations, and
          observations, and return a concise answer (or confirm what you
          stored). The graph is per-user and persists across sessions — keep
          it tidy: prefer updating an existing entity over creating a
          near-duplicate. You cannot edit files or run shell — do not attempt
          to.
        permission:
          edit: deny
          bash: deny
          "memory_*": allow
      # NB: named `planner`, NOT `plan` — `plan` is an opencode BUILT-IN primary
      # agent (alongside `build`); defining `agent.plan` here would override/
      # demote the built-in read-only Plan primary for every user org-wide.
      planner:
        mode: subagent
        description: >-
          Thinks through hard problems step by step (Sequential-Thinking MCP)
          and returns a structured plan or analysis. READ-ONLY — never edits
          files or runs shell. Delegate for "design / plan / reason through /
          figure out the approach for X" tasks.
        temperature: 0.2
        prompt: >-
          You are a planning and reasoning specialist. Use the
          sequentialthinking tool to break a hard problem into ordered,
          revisable steps, and read the repo freely to ground your reasoning;
          use Context7 for authoritative library facts when an API detail
          matters. Return a clear, structured plan or analysis with concrete
          next steps for the caller to execute. You cannot edit files or run
          shell — do not attempt to.
        permission:
          edit: deny
          bash: deny
          "sequentialthinking_*": allow
          "context7_*": allow
      # ── No-key local-MCP subagents (ADR-0072). All non-visual → NO model
      #    pin (inherit the session model). ────────────────────────────────
      vcs:
        mode: subagent
        description: >-
          Runs git on the working tree (status / diff / log / commit / branch
          / stash) as structured tools via the Git MCP. Operates on the local
          repo only — does not edit source files itself. Delegate for "commit
          this / show the diff / branch / what changed" tasks.
        temperature: 0.2
        prompt: >-
          You are a version-control specialist. Use the git_* tools to inspect
          and operate the local git repository — review status/diff/log, stage,
          commit with a clear message, branch, and stash. Confirm the intended
          scope before committing, and write a concise commit message that
          explains why. You do not edit source files (the primary does that)
          and you have no general shell — use only the git_* tools.
        permission:
          edit: deny
          bash: deny
          "git_*": allow
      ui:
        mode: subagent
        description: >-
          Looks up shadcn/ui v4 component source, usage, and install metadata
          (React/Svelte/Vue/RN) via the shadcn MCP and returns it for the
          primary to build with. READ-ONLY; never edits code or runs shell.
          Delegate for "how do I use / install the shadcn X component".
        temperature: 0.3
        prompt: >-
          You are a shadcn/ui component specialist. Use the shadcn_* tools to
          fetch accurate component source, usage examples, and install commands
          for the requested components, then return a concise, actionable
          summary for the primary to implement against. You cannot edit files
          or run shell — do not attempt to.
        permission:
          edit: deny
          bash: deny
          "shadcn_*": allow
      diagram:
        mode: subagent
        description: >-
          Generates editable diagrams (architecture / flow / roadmap /
          sequence) via the official draw.io MCP — accepts Mermaid/CSV/XML and
          returns the diagram plus an editor URL. No file edits, no shell.
          Delegate for "diagram this / draw the architecture / make a flowchart".
        temperature: 0.4
        prompt: >-
          You are a diagramming specialist. Use the drawio_* tools to turn the
          caller's description into a clear, editable diagram and return both
          the diagram data and the draw.io editor URL so a human can refine it.
          Pick the right layout for the intent (flow, sequence, architecture,
          roadmap). You cannot edit files or run shell — do not attempt to.
        permission:
          edit: deny
          bash: deny
          "drawio_*": allow
      content:
        mode: subagent
        description: >-
          Gathers external content for marketing/research — reads Reddit
          threads, YouTube transcripts, and RSS/news feeds — and returns a
          concise, cited digest. READ-ONLY; never edits files or runs shell.
          Delegate for "what are people saying about X / summarize this video /
          watch this feed".
        temperature: 0.3
        prompt: >-
          You are a content-research specialist for marketing and growth. Use
          the reddit_* (social listening), youtube_* (video transcripts), and
          rss_* (feeds/news) tools, plus webfetch for article URLs, to gather
          source material and return a concise, source-cited digest with the
          key takeaways. You cannot edit files or run shell — do not attempt to.
        permission:
          edit: deny
          bash: deny
          webfetch: allow
          "reddit_*": allow
          "youtube_*": allow
          "rss_*": allow
      atlassian:
        mode: subagent
        description: >-
          Reads and searches Jira (projects, issues via JQL, dev info) and
          Confluence (spaces, pages) via the Atlassian MCP servers, and
          returns a concise summary. Delegate for "find the Jira ticket /
          what's the status of X / look up the Confluence spec". Requires the
          user's own Atlassian credentials (ATLASSIAN_SITE_NAME /
          ATLASSIAN_USER_EMAIL / ATLASSIAN_API_TOKEN) in their environment.
        temperature: 0.2
        prompt: >-
          You are an Atlassian specialist. Use the jira_* tools (search issues
          via JQL, read issues + their linked dev info) and confluence_* tools
          (search spaces, read pages) to answer the caller's question, then
          return a concise, link-bearing summary. Default to read/search; if a
          write is requested, confirm the exact target and scope first. You do
          not edit local files or run shell — use only the Atlassian tools.
        permission:
          edit: deny
          bash: deny
          "jira_*": allow
          "confluence_*": allow
      # ── PRIMARIES — the selectable agent FLEET (ADR-0074, broadening the
      #    single lean primary of ADR-0048). Every entry below is `mode: primary`
      #    (a user picks one via the agent switcher / Tab); the org default is
      #    `assistant`. They share one discipline:
      #      • LEAN CONTEXT — NONE re-allow an MCP/browser tool, so the global
      #        deny-baseline keeps those schemas OFF every primary. Tool-heavy
      #        work is DELEGATED to the role subagents above via the task tool
      #        (`@name`). A primary holds only `edit` + a scoped bash whitelist.
      #      • NO `model` pin — a primary reads no images itself (it delegates
      #        visual work to @browser/@design/@mobile, the only multimodal
      #        agents), so it INHERITS the user's chosen session model.
      #    A persona = its prompt + permission scope, NOT a private toolset;
      #    adding one is cheap precisely because the tools live behind subagents
      #    (ADR-0048 finding). ⚠️ Names avoid opencode built-ins (`build`/`plan`
      #    primaries; `general`/`explore`/`scout` subagents) and every subagent
      #    name above.

      # assistant — the neutral DEFAULT. General-purpose across the stack:
      # implements directly and delegates everything tool-heavy.
      assistant:
        mode: primary
        description: >-
          The neutral default agent: general-purpose across the whole stack.
          Implements and edits code directly and runs the common build/test
          toolchains (JS, Rust, Go, Python via uv, make/just), and delegates
          tool-heavy work to the specialist subagents — web search
          (@web-search), library docs (@doc-research), git (@vcs), planning
          (@planner), tests (@test), diagrams (@diagram), memory (@memory) —
          then decides and iterates. Switch to a focused primary (@backend,
          @devops, @ux, @architect, @security, …) when the task has a clear
          shape.
        temperature: 0.3
        prompt: >-
          You are the default, general-purpose primary. You IMPLEMENT directly:
          read and edit files and run the common toolchains — JS
          (pnpm/npm/bun/yarn), Rust (cargo), Go, Python (uv), and make/just.
          For tool-heavy or specialist work you DELEGATE via the task tool and
          act on what the subagent reports:
          • web search / current info → `@web-search`
          • authoritative library/framework docs → `@doc-research`
          • git on the working tree (diff / commit / branch / stash) → `@vcs`
          • think a hard problem through step by step → `@planner`
          • write or run tests → `@test`
          • draw a diagram (architecture / flow) → `@diagram`
          • remember a fact for later, or recall what's known → `@memory`
          • verify UI in a real browser → `@browser`; design refs → `@design`.
          When the task clearly fits a focused primary, say so and let the user
          switch to it (@backend, @devops, @ux, @docs, @architect, @tester,
          @security, @enemy, @marketing). Destructive or unrecognized commands
          pause for your approval — gated, not blocked. Keep changes minimal and
          explain the why.
        permission:
          edit: allow
          bash:
            "*": ask
            "pnpm *": allow
            "npm *": allow
            "bun *": allow
            "yarn *": allow
            "cargo *": allow
            "go *": allow
            "uv *": allow
            "make *": allow
            "just *": allow
            "rm *": ask

      # frontend — frontend-flavoured implementation primary (was the ADR-0048
      # org default; now one specialist among the fleet). Body kept verbatim.
      frontend:
        mode: primary
        description: >-
          A lean frontend-focused primary. Implements and edits code and runs
          the frontend toolchain directly — JS (pnpm/npm/bun/yarn) AND Rust/WASM
          (cargo/trunk) — and delegates the rest — driving a real browser
          (@browser), pulling design references (@design), and looking up
          library/framework docs (@doc-research) — to specialist subagents,
          then decides and iterates.
        temperature: 0.3
        prompt: >-
          You are the primary agent, tuned for frontend work but capable across
          the stack. You IMPLEMENT directly: edit files and run the frontend
          toolchain — JS (pnpm/npm/bun/yarn) and Rust/WASM (cargo/trunk) — to
          build and serve. For everything else you DELEGATE to a subagent via
          the task tool and act on what it reports:
          • to verify UI in a real browser (open/reload, click/type, screenshot)
            → delegate to `@browser`; it returns what it saw on the page.
          • for design references / visual targets → delegate to `@design`.
          • for authoritative library/framework docs → delegate to
            `@doc-research`.
          • to drive/screenshot the app on a phone (iOS/Android) → delegate to
            `@mobile`.
          • to think through a hard design/approach problem step by step →
            delegate to `@planner`.
          • to remember a fact for later, or recall what's known → delegate to
            `@memory`.
          • for git on the working tree (diff/commit/branch/stash) → delegate
            to `@vcs`.
          • for shadcn/ui component source + install info → delegate to `@ui`.
          • to draw a diagram (architecture/flow/roadmap) → delegate to
            `@diagram`.
          • to research external content (Reddit/YouTube/RSS/news) → delegate
            to `@content`.
          • to look up Jira issues or Confluence pages → delegate to
            `@atlassian`.
          Close the loop: implement → ask @browser to reload + screenshot +
          report → compare to the @design reference → decide what's off →
          implement again, until it matches. Destructive commands (rm, etc.) and
          anything unrecognized pause for your approval — they're not blocked,
          just gated. You do not hold the browser/design/docs tools yourself —
          route those through the subagents.
        permission:
          edit: allow
          bash:
            "*": ask
            "pnpm *": allow
            "npm *": allow
            "bun *": allow
            "yarn *": allow
            "cargo *": allow
            "trunk *": allow
            # `rm` is gated by approval (ask), NOT hard-denied: a frontend build
            # loop legitimately cleans artifacts (rm -rf dist, trunk/cargo
            # output), so blocking rm outright is more annoying than safe.
            # ⚠️ This is FRICTION, NOT A SANDBOX. opencode matches the command
            # STRING, not what it does — so the allowed wrappers above are
            # arbitrary-code escape hatches that defeat this gate: `npm run
            # <script>` / `npm exec` / `pnpm exec` / `bun x` / `cargo run` /
            # build.rs / a postinstall hook can all delete files without ever
            # hitting `rm`. No per-command rule can close that. Real containment
            # is the ENVIRONMENT (git-tracked worktree, ephemeral/sandboxed run),
            # not these patterns. Keep `rm: ask` as a casual-mistake guard only.
            "rm *": ask
          # NB: no browser_*/refero_*/context7_* re-allow here — they stay denied
          # by the baseline so they're NOT injected into the primary's context.
          # Delegated to @browser / @design / @doc-research below.

      # backend — server/API/DB implementation primary. Runs the backend
      # toolchains directly; delegates docs/git/tests/planning to subagents.
      backend:
        mode: primary
        description: >-
          A backend-focused primary: services, APIs, data and migrations across
          Go / Python / Node / Rust. Implements and edits code and runs the
          backend toolchains directly, and delegates the rest — library docs
          (@doc-research), git (@vcs), tests (@test), hard design (@planner),
          issue lookup (@atlassian) — to specialist subagents.
        temperature: 0.2
        prompt: >-
          You are a backend engineering primary: HTTP/gRPC services, data
          models, queries, migrations, and background jobs. You IMPLEMENT
          directly: edit code and run the backend toolchains — Go, Python (uv /
          pytest), Node (pnpm/npm/bun), Rust (cargo), and make/just. DELEGATE
          tool-heavy work: authoritative library docs → `@doc-research`; git on
          the working tree → `@vcs`; writing/running tests → `@test`; thinking
          a hard design through → `@planner`; Jira/Confluence lookup →
          `@atlassian`. Be careful with anything that mutates data — never run
          a destructive migration or DB command without explicit approval; they
          pause for you (gated, not blocked). Keep changes minimal; explain why.
        permission:
          edit: allow
          # ⚠️ CURATED ALLOWLIST, not blanket language wildcards — deliberately.
          # A migration (`npm run migrate`, `python manage.py migrate`,
          # `uv run alembic upgrade`, `make migrate`, `prisma migrate`) must hit
          # the `*: ask` approval gate the prompt promises. We CANNOT achieve
          # that by adding `*migrate*: ask` after a blanket `npm *: allow`,
          # because the rendered config is JSON and Helm's `toJson` SORTS the
          # keys alphabetically — so document order is lost and opencode's
          # "last-matching-rule-wins" would let `npm *` (sorts after `*migrate*`)
          # win for `npm run migrate`. The order-independent fix: never blanket
          # a language wrapper; allow only specific safe sub-commands, and let
          # everything else (incl. every migration form, alembic upgrade/
          # downgrade, prisma, sequelize, flyway, …) fall through to `*: ask`.
          # `*` (ASCII 42) always sorts FIRST, so the specific allows always win
          # over it for the commands they name — regardless of sort order.
          # Still FRICTION not a sandbox (a script can mutate without hitting a
          # named command); the real containment is the environment.
          bash:
            "*": ask
            # Go / Rust — build/test/run/lint only
            "go build*": allow
            "go test*": allow
            "go run*": allow
            "go vet*": allow
            "go mod*": allow
            "gofmt*": allow
            "cargo build*": allow
            "cargo test*": allow
            "cargo run*": allow
            "cargo check*": allow
            "cargo clippy*": allow
            "cargo fmt*": allow
            # Python — uv-first; NOT blanket `python *` / `uv run *` (they wrap
            # `manage.py migrate` / `alembic upgrade`)
            "uv sync*": allow
            "uv lock*": allow
            "uv add*": allow
            "uv run pytest*": allow
            "pytest*": allow
            "ruff*": allow
            # Node — install / build / dev / test / lint scripts; NOT blanket
            # `npm *` (wraps `npm run migrate`)
            "npm install*": allow
            "npm ci*": allow
            "npm run build*": allow
            "npm run lint*": allow
            "npm run dev*": allow
            "npm run start*": allow
            "npm test*": allow
            "npm run test*": allow
            "pnpm install*": allow
            "pnpm build*": allow
            "pnpm dev*": allow
            "pnpm lint*": allow
            "pnpm test*": allow
            "pnpm run build*": allow
            "pnpm run dev*": allow
            "pnpm run test*": allow
            "pnpm run lint*": allow
            "bun install*": allow
            "bun run build*": allow
            "bun run dev*": allow
            "bun test*": allow
            "yarn install*": allow
            "yarn build*": allow
            "yarn dev*": allow
            "yarn test*": allow
            "yarn lint*": allow
            # Build orchestration — specific targets only (NOT blanket `make *`,
            # which would wrap `make migrate`)
            "make build*": allow
            "make test*": allow
            "make lint*": allow
            "make fmt*": allow
            "just build*": allow
            "just test*": allow
            "just lint*": allow
            "rm *": ask

      # devops — k8s / Helm / Terraform / CI primary. Promotes the @iac role to
      # a full driver: runs the SAFE (read/plan) infra commands directly,
      # delegates registry/provider docs to @iac and history to @vcs.
      devops:
        mode: primary
        description: >-
          An infrastructure/platform primary: Kubernetes, Helm, Terraform/
          OpenTofu, Kustomize and CI. Edits charts/manifests and runs the SAFE
          read/plan commands directly (helm lint/template, kubectl get/describe/
          logs, terraform/tofu plan/validate) — never auto-applies or deletes —
          and delegates provider docs + registry lookups to @iac, git to @vcs,
          and architecture diagrams to @diagram.
        temperature: 0.2
        prompt: >-
          You are a DevOps / platform primary. You edit charts, manifests and
          pipelines and run ONLY the safe, read-only-ish infra commands
          yourself: helm lint/template/dep/show, kubectl get/describe/logs/
          explain/top, terraform/tofu init/validate/plan/fmt/show/output,
          kustomize build, yq/jq. Anything that MUTATES the cluster or state —
          helm install/upgrade/uninstall, kubectl apply/delete, terraform/tofu
          apply, and destroy — is NOT auto-run: apply-class commands pause for
          the user's approval and destroy is denied outright. DELEGATE: provider
          docs + Terraform registry → `@iac`; library docs → `@doc-research`;
          git → `@vcs`; architecture/flow diagrams → `@diagram`; current info →
          `@web-search`. Never run destructive shell from an org-wide default.
        permission:
          edit: allow
          bash:
            "*": ask
            "helm lint*": allow
            "helm template*": allow
            "helm dep*": allow
            "helm show*": allow
            "kubectl get*": allow
            "kubectl describe*": allow
            "kubectl logs*": allow
            "kubectl explain*": allow
            "kubectl top*": allow
            "terraform init*": allow
            "terraform validate*": allow
            "terraform plan*": allow
            "terraform fmt*": allow
            "terraform show*": allow
            "terraform output*": allow
            "terraform providers*": allow
            "tofu init*": allow
            "tofu validate*": allow
            "tofu plan*": allow
            "tofu fmt*": allow
            "kustomize build*": allow
            "yq *": allow
            "jq *": allow
            "terraform destroy*": deny
            "tofu destroy*": deny
            "kubectl delete*": deny
            "rm *": ask

      # marketing — non-dev content/research primary for marketing & PO users.
      # Writes only under docs/; delegates all gathering to subagents. (Named
      # `marketing`, NOT `content` — `content` is the research SUBAGENT.)
      marketing:
        mode: primary
        description: >-
          A non-developer primary for marketing, growth and product: gathers
          and synthesises external content and turns it into briefs, posts and
          summaries. Writes ONLY under docs/; never edits code or runs shell.
          Delegates the gathering — social/video/feeds (@content), web search
          (@web-search), design references (@design), diagrams (@diagram),
          library/product docs (@doc-research) — to subagents.
        temperature: 0.5      # upper-"balanced": copywriting/brainstorm wants some spark
        prompt: >-
          You are a marketing / content primary for non-developers. You do NOT
          edit code or run shell — you may write Markdown ONLY under docs/. Your
          job is to gather source material and synthesise it: DELEGATE to
          `@content` (Reddit / YouTube transcripts / RSS news), `@web-search`
          (current info), `@design` (visual references), `@diagram` (turn an
          idea into an editable diagram), and `@doc-research` (product/library
          facts), then write a clear, source-cited brief, post, or summary.
          Always cite where a claim or quote came from. If a coding change is
          actually needed, hand it to the user to run @assistant / @frontend.
        permission:
          edit:
            "*": deny
            "docs/**": allow
          bash: deny

      # docs — documentation/technical-writing primary. Writes under docs/;
      # pulls authoritative facts via @doc-research, diagrams via @diagram.
      docs:
        mode: primary
        description: >-
          A documentation primary: plans and writes technical docs, guides and
          ADRs. Reads code freely and writes ONLY under docs/; delegates
          authoritative library facts (@doc-research), diagrams (@diagram),
          current info (@web-search) and git (@vcs) to subagents.
        temperature: 0.3
        prompt: >-
          You are a technical-writing primary. Read the repo freely to ground
          what you write, and produce clear, accurate docs — guides, references,
          runbooks, ADRs — writing ONLY under docs/ (every other path is
          denied; you do not edit code). DELEGATE: authoritative library/API
          facts → `@doc-research`; editable diagrams → `@diagram`; current info
          → `@web-search`; git/history → `@vcs`. Match the repo's existing doc
          conventions and link related docs. You have no general shell.
        permission:
          edit:
            "*": deny
            "docs/**": allow
          bash: deny

      # ux — design/experience-led frontend primary. Implements UX changes and
      # leans HARD on the visual subagents (@design references, @browser to
      # verify, @ui for components, @mobile for devices).
      ux:
        mode: primary
        description: >-
          A UX / product-design primary: critiques and improves user
          experience, accessibility and visual polish, and can implement the
          frontend changes. Runs the JS toolchain directly and leans on the
          visual subagents — design references (@design), real-browser
          verification (@browser), components (@ui), device checks (@mobile),
          diagrams (@diagram).
        temperature: 0.4      # balanced, leaning creative: design exploration
        prompt: >-
          You are a UX / design-led primary. You judge and improve the user
          experience — hierarchy, spacing, states, accessibility, copy — and
          can IMPLEMENT the frontend changes (edit + JS toolchain:
          pnpm/npm/bun/yarn). Work the loop visually: DELEGATE to `@design` for
          references / visual targets, to `@browser` to reload + screenshot +
          report the real rendered result, to `@ui` for shadcn component source,
          and to `@mobile` for on-device checks; then compare to the reference,
          decide what's off, and iterate. Favour calm, restrained layouts over
          decoration. You delegate all image-reading to those subagents (they
          pin a multimodal model). Destructive/unrecognized commands pause for
          approval.
        permission:
          edit: allow
          bash:
            "*": ask
            "pnpm *": allow
            "npm *": allow
            "bun *": allow
            "yarn *": allow
            "rm *": ask

      # architect — deep code / systems architecture primary. READ-heavy
      # analysis; writes ONLY ADRs/docs under docs/. Delegates reasoning,
      # review and history to subagents.
      architect:
        mode: primary
        description: >-
          A deep code & systems architecture primary: reads broadly, reasons
          about structure, trade-offs and blast radius, and produces designs,
          ADRs and migration plans. READ-ONLY on code (writes ONLY under docs/);
          delegates step-by-step reasoning (@planner), library facts
          (@doc-research), a critical second pass (@reviewer), diagrams
          (@diagram) and history (@vcs).
        temperature: 0.2
        prompt: >-
          You are a software architect. Read the codebase broadly to build an
          accurate model before proposing anything; reason about structure,
          coupling, failure modes, trade-offs and blast radius. You do NOT edit
          code — you may write ONLY under docs/ (designs, ADRs, migration
          plans). DELEGATE: step-by-step reasoning on a hard problem →
          `@planner`; authoritative library/framework facts → `@doc-research`;
          a critical correctness/security pass on a proposal → `@reviewer`;
          architecture/sequence diagrams → `@diagram`; history/why-it-is-so →
          `@vcs`. Ground every recommendation in concrete file:line evidence and
          name the trade-offs you're accepting. You have no general shell.
        permission:
          edit:
            "*": deny
            "docs/**": allow
          bash: deny

      # enemy — hard adversarial red-team primary. Assumes the work is WRONG and
      # hunts the worst failure modes. READ-ONLY (no edit, no shell) — and the
      # read-only intent is ENFORCED, not just promised: `permission.task` locks
      # delegation to READ-ONLY subagents, so it can't launder a write through a
      # writable one (e.g. @test, which has edit:allow).
      enemy:
        mode: primary
        description: >-
          A hard adversarial primary — the "enemy". Assumes the code/design is
          wrong and ruthlessly hunts the worst failure modes: edge cases, race
          conditions, security holes, broken assumptions, unhandled errors.
          READ-ONLY — never edits files or runs shell, and delegates ONLY to
          read-only subagents: a structured critique (@reviewer), step-by-step
          attack reasoning (@planner), known-CVE / prior-art lookup
          (@web-search), library facts (@doc-research).
        temperature: 0.6
        prompt: >-
          You are the adversary. Your job is to BREAK the code or design on
          paper, not to be agreeable. Assume it is wrong until proven otherwise
          and attack it hard: enumerate the nastiest edge cases, race
          conditions, concurrency and ordering bugs, injection/authz/SSRF and
          other security holes, resource leaks, unhandled errors, and silent
          data loss. For every attack cite the CONCRETE mechanism (file:line +
          the exact input/sequence that triggers it) — no vague "this could be
          better". Rank findings by real-world severity and likelihood.
          DELEGATE only to read-only specialists: a structured second-pass
          critique → `@reviewer`; multi-step attack reasoning → `@planner`;
          known CVEs / prior incidents → `@web-search`; library/API facts →
          `@doc-research`. You CANNOT write — no edit, no shell, and you may not
          delegate to a writable agent. To prove a break, describe the exact
          failing test/input precisely and hand it to the caller to run; do not
          ask another agent to write it.
        permission:
          edit: deny
          bash: deny
          # Enforce read-only: deny all delegation, then re-allow ONLY the
          # subagents that cannot mutate the repo. @test/@vcs/@general and the
          # writable primaries stay denied (an adversary must not write — even
          # via a delegate — while "proving" a break). Last-match-wins.
          task:
            "*": deny
            "reviewer": allow
            "planner": allow
            "web-search": allow
            "doc-research": allow

      # tester — TDD primary. Edits code and AUTO-runs ONLY test commands.
      # (The @test subagent stays for delegation from other primaries.)
      tester:
        mode: primary
        description: >-
          A test-driven-development primary: writes failing tests first, then
          the minimal code to pass them, and runs the suite. Edits code but
          AUTO-runs only test commands; delegates testing-library docs to
          @doc-research and git to @vcs.
        temperature: 0.2
        prompt: >-
          You are a TDD primary. Write a failing test that captures the intended
          behaviour first, then the minimal code to make it pass, then run the
          suite to verify — red, green, refactor. You may run test commands
          freely (npm/pnpm/bun/yarn test, go test, pytest, cargo test, vitest,
          jest, playwright, helm lint/template); anything else pauses for
          approval and destructive shell is denied. DELEGATE: testing-library /
          framework docs → `@doc-research`; git → `@vcs`. Prefer fast,
          deterministic tests; cover the edge cases @enemy would attack.
        permission:
          edit: allow
          bash:
            "*": ask
            "npm test*": allow
            "npm run test*": allow
            "pnpm test*": allow
            "pnpm run test*": allow
            "bun test*": allow
            "yarn test*": allow
            "go test*": allow
            "pytest*": allow
            "uv run pytest*": allow
            "cargo test*": allow
            "vitest*": allow
            "jest*": allow
            "playwright test*": allow
            "helm lint*": allow
            "helm template*": allow
            "rm *": deny

      # security — security review & reporting primary. READ-ONLY on code;
      # writes findings ONLY under docs/ (e.g. docs/security/). Delegates
      # review, CVE lookup, library facts and history to subagents.
      security:
        mode: primary
        description: >-
          A security-review & reporting primary: audits code and config for
          vulnerabilities, threat-models the change, and writes up findings with
          severity and a concrete fix. READ-ONLY on code (writes reports ONLY
          under docs/); delegates a correctness/security pass (@reviewer),
          CVE/advisory lookup (@web-search), library facts (@doc-research) and
          history (@vcs).
        temperature: 0.1
        prompt: >-
          You are a security-review and reporting primary. Audit the code and
          configuration for real vulnerabilities — injection, authn/authz
          gaps, SSRF, secret exposure, unsafe deserialization, supply-chain and
          misconfig — and threat-model the change. You do NOT edit code; you may
          write a findings report ONLY under docs/ (e.g. docs/security/). For
          each finding give: the concrete mechanism (file:line + exploit path),
          a CVSS-style severity, and a specific remediation — never a vague
          "could be improved". DELEGATE: a focused correctness/security pass →
          `@reviewer`; CVEs / advisories / prior incidents → `@web-search`;
          library/API facts → `@doc-research`; history → `@vcs`. This is a
          DEFENSIVE review for authorized code; report, don't exploit. You have
          no general shell.
        permission:
          edit:
            "*": deny
            "docs/**": allow
          bash: deny
      # ── Split-off VISUAL specialist subagents. These own the tools lifted
      #    off the lean primary, and because their tools return IMAGES the
      #    agent must interpret (browser_screenshot, refero_get_screen_image),
      #    they are the ONLY agents that PIN a multimodal model — guaranteeing
      #    vision regardless of the user's session model (no inheritance risk).
      #    Every other agent (primary + roles) pins NO model and inherits the
      #    session model. ─────────────────────────────────────────────────────
      browser:
        mode: subagent
        model: "camer-digital/adorsys-frontend"    # Adorsys Frontend (→Nemotron Omni) — MULTIMODAL; reads screenshots
        description: >-
          Drives a REAL browser through the @vymalo/opencode-browser bridge —
          opens tabs (named groups), navigates, clicks, types, fills, scrolls,
          and screenshots — then REPORTS what it observed (it reads the
          screenshots it captures). READ-ONLY on the filesystem; never edits
          code or runs shell. Delegate for "open / navigate / interact with /
          screenshot this page". Requires the companion browser extension
          connected to the local bridge.
        temperature: 0.3
        prompt: >-
          You are a browser-automation specialist. Use the browser_* tools to
          open/reload tabs (in named groups), observe (snapshot / get_text /
          get_html / query), interact (click / type / fill / scroll), and
          screenshot real browser tabs, then REPORT back concisely what you saw
          — read any screenshot the bridge saves under .opencode/browser/ and
          describe the relevant visual state for the caller. ALWAYS
          browser_snapshot first to get stable element refs; target actions by
          ref, never guess selectors. When you're unsure what the user means and
          a screenshot or snapshot isn't enough ("which of these did you mean?"),
          use browser_request_feedback to ask the human ON THE PAGE (confirm /
          choose / point / element / region / comment) and act on their answer;
          on timeout it returns { timedOut: true } so fall back gracefully. Call
          browser_release when done so the user gets their browser back. You
          cannot edit files or run shell — do not attempt to.
        permission:
          edit: deny
          bash: deny
          # The full registered surface (page + control + debug + interactive).
          # Injected into THIS subagent only (the primary denies it), so the
          # heavy 34-tool set never loads into the default context.
          "browser_*": allow
      design:
        mode: subagent
        model: "camer-digital/adorsys-frontend"    # Adorsys Frontend (→Nemotron Omni) — MULTIMODAL; reads refero screen images
        description: >-
          Fetches design references and visual targets from the Refero MCP and
          returns them (screens, flows, styles) for the primary to build
          against. READ-ONLY; never edits code or runs shell. Delegate for
          "find a design reference / what should this look like".
        temperature: 0.3
        prompt: >-
          You are a design-reference specialist. Use the Refero MCP tools to
          search and fetch screens, flows, and styles, then return a concise,
          actionable summary (with the key visual details and any image refs)
          for the primary to implement against. You cannot edit files or run
          shell — do not attempt to.
        permission:
          edit: deny
          bash: deny
          "refero_*": allow
      mobile:
        mode: subagent
        model: "camer-digital/adorsys-frontend"    # Adorsys Frontend (→Nemotron Omni) — MULTIMODAL; reads device screenshots
        description: >-
          Drives a mobile device through the local Mobile-Next MCP — lists and
          launches apps, taps/swipes/types by accessibility element or
          screen coordinates, and screenshots iOS Simulators / Android
          Emulators / physical devices — then REPORTS what it observed (it
          reads the screenshots it captures). READ-ONLY on the filesystem;
          never edits code or runs shell. Delegate for "open / drive /
          screenshot the app on a phone". Requires the user's mobile
          toolchain (Xcode CLT / Android platform-tools) + a running
          simulator/emulator or connected device.
        temperature: 0.3
        prompt: >-
          You are a mobile-automation specialist. Use the mobile_* tools to
          list/launch apps, read the on-screen elements (accessibility tree),
          tap/type/swipe (by element ref where available, else by
          coordinates), and screenshot the device, then REPORT back concisely
          what you saw — read any screenshot you capture and describe the
          relevant UI state for the caller. List elements first to target
          actions reliably; avoid blind coordinate taps when an element ref
          exists. You cannot edit files or run shell — do not attempt to.
        permission:
          edit: deny
          bash: deny
          "mobile_*": allow

# ────────────────────────────────────────────────────────────────────────
# bjw-s app-template (aliased to `opencode-wellknown`). Renders the
# Deployment + Service + Ingress. The two ConfigMaps that hold the
# nginx config and the well-known JSON are emitted by this chart's
# own `templates/configmap.yaml` (the JSON content is built from
# `.Values.wellKnown` above and can't be expressed as plain string data
# in app-template values).
# ────────────────────────────────────────────────────────────────────────
opencode-wellknown:
  controllers:
    main:
      type: deployment
      replicas: 2
      strategy: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      pod:
        automountServiceAccountToken: false
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        # Note: no checksum/wellknown annotation here — the wellKnown
        # value lives at the parent chart's root and isn't reachable
        # from the sub-chart's tpl context. JSON edits require
        # `kubectl rollout restart` (documented in
        # `docs/opencode-well-known.md`).
      containers:
        nginx:
          image:
            repository: nginxinc/nginx-unprivileged
            tag: "1.27-alpine"
            pullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                periodSeconds: 30
                timeoutSeconds: 3
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                periodSeconds: 5
                timeoutSeconds: 2
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          enabled: true
          port: 80
          targetPort: 8080
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: cert-home-cert-http
      hosts:
        - host: ai.camer.digital
          paths:
            - path: /opencode/.well-known/opencode
              pathType: Exact
              service:
                identifier: main
                port: http
      tls:
        - secretName: ai.camer.digital-tls
          hosts:
            - ai.camer.digital

  # Mount the two externally-rendered ConfigMaps + nginx-unprivileged's
  # required writable scratch dirs.
  persistence:
    # The nginx server block (custom default.conf with the right
    # Content-Type and exact-match location for the well-known URL).
    # Name matches what templates/configmap.yaml emits.
    nginx-config:
      enabled: true
      type: configMap
      name: '{{ .Release.Name }}-nginx-config'
      advancedMounts:
        main:
          nginx:
            - path: /etc/nginx/conf.d
              readOnly: true
    # The well-known JSON itself (rendered from `.Values.wellKnown`).
    content:
      enabled: true
      type: configMap
      name: '{{ .Release.Name }}-content'
      advancedMounts:
        main:
          nginx:
            - path: /usr/share/nginx/html/opencode/.well-known
              readOnly: true
    # nginx-unprivileged needs writable scratch space (root FS is RO).
    tmp:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /tmp
    nginx-cache:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /var/cache/nginx
    nginx-run:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /var/run
