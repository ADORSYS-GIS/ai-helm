# Static JSON served at `https://ai.camer.digital/opencode/.well-known/opencode`
# so `opencode auth login https://ai.camer.digital/opencode` works.
#
# The contract is opencode-proprietary (NOT OIDC discovery) and undocumented
# upstream; the agent that researched the source identified two consumer
# shapes:
#   1. `auth.command` / `auth.env` — spawned locally by opencode CLI;
#      stdout is the bearer token. Since we use @vymalo/opencode-oauth2 to
#      handle OAuth in-config, this is a NO-OP STUB (opencode reads
#      something from .well-known, the plugin then takes over).
#   2. `config` — inline opencode config merged at bootstrap. Carries the
#      provider definition + the OAuth2 plugin wiring.
#
# See ADR-0014 + docs/opencode-well-known.md.

# ────────────────────────────────────────────────────────────────────────
# The well-known JSON itself — used by `templates/configmap.yaml` to
# build the `content` ConfigMap that the nginx pod mounts. Lives at the
# ROOT (not under the `opencode-wellknown:` sub-chart key) so the
# template helper can read it directly.
# ────────────────────────────────────────────────────────────────────────
wellKnown:
  auth:
    # Stub. The plugin manages auth; opencode never reads this token
    # because the plugin's chat.headers hook overrides Authorization
    # per request. Keep the field to satisfy opencode's auth-login
    # schema check.
    command:
      - sh
      - "-c"
      - "echo plugin-managed"
    env: OPENAI_API_KEY

  config:
    $schema: https://opencode.ai/config.json
    plugin:
      # opencode auto-installs each via `bun install` at startup; cached
      # under ~/.cache/opencode/node_modules/. No user action needed.
      #
      # VERSION-PINNED on purpose. opencode treats a `name@x.y.z` spec as an
      # exact pin — it installs that version and runs NO stale/latest checks,
      # whereas a bare `name` floats to @latest and silently refreshes when
      # the cache goes stale (per opencode's plugin install spec). Pinning
      # makes this org-wide push deterministic: every user runs the same
      # plugin code we validated, and a publish upstream can't change
      # behaviour under us mid-rollout. Bump these deliberately (and
      # re-validate) rather than letting them drift. The four @vymalo/*
      # plugins share one version line (released together, currently 0.7.0).
      # The lone exception is opencode-skills-collection (kept @latest — see
      # its note below).
      - "@vymalo/opencode-oauth2@0.7.0"
      # Enriches the model catalog with context length, pricing,
      # modalities, capability flags. See ADR-0015.
      - "@vymalo/opencode-models-info@0.7.0"
      # Reads the IETF draft-03 `x-ratelimit-*` response headers our
      # Envoy AI Gateway emits (the per-model BackendTrafficPolicy,
      # ADR-0021) and makes opencode rate-limit-aware: on a short burst
      # reset it waits the quota out, and on a days-away monthly-budget
      # reset it fails fast — see the per-model-scoped `rateLimit.tiers`
      # under the provider options below.
      - "@vymalo/opencode-ratelimit@0.7.0"
      # Gives an agent a real browser: registers `browser_*` tools (open
      # tabs, click, type, scroll, screenshot — in named tab groups) backed
      # by a localhost WebSocket bridge a companion browser EXTENSION dials
      # into. This REPLACES the removed local chrome-devtools MCP as the
      # frontend agent's live-browser capability. LOCAL — the bridge runs on
      # the user's machine (127.0.0.1:4517) and each user installs the
      # extension once (Releases page / web stores) + pastes the bridge
      # URL+token into it; a user without that setup just sees the tools fail
      # to connect (accepted, same trade-off the local MCP had). Needs Node
      # ≥22. CONFIG goes
      # in the plugin TUPLE's second arg — this plugin reads its options from
      # there (NOT from provider.options.meta like the others), i.e.
      # opencode's `[name, {opts}]` install form, which toJson renders as a
      # JSON 2-tuple. Part of the 0.7.0 vymalo line — pin matches the three
      # above.
      #
      # TWO independent token levers, at different scopes:
      #   • `groups` (here) = GLOBAL registration — only a registered tool can
      #     be allowed at all. We register `page` (observe, 8) + `control`
      #     (interact/navigate, 19) and DROP `debug` (browser_eval = arbitrary
      #     in-page JS + console/network/cookies — risky to push org-wide).
      #   • per-agent `permission` (below) = PER-AGENT injection. opencode DOES
      #     scope the injected tool set per agent (verified opencode 1.17.6:
      #     session/llm/request.ts `resolveTools` → `Permission.disabled` drops
      #     a tool from that agent's injected `tools`/`activeTools` when its
      #     effective rule is a `*`-pattern DENY; the agent's own rules merge
      #     LAST and win via findLast). A string-form `"glob": "deny"` → pattern
      #     `*` → tool removed from injection; `"glob": "allow"` re-injects it.
      #     Applies uniformly to built-in / MCP / PLUGIN tools by name. (Only the
      #     *string* form gives pattern `*`; the nested `{sub: deny}` form would
      #     gate execution but NOT remove from injection — we use string form.)
      # ⇒ the deny-baseline genuinely keeps browser_* OUT of every agent that
      # doesn't re-allow it. The full page+control surface (27 tools) is allowed
      # ONLY on the `frontend` agent below, so it is injected into `frontend`
      # (the cost of the implement→reload→screenshot→iterate loop, in one
      # context) and into NO other agent.
      #
      # ⚠️ Do NOT ALSO add a browser server to `mcp:` below. opencode-browser is
      # a DUAL package — the same `browser_*` catalog ships as this plugin AND as
      # an MCP server. Connecting both registers the 27 tools TWICE (same names),
      # doubling them in every agent that allows `browser_*`. The PLUGIN is the
      # right form here: it's local-only (bridge + extension on the user's box,
      # so it can't ride the remote gateway /mcp/* routes anyway) and its opencode
      # adapter saves screenshots to disk for the model to read. One source only.
      - - "@vymalo/opencode-browser"
        - port: 4517
          groups:
            - page
            - control
      # Dynamic Context Pruning — auto-compresses/dedups stale tool
      # outputs and prunes failed-tool inputs from the running context.
      # Zero-config (sensible defaults); provider-agnostic. Pushed
      # org-wide it lowers per-request token spend against the ADR-0021
      # per-user budgets — a cost win for every session. Users can tune
      # via an optional ~/.config/opencode/dcp.jsonc.
      - "@tarquinen/opencode-dcp@3.1.12"
      # Curated skills bundle (1000+) behind a token-efficient
      # "SkillPointer" loader (~80k → ~255 startup tokens vs. inlining
      # them). Zero-config. PINNED like the rest for a fully deterministic
      # org-wide rollout — nobody's skill set shifts under them between
      # releases. ⚠️ Trade-off: the package IS the skill catalog, so this
      # freezes the available skills at this version — BUMP IT DELIBERATELY
      # (re-validate) when you want the latest catalog; leaving it on @latest
      # would auto-sync new skills but reintroduces non-determinism. Users
      # can opt into risk-filtering via an optional
      # ~/.config/opencode/skill-filter.jsonc (all skills load by default).
      - "opencode-skills-collection@3.0.45"
    provider:
      camer-digital:
        name: "Camer Digital"
        options:
          baseURL: "https://api.ai.camer.digital/v1"
          # The opencode-ratelimit plugin's `wait` tier (below) pauses
          # INSIDE this provider's fetch, so opencode's own
          # header/chunk timeouts bound it — a default ~10s timeout
          # would abort a ~60s burst-reset wait and turn a cooperative
          # pause into a cancellation. Raise both above our largest
          # wait window (per the plugin README). 90s comfortably covers
          # the 60s per-minute reset and is harmless for normal traffic
          # (the gateway budget is 600s, ADR-0034; our self-hosted GPU
          # model also cold-starts slowly).
          headerTimeout: 90000
          chunkTimeout: 90000
          oauth2:
            issuer: "https://auth.verif.fyi/realms/camer-digital"
            clientId: "opencode-cli"
            scopes:
              - openid
              - profile
              - offline_access
            # Explicit device_code; the plugin defaults to
            # authorization_code which binds a local callback port and
            # breaks headless / remote-dev use.
            authFlow: device_code
            syncIntervalMinutes: 60
            # DISABLED 2026-06-13 — back to Chat Completions
            # (`/v1/chat/completions`, the plugin default). When `true` this
            # routes inference through the OpenAI **Responses API**
            # (`/v1/responses`) by registering the provider with the native
            # `@ai-sdk/openai` instead of `@ai-sdk/openai-compatible` (plugin
            # ≥ 0.6.2, vymalo/opencode-oauth2#37) and turning on the streaming
            # SSE index-repair for the `output_index`/`content_index` fields
            # our Envoy AI Gateway omits. It was enabled (release-2026.06.13)
            # then turned back off — re-enable by flipping to `true` if/when
            # we want the Responses path again. Provider-wide (one boolean, no
            # per-model granularity).
            responseApi: false
          meta:
            # Relative path → resolves to baseURL + "models/info" =
            # https://api.ai.camer.digital/v1/models/info (the
            # ai-models-info chart serves this).
            # NOT vanilla /v1/models — opencode-models-info needs the
            # richer OpenRouter shape, not OpenAI's `id/object/owned_by`.
            modelsInfoUrl: "models/info"
            # TTL (24h default upstream); override if you want fresher
            # catalogs:
            # modelsInfoTtlSeconds: 3600
            # Force our endpoint's `name` to win over the normalized label
            # the oauth2 plugin pre-stamps (vymalo/opencode-models-info#38,
            # needs plugin ≥ 0.6.3 — pinned 0.6.3 above). models-info merges
            # upstream-wins, and oauth2's model discovery auto-stamps a
            # normalized `name` (e.g. id `adorsys-coder` → "Adorsys Coder")
            # BEFORE the models-info hook runs; upstream-wins then can't tell
            # that from handwritten config, so our `/v1/models/info` `name`
            # (= each model's branded `info.displayName`, e.g. "Adorsys Coder
            # (MiniMax M2.7)", ADR-0044) never landed — the UI showed the
            # plain normalized label. Listing `name` here exempts ONLY that
            # field from upstream-wins so the endpoint value replaces it. (A
            # field only changes when the endpoint actually provides it; a
            # missing value never blanks an existing one.)
            modelsInfoOverwrite:
              - name
            # @vymalo/opencode-ratelimit config. Needs the `scope` + `tiers`
            # schema (plugin ≥ 0.6.1; we pin 0.6.3 in the plugin list
            # above). headerPrefix "x-ratelimit" matches
            # Envoy's draft-03 header names — plugin default.
            #
            # `scope: model` keys rate-limit state per model, matching
            # our per-model BackendTrafficPolicy buckets (every selector
            # carries `x-ai-eg-model`, ADR-0021) — exhausting one model
            # no longer gates the whole `camer-digital` provider.
            #
            # `tiers` resolve the burst-vs-budget ambiguity the plugin
            # otherwise can't (both arrive only as `x-ratelimit-reset`).
            # First tier whose maxResetSeconds ≥ the observed reset wins:
            #   • ≤120s  → a per-minute burst (ADR-0021 burst buckets):
            #     WAIT it out (up to 65s, bounded so it stays under the
            #     90s header/chunk timeout above) and retry a few times.
            #   • longer → a monthly *budget* reset (unit: Month, days
            #     away, ADR-0021/0035) or anything else: ERROR FAST so
            #     the 429 surfaces to the user immediately instead of
            #     freezing.
            rateLimit:
              enabled: true
              scope: model
              headerPrefix: "x-ratelimit"
              tiers:
                - maxResetSeconds: 120
                  action: wait
                  maxWaitMs: 65000
                  maxRetries: 3
                - maxResetSeconds: null
                  action: error

    # ────────────────────────────────────────────────────────────────────
    # MCP servers (ADR-0042, scoping model refined by ADR-0044). Two axes:
    #   • CONNECTIVITY — `enabled` here decides whether opencode connects to
    #     the server AT ALL. A tool only exists if its server is connected,
    #     so every server some `agent` (below) needs is `enabled: true`.
    #   • ACCESS — WHO may call a connected tool is decided per-agent under
    #     `config.agent.*.permission`, on top of the global `permission`
    #     deny-baseline that keeps the PRIMARY agent lean. So a connected
    #     server is NOT on the default agent; it lives behind its specialist
    #     subagent (brave→web-search, context7→doc-research/iac,
    #     terraform→iac). `enabled: false` = not connected → no agent can
    #     use it (reserve for servers no role needs yet).
    mcp:
      # Remote — the gateway's /mcp/<name> routes (ADR-0038): Keycloak JWT
      # via the opencode-cli client, RFC 9728 discovery on the route. All
      # remotes share one OAuth client, so the block is defined once
      # (&mcpOAuth) and reused (*mcpOAuth) — add a remote by copying three
      # lines, not the credential.
      brave:
        type: remote
        url: "https://api.ai.camer.digital/mcp/brave"
        oauth: &mcpOAuth
          clientId: opencode-cli
          scope: "openid profile offline_access"
        enabled: true            # connected; scoped to the web-search agent
      context7:
        type: remote
        url: "https://api.ai.camer.digital/mcp/context7"
        oauth: *mcpOAuth
        enabled: true            # connected; scoped to doc-research + iac agents
      refero:
        type: remote
        url: "https://api.ai.camer.digital/mcp/refero"
        oauth: *mcpOAuth
        enabled: true            # connected; scoped to the frontend agent
      firecrawl:
        type: remote
        url: "https://api.ai.camer.digital/mcp/firecrawl"
        oauth: *mcpOAuth
        enabled: false           # no agent uses it yet (web scraping)
      terraform:
        type: remote
        url: "https://api.ai.camer.digital/mcp/terraform"
        oauth: *mcpOAuth
        enabled: true            # connected; scoped to the iac agent

    # ────────────────────────────────────────────────────────────────────
    # Global permission baseline (ADR-0044) — keeps the PRIMARY/default agent
    # LEAN: every connected MCP tool is denied by default, so the main agent
    # has none of them. Each role subagent below re-allows exactly its own
    # (agent permission overrides root). edit/bash keep opencode's defaults
    # for the primary. (refero/firecrawl aren't connected, so no deny needed;
    # `.env` reads are already denied by opencode.)
    permission:
      "brave_*": deny
      "context7_*": deny
      "terraform_*": deny
      "refero_*": deny
      # Removes browser_* from the INJECTED tool set of every agent that doesn't
      # re-allow it (request.ts `resolveTools` → `Permission.disabled`: a
      # string-form `*`-deny drops the tool from `tools`/`activeTools`). Works
      # for plugin tools exactly as for MCP — keyed on tool name. Only
      # `frontend` re-allows it. (At call time plugin tools aren't ctx.ask-gated
      # like MCP tools, but that's moot for a denied tool — the model never
      # receives it.)
      "browser_*": deny

    # ────────────────────────────────────────────────────────────────────
    # Role subagents (ADR-0044). Delegated specialists (`mode: subagent`) the
    # primary agent dispatches to via the task tool / `@name`. Each is a
    # WHITELIST: it allows only its tools + its file/bash scope; everything
    # else falls back to the deny-baseline above. Add a role by copying a
    # block. Models are pinned COST-LEAN (ADR-0044): the cheap/fast tier for
    # high-volume low-stakes roles, a stronger model only where the stakes
    # warrant it. Each is referenced by its BRANDED `adorsys-*` alias
    # (`camer-digital/adorsys-<role>` → charts/ai-models), so the backing
    # model can be swapped THERE without editing this file or telling users —
    # the alias `info.displayName` is what reveals today's backing. A user can
    # override per agent locally. The PRIMARY agent keeps the user's default.
    agent:
      web-search:
        mode: subagent
        model: "camer-digital/adorsys-researcher"  # Adorsys Researcher (→DeepSeek V4)
        description: >-
          Searches the web (Brave) and returns a concise, source-cited
          summary. Read-only — never writes files or runs shell. Delegate for
          "look this up / find current info" tasks.
        temperature: 0.3
        prompt: >-
          You are a web-research specialist. Use the Brave MCP tools to search
          and read sources, then return a concise, cited summary. You cannot
          write files or run shell commands — do not attempt to.
        permission:
          edit: deny
          bash: deny
          webfetch: allow
          "brave_*": allow
      doc-research:
        mode: subagent
        model: "camer-digital/adorsys-researcher"  # Adorsys Researcher (→DeepSeek V4)
        description: >-
          Researches a topic (Context7 library docs + reading the repo) and
          writes documentation. May write ONLY under docs/. Delegate for
          "document X / update the docs" tasks.
        temperature: 0.3
        prompt: >-
          You are a documentation specialist. Read freely and use the Context7
          MCP for authoritative library docs. You may create or edit files
          ONLY under docs/ — every other path is denied; do not edit code.
        permission:
          edit:
            "*": deny
            "docs/**": allow
          bash: deny
          "context7_*": allow
      iac:
        mode: subagent
        model: "camer-digital/adorsys-planner"     # Adorsys Planner (→GLM-5) — IaC stakes
        description: >-
          Authors and plans infrastructure-as-code (Terraform/OpenTofu). Read
          + write; runs terraform/tofu via shell with guardrails. Delegate for
          "write/plan the infrastructure" tasks.
        temperature: 0.2
        prompt: >-
          You are an infrastructure-as-code specialist. Use Context7 for
          provider docs and the Terraform MCP for registry lookups. You may
          edit files and run the SAFE terraform/tofu subcommands (init,
          validate, plan, fmt, show, output); `apply` requires the user's
          approval and `destroy` is blocked. Never run other destructive
          shell (rm, etc.); pause for approval on anything unrecognized.
        permission:
          edit: allow
          # Only the SAFE, read-only-ish subcommands auto-run; `apply` falls to
          # the `*: ask` default (needs human approval) and `destroy` is denied
          # outright — never auto-apply/destroy infra from an org-wide default.
          bash:
            "*": ask
            "terraform init*": allow
            "terraform validate*": allow
            "terraform plan*": allow
            "terraform fmt*": allow
            "terraform show*": allow
            "terraform output*": allow
            "terraform providers*": allow
            "tofu init*": allow
            "tofu validate*": allow
            "tofu plan*": allow
            "tofu fmt*": allow
            "terraform destroy*": deny
            "tofu destroy*": deny
            "rm *": deny
          "context7_*": allow
          "terraform_*": allow
      reviewer:
        mode: subagent
        model: "camer-digital/adorsys-reviewer"    # Adorsys Reviewer (→MiniMax M2.7)
        description: >-
          Reviews code/changes for correctness, security, and maintainability
          and returns findings. READ-ONLY — never edits files or runs shell.
          Delegate for "review this / what's wrong with X" tasks.
        temperature: 0.1
        prompt: >-
          You are a code reviewer. Read the change and surrounding code and
          report concrete correctness, security, and maintainability findings
          with file:line references. Use Context7 only to confirm correct API
          usage. You cannot edit files or run shell — do not attempt to.
        permission:
          edit: deny
          bash: deny
          "context7_*": allow
      test:
        mode: subagent
        model: "camer-digital/adorsys-coder"       # Adorsys Coder (→MiniMax M2.7) — TDD
        description: >-
          Writes and runs tests (TDD): adds failing tests, makes them pass, and
          runs the suite. Can edit code but only AUTO-runs test commands.
          Delegate for "write tests / run the tests / TDD this" tasks.
        temperature: 0.2
        prompt: >-
          You are a test-driven-development specialist. Write a failing test
          first, then the minimal code to pass it, and run the suite to verify.
          Use Context7 for testing-library docs. You may run test commands
          freely; anything else needs approval, and never run destructive shell.
        permission:
          edit: allow
          bash:
            "*": ask
            "npm test*": allow
            "npm run test*": allow
            "pnpm test*": allow
            "pnpm run test*": allow
            "bun test*": allow
            "yarn test*": allow
            "go test*": allow
            "pytest*": allow
            "uv run pytest*": allow
            "cargo test*": allow
            "vitest*": allow
            "jest*": allow
            "helm lint*": allow
            "helm template*": allow
            "rm *": deny
          "context7_*": allow
      skill:
        mode: subagent
        model: "camer-digital/adorsys-researcher"  # Adorsys Researcher (→DeepSeek V4)
        description: >-
          Authors and refines opencode skills (skill definitions) and helps pick
          the right skill for a task. Writes ONLY under the skills directory.
          Delegate for "write/refine a skill" tasks.
        temperature: 0.3
        prompt: >-
          You are an opencode skill author. Create and refine skill definitions
          under the skills directory, and use the skill tool to test discovery.
          Use Context7 for any library facts a skill needs. You may write ONLY
          under the skills directory — every other path is denied.
        permission:
          edit:
            "*": deny
            ".opencode/skills/**": allow
            "skills/**": allow
          bash: deny
          skill: allow
          "context7_*": allow
      frontend:
        mode: subagent
        model: "camer-digital/adorsys-frontend"    # Adorsys Frontend (→Nemotron Omni) — MULTIMODAL, reads screenshots
        description: >-
          Builds and edits frontend UI end-to-end, grounded in design
          references (Refero) and framework docs (Context7), and DRIVES a real
          browser (@vymalo/opencode-browser) to run the full loop: implement →
          reload → screenshot → inspect → decide → implement again, until the
          UI is right. Read + write; runs the JS toolchain with guardrails.
          Multimodal — reads the screenshots it captures. Delegate for
          "build / adjust / debug the UI" tasks. Requires the companion browser
          extension connected to the local bridge for the browser tools.
        temperature: 0.3
        prompt: >-
          You are a frontend specialist who closes the loop in a real browser.
          Workflow: pull design references from the Refero MCP and framework
          facts from Context7; implement (edit files, run the JS toolchain to
          build/serve); then drive the browser to verify your work — open or
          browser_reload the running app, browser_snapshot to get stable
          element refs, interact (click/type/fill) to reach the state you're
          building, and browser_screenshot to SEE the result (you are
          multimodal — read the saved screenshot under .opencode/browser/).
          Compare against the design reference, decide what's off, and iterate:
          edit → reload → screenshot → adjust, until it matches. Always
          snapshot before targeting elements (never guess selectors), and call
          browser_release when you're done so the user gets their browser back.
          You may edit files and run the JS toolchain (pnpm/npm/bun/yarn);
          never run destructive shell (rm, etc.) and pause for approval on
          anything unrecognized.
        permission:
          edit: allow
          bash:
            "*": ask
            "pnpm *": allow
            "npm *": allow
            "bun *": allow
            "yarn *": allow
            "rm *": deny
          "context7_*": allow
          "refero_*": allow
          # Re-allow the full @vymalo/opencode-browser surface (page+control)
          # so it is INJECTED here (and only here) for the implement→reload→
          # screenshot→iterate loop. This `allow` merges after the root
          # `browser_*: deny` and wins (findLast), so `frontend` gets the tools
          # while every other agent stays browser-free.
          "browser_*": allow

# ────────────────────────────────────────────────────────────────────────
# bjw-s app-template (aliased to `opencode-wellknown`). Renders the
# Deployment + Service + Ingress. The two ConfigMaps that hold the
# nginx config and the well-known JSON are emitted by this chart's
# own `templates/configmap.yaml` (the JSON content is built from
# `.Values.wellKnown` above and can't be expressed as plain string data
# in app-template values).
# ────────────────────────────────────────────────────────────────────────
opencode-wellknown:
  controllers:
    main:
      type: deployment
      replicas: 2
      strategy: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      pod:
        automountServiceAccountToken: false
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        # Note: no checksum/wellknown annotation here — the wellKnown
        # value lives at the parent chart's root and isn't reachable
        # from the sub-chart's tpl context. JSON edits require
        # `kubectl rollout restart` (documented in
        # `docs/opencode-well-known.md`).
      containers:
        nginx:
          image:
            repository: nginxinc/nginx-unprivileged
            tag: "1.27-alpine"
            pullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                periodSeconds: 30
                timeoutSeconds: 3
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                periodSeconds: 5
                timeoutSeconds: 2
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          enabled: true
          port: 80
          targetPort: 8080
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: cert-home-cert-http
      hosts:
        - host: ai.camer.digital
          paths:
            - path: /opencode/.well-known/opencode
              pathType: Exact
              service:
                identifier: main
                port: http
      tls:
        - secretName: ai.camer.digital-tls
          hosts:
            - ai.camer.digital

  # Mount the two externally-rendered ConfigMaps + nginx-unprivileged's
  # required writable scratch dirs.
  persistence:
    # The nginx server block (custom default.conf with the right
    # Content-Type and exact-match location for the well-known URL).
    # Name matches what templates/configmap.yaml emits.
    nginx-config:
      enabled: true
      type: configMap
      name: '{{ .Release.Name }}-nginx-config'
      advancedMounts:
        main:
          nginx:
            - path: /etc/nginx/conf.d
              readOnly: true
    # The well-known JSON itself (rendered from `.Values.wellKnown`).
    content:
      enabled: true
      type: configMap
      name: '{{ .Release.Name }}-content'
      advancedMounts:
        main:
          nginx:
            - path: /usr/share/nginx/html/opencode/.well-known
              readOnly: true
    # nginx-unprivileged needs writable scratch space (root FS is RO).
    tmp:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /tmp
    nginx-cache:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /var/cache/nginx
    nginx-run:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /var/run
