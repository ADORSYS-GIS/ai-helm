{{- /*
Caddyfile: serve the one governance Atom feed under a port. `rewrite * <path>`
forces EVERY request to the fixed upstream path, so this can never be abused as
an open proxy regardless of the request URL. TLS to GitHub is handled by Caddy
(Go TLS); admin/auto_https off since Traefik terminates TLS at the ingress.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-caddy
  labels:
    app: {{ .Values.name }}
data:
  Caddyfile: |-
    :{{ .Values.port }} {
      admin off
      auto_https off
      rewrite * {{ .Values.upstream.path }}
      reverse_proxy https://{{ .Values.upstream.host }} {
        header_up Host {{ .Values.upstream.host }}
      }
    }
