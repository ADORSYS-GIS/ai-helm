# lightbridge-code-intelligence — Lightbridge Code Intelligence stack.
#
# Components: Rust control plane (OAuth2 resource server + GitHub webhook trust boundary),
# Next.js web console (Keycloak OIDC client), and a Neo4j knowledge graph. Postgres/pgvector is
# REUSED from the CloudNativePG cluster `lightbridge-main-db` (charts/lightbridge-db)
# through a dedicated `codeintel` role + database (added there in this same change).
#
# Workloads are expressed via the bjw-s app-template (bjw-template v4.6.2, aliased
# `lci`). The release name is `lightbridge-ci`, so resources are `lightbridge-ci-<key>`.
# Namespace is `converse` (the lightbridge family namespace), matching the CNPG cluster.

# ── App-owned ExternalSecrets (templates/externalsecret.yaml) ────────────────
# Resolve against the ssegning-aws ClusterSecretStore. Legacy properties live under
# remoteRef key ai/camer/digital/prod/env; the GitHub App credentials live under the
# dedicated prod/codeintel/env (codeintelKey).
secrets:
  secretStore: ssegning-aws
  refreshInterval: 1h
  remoteKey: ai/camer/digital/prod/env
  neo4jPasswordProperty: lightbridge_ci_neo4j_password
  # GitHub App credentials (registered app for vymalo/lightbridge-code-intelligence). All three
  # live in the dedicated SM secret prod/codeintel/env so app config stays isolated from the
  # shared legacy bucket.
  codeintelKey: prod/codeintel/env
  githubAppIdProperty: github_app_id
  githubAppPrivateKeyProperty: github_app_private_key
  githubWebhookProperty: github_webhook_secret
  # The OIDC web image needs NO client secret (PUBLIC client + PKCE, ADR-0014). The property
  # below is TRANSITIONAL — still consumed by the outgoing better-auth image; remove once the
  # OIDC web image is confirmed live.
  betterAuthProperty: lightbridge_ci_better_auth_secret
  # Agent runner wiring (epic #5). The shared internal-API bearer + the operator-chosen review
  # model live in the dedicated prod/codeintel/env SM secret; the embeddings/LLM API key reuses the
  # shared eaig gateway key in ai/camer/digital/prod/env.
  #
  # OPERATOR TODO before agents work in prod — add to Secrets Manager:
  #   prod/codeintel/env:  agent_runner_token  = <random 32+ char bearer>
  #   prod/codeintel/env:  agent_llm_model     = <eaig chat model, e.g. qwen3-...>  (omit → review off)
  agentRunnerTokenProperty: agent_runner_token
  agentLlmModelProperty: agent_llm_model
  openaiKeyProperty: converse_openai_api_key

# ── Agent execution (epic #5): per-task Jobs in an isolated namespace ─────────
agents:
  enabled: true
  namespace: lightbridge-agents
  serviceAccount: lightbridge-agent
  # The runner image the dispatcher launches per task. Pinned tag; bump on release (not
  # image-updater-managed — it isn't a pod in this chart, it's an env value the dispatcher reads).
  runnerImage: ghcr.io/vymalo/lightbridge-agent-runner:latest
  # The gateway only serves embeddings/chat on the HTTPS `core-gateway-internal` ClusterIP (the HTTP
  # LoadBalancer 308-redirects / 404s by Host). Its cert is from ClusterIssuer/self-signed-ca, so the
  # runner mounts that CA (caSecret below) and trusts it — see k8s.rs AGENT_CA_SECRET + embeddings.rs.
  caSecret: lightbridge-agent-ca
  embeddings:
    # No trailing /v1 (the runner appends /v1/embeddings). The gateway serves qwen3-embedding-8b
    # (4096-dim, matched by migration 0005); it does NOT serve text-embedding-3-small.
    baseUrl: https://core-gateway-internal.envoy-gateway-system.svc.cluster.local
    model: qwen3-embedding-8b
  llm:
    # OpenCode review (slice 5). OFF by default so the first rollout is indexing-only and does not
    # depend on `agent_llm_model` existing in SM (a missing SM property fails the whole ExternalSecret,
    # which would take embeddings down with it). Flip to true AFTER setting agent_llm_model in SM.
    enabled: false
    # WITH /v1 (OpenCode posts to {baseURL}/chat/completions).
    baseUrl: https://core-gateway-internal.envoy-gateway-system.svc.cluster.local/v1

syncWave:
  secrets: "0"
  app: "2"

# ── bjw-s app-template (v4) instance ─────────────────────────────────────────
lci:
  # Force the fullname so resource/service names are deterministic `lightbridge-ci-*`
  # (the web→control-plane and Neo4j DNS names depend on this).
  fullnameOverride: lightbridge-ci

  # Cluster-baseline pod security applied to every controller below.
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

  controllers:
    # Rust control plane: GitHub webhook trust boundary + OAuth2 resource server
    # (validates Keycloak-issued JWTs; ADR-0014).
    control-plane:
      type: deployment
      # Single replica until delivery-id dedupe is durable: the control plane currently keeps
      # its X-GitHub-Delivery dedupe set in process memory, so two replicas behind the Service
      # could each accept the same delivery and (once task creation is wired) double-process it.
      # Move dedupe to Postgres before scaling out.
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            # Default/fallback only. The deployed tag is OVERRIDDEN at sync time by the
            # app repo's deploy/envs/production/values.yaml ($values source), which
            # argocd-image-updater owns — see charts/apps/values.yaml + the app repo.
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            BIND_ADDR: "0.0.0.0:8080"
            RUST_LOG: "info"
            # OAuth2 resource server: validate Keycloak-issued RS256 JWTs (ADR-0014). Required —
            # without OIDC_ISSUER the control plane fails readiness (fails closed).
            OIDC_ISSUER: "https://auth.verif.fyi/realms/camer-digital"
            # Expected access-token audience. The Keycloak realm must emit this in the token `aud`
            # (audience mapper / client scope on `code-intelligence`) or protected endpoints 401.
            OIDC_AUDIENCE: "code-intelligence"
            GITHUB_WEBHOOK_SECRET:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: webhook-secret
            # GitHub App auth (mint installation tokens for the read API + posting reviews).
            # Absent either, the control plane skips installation-token features but still
            # serves webhooks/JWT-protected reads (github::GithubApp::from_env → None).
            GITHUB_APP_ID:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-id
            GITHUB_APP_PRIVATE_KEY:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-private-key
            # DATABASE_URL reuses the CNPG cluster; $(DB_PASSWORD) is interpolated by the
            # kubelet, and `dependsOn` makes bjw emit DB_PASSWORD first.
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: lightbridge-codeintel-db-role
                  key: password
            DATABASE_URL:
              dependsOn: DB_PASSWORD
              value: "postgresql://codeintel:$(DB_PASSWORD)@lightbridge-main-db-rw.converse.svc.cluster.local:5432/codeintel"
            NEO4J_URI:
              value: "bolt://{{ .Release.Name }}-neo4j:7687"
            NEO4J_USERNAME: "neo4j"
            NEO4J_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-neo4j-auth'
                  key: password
            # Shared bearer for the internal runner API (ADR-0017). Present → serve enables the
            # /internal/* routes; absent → they fail closed (503). The dispatcher injects the same
            # value into each Job.
            AGENT_RUNNER_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-agent'
                  key: runner-token
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /readyz
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

    # Next.js web console: Keycloak OIDC client (Authorization-Code + PKCE; ADR-0014).
    web:
      type: deployment
      replicas: 2
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-web
            # Default/fallback only. The deployed tag is OVERRIDDEN at sync time by the
            # app repo's deploy/envs/production/values.yaml ($values source), which
            # argocd-image-updater owns — see charts/apps/values.yaml + the app repo.
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            NODE_ENV: "production"
            PORT: "3000"
            HOSTNAME: "0.0.0.0"
            # Keycloak OIDC client (ADR-0014). Public client + PKCE → NO client secret.
            OIDC_ISSUER: "https://auth.verif.fyi/realms/camer-digital"
            OIDC_CLIENT_ID: "code-intelligence"
            OIDC_REDIRECT_URI: "https://code-intelligence.ai.camer.digital/api/auth/callback"
            OIDC_POST_LOGOUT_REDIRECT_URI: "https://code-intelligence.ai.camer.digital"
            # TRANSITIONAL (remove once the OIDC web image is live — see chart bump notes):
            # the chart config (Source A, ai-helm release) and the image tag (Source B,
            # image-updater on app main) sync independently, so this chart must work with BOTH
            # the old better-auth image AND the new OIDC image. The new image ignores these.
            AUTH_BACKEND_URL: "http://{{ .Release.Name }}-control-plane:8080"
            BETTER_AUTH_URL: "https://code-intelligence.ai.camer.digital"
            BETTER_AUTH_SECRET:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-auth'
                  key: better-auth-secret
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 10
                periodSeconds: 20
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

    # Neo4j knowledge graph (single-instance StatefulSet; 5.26 LTS).
    neo4j:
      type: statefulset
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      # Govern the StatefulSet with the neo4j Service (rather than the default fullname,
      # which has no matching Service). Single replica → the ClusterIP service is reached
      # at lightbridge-ci-neo4j:7687.
      statefulset:
        serviceName:
          identifier: neo4j
        # /data via a StatefulSet volumeClaimTemplate (NOT a standalone PVC): the PVC is owned
        # by the StatefulSet and created WITH the pod, so it binds on schedule (WaitForFirstConsumer)
        # — no separately-ArgoCD-managed PVC to health-gate (sync-wave deadlock), no Replace churn,
        # no orphaned Terminating PVC. bjw wires the mount from globalMounts below.
        volumeClaimTemplates:
          - name: data
            accessMode: ReadWriteOnce
            size: 10Gi
            globalMounts:
              - path: /data
      # The neo4j image runs as uid/gid 7474. Pin it + fsGroup so the non-root process can
      # write the /data PVC even on storage classes that provision root-owned volumes
      # (otherwise the pod CrashLoops). Overrides defaultPodOptions for this controller.
      pod:
        securityContext:
          runAsNonRoot: true
          runAsUser: 7474
          runAsGroup: 7474
          fsGroup: 7474
          seccompProfile:
            type: RuntimeDefault
      containers:
        main:
          image:
            repository: neo4j
            tag: "5.26-community"
            pullPolicy: IfNotPresent
          env:
            # NOT prefixed `NEO4J_`: the neo4j image maps every NEO4J_* env var to a config
            # setting, so a literal NEO4J_PASSWORD becomes the unknown setting `password` and
            # fails strict_validation at startup. This is just the helper for NEO4J_AUTH.
            LB_NEO4J_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-neo4j-auth'
                  key: password
            NEO4J_AUTH:
              dependsOn: LB_NEO4J_PASSWORD
              value: "neo4j/$(LB_NEO4J_PASSWORD)"
            NEO4J_server_memory_pagecache_size: "512M"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 7687
                initialDelaySeconds: 30
                periodSeconds: 20
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 7687
                initialDelaySeconds: 15
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 2Gi }
          securityContext:
            allowPrivilegeEscalation: false
            # Neo4j writes its rendered config to /var/lib/neo4j/conf at startup, so it needs a
            # writable rootfs (the official image is not read-only-rootfs compatible). /data still
            # persists on the PVC. A scoped Trivy ignore covers KSV-0014 for this container.
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]

    # Dispatcher: the same control-plane image in the `dispatcher` role (RFC-0001). Consumes the
    # Postgres work queue (SKIP LOCKED) and launches one agent Job per task in the agents namespace
    # (ADR-0004). No HTTP server beyond /metrics; runs under a dedicated SA with Job-CRUD RBAC there.
    dispatcher:
      type: deployment
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      # Run as the dedicated SA (created in templates/agents-rbac.yaml) that holds Job-CRUD in the
      # agents namespace — not the shared `default` SA the other controllers use. `serviceAccount.name`
      # references an existing SA by name (bjw sets serviceAccountName without creating one).
      serviceAccount:
        name: lightbridge-ci-dispatcher
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            CONTROL_PLANE_ROLE: "dispatcher"
            RUST_LOG: "info"
            METRICS_ADDR: "0.0.0.0:9090"
            # Same Postgres queue the serve role + webhook write to (dispatcher requires it).
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: lightbridge-codeintel-db-role
                  key: password
            DATABASE_URL:
              dependsOn: DB_PASSWORD
              value: "postgresql://codeintel:$(DB_PASSWORD)@lightbridge-main-db-rw.converse.svc.cluster.local:5432/codeintel"
            # Injected into each Job + presented by the runner on the callback (ADR-0017).
            AGENT_RUNNER_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-agent'
                  key: runner-token
            # Where Jobs run, who they run as, what image, and where they call back (the serve Svc).
            # Literals (not {{ .Values.agents.* }}): bjw renders env against the sub-chart scope where
            # the top-level `agents` values aren't visible. Keep in sync with the `agents:` block.
            AGENT_NAMESPACE: "lightbridge-agents"
            AGENT_SERVICE_ACCOUNT: "lightbridge-agent"
            AGENT_RUNNER_IMAGE: "ghcr.io/vymalo/lightbridge-agent-runner:latest"
            # Secret (agents ns) whose ca.crt the runner mounts to trust the HTTPS gateway.
            AGENT_CA_SECRET: "lightbridge-agent-ca"
            # FQDN, not the bare Service name: the runner Jobs run in the lightbridge-agents
            # namespace, so a same-namespace short name would not resolve to the control-plane
            # Service in `converse`.
            CONTROL_PLANE_INTERNAL_URL: "http://{{ .Release.Name }}-control-plane.{{ .Release.Namespace }}.svc.cluster.local:8080"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

  service:
    control-plane:
      controller: control-plane
      ports:
        http:
          port: 8080
    web:
      controller: web
      ports:
        http:
          port: 3000
    neo4j:
      controller: neo4j
      ports:
        bolt:
          port: 7687
        http:
          port: 7474

  ingress:
    web:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: cert-home-cert-http
      hosts:
        - host: code-intelligence.ai.camer.digital
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: web
                port: http
      tls:
        - secretName: code-intelligence.ai.camer.digital-tls
          hosts:
            - code-intelligence.ai.camer.digital
    control-plane:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: cert-home-cert-http
      hosts:
        - host: code-intelligence-api.ai.camer.digital
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: control-plane
                port: http
      tls:
        - secretName: code-intelligence-api.ai.camer.digital-tls
          hosts:
            - code-intelligence-api.ai.camer.digital

  # emptyDir scratch dirs for the read-only-rootfs containers (control-plane, web).
  # Neo4j /data is NOT here — it's a StatefulSet volumeClaimTemplate on the neo4j controller
  # (see `statefulset.volumeClaimTemplates` above); neo4j runs with a writable rootfs so it
  # needs no scratch emptyDirs. advancedMounts scope each volume to one container.
  persistence:
    cp-tmp:
      type: emptyDir
      advancedMounts:
        control-plane:
          main:
            - path: /tmp
    web-tmp:
      type: emptyDir
      advancedMounts:
        web:
          main:
            - path: /tmp
    web-next-cache:
      type: emptyDir
      advancedMounts:
        web:
          main:
            - path: /app/.next/cache
