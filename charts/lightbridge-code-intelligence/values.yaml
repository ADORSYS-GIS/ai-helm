# lightbridge-code-intelligence — Lightbridge Code Intelligence stack.
#
# Components: Rust control plane (OAuth2 resource server + GitHub webhook trust boundary),
# Next.js web console (Keycloak OIDC client), and a Neo4j knowledge graph. Postgres/pgvector is
# REUSED from the CloudNativePG cluster `lightbridge-main-db` (charts/lightbridge-db)
# through a dedicated `codeintel` role + database (added there in this same change).
#
# Workloads are expressed via the bjw-s app-template (bjw-template v4.6.2, aliased
# `lci`). The release name is `lightbridge-ci`, so resources are `lightbridge-ci-<key>`.
# Namespace is `converse` (the lightbridge family namespace), matching the CNPG cluster.

# ── App-owned ExternalSecrets (templates/externalsecret.yaml) ────────────────
# DEPLOYMENT-SPECIFIC: the secret-store coordinates (store name + remoteRef keys/paths) and the SM
# property names are EMPTY here and supplied per-environment from ai-helm-values
# (environments/<env>/values/lightbridge-code-intelligence.yaml). The chart only owns the STRUCTURE
# (which secrets exist + their `<release>-*` target names); WHERE they come from is an env concern.
# Defaults-only renders (helm lint) therefore emit empty store/property refs — that is expected.
secrets:
  # Sensible base default; an env may shorten/lengthen it in the override.
  refreshInterval: 1h
  # ── All values below → ai-helm-values (prod override) ──────────────────────
  # ClusterSecretStore name + the two remoteRef keys (the shared bucket + the dedicated codeintel
  # bucket). The GitHub App credentials live under codeintelKey, the legacy/shared props under remoteKey.
  secretStore: ""
  remoteKey: ""
  codeintelKey: ""
  # SM property names (keys within the remote secrets). Deployment-named → env-owned.
  neo4jPasswordProperty: ""
  githubAppIdProperty: ""
  githubAppPrivateKeyProperty: ""
  githubWebhookProperty: ""
  # TRANSITIONAL — consumed only by the outgoing better-auth image (the OIDC web image is a PUBLIC
  # client + PKCE, ADR-0014, and needs no client secret). Remove once the OIDC image is confirmed live.
  betterAuthProperty: ""
  # Agent runner wiring (epic #5): the shared internal-API bearer (codeintelKey) + the embeddings/LLM
  # gateway API key (remoteKey, reused from the shared eaig key). The review chat model is NOT a secret —
  # it's agents.llm.model (also env-owned).
  agentRunnerTokenProperty: ""
  openaiKeyProperty: ""

# ── Agent execution (epic #5): per-task Jobs in an isolated namespace ─────────
agents:
  enabled: true
  namespace: lightbridge-agents
  serviceAccount: lightbridge-agent
  # The runner image the dispatcher launches per task. Pinned tag; bump on release (not
  # image-updater-managed — it isn't a pod in this chart, it's an env value the dispatcher reads).
  runnerImage: ghcr.io/vymalo/lightbridge-agent-runner:latest
  # The gateway only serves embeddings/chat on the HTTPS `core-gateway-internal` ClusterIP (the HTTP
  # LoadBalancer 308-redirects / 404s by Host). Its cert is from ClusterIssuer/self-signed-ca, so the
  # runner mounts that CA (caSecret below) and trusts it — see k8s.rs AGENT_CA_SECRET + embeddings.rs.
  caSecret: lightbridge-agent-ca
  # DEPLOYMENT-SPECIFIC (gateway URL + model choice) → ai-helm-values. The base URLs point at the
  # in-cluster inference gateway (different per cluster); the models are an operator/infra choice that
  # must match what that gateway serves (and, for embeddings, the DB column dimension — see
  # config.embeddings.dimension). Empty here; supplied in the env override.
  embeddings:
    # No trailing /v1 (the runner appends /v1/embeddings). Prod serves qwen3-embedding-8b (4096-dim,
    # matched by migration 0005 + config.embeddings.dimension); it does NOT serve text-embedding-3-small.
    baseUrl: ""
    model: ""
  llm:
    # Review feature flag — ON by default (the agent posts automated PR reviews, ticket #48). Base
    # default; an env may disable review without touching the rest of the wiring.
    enabled: true
    # WITH /v1 (the reviewer posts to {baseURL}/chat/completions). → ai-helm-values.
    baseUrl: ""
    # The eaig chat model the reviewer uses (a plain literal, not a secret). The gateway serves
    # purpose-named `adorsys-reviewer`/`-pro`. → ai-helm-values.
    model: ""

# ── File-based configuration (ConfigMap-mounted; ADR-0021) ───────────────────
# Rendered into two ConfigMaps by templates/config.yaml: control-plane.json (release ns, read by the
# serve + dispatcher roles) and agent.json + review-system.md (agents ns, mounted into each runner
# Job). Empty knobs are omitted from the JSON so the binaries fall back to their built-in defaults.
# Secrets are NOT here — endpoints/keys stay in the agent secret and reach agent.json via `{env:…}`.
config:
  # Name of the agents-namespace ConfigMap holding agent.json (+ the prompt template). The dispatcher
  # is told this via AGENT_CONFIG_CONFIGMAP and mounts it into each Job at /etc/lightbridge.
  agentConfigMap: lightbridge-agent-config

  # The @mention trigger handle (webhook.rs): an issue comment must start with `@<handle>` to launch a
  # re-review. The first review per PR is still automatic (on `opened`). DEPLOYMENT-SPECIFIC — this is
  # the registered GitHub App's handle (a different deployment registers its own app). → ai-helm-values.
  # Keep in sync with the env literals GITHUB_APP_HANDLE (control-plane) + GITHUB_APP_INSTALL_URL (web).
  appHandle: ""

  # Reviewer guidance — the mounted system-prompt template (env-substituted): the agent's persona and
  # operating instructions, the SOURCE OF TRUTH for its behaviour. ADR-0037: the runner has NO built-in
  # default, so an empty prompt fails the review CLOSED rather than running a weak baked-in one.
  #
  # DEPLOYMENT-SPECIFIC and intentionally EMPTY here: the operator-owned prompt lives in ai-helm-values
  # (environments/<env>/values/lightbridge-code-intelligence.yaml) so it can be tuned per-env without an
  # image rebuild (edit → ConfigMap → ArgoCD sync). It was previously duplicated in full here AND there;
  # the copies diverged, so the chart no longer carries one. The machine tool-protocol (how to call
  # add_review_comment / add_comment / finish) is appended by the runner and is not part of this text.
  reviewSystemPrompt: ""

  # Review LLM generation params → the model's `options` in opencode.json. Empty → model/provider
  # default. (max_diff_chars caps the diff pasted into the prompt.) maxTurns is operator-tuned per-env
  # → ai-helm-values; the rest stay empty (provider defaults) until an env needs them.
  model:
    temperature: ""
    topP: ""
    maxTokens: ""
    maxDiffChars: ""
    # Max agent turns per review (ADR-0037 loop). Empty → the runner's built-in default (40).
    # → agent.json `review.max_turns`.
    maxTurns: ""
    # Secondary review model to fail over to when the primary times out / errs out a turn (ADR-0039).
    # Empty → single-model (no failover). → agent.json `review.fallback_model`. Set per-env in
    # ai-helm-values to a DIFFERENT alias than the primary so a primary-path outage actually fails over.
    fallbackModel: ""

  # PR feedback the control plane applies (FILE-ONLY knobs — no env equivalent).
  review:
    reactions: true        # 👀 started → 🎉 done / 😕 errored on the PR description
    labelReviewed: ""      # label added on every posted review (e.g. lightbridge-reviewed)
    labelFindings: needs-review  # ≥1 finding of any severity
    labelError: bug        # ≥1 error-severity finding

  # Embedding-store safety (ADR-0018). The live `code_chunks.embedding` column is vector(4096), set by
  # migration 0005 to match qwen3-embedding-8b. Changing the embedding model's dimension is
  # DESTRUCTIVE: on a mismatch the control plane either wipes + re-migrates the column (only when
  # allowReindexOnDimChange is true) or fails startup loud. Keep the flag false in normal operation;
  # flip it deliberately, in the same change that switches the embedding model, to reindex.
  embeddings:
    dimension: 4096
    allowReindexOnDimChange: false

  # Dispatcher tuning (RFC-0001). Empty → built-in defaults.
  dispatcher:
    claimLeaseSeconds: ""
    pollFallbackSeconds: ""
    launchBackoffSeconds: ""
    reapIntervalSeconds: ""

  # The runner Job's container resources (k8s requests/limits), set verbatim on the Job. Indexing
  # (clone + tree-sitter + embed + Graphify) is CPU/memory-heavy on large repos, so the runner gets a
  # bigger budget than the control-plane pods.
  runnerResources:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

syncWave:
  secrets: "0"
  app: "2"

# ── metrics scraping ─────────────────────────────────────────────────────────
# ServiceMonitors that point Alloy (prometheus.operator.servicemonitors) at the control-plane's
# /metrics (serve role :8080) and the dispatcher's (:9090). OFF in chart defaults so a defaults-only
# render (helm lint / chart CI, no monitoring.coreos.com CRDs) emits nothing; the prod values turn it
# on. Powers the Operations dashboard (deploy/observability, lightbridge-code-intelligence repo).
metrics:
  serviceMonitors:
    enabled: false
    interval: 30s

# ── bjw-s app-template (v4) instance ─────────────────────────────────────────
lci:
  # Force the fullname so resource/service names are deterministic `lightbridge-ci-*`
  # (the web→control-plane and Neo4j DNS names depend on this).
  fullnameOverride: lightbridge-ci

  # Cluster-baseline pod security applied to every controller below.
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

  controllers:
    # Rust control plane: GitHub webhook trust boundary + OAuth2 resource server
    # (validates Keycloak-issued JWTs; ADR-0014).
    control-plane:
      type: deployment
      # Single replica until delivery-id dedupe is durable: the control plane currently keeps
      # its X-GitHub-Delivery dedupe set in process memory, so two replicas behind the Service
      # could each accept the same delivery and (once task creation is wired) double-process it.
      # Move dedupe to Postgres before scaling out.
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            # Default/fallback only. The deployed tag is OVERRIDDEN at sync time by the
            # app repo's deploy/envs/production/values.yaml ($values source), which
            # argocd-image-updater owns — see charts/apps/values.yaml + the app repo.
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            BIND_ADDR: "0.0.0.0:8080"
            RUST_LOG: "info"
            # File config (ADR-0021): read control-plane.json from the mounted ConfigMap (review
            # labels/reactions + the embedding-dimension guard). Absent the file the binary uses env.
            CONTROL_PLANE_CONFIG: "/etc/lightbridge/control-plane.json"
            # The @mention trigger handle (webhook.rs). Comments must start with `@<handle>`. A literal
            # (bjw renders env against the sub-chart scope where top-level `.Values` isn't visible).
            # DEPLOYMENT-SPECIFIC → ai-helm-values; keep in sync with `config.appHandle` + the web
            # GITHUB_APP_INSTALL_URL. Empty here.
            GITHUB_APP_HANDLE: ""
            # Authorization (ADR-0023): the dotted token claim carrying the caller's permissions list.
            # The IdP/gateway must emit this; endpoints fail closed without it. Default `permissions`.
            PERMISSIONS_CLAIM: "permissions"
            # OAuth2 resource server: validate Keycloak-issued RS256 JWTs (ADR-0014). Required at
            # runtime — without OIDC_ISSUER the control plane fails readiness (fails closed).
            # DEPLOYMENT-SPECIFIC (IdP realm URL) → ai-helm-values; empty here.
            OIDC_ISSUER: ""
            # Expected access-token audience. The Keycloak realm must emit this in the token `aud`
            # (audience mapper / client scope) or protected endpoints 401. DEPLOYMENT-SPECIFIC →
            # ai-helm-values; empty here.
            OIDC_AUDIENCE: ""
            GITHUB_WEBHOOK_SECRET:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: webhook-secret
            # GitHub App auth (mint installation tokens for the read API + posting reviews).
            # Absent either, the control plane skips installation-token features but still
            # serves webhooks/JWT-protected reads (github::GithubApp::from_env → None).
            GITHUB_APP_ID:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-id
            GITHUB_APP_PRIVATE_KEY:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-private-key
            # DATABASE_URL reuses the CNPG cluster; $(DB_PASSWORD) is interpolated by the
            # kubelet, and `dependsOn` makes bjw emit DB_PASSWORD first. The connection string bakes in
            # the cluster host/namespace/db (deployment topology) → its `value` lives in ai-helm-values
            # (must include `$(DB_PASSWORD)`); `dependsOn` stays here. Empty here.
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: lightbridge-codeintel-db-role
                  key: password
            DATABASE_URL:
              dependsOn: DB_PASSWORD
              value: ""
            NEO4J_URI:
              value: "bolt://{{ .Release.Name }}-neo4j:7687"
            NEO4J_USERNAME: "neo4j"
            NEO4J_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-neo4j-auth'
                  key: password
            # Shared bearer for the internal runner API (ADR-0017). Present → serve enables the
            # /internal/* routes; absent → they fail closed (503). The dispatcher injects the same
            # value into each Job.
            AGENT_RUNNER_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-agent'
                  key: runner-token
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /readyz
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

    # Next.js web console: Keycloak OIDC client (Authorization-Code + PKCE; ADR-0014).
    web:
      type: deployment
      replicas: 2
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      # Run as the dedicated web SA (templates/agents-rbac.yaml) that holds read-only pods/log access
      # in the agents namespace, so the console can stream a run's Job logs (Epic #75, Milestone C).
      serviceAccount:
        name: lightbridge-ci-web
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-web
            # Default/fallback only. The deployed tag is OVERRIDDEN at sync time by the
            # app repo's deploy/envs/production/values.yaml ($values source), which
            # argocd-image-updater owns — see charts/apps/values.yaml + the app repo.
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            NODE_ENV: "production"
            PORT: "3000"
            HOSTNAME: "0.0.0.0"
            # Agents namespace the console reads Job logs from (Epic #75, Milestone C). Literal; keep
            # in sync with `agents.namespace`.
            AGENT_NAMESPACE: "lightbridge-agents"
            # Public install page for the GitHub App, used by the console's empty-state CTAs and
            # Settings link. DEPLOYMENT-SPECIFIC (https://github.com/apps/<handle>) → ai-helm-values;
            # keep in sync with `config.appHandle` + the control-plane GITHUB_APP_HANDLE. Empty here.
            GITHUB_APP_INSTALL_URL: ""
            # Authorization (ADR-0023): the dotted token claim carrying the caller's permissions. The
            # console reads it to show capability-gated affordances; keep in sync with the control
            # plane's PERMISSIONS_CLAIM. Default `permissions`.
            PERMISSIONS_CLAIM: "permissions"
            # Keycloak OIDC client (ADR-0014). Public client + PKCE → NO client secret. All four values
            # below are DEPLOYMENT-SPECIFIC (IdP realm + public web URL) → ai-helm-values. Empty here.
            OIDC_ISSUER: ""
            OIDC_CLIENT_ID: ""
            OIDC_REDIRECT_URI: ""
            OIDC_POST_LOGOUT_REDIRECT_URI: ""
            # AUTH_BACKEND_URL is templated from the release name (NOT env-specific) → stays here.
            # BETTER_AUTH_URL is the public web URL → ai-helm-values. Both are TRANSITIONAL (remove once
            # the OIDC web image is live — see chart bump notes): the chart config (Source A, ai-helm
            # release) and the image tag (Source B, image-updater) sync independently, so this chart must
            # work with BOTH the old better-auth image AND the new OIDC image. The new image ignores these.
            AUTH_BACKEND_URL: "http://{{ .Release.Name }}-control-plane:8080"
            BETTER_AUTH_URL: ""
            BETTER_AUTH_SECRET:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-auth'
                  key: better-auth-secret
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 10
                periodSeconds: 20
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

    # Neo4j knowledge graph (single-instance StatefulSet; 5.26 LTS).
    neo4j:
      type: statefulset
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      # Govern the StatefulSet with the neo4j Service (rather than the default fullname,
      # which has no matching Service). Single replica → the ClusterIP service is reached
      # at lightbridge-ci-neo4j:7687.
      statefulset:
        serviceName:
          identifier: neo4j
        # /data via a StatefulSet volumeClaimTemplate (NOT a standalone PVC): the PVC is owned
        # by the StatefulSet and created WITH the pod, so it binds on schedule (WaitForFirstConsumer)
        # — no separately-ArgoCD-managed PVC to health-gate (sync-wave deadlock), no Replace churn,
        # no orphaned Terminating PVC. bjw wires the mount from globalMounts below.
        volumeClaimTemplates:
          - name: data
            accessMode: ReadWriteOnce
            size: 10Gi
            globalMounts:
              - path: /data
      # The neo4j image runs as uid/gid 7474. Pin it + fsGroup so the non-root process can
      # write the /data PVC even on storage classes that provision root-owned volumes
      # (otherwise the pod CrashLoops). Overrides defaultPodOptions for this controller.
      pod:
        securityContext:
          runAsNonRoot: true
          runAsUser: 7474
          runAsGroup: 7474
          fsGroup: 7474
          seccompProfile:
            type: RuntimeDefault
      containers:
        main:
          image:
            repository: neo4j
            tag: "5.26-community"
            pullPolicy: IfNotPresent
          env:
            # NOT prefixed `NEO4J_`: the neo4j image maps every NEO4J_* env var to a config
            # setting, so a literal NEO4J_PASSWORD becomes the unknown setting `password` and
            # fails strict_validation at startup. This is just the helper for NEO4J_AUTH.
            LB_NEO4J_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-neo4j-auth'
                  key: password
            NEO4J_AUTH:
              dependsOn: LB_NEO4J_PASSWORD
              value: "neo4j/$(LB_NEO4J_PASSWORD)"
            NEO4J_server_memory_pagecache_size: "512M"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 7687
                initialDelaySeconds: 30
                periodSeconds: 20
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 7687
                initialDelaySeconds: 15
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 2Gi }
          securityContext:
            allowPrivilegeEscalation: false
            # Neo4j writes its rendered config to /var/lib/neo4j/conf at startup, so it needs a
            # writable rootfs (the official image is not read-only-rootfs compatible). /data still
            # persists on the PVC. A scoped Trivy ignore covers KSV-0014 for this container.
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]

    # Dispatcher: the same control-plane image in the `dispatcher` role (RFC-0001). Consumes the
    # Postgres work queue (SKIP LOCKED) and launches one agent Job per task in the agents namespace
    # (ADR-0004). No HTTP server beyond /metrics; runs under a dedicated SA with Job-CRUD RBAC there.
    dispatcher:
      type: deployment
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      # Run as the dedicated SA (created in templates/agents-rbac.yaml) that holds Job-CRUD in the
      # agents namespace — not the shared `default` SA the other controllers use. `serviceAccount.name`
      # references an existing SA by name (bjw sets serviceAccountName without creating one).
      serviceAccount:
        name: lightbridge-ci-dispatcher
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            CONTROL_PLANE_ROLE: "dispatcher"
            RUST_LOG: "info"
            METRICS_ADDR: "0.0.0.0:9090"
            # File config (ADR-0021): control-plane.json drives the runner Job resources + dispatcher
            # tuning; the binary falls back to the AGENT_*/defaults below when a field is absent.
            CONTROL_PLANE_CONFIG: "/etc/lightbridge/control-plane.json"
            # ConfigMap (agents ns) the dispatcher mounts into each Job as agent.json (review model
            # params + prompt template); k8s.rs sets AGENT_CONFIG=/etc/lightbridge/agent.json there.
            # Literal (sub-chart env scope); keep in sync with `config.agentConfigMap`.
            AGENT_CONFIG_CONFIGMAP: "lightbridge-agent-config"
            # Same Postgres queue the serve role + webhook write to (dispatcher requires it).
            # DATABASE_URL `value` (cluster host/namespace/db) → ai-helm-values; `dependsOn` stays here.
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: lightbridge-codeintel-db-role
                  key: password
            DATABASE_URL:
              dependsOn: DB_PASSWORD
              value: ""
            # Injected into each Job + presented by the runner on the callback (ADR-0017).
            AGENT_RUNNER_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-agent'
                  key: runner-token
            # Where Jobs run, who they run as, what image, and where they call back (the serve Svc).
            # Literals (not {{ .Values.agents.* }}): bjw renders env against the sub-chart scope where
            # the top-level `agents` values aren't visible. Keep in sync with the `agents:` block.
            AGENT_NAMESPACE: "lightbridge-agents"
            AGENT_SERVICE_ACCOUNT: "lightbridge-agent"
            AGENT_RUNNER_IMAGE: "ghcr.io/vymalo/lightbridge-agent-runner:latest"
            # Secret (agents ns) whose ca.crt the runner mounts to trust the HTTPS gateway.
            AGENT_CA_SECRET: "lightbridge-agent-ca"
            # FQDN, not the bare Service name: the runner Jobs run in the lightbridge-agents
            # namespace, so a same-namespace short name would not resolve to the control-plane
            # Service in `converse`.
            CONTROL_PLANE_INTERNAL_URL: "http://{{ .Release.Name }}-control-plane.{{ .Release.Namespace }}.svc.cluster.local:8080"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

    # Review-feedback poller (ADR-0035): a single replica that periodically reads reactions on the
    # comments we posted and reconciles them into review_feedback. SAME image as control-plane/
    # dispatcher (role-selected via CONTROL_PLANE_ROLE). Unlike the dispatcher it holds the GitHub App
    # key (to mint installation tokens for reading reactions); ONE replica so reactions aren't
    # double-polled (ADR-0002 keeps the credential off the multi-replica serve pods + the dispatcher).
    poller:
      type: deployment
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            # Default/fallback; the deployed tag is overridden at sync time by ai-helm-values via the
            # image-updater `poll` alias (charts/apps/values.yaml), in lockstep with control-plane.
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            CONTROL_PLANE_ROLE: "poller"
            RUST_LOG: "info"
            METRICS_ADDR: "0.0.0.0:9090"
            # Optional cadence knobs; absent → run_poller defaults (300s interval / 14-day window).
            # DATABASE_URL `value` (cluster host/namespace/db) → ai-helm-values; `dependsOn` stays here.
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: lightbridge-codeintel-db-role
                  key: password
            DATABASE_URL:
              dependsOn: DB_PASSWORD
              value: ""
            # The poller mints installation tokens to read reactions, so it needs the GitHub App key
            # (the dispatcher does not). Same secret the control-plane uses.
            GITHUB_APP_ID:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-id
            GITHUB_APP_PRIVATE_KEY:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-private-key
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

  service:
    control-plane:
      controller: control-plane
      ports:
        http:
          port: 8080
    web:
      controller: web
      ports:
        http:
          port: 3000
    neo4j:
      controller: neo4j
      ports:
        bolt:
          port: 7687
        http:
          port: 7474
    # Metrics-only Service for the dispatcher role (METRICS_ADDR :9090). The serve role's /metrics is
    # already on the control-plane Service (:8080); the dispatcher/poller have no Service otherwise, so
    # this gives the ServiceMonitor (templates/servicemonitor.yaml) a stable Endpoints target. The
    # dispatcher pod declares no containerPort, but a Service routes by numeric targetPort regardless.
    dispatcher:
      controller: dispatcher
      ports:
        metrics:
          port: 9090

  # DEPLOYMENT-SPECIFIC: ingress is OFF by default — the ingress class, cert-manager cluster-issuer,
  # public hostnames, and TLS secrets are all env-specific, so the FULL ingress config (enabled: true +
  # className + annotations + hosts + tls) lives in ai-helm-values per environment. A defaults-only
  # render therefore emits NO Ingress (rather than a broken empty-host one). The override turns it on.
  ingress:
    web:
      enabled: false
    control-plane:
      enabled: false

  # emptyDir scratch dirs for the read-only-rootfs containers (control-plane, web).
  # Neo4j /data is NOT here — it's a StatefulSet volumeClaimTemplate on the neo4j controller
  # (see `statefulset.volumeClaimTemplates` above); neo4j runs with a writable rootfs so it
  # needs no scratch emptyDirs. advancedMounts scope each volume to one container.
  persistence:
    # control-plane.json (ADR-0021), mounted read-only into the serve + dispatcher roles. `name`
    # references the standalone ConfigMap from templates/config.yaml (not a bjw-created one).
    control-plane-config:
      type: configMap
      name: lightbridge-ci-control-plane-config
      advancedMounts:
        control-plane:
          main:
            - path: /etc/lightbridge
              readOnly: true
        dispatcher:
          main:
            - path: /etc/lightbridge
              readOnly: true
    cp-tmp:
      type: emptyDir
      advancedMounts:
        control-plane:
          main:
            - path: /tmp
    web-tmp:
      type: emptyDir
      advancedMounts:
        web:
          main:
            - path: /tmp
    web-next-cache:
      type: emptyDir
      advancedMounts:
        web:
          main:
            - path: /app/.next/cache
