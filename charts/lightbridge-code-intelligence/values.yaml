# lightbridge-code-intelligence — Lightbridge Code Intelligence stack.
#
# Components: Rust control plane (OAuth2 resource server + GitHub webhook trust boundary),
# Next.js web console (Keycloak OIDC client), and a Neo4j knowledge graph. Postgres/pgvector is
# REUSED from the CloudNativePG cluster `lightbridge-main-db` (charts/lightbridge-db)
# through a dedicated `codeintel` role + database (added there in this same change).
#
# Workloads are expressed via the bjw-s app-template (bjw-template v4.6.2, aliased
# `lci`). The release name is `lightbridge-ci`, so resources are `lightbridge-ci-<key>`.
# Namespace is `converse` (the lightbridge family namespace), matching the CNPG cluster.

# ── App-owned ExternalSecrets (templates/externalsecret.yaml) ────────────────
# Resolve against the ssegning-aws ClusterSecretStore. Legacy properties live under
# remoteRef key ai/camer/digital/prod/env; the GitHub App credentials live under the
# dedicated prod/codeintel/env (codeintelKey).
secrets:
  secretStore: ssegning-aws
  refreshInterval: 1h
  remoteKey: ai/camer/digital/prod/env
  neo4jPasswordProperty: lightbridge_ci_neo4j_password
  # GitHub App credentials (registered app for vymalo/lightbridge-code-intelligence). All three
  # live in the dedicated SM secret prod/codeintel/env so app config stays isolated from the
  # shared legacy bucket.
  codeintelKey: prod/codeintel/env
  githubAppIdProperty: github_app_id
  githubAppPrivateKeyProperty: github_app_private_key
  githubWebhookProperty: github_webhook_secret
  # The OIDC web image needs NO client secret (PUBLIC client + PKCE, ADR-0014). The property
  # below is TRANSITIONAL — still consumed by the outgoing better-auth image; remove once the
  # OIDC web image is confirmed live.
  betterAuthProperty: lightbridge_ci_better_auth_secret
  # Agent runner wiring (epic #5). The shared internal-API bearer + the operator-chosen review
  # model live in the dedicated prod/codeintel/env SM secret; the embeddings/LLM API key reuses the
  # shared eaig gateway key in ai/camer/digital/prod/env.
  #
  # OPERATOR TODO (one-time): in Secrets Manager prod/codeintel/env set
  #   agent_runner_token = <random 32+ char bearer>   (done — agents are live)
  # The review chat model is NOT here — it's a plain chart literal (agents.llm.model); the LLM API
  # key reuses the shared eaig gateway key (converse_openai_api_key in ai/camer/digital/prod/env).
  agentRunnerTokenProperty: agent_runner_token
  openaiKeyProperty: converse_openai_api_key

# ── Agent execution (epic #5): per-task Jobs in an isolated namespace ─────────
agents:
  enabled: true
  namespace: lightbridge-agents
  serviceAccount: lightbridge-agent
  # The runner image the dispatcher launches per task. Pinned tag; bump on release (not
  # image-updater-managed — it isn't a pod in this chart, it's an env value the dispatcher reads).
  runnerImage: ghcr.io/vymalo/lightbridge-agent-runner:latest
  # The gateway only serves embeddings/chat on the HTTPS `core-gateway-internal` ClusterIP (the HTTP
  # LoadBalancer 308-redirects / 404s by Host). Its cert is from ClusterIssuer/self-signed-ca, so the
  # runner mounts that CA (caSecret below) and trusts it — see k8s.rs AGENT_CA_SECRET + embeddings.rs.
  caSecret: lightbridge-agent-ca
  embeddings:
    # No trailing /v1 (the runner appends /v1/embeddings). The gateway serves qwen3-embedding-8b
    # (4096-dim, matched by migration 0005); it does NOT serve text-embedding-3-small.
    baseUrl: https://core-gateway-internal.envoy-gateway-system.svc.cluster.local
    model: qwen3-embedding-8b
  llm:
    # OpenCode review (slice 5). ON — the agent posts automated PR reviews (ticket #48).
    enabled: true
    # WITH /v1 (OpenCode posts to {baseURL}/chat/completions).
    baseUrl: https://core-gateway-internal.envoy-gateway-system.svc.cluster.local/v1
    # The eaig chat model the reviewer uses. A plain literal (not a secret) — change it here, no SM.
    # The gateway serves a purpose-named `adorsys-reviewer`/`-pro`.
    model: adorsys-reviewer-pro

# ── File-based configuration (ConfigMap-mounted; ADR-0021) ───────────────────
# Rendered into two ConfigMaps by templates/config.yaml: control-plane.json (release ns, read by the
# serve + dispatcher roles) and agent.json + review-system.md (agents ns, mounted into each runner
# Job). Empty knobs are omitted from the JSON so the binaries fall back to their built-in defaults.
# Secrets are NOT here — endpoints/keys stay in the agent secret and reach agent.json via `{env:…}`.
config:
  # Name of the agents-namespace ConfigMap holding agent.json (+ the prompt template). The dispatcher
  # is told this via AGENT_CONFIG_CONFIGMAP and mounts it into each Job at /etc/lightbridge.
  agentConfigMap: lightbridge-agent-config

  # The @mention trigger handle (webhook.rs): an issue comment must start with `@<handle>` to launch a
  # re-review. The first review per PR is still automatic (on `opened`).
  appHandle: lightbridge-assistant

  # Reviewer guidance — the mounted system-prompt template (env-substituted), the agent's persona and
  # operating instructions. This is the SOURCE OF TRUTH for the agent's behaviour: the runner has NO
  # built-in default (ADR-0037), so leaving this empty fails the review closed rather than running a
  # weak baked-in prompt. Edit it freely — change → ConfigMap → ArgoCD sync, no image rebuild. The
  # machine tool-protocol (how to call add_review_comment / add_comment / finish) is appended by the
  # runner and is not part of this text.
  reviewSystemPrompt: |
    # Role

    You are **Lightbridge**, an adversarial code-intelligence assistant for this engineering team.
    You work on GitHub artifacts — **pull requests, issues, and epics** — and on direct questions
    about the codebase. Your job is to find what humans miss: real bugs, security flaws, broken
    assumptions, and gaps in reasoning, *before* they reach production. You are a skeptical senior
    engineer and a security reviewer in one. You are an assistant, not a cheerleader and not a
    gatekeeper — a human always owns the decision.

    Default stance: **assume the change is wrong until the code shows otherwise.** Most defects hide
    in the cases the author did not think about; your value is finding those, not confirming the
    happy path. But be honest: a wrong finding costs more trust than a missed nit, so every claim is
    grounded in evidence, never invented to look thorough.

    # What you work on

    Always read the human's actual request — the PR description, the issue body, the @mention comment —
    and respond to *that*, not to a generic template.

    - **Pull requests** — review the change in the diff. Use the rest of the repository (via your
      tools) as context to judge impact; do not review untouched code as if it were the change, but DO
      flag when the change breaks or endangers code outside the diff.
    - **Issues / bug reports** — judge whether the report is reproducible and well specified, locate
      the likely root-cause area in the code, and surface the information that is missing.
    - **Epics / proposals** — pressure-test the plan: hidden complexity, unstated assumptions, missing
      edge cases, sequencing and migration risk, security and operational implications, and whether the
      scope actually delivers the stated intent.
    - **Questions** — answer directly and concretely, grounded in what you find; lead with the answer,
      then the why.

    # How you investigate

    - **Ground every claim in evidence.** Before asserting a bug, use your tools to read the relevant
      code, find related symbols, and trace callers and impact. Never speculate about code you have not
      looked up. "This could be null" is only a finding if you can show the path where it is.
    - Reason **old-vs-new** per hunk: what was the behaviour before, what is it now, and what breaks at
      the seam?
    - Think about the **whole lifecycle**: build, run, the failure path, retries, rollback, migration,
      concurrency, and what happens the *second* time it runs.
    - Calibrate uncertainty out loud. "I could not verify X" beats confident fiction.

    # What to hunt for (be exhaustive — this is where reviews usually fail)

    **Correctness & logic**
    - Off-by-one and boundary errors; empty / single-element / very large collections.
    - null / None / undefined / zero / negative / NaN; missing or inverted conditions; wrong operator;
      unintended fallthrough; missing return or break.
    - Integer overflow/underflow, truncation, precision loss, unchecked casts, signedness.
    - Illegal or unreachable states; partial updates that leave inconsistent state.
    - Does the implementation actually match the stated **intent**? Names, comments, and docs that lie
      about what the code does.

    **Concurrency & ordering**
    - Data races, unsynchronized shared state, lost updates, time-of-check/time-of-use.
    - Deadlocks, lock ordering, a lock held across an await/IO boundary, cancellation and timeout
      safety, re-entrancy.
    - Non-idempotent operations on retry; ordering assumptions that break under parallelism.

    **Error handling & resources**
    - Swallowed or misclassified errors; unwrap / panic / unchecked exceptions on inputs that can fail.
    - Partial failure with no rollback or compensation; missing cleanup on the error path.
    - Resource leaks — file handles, sockets, connections, tasks, memory; unbounded queues or growth.

    **Security (treat as P0 by default)**
    - Injection: SQL, shell/command, path traversal, template, LDAP, log.
    - AuthN/AuthZ: missing checks, IDOR, privilege escalation, trust-boundary crossings, confused
      deputy.
    - Input validation and output encoding; SSRF, XSS, CSRF, open redirect, insecure deserialization.
    - Secrets in code/logs/errors; weak or misused crypto; missing TLS or certificate verification;
      timing side channels.
    - Unsafe defaults, over-broad permissions, tainted data reaching a dangerous sink.

    **Data & compatibility**
    - Schema/migration safety, backward and forward compatibility, nullable-contract changes, data
      loss, irreversible operations.
    - Breaking API/ABI or serialization-format changes.

    **Performance & cost (when it matters)**
    - N+1 queries, unbounded loops or recursion, hot-path allocations, blocking IO on an async path,
      missing pagination or limits, accidental O(n^2).

    **Tests & observability**
    - Is the change actually covered? Do the tests assert behaviour or just run? Happy-path only? Are
      the failure modes tested?
    - Missing or misleading logs, metrics, and error messages for the new failure paths.

    **Edge cases people forget**
    - Empty / missing / duplicate input, Unicode and encoding, timezones / DST / locale, very large or
      very small values, clock skew, network partitions, concurrent modification, first-run vs
      steady-state, partial deploys.

    # How to report

    - Be **terse and high-signal** — a human should grasp each finding in seconds. State what is wrong,
      why it matters, and, when you can, the exact fix.
    - One finding per real issue. **No praise, no restating the code, no hedging, no filler.** If the
      change is genuinely sound, say so in one line and stop — silence beats noise.
    - Triage honestly: **P0** must-fix (bugs, data loss, security), **P1** should-fix, **P2**
      minor/nit. Do not inflate to look useful and do not bury a blocker among nits. **Security
      findings start at P0.** Give each finding a category (security / correctness / quality / style /
      performance).
    - Stay in scope: review the change. Observations about code outside the diff belong in the
      out-of-scope channel, not inline on untouched lines.
    - When you propose a fix, give the exact replacement so the author can apply it in one click.

    # What NOT to do

    - Do not invent issues to appear thorough.
    - Do not nitpick style a linter or formatter already enforces.
    - Do not claim a bug without tracing the path that triggers it.
    - You do not edit files or run commands — you advise; the human merges.

  # Review LLM generation params → the model's `options` in opencode.json. Empty → model/provider
  # default. (max_diff_chars caps the diff pasted into the prompt.)
  model:
    temperature: ""
    topP: ""
    maxTokens: ""
    maxDiffChars: ""

  # PR feedback the control plane applies (FILE-ONLY knobs — no env equivalent).
  review:
    reactions: true        # 👀 started → 🎉 done / 😕 errored on the PR description
    labelReviewed: ""      # label added on every posted review (e.g. lightbridge-reviewed)
    labelFindings: needs-review  # ≥1 finding of any severity
    labelError: bug        # ≥1 error-severity finding

  # Embedding-store safety (ADR-0018). The live `code_chunks.embedding` column is vector(4096), set by
  # migration 0005 to match qwen3-embedding-8b. Changing the embedding model's dimension is
  # DESTRUCTIVE: on a mismatch the control plane either wipes + re-migrates the column (only when
  # allowReindexOnDimChange is true) or fails startup loud. Keep the flag false in normal operation;
  # flip it deliberately, in the same change that switches the embedding model, to reindex.
  embeddings:
    dimension: 4096
    allowReindexOnDimChange: false

  # Dispatcher tuning (RFC-0001). Empty → built-in defaults.
  dispatcher:
    claimLeaseSeconds: ""
    pollFallbackSeconds: ""
    launchBackoffSeconds: ""
    reapIntervalSeconds: ""

  # The runner Job's container resources (k8s requests/limits), set verbatim on the Job. Indexing
  # (clone + tree-sitter + embed + Graphify) is CPU/memory-heavy on large repos, so the runner gets a
  # bigger budget than the control-plane pods.
  runnerResources:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

syncWave:
  secrets: "0"
  app: "2"

# ── bjw-s app-template (v4) instance ─────────────────────────────────────────
lci:
  # Force the fullname so resource/service names are deterministic `lightbridge-ci-*`
  # (the web→control-plane and Neo4j DNS names depend on this).
  fullnameOverride: lightbridge-ci

  # Cluster-baseline pod security applied to every controller below.
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

  controllers:
    # Rust control plane: GitHub webhook trust boundary + OAuth2 resource server
    # (validates Keycloak-issued JWTs; ADR-0014).
    control-plane:
      type: deployment
      # Single replica until delivery-id dedupe is durable: the control plane currently keeps
      # its X-GitHub-Delivery dedupe set in process memory, so two replicas behind the Service
      # could each accept the same delivery and (once task creation is wired) double-process it.
      # Move dedupe to Postgres before scaling out.
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            # Default/fallback only. The deployed tag is OVERRIDDEN at sync time by the
            # app repo's deploy/envs/production/values.yaml ($values source), which
            # argocd-image-updater owns — see charts/apps/values.yaml + the app repo.
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            BIND_ADDR: "0.0.0.0:8080"
            RUST_LOG: "info"
            # File config (ADR-0021): read control-plane.json from the mounted ConfigMap (review
            # labels/reactions + the embedding-dimension guard). Absent the file the binary uses env.
            CONTROL_PLANE_CONFIG: "/etc/lightbridge/control-plane.json"
            # The @mention trigger handle (webhook.rs). Comments must start with `@<handle>`. A literal
            # (bjw renders env against the sub-chart scope where top-level `.Values` isn't visible);
            # keep in sync with `config.appHandle`.
            GITHUB_APP_HANDLE: "lightbridge-assistant"
            # Authorization (ADR-0023): the dotted token claim carrying the caller's permissions list.
            # The IdP/gateway must emit this; endpoints fail closed without it. Default `permissions`.
            PERMISSIONS_CLAIM: "permissions"
            # OAuth2 resource server: validate Keycloak-issued RS256 JWTs (ADR-0014). Required —
            # without OIDC_ISSUER the control plane fails readiness (fails closed).
            OIDC_ISSUER: "https://auth.verif.fyi/realms/camer-digital"
            # Expected access-token audience. The Keycloak realm must emit this in the token `aud`
            # (audience mapper / client scope on `code-intelligence`) or protected endpoints 401.
            OIDC_AUDIENCE: "code-intelligence"
            GITHUB_WEBHOOK_SECRET:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: webhook-secret
            # GitHub App auth (mint installation tokens for the read API + posting reviews).
            # Absent either, the control plane skips installation-token features but still
            # serves webhooks/JWT-protected reads (github::GithubApp::from_env → None).
            GITHUB_APP_ID:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-id
            GITHUB_APP_PRIVATE_KEY:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-private-key
            # DATABASE_URL reuses the CNPG cluster; $(DB_PASSWORD) is interpolated by the
            # kubelet, and `dependsOn` makes bjw emit DB_PASSWORD first.
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: lightbridge-codeintel-db-role
                  key: password
            DATABASE_URL:
              dependsOn: DB_PASSWORD
              value: "postgresql://codeintel:$(DB_PASSWORD)@lightbridge-main-db-rw.converse.svc.cluster.local:5432/codeintel"
            NEO4J_URI:
              value: "bolt://{{ .Release.Name }}-neo4j:7687"
            NEO4J_USERNAME: "neo4j"
            NEO4J_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-neo4j-auth'
                  key: password
            # Shared bearer for the internal runner API (ADR-0017). Present → serve enables the
            # /internal/* routes; absent → they fail closed (503). The dispatcher injects the same
            # value into each Job.
            AGENT_RUNNER_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-agent'
                  key: runner-token
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /readyz
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

    # Next.js web console: Keycloak OIDC client (Authorization-Code + PKCE; ADR-0014).
    web:
      type: deployment
      replicas: 2
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      # Run as the dedicated web SA (templates/agents-rbac.yaml) that holds read-only pods/log access
      # in the agents namespace, so the console can stream a run's Job logs (Epic #75, Milestone C).
      serviceAccount:
        name: lightbridge-ci-web
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-web
            # Default/fallback only. The deployed tag is OVERRIDDEN at sync time by the
            # app repo's deploy/envs/production/values.yaml ($values source), which
            # argocd-image-updater owns — see charts/apps/values.yaml + the app repo.
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            NODE_ENV: "production"
            PORT: "3000"
            HOSTNAME: "0.0.0.0"
            # Agents namespace the console reads Job logs from (Epic #75, Milestone C). Literal; keep
            # in sync with `agents.namespace`.
            AGENT_NAMESPACE: "lightbridge-agents"
            # Public install page for the GitHub App, used by the console's empty-state CTAs and
            # Settings link. Keep in sync with `appHandle` (https://github.com/apps/<handle>).
            GITHUB_APP_INSTALL_URL: "https://github.com/apps/lightbridge-assistant"
            # Authorization (ADR-0023): the dotted token claim carrying the caller's permissions. The
            # console reads it to show capability-gated affordances; keep in sync with the control
            # plane's PERMISSIONS_CLAIM. Default `permissions`.
            PERMISSIONS_CLAIM: "permissions"
            # Keycloak OIDC client (ADR-0014). Public client + PKCE → NO client secret.
            OIDC_ISSUER: "https://auth.verif.fyi/realms/camer-digital"
            OIDC_CLIENT_ID: "code-intelligence"
            OIDC_REDIRECT_URI: "https://code-intelligence.ai.camer.digital/api/auth/callback"
            OIDC_POST_LOGOUT_REDIRECT_URI: "https://code-intelligence.ai.camer.digital"
            # TRANSITIONAL (remove once the OIDC web image is live — see chart bump notes):
            # the chart config (Source A, ai-helm release) and the image tag (Source B,
            # image-updater on app main) sync independently, so this chart must work with BOTH
            # the old better-auth image AND the new OIDC image. The new image ignores these.
            AUTH_BACKEND_URL: "http://{{ .Release.Name }}-control-plane:8080"
            BETTER_AUTH_URL: "https://code-intelligence.ai.camer.digital"
            BETTER_AUTH_SECRET:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-auth'
                  key: better-auth-secret
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 10
                periodSeconds: 20
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

    # Neo4j knowledge graph (single-instance StatefulSet; 5.26 LTS).
    neo4j:
      type: statefulset
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      # Govern the StatefulSet with the neo4j Service (rather than the default fullname,
      # which has no matching Service). Single replica → the ClusterIP service is reached
      # at lightbridge-ci-neo4j:7687.
      statefulset:
        serviceName:
          identifier: neo4j
        # /data via a StatefulSet volumeClaimTemplate (NOT a standalone PVC): the PVC is owned
        # by the StatefulSet and created WITH the pod, so it binds on schedule (WaitForFirstConsumer)
        # — no separately-ArgoCD-managed PVC to health-gate (sync-wave deadlock), no Replace churn,
        # no orphaned Terminating PVC. bjw wires the mount from globalMounts below.
        volumeClaimTemplates:
          - name: data
            accessMode: ReadWriteOnce
            size: 10Gi
            globalMounts:
              - path: /data
      # The neo4j image runs as uid/gid 7474. Pin it + fsGroup so the non-root process can
      # write the /data PVC even on storage classes that provision root-owned volumes
      # (otherwise the pod CrashLoops). Overrides defaultPodOptions for this controller.
      pod:
        securityContext:
          runAsNonRoot: true
          runAsUser: 7474
          runAsGroup: 7474
          fsGroup: 7474
          seccompProfile:
            type: RuntimeDefault
      containers:
        main:
          image:
            repository: neo4j
            tag: "5.26-community"
            pullPolicy: IfNotPresent
          env:
            # NOT prefixed `NEO4J_`: the neo4j image maps every NEO4J_* env var to a config
            # setting, so a literal NEO4J_PASSWORD becomes the unknown setting `password` and
            # fails strict_validation at startup. This is just the helper for NEO4J_AUTH.
            LB_NEO4J_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-neo4j-auth'
                  key: password
            NEO4J_AUTH:
              dependsOn: LB_NEO4J_PASSWORD
              value: "neo4j/$(LB_NEO4J_PASSWORD)"
            NEO4J_server_memory_pagecache_size: "512M"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 7687
                initialDelaySeconds: 30
                periodSeconds: 20
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 7687
                initialDelaySeconds: 15
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 2Gi }
          securityContext:
            allowPrivilegeEscalation: false
            # Neo4j writes its rendered config to /var/lib/neo4j/conf at startup, so it needs a
            # writable rootfs (the official image is not read-only-rootfs compatible). /data still
            # persists on the PVC. A scoped Trivy ignore covers KSV-0014 for this container.
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]

    # Dispatcher: the same control-plane image in the `dispatcher` role (RFC-0001). Consumes the
    # Postgres work queue (SKIP LOCKED) and launches one agent Job per task in the agents namespace
    # (ADR-0004). No HTTP server beyond /metrics; runs under a dedicated SA with Job-CRUD RBAC there.
    dispatcher:
      type: deployment
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      # Run as the dedicated SA (created in templates/agents-rbac.yaml) that holds Job-CRUD in the
      # agents namespace — not the shared `default` SA the other controllers use. `serviceAccount.name`
      # references an existing SA by name (bjw sets serviceAccountName without creating one).
      serviceAccount:
        name: lightbridge-ci-dispatcher
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            CONTROL_PLANE_ROLE: "dispatcher"
            RUST_LOG: "info"
            METRICS_ADDR: "0.0.0.0:9090"
            # File config (ADR-0021): control-plane.json drives the runner Job resources + dispatcher
            # tuning; the binary falls back to the AGENT_*/defaults below when a field is absent.
            CONTROL_PLANE_CONFIG: "/etc/lightbridge/control-plane.json"
            # ConfigMap (agents ns) the dispatcher mounts into each Job as agent.json (review model
            # params + prompt template); k8s.rs sets AGENT_CONFIG=/etc/lightbridge/agent.json there.
            # Literal (sub-chart env scope); keep in sync with `config.agentConfigMap`.
            AGENT_CONFIG_CONFIGMAP: "lightbridge-agent-config"
            # Same Postgres queue the serve role + webhook write to (dispatcher requires it).
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: lightbridge-codeintel-db-role
                  key: password
            DATABASE_URL:
              dependsOn: DB_PASSWORD
              value: "postgresql://codeintel:$(DB_PASSWORD)@lightbridge-main-db-rw.converse.svc.cluster.local:5432/codeintel"
            # Injected into each Job + presented by the runner on the callback (ADR-0017).
            AGENT_RUNNER_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-agent'
                  key: runner-token
            # Where Jobs run, who they run as, what image, and where they call back (the serve Svc).
            # Literals (not {{ .Values.agents.* }}): bjw renders env against the sub-chart scope where
            # the top-level `agents` values aren't visible. Keep in sync with the `agents:` block.
            AGENT_NAMESPACE: "lightbridge-agents"
            AGENT_SERVICE_ACCOUNT: "lightbridge-agent"
            AGENT_RUNNER_IMAGE: "ghcr.io/vymalo/lightbridge-agent-runner:latest"
            # Secret (agents ns) whose ca.crt the runner mounts to trust the HTTPS gateway.
            AGENT_CA_SECRET: "lightbridge-agent-ca"
            # FQDN, not the bare Service name: the runner Jobs run in the lightbridge-agents
            # namespace, so a same-namespace short name would not resolve to the control-plane
            # Service in `converse`.
            CONTROL_PLANE_INTERNAL_URL: "http://{{ .Release.Name }}-control-plane.{{ .Release.Namespace }}.svc.cluster.local:8080"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

    # Review-feedback poller (ADR-0035): a single replica that periodically reads reactions on the
    # comments we posted and reconciles them into review_feedback. SAME image as control-plane/
    # dispatcher (role-selected via CONTROL_PLANE_ROLE). Unlike the dispatcher it holds the GitHub App
    # key (to mint installation tokens for reading reactions); ONE replica so reactions aren't
    # double-polled (ADR-0002 keeps the credential off the multi-replica serve pods + the dispatcher).
    poller:
      type: deployment
      replicas: 1
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            # Default/fallback; the deployed tag is overridden at sync time by ai-helm-values via the
            # image-updater `poll` alias (charts/apps/values.yaml), in lockstep with control-plane.
            tag: "0.1.0"
            pullPolicy: IfNotPresent
          env:
            CONTROL_PLANE_ROLE: "poller"
            RUST_LOG: "info"
            METRICS_ADDR: "0.0.0.0:9090"
            # Optional cadence knobs; absent → run_poller defaults (300s interval / 14-day window).
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: lightbridge-codeintel-db-role
                  key: password
            DATABASE_URL:
              dependsOn: DB_PASSWORD
              value: "postgresql://codeintel:$(DB_PASSWORD)@lightbridge-main-db-rw.converse.svc.cluster.local:5432/codeintel"
            # The poller mints installation tokens to read reactions, so it needs the GitHub App key
            # (the dispatcher does not). Same secret the control-plane uses.
            GITHUB_APP_ID:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-id
            GITHUB_APP_PRIVATE_KEY:
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-github'
                  key: app-private-key
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 9090
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: false
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

  service:
    control-plane:
      controller: control-plane
      ports:
        http:
          port: 8080
    web:
      controller: web
      ports:
        http:
          port: 3000
    neo4j:
      controller: neo4j
      ports:
        bolt:
          port: 7687
        http:
          port: 7474

  ingress:
    web:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: cert-home-cert-http
      hosts:
        - host: code-intelligence.ai.camer.digital
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: web
                port: http
      tls:
        - secretName: code-intelligence.ai.camer.digital-tls
          hosts:
            - code-intelligence.ai.camer.digital
    control-plane:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: cert-home-cert-http
      hosts:
        - host: code-intelligence-api.ai.camer.digital
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: control-plane
                port: http
      tls:
        - secretName: code-intelligence-api.ai.camer.digital-tls
          hosts:
            - code-intelligence-api.ai.camer.digital

  # emptyDir scratch dirs for the read-only-rootfs containers (control-plane, web).
  # Neo4j /data is NOT here — it's a StatefulSet volumeClaimTemplate on the neo4j controller
  # (see `statefulset.volumeClaimTemplates` above); neo4j runs with a writable rootfs so it
  # needs no scratch emptyDirs. advancedMounts scope each volume to one container.
  persistence:
    # control-plane.json (ADR-0021), mounted read-only into the serve + dispatcher roles. `name`
    # references the standalone ConfigMap from templates/config.yaml (not a bjw-created one).
    control-plane-config:
      type: configMap
      name: lightbridge-ci-control-plane-config
      advancedMounts:
        control-plane:
          main:
            - path: /etc/lightbridge
              readOnly: true
        dispatcher:
          main:
            - path: /etc/lightbridge
              readOnly: true
    cp-tmp:
      type: emptyDir
      advancedMounts:
        control-plane:
          main:
            - path: /tmp
    web-tmp:
      type: emptyDir
      advancedMounts:
        web:
          main:
            - path: /tmp
    web-next-cache:
      type: emptyDir
      advancedMounts:
        web:
          main:
            - path: /app/.next/cache
