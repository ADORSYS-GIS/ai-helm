{{- if .Values.web.enabled }}
{{- $name := include "lci.web.name" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
    {{- include "lci.selectorLabels" (dict "ctx" . "component" "web") | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave.app | quote }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "lci.selectorLabels" (dict "ctx" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lci.labels" . | nindent 8 }}
        {{- include "lci.selectorLabels" (dict "ctx" . "component" "web") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.web.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            # better-auth (rust-backend plugin) verifies credentials against the
            # in-cluster control plane (authN). Gateway authZ is a separate concern.
            - name: AUTH_BACKEND_URL
              value: {{ include "lci.controlPlane.url" . | quote }}
            - name: BETTER_AUTH_URL
              value: "https://{{ .Values.web.ingress.host }}"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "lci.name" . }}-auth
                  key: better-auth-secret
            {{- range $k, $v := .Values.web.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
          volumeMounts:
            # Writable paths a Next.js standalone server needs under a read-only rootfs.
            # (Adjust if the image's WORKDIR differs from /app when it is built.)
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "lci.selectorLabels" (dict "ctx" . "component" "web") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.web.port }}
      targetPort: http
{{- end }}
