{{- /*
File-based configuration (ADR-0021): the control plane and the agent runner read JSON config files
mounted from ConfigMaps instead of a sprawl of env vars. String values support `{env:VAR:-default}`
substitution, so secrets stay in env (secret-injected) while the config stays declarative.

Two ConfigMaps:
  - <release>-control-plane-config (release ns): control-plane.json — read by the serve + dispatcher
    roles (CONTROL_PLANE_CONFIG). Carries the FILE-ONLY knobs: runner Job resources, review
    labels/reactions, the embedding-dimension guard, and dispatcher tuning.
  - lightbridge-agent-config (agents ns): agent.json + review-system.md — mounted into each runner
    Job by the dispatcher (AGENT_CONFIG_CONFIGMAP → k8s.rs). Carries the review model's generation
    params + the reviewer system-prompt template; embeddings/LLM endpoints resolve from the
    Job-injected secret env via `{env:…}`.

Built with `toJson` so empty/omitted knobs simply don't appear (the binaries then use their built-in
defaults / legacy env), and so the single-brace `{env:…}` markers pass through untouched (Helm only
interprets `{{ }}`).
*/}}
{{- $wave := .Values.syncWave.app | quote }}
{{- $cfg := .Values.config }}
{{- /* ── control-plane.json (release namespace) ─────────────────────────────── */}}
{{- $cp := dict }}
{{- $agent := dict }}
{{- if $cfg.runnerResources }}{{- $_ := set $agent "resources" $cfg.runnerResources }}{{- end }}
{{- if $agent }}{{- $_ := set $cp "agent" $agent }}{{- end }}
{{- $disp := dict }}
{{- range $k, $v := $cfg.dispatcher }}{{- if ne (toString $v) "" }}{{- $_ := set $disp $k $v }}{{- end }}{{- end }}
{{- if $disp }}{{- $_ := set $cp "dispatcher" $disp }}{{- end }}
{{- $review := dict "reactions" $cfg.review.reactions }}
{{- if ne (toString $cfg.review.labelReviewed) "" }}{{- $_ := set $review "label_reviewed" $cfg.review.labelReviewed }}{{- end }}
{{- if ne (toString $cfg.review.labelFindings) "" }}{{- $_ := set $review "label_findings" $cfg.review.labelFindings }}{{- end }}
{{- if ne (toString $cfg.review.labelError) "" }}{{- $_ := set $review "label_error" $cfg.review.labelError }}{{- end }}
{{- $_ := set $cp "review" $review }}
{{- if ne (toString $cfg.embeddings.dimension) "" }}
{{- $_ := set $cp "embeddings" (dict "dimension" $cfg.embeddings.dimension "allow_reindex_on_dim_change" $cfg.embeddings.allowReindexOnDimChange) }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-control-plane-config
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wave }}
data:
  control-plane.json: {{ $cp | toJson | quote }}
{{- if .Values.agents.enabled }}
---
{{- /* ── agent.json + review-system.md (agents namespace) ───────────────────── */}}
{{- $ag := dict }}
{{- $_ := set $ag "embeddings" (dict "base_url" "{env:EMBEDDINGS_BASE_URL}" "api_key" "{env:EMBEDDINGS_API_KEY}" "model" "{env:EMBEDDINGS_MODEL}") }}
{{- $rev := dict "base_url" "{env:LLM_BASE_URL}" "api_key" "{env:LLM_API_KEY}" "model" "{env:LLM_MODEL}" }}
{{- if ne (toString $cfg.reviewSystemPrompt) "" }}{{- $_ := set $rev "system_prompt_file" "/etc/lightbridge/review-system.md" }}{{- end }}
{{- if ne (toString $cfg.model.maxDiffChars) "" }}{{- $_ := set $rev "max_diff_chars" $cfg.model.maxDiffChars }}{{- end }}
{{- if ne (toString $cfg.model.temperature) "" }}{{- $_ := set $rev "temperature" $cfg.model.temperature }}{{- end }}
{{- if ne (toString $cfg.model.topP) "" }}{{- $_ := set $rev "top_p" $cfg.model.topP }}{{- end }}
{{- if ne (toString $cfg.model.maxTokens) "" }}{{- $_ := set $rev "max_tokens" $cfg.model.maxTokens }}{{- end }}
{{- if ne (toString $cfg.model.maxTurns) "" }}{{- $_ := set $rev "max_turns" $cfg.model.maxTurns }}{{- end }}
{{- if ne (toString $cfg.model.contextWindow) "" }}{{- $_ := set $rev "context_window" $cfg.model.contextWindow }}{{- end }}
{{- /* Risk-first read budgets (lightbridge-ci ADR-0042): max read-only tool calls run concurrently per
       turn (max_batch_size), and the cumulative caps before the loop winds down. Empty → the runner's
       built-in defaults (batch 8, files 30, searches 15, batches 6). The runner clamps each to ≥1. */}}
{{- if ne (toString $cfg.model.maxBatchSize) "" }}{{- $_ := set $rev "max_batch_size" $cfg.model.maxBatchSize }}{{- end }}
{{- if ne (toString $cfg.model.maxFilesRead) "" }}{{- $_ := set $rev "max_files_read" $cfg.model.maxFilesRead }}{{- end }}
{{- if ne (toString $cfg.model.maxSearches) "" }}{{- $_ := set $rev "max_searches" $cfg.model.maxSearches }}{{- end }}
{{- if ne (toString $cfg.model.maxBatches) "" }}{{- $_ := set $rev "max_batches" $cfg.model.maxBatches }}{{- end }}
{{- /* SSE streaming toggle (#206) → agent.json review.stream. A bool; empty → omitted (runner default
       off). Needs a runner image carrying the review.stream field (lightbridge-ci #211) before it's set
       to true, else deny_unknown_fields fails the Job. */}}
{{- if ne (toString $cfg.model.stream) "" }}{{- $_ := set $rev "stream" $cfg.model.stream }}{{- end }}
{{- /* Provider-specific passthrough generation params (lightbridge-ci #205) — an OBJECT, not a scalar,
       so it's truthiness-guarded (an empty map is falsy). Merged verbatim into the chat body by the
       runner (review.extra), e.g. a reasoning budget like {"thinking":{"type":"disabled"}} for GLM. */}}
{{- if $cfg.model.extra }}{{- $_ := set $rev "extra" $cfg.model.extra }}{{- end }}
{{- /* NB: review.fallback_model is intentionally NOT mapped — the review failover model was removed
       (lightbridge-ci ADR-0053 / #208); a single model + retry/backoff + circuit breaker replaces it. */}}
{{- $_ := set $ag "review" $rev }}
{{- /* Deterministic SAST pass (lightbridge-ci ADR-0061) → agent.json `sast`. opengrep scans the PR's
       changed files in the runner; findings ride the EXISTING review buffer (no second poster) and the
       agent is made aware of them without gating. Default-ENABLED in this chart (config.sast.enabled).
       ⚠️ Like review.stream, emitting this block REQUIRES a runner image that carries the `sast` field
       AND the bundled opengrep binary + vendored rules (lightbridge-ci #223) — sent to an older runner,
       deny_unknown_fields fails EVERY Job. (A missing opengrep binary is best-effort/non-fatal at run
       time, but the FIELD must parse.) `enabled` is a bool; the other knobs empty → the runner defaults
       (rules=/opt/opengrep-rules, min_severity=error, max_findings=25, timeout=300s). */}}
{{- $sast := dict "enabled" $cfg.sast.enabled }}
{{- if ne (toString $cfg.sast.rules) "" }}{{- $_ := set $sast "rules" $cfg.sast.rules }}{{- end }}
{{- if ne (toString $cfg.sast.minSeverity) "" }}{{- $_ := set $sast "min_severity" $cfg.sast.minSeverity }}{{- end }}
{{- if ne (toString $cfg.sast.maxFindings) "" }}{{- $_ := set $sast "max_findings" $cfg.sast.maxFindings }}{{- end }}
{{- if ne (toString $cfg.sast.timeoutSecs) "" }}{{- $_ := set $sast "timeout_secs" $cfg.sast.timeoutSecs }}{{- end }}
{{- $_ := set $ag "sast" $sast }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.agentConfigMap }}
  namespace: {{ .Values.agents.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wave }}
data:
  agent.json: {{ $ag | toJson | quote }}
{{- if ne (toString $cfg.reviewSystemPrompt) "" }}
  review-system.md: |
{{ $cfg.reviewSystemPrompt | indent 4 }}
{{- end }}
{{- end }}
