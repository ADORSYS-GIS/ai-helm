{{- if .Values.controlPlane.enabled }}
{{- $name := include "lci.controlPlane.name" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
    {{- include "lci.selectorLabels" (dict "ctx" . "component" "control-plane") | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave.app | quote }}
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "lci.selectorLabels" (dict "ctx" . "component" "control-plane") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lci.labels" . | nindent 8 }}
        {{- include "lci.selectorLabels" (dict "ctx" . "component" "control-plane") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.port }}
          env:
            - name: BIND_ADDR
              value: "0.0.0.0:{{ .Values.controlPlane.port }}"
            - name: RUST_LOG
              value: "info"
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "lci.name" . }}-github
                  key: webhook-secret
            # DATABASE_URL is assembled from the reused CNPG cluster + the codeintel
            # role password. $(DB_PASSWORD) is interpolated by the kubelet from the
            # preceding env var.
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret }}
                  key: {{ .Values.database.passwordSecretKey }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.database.user }}:$(DB_PASSWORD)@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            {{- if .Values.neo4j.enabled }}
            - name: NEO4J_URI
              value: "bolt://{{ include "lci.neo4j.name" . }}:7687"
            - name: NEO4J_USERNAME
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lci.neo4j.name" . }}-auth
                  key: password
            {{- end }}
            {{- range $k, $v := .Values.controlPlane.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "lci.selectorLabels" (dict "ctx" . "component" "control-plane") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.controlPlane.port }}
      targetPort: http
{{- end }}
