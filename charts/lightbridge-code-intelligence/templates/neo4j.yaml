{{- if .Values.neo4j.enabled }}
{{- $name := include "lci.neo4j.name" . }}
# Headless service: stable DNS for the single Neo4j instance (bolt + http).
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "lci.selectorLabels" (dict "ctx" . "component" "neo4j") | nindent 4 }}
  ports:
    - name: bolt
      port: 7687
      targetPort: bolt
    - name: http
      port: 7474
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
    {{- include "lci.selectorLabels" (dict "ctx" . "component" "neo4j") | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave.app | quote }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "lci.selectorLabels" (dict "ctx" . "component" "neo4j") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lci.labels" . | nindent 8 }}
        {{- include "lci.selectorLabels" (dict "ctx" . "component" "neo4j") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: neo4j
          image: "{{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}"
          imagePullPolicy: {{ .Values.neo4j.image.pullPolicy }}
          ports:
            - name: bolt
              containerPort: 7687
            - name: http
              containerPort: 7474
          env:
            # NEO4J_AUTH = "neo4j/<password>"; $(NEO4J_PASSWORD) is interpolated from
            # the preceding secret-backed env var.
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-auth
                  key: password
            - name: NEO4J_AUTH
              value: "neo4j/$(NEO4J_PASSWORD)"
            - name: NEO4J_server_memory_pagecache_size
              value: "512M"
          readinessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /data
            # Writable paths Neo4j needs under a read-only rootfs (data stays on the PVC).
            - name: logs
              mountPath: /logs
            - name: metrics
              mountPath: /metrics
            - name: run
              mountPath: /var/lib/neo4j/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: logs
          emptyDir: {}
        - name: metrics
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.neo4j.storage.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.neo4j.storage.size }}
{{- end }}
