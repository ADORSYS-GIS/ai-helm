{{- if and .Values.web.enabled .Values.web.ingress.enabled }}
{{- $web := include "lci.web.name" . }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $web }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.web.ingress.clusterIssuer }}
spec:
  ingressClassName: {{ .Values.web.ingress.className }}
  tls:
    - secretName: {{ .Values.web.ingress.host }}-tls
      hosts:
        - {{ .Values.web.ingress.host }}
  rules:
    - host: {{ .Values.web.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $web }}
                port:
                  number: {{ .Values.web.port }}
{{- end }}
{{- if and .Values.controlPlane.enabled .Values.controlPlane.ingress.enabled }}
{{- $cp := include "lci.controlPlane.name" . }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $cp }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.controlPlane.ingress.clusterIssuer }}
spec:
  ingressClassName: {{ .Values.controlPlane.ingress.className }}
  tls:
    - secretName: {{ .Values.controlPlane.ingress.host }}-tls
      hosts:
        - {{ .Values.controlPlane.ingress.host }}
  rules:
    - host: {{ .Values.controlPlane.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $cp }}
                port:
                  number: {{ .Values.controlPlane.port }}
{{- end }}
