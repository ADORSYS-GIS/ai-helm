{{- $store := .Values.secrets.secretStore }}
{{- $refresh := .Values.secrets.refreshInterval }}
{{- $key := .Values.secrets.remoteKey }}
{{- $codeintelKey := .Values.secrets.codeintelKey }}
{{- $wave := .Values.syncWave.secrets | quote }}
# App-owned secrets pulled from the ssegning-aws ClusterSecretStore. Target Secret names
# are `<release>-{github,auth,neo4j-auth}` so the bjw workloads can secretKeyRef them.
# (The codeintel DB role password lives in charts/lightbridge-db, since CNPG needs it at
# DB-sync-wave to set the managed role.)
#
# The `-github` secret carries the registered GitHub App's credentials (App ID + RSA private
# key + webhook signing secret), all sourced from the dedicated `prod/codeintel/env` SM secret
# (`$codeintelKey`). The control plane uses App ID + private key to mint installation tokens
# (read repo contents, post reviews) and the webhook secret to verify `X-Hub-Signature-256`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-github
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wave }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-github
    creationPolicy: Owner
  data:
    - secretKey: webhook-secret
      remoteRef:
        key: {{ $codeintelKey }}
        property: {{ .Values.secrets.githubWebhookProperty }}
    - secretKey: app-id
      remoteRef:
        key: {{ $codeintelKey }}
        property: {{ .Values.secrets.githubAppIdProperty }}
    - secretKey: app-private-key
      remoteRef:
        key: {{ $codeintelKey }}
        property: {{ .Values.secrets.githubAppPrivateKeyProperty }}
{{- /* TRANSITIONAL: the `-auth` secret feeds the outgoing better-auth web image. The OIDC web
       image (ADR-0014) is a PUBLIC client (PKCE, no client secret); drop this once it's live. */}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-auth
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wave }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-auth
    creationPolicy: Owner
  data:
    - secretKey: better-auth-secret
      remoteRef:
        key: {{ $key }}
        property: {{ .Values.secrets.betterAuthProperty }}
{{- if (index .Values "lci" "controllers" "neo4j") }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-neo4j-auth
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wave }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-neo4j-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ $key }}
        property: {{ .Values.secrets.neo4jPasswordProperty }}
{{- end }}
{{- if .Values.agents.enabled }}
---
# Shared bearer the dispatcher injects into each agent Job and the serve control plane checks on its
# internal API (ADR-0017). Lives in the release namespace; consumed by control-plane + dispatcher.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-agent
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wave }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-agent
    creationPolicy: Owner
  data:
    - secretKey: runner-token
      remoteRef:
        key: {{ $codeintelKey }}
        property: {{ .Values.secrets.agentRunnerTokenProperty }}
---
# The per-Job config Secret, in the AGENTS namespace (the Job's secretKeyRef target — see the app
# repo's k8s.rs). Base URLs + the embeddings model are stable literals; the API key reuses the eaig
# gateway key (`converse_openai_api_key`). The LLM (review) keys are added ONLY when review is
# enabled — otherwise this ExternalSecret never references `agent_llm_model`, so a missing SM
# property can't fail the sync and take embeddings (= indexing) down with it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lightbridge-agent-secrets
  namespace: {{ .Values.agents.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wave }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: lightbridge-agent-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # EmbeddingsClient appends `/v1/embeddings`, so NO trailing /v1 here (ADR-0018).
        embeddings-base-url: {{ .Values.agents.embeddings.baseUrl | quote }}
        embeddings-model: {{ .Values.agents.embeddings.model | quote }}
        embeddings-api-key: "{{ `{{ .openaiKey }}` }}"
{{- if .Values.agents.llm.enabled }}
        # OpenCode's @ai-sdk/openai-compatible posts to `{baseURL}/chat/completions`, so DO include
        # /v1 (ADR-0021). Only present when review is enabled.
        llm-base-url: {{ .Values.agents.llm.baseUrl | quote }}
        llm-api-key: "{{ `{{ .openaiKey }}` }}"
        llm-model: "{{ `{{ .llmModel }}` }}"
{{- end }}
  data:
    - secretKey: openaiKey
      remoteRef:
        key: {{ $key }}
        property: {{ .Values.secrets.openaiKeyProperty }}
{{- if .Values.agents.llm.enabled }}
    - secretKey: llmModel
      remoteRef:
        key: {{ $codeintelKey }}
        property: {{ .Values.secrets.agentLlmModelProperty }}
{{- end }}
{{- end }}
