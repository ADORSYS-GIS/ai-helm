{{- $store := .Values.secrets.secretStore }}
{{- $refresh := .Values.secrets.refreshInterval }}
{{- $key := .Values.secrets.remoteKey }}
# App-owned secrets pulled from the ssegning-aws ClusterSecretStore.
# (The codeintel DB role password lives in charts/lightbridge-db, since CNPG needs
# it at DB-sync-wave to set the managed role.)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "lci.name" . }}-github
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave.secrets | quote }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ include "lci.name" . }}-github
    creationPolicy: Owner
  data:
    - secretKey: webhook-secret
      remoteRef:
        key: {{ $key }}
        property: {{ .Values.secrets.githubWebhookProperty }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "lci.name" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave.secrets | quote }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ include "lci.name" . }}-auth
    creationPolicy: Owner
  data:
    - secretKey: better-auth-secret
      remoteRef:
        key: {{ $key }}
        property: {{ .Values.secrets.betterAuthProperty }}
{{- if .Values.neo4j.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "lci.neo4j.name" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lci.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave.secrets | quote }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ include "lci.neo4j.name" . }}-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ $key }}
        property: {{ .Values.secrets.neo4jPasswordProperty }}
{{- end }}
