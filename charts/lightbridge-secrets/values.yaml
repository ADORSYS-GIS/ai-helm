# lightbridge-secrets — ExternalSecrets for the Lightbridge authz stack.
# Leaf chart of the lightbridge orchestrator (ADR-0019). All ExternalSecrets
# resolve against the cluster-scoped `ssegning-aws` ClusterSecretStore.

# ClusterSecretStore the keys are pulled from (the only store on-cluster).
# Override per-env if a second cluster uses a differently-named store.
secretStore: ssegning-aws
refreshInterval: 1h

# Values-driven ExternalSecrets. Key = target Secret name. Each `data` entry
# maps a target secretKey ← a remoteRef {key, property} in the store.
externalSecrets:
  # API client secret the api component reads as API_KEY_CLIENT_SECRET
  # (env var → secretKeyRef name: lightbridge-api-client, key: secret-id).
  # = the Keycloak `lightbridge-api-key` client's Client secret, used for the
  #   token-exchange that mints scoped API-key tokens. Populate the property
  #   `lightbridge_api_client_secret_id` under key `ai/camer/digital/prod/env`.
  lightbridge-api-client:
    data:
      - secretKey: secret-id
        key: ai/camer/digital/prod/env
        property: lightbridge_api_client_secret_id
  # OPA basic-auth password the api + mcp containers require as the
  # OPA_PASSWORD env (secretKeyRef name: opa-secret, key: OPA_PASSWORD). The
  # upstream chart still exposes lightbridge's internal OPA listener on api/mcp,
  # so the pods won't start without this secret — even though OPA was removed
  # from the auth path (ADR-0021), so the value is functionally UNUSED (any
  # value works). Populate `lightbridge_opa_password` with any string.
  opa-secret:
    data:
      - secretKey: OPA_PASSWORD
        key: ai/camer/digital/prod/env
        property: lightbridge_opa_password
  # CNPG barman backup credentials (Hetzner Object Storage). Same creds the
  # Keycloak CNPG backup uses — platform secret under prod/meta/test-app.
  #
  # `s3_region_name` is a STATIC literal (not in the AWS store): the barman-cloud
  # ObjectStore's defaulting webhook injects an `s3Credentials.region` ref →
  # {name: lightbridge-cnpg-s3, key: s3_region_name} that the chart never
  # declares, and the plugin then reads that key at backup time. Without it every
  # ScheduledBackup fails `missing key s3_region_name, inside secret
  # lightbridge-cnpg-s3`. us-east-1 is the Ceph-RGW-accepted convention used
  # repo-wide (mimir/loki/tempo). Merged via target.template (mergePolicy: Merge).
  lightbridge-cnpg-s3:
    literals:
      s3_region_name: us-east-1
    data:
      - secretKey: s3_access_key_id
        key: prod/meta/test-app
        property: s3_backup_cnpg_client_id
      - secretKey: s3_secret_access_key
        key: prod/meta/test-app
        property: s3_backup_cnpg_secret
