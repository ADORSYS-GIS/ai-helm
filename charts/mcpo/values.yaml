global:
  version: "main"
  labels:
    app: mcpo
    team: adorsys-gis

mcpo:
  # Horizontal autoscaling for the (stateless) MCPo proxy. Rendered as a raw
  # HorizontalPodAutoscaler via bjw-template's rawResources passthrough — the
  # same house pattern librechat-app uses (charts/librechat-app/values.yaml).
  # The HPA owns the live replica count once it reconciles; `replicas` below is
  # just the initial value. CPU is the meaningful signal for an HTTP proxy;
  # the memory target is a safety ceiling. mcpo is a stateless MCP→OpenAPI
  # shim (open-webui/mcpo), so scaling out horizontally is safe.
  rawResources:
    hpa:
      enabled: true
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      spec:
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: '{{ .Release.Name }}'
          minReplicas: 1
          maxReplicas: 3
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 70
            - type: Resource
              resource:
                name: memory
                target:
                  type: Utilization
                  averageUtilization: 80

  controllers:
    main:
      type: deployment
      # RollingUpdate (not Recreate) so scale events + rollouts don't drop the
      # whole proxy at once now that >1 replica is possible under the HPA.
      strategy: RollingUpdate
      # Initial replicas only — the HPA above takes over after first reconcile.
      replicas: 1
      # Keep at least one MCPo pod serving during voluntary disruptions.
      podDisruptionBudget:
        minAvailable: 1
      labels:
        main: main-app
      containers:
        mcpo:
          image:
            repository: ghcr.io/open-webui/mcpo
            tag: "{{ .Values.global.version }}"
            pullPolicy: IfNotPresent
          
          command: /bin/sh
          
          args:
            - -c
            - |
              set -e
              mcpo --api-key $API_KEY --config=/tmp/config.json
          
          resources:
            requests:
              cpu: 1000m
              memory: 1024Mi
            limits:
              cpu: 2000m
              memory: 4096Mi
  
          envFrom:
            - secretRef:
                name: mcpo-api-key-env
                
  service:
    mcpo:
      enabled: true
      annotations: { }
      type: ClusterIP
      controller: main
      ports:
        http:
          enabled: true
          port: 8000
          targetPort: 8000
  
  ingress:
    mcpo:
      enabled: false
      annotations: { }
      #className: 'alb'
      hosts:
        - host: mcpo.example.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: mcpo
                port: http
      tls:
        - secretName: mcpo-example-com-secret
          hosts:
            - mcpo.example.com
  
  configMaps:
    config:
      enabled: true
      annotations:
        description: 'Common configuration for the MCPo.'
      data:
        "config.json": |
          {
            "mcpServers": {
              "memory": {
                "command": "npx",
                "args": [
                  "-y",
                  "@modelcontextprotocol/server-memory"
                ]
              },
              "time": {
                "command": "uvx",
                "args": [
                  "mcp-server-time",
                  "--local-timezone=Europe/Berlin"
                ]
              },
              "fetch": {
                "command": "uvx",
                "args": [
                  "mcp-server-fetch"
                ]
              },
              "puppeteer": {
                "command": "npx",
                "args": [
                  "-y",
                  "@modelcontextprotocol/server-puppeteer"
                ]
              },
              "sequential-thinking": {
                "command": "npx",
                "args": [
                  "-y",
                  "@modelcontextprotocol/server-sequential-thinking"
                ]
              }
            }
          }
  
  
  networkpolicies:
    main:
      enabled: true
      controller: main
      policyTypes:
        - Ingress
      rules:
        ingress:
          - from:
              - podSelector:
                  matchLabels:
                    app: mcpo
            ports:
              - protocol: TCP
                port: 8000
  persistence:
    config:
      enabled: true
      type: configMap
      identifier: config
      advancedMounts:
        main:
          mcpo:
            - path: /tmp/config.json
              readOnly: true
              subPath: config.json
  