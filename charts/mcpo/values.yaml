global:
  version: "main"
  labels:
    app: mcpo
    team: adorsys-gis

mcpo:
  # Horizontal autoscaling for the (stateless) MCPo proxy. Rendered as a raw
  # HorizontalPodAutoscaler via bjw-template's rawResources passthrough — the
  # same house pattern librechat-app uses (charts/librechat-app/values.yaml).
  # The HPA owns the live replica count once it reconciles; `replicas` below is
  # just the initial value. CPU is the meaningful signal for an HTTP proxy;
  # the memory target is a safety ceiling. mcpo is a stateless MCP→OpenAPI
  # shim (open-webui/mcpo), so scaling out horizontally is safe.
  rawResources:
    hpa:
      enabled: true
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      spec:
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: '{{ .Release.Name }}'
          minReplicas: 1
          maxReplicas: 3
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 70
            - type: Resource
              resource:
                name: memory
                target:
                  type: Utilization
                  averageUtilization: 80

  # Pod-level hardening (bjw-template applies this to every pod). Pairs with the
  # per-container securityContext below so the Deployment clears Trivy KSV-0118
  # (non-default securityContext) + KSV-0014 (readOnlyRootFilesystem). The
  # upstream open-webui/mcpo image ships as root with HOME=/root; running as a
  # non-root UID + a read-only root fs therefore needs writable emptyDirs for
  # /tmp and HOME (the MCP servers are spawned via npx/uvx, which write package
  # caches under $HOME) — mounted via `persistence` below, with HOME + cache
  # dirs redirected via env. ⚠️ mcpo is NOT a deployed app today (no entry in
  # charts/apps), so this hardening is render-/scan-verified but untested at
  # runtime; validate the pod when/if mcpo is enabled.
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

  controllers:
    main:
      type: deployment
      # RollingUpdate (not Recreate) so scale events + rollouts don't drop the
      # whole proxy at once now that >1 replica is possible under the HPA.
      strategy: RollingUpdate
      # Initial replicas only — the HPA above takes over after first reconcile.
      replicas: 1
      # Keep at least one MCPo pod serving during voluntary disruptions.
      podDisruptionBudget:
        minAvailable: 1
      labels:
        main: main-app
      containers:
        mcpo:
          image:
            repository: ghcr.io/open-webui/mcpo
            tag: "{{ .Values.global.version }}"
            pullPolicy: IfNotPresent
          
          command: /bin/sh

          args:
            - -c
            - |
              set -e
              mcpo --api-key $API_KEY --config=/tmp/config.json

          # Container-level hardening (KSV-0014 + KSV-0118). Root fs is read-only;
          # writable paths (/tmp, HOME) come from the emptyDirs in `persistence`.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Redirect HOME + the npm/uv caches to the writable `home` emptyDir so
          # the npx/uvx-spawned MCP servers can write their package caches under
          # a read-only root fs.
          env:
            HOME: /home/app
            XDG_CACHE_HOME: /home/app/.cache
            npm_config_cache: /home/app/.npm
            UV_CACHE_DIR: /home/app/.cache/uv

          resources:
            requests:
              cpu: 1000m
              memory: 1024Mi
            limits:
              cpu: 2000m
              memory: 4096Mi
  
          envFrom:
            - secretRef:
                name: mcpo-api-key-env
                
  service:
    mcpo:
      enabled: true
      annotations: { }
      type: ClusterIP
      controller: main
      ports:
        http:
          enabled: true
          port: 8000
          targetPort: 8000
  
  ingress:
    mcpo:
      enabled: false
      annotations: { }
      #className: 'alb'
      hosts:
        - host: mcpo.example.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: mcpo
                port: http
      tls:
        - secretName: mcpo-example-com-secret
          hosts:
            - mcpo.example.com
  
  configMaps:
    config:
      enabled: true
      annotations:
        description: 'Common configuration for the MCPo.'
      data:
        "config.json": |
          {
            "mcpServers": {
              "memory": {
                "command": "npx",
                "args": [
                  "-y",
                  "@modelcontextprotocol/server-memory"
                ]
              },
              "time": {
                "command": "uvx",
                "args": [
                  "mcp-server-time",
                  "--local-timezone=Europe/Berlin"
                ]
              },
              "fetch": {
                "command": "uvx",
                "args": [
                  "mcp-server-fetch"
                ]
              },
              "puppeteer": {
                "command": "npx",
                "args": [
                  "-y",
                  "@modelcontextprotocol/server-puppeteer"
                ]
              },
              "sequential-thinking": {
                "command": "npx",
                "args": [
                  "-y",
                  "@modelcontextprotocol/server-sequential-thinking"
                ]
              }
            }
          }
  
  
  networkpolicies:
    main:
      enabled: true
      controller: main
      policyTypes:
        - Ingress
      rules:
        ingress:
          - from:
              - podSelector:
                  matchLabels:
                    app: mcpo
            ports:
              - protocol: TCP
                port: 8000
  persistence:
    config:
      enabled: true
      type: configMap
      identifier: config
      advancedMounts:
        main:
          mcpo:
            - path: /tmp/config.json
              readOnly: true
              subPath: config.json
    # Writable scratch for a read-only root fs (securityContext above). /tmp is
    # for runtime temp (the config.json subPath mount sits on top of it); home
    # backs HOME=/home/app for the npx/uvx package caches.
    tmp:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          mcpo:
            - path: /tmp
    home:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          mcpo:
            - path: /home/app
  