{{- if and .Values.tls.enabled .Values.tls.redirectToHttps }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-http-to-https
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  {{- with .Values.gateway.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.namespace | default .Release.Namespace }}
      sectionName: http
  hostnames:
  {{- range .Values.tls.domains }}
    - {{ . }}
  {{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: {{ .Values.tls.redirectStatusCode | default 301 }}
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
            - name: "Authorization"
              value: "APIKEY 8ZqoZYjryU84"
{{- end }}