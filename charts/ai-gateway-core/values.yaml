namespace: "converse-llm"

tls:
  enabled: true

  domains:
    - converse-llm.camer.digital
    - api.ai.camer.digital

  secretName: converse-llm-tls

  issuer:
    create: true
    kind: ClusterIssuer
    name: letsencrypt
    email: security@camer.digital
    environment: staging # staging | prod

  redirectToHttps: true
  redirectStatusCode: 301 # 301 (Found), 302 (Temporary), 308 (Permanent - preserves method)

gatewayClass:
  enabled: true
  name: ai-gateway
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  labels: {}
  annotations: {}

gateway:
  enabled: true
  name: ai-gateway
  className: ""
  labels: {}
  annotations: {}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: converse-llm-tls
  infrastructure:
    enabled: true

gatewayConfig:
  enabled: true
  name: ai-gateway-tracing
  labels: {}
  annotations: {}
  spec:
    extProc:
      kubernetes:
        env:
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://phoenix-svc.converse-phoenix:6006"
          - name: OTEL_METRICS_EXPORTER
            value: "none"
          - name: OTEL_EXPORTER_OTLP_HEADERS
            value: "Authorization=Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJBcGlLZXk6MTQifQ.a26PKaWL5J-xiJwFM8spE2bXR4V8auqAyWDOCTr04Z4"

envoyProxy:
  enabled: true
  name: ai-gateway
  labels: {}
  annotations: {}
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1
        pod:
          labels: {}
          annotations: {}
          securityContext: {}
          tolerations: []
          nodeSelector: {}
          affinity: {}
        container:
          resources: {}
          securityContext: {}
          env: []
          volumeMounts: []
        volumes: []
      envoyService:
        type: LoadBalancer
        annotations: {}
  logging:
    level:
      default: info
  telemetry:
    accessLog: {}
    metrics: {}
    tracing: {}
  bootstrap: {}
  shutdown:
    drainTimeout: 30s
    minDrainDuration: 5s

clientTrafficPolicy:
  enabled: true
  name: client-buffer-limit
  labels: {}
  annotations: {}
  targetRefs: []
  connection:
    bufferLimit: 50Mi
  http: {}
  timeout: {}
  tls: {}
  path: {}
  headers: {}
  healthCheck: {}
