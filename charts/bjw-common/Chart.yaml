# Local fork of bjw-s-labs/common@4.6.2 (Function library for Helm charts).
#
# Upstream: https://github.com/bjw-s-labs/helm-charts/tree/main/charts/library/common
# Forked: 2026-05-31. Renamed `common` → `bjw-common` to disambiguate from
# the Bitnami `common` library that already lives at `charts/common/`.
#
# Why local: the maintainer wants this repo to control the cadence of
# bjw-s bumps and to be able to patch the library if needed (e.g. for
# label additions, new resource kinds, security fixes) without waiting
# on upstream releases.
#
# IMPORTANT: the template helper namespace is `bjw-s.common.*` and is
# UNCHANGED by this rename. Helper define names are static strings in
# templates/lib/, templates/render/, etc. — they are not derived from
# `Chart.Name`. Consumers continue to call `bjw-s.common.loader.init`
# exactly as upstream.
#
# To upgrade to a newer upstream:
#   1. Fetch the new tarball (`helm pull oci://… --untar` or from
#      https://bjw-s-labs.github.io/helm-charts).
#   2. Overlay its `templates/`, `values.schema.json`, `values.yaml` over
#      this directory.
#   3. Update the `version:` field below.
#   4. Preserve this header.
#   5. helm dep build every consumer.
annotations:
  artifacthub.io/changes: |-
    - kind: fixed
      description: |-
        Make port selection by identifier in backendRefs of HTTPRoute actually do something.
    - kind: fixed
      description: |-
        Route port was no longer optional while it should be.
apiVersion: v2
description: Function library for Helm charts (local fork of bjw-s-labs/common)
home: https://github.com/bjw-s-labs/helm-charts/tree/main/charts/library/common
keywords:
  - common
  - library
  - bjw-s
kubeVersion: '>=1.28.0-0'
maintainers:
  - email: me@bjw-s.dev
    name: bjw-s (upstream)
  - name: ai-helm
name: bjw-common
sources:
  - https://github.com/bjw-s-labs/helm-charts
  - https://github.com/ADORSYS-GIS/ai-helm
type: library
version: 4.6.2
