---
apiVersion: v1
kind: LimitRange
metadata:
  name: cert-system-defaults
  namespace: {{ include "common.names.namespace" $ }}
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "200m"
        memory: "256Mi"
      max:
        cpu: "2"
        memory: "2Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cert-system-quota
  namespace: {{ include "common.names.namespace" $ }}
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: "512Mi"
    limits.cpu: "3"
    limits.memory: "4Gi"
    count/pods: "15"
