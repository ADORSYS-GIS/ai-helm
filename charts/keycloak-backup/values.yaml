app-template:
  # Secret Configuration (under app-template so subchart can access)
  adminSecret: "keycloak-admin"
  dbSecret: "keycloak-db"
  s3Secret: "keycloak-s3"
  # Backup Configuration
  backupRealm: "camer-digital"

  controllers:
    main:
      type: cronjob
      cronjob:
        schedule: "0 2 * * *"
        concurrencyPolicy: Forbid

      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000

      initContainers:
        exporter:
          image:
            repository: quay.io/keycloak/keycloak
            tag: "26.3.3"
          env:
            KEYCLOAK_ADMIN:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.adminSecret }}"
                  key: username
            KEYCLOAK_ADMIN_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.adminSecret }}"
                  key: password
            # Realm to backup (defaults to all if empty)
            BACKUP_REALM_NAME: "{{ .Values.backupRealm }}"
            # Database Configuration (Required for export to work with external DB)
            KC_DB:
              value: postgres
            KC_DB_URL:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.dbSecret }}"
                  key: jdbc-uri
            KC_DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.dbSecret }}"
                  key: username
            KC_DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.dbSecret }}"
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -ex

              # Create writable directory for Quarkus build
              export QUARKUS_CACHE_DIR=/tmp/quarkus-cache
              mkdir -p $QUARKUS_CACHE_DIR

              if [ -n "$BACKUP_REALM_NAME" ]; then
                echo "Exporting realm: $BACKUP_REALM_NAME"
                KC_CACHE_DIR=$QUARKUS_CACHE_DIR /opt/keycloak/bin/kc.sh export \
                  --realm "$BACKUP_REALM_NAME" \
                  --file /exported/realm_backup.json \
                  --users same_file
              else
                echo "Exporting all realms"
                KC_CACHE_DIR=$QUARKUS_CACHE_DIR /opt/keycloak/bin/kc.sh export \
                  --file /exported/realm_backup.json \
                  --users same_file
              fi

              echo "Export complete"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

      containers:
        main:
          image:
            repository: amazon/aws-cli
            tag: "2.17.0"
          env:
            S3_BUCKET:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.s3Secret }}"
                  key: S3_BUCKET_NAME
            AWS_ACCESS_KEY_ID:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.s3Secret }}"
                  key: S3_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.s3Secret }}"
                  key: S3_SECRET_ACCESS_KEY
            AWS_DEFAULT_REGION:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.s3Secret }}"
                  key: S3_REGION_NAME
            # Optional: S3 Endpoint (for MinIO/Localstack)
            # S3_ENDPOINT: ...
            S3_ENDPOINT: "https://s3.camer.digital"
            # Optional: S3 Prefix
            S3_PREFIX: "keycloak-backups"
            # Backup realm naming (used to construct filename)
            BACKUP_REALM_NAME: "{{ .Values.backupRealm }}"

          # Load optional secrets EnvVars blindly if they exist in secret
          envFrom:
            - secretRef:
                name: "{{ .Values.s3Secret }}"
                optional: true

          command:
            - /bin/sh
            - -c
            - |
              set -ex

              TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")

              if [ -n "$BACKUP_REALM_NAME" ]; then
                 BACKUP_FILE="${BACKUP_REALM_NAME}_${TIMESTAMP}.json"
              else
                 BACKUP_FILE="all-realms_${TIMESTAMP}.json"
              fi

              # Build S3 path with prefix handling
              if [ -n "$S3_PREFIX" ]; then
                S3_PATH="${S3_PREFIX}/${BACKUP_FILE}"
              else
                S3_PATH="${BACKUP_FILE}"
              fi

              if [ -n "$S3_ENDPOINT" ]; then
                aws s3 cp \
                  --endpoint-url "$S3_ENDPOINT" \
                  /exported/realm_backup.json \
                  "s3://${S3_BUCKET}/${S3_PATH}"
              else
                aws s3 cp \
                  /exported/realm_backup.json \
                  "s3://${S3_BUCKET}/${S3_PATH}"
              fi

              echo "Uploaded: $BACKUP_FILE"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

  persistence:
    export-volume:
      type: emptyDir
      globalMounts:
        - path: /exported
