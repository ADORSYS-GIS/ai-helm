{{- /*
coder App-of-Apps orchestrator — renders two child Application CRs:
  • coder-db  — local CNPG leaf chart (single source).
  • coder-app — upstream Coder OCI chart (deployed as an ArgoCD source, like
                the old flat app) + the ingress Certificate via the per-env
                kustomize overlay (second source).
Both target home-remote (ADR-0017 guard via coder.argocd.destinationClusterRef).
Rendered as direct Application CRs rather than an ApplicationSet because the
two children are fixed + heterogeneous — see ADR-0019.
*/ -}}
{{- $a := .Values.argocd -}}
{{- if .Values.db.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.db.appName }}
  namespace: {{ $a.namespace | default "argocd" }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.db.syncWave | quote }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  project: {{ $a.project | quote }}
  source:
    repoURL: {{ $a.repoURL | quote }}
    targetRevision: {{ $a.targetRevision | quote }}
    path: {{ .Values.db.chartPath | quote }}
    helm:
      releaseName: {{ .Values.db.releaseName | quote }}
  destination:
    {{- include "coder.argocd.destinationClusterRef" $a.destination | nindent 4 }}
    namespace: {{ $a.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml $a.syncPolicy | nindent 4 }}
{{- end }}
{{- if .Values.app.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.app.appName }}
  namespace: {{ $a.namespace | default "argocd" }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.app.syncWave | quote }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  project: {{ $a.project | quote }}
  sources:
    # Source A — the upstream Coder workload (OCI chart as an ArgoCD source).
    - repoURL: {{ .Values.app.chart.repoURL | quote }}
      chart: {{ .Values.app.chart.name | quote }}
      targetRevision: {{ .Values.app.chart.targetRevision | quote }}
      helm:
        releaseName: {{ .Values.app.releaseName | quote }}
        valuesObject:
          {{- toYaml .Values.app.values | nindent 10 }}
    # Source B — app-scoped deps (ingress Certificate) via the per-env
    # kustomize overlay in this repo; issuer patched per environment.
    - repoURL: {{ $a.repoURL | quote }}
      targetRevision: {{ $a.targetRevision | quote }}
      path: {{ .Values.app.depsOverlay | quote }}
  destination:
    {{- include "coder.argocd.destinationClusterRef" $a.destination | nindent 4 }}
    namespace: {{ $a.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml $a.syncPolicy | nindent 4 }}
{{- end }}
