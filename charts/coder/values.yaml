# coder App-of-Apps orchestrator — renders two child Application CRs
# (coder-db + coder-app). See ADR-0019. The chart owns no workload resources;
# it owns the two child Applications.

# ────────────────────────────────────────────────────────────────────────
# Shared ArgoCD wiring for both child Applications.
# ────────────────────────────────────────────────────────────────────────
argocd:
  # ArgoCD project the children belong to.
  project: ai
  # This repo, source for the coder-db leaf chart + the cert overlay.
  # Deploys run from `claude/magical-bohr-390242` (NOT main). After this
  # deployment settles, this pins to a release tag — tag-based deploys only;
  # main is never a deploy target.
  repoURL: https://github.com/ADORSYS-GIS/ai-helm
  targetRevision: claude/magical-bohr-390242
  destination:
    # The home-remote cluster both children target. Repo invariant
    # (ADR-0017): workloads NEVER deploy to the cluster ArgoCD runs in. The
    # destination helper hard-fails the render if this resolves to in-cluster
    # unless `allowInCluster: true`.
    name: home-remote
    allowInCluster: false
    namespace: coder
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

# ────────────────────────────────────────────────────────────────────────
# coder-db child — the CloudNativePG database leaf chart (this repo).
# Lower sync-wave so Postgres is up before Coder starts.
# ────────────────────────────────────────────────────────────────────────
db:
  enabled: true
  appName: coder-db
  chartPath: charts/coder-db
  releaseName: coder-db
  syncWave: "1"

# ────────────────────────────────────────────────────────────────────────
# coder-app child — the upstream Coder workload (OCI chart, deployed as an
# ArgoCD source — NOT a Helm dependency, so ArgoCD pulls it the same way the
# old flat app did) + the ingress TLS Certificate via the kustomize overlay.
# releaseName stays `coder` so workload resource names don't churn.
# ────────────────────────────────────────────────────────────────────────
app:
  enabled: true
  appName: coder-app
  releaseName: coder
  syncWave: "2"
  # Upstream Coder OCI chart.
  chart:
    repoURL: oci://ghcr.io/coder/chart/coder
    name: coder
    targetRevision: "2.31.9"
  # App-scoped deps (ingress Certificate) — kustomize overlay in this repo,
  # added as a second source (issuer patched per env). ADR-0018 pattern.
  depsOverlay: environments/prod/deps/coder
  # The Coder chart's values (verbatim from the old flat app's valuesObject).
  values:
    coder:
      env:
        - name: CODER_PG_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: coder-cnpg-app
              key: uri
        - name: CODER_PG_OPTIONS
          value: "sslmode=disable"
        - name: CODER_ACCESS_URL
          value: "https://coder.ai.camer.digital"
        - name: CODER_WILDCARD_ACCESS_URL
          value: "*.coder-ai.camer.digital"
        - name: CODER_OIDC_ISSUER_URL
          value: "https://auth.verif.fyi/realms/camer-digital"
        - name: CODER_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: coder-keycloak-secret
              key: client_id
        - name: CODER_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: coder-keycloak-secret
              key: client_secret
        - name: CODER_OIDC_SCOPES
          value: "openid,profile,email,offline_access"
        - name: CODER_OIDC_ICON_URL
          value: "https://www.keycloak.org/resources/images/logo.svg"
        - name: CODER_OIDC_SIGN_IN_TEXT
          value: "Sign in with Keycloak"
        - name: CODER_EXPERIMENTS
          value: "oauth2,mcp-server-http"
        - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
          value: "false"
        - name: CODER_USERNAME
          valueFrom:
            secretKeyRef:
              name: coder-admin-secret
              key: username
        - name: CODER_EMAIL
          valueFrom:
            secretKeyRef:
              name: coder-admin-secret
              key: username
        - name: CODER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: coder-admin-secret
              key: password
      lifecycle:
        postStart:
          exec:
            command:
              - /bin/sh
              - -c
              - |
                echo "Waiting for Coder server to be ready..."
                until curl -sf http://localhost:8080/healthz > /dev/null 2>&1; do
                  sleep 2
                done
                sleep 5
                echo "Creating admin user..."
                coder server create-admin-user --username "$CODER_USERNAME" --email "$CODER_EMAIL" --password "$CODER_PASSWORD" 2>&1 || true
      tolerations:
        - key: ai.camer.digital/offline-work
          operator: Equal
          value: dev-container
      resources:
        requests:
          cpu: 1000m
          memory: 1024Mi
        limits:
          cpu: 2000m
          memory: 4096Mi
      service:
        type: ClusterIP
      ingress:
        enable: true
        className: traefik
        # TLS Secret provisioned by the coder-app child's cert overlay
        # (environments/<env>/deps/coder) — no auto-issue annotation.
        annotations: {}
        host: "coder.ai.camer.digital"
        wildcardHost: "*.coder-ai.camer.digital"
        tls:
          enable: true
          secretName: coder.ai.camer.digital-tls
          wildcardSecretName: coder.ai.camer.digital-tls
