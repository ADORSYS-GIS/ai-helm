---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: MCPRoute
metadata:
  name: firecrawl
  namespace: {{ include "common.names.namespace" $ }}
spec:
  parentRefs:
    - name: {{ include "common.tplvalues.render" ( dict "value" .Values.gatewayRef.name "context" $ ) }}
      namespace: {{ include "common.tplvalues.render" ( dict "value" .Values.gatewayRef.namespace "context" $ ) }}
      kind: Gateway
      group: gateway.networking.k8s.io

  path: "/mcp/firecrawl"

  backendRefs:
    - name: firecrawl
      kind: Backend
      group: gateway.envoyproxy.io
      path: "/v2/mcp"
      securityPolicy:
        apiKey:
          secretRef:
            name: firecrawl-token
          header: Authorization
