{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: converse-mcp-security
  namespace: converse-mcp
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress from converse-gateway
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: converse-gateway
      ports:
        - port: 8080
          protocol: TCP
        - port: 443
          protocol: TCP
    # Ingress from envoy-ai-gateway-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-ai-gateway-system
      ports:
        - port: 8080
          protocol: TCP
        - port: 443
          protocol: TCP
    # Intra-namespace ingress
    - from:
        - podSelector: {}
  egress:
    # DNS to kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # External access (MCP servers)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
{{- end }}
