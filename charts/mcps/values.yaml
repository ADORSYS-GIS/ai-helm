# mcps orchestrator — renders ONE ApplicationSet that generates a child
# Application per enabled MCP (chart: charts/mcp). See ADR-0027.
#
# Pre-split this chart deployed every MCP's resources directly in one
# Application. Post-split each MCP is its own Application (mcps-<name>), with
# its own sync/rollback/health and an in-chart ExternalSecret scoped to it.

# ────────────────────────────────────────────────────────────────────────
# ArgoCD wiring — where the generated child Applications live + sync from.
# ────────────────────────────────────────────────────────────────────────
argocd:
  namespace: argocd
  project: ai
  # Source repo for the leaf chart (charts/mcp). Deploys are tag-based: pinned to
  # the immutable release tag below (main is never a deploy target). See the
  # canonical note in charts/apps/values.yaml.
  repoURL: https://github.com/ADORSYS-GIS/ai-helm
  targetRevision: release-2026.06.10-v02
  destination:
    # Every child Application targets home-remote (ADR-0017). The destination
    # helper hard-fails the render if this resolves to in-cluster unless
    # allowInCluster: true.
    name: home-remote
    allowInCluster: false
    namespace: converse-mcp
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

# Gateway every MCPRoute attaches to (HTTPS listener; ADR-0021 dual-plane).
gatewayRef:
  name: core-gateway
  namespace: converse-gateway
  sectionName: api-https

# MCP-spec OAuth, shared by every child (ADR-0038). Merged with a per-MCP
# `oauth:` override (e.g. resourceName) and passed to the leaf's `.Values.oauth`.
# The leaf's defaults carry the ADR-0011 claimToHeaders set and
# pathAppendedDiscovery: true. ⚠️ This displaces the gateway-level Authorino
# extAuth on /mcp/* — JWT verification moves to Envoy's native filter, same
# Keycloak issuer (the ADR-0021 authz boundary is unchanged).
oauth:
  enabled: true
  issuer: https://auth.verif.fyi/realms/camer-digital
  publicOrigin: https://api.ai.camer.digital

# ────────────────────────────────────────────────────────────────────────
# The MCP servers. Each entry → one Application (mcps-<key>). `mcp` is passed
# verbatim to the leaf chart's `.Values.mcp`; `externalSecret` to its
# `.Values.externalSecret`. Set `enabled: false` to drop an MCP.
#
# API keys: the leaf's apiKey securityPolicy + brave's env both read Secret key
# `apiKey` (AIEG MCPRoute contract); the "Authorization" header auto-prefixes
# "Bearer ", so SM holds the raw token. The maintainer must populate these
# properties under ssegning-aws `ai/camer/digital/prod/env`:
#   brave_api_key, firecrawl_api_key, context7_api_key, refero_api_key
# (terraform needs no key). Until populated the ExternalSecret sits
# SecretSyncedError and the MCP that needs it won't authenticate.
# ────────────────────────────────────────────────────────────────────────
mcps:
  # Self-hosted Brave Search MCP. API key via container env (BRAVE_API_KEY).
  brave:
    enabled: true
    oauth:
      resourceName: Brave Search MCP Server
    mcp:
      name: brave-search
      mode: selfHosted
      path: /mcp/brave
      backendPath: /mcp
      image: docker.io/mcp/brave-search:latest
      port: 8080
      args:
        - --transport
        - http
      env:
        - name: BRAVE_API_KEY
          valueFrom:
            secretKeyRef:
              name: brave-token
              key: apiKey
        - name: BRAVE_MCP_TRANSPORT
          value: "http"
    externalSecret:
      enabled: true
      secretName: brave-token
      data:
        - secretKey: apiKey
          key: ai/camer/digital/prod/env
          property: brave_api_key

  # Self-hosted HashiCorp Terraform MCP. No credential.
  terraform:
    enabled: true
    oauth:
      resourceName: HashiCorp Terraform MCP Server
    mcp:
      name: terraform
      mode: selfHosted
      path: /mcp/terraform
      backendPath: /mcp
      image: hashicorp/terraform-mcp-server:latest
      port: 8080
      args:
        - streamable-http
        - --transport-host
        - 0.0.0.0
      env:
        - name: MODE
          value: "streamable-http"
        - name: PORT
          value: "8080"
        - name: HOST
          value: "0.0.0.0"

  # External Firecrawl MCP (mcp.firecrawl.dev). Bearer apiKey.
  firecrawl:
    enabled: true
    oauth:
      resourceName: Firecrawl MCP Server
    mcp:
      name: firecrawl
      mode: external
      path: /mcp/firecrawl
      backendPath: /v2/mcp
      externalHost: mcp.firecrawl.dev
      externalPort: 443
      tls: true
      auth:
        enabled: true
        secretName: firecrawl-token
        header: Authorization
    externalSecret:
      enabled: true
      secretName: firecrawl-token
      data:
        - secretKey: apiKey
          key: ai/camer/digital/prod/env
          property: firecrawl_api_key

  # ⚠️ context7 DROPPED (2026-06-11). mcp.context7.com serves an ECDSA cert
  # that Envoy's BoringSSL rejects at the handshake (BAD_ECC_CERT) — so it
  # can't go through the gateway as a remote TLS backend (ADR-0039), unlike the
  # RSA-cert externals firecrawl/refero. Self-hosting it was rejected too:
  # context7 has no usable published HTTP image (would need a custom build) and
  # its v3 HTTP mode requires Upstash Redis — both against repo constraints.
  # The `context7_api_key` property in ssegning-aws is now unused (leave or prune
  # out-of-band). To revisit: a published context7 HTTP image, or a
  # stdio+supergateway bridge as a self-hosted plain-HTTP backend.

  # External Refero design-reference MCP (api.refero.design). Bearer apiKey.
  # Requires a Refero Pro subscription (8k tool calls/mo). See ADR-0027.
  refero:
    enabled: true
    oauth:
      resourceName: Refero Design MCP Server
    mcp:
      name: refero
      mode: external
      path: /mcp/refero
      backendPath: /mcp
      externalHost: api.refero.design
      externalPort: 443
      tls: true
      auth:
        enabled: true
        secretName: refero-token
        header: Authorization
    externalSecret:
      enabled: true
      secretName: refero-token
      data:
        - secretKey: apiKey
          key: ai/camer/digital/prod/env
          property: refero_api_key
