# mcps orchestrator — renders ONE ApplicationSet that generates a child
# Application per enabled MCP (chart: charts/mcp). See ADR-0027.
#
# Pre-split this chart deployed every MCP's resources directly in one
# Application. Post-split each MCP is its own Application (mcps-<name>), with
# its own sync/rollback/health and an in-chart ExternalSecret scoped to it.

# ────────────────────────────────────────────────────────────────────────
# ArgoCD wiring — where the generated child Applications live + sync from.
# ────────────────────────────────────────────────────────────────────────
argocd:
  namespace: argocd
  project: ai
  # Source repo for the leaf chart (charts/mcp). Deploys are tag-based: pinned to
  # the immutable release tag below (main is never a deploy target). See the
  # canonical note in charts/apps/values.yaml.
  repoURL: https://github.com/ADORSYS-GIS/ai-helm
  targetRevision: release-2026.06.22
  destination:
    # Every child Application targets home-remote (ADR-0017). The destination
    # helper hard-fails the render if this resolves to in-cluster unless
    # allowInCluster: true.
    name: home-remote
    allowInCluster: false
    namespace: converse-mcp
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

# Gateway every MCPRoute attaches to (HTTPS listener; ADR-0021 dual-plane).
gatewayRef:
  name: core-gateway
  namespace: converse-gateway
  sectionName: api-https

# MCP-spec OAuth, shared by every child (ADR-0038). Merged with a per-MCP
# `oauth:` override (e.g. resourceName) and passed to the leaf's `.Values.oauth`.
# The leaf's defaults carry the ADR-0011 claimToHeaders set and
# pathAppendedDiscovery: true. ⚠️ This displaces the gateway-level Authorino
# extAuth on /mcp/* — JWT verification moves to Envoy's native filter, same
# Keycloak issuer (the ADR-0021 authz boundary is unchanged).
oauth:
  enabled: true
  issuer: https://auth.verif.fyi/realms/camer-digital
  publicOrigin: https://api.ai.camer.digital

# ────────────────────────────────────────────────────────────────────────
# The MCP servers. Each entry → one Application (mcps-<key>). `mcp` is passed
# verbatim to the leaf chart's `.Values.mcp`; `externalSecret` to its
# `.Values.externalSecret`. Set `enabled: false` to drop an MCP.
#
# API keys: the leaf's apiKey securityPolicy + brave's env both read Secret key
# `apiKey` (AIEG MCPRoute contract); the "Authorization" header auto-prefixes
# "Bearer ", so SM holds the raw token. The maintainer must populate these
# properties under ssegning-aws `ai/camer/digital/prod/env`:
#   brave_api_key, firecrawl_api_key, context7_api_key, refero_api_key
# (terraform needs no key). Until populated the ExternalSecret sits
# SecretSyncedError; the external MCPs run via a Caddy proxy whose token env is
# optional, so the proxy starts ANONYMOUS (rate-limited) until the key syncs.
# ────────────────────────────────────────────────────────────────────────
mcps:
  # Self-hosted Brave Search MCP. API key via container env (BRAVE_API_KEY).
  brave:
    enabled: true
    oauth:
      resourceName: Brave Search MCP Server
    mcp:
      name: brave-search
      mode: selfHosted
      path: /mcp/brave
      backendPath: /mcp
      image: docker.io/mcp/brave-search:latest
      port: 8080
      args:
        - --transport
        - http
      env:
        - name: BRAVE_API_KEY
          valueFrom:
            secretKeyRef:
              name: brave-token
              key: apiKey
        - name: BRAVE_MCP_TRANSPORT
          value: "http"
    externalSecret:
      enabled: true
      secretName: brave-token
      data:
        - secretKey: apiKey
          key: ai/camer/digital/prod/env
          property: brave_api_key

  # Self-hosted HashiCorp Terraform MCP. No credential.
  terraform:
    enabled: true
    oauth:
      resourceName: HashiCorp Terraform MCP Server
    mcp:
      name: terraform
      mode: selfHosted
      path: /mcp/terraform
      backendPath: /mcp
      image: hashicorp/terraform-mcp-server:latest
      port: 8080
      args:
        - streamable-http
        - --transport-host
        - 0.0.0.0
      env:
        - name: MODE
          value: "streamable-http"
        - name: PORT
          value: "8080"
        - name: HOST
          value: "0.0.0.0"

  # Firecrawl MCP (mcp.firecrawl.dev) via an OPENRESTY normalizing proxy (ADR-0040
  # + ADR-0041). openresty (nginx + Lua), not Caddy, because it must rewrite the
  # REQUEST body — see the proxy block.
  firecrawl:
    enabled: true
    oauth:
      resourceName: Firecrawl MCP Server
    mcp:
      name: firecrawl
      mode: proxiedExternal
      path: /mcp/firecrawl
      backendPath: /v2/mcp
      externalHost: mcp.firecrawl.dev
      proxy:
        # firecrawl frames its `initialize` RESPONSE with an empty leading SSE
        # event for the protocolVersion modern clients send (opencode/the MCP SDK
        # request 2025-11-25); the AIEG v0.7.0 mcpproxy reads that empty event and
        # fails: `MCP message is not a response: <nil>` → 500 "failed to create MCP
        # session to any backend" (upstream bug #2219, ADR-0041). For 2025-06-18
        # firecrawl frames cleanly, so openresty's Lua pins the REQUEST body's
        # protocolVersion down to it. Validated end-to-end (init 200, 19 tools).
        # INTERIM — drop the openresty engine + this block once AIEG's SSE parser
        # skips non-response events.
        engine: openresty
        pinRequestProtocolVersion: "2025-06-18"
    externalSecret:
      enabled: true
      secretName: firecrawl-token
      data:
        - secretKey: apiKey
          key: ai/camer/digital/prod/env
          property: firecrawl_api_key

  # Context7 MCP (mcp.context7.com) via a Caddy normalizing proxy (ADR-0040) —
  # RE-ADDED. Caddy's Go TLS handles context7's ECDSA cert that Envoy's BoringSSL
  # rejected (validated). Real SSE, no Content-Type rewrite. ⚠️ The
  # `context7_api_key` property in ssegning-aws is UNPOPULATED — the proxy runs
  # ANONYMOUS (rate-limited) until the maintainer sets it; the token env is
  # optional so the pod starts regardless and auto-uses the key once synced.
  context7:
    enabled: true
    oauth:
      resourceName: Context7 MCP Server
    mcp:
      name: context7
      mode: proxiedExternal
      path: /mcp/context7
      backendPath: /mcp
      externalHost: mcp.context7.com
    externalSecret:
      enabled: true
      secretName: context7-token
      data:
        - secretKey: apiKey
          key: ai/camer/digital/prod/env
          property: context7_api_key

  # Refero design-reference MCP (api.refero.design) via a Caddy normalizing proxy
  # (ADR-0040). Requires a Refero Pro subscription (8k tool calls/mo, ADR-0027).
  # ⚠️ refero's tools/list mislabels a JSON body as text/event-stream (AIEG bug
  # envoyproxy/ai-gateway#2218 — the mcpproxy then returns empty tools); Caddy
  # rewrites the response Content-Type → application/json so the mcpproxy parses
  # it. Remove the rewrite once #2218 is fixed — tracked by Epic
  # ADORSYS-GIS/ai-helm#369.
  refero:
    enabled: true
    oauth:
      resourceName: Refero Design MCP Server
    mcp:
      name: refero
      mode: proxiedExternal
      path: /mcp/refero
      backendPath: /mcp
      externalHost: api.refero.design
      proxy:
        rewriteResponseContentType: application/json
    externalSecret:
      enabled: true
      secretName: refero-token
      data:
        - secretKey: apiKey
          key: ai/camer/digital/prod/env
          property: refero_api_key
