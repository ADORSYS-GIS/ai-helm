  # Converse API Key
  converse-api-key:
    namespace: converse-gateway
    secretName: converse-api-key
    refreshInterval: 1h
    data:
      - secretKey: api_key
        remoteRef:
          key: converse-api-key
          namespace: external-secrets-system
