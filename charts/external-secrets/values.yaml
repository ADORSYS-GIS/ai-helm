# External Secrets Operator Configuration Chart
# This chart configures ClusterSecretStore and ExternalSecrets for the AI platform
# Using BJW-S common library for templating

# BJW-S common library global settings
global:
  # -- Override the name of the chart
  nameOverride: ""
  # -- Override the full name of the chart
  fullnameOverride: ""
  # -- Common labels to add to all resources
  labels: {}
  # -- Common annotations to add to all resources
  annotations: {}

# Namespace configuration
# Note: The namespace must be created manually before deploying this chart
namespace:
  name: external-secrets-system

# ClusterSecretStore configuration
# This store connects to a remote HashiCorp Vault instance
clusterSecretStore:
  enabled: true
  name: bootstrap-secrets
  # Sync wave for ArgoCD
  syncWave: "1"
  
  # Vault provider configuration
  # Configure connection to your remote Vault instance
  vault:
    # Vault server URL (required)
    # For external Vault, use the external URL (e.g., https://vault.example.com:8200)
    # For in-cluster Vault, use the service URL (e.g., https://vault.vault.svc.cluster.local:8200)
    server: ""
    
    # Vault secrets engine path (default: secret)
    path: secret
    
    # Vault secrets engine version (v1 or v2, default: v2)
    version: v2
    
    # Vault namespace (optional, for Vault Enterprise)
    # namespace: ""
    
    # Authentication method
    auth:
      # Kubernetes authentication (recommended for in-cluster workloads)
      kubernetes:
        # Mount path for Kubernetes auth method (default: kubernetes)
        mountPath: kubernetes
        # Role to use for authentication (required)
        role: ""
      
      # Token authentication (for external Vault or static token)
      # token:
      #   # Secret containing the Vault token
      #   secretName: vault-token
      #   namespace: external-secrets-system
      #   key: token

# ExternalSecrets configuration
externalSecretsConfig:
  # Sync wave for ArgoCD (must be higher than ClusterSecretStore's syncWave)
  syncWave: "2"

# ExternalSecrets to create
# These are actual secrets that will be synchronized from bootstrap secrets
externalSecrets:
  # OpenAI API key for models-proxy
  openai-api-key:
    namespace: converse-proxy
    secretName: openai-api-key
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: openai-api-key
          namespace: external-secrets-system
          property: apiKey

  # Gemini API key for models-proxy
  gemini-api-key:
    namespace: converse-proxy
    secretName: gemini-api-key
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: gemini-api-key
          namespace: external-secrets-system
          property: apiKey

  # OpenAI API key (converse namespace)
  openai-api-key-01:
    namespace: converse
    secretName: openai-api-key-01
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: openai-api-key-01
          namespace: external-secrets-system
          property: apiKey

  # Fireworks API key (converse namespace)
  fireworks-api-key-01:
    namespace: converse
    secretName: fireworks-api-key-01
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: fireworks-api-key-01
          namespace: external-secrets-system
          property: apiKey

  # DeepInfra API key (converse namespace)
  deepinfra-api-key:
    namespace: converse
    secretName: deepinfra-api-key-only
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: deepinfra-api-key-only
          namespace: external-secrets-system
          property: apiKey

  # GCP Service Account Key 01
  gcp-service-account-01:
    namespace: converse
    secretName: gcp-service-account-key-01
    refreshInterval: 24h
    data:
      - secretKey: service_account.json
        remoteRef:
          key: gcp-service-account-key-01
          namespace: external-secrets-system
          property: service_account.json

  # GCP Service Account Key 02
  gcp-service-account-02:
    namespace: converse
    secretName: gcp-service-account-key-02
    refreshInterval: 24h
    data:
      - secretKey: service_account.json
        remoteRef:
          key: gcp-service-account-key-02
          namespace: external-secrets-system
          property: service_account.json

  # Google AI Studio API Key 01
  google-ai-studio-api-key-01:
    namespace: converse
    secretName: google-ai-studio-api-key-01
    refreshInterval: 1h
    data:
      - secretKey: key
        remoteRef:
          key: google-ai-studio-api-key-01
          namespace: external-secrets-system
          property: key

  # Google AI Studio API Key 02
  google-ai-studio-api-key-02:
    namespace: converse
    secretName: google-ai-studio-api-key-02
    refreshInterval: 1h
    data:
      - secretKey: key
        remoteRef:
          key: google-ai-studio-api-key-02
          namespace: external-secrets-system
          property: key

  # Context7 Token
  context7-token:
    namespace: converse-mcp
    secretName: context7-token
    refreshInterval: 1h
    data:
      - secretKey: token
        remoteRef:
          key: context7-token
          namespace: external-secrets-system
