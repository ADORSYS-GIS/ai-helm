# External Secrets Operator Configuration Chart
# This chart configures ClusterSecretStore and ExternalSecrets for the AI platform
# Using BJW-S common library for templating

# BJW-S common library global settings
global:
  # -- Override the name of the chart
  nameOverride: ""
  # -- Override the full name of the chart
  fullnameOverride: ""
  # -- Common labels to add to all resources
  labels: {}
  # -- Common annotations to add to all resources
  annotations: {}

# Namespace configuration
# Note: The namespace must be created manually before deploying this chart
namespace:
  name: external-secrets-system

# ServiceAccount for the ClusterSecretStore
# BJW-S common library will create the ServiceAccount
serviceAccount:
  bootstrap:
    enabled: true
    # -- ArgoCD sync wave annotation (must be before ClusterSecretStore)
    annotations:
      argocd.argoproj.io/sync-wave: "0"

# RBAC configuration
# BJW-S common library will create ClusterRole and ClusterRoleBinding
rbac:
  roles:
    # ClusterRole for bootstrap ClusterSecretStore
    # Allows ESO to read secrets from any namespace for bootstrap purposes
    bootstrap-reader:
      enabled: true
      type: ClusterRole
      rules:
        - apiGroups: [""]
          resources:
            - secrets
          verbs:
            - get
            - list
            - watch
        - apiGroups: [""]
          resources:
            - namespaces
          verbs:
            - get
            - list
            - watch
        # Required for ESO Kubernetes provider to validate access
        # https://external-secrets.io/latest/provider/kubernetes/
        - apiGroups: ["authorization.k8s.io"]
          resources:
            - selfsubjectaccessreviews
          verbs:
            - create
  bindings:
    # ClusterRoleBinding for bootstrap ClusterSecretStore
    bootstrap-reader:
      enabled: true
      type: ClusterRoleBinding
      roleRef:
        identifier: bootstrap-reader
      subjects:
        - identifier: bootstrap
          namespace: external-secrets-system

# ClusterSecretStore configuration
# This store references bootstrap secrets that must be manually created
clusterSecretStore:
  enabled: true
  name: bootstrap-secrets
  # Sync wave for ArgoCD
  syncWave: "1"
  
  # Provider type: "kubernetes" or "vault"
  # - kubernetes: Uses in-cluster Kubernetes secrets as the source
  # - vault: Uses HashiCorp Vault as the external secret store
  provider:
    type: kubernetes
    
    # Kubernetes provider configuration (default)
    # Uses in-cluster secrets from a specific namespace
    kubernetes:
      # Kubernetes API server URL
      url: https://kubernetes.default.svc.cluster.local
      # CA certificate provider for TLS
      # Note: namespace is required for ClusterSecretStore (cluster-scoped)
      caProvider:
        type: ConfigMap
        name: kube-root-ca.crt
        key: ca.crt
        namespace: kube-system
    
    # Vault provider configuration (for future use)
    # Uncomment and configure when migrating to Vault
    # vault:
    #   # Vault server URL
    #   server: https://vault.vault.svc.cluster.local:8200
    #   # Vault secrets engine path
    #   path: secret
    #   # Vault secrets engine version (v1 or v2)
    #   version: v2
    #   # Vault namespace (optional, for Vault Enterprise)
    #   namespace: ""
    #   # Authentication method
    #   auth:
    #     # Kubernetes authentication (recommended for in-cluster)
    #     kubernetes:
    #       mountPath: kubernetes
    #       role: external-secrets
    #     # OR token authentication (for external Vault)
    #     # token:
    #     #   secretName: vault-token
    #     #   namespace: external-secrets-system
    #     #   key: token

# ExternalSecrets configuration
externalSecretsConfig:
  # Sync wave for ArgoCD (must be higher than ClusterSecretStore's syncWave)
  syncWave: "2"

# ExternalSecrets to create
# These are actual secrets that will be synchronized from bootstrap secrets
externalSecrets:
  # OpenAI API key for models-proxy
  openai-api-key:
    namespace: converse-proxy
    secretName: openai-api-key
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: openai-api-key
          namespace: external-secrets-system
          property: apiKey

  # Gemini API key for models-proxy
  gemini-api-key:
    namespace: converse-proxy
    secretName: gemini-api-key
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: gemini-api-key
          namespace: external-secrets-system
          property: apiKey

  # OpenAI API key (converse namespace)
  openai-api-key-01:
    namespace: converse
    secretName: openai-api-key-01
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: openai-api-key-01
          namespace: external-secrets-system
          property: apiKey

  # Fireworks API key (converse namespace)
  fireworks-api-key-01:
    namespace: converse
    secretName: fireworks-api-key-01
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: fireworks-api-key-01
          namespace: external-secrets-system
          property: apiKey

  # DeepInfra API key (converse namespace)
  deepinfra-api-key:
    namespace: converse
    secretName: deepinfra-api-key-only
    refreshInterval: 1h
    data:
      - secretKey: apiKey
        remoteRef:
          key: deepinfra-api-key-only
