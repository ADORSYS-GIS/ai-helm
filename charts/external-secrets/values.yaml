  # Google AI Studio API Key 01
  google-ai-studio-api-key-01:
    namespace: converse
    secretName: google-ai-studio-api-key-01
    refreshInterval: 1h
    data:
      - secretKey: key
        remoteRef:
          key: google-ai-studio-api-key-01
          namespace: external-secrets-system
          property: key

  # Google AI Studio API Key 02
  google-ai-studio-api-key-02:
    namespace: converse
    secretName: google-ai-studio-api-key-02
    refreshInterval: 1h
    data:
      - secretKey: key
        remoteRef:
          key: google-ai-studio-api-key-02
          namespace: external-secrets-system
          property: key

  # Context7 Token
  context7-token:
    namespace: converse-mcp
    secretName: context7-token
    refreshInterval: 1h
    data:
      - secretKey: token
        remoteRef:
          key: context7-token
          namespace: external-secrets-system
          property: token

  # Brave Token
  brave-token:
    namespace: converse-mcp
    secretName: brave-token
    refreshInterval: 1h
    data:
      - secretKey: token
        remoteRef:
          key: brave-token
          namespace: external-secrets-system
          property: token

  # DeepL Token
  deepl-token:
    namespace: converse-mcp
    secretName: deepl-token
    refreshInterval: 1h
    data:
      - secretKey: token
        remoteRef:
          key: deepl-token
          namespace: external-secrets-system
