  # Converse API Key Dev
  converse-api-key-dev:
    namespace: converse-gateway
    secretName: converse-api-key-dev
    refreshInterval: 1h
    data:
      - secretKey: api_key
        remoteRef:
          key: converse-api-key-dev
          namespace: external-secrets-system
