apiVersion: v2
name: external-secrets-config
description: |
  External Secrets Operator configuration for the AI platform.
  Provides ClusterSecretStore, RBAC, and ExternalSecret patterns.
  This chart does NOT install the ESO operator - use the upstream chart for that.

type: application
version: 0.2.0
appVersion: "2.4.0"

maintainers:
  - name: AI-Ops Team
    email: Derick.Kunga@adorsys.com

keywords:
  - external-secrets
  - secrets-management
  - gitops
  - kubernetes

home: https://external-secrets.io
sources:
  - https://github.com/external-secrets/external-secrets

annotations:
  artifacthub.io/category: security
  artifacthub.io/license: Apache-2.0

dependencies:
  - name: common
    version: "4.6.2"
    repository: https://bjw-s-labs.github.io/helm-charts