{{- if .Values.serviceAccount.bootstrap.enabled }}
---
# ServiceAccount for bootstrap ClusterSecretStore
# Allows ESO to read secrets from any namespace for bootstrap purposes
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "external-secrets.serviceAccountName" . }}
  namespace: {{ include "external-secrets.namespace" . }}
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    {{- if .Values.serviceAccount.bootstrap.annotations }}
    {{- toYaml .Values.serviceAccount.bootstrap.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.global.annotations }}
    {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
{{- end }}

{{- if (index .Values.rbac.roles "bootstrap-reader").enabled }}
---
# ClusterRole for bootstrap ClusterSecretStore
# Allows ESO to read secrets from any namespace for bootstrap purposes
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "external-secrets.clusterRoleName" . }}
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    {{- if .Values.global.annotations }}
    {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
rules:
  {{- toYaml (index .Values.rbac.roles "bootstrap-reader").rules | nindent 2 }}
{{- end }}

{{- if (index .Values.rbac.bindings "bootstrap-reader").enabled }}
---
# ClusterRoleBinding for bootstrap ClusterSecretStore
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "external-secrets.clusterRoleBindingName" . }}
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    {{- if .Values.global.annotations }}
    {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "external-secrets.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "external-secrets.serviceAccountName" . }}
    namespace: {{ include "external-secrets.namespace" . }}
{{- end }}