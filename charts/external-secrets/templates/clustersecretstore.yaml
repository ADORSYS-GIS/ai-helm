{{- $storeName := include "external-secrets.clusterSecretStoreName" . -}}
{{- if .Values.clusterSecretStore.enabled }}
---
# ClusterSecretStore for bootstrap secrets
# This store references secrets that must be manually created during platform bring-up
# These are "bootstrap" secrets that ESO cannot manage itself (chicken-and-egg problem)
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $storeName }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: cluster-secret-store
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.clusterSecretStore.syncWave | default "1" | quote }}
    {{- if .Values.global.annotations }}
    {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
spec:
  {{- if eq .Values.clusterSecretStore.provider.type "kubernetes" }}
  provider:
    kubernetes:
      remoteNamespace: {{ .Values.clusterSecretStore.provider.kubernetes.remoteNamespace | default "external-secrets-system" | quote }}
      server:
        url: {{ .Values.clusterSecretStore.provider.kubernetes.url | default "https://kubernetes.default.svc.cluster.local" }}
        caProvider:
          type: ConfigMap
          name: {{ .Values.clusterSecretStore.provider.kubernetes.caProvider.name | default "kube-root-ca.crt" }}
          key: {{ .Values.clusterSecretStore.provider.kubernetes.caProvider.key | default "ca.crt" }}
          namespace: {{ .Values.clusterSecretStore.provider.kubernetes.caProvider.namespace | default "kube-system" }}
      auth:
        serviceAccount:
          name: {{ include "external-secrets.serviceAccountName" . }}
          namespace: {{ include "external-secrets.namespace" . }}
  {{- else if eq .Values.clusterSecretStore.provider.type "vault" }}
  provider:
    vault:
      server: {{ .Values.clusterSecretStore.provider.vault.server }}
      path: {{ .Values.clusterSecretStore.provider.vault.path | default "secret" }}
      version: {{ .Values.clusterSecretStore.provider.vault.version | default "v2" }}
      {{- if .Values.clusterSecretStore.provider.vault.namespace }}
      namespace: {{ .Values.clusterSecretStore.provider.vault.namespace }}
      {{- end }}
      auth:
        {{- if .Values.clusterSecretStore.provider.vault.auth.kubernetes }}
        kubernetes:
          mountPath: {{ .Values.clusterSecretStore.provider.vault.auth.kubernetes.mountPath | default "kubernetes" }}
          role: {{ .Values.clusterSecretStore.provider.vault.auth.kubernetes.role }}
        {{- else if .Values.clusterSecretStore.provider.vault.auth.token }}
        tokenSecretRef:
          name: {{ .Values.clusterSecretStore.provider.vault.auth.token.secretName }}
          namespace: {{ .Values.clusterSecretStore.provider.vault.auth.token.namespace | default (include "external-secrets.namespace" .) }}
          key: {{ .Values.clusterSecretStore.provider.vault.auth.token.key | default "token" }}
        {{- end }}
  {{- else }}
  {{- fail "clusterSecretStore.provider.type must be either 'kubernetes' or 'vault'" }}
  {{- end }}
{{- end }}