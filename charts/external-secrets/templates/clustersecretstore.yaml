{{- if .Values.clusterSecretStore.enabled }}
---
# ClusterSecretStore for bootstrap secrets
# This store references secrets that must be manually created during platform bring-up
# These are "bootstrap" secrets that ESO cannot manage itself (chicken-and-egg problem)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.clusterSecretStore.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/component: cluster-secret-store
    app.kubernetes.io/managed-by: helm
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.clusterSecretStore.syncWave | quote }}
spec:
  provider:
    kubernetes:
      server:
        url: https://kubernetes.default.svc.cluster.local
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: {{ .Values.serviceAccount.name }}
          namespace: {{ .Values.namespace.name }}
{{- end }}