{{- $storeName := include "external-secrets.clusterSecretStoreName" . -}}
{{- if .Values.clusterSecretStore.enabled }}
---
# ClusterSecretStore for remote HashiCorp Vault
# This store connects to an external Vault instance for secret management
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $storeName }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: cluster-secret-store
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.clusterSecretStore.syncWave | default "1" | quote }}
    {{- if .Values.global.annotations }}
    {{- toYaml .Values.global.annotations | nindent 4 }}
    {{- end }}
spec:
  provider:
    vault:
      server: {{ .Values.clusterSecretStore.vault.server }}
      path: {{ .Values.clusterSecretStore.vault.path | default "secret" }}
      version: {{ .Values.clusterSecretStore.vault.version | default "v2" }}
      {{- if .Values.clusterSecretStore.vault.namespace }}
      namespace: {{ .Values.clusterSecretStore.vault.namespace }}
      {{- end }}
      auth:
        {{- if .Values.clusterSecretStore.vault.auth.kubernetes }}
        kubernetes:
          mountPath: {{ .Values.clusterSecretStore.vault.auth.kubernetes.mountPath | default "kubernetes" }}
          role: {{ .Values.clusterSecretStore.vault.auth.kubernetes.role }}
        {{- else if .Values.clusterSecretStore.vault.auth.token }}
        tokenSecretRef:
          name: {{ .Values.clusterSecretStore.vault.auth.token.secretName }}
          namespace: {{ .Values.clusterSecretStore.vault.auth.token.namespace | default (include "external-secrets.namespace" .) }}
          key: {{ .Values.clusterSecretStore.vault.auth.token.key | default "token" }}
        {{- end }}
{{- end }}