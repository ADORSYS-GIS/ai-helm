{{- $storeName := include "external-secrets.clusterSecretStoreName" . -}}
{{- $syncWave := .Values.externalSecretsConfig.syncWave | default "2" -}}
{{- if .Values.externalSecrets }}
{{- range $name, $secret := .Values.externalSecrets }}
---
# ExternalSecret: {{ $name }}
# Synchronizes secret from bootstrap secrets to application namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  namespace: {{ $secret.namespace }}
  labels:
    {{- include "external-secrets.labels" $ | nindent 4 }}
    app.kubernetes.io/component: external-secret
    {{- if $secret.labels }}
    {{- toYaml $secret.labels | nindent 4 }}
    {{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $syncWave | quote }}
    {{- if $secret.annotations }}
    {{- toYaml $secret.annotations | nindent 4 }}
    {{- end }}
    {{- if $.Values.global.annotations }}
    {{- toYaml $.Values.global.annotations | nindent 4 }}
    {{- end }}
spec:
  refreshInterval: {{ $secret.refreshInterval | default "1h" }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $storeName }}
  target:
    name: {{ $secret.secretName | default $name }}
    creationPolicy: Owner
    {{- if $secret.target }}
    {{- toYaml $secret.target | nindent 4 }}
    {{- end }}
  data:
    {{- range $secret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.namespace }}
        namespace: {{ .remoteRef.namespace }}
        {{- end }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}