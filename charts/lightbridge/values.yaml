# lightbridge App-of-Apps orchestrator — renders three child Application CRs
# (lightbridge-secrets + lightbridge-db + lightbridge-app). See ADR-0019 (coder
# is the canonical example). The chart owns no workload resources; it owns the
# three child Applications.
#
# Replaces the old flat `lightbridge-backend` app. Components: api (main) + mcp
# only — opa (removed per ADR-0021) and usage (unused) are DROPPED, along with
# the lightbridge-usage-db. Namespace stays `converse`.

# ────────────────────────────────────────────────────────────────────────
# Shared ArgoCD wiring for all child Applications.
# ────────────────────────────────────────────────────────────────────────
argocd:
  # ArgoCD project the children belong to.
  project: ai
  # This repo, source for the secrets + db leaf charts + the cert overlay.
  # Deploys are tag-based: pinned to the immutable release tag below (main is
  # never a deploy target). See the canonical note in charts/apps/values.yaml.
  repoURL: https://github.com/ADORSYS-GIS/ai-helm
  targetRevision: release-2026.06.14-v01
  destination:
    # The home-remote cluster all children target. Repo invariant (ADR-0017):
    # workloads NEVER deploy to the cluster ArgoCD runs in. The destination
    # helper hard-fails the render if this resolves to in-cluster unless
    # `allowInCluster: true`.
    name: home-remote
    allowInCluster: false
    namespace: converse
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

# ────────────────────────────────────────────────────────────────────────
# lightbridge-secrets child — the ExternalSecrets leaf chart (this repo).
# Lowest sync-wave: the api client secret + CNPG S3 backup creds must exist
# before the DB (barman) and the app (API_KEY_CLIENT_SECRET) start.
# ────────────────────────────────────────────────────────────────────────
secrets:
  enabled: true
  appName: lightbridge-secrets
  chartPath: charts/lightbridge-secrets
  releaseName: lightbridge-secrets
  syncWave: "0"

# ────────────────────────────────────────────────────────────────────────
# lightbridge-db child — the CloudNativePG database leaf chart (this repo).
# Lower sync-wave than the app so Postgres is up before Lightbridge starts.
# ────────────────────────────────────────────────────────────────────────
db:
  enabled: true
  appName: lightbridge-db
  chartPath: charts/lightbridge-db
  releaseName: lightbridge-db
  syncWave: "1"
  # Ignore the CNPG operator's defaulted fields on the Cluster so it doesn't sit
  # permanently OutOfSync (the operator, field manager `manager`, adds affinity/
  # bootstrap/probes/primaryUpdateStrategy/… that the chart never declares).
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      managedFieldsManagers:
        - manager

# ────────────────────────────────────────────────────────────────────────
# lightbridge-app child — the upstream Lightbridge workload (Helm chart,
# deployed as an ArgoCD source — NOT a Helm dependency, so ArgoCD pulls it the
# same way the old flat app did) + the ingress TLS Certificates via the
# kustomize overlay. releaseName stays `lightbridge` so workload resource names
# don't churn.
# ────────────────────────────────────────────────────────────────────────
app:
  enabled: true
  appName: lightbridge-app
  releaseName: lightbridge
  syncWave: "2"
  # Upstream Lightbridge chart.
  chart:
    repoURL: https://adorsys-gis.github.io/lightbridge-authz
    name: lightbridge
    targetRevision: "0.8.1"
  # App-scoped deps (ingress Certificates) — kustomize overlay in this repo,
  # added as a second source (issuer patched per env). ADR-0018 pattern.
  depsOverlay: environments/prod/deps/lightbridge-backend
  # The Lightbridge chart's values (verbatim from the old flat app's
  # valuesObject — api + mcp components only; opa + usage + all DB
  # rawRessources removed; the DB resources moved to the lightbridge-db leaf).
  values:
    global:
      authz:
        image:
          version: "sha-efb4a5e451a5e4bde066b4ad1bd3c5d00c0959b6"
      authz_mcp:
        image:
          version: "sha-efb4a5e451a5e4bde066b4ad1bd3c5d00c0959b6"
      tls:
        enabled: false

    api:
      enabled: true
      configMaps:
        config:
          enabled: true
          data:
            config.yaml: |
              logging:
                level: "${RUST_LOG}"
              database:
                url: "${DATABASE_URL}"
                pool_size: 10
              oauth2:
                jwks_url: https://auth.verif.fyi/realms/camer-digital/protocol/openid-connect/certs
                oauth2_url: "https://auth.verif.fyi/realms/camer-digital/protocol/openid-connect/token"
                # Expected audience claim(s) in JWT tokens. Tokens must contain at least one matching audience value.
                # This ensures tokens are intended for this service and prevents token misuse across services.
                # Valid audience values:
                #   - lightbridge-api-key: Primary audience for API Key service
                audience:
                  - "lightbridge-api-key"
                issuance:
                  enabled: true
                  grant_type: "urn:ietf:params:oauth:grant-type:token-exchange"
                  client_id: "${API_KEY_CLIENT_ID}"
                  client_secret: "${API_KEY_CLIENT_SECRET}"
                  subject_token_type: "urn:ietf:params:oauth:token-type:access_token"
                  requested_token_type: "urn:ietf:params:oauth:token-type:access_token"
              server:
                api:
                  address: 0.0.0.0
                  port: 3000
                  tls:
                    cert_path: /etc/lightbridge/tls/tls.crt
                    key_path: /etc/lightbridge/tls/tls.key
                opa:
                  address: 0.0.0.0
                  port: 3000
                  tls:
                    cert_path: /etc/lightbridge/tls/tls.crt
                    key_path: /etc/lightbridge/tls/tls.key
                  basic_auth:
                    username: authorino
                    password: "${OPA_PASSWORD}"
              otel:
                enabled: false
                otlp_endpoint: "http://localhost:4317"
                service_name: "lightbridge-authz-api"
      controllers:
        main:
          replicas: 2
          containers:
            authz:
              env:
                RUST_LOG: "INFO"
                API_KEY_CLIENT_ID: "lightbridge-api-key"
                API_KEY_CLIENT_SECRET:
                  valueFrom:
                    secretKeyRef:
                      name: lightbridge-api-client
                      key: secret-id
                PORT: "3000"
                POD_NAME:
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                DATABASE_URL:
                  valueFrom:
                    secretKeyRef:
                      name: lightbridge-main-db-app
                      key: uri
        migrate:
          containers:
            authz:
              env:
                DATABASE_URL:
                  valueFrom:
                    secretKeyRef:
                      name: lightbridge-main-db-app
                      key: uri
      persistence:
        tls:
          name: authz-tls
      service:
        authz:
          annotations:
            traefik.ingress.kubernetes.io/service.serversscheme: https
            traefik.ingress.kubernetes.io/service.serverstransport: converse-insecure-transport@kubernetescrd
      ingress:
        main:
          enabled: false
          annotations:
            cert-manager.io/cluster-issuer: cert-home-cert-http
          className: traefik
          hosts:
            - host: api-main.ai.camer.digital
              paths:
                - path: /
                  pathType: Prefix
                  service:
                    identifier: authz
                    port: http
          tls:
            - secretName: api-main.ai.camer.digital-tls
              hosts:
                - api-main.ai.camer.digital
    mcp:
      enabled: true
      configMaps:
        config:
          enabled: true
          data:
            config.yaml: |
              logging:
                level: "${RUST_LOG}"
              database:
                url: "${DATABASE_URL}"
                pool_size: 10
              oauth2:
                jwks_url: https://auth.verif.fyi/realms/camer-digital/protocol/openid-connect/certs
                # Expected audience claim(s) in JWT tokens. Tokens must contain at least one matching audience value.
                # This ensures tokens are intended for this service and prevents token misuse across services.
                # Valid audience values:
                #   - lightbridge-api-key: Primary audience for API Key service
                audience:
                  - "lightbridge-api-key"
              server:
                api:
                  address: 0.0.0.0
                  port: 3000
                  tls:
                    cert_path: /etc/lightbridge/tls/tls.crt
                    key_path: /etc/lightbridge/tls/tls.key
                opa:
                  address: 0.0.0.0
                  port: 3000
                  tls:
                    cert_path: /etc/lightbridge/tls/tls.crt
                    key_path: /etc/lightbridge/tls/tls.key
                  basic_auth:
                    username: authorino
                    password: "${OPA_PASSWORD}"
              otel:
                enabled: false
                otlp_endpoint: "http://localhost:4317"
                service_name: "lightbridge-authz-api"
      controllers:
        main:
          replicas: 2
          containers:
            authz:
              env:
                RUST_LOG: "INFO"
                PORT: "3000"
                POD_NAME:
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                DATABASE_URL:
                  valueFrom:
                    secretKeyRef:
                      name: lightbridge-main-db-app
                      key: uri
      persistence:
        tls:
          name: authz-tls
      service:
        authz:
          annotations:
            traefik.ingress.kubernetes.io/service.serversscheme: https
            traefik.ingress.kubernetes.io/service.serverstransport: converse-insecure-transport@kubernetescrd
      ingress:
        main:
          enabled: false
          annotations:
            cert-manager.io/cluster-issuer: cert-home-cert-http
          className: traefik
          hosts:
            - host: api-mcp.ai.camer.digital
              paths:
                - path: /
                  pathType: Prefix
                  service:
                    identifier: authz
                    port: http
          tls:
            - secretName: api-mcp.ai.camer.digital-tls
              hosts:
                - api-mcp.ai.camer.digital

    # opa + usage DROPPED (ADR-0026). The upstream lightbridge chart DEFAULTS
    # both components ON, so omitting their value blocks isn't enough — they
    # must be disabled EXPLICITLY or they keep rendering (and ArgoCD keeps them
    # deployed). Setting enabled:false makes lightbridge-app prune them.
    opa:
      enabled: false
    usage:
      enabled: false

    # Lightbridge PDB Strategy: Handled via rawRessources because the upstream chart
    # doesn't support controller PDBs natively. Ensure at least 1 instance is always available.
    # (opa + usage PDBs dropped; all DB resources moved to the lightbridge-db leaf.)
    rawRessources:
      - |
        apiVersion: policy/v1
        kind: PodDisruptionBudget
        metadata:
          name: lightbridge-api-pdb
          namespace: {{ $.Release.Namespace }}
        spec:
          maxUnavailable: 1
          selector:
            matchLabels:
              app.kubernetes.io/instance: lightbridge
              app.kubernetes.io/name: api
      - |
        apiVersion: policy/v1
        kind: PodDisruptionBudget
        metadata:
          name: lightbridge-mcp-pdb
          namespace: {{ $.Release.Namespace }}
        spec:
          maxUnavailable: 1
          selector:
            matchLabels:
              app.kubernetes.io/instance: lightbridge
              app.kubernetes.io/name: mcp
      - |
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: "{{ $.Release.Name }}-apis"
          namespace: {{ $.Release.Namespace }}
        spec:
          ingressClassName: traefik
          tls:
          - hosts:
              - self-service.ai.camer.digital
            secretName: self-service.ai.camer.digital-tls
          rules:
          - host: self-service.ai.camer.digital
            http:
              paths:
              - path: /api/v1
                pathType: Prefix
                backend:
                  service:
                    name: {{ $.Release.Name }}-api
                    port:
                      number: 3000
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: converse-ui
                    port:
                      number: 80
      - |
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: "{{ $.Release.Name }}-mcp"
          namespace: {{ $.Release.Namespace }}
        spec:
          ingressClassName: traefik
          tls:
          - hosts:
              - mcp.ai.camer.digital
            secretName: mcp.ai.camer.digital-tls
          rules:
          - host: mcp.ai.camer.digital
            http:
              paths:
              - path: /mcp
                pathType: Prefix
                backend:
                  service:
                    name: {{ $.Release.Name }}-mcp
                    port:
                      number: 3000
              - path: /.well-known/oauth-authorization-server
                pathType: Prefix
                backend:
                  service:
                    name: {{ $.Release.Name }}-mcp
                    port:
                      number: 3000
              - path: /.well-known/openid-configuration
                pathType: Prefix
                backend:
                  service:
                    name: {{ $.Release.Name }}-mcp
                    port:
                      number: 3000
              - path: /oauth/register
                pathType: Prefix
                backend:
                  service:
                    name: {{ $.Release.Name }}-mcp
                    port:
                      number: 3000
      - |
        apiVersion: traefik.io/v1alpha1
        kind: ServersTransport
        metadata:
          name: insecure-transport
          namespace: converse
        spec:
          insecureSkipVerify: true
      - |
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: authz-tls
          namespace: {{ $.Release.Namespace }}
        spec:
          secretName: authz-tls
          issuerRef:
            name: self-signed-ca
            kind: ClusterIssuer
          commonName: lightbridge.{{ $.Release.Namespace }}.svc.cluster.local
          dnsNames:
            - "*.{{ $.Release.Namespace }}.svc.cluster.local"
            - "*.{{ $.Release.Namespace }}.svc.cluster"
            - "*.{{ $.Release.Namespace }}.svc"
            - "*.{{ $.Release.Namespace }}"
          usages:
            - server auth
            - client auth
