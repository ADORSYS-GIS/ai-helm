# Default values for ai-stack.

namespace: converse

gateway:
  name: ai-gateway
  class: eg
  listeners:
    api:
      hostname: api.ai.camer.digital
      port: 443
    web:
      hostname: ai.camer.digital
      additionalHostnames:
        - analytics.ai.camer.digital
      port: 443

tls:
  issuerName: letsencrypt-prod
  issuerKind: ClusterIssuer
  secretName: converse-llm-tls
  domains:
    - api.ai.camer.digital
    - ai.camer.digital
    - analytics.ai.camer.digital

envoyProxy:
  name: ai-envoy

lightbridge:
  enabled: true
  image:
    repository: ghcr.io/franck-sorel/lightbridge-authz
    tag: latest
  service:
    port: 3000
    grpcPort: 3001
  databaseUrlSecret: lightbridge-authz-secrets
  jwksUrlSecret: lightbridge-authz-secrets

authorino:
  enabled: true
  name: authorino
  namespace: kuadrant-system
  serviceName: authorino-authorino-authorization
  port: 50051

envoyRateLimit: {}

backendTrafficPolicy:
  name: backend-retry-policy
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ai-gateway
  retry:
    numRetries: 3
    perRetry:
      backOff:
        baseInterval: 100ms
        maxInterval: 10s
      timeout: 30s
    retryOn:
      httpStatusCodes: [500, 502, 503, 504, 404]
      triggers: [connect-failure, retriable-status-codes]

backends:
  fw-01:
    resourceName: fw-backend-01-svc
    schema: OpenAI
    prefix: "/inference/v1"
    fqdn: { hostname: api.fireworks.ai, port: 443 }
    securityType: APIKey
    secretRef: { name: fireworks-api-key-01 }
    tlsHostname: api.fireworks.ai
  fw-02:
    resourceName: fw-backend-02-svc
    schema: OpenAI
    prefix: "/inference/v1"
    fqdn: { hostname: api.fireworks.ai, port: 443 }
    securityType: APIKey
    secretRef: { name: fireworks-api-key-02 }
    tlsHostname: api.fireworks.ai
  openai-01:
    resourceName: openai-backend-01-svc
    schema: OpenAI
    fqdn: { hostname: api.openai.com, port: 443 }
    securityType: APIKey
    secretRef: { name: openai-api-key-01 }
    tlsHostname: api.openai.com
  openai-02:
    resourceName: openai-backend-02-svc
    schema: OpenAI
    fqdn: { hostname: api.openai.com, port: 443 }
    securityType: APIKey
    secretRef: { name: openai-api-key-02 }
    tlsHostname: api.openai.com

models:
  deepseek-v3p1:
    backends:
      fw-01: { modelNameOverride: "accounts/fireworks/models/deepseek-v3p1", priority: 0, weight: 1 }
      fw-02: { modelNameOverride: "accounts/fireworks/models/deepseek-v3p1", priority: 1, weight: 1 }
  gpt-5:
    backends:
      openai-01: { modelNameOverride: "gpt-5", priority: 0, weight: 1 }
      openai-02: { modelNameOverride: "gpt-5", priority: 1, weight: 1 }
