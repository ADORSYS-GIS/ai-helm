apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: librechat-ui
  namespace: {{ .Release.Namespace | default .Values.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Release.Namespace | default .Values.namespace }}
    sectionName: web-https
  hostnames:
  - "ai.camer.digital"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: librechat
      port: 3080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: phoenix-ui
  namespace: {{ .Release.Namespace | default .Values.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Release.Namespace | default .Values.namespace }}
    sectionName: web-https
  hostnames:
  - "analytics.ai.camer.digital"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: phoenix
      port: 6006
