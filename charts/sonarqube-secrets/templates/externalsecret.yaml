{{- /*
ExternalSecrets for SonarQube. Values-driven (the `externalSecrets` map): each
entry names the target Secret, the remoteRef key in the ssegning-aws store, and
one-or-more data mappings (target secretKey ← remoteRef property). All use
creationPolicy Owner. ADR-0018 in-chart secret ownership; ssegning-aws is the
only ClusterSecretStore on-cluster. Copied verbatim from charts/lightbridge-secrets.
*/ -}}
{{- $store   := .Values.secretStore | default "ssegning-aws" }}
{{- $refresh := .Values.refreshInterval | default "1h" }}
{{- range $name, $cfg := .Values.externalSecrets }}
{{- if not (eq $cfg.enabled false) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "common.labels.standard" $ | nindent 4 }}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $name }}
    creationPolicy: Owner
    {{- with $cfg.literals }}
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        {{- range $k, $v := . }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    {{- end }}
  data:
    {{- range $cfg.data }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ .key | quote }}
        property: {{ .property | quote }}
    {{- end }}
{{- end }}
{{- end }}
