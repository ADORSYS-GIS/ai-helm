    kind: reranker
    pricing:
      strategy: flat
      standard:
        effectivePer1M: 0.010
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "Qwen/Qwen3-Reranker-8B"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "Qwen/Qwen3-Reranker-8B"

  minimax-m2p5:
    kind: text
    # DeepInfra · MiniMaxAI/MiniMax-M2.5 — 204,800-token context (NOT 400k:
    # 196k usable per sequence), 131k max output, reasoning + agentic tools.
    info:
      contextLength: 204800
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.15
        cachedInputPer1M: 0.03
        outputPer1M: 1.15
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "MiniMaxAI/MiniMax-M2.5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "MiniMaxAI/MiniMax-M2.5"

  glm-5p1:
    # Fireworks · glm-5p1 (GLM-5.1) — text-only (NOT multimodal), 202,752-token
    # context, 131k max output, thinking + function calling + structured output.
    kind: text
    info:
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 1.40
        cachedInputPer1M: 0.26
        outputPer1M: 4.40
    backends:
      fw-01:
        <<: *fwBackendPrimary
        modelNameOverride: "accounts/fireworks/models/glm-5p1"
      fw-02:
        <<: *fwBackendSecondary
        modelNameOverride: "accounts/fireworks/models/glm-5p1"

  qwen3-embedding-8b:
