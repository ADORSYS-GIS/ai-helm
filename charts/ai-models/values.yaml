        <<: *fwBackendPrimary
        modelNameOverride: "accounts/fireworks/models/qwen3-embedding-8b"
      fw-02:
        <<: *fwBackendSecondary
        modelNameOverride: "accounts/fireworks/models/qwen3-embedding-8b"

  qwen3p6-plus:
