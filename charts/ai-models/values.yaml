# ai-models orchestrator. The chart renders one ApplicationSet that
# generates child Applications for backends + each enabled model.
#
# Pre-split (chart v1.x), this same values.yaml drove a single Application
# rendering all the K8s resources directly. Post-split (v2.x), the data is
# unchanged in shape; the orchestrator template fans it out into N child
# Applications, one per model + one for backends. See ADR-0012.

# ────────────────────────────────────────────────────────────────────────
# ArgoCD wiring — where the generated child Applications live and which
# upstream branch they sync from.
# ────────────────────────────────────────────────────────────────────────
argocd:
  # Namespace the ApplicationSet (and the children it generates) live in.
  # `argocd` is the standard install; override if the operator lives elsewhere.
  namespace: argocd
  # ArgoCD project the children belong to.
  project: ai
  # Source repo + branch for the leaf charts (ai-models-backends, ai-model).
  # Deploys run from `claude/magical-bohr-390242` (NOT main). After this
  # deployment settles, this pins to a release tag — tag-based deploys only;
  # main is never a deploy target.
  repoURL: https://github.com/ADORSYS-GIS/ai-helm
  targetRevision: claude/magical-bohr-390242
  destination:
    # The home-remote cluster every child Application targets. This repo's
    # invariant (ADR-0017) is that workloads NEVER deploy to the cluster
    # ArgoCD itself runs in. The destination helper hard-fails the render
    # if this resolves to `in-cluster` / `https://kubernetes.default.svc`
    # unless `allowInCluster: true` is set below.
    name: home-remote
    # Escape hatch — only set true if you genuinely want in-cluster.
    allowInCluster: false
    namespace: converse
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

# ────────────────────────────────────────────────────────────────────────
# Monthly estimated-spend guardrails. Each plan value is in real USD but
# the chart converts to micro-USD because `llm_custom_total_cost` is
# emitted by Envoy AI Gateway as an integer in micro-USD.
# ────────────────────────────────────────────────────────────────────────
# Rate-limit tiers (ADR-0021). Each plan drives up to three rule families per
# model in the BackendTrafficPolicy:
#   - burst.requestsPerMin  → per-USER req/min cap   (keyed on x-account-id)
#   - burst.tokensPerMin    → per-USER token/min cap (keyed on x-account-id,
#                             cost from the llm_total_token AIEG metadata)
#   - monthlyBudgetUsd      → per-ORG monthly micro-USD budget (keyed on
#                             x-org-id). OMITTED for a plan ⇒ uncapped budget.
# x-billing-plan (set by the AuthConfig from the Keycloak `billing_plan` claim,
# or "internal" on the internal plane) selects which plan's rules apply.
rateLimitBudgeting:
  plans:
    free:
      monthlyBudgetUsd: 30
      burst:
        requestsPerMin: 20
        tokensPerMin: 50000
    pro:
      monthlyBudgetUsd: 200
      burst:
        requestsPerMin: 120
        tokensPerMin: 400000
    # Remote service accounts (GitHub runners, …) on the EXTERNAL plane.
    # Uncapped budget (no monthlyBudgetUsd) — burst-only.
    service:
      burst:
        requestsPerMin: 600
        tokensPerMin: 2000000
    # In-cluster services (LibreChat, cron-jobs, k8s SAs) on the INTERNAL plane.
    # Uncapped budget — burst-only.
    internal:
      burst:
        requestsPerMin: 600
        tokensPerMin: 2000000

gatewayRef:
  name: core-gateway
  namespace: converse-gateway
  # Pin model routes to the Gateway's HTTPS listener so they're HTTPS-only; the
  # :80 listener is reserved for the http→https redirect + the ACME solver.
  sectionName: api-https
  # Internal plane (ADR-0021): also attach each model route to the api-internal
  # listener so in-cluster callers reach the same backends. Keep in sync with
  # core-gateway gateway.internal.enabled (the listener must exist).
  internalSectionName: api-internal

# ────────────────────────────────────────────────────────────────────────
# Models-info endpoint (charts/ai-models-info). Adds a sync-wave 1
# child Application that serves an OpenRouter-shape catalog at
# api.ai-v2.camer.digital/v1/models/info so opencode's
# @vymalo/opencode-models-info plugin can enrich its in-process model
# registry. See ADR-0015.
# ────────────────────────────────────────────────────────────────────────
modelsInfo:
  enabled: true
  # Kinds we omit from the catalog (chat-only catalog by default).
  excludeKinds:
    - embedding
    - reranker
  # Route/host/path live in `charts/ai-models-info`'s own defaults
  # (core-gateway api-https listener, api.ai-v2.camer.digital, exact path
  # /v1/models/info). Override there via ai-gitops if a different env
  # needs different values.

backendDefaults:
  fireworks: &fireworksBackend
    schema: OpenAI
    prefix: "/inference/v1"
    fqdn:
      hostname: api.fireworks.ai
      port: 443
    securityType: APIKey
    tlsHostname: api.fireworks.ai
  deepinfra: &deepinfraBackend
    schema: OpenAI
    prefix: "/v1/openai"
    fqdn:
      hostname: api.deepinfra.com
      port: 443
    securityType: APIKey
    tlsHostname: api.deepinfra.com
  googleAiStudio: &googleAiStudioBackend
    schema: OpenAI
    prefix: v1beta/openai
    fqdn:
      hostname: generativelanguage.googleapis.com
      port: 443
    securityType: APIKey
    tlsHostname: generativelanguage.googleapis.com

modelDefaults:
  backendRefs:
    fwPrimary: &fwBackendPrimary
      ref: fw-01
      priority: 0
    fwSecondary: &fwBackendSecondary
      ref: fw-02
      priority: 1
    deepinfraPrimary: &deepinfraBackendPrimary
      ref: deepinfra-01
      priority: 0
    deepinfraSecondary: &deepinfraBackendSecondary
      ref: deepinfra-02
      priority: 1
    googleAiStudioPrimary: &googleAiStudioBackendPrimary
      ref: google-ai-studio-01
      priority: 0
    googleAiStudioSecondary: &googleAiStudioBackendSecondary
      ref: google-ai-studio-02
      priority: 1

# ────────────────────────────────────────────────────────────────────────
# supported_parameters anchors — flow through to the models-info catalog
# (each model's `info.supportedParameters` → OpenRouter-shape
# `supported_parameters[]`). The OpenAI-compatible Fireworks/DeepInfra
# endpoints accept the standard sampling+tool set; agentic/thinking models
# additionally expose `reasoning`. Reranker/embedding models are excluded
# from the catalog (excludeKinds) so they carry no list.
#
# Verified 2026-06-02 against the backend model pages (DeepInfra / Fireworks).
supportedParams:
  # Agentic chat models with a thinking/reasoning mode (GLM-5/5.1, Kimi,
  # MiniMax, DeepSeek-V4, Qwen3.6-Plus).
  reasoning: &spReasoning
    - tools
    - tool_choice
    - temperature
    - top_p
    - top_k
    - max_tokens
    - stop
    - frequency_penalty
    - presence_penalty
    - seed
    - response_format
    - structured_outputs
    - reasoning
  # Chat models without an exposed reasoning channel (Gemma-4: tools +
  # vision but no thinking mode).
  standard: &spStandard
    - tools
    - tool_choice
    - temperature
    - top_p
    - top_k
    - max_tokens
    - stop
    - frequency_penalty
    - presence_penalty
    - seed
    - response_format

# Per-backend API-key ExternalSecrets — flows through to the
# `ai-models-backends` child (templates/externalsecret.yaml), which renders
# one chart-owned ExternalSecret per unique `secretRef.name` (deduped) from
# the store below. Replaces the out-of-band `aii-secret` provisioning.
#
# Each backend's `externalSecret.{key,property}` resolves against the
# consolidated ssegning-aws secret `ai/camer/digital/prod/env`, one property
# per provider key. The old out-of-band provisioner (`aii-secret` / the
# `secrets` Application) has been retired now these are chart-owned.
externalSecrets:
  enabled: true
  secretStore: ssegning-aws
  refreshInterval: 1h
  apiKeyDataKey: apiKey

# Backends — flow into the `ai-models-backends` child as its `backends:`
# values, and into each `ai-model` child as `backendsInventory:` for
# resourceName lookup.
backends:
  fw-01:
    <<: *fireworksBackend
    secretRef:
      name: fireworks-api-key-01
    resourceName: fw-backend-01-svc
    externalSecret:
      key: ai/camer/digital/prod/env
      property: fireworks_api_key_01
  fw-02:
    <<: *fireworksBackend
    resourceName: fw-backend-02-svc
    secretRef:
      name: fireworks-api-key-02
    externalSecret:
      key: ai/camer/digital/prod/env
      property: fireworks_api_key_02
  deepinfra-01:
    <<: *deepinfraBackend
    resourceName: deepinfra-backend-01-svc
    secretRef:
      name: deepinfra-api-key-01
    externalSecret:
      key: ai/camer/digital/prod/env
      property: deepinfra_api_key_01
  deepinfra-02:
    <<: *deepinfraBackend
    resourceName: deepinfra-backend-02-svc
    # Independent key from deepinfra-01 (own Secret name → own ExternalSecret;
    # the chart dedupes by secret name, so a distinct name is required for the
    # second key to render). Mirrors the fw/google primary/secondary pattern.
    secretRef:
      name: deepinfra-api-key-02
    externalSecret:
      key: ai/camer/digital/prod/env
      property: deepinfra_api_key_02
  google-ai-studio-01:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-01-svc
    secretRef:
      name: google-ai-studio-api-key-01
    externalSecret:
      key: ai/camer/digital/prod/env
      property: google_ai_studio_api_key_01
  google-ai-studio-02:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-02-svc
    secretRef:
      name: google-ai-studio-api-key-02
    externalSecret:
      key: ai/camer/digital/prod/env
      property: google_ai_studio_api_key_02

# Models — each entry becomes one child Application using the `ai-model`
# leaf chart. Setting `enabled: false` on a model skips its Application
# (the AppSet controller will delete a previously-generated child).
#
# Pricing strategies driving the `llm_custom_total_cost` CEL:
#   weighted        — input / cached-input / output prices differ
#   tieredWeighted  — same as weighted, but use `longContext` prices when
#                     prompt size exceeds `thresholdTokens`
#   flat            — one blended price for total tokens

models:

  deepseek-v4-flash:
    kind: text
    # DeepInfra · deepseek-ai/DeepSeek-V4-Flash — 1,048,576-token context
    # (clamped to the 400k catalog ceiling), 384k max output (capped to a
    # sane 131k generation ceiling). Dual Think/Non-Think modes → reasoning.
    info:
      contextLength: 1048576
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.14
        cachedInputPer1M: 0.028
        outputPer1M: 0.28
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "deepseek-ai/DeepSeek-V4-Flash"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "deepseek-ai/DeepSeek-V4-Flash"

  reviewer:
    kind: text
    # DeepInfra · zai-org/GLM-5 — 202,752-token context, 131k max output,
    # agentic thinking mode + function calling + vision.
    info:
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.60
        cachedInputPer1M: 0.12
        outputPer1M: 2.08
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "zai-org/GLM-5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "zai-org/GLM-5"

  glm-5:
    kind: text
    # DeepInfra · zai-org/GLM-5 — 202,752-token context, 131k max output.
    info:
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.60
        cachedInputPer1M: 0.12
        outputPer1M: 2.08
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "zai-org/GLM-5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "zai-org/GLM-5"
    rateLimitBudgeting:
      free: 10
      pro: 50

  adorsys-planner:
    kind: text
    # DeepInfra · zai-org/GLM-5 — 202,752-token context, 131k max output.
    info:
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.60
        cachedInputPer1M: 0.12
        outputPer1M: 2.08
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "zai-org/GLM-5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "zai-org/GLM-5"
    rateLimitBudgeting:
      free: 10
      pro: 50

  adorsys-planner-pro:
    kind: text
    # DeepInfra · zai-org/GLM-5.1 — 202,752-token context, 131k max output,
    # long-horizon agentic engineering (thinking + function calling + MCP).
    info:
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 1.05
        cachedInputPer1M: 0.205
        outputPer1M: 3.50
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "zai-org/GLM-5.1"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "zai-org/GLM-5.1"
    rateLimitBudgeting:
      free: 5
      pro: 25

  kimi-k2.5:
    kind: text
    # DeepInfra · moonshotai/Kimi-K2.5 — 262,144-token context, 131k max
    # output, agentic tool use + thinking.
    info:
      contextLength: 262144
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.45
        cachedInputPer1M: 0.07
        outputPer1M: 2.25
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "moonshotai/Kimi-K2.5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "moonshotai/Kimi-K2.5"

  kimi-k2.6:
    kind: text
    # DeepInfra · moonshotai/Kimi-K2.6 — 262,144-token context, 131k max
    # output (per-step generation limit), agentic tool use + thinking.
    info:
      contextLength: 262144
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
