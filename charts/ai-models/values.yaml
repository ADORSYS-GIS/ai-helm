# Monthly estimated-spend guardrails.
# Each plan value is expressed in real USD, but the chart converts it to micro-USD because
# `llm_custom_total_cost` is emitted by Envoy AI Gateway as an integer in micro-USD.
# Example: `30` means "allow about $30 of estimated model spend per month".
rateLimitBudgeting:
  plans:
    free:
      monthlyBudgetUsd: 30
    pro:
      monthlyBudgetUsd: 200


gatewayRef:
  name: core-gateway
  namespace: converse-gateway

backendDefaults:
  fireworks: &fireworksBackend
    schema: OpenAI
    prefix: "/inference/v1"
    fqdn:
      hostname: api.fireworks.ai
      port: 443
    securityType: APIKey
    tlsHostname: api.fireworks.ai
  deepinfra: &deepinfraBackend
    schema: OpenAI
    prefix: "/v1/openai"
    fqdn:
      hostname: api.deepinfra.com
      port: 443
    securityType: APIKey
    tlsHostname: api.deepinfra.com
  googleAiStudio: &googleAiStudioBackend
    schema: OpenAI
    prefix: v1beta/openai
    fqdn:
      hostname: generativelanguage.googleapis.com
      port: 443
    securityType: APIKey
    tlsHostname: generativelanguage.googleapis.com

modelDefaults:
  backendRefs:
    fwPrimary: &fwBackendPrimary
      ref: fw-01
      priority: 0
    fwSecondary: &fwBackendSecondary
      ref: fw-02
      priority: 1
    deepinfraPrimary: &deepinfraBackendPrimary
      ref: deepinfra-01
      priority: 0
    deepinfraSecondary: &deepinfraBackendSecondary
      ref: deepinfra-02
      priority: 1
    googleAiStudioPrimary: &googleAiStudioBackendPrimary
      ref: google-ai-studio-01
      priority: 0
    googleAiStudioSecondary: &googleAiStudioBackendSecondary
      ref: google-ai-studio-02
      priority: 1

backends:
  fw-01:
    <<: *fireworksBackend
    secretRef:
      name: fireworks-api-key-01
    resourceName: fw-backend-01-svc
  fw-02:
    <<: *fireworksBackend
    resourceName: fw-backend-02-svc
    secretRef:
      name: fireworks-api-key-02
  deepinfra-01:
    <<: *deepinfraBackend
    resourceName: deepinfra-backend-01-svc
    secretRef:
      name: deepinfra-api-key-only
  deepinfra-02:
    <<: *deepinfraBackend
    resourceName: deepinfra-backend-02-svc
    secretRef:
      name: deepinfra-api-key-only
  google-ai-studio-01:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-01-svc
    secretRef:
      name: google-ai-studio-api-key-01
  google-ai-studio-02:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-02-svc
    secretRef:
      name: google-ai-studio-api-key-02

# Pricing sources:
# - Fireworks serverless pricing: https://fireworks.ai/pricing
# - OpenAI pricing and model pages: https://developers.openai.com/api/docs/pricing/
# - OpenAI embeddings guide: https://developers.openai.com/api/docs/guides/embeddings/
# - Gemini Developer API pricing: https://ai.google.dev/gemini-api/docs/pricing
#
# `pricing.strategy` drives the `llm_custom_total_cost` CEL rendered by `AIGatewayRoute`.
# Choose the strategy that best matches the provider's published pricing:
# - `weighted`: use when input, cached input, and output tokens have different prices.
# - `tieredWeighted`: same as `weighted`, but use `longContext` prices when prompt size exceeds
#   `thresholdTokens`.
# - `flat`: use when the provider publishes one blended price for total tokens.
#
# Plain-English token definitions:
# - input tokens: prompt tokens sent to the model
# - cached input tokens: prompt tokens the provider reports as cache hits, usually discounted
# - output tokens: tokens generated by the model, usually the most expensive

models:

  deepseek-v4-flash:
    kind: text
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.14
        cachedInputPer1M: 0.028
        outputPer1M: 0.28
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "deepseek-ai/DeepSeek-V4-Flash"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "deepseek-ai/DeepSeek-V4-Flash"

