# Monthly estimated-spend guardrails.
# Each plan value is expressed in real USD, but the chart converts it to micro-USD because
# `llm_custom_total_cost` is emitted by Envoy AI Gateway as an integer in micro-USD.
# Example: `30` means "allow about $30 of estimated model spend per month".
rateLimitBudgeting:
  plans:
    free:
      monthlyBudgetUsd: 30
    pro:
      monthlyBudgetUsd: 200

gatewayRef:
  name: core-gateway
  namespace: converse-gateway

backendDefaults:
  fireworks: &fireworksBackend
    schema: OpenAI
    prefix: "/inference/v1"
    fqdn:
      hostname: api.fireworks.ai
      port: 443
    securityType: APIKey
    tlsHostname: api.fireworks.ai
  openai: &openaiBackend
    schema: OpenAI
    fqdn:
      hostname: api.openai.com
      port: 443
    securityType: APIKey
    tlsHostname: api.openai.com
  vertexAi: &vertexAiBackend
    schema: GCPVertexAI
    fqdn:
      hostname: us-central1-aiplatform.googleapis.com
      port: 443
    type: GCPCredentials
    gcpCredentials: &vertexAiCredentials
      projectName: kivoyo
      region: us-central1
    tlsHostname: us-central1-aiplatform.googleapis.com
  googleAiStudio: &googleAiStudioBackend
    schema: OpenAI
    prefix: v1beta/openai
    fqdn:
      hostname: generativelanguage.googleapis.com
      port: 443
    securityType: APIKey
    tlsHostname: generativelanguage.googleapis.com
  geminiProxy: &geminiProxyBackend
    schema: OpenAI
    fqdn:
      hostname: models-proxy.converse-proxy.svc.cluster.local
      port: 4000
    securityType: APIKey

modelDefaults:
  backendRefs:
    fwPrimary: &fwBackendPrimary
      ref: fw-01
      priority: 0
    fwSecondary: &fwBackendSecondary
      ref: fw-02
      priority: 1
    openaiPrimary: &openaiBackendPrimary
      ref: openai-01
      priority: 0
    openaiSecondary: &openaiBackendSecondary
      ref: openai-02
      priority: 1
    vertexPrimary: &vertexBackendPrimary
      ref: vertex-ai-01
      priority: 0
    vertexSecondary: &vertexBackendSecondary
      ref: vertex-ai-02
      priority: 1
    googleAiStudioPrimary: &googleAiStudioBackendPrimary
      ref: google-ai-studio-01
      priority: 0
    googleAiStudioSecondary: &googleAiStudioBackendSecondary
      ref: google-ai-studio-02
      priority: 1
    modelProxyPrimary: &modelProxyPrimary
      ref: model-proxy-01
      priority: 0
    modelProxySecondary: &modelProxySecondary
      ref: model-proxy-02
      priority: 1

backends:
  fw-01:
    <<: *fireworksBackend
    secretRef:
      name: fireworks-api-key-01
    resourceName: fw-backend-01-svc
    #enabled: false
  fw-02:
    <<: *fireworksBackend
    resourceName: fw-backend-02-svc
    secretRef:
      name: fireworks-api-key-02
    #enabled: false
  openai-01:
    <<: *openaiBackend
    resourceName: openai-backend-01-svc
    secretRef:
      name: openai-api-key-01
  openai-02:
    <<: *openaiBackend
    resourceName: openai-backend-02-svc
    secretRef:
      name: openai-api-key-02
  vertex-ai-01:
    <<: *vertexAiBackend
    resourceName: vertex-ai-backend-01-svc
    gcpCredentials:
      <<: *vertexAiCredentials
      credentialsFile:
        secretRef:
          name: gcp-service-account-key-01
  vertex-ai-02:
    <<: *vertexAiBackend
    resourceName: vertex-ai-backend-02-svc
    gcpCredentials:
      <<: *vertexAiCredentials
      credentialsFile:
        secretRef:
          name: gcp-service-account-key-02
  google-ai-studio-01:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-01-svc
    secretRef:
      name: google-ai-studio-api-key-01
  google-ai-studio-02:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-02-svc
    secretRef:
      name: google-ai-studio-api-key-02
  model-proxy-01:
    <<: *geminiProxyBackend
    resourceName: model-proxy-01-svc
    secretRef:
      name: proxy-api-key-01
    #enabled: false
  model-proxy-02:
    <<: *geminiProxyBackend
    resourceName: model-proxy-02-svc
    secretRef:
      name: proxy-api-key-02
    #enabled: false

# Pricing sources:
# - Fireworks serverless pricing: https://fireworks.ai/pricing
# - OpenAI pricing and model pages: https://developers.openai.com/api/docs/pricing/
# - OpenAI embeddings guide: https://developers.openai.com/api/docs/guides/embeddings/
# - Gemini Developer API pricing: https://ai.google.dev/gemini-api/docs/pricing
#
# `pricing.strategy` drives the `llm_custom_total_cost` CEL rendered by `AIGatewayRoute`.
# Choose the strategy that best matches the provider's published pricing:
# - `weighted`: use when input, cached input, and output tokens have different prices.
# - `tieredWeighted`: same as `weighted`, but use `longContext` prices when prompt size exceeds
#   `thresholdTokens`.
# - `flat`: use when the provider publishes one blended price for total tokens.
#
# Plain-English token definitions:
# - input tokens: prompt tokens sent to the model
# - cached input tokens: prompt tokens the provider reports as cache hits, usually discounted
# - output tokens: tokens generated by the model, usually the most expensive
_pricingProfiles:
  fireworksKimiK2: &pricingFireworksKimiK2
    strategy: weighted
    standard:
      inputPer1M: 0.60
      cachedInputPer1M: 0.30
      outputPer1M: 2.50

  fireworksDeepseekV3p2: &pricingFireworksDeepseekV3p2
    strategy: weighted
    standard:
      inputPer1M: 0.56
      cachedInputPer1M: 0.28
      outputPer1M: 1.68

  fireworksGlm5: &pricingFireworksGlm5
    strategy: weighted
    standard:
      inputPer1M: 1.00
      cachedInputPer1M: 0.20
      outputPer1M: 3.20

  fireworksKimiK25: &pricingFireworksKimiK25
    strategy: weighted
    standard:
      inputPer1M: 0.60
      cachedInputPer1M: 0.10
      outputPer1M: 3.00

  fireworksFlat020: &pricingFireworksFlat020
    strategy: flat
    standard:
      effectivePer1M: 0.20

  fireworksFlat010: &pricingFireworksFlat010
    strategy: flat
    standard:
      effectivePer1M: 0.10

  fireworksFlat120: &pricingFireworksFlat120
    strategy: flat
    standard:
      effectivePer1M: 1.20

  fireworksMiniMaxM25: &pricingFireworksMiniMaxM25
    strategy: weighted
    standard:
      inputPer1M: 0.30
      cachedInputPer1M: 0.03
      outputPer1M: 1.20

  fireworksQwenVl30B: &pricingFireworksQwenVl30B
    strategy: weighted
    standard:
      inputPer1M: 0.15
      cachedInputPer1M: 0.075
      outputPer1M: 0.60

  openaiGpt54Mini: &pricingOpenaiGpt54Mini
    strategy: weighted
    standard:
      inputPer1M: 0.75
      cachedInputPer1M: 0.075
      outputPer1M: 4.50

  openaiGpt54Nano: &pricingOpenaiGpt54Nano
    strategy: weighted
    standard:
      inputPer1M: 0.20
      cachedInputPer1M: 0.02
      outputPer1M: 1.25

  openaiGpt53Codex: &pricingOpenaiGpt53Codex
    strategy: weighted
    standard:
      inputPer1M: 1.75
      cachedInputPer1M: 0.175
      outputPer1M: 14.00

  openaiEmbeddingLarge: &pricingOpenaiEmbeddingLarge
    strategy: flat
    standard:
      effectivePer1M: 0.13

  openaiEmbeddingSmall: &pricingOpenaiEmbeddingSmall
    strategy: flat
    standard:
      # 62,500 pages per USD at ~800 tokens/page => ~$0.02 / 1M input tokens.
      effectivePer1M: 0.02

  openaiGptImage15: &pricingOpenaiGptImage15
    strategy: weighted
    standard:
      # AI Gateway exposes aggregate input/output tokens for image models, not separate text/image
      # token counts. Use the published text-input rate plus image-output rate so generation-heavy
      # traffic is priced by directionality, with edits that include large image inputs remaining an
      # underestimate.
      inputPer1M: 5.00
      cachedInputPer1M: 1.25
      outputPer1M: 32.00

  gemini31Pro: &pricingGemini31Pro
    strategy: tieredWeighted
    thresholdTokens: 200000
    standard:
      inputPer1M: 2.00
      cachedInputPer1M: 0.20
      outputPer1M: 12.00
    longContext:
      inputPer1M: 4.00
      cachedInputPer1M: 0.40
      outputPer1M: 18.00

  gemini31FlashLite: &pricingGemini31FlashLite
    strategy: weighted
    standard:
      inputPer1M: 0.25
      cachedInputPer1M: 0.025
      outputPer1M: 1.50

  gemini3Flash: &pricingGemini3Flash
    strategy: weighted
    standard:
      inputPer1M: 0.50
      cachedInputPer1M: 0.05
      outputPer1M: 3.00

  gemini25FlashLite: &pricingGemini25FlashLite
    strategy: weighted
    standard:
      inputPer1M: 0.10
      cachedInputPer1M: 0.01
      outputPer1M: 0.40

  gemini25Pro: &pricingGemini25Pro
    strategy: tieredWeighted
    thresholdTokens: 200000
    standard:
      inputPer1M: 1.25
      cachedInputPer1M: 0.125
      outputPer1M: 10.00
    longContext:
      inputPer1M: 2.50
      cachedInputPer1M: 0.25
      outputPer1M: 15.00

  gemini25Flash: &pricingGemini25Flash
    strategy: weighted
    standard:
      inputPer1M: 0.30
      cachedInputPer1M: 0.03
      outputPer1M: 2.50

  gemini25FlashImage: &pricingGemini25FlashImage
    strategy: weighted
    standard:
      inputPer1M: 0.30
      outputPer1M: 30.00

