# ai-models orchestrator. The chart renders one ApplicationSet that
# generates child Applications for backends + each enabled model.
#
# Pre-split (chart v1.x), this same values.yaml drove a single Application
# rendering all the K8s resources directly. Post-split (v2.x), the data is
# unchanged in shape; the orchestrator template fans it out into N child
# Applications, one per model + one for backends. See ADR-0012.

# ────────────────────────────────────────────────────────────────────────
# ArgoCD wiring — where the generated child Applications live and which
# upstream branch they sync from.
# ────────────────────────────────────────────────────────────────────────
argocd:
  # Namespace the ApplicationSet (and the children it generates) live in.
  # `argocd` is the standard install; override if the operator lives elsewhere.
  namespace: argocd
  # ArgoCD project the children belong to.
  project: ai
  # Source repo + branch for the leaf charts (ai-models-backends, ai-model).
  # Deploys are tag-based: pinned to the immutable release tag below (main is
  # never a deploy target). See the canonical note in charts/apps/values.yaml.
  repoURL: https://github.com/ADORSYS-GIS/ai-helm
  targetRevision: release-2026.06.13
  destination:
    # The home-remote cluster every child Application targets. This repo's
    # invariant (ADR-0017) is that workloads NEVER deploy to the cluster
    # ArgoCD itself runs in. The destination helper hard-fails the render
    # if this resolves to `in-cluster` / `https://kubernetes.default.svc`
    # unless `allowInCluster: true` is set below.
    name: home-remote
    # Escape hatch — only set true if you genuinely want in-cluster.
    allowInCluster: false
    namespace: converse
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

# ────────────────────────────────────────────────────────────────────────
# Monthly estimated-spend guardrails. Each plan value is in real USD but
# the chart converts to micro-USD because `llm_custom_total_cost` is
# emitted by Envoy AI Gateway as an integer in micro-USD.
# ────────────────────────────────────────────────────────────────────────
# Rate-limit tiers (ADR-0021). Each plan drives up to three rule families per
# model in the BackendTrafficPolicy:
#   - burst.requestsPerMin  → per-USER req/min cap   (keyed on x-account-id)
#   - burst.tokensPerMin    → per-USER token/min cap (keyed on x-account-id,
#                             cost from the llm_total_token AIEG metadata)
#   - monthlyBudgetUsd      → per-ORG monthly micro-USD budget (keyed on
#                             x-org-id). OMITTED for a plan ⇒ uncapped budget.
# x-billing-plan (set by the AuthConfig from the Keycloak `billing_plan` claim,
# or "internal" on the internal plane) selects which plan's rules apply.
rateLimitBudgeting:
  plans:
    free:
      # Per-person monthly budget (ADR-0035: keyed on x-account-id, NOT a shared
      # x-org-id bucket — colleagues no longer contend for one pool). Raised
      # 30 → 50 to relax the free tier.
      monthlyBudgetUsd: 50
      burst:
        requestsPerMin: 200
        # Raised 200k → 1M (2026-06-12) to match the 1M context ceiling
        # (charts/ai-models-info) — a single max-context request no longer
        # blows the per-minute token bucket. The monthly budget ($50) stays the
        # real cost cap; this is just the per-minute RATE.
        tokensPerMin: 1000000
    pro:
      monthlyBudgetUsd: 200
      burst:
        requestsPerMin: 400
        tokensPerMin: 2000000     # 400k → 2M: a couple of max-context requests/min
    # Remote service accounts (GitHub runners, …) on the EXTERNAL plane.
    # Uncapped budget (no monthlyBudgetUsd) — burst-only.
    service:
      burst:
        requestsPerMin: 600
        tokensPerMin: 2000000
    # In-cluster services (LibreChat, cron-jobs, k8s SAs) on the INTERNAL plane.
    # Uncapped budget — burst-only.
    internal:
      burst:
        requestsPerMin: 600
        tokensPerMin: 2000000

gatewayRef:
  name: core-gateway
  namespace: converse-gateway
  # Pin model routes to the Gateway's HTTPS listener so they're HTTPS-only; the
  # :80 listener is reserved for the http→https redirect + the ACME solver.
  sectionName: api-https
  # Internal plane (ADR-0021): also attach each model route to the api-internal
  # listener so in-cluster callers reach the same backends. Keep in sync with
  # core-gateway gateway.internal.enabled (the listener must exist).
  internalSectionName: api-internal

# ────────────────────────────────────────────────────────────────────────
# Models-info endpoint (charts/ai-models-info). Adds a sync-wave 1
# child Application that serves an OpenRouter-shape catalog at
# api.ai.camer.digital/v1/models/info so opencode's
# @vymalo/opencode-models-info plugin can enrich its in-process model
# registry. See ADR-0015.
# ────────────────────────────────────────────────────────────────────────
modelsInfo:
  enabled: true
  # Kinds we omit from the catalog (chat-only catalog by default).
  excludeKinds:
    - embedding
    - reranker
  # Route/host/path live in `charts/ai-models-info`'s own defaults
  # (core-gateway api-https listener, api.ai.camer.digital, exact path
  # /v1/models/info). Override there via ai-gitops if a different env
  # needs different values.

backendDefaults:
  fireworks: &fireworksBackend
    schema: OpenAI
    prefix: "/inference/v1"
    fqdn:
      hostname: api.fireworks.ai
      port: 443
    securityType: APIKey
    tlsHostname: api.fireworks.ai
  deepinfra: &deepinfraBackend
    schema: OpenAI
    prefix: "/v1/openai"
    fqdn:
      hostname: api.deepinfra.com
      port: 443
    securityType: APIKey
    tlsHostname: api.deepinfra.com
  googleAiStudio: &googleAiStudioBackend
    schema: OpenAI
    prefix: v1beta/openai
    fqdn:
      hostname: generativelanguage.googleapis.com
      port: 443
    securityType: APIKey
    tlsHostname: generativelanguage.googleapis.com
  # Self-hosted model on the home GPU (ADR-0022). vLLM via KServe's
  # huggingfaceserver, exposed by Knative→Traefik→cert-manager at a public,
  # publicly-trusted FQDN — so it's reached exactly like a SaaS backend:
  # OpenAI schema, :443, System CA. The huggingfaceserver OpenAI routes sit
  # under /openai/v1. ⚠️ Confirm the hostname against the live InferenceService
  # `.status.url` after first deploy — KServe/Knative routing can shift it.
  vllmLocal: &vllmLocalBackend
    schema: OpenAI
    prefix: "/openai/v1"
    fqdn:
      # The model is cluster-local on the home cluster; this is the Traefik
      # edge-auth IngressRoute domain (charts/model-serving-qwen3-4b edgeAuth.host), which
      # validates the Bearer below before proxying to the cluster-local ksvc.
      # ⚠️ Must match charts/model-serving-qwen3-4b edgeAuth.host exactly.
      hostname: qwen3-4b--poc.ssegning.com
      port: 443
    securityType: APIKey
    tlsHostname: qwen3-4b--poc.ssegning.com

modelDefaults:
  backendRefs:
    fwPrimary: &fwBackendPrimary
      ref: fw-01
      priority: 0
    fwSecondary: &fwBackendSecondary
      ref: fw-02
      priority: 1
    deepinfraPrimary: &deepinfraBackendPrimary
      ref: deepinfra-01
      priority: 0
    deepinfraSecondary: &deepinfraBackendSecondary
      ref: deepinfra-02
      priority: 1
    googleAiStudioPrimary: &googleAiStudioBackendPrimary
      ref: google-ai-studio-01
      priority: 0
    googleAiStudioSecondary: &googleAiStudioBackendSecondary
      ref: google-ai-studio-02
      priority: 1
    vllmLocalPrimary: &vllmLocalBackendPrimary
      ref: vllm-local-01
      priority: 0

# ────────────────────────────────────────────────────────────────────────
# supported_parameters anchors — flow through to the models-info catalog
# (each model's `info.supportedParameters` → OpenRouter-shape
# `supported_parameters[]`). The OpenAI-compatible Fireworks/DeepInfra
# endpoints accept the standard sampling+tool set; agentic/thinking models
# additionally expose `reasoning`. Reranker/embedding models are excluded
# from the catalog (excludeKinds) so they carry no list.
#
# Verified 2026-06-02 against the backend model pages (DeepInfra / Fireworks).
supportedParams:
  # Agentic chat models with a thinking/reasoning mode (GLM-5/5.1, Kimi,
  # MiniMax, DeepSeek-V4, Qwen3.6-Plus).
  reasoning: &spReasoning
    - tools
    - tool_choice
    - temperature
    - top_p
    - top_k
    - max_tokens
    - stop
    - frequency_penalty
    - presence_penalty
    - seed
    - response_format
    - structured_outputs
    - reasoning
  # Chat models without an exposed reasoning channel (Gemma-4: tools +
  # vision but no thinking mode).
  standard: &spStandard
    - tools
    - tool_choice
    - temperature
    - top_p
    - top_k
    - max_tokens
    - stop
    - frequency_penalty
    - presence_penalty
    - seed
    - response_format

# Per-backend API-key ExternalSecrets — flows through to the
# `ai-models-backends` child (templates/externalsecret.yaml), which renders
# one chart-owned ExternalSecret per unique `secretRef.name` (deduped) from
# the store below. Replaces the out-of-band `aii-secret` provisioning.
#
# Each backend's `externalSecret.{key,property}` resolves against the
# consolidated ssegning-aws secret `ai/camer/digital/prod/env`, one property
# per provider key. The old out-of-band provisioner (`aii-secret` / the
# `secrets` Application) has been retired now these are chart-owned.
externalSecrets:
  enabled: true
  secretStore: ssegning-aws
  refreshInterval: 1h
  apiKeyDataKey: apiKey

# Backends — flow into the `ai-models-backends` child as its `backends:`
# values, and into each `ai-model` child as `backendsInventory:` for
# resourceName lookup.
backends:
  fw-01:
    <<: *fireworksBackend
    secretRef:
      name: fireworks-api-key-01
    resourceName: fw-backend-01-svc
    externalSecret:
      key: ai/camer/digital/prod/env
      property: fireworks_api_key_01
  fw-02:
    <<: *fireworksBackend
    resourceName: fw-backend-02-svc
    secretRef:
      name: fireworks-api-key-02
    externalSecret:
      key: ai/camer/digital/prod/env
      property: fireworks_api_key_02
  deepinfra-01:
    <<: *deepinfraBackend
    resourceName: deepinfra-backend-01-svc
    secretRef:
      name: deepinfra-api-key-01
    externalSecret:
      key: ai/camer/digital/prod/env
      property: deepinfra_api_key_01
  deepinfra-02:
    <<: *deepinfraBackend
    resourceName: deepinfra-backend-02-svc
    # Independent key from deepinfra-01 (own Secret name → own ExternalSecret;
    # the chart dedupes by secret name, so a distinct name is required for the
    # second key to render). Mirrors the fw/google primary/secondary pattern.
    secretRef:
      name: deepinfra-api-key-02
    externalSecret:
      key: ai/camer/digital/prod/env
      property: deepinfra_api_key_02
  google-ai-studio-01:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-01-svc
    secretRef:
      name: google-ai-studio-api-key-01
    externalSecret:
      key: ai/camer/digital/prod/env
      property: google_ai_studio_api_key_01
  google-ai-studio-02:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-02-svc
    secretRef:
      name: google-ai-studio-api-key-02
    externalSecret:
      key: ai/camer/digital/prod/env
      property: google_ai_studio_api_key_02

  # Self-hosted Qwen3-4B on the home GPU (ADR-0022). Same API key value as the
  # model pod's VLLM_API_KEY (both pull ssegning-aws → vllm_local_api_key); this
  # Secret lives on Hetzner/ns converse for the BackendSecurityPolicy, the other
  # on the home cluster/ns converse-poc for the pod — different clusters, no
  # collision. The ai-models-backends ExternalSecret writes it under the default
  # `apiKey` data key (what the BSP expects).
  vllm-local-01:
    <<: *vllmLocalBackend
    resourceName: vllm-local-01-svc
    secretRef:
      name: vllm-local-api-key
    externalSecret:
      key: ai/camer/digital/prod/env
      property: vllm_local_api_key

  # Self-hosted Qwen3.5-4B (Q4_K_M GGUF) via llama.cpp llama-server. Like
  # vllm-local-01 but `prefix: /v1` (llama-server, NOT KServe's /openai/v1) and a
  # distinct edge host. STAGED — only referenced by the (disabled) qwen3-5-4b-local
  # model, so these CRs render but route nothing until cutover. ⚠️ host MUST match
  # charts/model-serving-qwen3-5 ingress host. Engine: ADR-0032; paper:
  # docs/models/qwen3.5-4b-q4.md. Reuses the vllm_local_api_key SM property for now.
  llama-local-01:
    schema: OpenAI
    prefix: "/v1"
    fqdn:
      hostname: qwen3-5-4b--poc.ssegning.com
      port: 443
    securityType: APIKey
    tlsHostname: qwen3-5-4b--poc.ssegning.com
    resourceName: llama-local-01-svc
    secretRef:
      name: llama-local-api-key
    externalSecret:
      key: ai/camer/digital/prod/env
      property: vllm_local_api_key

# Models — each entry becomes one child Application using the `ai-model`
# leaf chart. Setting `enabled: false` on a model skips its Application
# (the AppSet controller will delete a previously-generated child).
#
# Pricing strategies driving the `llm_custom_total_cost` CEL:
#   weighted        — input / cached-input / output prices differ
#   tieredWeighted  — same as weighted, but use `longContext` prices when
#                     prompt size exceeds `thresholdTokens`
#   flat            — one blended price for total tokens

models:

  # Self-hosted Qwen3-4B on the home RTX A2000 (ADR-0022). Routed exactly like a
  # SaaS model; pricing flat $0 (owned hardware) so no monthly-budget rule, but
  # the per-plan burst req/min + tokens/min limits still apply. The backend
  # serves under the name set by the runtime's --model_name (qwen3-4b), so
  # modelNameOverride rewrites the route id → that. ⚠️ Confirm `qwen3-4b` matches
  # the served-model-name on the first test call; adjust if huggingfaceserver
  # advertises the HF path instead.
  #
  # ── Model card (Qwen/Qwen3-4B · Apache-2.0) ────────────────────────────────
  #   Causal LM, 4.0B params (3.6B non-embedding), 36 layers, GQA 32 Q / 8 KV.
  #   Native context 32,768 (→131,072 with YaRN); we CLAMP to 16,384 to fit KV
  #   in the 12GB A2000. Hybrid thinking / non-thinking mode (→ *spReasoning),
  #   tool calling, 100+ languages. Recommended sampling (think mode): temp 0.6 /
  #   top_p 0.95 / top_k 20 / min_p 0 — "do NOT use greedy decoding". Non-think:
  #   temp 0.7 / top_p 0.8 / top_k 20. Full card + cost model in
  #   docs/self-hosted-model-serving.md §12-§13.
  #   ⚠️ Window = 16384 tokens HARD (prompt+completion); a >16k prompt 400s. This
  #   is the small/owned tier — ROUTE big-context or long-output (Qwen recommends
  #   up to 32k–38k output for hard coding/math; thinking mode also eats output
  #   tokens) work to the SaaS models. 16k/8k kept on purpose (12GB VRAM); upgrade
  #   path = AWQ-INT4 → ~32k. YaRN/130k not viable on one A2000. See doc §12.1.
  #
  # ── Cost (ADR-0028: cost-recovery pricing for owned-hardware models) ────────
  #   NOT $0. Real operating cost ≈ €0.05/hour while serving (≈ €0.018/h amortized
  #   A2000-$449-launch + 3/28-vCPU CPU-share + 6GB RAM-share over 3yr + ≈€0.032/h
  #   power @ €0.34/kWh in Erlangen — full derivation in the self-hosted-model
  #   doc §13). Capex accrues even when idle, and PoC utilization is low/bursty,
  #   so we price for **cost recovery at realistic utilization**, not the
  #   best-case saturated marginal cost. Weighted so LMCache prefix-cache hits
  #   bill at the near-free cached rate. Every number is a documented knob
  #   (ADR-0028 §Pricing); re-tune as utilization data arrives.
  qwen3-4b-local:
    enabled: false                  # DISABLED at cutover 2026-06-08 — swapped by qwen3-5-4b-local (one GPU → one model). Re-enable to roll back.
    kind: text
    # Single self-hosted backend by design (one GPU, one model). The default
    # 2-backend HA guard doesn't apply; a cloud fallback at priority 1 is the
    # documented optional upgrade (ADR-0022), not a requirement.
    minBackends: 1
    # The model is always-on (ADR-0029: plain Deployment, replicas:1), so warm
    # requests are fast. The slow case is a DEPLOY: `Recreate` restarts the single
    # pod, which reloads multi-GB weights (~30-60s, no model pod meanwhile), so a
    # request landing then can take tens of seconds. Without an explicit timeout
    # the route uses Envoy's ~15s default → 504 "upstream request timeout". 600s
    # rides a restart AND a long generation (8k tokens @ ~30-50 tok/s). Keep in
    # sync with charts/model-serving-qwen3-4b edgeAuth.proxy.responseTimeout (Caddy hop)
    # — both must exceed it. Path: Envoy(Hetzner) → Caddy → model.
    timeout:
      requestTimeout: 600s
      connectionIdleTimeout: 1h
    info:
      displayName: "Qwen3-4B (self-hosted)"
      contextLength: 16384          # = --max-model-len (native 32k, clamped for 12GB VRAM)
      maxOutputTokens: 8192
      supportedParameters: *spReasoning   # Qwen3 has a thinking mode
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.15            # prefill share of GPU-time (cost-recovery, ADR-0028)
        cachedInputPer1M: 0.03      # LMCache prefix-reuse hit ≈ near-free
        outputPer1M: 1.00           # decode is the throughput bottleneck → the cost driver
    backends:
      vllm-local-01:
        <<: *vllmLocalBackendPrimary
        modelNameOverride: "qwen3-4b"

  # Self-hosted Qwen3.5-4B (Q4_K_M GGUF) via llama.cpp — the upgrade candidate for
  # the home GPU (one GPU → one model, so it SWAPS qwen3-4b-local at cutover).
  # STAGED: enabled:false until a recent server-cuda build is proven to load the
  # GGUF on the A2000 (docs/models/qwen3.5-4b-q4.md §5). CUTOVER = set this
  # enabled:true + qwen3-4b-local enabled:false + the model-serving apps likewise,
  # then cut a release + repoint root. Engine/decisions: ADR-0032.
  #
  # Model card (Qwen/Qwen3.5-4B · Apache-2.0): Gated DeltaNet + sparse-MoE hybrid,
  # natively multimodal (served TEXT-ONLY here — no image input), 262k native ctx.
  # 3-of-4 blocks are linear-attention → KV barely grows → 64k ctx is cheap on the
  # 12GB A2000 (vs the 16k wall on qwen3-4b). Served by llama-server (prefix /v1),
  # served-model-name = --alias `qwen3-5-4b`.
  qwen3-5-4b-local:
    enabled: true                    # CUTOVER 2026-06-08: arch load-gate PASSED (llama.cpp loads the Qwen3.5 GGUF) — live
    kind: text
    minBackends: 1                   # single self-hosted backend by design (one GPU)
    timeout:
      requestTimeout: 600s           # rides a deploy restart + a long generation
      connectionIdleTimeout: 1h
    info:
      displayName: "Qwen3.5-4B (self-hosted)"
      contextLength: 131072          # 128k = llama-server --ctx-size (GDN linear-attn → KV cheap; ~8.5GB of 12GB)
      maxOutputTokens: 16384
      supportedParameters: *spReasoning   # Qwen3.5 has a thinking mode
    pricing:
      strategy: weighted             # same cost-recovery basis as qwen3-4b-local (ADR-0028)
      standard:
        inputPer1M: 0.15             # re-check per-token at cutover (lighter Q4_K_M)
        cachedInputPer1M: 0.03
        outputPer1M: 1.00
    backends:
      llama-local-01:
        ref: llama-local-01
        priority: 0
        modelNameOverride: "qwen3-5-4b"   # = llama-server --alias

  deepseek-v4-flash:
    kind: text
    # DeepInfra · deepseek-ai/DeepSeek-V4-Flash — 1,048,576-token context
    # (clamped to the 400k catalog ceiling), 384k max output (capped to a
    # sane 131k generation ceiling). Dual Think/Non-Think modes → reasoning.
    info:
      contextLength: 1048576
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.14
        cachedInputPer1M: 0.028
        outputPer1M: 0.28
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "deepseek-ai/DeepSeek-V4-Flash"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "deepseek-ai/DeepSeek-V4-Flash"

  reviewer:
    kind: text
    # DeepInfra · zai-org/GLM-5 — 202,752-token context, 131k max output,
    # agentic thinking mode + function calling + vision.
    info:
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.60
        cachedInputPer1M: 0.12
        outputPer1M: 2.08
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "zai-org/GLM-5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "zai-org/GLM-5"

  glm-5:
    kind: text
    # DeepInfra · zai-org/GLM-5 — 202,752-token context, 131k max output.
    info:
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.60
        cachedInputPer1M: 0.12
        outputPer1M: 2.08
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "zai-org/GLM-5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "zai-org/GLM-5"
    rateLimitBudgeting:
      free: 10
      pro: 50

  adorsys-planner:
    kind: text
    # DeepInfra · zai-org/GLM-5 — 202,752-token context, 131k max output.
    info:
      displayName: "Adorsys Planner (GLM-5)"
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.60
        cachedInputPer1M: 0.12
        outputPer1M: 2.08
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "zai-org/GLM-5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "zai-org/GLM-5"
    rateLimitBudgeting:                 # unified $15/$50 across all adorsys-* brands
      free: 15
      pro: 50

  adorsys-planner-pro:
    kind: text
    # DeepInfra · zai-org/GLM-5.1 — 202,752-token context, 131k max output,
    # long-horizon agentic engineering (thinking + function calling + MCP).
    info:
      displayName: "Adorsys Planner Pro (GLM-5.1)"
      contextLength: 202752
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 1.05
        cachedInputPer1M: 0.205
        outputPer1M: 3.50
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "zai-org/GLM-5.1"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "zai-org/GLM-5.1"
    rateLimitBudgeting:                 # unified $15/$50 across all adorsys-* brands
      free: 15
      pro: 50

  kimi-k2.5:
    kind: text
    # DeepInfra · moonshotai/Kimi-K2.5 — 262,144-token context, 131k max
    # output, agentic tool use + thinking.
    info:
      contextLength: 262144
      maxOutputTokens: 131072
      supportedParameters: *spReasoning
    pricing:
      strategy: weighted
      standard:
        inputPer1M: 0.45
        cachedInputPer1M: 0.07
        outputPer1M: 2.25
    backends:
      deepinfra-01:
        <<: *deepinfraBackendPrimary
        modelNameOverride: "moonshotai/Kimi-K2.5"
      deepinfra-02:
        <<: *deepinfraBackendSecondary
        modelNameOverride: "moonshotai/Kimi-K2.5"

  kimi-k2.6:
    kind: multimodal
