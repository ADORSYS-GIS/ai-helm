rateLimitBudgeting:
  defaultPlan: free

  plans:
    free:
      monthlyBudgetUsd: 30
      safetyFactor: 0.85
      burstMultiplier: 3
      defaultAvgTokensPerRequest: 1500
    pro:
      monthlyBudgetUsd: 200
      safetyFactor: 0.90
      burstMultiplier: 5
      defaultAvgTokensPerRequest: 2000

  pricingProfiles:
    # --- Fireworks.ai ---
    # from https://fireworks.ai/pricing

    # Text/Chat
    kimi-k2-instruct-0905:
      kind: text
      mode: weighted
      inputPer1M: 0.70
      outputPer1M: 0.70
      avgInputShare: 0.75
      avgOutputShare: 0.25
      avgTokensPerRequest: 2000

    kimi-k2-thinking:
      kind: text
      mode: weighted
      inputPer1M: 1.00 # placeholder
      outputPer1M: 1.00 # placeholder
      avgInputShare: 0.50
      avgOutputShare: 0.50
      avgTokensPerRequest: 3000

    deepseek-v3:
      kind: text
      mode: weighted
      inputPer1M: 0.27
      outputPer1M: 1.10
      avgInputShare: 0.70
      avgOutputShare: 0.30
      avgTokensPerRequest: 2000

    glm-5:
      kind: text
      mode: weighted
      inputPer1M: 1.00 # placeholder
      outputPer1M: 1.00 # placeholder
      avgInputShare: 0.70
      avgOutputShare: 0.30
      avgTokensPerRequest: 2000

    cogito:
      kind: text
      mode: weighted
      inputPer1M: 1.00 # placeholder
      outputPer1M: 1.00 # placeholder
      avgInputShare: 0.70
      avgOutputShare: 0.30
      avgTokensPerRequest: 2000

    qwen-reranker:
      kind: reranker
      mode: fixed
      effectivePer1M: 1.00 # placeholder
      avgTokensPerRequest: 1000

    qwen-embedding:
      kind: embedding
      mode: fixed
      effectivePer1M: 0.10 # placeholder
      avgTokensPerRequest: 500

    minimax:
      kind: text
      mode: weighted
      inputPer1M: 1.00 # placeholder
      outputPer1M: 1.00 # placeholder
      avgInputShare: 0.70
      avgOutputShare: 0.30
      avgTokensPerRequest: 2000

    qwen-vl-instruct:
      kind: multimodal
      mode: weighted
      inputPer1M: 1.00 # placeholder
      outputPer1M: 1.00 # placeholder
      avgInputShare: 0.70
      avgOutputShare: 0.30
      avgTokensPerRequest: 2000

    qwen-vl-thinking:
      kind: multimodal
      mode: weighted
      inputPer1M: 1.00 # placeholder
      outputPer1M: 1.00 # placeholder
      avgInputShare: 0.50
      avgOutputShare: 0.50
      avgTokensPerRequest: 3000

    # --- OpenAI ---
    # from https://openai.com/pricing

    # Text/Chat
    gpt-5-mini:
      kind: text
      mode: weighted
      inputPer1M: 2.50
      outputPer1M: 10.00
      avgInputShare: 0.70
      avgOutputShare: 0.30
      avgTokensPerRequest: 1800

    gpt-5.1-codex-mini:
      kind: text
      mode: weighted
      inputPer1M: 2.50 # placeholder
      outputPer1M: 10.00 # placeholder
      avgInputShare: 0.70
      avgOutputShare: 0.30
      avgTokensPerRequest: 1800

    gpt-5-nano:
      kind: text
      mode: weighted
      inputPer1M: 1.00 # placeholder
      outputPer1M: 5.00 # placeholder
      avgInputShare: 0.70
      avgOutputShare: 0.30
      avgTokensPerRequest: 1500

    # Embedding
    text-embedding-large:
      kind: embedding
      mode: fixed
      effectivePer1M: 0.13
      avgTokensPerRequest: 500

    gpt-image:
      kind: image
      mode: fixed
      effectivePer1M: 30.00 # placeholder
      avgTokensPerRequest: 1

    # --- Google AI Studio ---
    # from https://ai.google.dev/pricing

    gemini-flash-lite:
      kind: text
      mode: weighted
      inputPer1M: 0.25
      outputPer1M: 1.50
      avgInputShare: 0.80
      avgOutputShare: 0.20
      avgTokensPerRequest: 1500

    gemini-pro:
      kind: text
      mode: weighted
      inputPer1M: 1.25 # placeholder
      outputPer1M: 5.00 # placeholder
      avgInputShare: 0.80
      avgOutputShare: 0.20
      avgTokensPerRequest: 2000

    gemini-flash:
      kind: text
      mode: weighted
      inputPer1M: 0.50 # placeholder
      outputPer1M: 2.00 # placeholder
      avgInputShare: 0.80
      avgOutputShare: 0.20
      avgTokensPerRequest: 1500

    gemini-flash-image:
      kind: image
      mode: fixed
      effectivePer1M: 15.00 # placeholder
      avgTokensPerRequest: 1

gatewayRef:
  name: core-gateway
  namespace: converse-gateway

backendDefaults:
  fireworks: &fireworksBackend
    schema: OpenAI
    prefix: "/inference/v1"
    fqdn:
      hostname: api.fireworks.ai
      port: 443
    securityType: APIKey
    tlsHostname: api.fireworks.ai
  openai: &openaiBackend
    schema: OpenAI
    fqdn:
      hostname: api.openai.com
      port: 443
    securityType: APIKey
    tlsHostname: api.openai.com
  vertexAi: &vertexAiBackend
    schema: GCPVertexAI
    fqdn:
      hostname: us-central1-aiplatform.googleapis.com
      port: 443
    type: GCPCredentials
    gcpCredentials: &vertexAiCredentials
      projectName: kivoyo
      region: us-central1
    tlsHostname: us-central1-aiplatform.googleapis.com
  googleAiStudio: &googleAiStudioBackend
    schema: OpenAI
    prefix: v1beta/openai
    fqdn:
      hostname: generativelanguage.googleapis.com
      port: 443
    securityType: APIKey
    tlsHostname: generativelanguage.googleapis.com

modelDefaults:
  backendRefs:
    fwPrimary: &fwBackendPrimary
      ref: fw-01
      priority: 0
    fwSecondary: &fwBackendSecondary
      ref: fw-02
      priority: 1
    openaiPrimary: &openaiBackendPrimary
      ref: openai-01
      priority: 0
    openaiSecondary: &openaiBackendSecondary
      ref: openai-02
      priority: 1
    vertexPrimary: &vertexBackendPrimary
      ref: vertex-ai-01
      priority: 0
    vertexSecondary: &vertexBackendSecondary
      ref: vertex-ai-02
      priority: 1
    googleAiStudioPrimary: &googleAiStudioBackendPrimary
      ref: google-ai-studio-01
      priority: 0
    googleAiStudioSecondary: &googleAiStudioBackendSecondary
      ref: google-ai-studio-02
      priority: 1

backends:
  fw-01:
    <<: *fireworksBackend
    secretRef:
      name: fireworks-api-key-01
    resourceName: fw-backend-01-svc
    #enabled: false
  fw-02:
    <<: *fireworksBackend
    resourceName: fw-backend-02-svc
    secretRef:
      name: fireworks-api-key-02
    #enabled: false
  openai-01:
    <<: *openaiBackend
    resourceName: openai-backend-01-svc
    secretRef:
      name: openai-api-key-01
  openai-02:
    <<: *openaiBackend
    resourceName: openai-backend-02-svc
    secretRef:
      name: openai-api-key-02
  vertex-ai-01:
    <<: *vertexAiBackend
    resourceName: vertex-ai-backend-01-svc
    gcpCredentials:
      <<: *vertexAiCredentials
      credentialsFile:
        secretRef:
          name: gcp-service-account-key-01
  vertex-ai-02:
    <<: *vertexAiBackend
    resourceName: vertex-ai-backend-02-svc
    gcpCredentials:
      <<: *vertexAiCredentials
      credentialsFile:
        secretRef:
          name: gcp-service-account-key-02
  google-ai-studio-01:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-01-svc
    secretRef:
      name: google-ai-studio-api-key-01
  google-ai-studio-02:
    <<: *googleAiStudioBackend
    resourceName: google-ai-studio-backend-02-svc
    secretRef:
      name: google-ai-studio-api-key-02

