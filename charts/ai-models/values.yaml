    # 32–4096 output dims), so `kind: embedding` → excluded from the chat
    # catalog via excludeKinds. No chat supported_parameters apply.
    kind: embedding
    info:
      contextLength: 32768
    pricing:
      strategy: flat
      standard:
        effectivePer1M: 0.10
    backends:
