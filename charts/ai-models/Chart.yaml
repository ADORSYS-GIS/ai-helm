apiVersion: v2
name: ai-models
description: |
  Orchestrator chart for the AI models stack. Renders ONE ArgoCD
  ApplicationSet that fans out to:

    1. ai-models-backends — shared backend infrastructure (sync-wave -1)
    2. ai-model           — one Application per enabled model (sync-wave 0)

  See ADR-0012 for the split rationale and charts/ai-model + charts/ai-models-backends
  for the leaf charts. The chart owns NO resources directly; it owns the
  ApplicationSet that owns everything.
type: application
version: 2.0.0
appVersion: "1.0.0"
keywords:
  - ai-gateway
  - envoy-ai-gateway
  - applicationset
maintainers:
  - name: ai-helm

dependencies:
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
