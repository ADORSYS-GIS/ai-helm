{{/*
QuotaPolicy — replaces BackendTrafficPolicy-based rate limiting.

WHY QuotaPolicy instead of BackendTrafficPolicy:
  BackendTrafficPolicy reads cost from `llm_custom_total_cost` metadata,
  computed by a global CEL in the extproc filter config generated by merging
  llmRequestCosts from all AIGatewayRoute resources. Go map iteration is
  non-deterministic, so the winning CEL is random — all models get priced
  by one random model's formula. Wrong rate limits, wrong billing.

  QuotaPolicy attaches to AIServiceBackend directly. Each backend's policy
  has perModelQuotas with its own costExpression evaluated natively per
  model per backend. No global deduplication, no extproc CEL involved.

DURATION: "720h" ≈ 30 days (sliding window, not calendar month).
*/}}

{{- $backendModels := dict -}}
{{- range $routeName, $routeConfig := $.Values.models -}}
  {{- if (default true $routeConfig.enabled) -}}
    {{- range $bKey, $bVal := $routeConfig.backends -}}
      {{- if (default true $bVal.enabled) -}}
        {{- $backendBase := index $.Values.backends $bVal.ref -}}
        {{- $resourceName := $backendBase.resourceName -}}
        {{- $existing := default list (index $backendModels $resourceName) -}}
        {{- $entry := dict "modelName" $routeName "routeConfig" $routeConfig -}}
        {{- $_ := set $backendModels $resourceName (append $existing $entry) -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- range $backendName, $modelEntries := $backendModels }}
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: QuotaPolicy
metadata:
  name: {{ $backendName }}
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: {{ $backendName }}
  perModelQuotas:
    {{- range $entry := $modelEntries }}
    {{- $routeName := $entry.modelName }}
    {{- $routeConfig := $entry.routeConfig }}
    - modelName: {{ $routeName | quote }}
      quota:
        costExpression: {{ include "ai-models.quotaCostExpression" (dict "routeName" $routeName "routeConfig" $routeConfig) | quote }}
        mode: Exclusive
        defaultBucket:
          limit: 1000000000
          duration: 720h
        bucketRules:
          {{- $modelBudgets := default dict $routeConfig.rateLimitBudgeting -}}
          {{- if $modelBudgets }}
          {{- $freeBudget := index $modelBudgets "free" | default (index $.Values.rateLimitBudgeting.plans "free" "monthlyBudgetUsd" | default 30) }}
          {{- $proBudget := index $modelBudgets "pro" | default (index $.Values.rateLimitBudgeting.plans "pro" "monthlyBudgetUsd" | default 200) }}
          - clientSelectors:
              - headers:
                  - name: x-account-id
                    type: Distinct
                  - name: x-billing-plan
                    type: Exact
                    value: free
            quota:
              limit: {{ mul $freeBudget 1000000 | int64 }}
              duration: 720h
          - clientSelectors:
              - headers:
                  - name: x-account-id
                    type: Distinct
                  - name: x-billing-plan
                    type: Exact
                    value: pro
            quota:
              limit: {{ mul $proBudget 1000000 | int64 }}
              duration: 720h
          {{- else }}
          {{- range $planName, $planConfig := $.Values.rateLimitBudgeting.plans }}
          - clientSelectors:
              - headers:
                  - name: x-account-id
                    type: Distinct
                  - name: x-billing-plan
                    type: Exact
                    value: {{ $planName | quote }}
            quota:
              limit: {{ mul $planConfig.monthlyBudgetUsd 1000000 | int64 }}
              duration: 720h
          {{- end }}
          {{- end }}
    {{- end }}
{{- end }}