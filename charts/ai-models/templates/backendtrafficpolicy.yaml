{{/*
BackendTrafficPolicy — per-model, per-plan rate limiting via Global Rate Limit.

Each model gets its own CEL-based cost metadata key in its AIGatewayRoute
(e.g. cost_gpt_5_mini), so the AI Gateway controller never deduplicates them.
The rate limit rule references that unique key via response cost metadata.

Budget values in values.yaml are in USD; limits here are in micro-USD
(USD * 1e6) to match the integer cost emitted by the CEL expressions.
*/}}
{{- range $routeName, $routeConfig := $.Values.models }}
{{- if (default true $routeConfig.enabled) }}
{{- $modelBudgets := default dict $routeConfig.rateLimitBudgeting }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $routeName }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $routeName }}
  rateLimit:
    type: Global
    global:
      rules:
        {{- if $modelBudgets }}
        {{- $freeBudget := index $modelBudgets "free" | default (index $.Values.rateLimitBudgeting.plans "free" "monthlyBudgetUsd" | default 30) }}
        {{- $proBudget := index $modelBudgets "pro" | default (index $.Values.rateLimitBudgeting.plans "pro" "monthlyBudgetUsd" | default 200) }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: "free"
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeName | quote }}
          limit:
            requests: {{ mulf $freeBudget 1000000 | int64 }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-models.metadataKeySafe" $routeName }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: "pro"
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeName | quote }}
          limit:
            requests: {{ mulf $proBudget 1000000 | int64 }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-models.metadataKeySafe" $routeName }}
        {{- else }}
        {{- range $planName, $planConfig := $.Values.rateLimitBudgeting.plans }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeName | quote }}
          limit:
            requests: {{ mulf $planConfig.monthlyBudgetUsd 1000000 | int64 }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-models.metadataKeySafe" $routeName }}
        {{- end }}
        {{- end }}
{{- end }}
{{- end }}