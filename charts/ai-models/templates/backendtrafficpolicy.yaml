{{- if (default true (dig "enabled" nil (default dict $.Values.backendTrafficPolicy))) }}

{{- range $routeName, $routeConfig := $.Values.models }}
{{- if (default true $routeConfig.enabled) }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $.Values.backendTrafficPolicy.name }}-{{ $routeName }}
  {{- with $.Values.backendTrafficPolicy.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $.Values.backendTrafficPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gatewayRef.name }}
  retry:
    {{- toYaml $.Values.backendTrafficPolicy.retry | nindent 4 }}
  {{- if (default true (dig "enabled" nil (default dict $.Values.envoyRateLimit))) }}
  rateLimit:
    type: Global
    global:
      rules:
        # Rate limit rule for {{ $routeName }}
        - clientSelectors:
            - headers:
                - name: x-user-id
                  type: Distinct
                  invert: false
                - name: x-ai-eg-model
                  type: Exact
                  invert: false
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: {{ $routeConfig.envoyRateLimit.requests }}
            unit: {{ $routeConfig.envoyRateLimit.unit }}

        - clientSelectors:
            - headers:
                - name: x-api-key-id
                  type: Distinct
                  invert: false
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: 15
            unit: Minute

        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                  invert: false
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: 200000
            unit: Day
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token

        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: 300000
            unit: Day
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token

        {{- with $routeConfig.envoyTokenRateLimits }}
        {{- range . }}
        - clientSelectors:
            - headers:
                - name: x-project-id
                  type: Distinct
                  invert: false
                - name: x-ai-eg-model
                  type: Exact
                  invert: false
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: {{ .tokens }}
            unit: {{ .unit }}
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token
        {{- end }}
        {{- end }}

        {{- end }}
        {{- end }}
  {{- end }}
{{- end }}
