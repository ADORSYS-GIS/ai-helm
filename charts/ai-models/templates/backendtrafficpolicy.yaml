{{- range $routeName, $routeConfig := $.Values.models }}
{{- if (default true $routeConfig.enabled) }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $routeName }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $routeName }}
  rateLimit:
    type: Global
    global:
      rules:
        # Rate limit rule for {{ $routeName }}
        {{- $limits := include "ai-models.budgeting.derivedLimits" (dict "ctx" $ "model" $routeConfig "modelName" $routeName) | fromYaml }}
        - clientSelectors:
            - headers:
                - name: x-project-id
                  type: Distinct
                  invert: false
                - name: x-ai-eg-model
                  type: Exact
                  invert: false
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: {{ $limits.dailyTokens | int64 }}
            unit: Day
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token

        - clientSelectors:
            - headers:
                - name: x-project-id
                  type: Distinct
                  invert: false
                - name: x-ai-eg-model
                  type: Exact
                  invert: false
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: {{ $limits.monthlyTokens | int64 }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token

        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                  invert: false
                - name: x-ai-eg-model
                  type: Exact
                  invert: false
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: {{ $limits.monthlyTokens | int64 }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: llm_total_token

        - clientSelectors:
            - headers:
                - name: x-api-key-id
                  type: Distinct
                  invert: false
                - name: x-ai-eg-model
                  type: Exact
                  invert: false
                  value: {{ $routeConfig.modelMatch | default $routeName }}
          limit:
            requests: {{ $limits.rpmEstimate | default 30 | int64 }}
            unit: Minute
{{- end }}
{{- end }}
