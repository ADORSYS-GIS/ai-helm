{{/*
BackendTrafficPolicy — per-model, per-plan rate limiting via Global Rate Limit.

Each model gets its own rate limit based on its pricing strategy:
- Weighted/Tiered models: limit in micro-USD (Budget * 1e6)
- Flat models: limit in USD (budget used directly)

Budget values in values.yaml are in USD.
*/}}
{{- range $routeName, $routeConfig := $.Values.models }}
{{- if not (eq $routeConfig.enabled false) }}
{{- $modelBudgets := default dict $routeConfig.rateLimitBudgeting }}
{{- $strategy := $routeConfig.pricing.strategy }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $routeName }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $routeName }}
  rateLimit:
    type: Global
    global:
      rules:
        {{- if $modelBudgets }}
        {{- $freeBudget := index $modelBudgets "free" | default (index $.Values.rateLimitBudgeting.plans "free" "monthlyBudgetUsd" | default 30) }}
        {{- $proBudget := index $modelBudgets "pro" | default (index $.Values.rateLimitBudgeting.plans "pro" "monthlyBudgetUsd" | default 200) }}

        {{- $freeLimit := 0 }}{{ $proLimit := 0 }}
        {{- $freeLimit = mulf $freeBudget 1000000 | int64 }}
        {{- $proLimit = mulf $proBudget 1000000 | int64 }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: "free"
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeName | quote }}
          limit:
            requests: {{ $freeLimit }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-models.metadataKeySafe" $routeName }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: "pro"
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeName | quote }}
          limit:
            requests: {{ $proLimit }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-models.metadataKeySafe" $routeName }}
        {{- else }}
        {{- range $planName, $planConfig := $.Values.rateLimitBudgeting.plans }}
        {{- $budget := $planConfig.monthlyBudgetUsd | default 30 }}
        {{- $planLimit := mulf $budget 1000000 | int64 }}
        - clientSelectors:
            - headers:
                - name: x-account-id
                  type: Distinct
                - name: x-billing-plan
                  type: Exact
                  value: {{ $planName | quote }}
                - name: x-ai-eg-model
                  type: Exact
                  value: {{ $routeName | quote }}
          limit:
            requests: {{ $planLimit }}
            unit: Month
          cost:
            request:
              from: Number
              number: 0
            response:
              from: Metadata
              metadata:
                namespace: io.envoy.ai_gateway
                key: {{ include "ai-models.metadataKeySafe" $routeName }}
        {{- end }}
        {{- end }}
{{- end }}
{{- end }}