{{- range $routeName, $routeConfig := .Values.models }}
{{- if (default true $routeConfig.enabled) }}
{{/* Filter and Validate Backends */}}
{{- $activeBackends := dict -}}
{{- range $bKey, $bVal := $routeConfig.backends }}
  {{- if (default true $bVal.enabled) }}
    {{- $_ := set $activeBackends $bKey $bVal -}}
  {{- end }}
{{- end }}

{{- if lt (len $activeBackends) 2 }}
  {{- fail (printf "Route '%s' must have at least 2 enabled backends. Found: %d" $routeName (len $activeBackends)) }}
{{- end }}

---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: {{ $routeName }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gatewayRef.name }}
      namespace: {{ $.Values.gatewayRef.namespace }}
  llmRequestCosts:
    - metadataKey: llm_input_token
      type: InputToken
    - metadataKey: llm_cached_input_token
      type: CachedInputToken
    - metadataKey: llm_output_token
      type: OutputToken
    - metadataKey: llm_total_token
      type: TotalToken
    {{ if or (eq $routeConfig.kind "text") (eq $routeConfig.kind "multimodal") }}
    {{- $inputPer1MScaled := int (round (mulf $routeConfig.inputPer1M 1000) 0) }}
    {{- $cachedInputPer1MScaled := int (round (mulf $routeConfig.cachedInputPer1M 1000) 0) }}
    {{- $outputPer1MScaled := int (round (mulf $routeConfig.outputPer1M 1000) 0) }}
    - metadataKey: llm_custom_total_cost
      type: CEL
      cel: "((max((int(input_tokens) - int(cached_input_tokens)), 0) * {{ $inputPer1MScaled }}) + (int(cached_input_tokens) * {{ $cachedInputPer1MScaled }}) + (int(output_tokens) * {{ $outputPer1MScaled }})) / 1000"
    {{ end }}
    {{ if or (eq $routeConfig.kind "image") (eq $routeConfig.kind "embedding") (eq $routeConfig.kind "reranker") }}
    {{- $effectivePer1MScaled := int (round (mulf $routeConfig.effectivePer1M 1000) 0) }}
    - metadataKey: llm_custom_total_cost
      type: CEL
      cel: "(int(total_tokens) * {{ $effectivePer1MScaled }}) / 1000"
    {{ end }}
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: {{ $routeName }}
      modelsOwnedBy: GIS AI Models
      backendRefs:
        {{- range $bKey, $bVal := $activeBackends }}
        {{- $backendBase := index $.Values.backends $bVal.ref }}
        - name: {{ $backendBase.resourceName }}
          {{- if $bVal.modelNameOverride }}
          modelNameOverride: {{ $bVal.modelNameOverride }}
          {{- end }}
          weight: {{ $bVal.weight | default 1 }}
          priority: {{ $bVal.priority | default 0 }}
        {{- end }}
{{- end }}
{{- end }}
