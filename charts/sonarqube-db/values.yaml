# sonarqube-db — CloudNativePG Cluster (sonarqube-db) for SonarQube Community
# Build + barman ObjectStore + ScheduledBackup + PodMonitor + the `sonarqube`
# Database and its role secret. Leaf chart of the sonarqube orchestrator
# (ADR-0065). Mirrors charts/lightbridge-db verbatim except names/sizing.
#
# Namespace is `sonarqube` (the orchestrator targets that namespace; these CRs
# pin it explicitly).
#
# SonarQube connects with JDBC user `sonarqube` against the `sonarqube` DB on
# the `sonarqube-db-rw.sonarqube.svc` primary service. The jdbcUrl + username/
# password wiring lives in the SonarQube workload values (ai-helm-values
# environments/prod/values/sonarqube.yaml) — this chart only owns Postgres.

resources:
  # ────────────────────────────────────────────────────────────────────
  # Primary CNPG cluster. Same shape as lightbridge-db: instances 2,
  # postgresql:18.4-system-trixie, the barman WAL-archiver plugin, an explicit
  # `enabled: true` on the plugin (the operator defaults it on and ArgoCD diffs
  # `plugins` as an atomic list → permanent OutOfSync without it). 10Gi storage
  # (SonarQube's issue/measure tables grow faster than the authz DB).
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: sonarqube-db
      namespace: sonarqube
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      instances: 2
      imageName: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
      storage:
        size: "10Gi"
      plugins:
        - name: barman-cloud.cloudnative-pg.io
          enabled: true
          isWALArchiver: true
          parameters:
            barmanObjectName: sonarqube-db
            serverName: sonarqube-db
      postgresql:
        parameters:
          archive_timeout: "30min"
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
      # Declarative login role `sonarqube` that OWNS the `sonarqube` Database
      # below. Password from the basic-auth Secret `sonarqube-db-role`
      # (ESO-provisioned, below) — consumed by BOTH CNPG (passwordSecret) and the
      # SonarQube workload (JDBC password).
      managed:
        roles:
          - name: sonarqube
            ensure: present
            login: true
            passwordSecret:
              name: sonarqube-db-role
  # ────────────────────────────────────────────────────────────────────
  # barman-cloud ObjectStore — Hetzner Object Storage (Ceph-RGW), shared bucket
  # `ssegning-k8s-state`, prefix `sonarqube-db`. Same throttling lessons as
  # lightbridge-db: NO top-level `region` (breaks ArgoCD diff — the webhook
  # injects an `s3Credentials.region` ref → {sonarqube-cnpg-s3, s3_region_name}
  # server-side, so the Secret MUST carry `s3_region_name`), jobs:1 + gzip to
  # stay under Hetzner's per-request rate limit, no trailing slash on the path.
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: barmancloud.cnpg.io/v1
    kind: ObjectStore
    metadata:
      name: sonarqube-db
      namespace: sonarqube
      annotations:
        argocd.argoproj.io/sync-wave: "1"
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      retentionPolicy: "7d"
      configuration:
        destinationPath: s3://ssegning-k8s-state/sonarqube-db
        endpointURL: https://nbg1.your-objectstorage.com
        data:
          jobs: 1
          compression: gzip
        s3Credentials:
          accessKeyId:
            name: sonarqube-cnpg-s3
            key: s3_access_key_id
          secretAccessKey:
            name: sonarqube-cnpg-s3
            key: s3_secret_access_key
  # ────────────────────────────────────────────────────────────────────
  # Scheduled backup — every 6h (CNPG 6-field cron: sec min hour dom mon dow).
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: postgresql.cnpg.io/v1
    kind: ScheduledBackup
    metadata:
      name: sonarqube-db-daily
      namespace: sonarqube
      annotations:
        argocd.argoproj.io/sync-wave: "3"
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      immediate: true
      schedule: "0 0 */6 * * *"
      backupOwnerReference: self
      cluster:
        name: sonarqube-db
      method: plugin
      pluginConfiguration:
        name: barman-cloud.cloudnative-pg.io
  # ────────────────────────────────────────────────────────────────────
  # PodMonitor so Grafana Alloy scrapes the CNPG per-instance exporter
  # (port 9187, name "metrics").
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: monitoring.coreos.com/v1
    kind: PodMonitor
    metadata:
      name: sonarqube-db
      namespace: sonarqube
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      selector:
        matchLabels:
          cnpg.io/cluster: sonarqube-db
      podMetricsEndpoints:
        - port: metrics
          interval: 30s
  # ────────────────────────────────────────────────────────────────────
  # The `sonarqube` Database owned by the managed `sonarqube` role above.
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: postgresql.cnpg.io/v1
    kind: Database
    metadata:
      name: sonarqube
      namespace: sonarqube
      annotations:
        argocd.argoproj.io/sync-wave: "3"
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      cluster:
        name: sonarqube-db
      name: sonarqube
      owner: sonarqube
      ensure: present
  # ────────────────────────────────────────────────────────────────────
  # `sonarqube` role basic-auth Secret. Consumed by CNPG (passwordSecret on the
  # managed role) to SET the role password AND by the SonarQube workload as its
  # JDBC password. NOTE: the ESO `password` template braces are double-escaped so
  # Helm's `tpl` (this whole string is tpl'd) leaves `{{ .password }}` for ESO —
  # an un-escaped `{{ }}` here breaks render (CLAUDE.md tpl-brace trap).
  # Requires the `sonarqube_db_password` property under ai/camer/digital/prod/env.
  # ────────────────────────────────────────────────────────────────────
  - |
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: sonarqube-db-role
      namespace: sonarqube
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: ssegning-aws
      target:
        name: sonarqube-db-role
        creationPolicy: Owner
        template:
          type: kubernetes.io/basic-auth
          data:
            username: "sonarqube"
            password: "{{ "{{ .password }}" }}"
      data:
        - secretKey: password
          remoteRef:
            key: ai/camer/digital/prod/env
            property: sonarqube_db_password
