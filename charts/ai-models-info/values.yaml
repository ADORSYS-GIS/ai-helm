# OpenRouter-shape model catalog endpoint for opencode.
#
# Computed at Helm-render time from `.Values.models` + `.Values.pricing`-
# style fields the orchestrator passes through. The mapping:
#
#   model `id` (map key)           → `id`
#   model `info.displayName`        → `name`            (defaults to id)
#   model `info.contextLength`      → `context_length` + `top_provider.context_length`
#                                     (ALWAYS emitted; default = catalogDefaults.contextLength)
#   model `info.maxOutputTokens`    → `top_provider.max_completion_tokens`
#                                     (ALWAYS emitted; default = catalogDefaults.maxCompletionTokens)
#   model `info.supportedParameters`→ `supported_parameters[]` (optional)
#   model `pricing.standard.inputPer1M`  / 1e6 (USD/tok string) → `pricing.prompt`
#   model `pricing.standard.outputPer1M` / 1e6                  → `pricing.completion`
#   model `pricing.standard.cachedInputPer1M` / 1e6             → `pricing.input_cache_read`
#   model `pricing.standard.effectivePer1M`     / 1e6 (flat)    → both prompt + completion
#   model `kind` (text|multimodal|embedding|reranker) → architecture.{input,output}_modalities
#
# Per-model metadata (info, modalities) is OPTIONAL — the OpenRouter
# field mapping in the consumer plugin is partial, so an entry only
# needs to emit the fields you want enriched.

# ────────────────────────────────────────────────────────────────────────
# Source data — lives at the parent chart's ROOT (NOT under the
# `models-info:` sub-chart key) so `templates/_helpers.tpl::catalog`
# and `templates/configmap.yaml` can read it directly. Populated by the
# orchestrator (`charts/ai-models`) via the ApplicationSet's per-child
# `valuesYaml`. Defaults below let the chart render in isolation for
# testing.
# ────────────────────────────────────────────────────────────────────────

# `models:` mirrors the orchestrator's `models:` map exactly.
models: {}
#  glm-5:
#    kind: text
#    pricing:
#      strategy: weighted
#      standard:
#        inputPer1M: 0.60
#        cachedInputPer1M: 0.12
#        outputPer1M: 2.08
#    info:
#      displayName: "GLM-5"
#      contextLength: 128000
#      maxOutputTokens: 8192
#      supportedParameters:
#        - tools
#        - tool_choice
#        - temperature
#        - reasoning

# Skip these model kinds from the catalog (chat-only catalog by default).
# Empty list = include everything.
excludeKinds:
  - embedding
  - reranker

# Defaults for the `context_length` + `top_provider.{context_length,
# max_completion_tokens}` fields emitted on EVERY catalog entry. Override
# per-model via that model's `info.contextLength` / `info.maxOutputTokens`.
catalogDefaults:
  contextLength: 128000
  maxCompletionTokens: 8192
  # Hard ceiling on context_length (+ top_provider.context_length) — no model
  # advertises more than this regardless of its info.contextLength.
  maxContextLength: 400000

# ────────────────────────────────────────────────────────────────────────
# bjw-s app-template (aliased to `models-info`). Renders the
# Deployment + Service + HTTPRoute. The two ConfigMaps holding the
# nginx config and the catalog JSON are emitted by this chart's own
# `templates/configmap.yaml`.
# ────────────────────────────────────────────────────────────────────────
models-info:
  controllers:
    main:
      type: deployment
      replicas: 2
      strategy: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      pod:
        automountServiceAccountToken: false
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        # Note: no checksum/catalog annotation here — the catalog is
        # computed from the parent chart's root `models:` value, which
        # isn't reachable from the sub-chart's tpl context. Catalog
        # edits require `kubectl rollout restart` (or just bump
        # `image.tag` if you want an automatic roll).
      containers:
        nginx:
          image:
            repository: nginxinc/nginx-unprivileged
            tag: "1.27-alpine"
            pullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                periodSeconds: 30
                timeoutSeconds: 3
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                periodSeconds: 5
                timeoutSeconds: 2
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          enabled: true
          port: 80
          targetPort: 8080
          protocol: HTTP

  # HTTPRoute (Gateway API) attached to the existing `core-gateway`
  # Envoy AI Gateway — same listener Authorino already guards. The
  # `core-gateway`'s `api-https` listener serves `api.ai.camer.digital`,
  # so the catalog inherits the AuthConfig automatically.
  #
  # NOT a Traefik Ingress — `api.ai.camer.digital` is on Envoy AI
  # Gateway, so HTTPRoute is the right attach point.
  route:
    main:
      enabled: true
      annotations: {}
      # Both the external host and the internal plane's k8s svc-DNS host (ADR-0021)
      # so the catalog is reachable on either listener. Unlike the AIGatewayRoutes
      # (no hostnames → match all listeners), this route sets explicit hostnames,
      # so the internal host MUST be listed to attach to the api-internal listener.
      hostnames:
        - api.ai.camer.digital
        - core-gateway-internal.envoy-gateway-system.svc.cluster.local
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: core-gateway
          namespace: converse-gateway
          sectionName: api-https
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: core-gateway
          namespace: converse-gateway
          sectionName: api-internal
      rules:
        - matches:
            - path:
                type: Exact
                value: /v1/models/info
          backendRefs:
            - identifier: main
              port: 80

  # Mount the two externally-rendered ConfigMaps + nginx-unprivileged's
  # required writable scratch dirs.
  persistence:
    # The nginx server block (custom default.conf with the right
    # Content-Type, exact-match location, Cache-Control header).
    nginx-config:
      enabled: true
      type: configMap
      name: '{{ .Release.Name }}-nginx-config'
      advancedMounts:
        main:
          nginx:
            - path: /etc/nginx/conf.d
              readOnly: true
    # The catalog JSON itself (rendered from `.Values.models` via
    # `templates/_helpers.tpl::ai-models-info.catalog`).
    content:
      enabled: true
      type: configMap
      name: '{{ .Release.Name }}-content'
      # Mount at `/usr/share/nginx/html/v1/models` so the ConfigMap's
      # `info` key projects to file `/usr/share/nginx/html/v1/models/info`
      # — matching the nginx `location = /v1/models/info` block.
      advancedMounts:
        main:
          nginx:
            - path: /usr/share/nginx/html/v1/models
              readOnly: true
    # nginx-unprivileged needs writable scratch space (root FS is RO).
    tmp:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /tmp
    nginx-cache:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /var/cache/nginx
    nginx-run:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          nginx:
            - path: /var/run
