apiVersion: v2
name: ai-models-info
description: |
  Serves an OpenRouter-shape JSON catalog at
  `https://api.ai.camer.digital/v1/models/info` so opencode's
  `@vymalo/opencode-models-info` plugin can enrich its in-process model
  registry with context length, pricing, modalities, and capability
  flags.

  The endpoint is NOT `/v1/models` (Envoy AI Gateway already serves a
  vanilla OpenAI-shape list there). This is a separate, richer route
  matching the OpenRouter shape the plugin expects.

  Tiny nginx + ConfigMap + HTTPRoute attached to the existing
  core-gateway. Leaf chart under the `ai-models` orchestrator
  (sync-wave 1). See ADR-0015.
type: application
version: 2.0.0
appVersion: "1.0.0"
keywords:
  - opencode
  - openrouter
  - models
  - ai-gateway
maintainers:
  - name: ai-helm

dependencies:
  # bjw-template (local fork of bjw-s app-template@4.6.2 — see
  # charts/bjw-template/) renders the Deployment, Service, and
  # HTTPRoute (`route:` block in v4). The two ConfigMaps holding the
  # nginx config and the catalog JSON are emitted by this chart's own
  # `templates/configmap.yaml` — the catalog content is computed at
  # render time from `.Values.models` via
  # `templates/_helpers.tpl::ai-models-info.catalog`, which
  # bjw-template's `configMaps:` block can't templatize. bjw-template
  # references the two ConfigMaps by name via `persistence`
  # (type: configMap).
  - name: bjw-template
    version: '4.6.2'
    repository: file://../bjw-template
    alias: models-info

  # `common` library kept only for `common.labels.standard` used inside
  # templates/configmap.yaml. Drop once we standardize on bjw-s labels.
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
