{{- /*
Two ConfigMaps:
  1. nginx-config — custom default.conf so the served file gets the
     right Content-Type (no extension on the URL) and CORS headers
     opencode would want from a browser-side enrichment caller.
  2. content — the OpenRouter-shape JSON catalog, computed from the
     models map by the `ai-models-info.catalog` helper.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen       8080;
      server_name  _;

      # The catalog file is mounted at /usr/share/nginx/html/v1/models/info.
      # This custom server block REPLACES the stock default.conf (which set
      # `root /usr/share/nginx/html`), so we must set root again — otherwise
      # try_files resolves against nginx's compiled-in default root
      # (/etc/nginx/html) and the file is never found → 404.
      root /usr/share/nginx/html;

      # The catalog file has no extension; force JSON.
      types { application/json json; }
      default_type application/json;

      # Liveness / readiness target.
      location = /healthz {
        access_log off;
        add_header Content-Type "text/plain";
        return 200 "ok\n";
      }

      # Exact-match catalog endpoint. File lives at
      # /usr/share/nginx/html/v1/models/info (mounted via subPath).
      location = /v1/models/info {
        # opencode's models-info plugin sends the cached ETag as
        # If-None-Match; nginx replies 304 automatically when the
        # file's mtime/etag hasn't changed. Cache TTL is governed by
        # the plugin (default 24h).
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files /v1/models/info =404;
      }

      # Everything else 404s.
      location / {
        return 404;
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-content
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  # OpenRouter-shape catalog. Computed at Helm-render time from
  # `.Values.models` via templates/_helpers.tpl. Compact JSON (deterministic).
  #
  # The key is `info` (not `catalog`) because bjw-s persistence (type:
  # configMap) projects each data key as a file. Mounting this ConfigMap
  # at `/usr/share/nginx/html/v1/models` → file `info` → nginx serves
  # `/v1/models/info` (matching the location block above).
  info: |
    {{- include "ai-models-info.catalog" . | nindent 4 }}
