{{- if .Values.route.enabled }}
{{- /*
HTTPRoute attached to the Envoy AI Gateway's api-https listener
(api.ai.camer.digital). Path is exact-match so it doesn't shadow the
AIGatewayRoutes that route by `x-ai-eg-model` header.

Authorino's SecurityPolicy on the same listener still applies — this
route inherits the AuthConfig (humans + service accounts both already
carry the Authorization header for inference; the opencode models-info
plugin reuses the same provider headers for the catalog fetch).
*/ -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.route.parentRef.name }}
      namespace: {{ .Values.route.parentRef.namespace }}
      {{- with .Values.route.parentRef.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.route.hostname | quote }}
  rules:
    - matches:
        - path:
            type: Exact
            value: {{ .Values.route.path | quote }}
      backendRefs:
        - name: {{ .Release.Name }}
          port: 80
          weight: 1
{{- end }}
