{{- define "network-policies.ingress-rules" -}}
{{- $policy := .policy -}}
{{- if or $policy.ingressNamespaces $policy.ingressIntraNamespace $policy.ingress -}}
ingress:
  # Namespace-based ingress (abstraction)
  {{- range $ns := $policy.ingressNamespaces }}
  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .name | default . }}
    {{- if .ports }}
    ports:
      {{- toYaml .ports | nindent 6 }}
    {{- end }}
  {{- end }}
  # Intra-namespace ingress (abstraction)
  {{- if $policy.ingressIntraNamespace }}
  - from:
      - podSelector: {}
  {{- end }}
  # Raw ingress rules (backward compatibility)
  {{- if $policy.ingress }}
  {{- toYaml $policy.ingress | nindent 2 }}
  {{- end }}
{{- end }}
{{- end -}}

{{- define "network-policies.egress-rules" -}}
{{- $policy := .policy -}}
{{- if or $policy.egressDns $policy.egressIntraNamespace $policy.egressInternalServices $policy.egressExternal $policy.egress -}}
egress:
  # DNS handling (abstraction) - Hardened to kube-system
  {{- if $policy.egressDns }}
  - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
    ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53
  {{- end }}
  # Intra-namespace egress (abstraction)
  {{- if $policy.egressIntraNamespace }}
  - to:
      - podSelector: {}
  {{- end }}
  # Internal service dependencies (abstraction)
  {{- range $svc := $policy.egressInternalServices }}
  - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .namespace | default . }}
    {{- if .ports }}
    ports:
      {{- toYaml .ports | nindent 6 }}
    {{- end }}
  {{- end }}
  # External egress CIDRs (abstraction)
  {{- range $ext := $policy.egressExternal }}
  - to:
      - ipBlock:
          cidr: {{ .cidr }}
          {{- if .except }}
          except:
            {{- toYaml .except | nindent 10 }}
          {{- end }}
    {{- if .ports }}
    ports:
      {{- toYaml .ports | nindent 6 }}
    {{- end }}
  {{- end }}
  # Raw egress rules (backward compatibility)
  {{- if $policy.egress }}
  {{- toYaml $policy.egress | nindent 2 }}
  {{- end }}
{{- end }}
{{- end -}}

{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.networkPolicy.name | default (include "common.names.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $.Chart.Name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  podSelector:
    {{- if .Values.networkPolicy.podSelector }}
    {{- toYaml .Values.networkPolicy.podSelector | nindent 4 }}
    {{- else }}
    matchLabels: {}
    {{- end }}
  policyTypes:
    {{- if .Values.networkPolicy.policyTypes }}
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}
    {{- else }}
    - Ingress
    - Egress
    {{- end }}
  
  {{- include "network-policies.ingress-rules" (dict "policy" .Values.networkPolicy "context" $) | nindent 2 }}
  {{- include "network-policies.egress-rules" (dict "policy" .Values.networkPolicy "context" $) | nindent 2 }}
{{- end -}}

{{- if .Values.policies }}
{{- range $name, $policy := .Values.policies }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $policy.namespace | default $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $.Chart.Name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    network-policy/owned-by: {{ $policy.namespace | default $.Release.Namespace }}
    network-policy/type: "third-party"
spec:
  podSelector:
    {{- if $policy.podSelector }}
    {{- toYaml $policy.podSelector | nindent 4 }}
    {{- else }}
    matchLabels: {}
    {{- end }}
  policyTypes:
    {{- if $policy.policyTypes }}
    {{- toYaml $policy.policyTypes | nindent 4 }}
    {{- else }}
    - Ingress
    - Egress
    {{- end }}

  {{- include "network-policies.ingress-rules" (dict "policy" $policy "context" $) | nindent 2 }}
  {{- include "network-policies.egress-rules" (dict "policy" $policy "context" $) | nindent 2 }}
{{- end }}
{{- end }}
