apiVersion: v2
name: model-serving-qwen3-4b
description: |
  Self-hosted LLM on the home GPU: a single bjw-template StatefulSet
  (always-on) with TWO containers — the kserve/huggingfaceserver model
  (vLLM + in-pod LMCache) and a Caddy auth-proxy sidecar that reaches the
  model over localhost. Weights are fed from a pre-seeded PVC (local mount, no
  per-start HuggingFace download). NOT KServe/Knative — serverless is the wrong
  fit for a single owned, dedicated GPU (ADR-0029); the sidecar enforces the
  Bearer the model image ignores (ADR-0030).

  Deployed by an ai-helm Application that — unusually — targets the HOME
  cluster (where the GPU lives), the single sanctioned exception to ADR-0017.
  The model is federated into the Hetzner Envoy AI Gateway as an ordinary
  OpenAI backend via the proxy's public FQDN (see charts/ai-models). The *why*
  is ADR-0022 (federation) + ADR-0029 (serving mode) + ADR-0030 (one STS via
  bjw-template); the *how* is docs/self-hosted-model-serving.md.
type: application
version: 0.4.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0-0"
keywords:
  - llm
  - vllm
  - lmcache
  - huggingfaceserver
  - inference
  - gpu
maintainers:
  - name: ai-helm

dependencies:
  # bjw-template (forked bjw-s app-template, ADR-0016) renders the WORKLOAD: a
  # single StatefulSet with two containers — the model server + the Caddy
  # auth-proxy as a sidecar (proxy reaches the model over localhost). Values
  # under the `modelServing:` key. Same hybrid pattern as charts/librechat-app
  # (own templates/ for the cert/secrets/PVC/seed-Job CRDs the app-template
  # doesn't render natively).
  - name: bjw-template
    version: "4.6.2"
    repository: "file://../bjw-template"
    alias: modelServing
  # bitnami common — only for `common.labels.standard` in the chart's own
  # templates/ (PVC, ExternalSecrets, seed Job, Certificate, IngressRoute).
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
