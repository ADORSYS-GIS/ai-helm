apiVersion: v2
name: mcp
description: |
  Generic MCP-server leaf chart. Renders ONE Model Context Protocol server
  exposed through the Envoy AI Gateway as an MCPRoute, in one of two backend
  modes:

    - external:   Backend → an upstream FQDN (+ BackendTLSPolicy)
    - selfHosted: Deployment + Service + Backend → the in-cluster Service

  Plus an optional in-chart ExternalSecret (app-scoped, ssegning-aws) and an
  optional apiKey securityPolicy on the MCPRoute. One Application per MCP is
  generated by the `mcps` orchestrator (ApplicationSet). See ADR-0027.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - mcp
  - envoy-ai-gateway
maintainers:
  - name: ai-helm

dependencies:
  - name: common
    version: '*'
    repository: "file://../common"
    tags:
      - common
      - bitnami-common
