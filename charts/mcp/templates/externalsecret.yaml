{{- /*
Optional app-scoped ExternalSecret materialising this MCP's credential from
ssegning-aws. For an API-key MCP the target secretKey is `apiKey` (the AIEG
MCPRoute contract). Rendered only when externalSecret.enabled.
*/ -}}
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ required "externalSecret.secretName is required" .Values.externalSecret.secretName }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStore | default "ssegning-aws" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .key | quote }}
        property: {{ .property | quote }}
    {{- end }}
{{- end }}
