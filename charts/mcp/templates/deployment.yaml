{{- /*
In-cluster workload for an MCP backend. Two modes render a pod here:
  • selfHosted      — the MCP server itself runs in-cluster (brave, terraform).
  • proxiedExternal — a Caddy "normalizing proxy" fronts an EXTERNAL hosted MCP
    (ADR-0040). Caddy does the upstream TLS (Go TLS — handles ECDSA certs that
    Envoy's BoringSSL rejects), injects the upstream credential, and optionally
    rewrites the response Content-Type (some hosted servers mislabel JSON as
    text/event-stream). This turns a flaky external HTTPS backend into a reliable
    in-cluster plain-HTTP backend, like the self-hosted ones — and removes the
    need for the ADR-0039 EnvoyPatchPolicy SNI hack.
external mode renders no pod (the MCPRoute points straight at the upstream FQDN).
*/ -}}
{{- if eq .Values.mcp.mode "selfHosted" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mcp.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcp.name }}
        {{- include "common.labels.standard" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.mcp.name }}
          image: {{ required "mcp.image is required in selfHosted mode" .Values.mcp.image | quote }}
          ports:
            - containerPort: {{ .Values.mcp.port }}
          {{- with .Values.mcp.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mcp.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  selector:
    app: {{ .Values.mcp.name }}
  ports:
    - name: http
      port: {{ .Values.mcp.port }}
      targetPort: {{ .Values.mcp.port }}
  type: ClusterIP
{{- end }}

{{- if eq .Values.mcp.mode "proxiedExternal" }}
{{- $p := .Values.mcp.proxy | default dict }}
{{- $port := .Values.mcp.port | int }}
{{- $host := required "mcp.externalHost is required in proxiedExternal mode" .Values.mcp.externalHost }}
{{- $hdr := $p.authHeader | default "Authorization" }}
{{- /* engine: caddy (default) or nginx. Caddy is the normal normalizing proxy
       (TLS + credential injection + optional response Content-Type rewrite).
       nginx is for the ONE case Caddy core can't do: rewriting the response
       BODY. Today only firecrawl needs it — see proxy.rewriteResponseProtocolVersion. */ -}}
{{- $engine := $p.engine | default "caddy" }}
{{- if eq $engine "nginx" }}
{{- /* nginx engine — needed only to REWRITE THE RESPONSE BODY, which Caddy core
       can't. firecrawl (correctly, per MCP spec) negotiates a newer requested
       protocolVersion DOWN (2025-11-25 → 2025-06-18), but the AIEG v0.7.0 mcpproxy
       requires the backend to echo the client's EXACT requested version or it 500s
       "failed to create MCP session to any backend" (upstream bug — ADR-0041 /
       docs/2026-06-10-mcp-external-server-proxy-debug.md §9.7). nginx `sub_filter`
       rewrites the echoed version back to what the client asked for. INTERIM,
       pinned to `.to`; drop the whole nginx engine once AIEG tolerates downgrade.
       Token via the nginx image's envsubst (${MCP_TOKEN}); NGINX_ENVSUBST_FILTER
       scopes substitution to MCP_TOKEN so nginx's own $vars are left intact. */ -}}
{{- $authVal := ternary "Bearer " "" (ne $p.bearer false) }}
{{- $ng := list "server {" (printf "  listen %d;" $port) "  location / {" }}
{{- $ng = append $ng (printf "    proxy_pass https://%s;" $host) }}
{{- $ng = append $ng (printf "    proxy_set_header Host %s;" $host) }}
{{- if .Values.externalSecret.enabled }}
{{- $ng = append $ng (printf "    proxy_set_header %s \"%s${MCP_TOKEN}\";" $hdr $authVal) }}
{{- end }}
{{- $ng = append $ng "    proxy_ssl_server_name on;" }}
{{- $ng = append $ng "    proxy_http_version 1.1;" }}
{{- $ng = append $ng "    proxy_set_header Accept-Encoding \"\";" }}
{{- $ng = append $ng "    proxy_buffering off;" }}
{{- with $p.rewriteResponseProtocolVersion }}
{{- $ng = append $ng "    sub_filter_types text/event-stream application/json;" }}
{{- $ng = append $ng "    sub_filter_once on;" }}
{{- $ng = append $ng (printf "    sub_filter '\"protocolVersion\":\"%s\"' '\"protocolVersion\":\"%s\"';" (required "rewriteResponseProtocolVersion.from required" .from) (required "rewriteResponseProtocolVersion.to required" .to)) }}
{{- end }}
{{- $ng = concat $ng (list "  }" "}") }}
{{- $nginxconf := join "\n" $ng }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.mcp.name }}-proxy
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  default.conf.template: |-
{{ $nginxconf | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mcp.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcp.name }}
        {{- include "common.labels.standard" . | nindent 8 }}
      annotations:
        # Roll the pod when the nginx config changes (envsubst runs only at start).
        checksum/config: {{ $nginxconf | sha256sum }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.mcp.image | default "docker.io/library/nginx:alpine" | quote }}
          ports:
            - containerPort: {{ $port }}
          env:
            # Limit envsubst to MCP_TOKEN so nginx's own $variables survive.
            - name: NGINX_ENVSUBST_FILTER
              value: MCP_TOKEN
            {{- if .Values.externalSecret.enabled }}
            # Token is NEVER optional (see the caddy branch for the why) — wait for ESO.
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.secretName }}
                  key: apiKey
                  optional: false
            {{- end }}
          volumeMounts:
            - name: nginx-template
              mountPath: /etc/nginx/templates
          readinessProbe:
            tcpSocket:
              port: {{ $port }}
            initialDelaySeconds: 2
            periodSeconds: 10
          {{- with .Values.mcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: nginx-template
          configMap:
            name: {{ .Values.mcp.name }}-proxy
{{- else }}
{{- /* Build the Caddyfile: TLS reverse-proxy to the upstream, inject the
       credential, optional response Content-Type rewrite. */ -}}
{{- $caddy := list "{" "  admin off" "  auto_https off" "}" (printf ":%d {" $port) }}
{{- $caddy = append $caddy (printf "  reverse_proxy https://%s {" $host) }}
{{- $caddy = append $caddy (printf "    header_up Host %s" $host) }}
{{- if .Values.externalSecret.enabled }}
{{- $val := ternary "Bearer {env.MCP_TOKEN}" "{env.MCP_TOKEN}" (ne $p.bearer false) }}
{{- $caddy = append $caddy (printf "    header_up %s \"%s\"" $hdr $val) }}
{{- end }}
{{- with $p.rewriteResponseContentType }}
{{- $caddy = append $caddy (printf "    header_down Content-Type %s" .) }}
{{- end }}
{{- $caddy = concat $caddy (list "  }" "}") }}
{{- $caddyfile := join "\n" $caddy }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.mcp.name }}-caddy
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  Caddyfile: |-
{{ $caddyfile | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mcp.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcp.name }}
        {{- include "common.labels.standard" . | nindent 8 }}
      annotations:
        # Roll the pod when the Caddyfile changes (ConfigMap edits don't reload).
        checksum/caddyfile: {{ $caddyfile | sha256sum }}
    spec:
      containers:
        - name: caddy
          image: {{ .Values.mcp.image | default "docker.io/library/caddy:2-alpine" | quote }}
          command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
          ports:
            - containerPort: {{ $port }}
          {{- if .Values.externalSecret.enabled }}
          {{- /* The token is NEVER optional. Env vars from secretKeyRef bind at
                 pod start and never refresh, so optional:true lets a Caddy pod
                 that beats ESO capture an EMPTY token and inject `Bearer ` forever
                 → the upstream rejects every request as "Invalid API key" until a
                 manual pod delete (the 2026-06-11 context7 incident). optional:false
                 makes the container WAIT in ContainerCreating until ESO has
                 populated the Secret — the honest failure mode for a keyed MCP.
                 A genuinely keyless MCP sets externalSecret.enabled:false instead:
                 this block AND the Caddyfile Authorization header are then both
                 unrendered, so Caddy proxies anonymously. There is no middle
                 ground, so there is no knob. */}}
          env:
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.secretName }}
                  key: apiKey
                  optional: false
          {{- end }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy
          readinessProbe:
            tcpSocket:
              port: {{ $port }}
            initialDelaySeconds: 2
            periodSeconds: 10
          {{- with .Values.mcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ .Values.mcp.name }}-caddy
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  selector:
    app: {{ .Values.mcp.name }}
  ports:
    - name: http
      port: {{ $port }}
      targetPort: {{ $port }}
  type: ClusterIP
{{- end }}
