{{- /*
In-cluster workload for an MCP backend. Two modes render a pod here:
  • selfHosted      — the MCP server itself runs in-cluster (brave, terraform).
  • proxiedExternal — a Caddy "normalizing proxy" fronts an EXTERNAL hosted MCP
    (ADR-0040). Caddy does the upstream TLS (Go TLS — handles ECDSA certs that
    Envoy's BoringSSL rejects), injects the upstream credential, and optionally
    rewrites the response Content-Type (some hosted servers mislabel JSON as
    text/event-stream). This turns a flaky external HTTPS backend into a reliable
    in-cluster plain-HTTP backend, like the self-hosted ones — and removes the
    need for the ADR-0039 EnvoyPatchPolicy SNI hack.
external mode renders no pod (the MCPRoute points straight at the upstream FQDN).
*/ -}}
{{- if eq .Values.mcp.mode "selfHosted" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mcp.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcp.name }}
        {{- include "common.labels.standard" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.mcp.name }}
          image: {{ required "mcp.image is required in selfHosted mode" .Values.mcp.image | quote }}
          ports:
            - containerPort: {{ .Values.mcp.port }}
          {{- with .Values.mcp.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mcp.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  selector:
    app: {{ .Values.mcp.name }}
  ports:
    - name: http
      port: {{ .Values.mcp.port }}
      targetPort: {{ .Values.mcp.port }}
  type: ClusterIP
{{- end }}

{{- if eq .Values.mcp.mode "proxiedExternal" }}
{{- $p := .Values.mcp.proxy | default dict }}
{{- $port := .Values.mcp.port | int }}
{{- $host := required "mcp.externalHost is required in proxiedExternal mode" .Values.mcp.externalHost }}
{{- $hdr := $p.authHeader | default "Authorization" }}
{{- /* engine: caddy (default) or openresty. Caddy is the normal normalizing proxy
       (TLS + credential injection + optional response Content-Type rewrite).
       openresty (nginx + Lua) is for the ONE case Caddy core can't do: rewriting
       the REQUEST BODY. Today only firecrawl needs it — see proxy.pinRequestProtocolVersion. */ -}}
{{- $engine := $p.engine | default "caddy" }}
{{- if eq $engine "openresty" }}
{{- /* openresty engine — rewrites the REQUEST BODY, which neither Caddy nor stock
       nginx can. firecrawl frames its `initialize` RESPONSE differently per
       requested protocol version: for the version modern clients send (2025-11-25)
       it prepends an EMPTY leading SSE event, and the AIEG v0.7.0 mcpproxy reads
       that first (empty) event and fails: `MCP message is not a response: <nil>` →
       500 "failed to create MCP session to any backend". For 2025-06-18 firecrawl
       emits clean framing the mcpproxy parses fine. So we pin the request's
       protocolVersion down to a value the upstream frames cleanly, via a Lua
       `gsub` on the request body. Token is injected in Lua from MCP_TOKEN (openresty
       has no envsubst entrypoint); `env MCP_TOKEN;` exposes it to os.getenv.
       INTERIM workaround for AIEG #2219 / ADR-0041 — drop once AIEG's SSE parser
       skips non-response events. Validated end-to-end against the live gateway with
       the MCP SDK (init 200, 19 tools). */ -}}
{{- $pin := required "proxy.pinRequestProtocolVersion is required for the openresty engine" $p.pinRequestProtocolVersion }}
{{- $prefix := ternary "Bearer " "" (ne $p.bearer false) }}
{{- $or := list "events {}" "http {" "  client_body_buffer_size 256k;" "  server {" (printf "    listen %d;" $port) "    location / {" "      rewrite_by_lua_block {" "        ngx.req.read_body()" "        local b = ngx.req.get_body_data()" }}
{{- $or = append $or (printf "        if b then ngx.req.set_body_data((b:gsub([[\"protocolVersion\":\"[^\"]*\"]], [[\"protocolVersion\":\"%s\"]]))) end" $pin) }}
{{- if .Values.externalSecret.enabled }}
{{- $or = append $or (printf "        ngx.req.set_header(\"%s\", \"%s\" .. (os.getenv(\"MCP_TOKEN\") or \"\"))" $hdr $prefix) }}
{{- end }}
{{- $or = append $or "      }" }}
{{- $or = append $or (printf "      proxy_pass https://%s;" $host) }}
{{- $or = append $or (printf "      proxy_set_header Host %s;" $host) }}
{{- $or = concat $or (list "      proxy_ssl_server_name on;" "      proxy_http_version 1.1;" "      proxy_set_header Accept-Encoding \"\";" "      proxy_buffering off;") }}
{{- $or = concat $or (list "    }" "  }" "}") }}
{{- if .Values.externalSecret.enabled }}{{- $or = prepend $or "env MCP_TOKEN;" }}{{- end }}
{{- $orconf := join "\n" $or }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.mcp.name }}-proxy
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  nginx.conf: |-
{{ $orconf | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mcp.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcp.name }}
        {{- include "common.labels.standard" . | nindent 8 }}
      annotations:
        # Roll the pod when the openresty config changes (read only at start).
        checksum/config: {{ $orconf | sha256sum }}
    spec:
      containers:
        - name: openresty
          image: {{ .Values.mcp.image | default "docker.io/openresty/openresty:alpine" | quote }}
          ports:
            - containerPort: {{ $port }}
          {{- if .Values.externalSecret.enabled }}
          env:
            # Token is NEVER optional (see the caddy branch for the why) — wait for ESO.
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.secretName }}
                  key: apiKey
                  optional: false
          {{- end }}
          volumeMounts:
            - name: orconf
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            tcpSocket:
              port: {{ $port }}
            initialDelaySeconds: 2
            periodSeconds: 10
          {{- with .Values.mcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: orconf
          configMap:
            name: {{ .Values.mcp.name }}-proxy
{{- else }}
{{- /* Build the Caddyfile: TLS reverse-proxy to the upstream, inject the
       credential, optional response Content-Type rewrite. */ -}}
{{- $caddy := list "{" "  admin off" "  auto_https off" "}" (printf ":%d {" $port) }}
{{- $caddy = append $caddy (printf "  reverse_proxy https://%s {" $host) }}
{{- $caddy = append $caddy (printf "    header_up Host %s" $host) }}
{{- if .Values.externalSecret.enabled }}
{{- $val := ternary "Bearer {env.MCP_TOKEN}" "{env.MCP_TOKEN}" (ne $p.bearer false) }}
{{- $caddy = append $caddy (printf "    header_up %s \"%s\"" $hdr $val) }}
{{- end }}
{{- with $p.rewriteResponseContentType }}
{{- $caddy = append $caddy (printf "    header_down Content-Type %s" .) }}
{{- end }}
{{- $caddy = concat $caddy (list "  }" "}") }}
{{- $caddyfile := join "\n" $caddy }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.mcp.name }}-caddy
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  Caddyfile: |-
{{ $caddyfile | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mcp.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcp.name }}
        {{- include "common.labels.standard" . | nindent 8 }}
      annotations:
        # Roll the pod when the Caddyfile changes (ConfigMap edits don't reload).
        checksum/caddyfile: {{ $caddyfile | sha256sum }}
    spec:
      containers:
        - name: caddy
          image: {{ .Values.mcp.image | default "docker.io/library/caddy:2-alpine" | quote }}
          command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
          ports:
            - containerPort: {{ $port }}
          {{- if .Values.externalSecret.enabled }}
          {{- /* The token is NEVER optional. Env vars from secretKeyRef bind at
                 pod start and never refresh, so optional:true lets a Caddy pod
                 that beats ESO capture an EMPTY token and inject `Bearer ` forever
                 → the upstream rejects every request as "Invalid API key" until a
                 manual pod delete (the 2026-06-11 context7 incident). optional:false
                 makes the container WAIT in ContainerCreating until ESO has
                 populated the Secret — the honest failure mode for a keyed MCP.
                 A genuinely keyless MCP sets externalSecret.enabled:false instead:
                 this block AND the Caddyfile Authorization header are then both
                 unrendered, so Caddy proxies anonymously. There is no middle
                 ground, so there is no knob. */}}
          env:
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.secretName }}
                  key: apiKey
                  optional: false
          {{- end }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy
          readinessProbe:
            tcpSocket:
              port: {{ $port }}
            initialDelaySeconds: 2
            periodSeconds: 10
          {{- with .Values.mcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ .Values.mcp.name }}-caddy
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  selector:
    app: {{ .Values.mcp.name }}
  ports:
    - name: http
      port: {{ $port }}
      targetPort: {{ $port }}
  type: ClusterIP
{{- end }}
