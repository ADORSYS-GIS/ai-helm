{{- /*
The MCPRoute attaching this MCP to the gateway. Optional apiKey securityPolicy
injects the upstream credential (Secret key `apiKey`; "Authorization" header
auto-prefixes "Bearer ").
*/ -}}
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: MCPRoute
metadata:
  name: {{ .Values.mcp.name }}
  namespace: {{ include "common.names.namespace" $ }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "common.tplvalues.render" ( dict "value" .Values.gatewayRef.name "context" $ ) }}
      namespace: {{ include "common.tplvalues.render" ( dict "value" .Values.gatewayRef.namespace "context" $ ) }}
      kind: Gateway
      group: gateway.networking.k8s.io
      {{- with .Values.gatewayRef.sectionName }}
      sectionName: {{ include "common.tplvalues.render" ( dict "value" . "context" $ ) }}
      {{- end }}

  path: {{ .Values.mcp.path | quote }}

  {{- /*
  securityPolicy carries OAuth (ADR-0038) and/or CEL per-tool authorization
  (AIEG v1.0, v1beta1). Emit the wrapper if either is configured.
  */ -}}
  {{- $authzRules := dig "authorization" "rules" (list) .Values.mcp -}}
  {{- if or .Values.oauth.enabled (gt (len $authzRules) 0) }}
  securityPolicy:
    {{- if .Values.oauth.enabled }}
    # MCP-spec OAuth (ADR-0038): Envoy-native JWT verification + the RFC 9728
    # discovery surface, served by AIEG at the path-insertion well-known URLs.
    # This route-level policy displaces the gateway-level Authorino extAuth for
    # this MCPRoute; claimToHeaders restores the ADR-0011 x-oidc-* set.
    oauth:
      issuer: {{ required "oauth.issuer is required when oauth.enabled" .Values.oauth.issuer | quote }}
      {{- with .Values.oauth.audiences }}
      audiences:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oauth.claimToHeaders }}
      claimToHeaders:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      protectedResourceMetadata:
        resource: {{ printf "%s%s" (required "oauth.publicOrigin is required when oauth.enabled" .Values.oauth.publicOrigin) .Values.mcp.path | quote }}
        resourceName: {{ .Values.oauth.resourceName | default .Values.mcp.name | quote }}
        {{- with .Values.oauth.scopesSupported }}
        scopesSupported:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    {{- end }}
    {{- with $authzRules }}
    # CEL per-tool authorization (AIEG v1.0). `tools/list` is filtered by the SAME
    # rules as `tools/call`, so callers only discover tools they may invoke. Each
    # CEL expr gets request.mcp.tool / request.mcp.method / request.auth.jwt.claims
    # and must return a boolean. Empty list (default) = allow-all (prior behaviour).
    authorization:
      rules:
        {{- range . }}
        - cel: {{ .cel | quote }}
        {{- end }}
    {{- end }}
  {{- end }}

  backendRefs:
    - name: {{ .Values.mcp.name }}
      kind: Backend
      group: gateway.envoyproxy.io
      path: {{ .Values.mcp.backendPath | quote }}
      {{- with .Values.mcp.toolFilter }}
      # Per-backend tool include/exclude (AIEG v1.0). Exclude wins over include
      # (deny-wins); *Regex are RE2 patterns. Empty (default) exposes all tools.
      toolSelector:
        {{- with .include }}
        include:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .includeRegex }}
        includeRegex:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .exclude }}
        exclude:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .excludeRegex }}
        excludeRegex:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- with .Values.mcp.forwardHeaders }}
      # Forward selected request headers to this backend (AIEG v1.0) — e.g. the
      # gateway-stamped x-oidc-user-id so the upstream can attribute/personalize.
      forwardHeaders:
        {{- range . }}
        - name: {{ .name | quote }}
          {{- with .backendHeader }}
          backendHeader: {{ . | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .Values.mcp.auth.enabled }}
      securityPolicy:
        apiKey:
          secretRef:
            name: {{ required "mcp.auth.secretName is required when auth.enabled" .Values.mcp.auth.secretName }}
          {{- with .Values.mcp.auth.header }}
          header: {{ . | quote }}
          {{- end }}
      {{- end }}
