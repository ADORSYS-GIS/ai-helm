# Local fork of bjw-s-labs/app-template@4.6.2 (common-powered chart template).
#
# Upstream: https://github.com/bjw-s-labs/helm-charts/tree/main/charts/other/app-template
# Forked: 2026-05-31. Renamed `app-template` → `bjw-template` so this
# repo controls the bump cadence and can patch in-flight if needed.
#
# Consumers reference this via:
#
#   dependencies:
#     - name: bjw-template
#       version: '4.6.2'
#       repository: file://../bjw-template
#       alias: <your-app-name>
#
# The template values schema is unchanged from upstream — `controllers`,
# `service`, `ingress`, `route`, `persistence`, `configMaps`, etc. all
# behave as documented at
# https://bjw-s-labs.github.io/helm-charts/docs/app-template/.
#
# Internally this chart is a tiny wrapper: `templates/common.yaml`
# initializes the bjw-s.common loader and emits all resources. The real
# work lives in `charts/bjw-common/` (forked library).
#
# To upgrade to a newer upstream: see header in `charts/bjw-common/Chart.yaml`.
annotations:
  artifacthub.io/changes: |-
    - kind: changed
      description: |-
        Upgraded the common library to v4.6.2
      links:
        - name: Upgrade notes
          url: https://bjw-s-labs.github.io/helm-charts/docs/app-template/upgrade-instructions/
        - name: Detailed release notes
          url: https://github.com/bjw-s-labs/helm-charts/releases/tag/common-4.6.2
apiVersion: v2
description: A common-powered chart template (local fork of bjw-s-labs/app-template)
kubeVersion: '>=1.28.0-0'
maintainers:
  - email: me@bjw-s.dev
    name: bjw-s (upstream)
  - name: ai-helm
name: bjw-template
sources:
  - https://github.com/bjw-s-labs/helm-charts
  - https://github.com/ADORSYS-GIS/ai-helm
version: 4.6.2

dependencies:
  - name: bjw-common
    version: 4.6.2
    repository: file://../bjw-common
    # IMPORTANT: alias back to `common` so the library's own values flow
    # under `.Values.common` (which the loader's
    # `bjw-s.common.values.init` checks for explicitly — see
    # `charts/bjw-common/templates/values/_init.tpl`). Without this
    # alias, the init block is skipped, `.Values` stays as Helm's
    # `chartutil.Values` type, and sprig's `dig` later fails with
    # "interface conversion: interface {} is chartutil.Values, not
    # map[string]interface {}".
    alias: common
