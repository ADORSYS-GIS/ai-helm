          #             for: 3m
          #             labels:
          #               security: critical
          #             isPaused: false
          #             notification_settings:
          #               receiver: apprise

          dashboards:
            # ── Kubernetes ────────────────────────────────────────────────
            kubernetes:
              # Modern cluster-level view: CPU/memory/network per namespace
              # Replaces gnetId 7249 (outdated, uses deprecated graph panels)
              k8s-views-global:
                gnetId: 15757
                revision: 37
                datasource: Mimir
              # Per-node resource usage (dotdc modern set)
              k8s-views-nodes:
                gnetId: 15759
                revision: 32
                datasource: Mimir
              # Per-pod resource usage with drill-down
              k8s-views-pods:
                gnetId: 15760
                revision: 38
                datasource: Mimir
              # Namespace-level resource usage
              k8s-views-namespaces:
                gnetId: 15758
                revision: 38
                datasource: Mimir
              # Kubernetes API server health
              k8s-system-api-server:
                gnetId: 15761
                revision: 21
                datasource: Mimir
              # CoreDNS
              k8s-system-coredns:
                gnetId: 15762
                revision: 20
                datasource: Mimir

            # ── Observability Stack ───────────────────────────────────────
            observability:
              # Mimir overview — official Grafana Labs dashboard
              # Replaces gnetId 16067 (older community version)
              mimir-overview:
                gnetId: 17607
                revision: 2
                datasource: Mimir
              # Alloy metrics pipeline
              alloy-metrics:
                gnetId: 21048
                revision: 1
                datasource: Mimir
              # Loki operational — stack health, errors, resource usage
              loki-operational:
                gnetId: 14055
                revision: 1
                datasource: Loki
              # Loki logs explorer
              loki-logs:
                gnetId: 13639
                revision: 2
                datasource: Loki
              # Tempo operations via service graph metrics in Mimir
              tempo-operations:
                gnetId: 18030
                revision: 1
                datasource: Mimir
              # OpenTelemetry + Tempo traces
              otel-tempo:
                gnetId: 23242
                revision: 1
                datasource: Tempo

            # ── Infrastructure ────────────────────────────────────────────
            infrastructure:
              # Traefik v2/v3 — modern dashboard with request rates, errors, latency
              traefik:
                gnetId: 17931
                revision: 12
                datasource: Mimir
              # CloudNativePG — official CNPG dashboard
              cnpg:
                gnetId: 20417
                revision: 3
                datasource: Mimir
              # Redis — monitors the externally-managed redis-ha (home-os)
              redis:
                gnetId: 19157
                revision: 3
                datasource: Mimir
              # cert-manager — certificate expiry and renewal tracking
              cert-manager:
                gnetId: 20340
                revision: 1
                datasource: Mimir
              # External Secrets Operator
              external-secrets:
                gnetId: 21640
                revision: 1
                datasource: Mimir
              # Envoy Gateway overview
              envoy-gateway:
                gnetId: 24460
                revision: 1
                datasource: Mimir
              # Envoy proxy per-listener metrics
              envoy-proxy:
                gnetId: 24459
                revision: 1
                datasource: Mimir

            # ── GitOps ────────────────────────────────────────────────────
            gitops:
              # ArgoCD operational overview — replaces gnetId 14584
              argocd-operational:
                gnetId: 19993
                revision: 3
                datasource: Mimir
              # ArgoCD application-level detail
              argocd-applications:
                gnetId: 19974
                revision: 3
                datasource: Mimir

          persistence:
            enabled:      true
            storageClass: linode-block-storage
            size:         2Gi

          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }

          livenessProbe:
            path: /api/health
            initialDelaySeconds: 30
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            path: /api/health
            initialDelaySeconds: 15
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          ingress:
            enabled:          true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: cert-home-cert-http
            hosts:
              - *grafana-domain
            tls:
              - secretName: grafana.ai.camer.digital-tls
                hosts:
                  - *grafana-domain

          serviceMonitor:
            enabled:  true
            interval: 60s

          # ── Grafana Apprise Adapter ───────────────────────────────────────
          # Translates Grafana unified alerting webhooks into Apprise
          # notifications. Grafana sends alerts here; this adapter forwards
          # them to the Apprise API (apprise-api application in monitoring ns).
          # Source: https://github.com/RealOrangeOne/grafana-apprise-adapter
          # Env vars:
          #   APPRISE_URL: base URL of the Apprise API service
          #   PORT:        port to listen on (default 5000)
          extraObjects:
            - apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: grafana-apprise-adapter
                namespace: observability
                labels:
                  app.kubernetes.io/name: grafana-apprise-adapter
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app.kubernetes.io/name: grafana-apprise-adapter
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/name: grafana-apprise-adapter
                  spec:
                    containers:
                      - name: grafana-apprise-adapter
                        image: theorangeone/grafana-apprise-adapter:latest
                        ports:
                          - containerPort: 5000
                            name: http
                        env:
                          - name: APPRISE_URL
                            value: "http://apprise-api.monitoring.svc.cluster.local:8000"
                          - name: PORT
                            value: "5000"
                        resources:
                          requests:
                            cpu: 50m
                            memory: 32Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
                        readinessProbe:
                          httpGet:
                            path: /health
                            port: 5000
                          initialDelaySeconds: 5
                          periodSeconds: 10
                        livenessProbe:
                          httpGet:
                            path: /health
                            port: 5000
                          initialDelaySeconds: 10
                          periodSeconds: 30
            - apiVersion: v1
              kind: Service
              metadata:
                name: grafana-apprise-adapter
                namespace: observability
                labels:
                  app.kubernetes.io/name: grafana-apprise-adapter
              spec:
                selector:
                  app.kubernetes.io/name: grafana-apprise-adapter
                ports:
                  - name: http
                    port: 5000
                    targetPort: 5000
                type: ClusterIP

    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: dashboards / folders (grafana-operator CRs) ---
  # Owns ONLY operator CRs (Grafana external-mode, GrafanaFolder, future
  # GrafanaDashboard / GrafanaDatasource / GrafanaContactPoint /
  # GrafanaAlertRuleGroup). No workloads — the actual grafana pod is owned by
  # the `grafana` app above.
  # Sync-wave 1: depends on grafana-operator (-1) AND the grafana app (0)
  # being healthy. Grafana CR in external mode hits the admin API on first
  # reconcile.
  - name: observability-dashboards
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "1"
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: claude/magical-bohr-390242
      path: charts/observability-dashboards
      helm:
        releaseName: observability-dashboards
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Notifications: Apprise API — multi-channel notification gateway
  # Receives webhook calls from grafana-apprise-adapter and fans out to
  # configured channels (Discord, Slack, email, etc.).
  # Secrets required:
  #   apprise-api-config (optional): pre-configured notification URLs
  # Source: https://github.com/ADORSYS-GIS/opencode-k8s-agent
  # ─────────────────────────────────────────────────────────────────────────────
  - name: apprise-api
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/opencode-k8s-agent.git
      targetRevision: HEAD
      path: helm/apprise-api
      helm:
        releaseName: apprise-api
        valuesObject:
          apprise-api:
            controllers:
              main:
                replicas: 1
                containers:
                  main:
                    env:
                      APPRISE_STATEFUL_MODE: simple
                      APPRISE_CONFIG_DIR: /apprise-config
                    envFrom:
                      - secretRef:
                          name: apprise-api-config
                          optional: true
                    resources:
                      requests: { cpu: 100m, memory: 128Mi }
                      limits:   { cpu: 500m, memory: 512Mi }
            # Secret 'apprise-channels' must exist in the monitoring namespace.
            # Each key becomes a file — key 'alerts.cfg' is read when
            # POST /notify/alerts is called (one Apprise URL per line):
            #   kubectl create secret generic apprise-channels -n monitoring \
            #     --from-literal=alerts.cfg='discord://WEBHOOK_ID/WEBHOOK_TOKEN'
            persistence:
              config:
                type: secret
                name: apprise-channels
                globalMounts:
                  - path: /apprise-config
            service:
              main:
                controller: main
                ports:
                  http:
                    port: 8000
    destination:
      namespace: monitoring
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # AI Monitoring: OpenCode K8s Agent — AI-powered cluster health monitor
  # Runs as a CronJob (every 12h by default), uses OpenCode + Kubernetes MCP
  # to investigate cluster state and send structured reports via Apprise.
  # Secrets required:
  #   opencode-k8s-agent-secrets:
  #     OPENCODE_API_KEY:       <api-key-for-opencode-model-endpoint>
  #     APPRISE_URLS:           <apprise-notification-url e.g. discord://...>
  #     KEYCLOAK_CLIENT_SECRET: <keycloak-client-secret-for-opencode-k8s>
  # Source: https://github.com/ADORSYS-GIS/opencode-k8s-agent
  # ─────────────────────────────────────────────────────────────────────────────
  - name: opencode-k8s-agent
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/opencode-k8s-agent.git
      targetRevision: HEAD
      path: helm/opencode-k8s-agent
      helm:
        releaseName: opencode-k8s-agent
        valuesObject:
          opencode-k8s-agent:
            controllers:
              main:
                cronjob:
                  schedule: "0 */12 * * *"
                  concurrencyPolicy: Forbid
                  successfulJobsHistory: 1
                  failedJobsHistory: 1
                  backoffLimit: 1
                  activeDeadlineSeconds: 3600
                containers:
                  main:
                    env:
                      OPENCODE_MODEL: "minimax-m2p7"
                      OPENCODE_BASE_URL: "https://api.ai.camer.digital/v1"
                      APPRISE_API_URL: "http://apprise-api.monitoring.svc.cluster.local:8000"
                      KEYCLOAK_URL: "https://auth.verif.fyi"
                      KEYCLOAK_REALM: "camer-digital"
                      KEYCLOAK_CLIENT_ID: "opencode-k8s"
                    # Secret required (via ESO):
                    #   opencode-k8s-agent-secrets:
                    #     OPENCODE_API_KEY:       <api-key for model endpoint>
                    #     APPRISE_URLS:           <apprise URL e.g. discord://...>
                    #     KEYCLOAK_CLIENT_SECRET: <keycloak client secret>
                    envFrom:
                      - secretRef:
                          name: opencode-k8s-agent-secret
                    resources:
                      requests: { cpu: 100m, memory: 256Mi }
                      limits:   { cpu: 1000m, memory: 1Gi }
    destination:
      namespace: monitoring
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # NOTE: CloudNativePG (the `cnpg` operator) and the Barman Cloud plugin
  # (`cnpg-barman-cloud`) are NOT deployed by this repo — both are
  # installed externally (running in the `cnpg-system` namespace; CRDs
  # postgresql.cnpg.io + barmancloud.cnpg.io present on-cluster). Charts
  # here still define CNPG `Cluster` CRs (e.g. charts/coder-db) and rely
  # on the external operator + plugin to reconcile them. Don't re-add a
  # cnpg or plugin-barman-cloud Application here.

  # NOTE: cert-manager is NOT deployed by this repo. It's managed
  # externally (home-os repo: charts/cert via the `cert-remote`
  # Application, releaseName `cert`, in kube-system on the home-remote
  # cluster). That deployment installs the cert-manager controller +
  # CRDs AND the shared cluster-scoped ClusterIssuers this repo
  # references: `cert-home-cert-http` and `self-signed-ca`.
  #
  # GAP: home-os's cert chart does NOT yet define `cert-home-cert-envoy`
  # (the Gateway-API / gatewayHTTPRoute ACME issuer that core-gateway
  # uses for api.ai.camer.digital — see the `gateway.issuer` value
  # below). That issuer must be added to home-os, otherwise the Envoy
  # gateway's ACME cert won't be issued. Tracked out-of-band.
  # Do not re-add a cert Application here.

  # --- Secret Management ---
  # NOTE: the External Secrets Operator (controller + CRDs) is NOT
  # installed by this repo — it's deployed externally (Helm-managed in
  # the `external-secrets` namespace on the target cluster). The
  # ClusterSecretStore in use is `ssegning-aws` (cluster-scoped, also
  # external — verified on-cluster). This repo's old Vault-based
  # `bootstrap-secrets` store config (charts/external-secrets) was
  # removed: it was never the store actually used. Don't re-add an ESO
  # operator or ClusterSecretStore here.
  #
  # The actual ExternalSecret CRs are pulled from ai-ops-secrets.git by
  # the `secrets` Application below (and others provisioned externally);
  # they all reference the `ssegning-aws` store.

  # --- Core Infrastructure ---
  # NOTE: Redis is NOT deployed by this repo. It's managed externally
  # (home-os repo: charts/home-apps/redis-ha → redis-ha-redis in the
  # redis-system namespace on the home-remote cluster). Consumers here
  # point at `redis-ha-redis.redis-system.svc.cluster.local:6379`.
  # Do not re-add a redis Application here.

  - name: aieg-crd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: oci://docker.io/envoyproxy/ai-gateway-crds-helm
      targetRevision: v0.5.0
      path: .
      helm:
        releaseName: aieg-crd
    destination:
      namespace: envoy-ai-gateway-system

  - name: eg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: ai
    source:
      repoURL: oci://docker.io/envoyproxy/gateway-helm
      # v1.8.0 (2026-05-13) per audit. Clean minor; no CRD breaking changes.
      targetRevision: v1.8.0
      path: .
      helm:
        releaseName: eg
        valuesObject:
          podDisruptionBudget:
            # Critical Gateway infrastructure: PDB protects against concurrent evictions.
            minAvailable: 1
          deployment:
            # High-availability: 2 replicas with HPA; minimum 2 ensures PDB compatibility.
            replicas: 2
          hpa:
            enabled: true
            minReplicas: 2
            maxReplicas: 3
          config:
            envoyGateway:
              gateway:
                controllerName: gateway.envoyproxy.io/gatewayclass-controller
              logging:
                level:
                  default: warn
              rateLimit:
                backend:
                  type: Redis
                  redis:
                    # Externally-managed Redis (home-os redis-ha). Service
                    # name is `redis-ha-redis` in the redis-system namespace.
                    url: redis-ha-redis.redis-system.svc.cluster.local:6379
              provider:
                type: Kubernetes
                kubernetes:
                  rateLimitPDB:
                    maxUnavailable: 1
                  rateLimitDeployment:
                    replicas: 2
                    patch:
                      type: StrategicMerge
                      value:
                        spec:
                          template:
                            spec:
                              containers:
                                - imagePullPolicy: IfNotPresent
                                  name: envoy-ratelimit
                                  image: docker.io/envoyproxy/ratelimit:3fb70258
                                  # The Lyft ratelimit service reads the Redis
                                  # password from the REDIS_AUTH env var (the
                                  # EnvoyGateway rateLimit.backend.redis config
                                  # has no auth field). Secret `redis-ha-redis-auth`
                                  # (key `redis-password`) must exist in the
                                  # envoy-gateway-system namespace — provisioned
                                  # by an ExternalSecret from the ssegning-aws
                                  # store (mirror the redis-system one).
                                  env:
                                    - name: REDIS_AUTH
                                      valueFrom:
                                        secretKeyRef:
                                          name: redis-ha-redis-auth
                                          key: redis-password
              extensionApis:
                # Not strictly required, but recommended for backward/future compatibility.
                enableEnvoyPatchPolicy: true
                # Required: Enable Backend API for AI service backends.
                enableBackend: true
              # Required: AI Gateway needs to fine-tune xDS resources generated by Envoy Gateway.
              extensionManager:
                maxMessageSize: 50Mi
                #backendResources:
                #  - group: inference.networking.k8s.io
                #    kind: InferencePool
                #    version: v1
                hooks:
                  xdsTranslator:
                    translation:
                      listener:
                        includeAll: true
                      route:
                        includeAll: true
                      cluster:
                        includeAll: true
                      secret:
                        includeAll: true
                    post:
                      - Translation
                      - Cluster
                      - Route
                service:
                  fqdn:
                    # IMPORTANT: Update this to match your AI Gateway controller service
                    # Format: <service-name>.<namespace>.svc.cluster.local
                    # Default if you followed the installation steps above:
                    hostname: ai-gateway-controller.envoy-ai-gateway-system.svc.cluster.local
                    port: 1063
    destination:
      namespace: envoy-gateway-system

  - name: aieg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: oci://docker.io/envoyproxy/ai-gateway-helm
      targetRevision: v0.5.0
      path: .
      helm:
        releaseName: aieg
        valuesObject:
          controller:
            maxRecvMsgSize: "52428800"
            mutatingWebhook:
              certManager:
                enable: true
                issuerName: self-signed-ca
                certificateName: self-signed-cert-for-mutating-webhook-managed
          extProc:
            logLevel: info
    destination:
      namespace: envoy-ai-gateway-system

  - name: metrics-server
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://kubernetes-sigs.github.io/metrics-server/
      targetRevision: 3.13.0
      chart: metrics-server
      helm:
        releaseName: metrics-server
        valuesObject:
          args:
            - --kubelet-insecure-tls
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            - --kubelet-use-node-status-port
            - --metric-resolution=15s
          # Monitoring infrastructure: 2 replicas to avoid gaps in metrics during node drains.
          replicas: 2
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
    destination:
      namespace: kube-system

  - name: secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-ops-secrets.git
      targetRevision: HEAD
      path: manifests
    destination:
      namespace: manifests

  # --- Gateway ---
  - name: core-gateway
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: claude/magical-bohr-390242
      path: charts/core-gateway
      helm:
        releaseName: core-gateway
        valuesObject:
          gateway:
            apiHostname: api.ai.camer.digital
            # Gateway-API ACME ClusterIssuer. Must exist on the cluster —
            # provided externally (home-os). NOT defined in this repo
            # anymore (cert-manager + issuers are external). If TLS for
            # api.ai.camer.digital fails to issue, this issuer is missing
            # from home-os's cert chart.
            issuer: cert-home-cert-envoy
    destination:
      namespace: converse-gateway

  # --- Security & Policy ---
  - name: authorino-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://kuadrant.io/helm-charts
      # 0.24.0 per audit.
      targetRevision: 0.24.0
      chart: authorino-operator
      helm:
        releaseName: authorino-operator
    destination:
      namespace: authorino-system

  - name: security-policies
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: claude/magical-bohr-390242
      path: charts/kuadrant-policies
      helm:
        releaseName: security-policies
        valuesObject:
          instances:
            main:
              # HA — every request hits Authorino; run 2 replicas so it's
              # not a single point of failure / throughput bottleneck under
              # thousands of concurrent clients.
              replicas: 2
              listener:
                tls:
                  enabled: false
              oidcServer:
                tls:
                  enabled: false
              volumes:
                items:
                  - name: lightbridge-ca
                    mountPath: /etc/pki/tls/certs
                    secrets:
                      - authz-tls
                    items:
                      - key: ca.crt
                        path: lightbridge-ca.crt
          securityPolicies:
            main:
              gatewayName: core-gateway
              authorinoService: kuadrant-policies-main-authorino-authorization
          authConfigs:
            main:
              hosts:
                - api.ai.camer.digital
              # Keycloak clients whose `azp` claim identifies a service-account
              # token. Steps marked with `_skipForServiceAccounts: true` are
              # bypassed when the JWT's azp matches any entry below.
              # SA tokens still pass authentication (JWT verification); only
              # the lightbridge-opa metadata + dependent authorization are
              # skipped — their access is implicitly granted by membership in
              # this allowlist plus Keycloak role assignment.
              # See: docs/authorino-service-account-bypass.md
              serviceAccountClients:
                - adorsys-gis-github-ci
                - lightbridge-api-key
              authentication:
                keycloak:
                  jwt:
                    issuerUrl: https://auth.verif.fyi/realms/camer-digital
                    # Cache the OIDC config + JWKS (Authorino refreshes in
                    # the background on this interval, NOT per request — so
                    # token verification stays local/fast and the issuer is
                    # hit at most hourly). See note below on in-cluster certs.
                    ttl: 3600
                    # NOTE on fetching /certs in-cluster: Keycloak runs here
                    # (svc keycloak-ha-app-service.keycloak:8443), but a
                    # naive swap to that SVC URL breaks both (a) the `iss`
                    # match — tokens carry iss=https://auth.verif.fyi/... —
                    # and (b) TLS, since the cert is for the public hostname,
                    # not the SVC DNS name. The clean way to keep certs
                    # in-cluster WITHOUT breaking either is a CoreDNS rewrite
                    # of auth.verif.fyi → the Keycloak ClusterIP (belongs in
                    # home-os / cluster DNS). With ttl caching above, the
                    # JWKS fetch is already off the request hot path, so this
                    # is a resilience nicety, not a latency fix.
              metadata:
                "lightbridge-validation":
                  # Skip for service-account tokens — lightbridge-opa keys an
                  # external API-key directory that only contains human callers.
                  _skipForServiceAccounts: true
                  http:
                    url: https://lightbridge-opa.converse.svc.cluster.local:3000/v1/authorino/validate
                    method: POST
                    sharedSecretRef:
                      name: lightbridge-opa-auth
                      key: credentials
                    credentials:
                      authorizationHeader:
                        prefix: Basic
                    bodyParameters:
                      api_key:
                        selector: "context.request.http.headers.authorization.@extract:{\"sep\":\" \",\"pos\":1}"
                      ip:
                        selector: "context.request.http.headers.x-forwarded-for"
                    contentType: "application/json"
              # The `enforce-valid-key` authorization step was disabled in
              # commit db36eeb ("chore: authorization"). When re-enabling,
              # keep `_skipForServiceAccounts: true` so SA tokens bypass the
              # check — they have no lightbridge API key, so the metadata
              # call upstream is also skipped (see ADR-0003 and
              # docs/authorino-service-account-bypass.md).
              #authorization:
              #  "enforce-valid-key":
              #    _skipForServiceAccounts: true
              #    patternMatching:
              #      patterns:
              #        - selector: "auth.metadata.lightbridge-validation.project.id"
              #          operator: "neq"
              #          value: ""
              response:
                success:
                  dynamicMetadata:
                    "llm_project_id":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.project.id"
                    "llm_account_id":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.account.id"
                    "llm_api_key_id":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.api_key.id"
                    "llm_billing_plan":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.project.billing_plan"
                  headers:
                    "x-validated-jwt":
                      plain:
                        selector: "auth.identity.jwt"
                    "x-project-id":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.project.id"
                    "x-account-id":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.account.id"
                    "x-api-key-id":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.api_key.id"
                    "x-billing-plan":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.project.billing_plan"
                    "x-api-key-status":
                      plain:
                        selector: "auth.metadata.lightbridge-validation.api_key.status"
                    # ── x-oidc-* downstream header contract (ADR-0011) ────
                    # Set on every successful auth, for both human and SA tokens.
                    # Envoy access-log JSON sink reads these via %REQ(...)%
                    # (envoy-proxy.yaml); Alloy promotes user_id + azp to
                    # Loki labels (ADR-0005). The remaining headers ride in
                    # the access-log body and are queried via LogQL `| json`.
                    # See: docs/per-user-observability.md, ADR-0011
                    #
                    # IDENTITY — who made the request
                    "x-oidc-user-id":
                      plain:
                        # JWT `sub` — Keycloak user UUID. Stable per identity.
                        selector: "auth.identity.sub"
                    "x-oidc-user-name":
                      plain:
                        # `preferred_username` — for humans: their login;
                        # for SAs: `service-account-<clientid>`.
                        # Carried in the body; NOT a Loki label (cardinality).
                        selector: "auth.identity.preferred_username"
                    "x-oidc-azp":
                      plain:
                        # Authorized Party — the Keycloak client_id that
                        # requested the token. Bounded by registered client
                        # count; promoted to a Loki label.
                        selector: "auth.identity.azp"
                    "x-oidc-iss":
                      plain:
                        # Issuer URL. Multi-realm future-proofing; today one
                        # realm so the value is constant.
                        selector: "auth.identity.iss"
                    #
                    # AUTHORIZATION — what the caller is allowed to do
                    "x-oidc-roles-realm":
                      plain:
                        # `realm_access.roles` — realm-level role array,
                        # JSON-encoded. Bounded by realm role count.
                        selector: "auth.identity.realm_access.roles"
                    "x-oidc-resource-access":
                      plain:
                        # Full `resource_access` map, JSON-encoded — gives
                        # downstream services per-client role visibility
                        # without coordinating which client the gateway pins
                        # to. Format: {"converse":["admin"], "phoenix":[...]}
                        selector: "auth.identity.resource_access"
                    "x-oidc-scope":
                      plain:
                        # OAuth scopes granted, space-separated as per spec.
                        selector: "auth.identity.scope"
                    #
                    # TRACING — request-level correlation
                    "x-oidc-jti":
                      plain:
                        # JWT ID. Per-request unique; pair with x-request-id
                        # for cross-system tracing. Body only — NEVER a label.
                        selector: "auth.identity.jti"
                    #
                    # PROFILE (PII) — opt-in per ADR-0011; downstream services
                    # that surface these in their own logs MUST treat them as
                    # PII (redact, restrict, expire). Empty for SA tokens.
                    "x-oidc-email":
                      plain:
                        selector: "auth.identity.email"
                    "x-oidc-name":
                      plain:
                        # Full display name, e.g. "Stephane Segning".
                        selector: "auth.identity.name"

    destination:
      namespace: converse-gateway

  # --- Lightbridge Backend ---
  - name: lightbridge-backend
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "0"
    source:
      repoURL: https://adorsys-gis.github.io/lightbridge-authz
      targetRevision: 0.8.1
      chart: lightbridge
      helm:
        releaseName: lightbridge
        valuesObject:
          global:
            authz:
              image:
                version: "sha-efb4a5e451a5e4bde066b4ad1bd3c5d00c0959b6"
            authz_usage:
              image:
                version: "sha-efb4a5e451a5e4bde066b4ad1bd3c5d00c0959b6"
            authz_mcp:
              image:
                version: "sha-efb4a5e451a5e4bde066b4ad1bd3c5d00c0959b6"
            tls:
              enabled: false

          api:
            enabled: true
            configMaps:
              config:
                enabled: true
                data:
                  config.yaml: |
                    logging:
                      level: "${RUST_LOG}"
                    database:
                      url: "${DATABASE_URL}"
                      pool_size: 10
                    oauth2:
                      jwks_url: https://auth.verif.fyi/realms/camer-digital/protocol/openid-connect/certs
                      oauth2_url: "https://auth.verif.fyi/realms/camer-digital/protocol/openid-connect/token"
                      # Expected audience claim(s) in JWT tokens. Tokens must contain at least one matching audience value.
                      # This ensures tokens are intended for this service and prevents token misuse across services.
                      # Valid audience values:
                      #   - lightbridge-api-key: Primary audience for API Key service
                      audience:
                        - "lightbridge-api-key"
                      issuance:
                        enabled: true
                        grant_type: "urn:ietf:params:oauth:grant-type:token-exchange"
                        client_id: "${API_KEY_CLIENT_ID}"
                        client_secret: "${API_KEY_CLIENT_SECRET}"
                        subject_token_type: "urn:ietf:params:oauth:token-type:access_token"
                        requested_token_type: "urn:ietf:params:oauth:token-type:access_token"
                    server:
                      api:
                        address: 0.0.0.0
