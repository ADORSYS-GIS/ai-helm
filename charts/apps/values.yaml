          #                       type: query
          #                   datasource:
          #                     type: __expr__
          #                     uid: __expr__
          #                   expression: A
          #                   intervalMs: 1000
          #                   maxDataPoints: 43200
          #                   reducer: last
          #                   refId: B
          #                   type: reduce
          #               - refId: C
          #                 relativeTimeRange:
          #                   from: 600
          #                   to: 0
          #                 datasourceUid: __expr__
          #                 model:
          #                   conditions:
          #                     - evaluator:
          #                         params:
          #                           - 0
          #                         type: gt
