                      memory: "8Gi"
            - |
              apiVersion: v1
              kind: ResourceQuota
              metadata:
                name: converse-quota
                namespace: {{ $.Release.Namespace }}
              spec:
                hard:
                  requests.cpu: "4"
                  requests.memory: "7Gi"
                  limits.cpu: "15"
                  limits.memory: "17Gi"
                  count/pods: "35"
            - |
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: lightbridge-api-pdb
                namespace: {{ $.Release.Namespace }}
              spec:
                maxUnavailable: 1
                selector:
