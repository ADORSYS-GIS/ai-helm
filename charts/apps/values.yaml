global:

  # ── Pod Security Standards, per namespace (charts/apps-managed apps) ─────
  # Enforce level applied to a namespace via ArgoCD `managedNamespaceMetadata`
  # for every charts/apps app targeting it (consistent → no contention). This
  # is the per-cluster-kind knob: k3s/Hetzner enforces `baseline` cluster-wide
  # (forbids hostPath/host-net), so namespaces with such workloads need
  # `privileged`; a cluster with no Pod Security admission can ignore it;
  # per-env differences override via a $values multi-source (ADR-0018).
  #
  # Empty today: the observability stack (the workload that needs elevation)
  # is now the `observability` App-of-Apps orchestrator (ADR-0020), which
  # carries its OWN `podSecurityEnforce` and labels its children. Add an entry
  # here only for a privileged workload that stays a flat charts/apps app.
  namespacePodSecurity: {}

# ────────────────────────────────────────────────────────────────────────
# ArgoCD destination — the home-remote cluster every generated Application
# targets. Single source of truth for the cluster identity (was previously
# the hardcoded `lke560142-ctx` in the template — see ADR-0006, ADR-0017).
#
# Repo invariant: workloads must NEVER deploy to the cluster ArgoCD itself
# runs in. `templates/_helpers.tpl::apps.argocd.destinationClusterRef`
# hard-fails the render if this resolves to `in-cluster` /
# `https://kubernetes.default.svc` unless `allowInCluster: true`.
#
# Per-app `destination.namespace` (under each `applications[]` entry) still
# selects the namespace; the cluster identity is shared from here.
# ────────────────────────────────────────────────────────────────────────
argocd:
  # Prefix prepended to every generated Application name (so app `traefik`
  # → Application `aii-traefik`). Single source of truth — the template
  # references this, nothing is hardcoded. Note: the orchestrator children
  # (ai-models / librechart ApplicationSets) derive their names from their
  # own `helm.releaseName`, not this prefix, so they're unaffected.
  appNamePrefix: "aii-"
  # ── Two-tier destination model (ADR-0017) ──────────────────────────────
  # ArgoCD CONTROL objects (Application / ApplicationSet CRs) must live on
  # the cluster ArgoCD runs in (local), in the argocd namespace, so the
  # controllers watch them. WORKLOADS go to home-remote (the `destination`
  # block below). An app whose deployed content is itself a control object
  # (an orchestrator that emits an ApplicationSet) sets `controlPlane: true`
  # on its entry; the template then targets the local cluster instead.
  #
  # Use the canonical in-cluster SERVER URL (always recognised as the local
  # cluster by ArgoCD) rather than the `in-cluster` NAME, which depends on
  # that cluster being registered under that name.
  inClusterServer: "https://kubernetes.default.svc"
  controlPlaneNamespace: argocd
  # This repo, used as the source for kustomize `depsOverlay` sources (the
  # app-scoped dependency CRs of umbrella Applications — ADR-0018). The deps
  # overlays live under `environments/<env>/deps/<app>` in this repo.
  #
  # ── Deployment-revision strategy (canonical note) ───────────────────────
  # Deploys are TAG-BASED. This and every self-referencing `targetRevision` in
  # this repo (this `selfTargetRevision`, the per-app self-Source revisions, and
  # the orchestrator children in charts/ai-models + charts/librechart +
  # charts/observability) pin an immutable release **tag**, currently
  # `release-2026.06.21-v03`. `main` is NEVER a deploy target. To ship a new release:
  # cut a new `release-YYYY.MM.DD` tag from the desired commit, bump these
  # self-referencing `targetRevision`s to it (in the same commit the tag points
  # at, so the tag is self-consistent), then repoint the root `ai-apps-v2`
  # Application's targetRevision to the new tag. (HEAD revisions that point at
  # OTHER repos are unaffected.) History: deploys previously ran from the branch
  # `claude/magical-bohr-390242`; cut over to tags 2026-06-08.
  selfRepoURL: https://github.com/ADORSYS-GIS/ai-helm
  selfTargetRevision: release-2026.06.21-v03
  destination:
    # Cluster context name registered in ArgoCD. Used verbatim as
    # `spec.destination.name`. This is the WORKLOAD destination.
    name: home-remote
    # Alternative to `name` — set a cluster API URL for
    # `spec.destination.server` instead. Leave empty to use `name`.
    server: ""
    # Escape hatch — only set true if you genuinely want in-cluster.
    allowInCluster: false

applications:

  # NOTE: Traefik (ingress controller + the `traefik` IngressClass) is
  # NOT deployed by this repo — it's installed externally (running in the
  # `traefik` namespace on the target cluster). Charts here still set
  # `ingressClassName: traefik` / `className: traefik` on their Ingresses;
  # those resolve to the external controller. Don't re-add a traefik
  # Application here.

  # NOTE: the OpenTelemetry Operator is NOT deployed by this repo — it's
  # installed externally (running in the `opentelemetry-system` namespace;
  # CRDs opentelemetry.io present on-cluster). This repo only defines
  # OpenTelemetryCollector CRs (charts/core-gateway: the `-traces`
  # collector → Alloy → Tempo) that the external operator reconciles.
  # Don't re-add an otel-operator Application here.

  # --- Observability (App-of-Apps orchestrator) ---
  # Factored the whole observability stack (prometheus-operator-crds, alloy,
  # kube-state-metrics, node-exporter, grafana-operator, mimir, loki, tempo,
  # grafana, observability-dashboards) + a (disabled) secrets child into one
  # orchestrator. controlPlane: true — it emits Application CRs, so it targets
  # in-cluster/argocd; the children it renders target home-remote and carry
  # the privileged PodSecurity label. See ADR-0020.
  - name: observability
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    controlPlane: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/observability
      helm:
        releaseName: observability
        valuesObject: {}
    destination:
      namespace: observability

  # ─────────────────────────────────────────────────────────────────────────────
  # Notifications: Apprise API — STATELESS notify gateway for opencode-k8s-agent.
  # The agent (below) POSTs its report to this service's /notify with the channel
  # URLs in the request body (APPRISE_URLS), so this needs NO stored channel
  # config — hence no apprise-channels secret / persistence mount (that missing
  # mount was why the old pod hung 0/1). ADR-0036: the Grafana apprise path
  # (grafana-apprise-adapter + the external-alertmanager override) was removed —
  # Grafana notifies natively now; this lean apprise-api stays ONLY for the agent.
  # Source: https://github.com/ADORSYS-GIS/opencode-k8s-agent
  # ─────────────────────────────────────────────────────────────────────────────
  - name: apprise-api
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/opencode-k8s-agent.git
      # EXTERNAL repo — doesn't ride the ai-helm release tag; bump the SHA
      # deliberately (then re-release). Keep in sync with opencode-k8s-agent below.
      targetRevision: 5c8ca29c68922678a50b664074d2ecd0bafae7e4
      path: helm/apprise-api
      helm:
        releaseName: apprise-api
        valuesObject:
          apprise-api:
            controllers:
              main:
                replicas: 1
                containers:
                  main:
                    env:
                      # Stateless: only the /notify endpoint (urls supplied per
                      # request by the agent). No persistent stored configs.
                      APPRISE_STATEFUL_MODE: disabled
                    resources:
                      requests: { cpu: 100m, memory: 128Mi }
                      limits:   { cpu: 500m, memory: 512Mi }
            service:
              main:
                controller: main
                ports:
                  http:
                    port: 8000
    destination:
      namespace: monitoring
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # AI Monitoring: OpenCode K8s Agent — AI-powered cluster health monitor.
  # CronJob (every 12h): OpenCode + Kubernetes MCP investigate cluster state and
  # POST a report to apprise-api's /notify (channel URLs from APPRISE_URLS).
  #
  # Auth to the model gateway = the INTERNAL plane via the CronJob's OWN projected
  # k8s SA token (ADR-0037 / ADR-0021 one-time-job path) — NO Keycloak/OAuth2, NO
  # apiKey secret. The token (audience core-gateway-internal) is TokenReview'd by
  # the internal AuthConfig → "internal" tier. Mirrors LibreChat's transport
  # (api-internal listener + internal-CA trust); differs only in the credential.
  # The agent repo (PR: static bearer) reads OPENCODE_API_KEY as the Bearer; we
  # inject the SA token into it via the container command below.
  # Secret opencode-k8s-agent-secret (via ESO) now needs ONLY: APPRISE_URLS.
  # Source: https://github.com/ADORSYS-GIS/opencode-k8s-agent
  # ─────────────────────────────────────────────────────────────────────────────
  - name: opencode-k8s-agent
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    # Internal-CA trust bundle (ca.crt of self-signed-ca) → /etc/internal-ca for
    # NODE_EXTRA_CA_CERTS, to verify the api-internal listener's TLS (ADR-0018).
    depsOverlay: environments/prod/deps/opencode-k8s-agent
    source:
      repoURL: https://github.com/ADORSYS-GIS/opencode-k8s-agent.git
      # Pinned to a commit for a reproducible release. EXTERNAL repo — doesn't ride
      # the ai-helm release tag; bump deliberately (then re-release). This is the
      # squash-merge of the static-bearer change (ADORSYS-GIS/opencode-k8s-agent#6)
      # on the agent repo's main.
      targetRevision: e6f7b500a700abf3d334ec0d92fe9faf68173b45
      path: helm/opencode-k8s-agent
      helm:
        releaseName: opencode-k8s-agent
        valuesObject:
          opencode-k8s-agent:
            controllers:
              main:
                cronjob:
                  schedule: "0 */12 * * *"
                  concurrencyPolicy: Forbid
                  successfulJobsHistory: 1
                  failedJobsHistory: 1
                  backoffLimit: 1
                  activeDeadlineSeconds: 3600
                containers:
                  main:
                    # Inject the projected SA token (mounted at /var/run/secrets/
                    # gateway-token by the gateway-token volume) as the model Bearer,
                    # then hand off to the upstream entrypoint. run.sh envsubst's
                    # ${OPENCODE_API_KEY} into opencode.json. No Keycloak, no apiKey
                    # secret — the SA token IS the credential (ADR-0037).
                    command:
                      - /bin/bash
                      - -c
                      - 'export OPENCODE_API_KEY="$(cat /var/run/secrets/gateway-token/token)"; exec /bin/bash /config/run.sh'
                    env:
                      OPENCODE_MODEL: "minimax-m2.7"
                      # Internal plane (ADR-0021/0037): the api-internal listener via
                      # the stable core-gateway-internal ClusterIP (HTTPS, internal CA).
                      OPENCODE_BASE_URL: "https://core-gateway-internal.envoy-gateway-system.svc.cluster.local/v1"
                      # Trust the internal CA for that TLS; ca.crt mounted by the
                      # internal-ca volume below.
                      NODE_EXTRA_CA_CERTS: "/etc/internal-ca/ca.crt"
                      # The agent POSTs its report to apprise-api's /notify with the
                      # channel URLs (APPRISE_URLS) in the body — it has no built-in
                      # notifier (apprise-api kept lean, ADR-0036).
                      APPRISE_API_URL: "http://apprise-api.monitoring.svc.cluster.local:8000"
                    # Secret (via ESO) now needs ONLY: APPRISE_URLS (notification
                    # channels). No OPENCODE_API_KEY / KEYCLOAK_* — auth is the SA token.
                    envFrom:
                      - secretRef:
                          name: opencode-k8s-agent-secret
                    resources:
                      requests: { cpu: 100m, memory: 256Mi }
                      limits:   { cpu: 1000m, memory: 1Gi }
            persistence:
              # Projected SA token for the internal gateway. The audience MUST match
              # the internal AuthConfig's kubernetesTokenReview (core-gateway-internal).
              # app-template type:custom → raw projected volumeSpec.
              gateway-token:
                type: custom
                volumeSpec:
                  projected:
                    sources:
                      - serviceAccountToken:
                          audience: core-gateway-internal
                          expirationSeconds: 3600
                          path: token
                globalMounts:
                  - path: /var/run/secrets/gateway-token
                    readOnly: true
              # Internal-CA trust bundle (ca.crt only) from the deps-overlay
              # Certificate (self-signed-ca). Mounted for NODE_EXTRA_CA_CERTS.
              internal-ca:
                type: secret
                name: opencode-k8s-internal-ca
                globalMounts:
                  - path: /etc/internal-ca
                    readOnly: true
    destination:
      namespace: monitoring
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # NOTE: CloudNativePG (the `cnpg` operator) and the Barman Cloud plugin
  # (`cnpg-barman-cloud`) are NOT deployed by this repo — both are
  # installed externally (running in the `cnpg-system` namespace; CRDs
  # postgresql.cnpg.io + barmancloud.cnpg.io present on-cluster). Charts
  # here still define CNPG `Cluster` CRs (e.g. charts/coder-db) and rely
  # on the external operator + plugin to reconcile them. Don't re-add a
  # cnpg or plugin-barman-cloud Application here.

  # NOTE: cert-manager is NOT deployed by this repo. It's managed
  # externally (home-os repo: charts/cert via the `cert-remote`
  # Application, releaseName `cert`, in kube-system on the home-remote
  # cluster). That deployment installs the cert-manager controller +
  # CRDs AND the shared cluster-scoped ClusterIssuers this repo
  # references: `cert-home-cert-http` and `self-signed-ca`.
  #
  # GAP: home-os's cert chart does NOT yet define `cert-home-cert-envoy`
  # (the Gateway-API / gatewayHTTPRoute ACME issuer that core-gateway
  # uses for api.ai.camer.digital — see the `gateway.issuer` value
  # below). That issuer must be added to home-os, otherwise the Envoy
  # gateway's ACME cert won't be issued. Tracked out-of-band.
  # Do not re-add a cert Application here.

  # --- Secret Management ---
  # NOTE: the External Secrets Operator (controller + CRDs) is NOT
  # installed by this repo — it's deployed externally (Helm-managed in
  # the `external-secrets` namespace on the target cluster). The
  # ClusterSecretStore in use is `ssegning-aws` (cluster-scoped, also
  # external — verified on-cluster). This repo's old Vault-based
  # `bootstrap-secrets` store config (charts/external-secrets) was
  # removed: it was never the store actually used. Don't re-add an ESO
  # operator or ClusterSecretStore here.
  #
  # ExternalSecret CRs are now OWNED by the charts that need them
  # (ai-models-backends, librechat-app, observability-secrets, and the
  # per-app `environments/<env>/deps/*` overlays), each referencing the
  # `ssegning-aws` store directly. The old `secrets` Application that
  # pulled them wholesale from ai-ops-secrets.git has been removed — that
  # repo is being decommissioned as each secret migrates in-chart.

  # --- Core Infrastructure ---
  # NOTE: Redis is NOT deployed by this repo. It's managed externally
  # (home-os repo: charts/home-apps/redis-ha → redis-ha-redis in the
  # redis-system namespace on the home-remote cluster). Consumers here
  # point at `redis-ha-redis.redis-system.svc.cluster.local:6379`.
  # Do not re-add a redis Application here.

  - name: aieg-crd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: oci://docker.io/envoyproxy/ai-gateway-crds-helm
      # v0.7.0 — keep in lockstep with ai-gateway-helm below. Floor is still
      # Envoy Gateway v1.7.0+ (we run v1.8.0 ✓; no upper bound). v1alpha1 is
      # still served (storage stays v1beta1) so our v1alpha1 CRs keep working
      # via the conversion webhook. v0.7 audit (vs v0.6): MCPRoute CRD incl.
      # securityPolicy.oauth is byte-for-byte unchanged (ADR-0038 safe); the
      # ONE breaking change — AIGatewayRoute.spec.rules cap 128→15 — doesn't
      # touch us (every model route has 1 rule). Bumped v0.6.0→v0.7.0 chasing
      # the MCP-proxy bug with external hosted MCPs (context7/firecrawl/refero);
      # v0.7 adds the spaceless-SSE decode fix (#2155) + tools/list authz
      # filtering (#2106).
      targetRevision: v0.7.0
      path: .
      helm:
        releaseName: aieg-crd
    destination:
      namespace: envoy-ai-gateway-system

  - name: eg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    # Umbrella (ADR-0018): app-scoped dep — the redis-ha-redis-auth
    # ExternalSecret the rate-limit service's REDIS_AUTH env reads. Folded in
    # as a second (kustomize) source pointing at this repo.
    depsOverlay: environments/prod/deps/eg
    source:
      repoURL: oci://docker.io/envoyproxy/gateway-helm
      # v1.8.0 (2026-05-13) per audit. Clean minor; no CRD breaking changes.
      targetRevision: v1.8.0
      path: .
      helm:
        releaseName: eg
        valuesObject:
          podDisruptionBudget:
            # Critical Gateway infrastructure: PDB protects against concurrent evictions.
            minAvailable: 1
          deployment:
            # High-availability: 2 replicas with HPA; minimum 2 ensures PDB compatibility.
            replicas: 2
          hpa:
            enabled: true
            minReplicas: 2
            maxReplicas: 3
          config:
            envoyGateway:
              gateway:
                controllerName: gateway.envoyproxy.io/gatewayclass-controller
              logging:
                level:
                  default: warn
              rateLimit:
                backend:
                  type: Redis
                  redis:
                    # Externally-managed Redis (home-os redis-ha). Point at the
                    # HAProxy MASTER-ROUTER (redis-ha-haproxy), NOT the round-robin
                    # `redis-ha-redis` Service — the latter LBs master+replica, so the
                    # rate-limiter's counter writes (INCR/EXPIRE) hit the read-only
                    # replica ~50% of the time → "READONLY" → limits silently fail.
                    # HAProxy routes only to the `role:master` pod, following Sentinel
                    # failover. Same TLS/CA (REDIS_TLS + the self-signed-ca cert below;
                    # the haproxy cert SAN covers this host).
                    url: redis-ha-haproxy.redis-system.svc.cluster.local:6379
              provider:
                type: Kubernetes
                kubernetes:
                  rateLimitPDB:
                    maxUnavailable: 1
                  rateLimitDeployment:
                    replicas: 2
                    patch:
                      type: StrategicMerge
                      value:
                        spec:
                          template:
                            spec:
                              containers:
                                - imagePullPolicy: IfNotPresent
                                  name: envoy-ratelimit
                                  image: docker.io/envoyproxy/ratelimit:3fb70258
                                  # The Lyft ratelimit service reads the Redis
                                  # password from the REDIS_AUTH env var (the
                                  # EnvoyGateway rateLimit.backend.redis config
                                  # has no auth field). Secret `redis-ha-redis-auth`
                                  # (key `redis-password`) is provisioned into
                                  # envoy-gateway-system by this app's umbrella
                                  # depsOverlay ExternalSecret
                                  # (environments/<env>/deps/eg) — ADR-0018.
                                  env:
                                    - name: REDIS_AUTH
                                      valueFrom:
                                        secretKeyRef:
                                          name: redis-ha-redis-auth
                                          key: redis-password
                                    # redis-ha is TLS-ONLY (redis.conf: port 0 /
                                    # tls-port 6379) with an internal CA ("Home
                                    # SSegning Root CA" via self-signed-ca) and
                                    # tls-auth-clients no. Connect over TLS and
                                    # trust that CA via the cert-manager-issued
                                    # `ratelimit-redis-ca` secret's ca.crt (same
                                    # root that signs redis) — no client cert
                                    # needed. CA provisioned by the eg umbrella
                                    # depsOverlay (environments/<env>/deps/eg).
                                    - name: REDIS_TLS
                                      value: "true"
                                    - name: REDIS_TLS_CACERT
                                      value: /etc/redis-ca/ca.crt
                                  volumeMounts:
                                    - name: redis-ca
                                      mountPath: /etc/redis-ca
                                      readOnly: true
                              volumes:
                                - name: redis-ca
                                  secret:
                                    secretName: ratelimit-redis-ca
                                    items:
                                      - key: ca.crt
                                        path: ca.crt
              extensionApis:
                # Not strictly required, but recommended for backward/future compatibility.
                enableEnvoyPatchPolicy: true
                # Required: Enable Backend API for AI service backends.
                enableBackend: true
              # Required: AI Gateway needs to fine-tune xDS resources generated by Envoy Gateway.
              extensionManager:
                maxMessageSize: 50Mi
                #backendResources:
                #  - group: inference.networking.k8s.io
                #    kind: InferencePool
                #    version: v1
                hooks:
                  xdsTranslator:
                    translation:
                      listener:
                        includeAll: true
                      route:
                        includeAll: true
                      cluster:
                        includeAll: true
                      secret:
                        includeAll: true
                    post:
                      - Translation
                      - Cluster
                      - Route
                service:
                  fqdn:
                    # IMPORTANT: Update this to match your AI Gateway controller service
                    # Format: <service-name>.<namespace>.svc.cluster.local
                    # Default if you followed the installation steps above:
                    hostname: ai-gateway-controller.envoy-ai-gateway-system.svc.cluster.local
                    port: 1063
    destination:
      namespace: envoy-gateway-system

  - name: aieg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: oci://docker.io/envoyproxy/ai-gateway-helm
      # v0.7.0 — keep in lockstep with ai-gateway-crds-helm above (see its note
      # for the v0.7 compatibility/breaking-change audit). Floor EG v1.7.0+
      # (we run v1.8.0 ✓). Controller values below are unchanged across v0.6→v0.7
      # (verified: maxRecvMsgSize, mutatingWebhook.certManager, extProc.logLevel
      # all still valid). NB v0.7 tools/list now hides tools the caller can't
      # invoke (authz filtering) — expected, not a regression.
      targetRevision: v0.7.0
      path: .
      helm:
        releaseName: aieg
        valuesObject:
          controller:
            maxRecvMsgSize: "52428800"
            mutatingWebhook:
              certManager:
                enable: true
                issuerName: self-signed-ca
                certificateName: self-signed-cert-for-mutating-webhook-managed
          extProc:
            logLevel: info
    destination:
      namespace: envoy-ai-gateway-system

  # NOTE: no `metrics-server` app here — we deliberately do NOT ship one (ADR-0054).
  # k3s bundles its own metrics-server addon (sourced from the server's on-disk
  # manifests), which kept squatting the `metrics-server` Deployment/Service name
  # and reverting our GitOps copy → the Service selector (app.kubernetes.io/*) no
  # longer matched the k3s pod (k8s-app only) → empty endpointslice →
  # `v1beta1.metrics.k8s.io` MissingEndpoints → `kubectl top`/HPA dead, every sync.
  # Rather than fight the addon (which needs `--disable metrics-server` + a CP node
  # reprovision per hetzner-k8s ADR-0015), we let the healthy k3s one serve metrics
  # and own the APIService. Don't re-add this entry — see ADR-0054.

  # --- Gateway ---
  - name: core-gateway
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/core-gateway
      helm:
        releaseName: core-gateway
        valuesObject:
          gateway:
            apiHostname: api.ai.camer.digital
            # api-https TLS via an in-chart ns-scoped ACME Issuer that solves
            # HTTP-01 THROUGH this Gateway (no DNS token, fully self-contained).
            # The challenge is reachable because api.<domain> resolves to the
            # Envoy LB whose :80 listener is up while api-https is certless.
            # Requires cert-manager `--enable-gateway-api` (enabled in home-os).
            acmeHttp01:
              enabled: true
              email: selastlambou@protonmail.com
            # (fallback when acmeHttp01.enabled=false: external issuer by name/kind,
            #  e.g. issuer: cert-cloudflare / issuerKind: ClusterIssuer for DNS-01.)
            # Vanity/alias domain redirects (ADR-0053): we own kivoyo.com and its
            # api.ai.kivoyo.com DNS already points at this Gateway's LB, so we
            # 307-redirect it (temporary, method-preserving, path+query kept) to
            # the canonical api.ai.camer.digital. Each entry gets its own HTTPS
            # listener + ACME cert (reusing the acmeHttp01 issuer above) — see
            # charts/core-gateway/templates/redirect-hosts.yaml. (The web UI
            # ai.kivoyo.com is redirected separately via Traefik in
            # charts/librechat-app.)
            redirectHosts:
              - name: kivoyo-api
                from: api.ai.kivoyo.com
                to: api.ai.camer.digital
                statusCode: 307
    destination:
      namespace: converse-gateway

  # --- Security & Policy ---
  - name: authorino-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://kuadrant.io/helm-charts
      # 0.23.1 — latest published at kuadrant.io/helm-charts (0.24.0 was a
      # bad pin: ArgoCD ComparisonError "chart … version 0.24.0 not found").
      # Bundles AuthConfig v1beta3 + Authorino v1beta1, which security-policies
      # depends on. Verify with `helm show chart` before bumping.
      targetRevision: 0.23.1
      chart: authorino-operator
      helm:
        releaseName: authorino-operator
    destination:
      namespace: authorino-system

  - name: security-policies
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    # Umbrella (ADR-0018): app-scoped dep — the `authz-tls` CA secret the
    # Authorino instance mounts (ca.crt) to trust the TLS lightbridge-opa
    # metadata endpoint. Folded in as a second (kustomize) source.
    depsOverlay: environments/prod/deps/security-policies
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/kuadrant-policies
      helm:
        releaseName: security-policies
        valuesObject:
          instances:
            main:
              # HA — every request hits Authorino; run 2 replicas so it's
              # not a single point of failure / throughput bottleneck under
              # thousands of concurrent clients.
              replicas: 2
              # Let the "*" catch-all AuthConfig (deny-all, below) coexist with
              # the specific-host configs — most-specific host wins (ADR-0021).
              supersedingHostSubsets: true
              listener:
                tls:
                  enabled: false
              oidcServer:
                tls:
                  enabled: false
              volumes:
                items:
                  - name: lightbridge-ca
                    mountPath: /etc/pki/tls/certs
                    secrets:
                      - authz-tls
                    items:
                      - key: ca.crt
                        path: lightbridge-ca.crt
          securityPolicies:
            main:
              gatewayName: core-gateway
              authorinoService: kuadrant-policies-main-authorino-authorization
          # ExternalSecret for the X-Internal-Token the `repobinding` metadata
          # step presents to lightbridge-repo-auth (ADR-0047). Same value the
          # service reads in `converse` from the same remote property.
          # ⚠️ The remote property MUST exist in ssegning-aws BEFORE releasing —
          # a sharedSecretRef to a missing Secret makes the main AuthConfig fail
          # readiness → gateway-wide 404 (the OPA-removal failure mode).
          repoAuthInternalSecret:
            enabled: true
            remoteKey: ai/camer/digital/prod/env
            property: repo_auth_resolve_internal_token
          authConfigs:
            main:
              hosts:
                - api.ai.camer.digital
              # Keycloak clients whose `azp` claim identifies a service-account
              # token. `_skipForServiceAccounts: true` on a step bypasses it for
              # these clients. No such step exists today (OPA validation removed
              # below), but the allowlist is retained for when OPA burst-control
              # returns. See: docs/authorino-service-account-bypass.md
              serviceAccountClients:
                - adorsys-gis-github-ci
                - lightbridge-api-key
              authentication:
                keycloak:
                  jwt:
                    issuerUrl: https://auth.verif.fyi/realms/camer-digital
                    # Cache the OIDC config + JWKS (Authorino refreshes in
                    # the background on this interval, NOT per request — so
                    # token verification stays local/fast and the issuer is
                    # hit at most hourly). See note below on in-cluster certs.
                    ttl: 3600
                    # NOTE on fetching /certs in-cluster: Keycloak runs here
                    # (svc keycloak-ha-app-service.keycloak:8443), but a
                    # naive swap to that SVC URL breaks both (a) the `iss`
                    # match — tokens carry iss=https://auth.verif.fyi/... —
                    # and (b) TLS, since the cert is for the public hostname,
                    # not the SVC DNS name. The clean way to keep certs
                    # in-cluster WITHOUT breaking either is a CoreDNS rewrite
                    # of auth.verif.fyi → the Keycloak ClusterIP (belongs in
                    # home-os / cluster DNS). With ttl caching above, the
                    # JWKS fetch is already off the request hot path, so this
                    # is a resilience nicety, not a latency fix.
                # ── GitHub Actions OIDC (ADR-0047) ─────────────────────────────
                # CI runners present their RAW GitHub Actions OIDC token. We only
                # validate it here (issuer below); the repo→account binding is
                # enforced by the `repobinding` metadata + `repo-binding-allowed`
                # authorization steps, both `when`-gated to this issuer so the
                # Keycloak path above is completely unaffected. Authorino does not
                # enforce `aud` (SkipClientIDCheck) — the per-customer audience is
                # validated against the Source by lightbridge-repo-auth.
                github-actions:
                  jwt:
                    issuerUrl: https://token.actions.githubusercontent.com
                    ttl: 3600
              # NOTE (2026-06-04): the lightbridge-opa `lightbridge-validation`
              # metadata source AND its `enforce-valid-key` authorization step
              # were REMOVED. Authorization is now Keycloak's job — a valid
              # Keycloak JWT (verified above) means the caller is in our system
              # and may use the gateway. OPA is reserved for future *burst
              # control* only (not required yet). Dropping it also removes the
              # hard dependency on the `lightbridge-opa-auth` Secret + the
              # lightbridge-opa backend, whose absence made the AuthConfig fail
              # readiness → "Service not found" 404 on every request. The
              # rate-limit accounting headers are now JWT-derived (see response).
              # ── GitHub Actions binding (ADR-0047) ──────────────────────────────
              # Both steps run ONLY for GitHub-issued tokens (the `when` predicate),
              # so Keycloak/SA requests skip them. lightbridge-repo-auth returns 403
              # on a failed binding (→ this metadata fetch fails → request denied);
              # `repo-binding-allowed` is the deterministic secondary gate.
              metadata:
                "repobinding":
                  when:
                    - selector: auth.identity.iss
                      operator: eq
                      value: https://token.actions.githubusercontent.com
                  http:
                    url: http://lightbridge-repo-auth.converse.svc.cluster.local:3000/v1/resolve
                    method: POST
                    contentType: application/json
                    # Shared secret → X-Internal-Token header. The resolve endpoint
                    # is ClusterIP-only and trusts the posted claims only with it.
                    # Secret lives in THIS (Authorino) namespace; provisioned by ESO.
                    credentials:
                      customHeader:
                        name: X-Internal-Token
                    sharedSecretRef:
                      name: lightbridge-repo-auth-internal
                      key: internal-token
                    bodyParameters:
                      audience:
                        selector: auth.identity.aud
                      repository_owner_id:
                        selector: auth.identity.repository_owner_id
                      repository_id:
                        selector: auth.identity.repository_id
                      repository:
                        selector: auth.identity.repository
                      subject:
                        selector: auth.identity.sub
              authorization:
                "repo-binding-allowed":
                  when:
                    - selector: auth.identity.iss
                      operator: eq
                      value: https://token.actions.githubusercontent.com
                  patternMatching:
                    patterns:
                      # Present + non-empty only on a 200 allow (mirrors the proven
                      # `.id neq ""` form, not a boolean compare).
                      - selector: auth.metadata.repobinding.account_id
                        operator: neq
                        value: ""
              response:
                success:
                  headers:
                    "x-validated-jwt":
                      plain:
                        selector: "auth.identity.jwt"
                    # Rate-limit accounting consumed by the per-model
                    # BackendTrafficPolicy (ADR-0021), all JWT-derived:
                    #   x-account-id → per-user burst bucket
                    #   x-org-id     → per-org monthly budget bucket
                    #   x-billing-plan → tier selector (free/pro/service)
                    # x-billing-plan / x-org-id use a CEL default so the Keycloak
                    # claims are NOT required in the JWT:
                    #   billing_plan absent → "free"
                    #   organization absent → the user (sub), so no-org callers get
                    #   their OWN budget bucket rather than all sharing one.
                    # SA clients can still carry billing_plan="service". (The
                    # internal-plane AuthConfig sets x-billing-plan="internal".)
                    # ADR-0047: GitHub CI tokens → the bound account + its plan
                    # (from the `repobinding` metadata, present only on the GitHub
                    # path); every other identity → the prior Keycloak-derived
                    # values, unchanged. CEL short-circuits the ternary, so the
                    # else-branch never touches the absent metadata.
                    "x-account-id":
                      plain:
                        expression: 'has(auth.metadata.repobinding) ? string(auth.metadata.repobinding.account_id) : string(auth.identity.sub)'
                    "x-org-id":
                      plain:
                        expression: 'has(auth.metadata.repobinding) ? string(auth.metadata.repobinding.account_id) : (has(auth.identity.organization) ? string(auth.identity.organization) : string(auth.identity.sub))'
                    "x-billing-plan":
                      plain:
                        expression: 'has(auth.metadata.repobinding) ? string(auth.metadata.repobinding.billing_plan) : (has(auth.identity.billing_plan) ? string(auth.identity.billing_plan) : "free")'
                    # ── x-oidc-* downstream header contract (ADR-0011) ────
                    # Set on every successful auth, for both human and SA tokens.
                    # Envoy access-log JSON sink reads these via %REQ(...)%
                    # (envoy-proxy.yaml); Alloy promotes user_id + azp to
                    # Loki labels (ADR-0005). The remaining headers ride in
                    # the access-log body and are queried via LogQL `| json`.
                    # See: docs/per-user-observability.md, ADR-0011
                    #
                    # IDENTITY — who made the request
                    "x-oidc-user-id":
                      plain:
                        # JWT `sub` — Keycloak user UUID. Stable per identity.
                        # Normally guaranteed, but a mis-configured token-exchange
                        # (impersonation not wired) can drop it — observed live as
                        # user_id="-". Sentinel-guard so that failure is named,
                        # not silently empty.
                        expression: 'has(auth.identity.sub) ? string(auth.identity.sub) : (has(auth.identity.repository) ? "missing:github:sub" : "missing:keycloak:sub")'
                    "x-oidc-user-name":
                      plain:
                        # `preferred_username` — for humans: their login;
                        # for SAs: `service-account-<clientid>`.
                        # Carried in the body; NOT a Loki label (cardinality).
                        # ADR-0047 guard (extended). SENTINEL CONVENTION: a
                        # missing claim must resolve to a descriptive
                        # "missing:<issuer>:<claim>" marker — NEVER "". An empty
                        # value is dropped by Loki (the label vanishes) so the gap
                        # becomes invisible; a sentinel makes the exact failure
                        # obvious at a glance. (A bare selector would instead stamp
                        # the opaque literal "<nil>".) ISSUER-QUALIFY: this plane
                        # serves two issuers, told apart by the GitHub-only
                        # `repository` claim — so a missing claim is tagged
                        # "missing:github:<claim>" (often expected: GitHub OIDC
                        # tokens carry no preferred_username/email/scope) vs
                        # "missing:keycloak:<claim>" (a real Keycloak token/client
                        # gap). The dashboard's "(missing|unstamped):.*" exclusion
                        # still matches all forms.
                        expression: 'has(auth.identity.preferred_username) ? string(auth.identity.preferred_username) : (has(auth.identity.repository) ? "missing:github:preferred_username" : "missing:keycloak:preferred_username")'
                    "x-oidc-azp":
                      plain:
                        # Authorized Party — the Keycloak client_id that
                        # requested the token. Bounded by registered client
                        # count; promoted to a Loki label.
                        # GitHub Actions OIDC tokens (ADR-0047) carry NO azp
                        # claim → a bare selector stamped "<nil>" as the azp
                        # label (the junk row in the per-user dashboard). Guard
                        # it: Keycloak tokens keep their azp; GitHub identities
                        # (detected via the repository claim) fall back to a
                        # stable "github-actions" label so CI stays filterable
                        # by Client instead of polluting it with "<nil>".
                        expression: 'has(auth.identity.azp) ? string(auth.identity.azp) : (has(auth.identity.repository) ? "github-actions" : "missing:keycloak:azp")'
                    "x-oidc-iss":
                      plain:
                        # Issuer URL. Multi-realm future-proofing; today one
                        # realm so the value is constant.
                        selector: "auth.identity.iss"
                    #
                    # AUTHORIZATION — what the caller is allowed to do
                    "x-oidc-roles-realm":
                      plain:
                        # `realm_access.roles` — realm-level role array,
                        # JSON-encoded. Bounded by realm role count.
                        selector: "auth.identity.realm_access.roles"
                    "x-oidc-resource-access":
                      plain:
                        # Full `resource_access` map, JSON-encoded — gives
                        # downstream services per-client role visibility
                        # without coordinating which client the gateway pins
                        # to. Format: {"converse":["admin"], "phoenix":[...]}
                        selector: "auth.identity.resource_access"
                    "x-oidc-scope":
                      plain:
                        # OAuth scopes granted, space-separated as per spec.
                        # has()-guard (ADR-0047): scope-poor/lightweight tokens
                        # may omit it → "missing:scope" sentinel (see convention
                        # above; never "", which Loki drops and hides the gap).
                        expression: 'has(auth.identity.scope) ? string(auth.identity.scope) : (has(auth.identity.repository) ? "missing:github:scope" : "missing:keycloak:scope")'
                    #
                    # TRACING — request-level correlation
                    "x-oidc-jti":
                      plain:
                        # JWT ID. Per-request unique; pair with x-request-id
                        # for cross-system tracing. Body only — NEVER a label.
                        # has()-guard (ADR-0047): tokens without jti → "missing:jti".
                        expression: 'has(auth.identity.jti) ? string(auth.identity.jti) : (has(auth.identity.repository) ? "missing:github:jti" : "missing:keycloak:jti")'
                    #
                    # PROFILE (PII) — opt-in per ADR-0011; downstream services
                    # that surface these in their own logs MUST treat them as
                    # PII (redact, restrict, expire). Empty for SA tokens.
                    # ADR-0047: GitHub Actions OIDC tokens carry no email/name
                    # claim at all — a bare selector against a missing claim
                    # let Authorino/Envoy/Loki stamp the degenerate "-" / nil
                    # placeholder straight into these PII headers, surfacing
                    # as junk "-"/"<nil>" rows in the per-user dashboard.
                    # has()-guard like x-billing-plan above; GitHub identities
                    # fall back to "owner/repo" (still no real PII) instead.
                    "x-oidc-email":
                      plain:
                        # Issuer-qualified sentinel (see convention above):
                        # "missing:github:email" is EXPECTED (GitHub OIDC tokens
                        # carry no email), while "missing:keycloak:email" flags a
                        # real Keycloak token/client gap worth chasing.
                        # ⚠️ DASHBOARD COUPLING: the per-user board's _SELECTOR
                        # keys on email=~"$email" and relied on an EMPTY email to
                        # drop service-account/no-email traffic from the per-user
                        # (human) panels. With a non-empty sentinel, that traffic
                        # is no longer auto-excluded — the board's selector now
                        # filters it explicitly (email!~"(missing|unstamped):.*"),
                        # keeping the gap visible in raw queries while preserving
                        # "per-user = humans".
                        expression: 'has(auth.identity.email) ? string(auth.identity.email) : (has(auth.identity.repository) ? "missing:github:email" : "missing:keycloak:email")'
                    "x-oidc-name":
                      plain:
                        # Full display name, e.g. "Stephane Segning"; GitHub
                        # CI falls back to the repository slug, e.g.
                        # "ADORSYS-GIS/ai-helm"; no name claim AND not GitHub →
                        # "missing:keycloak:name" sentinel (never "") so the
                        # nameless bucket is self-identifying in the Top-15.
                        expression: 'has(auth.identity.name) ? string(auth.identity.name) : (has(auth.identity.repository) ? string(auth.identity.repository) : "missing:keycloak:name")'

            # ── Internal plane (ADR-0021) ──────────────────────────────────────
            internal:
              # In-cluster callers reach the gateway via the k8s svc-DNS host
              # (the api-internal listener), authenticated by EITHER credential —
              # chosen by client lifecycle (ADR-0021), NO Keycloak:
              #   • one-time tasks (cron-jobs / Jobs) → their projected k8s SA
              #     token, validated via the apiserver TokenReview (the cluster is
              #     the issuer). A short job finishes before the token expires, so
              #     there's no rotation to manage. Token audience must be below.
              #   • long-running services (LibreChat, …) → a static apiKey Secret
              #     (labeled kuadrant.io/apikey-for=internal-gateway, ESO-provisioned
              #     in this ns). No rotation, no sidecar — the service just sends it
              #     as `Authorization: Bearer <key>` (LibreChat's CONVERSE_OPENAI_API_KEY).
              # Either way the "internal" tier applies (uncapped, burst-only).
              hosts:
                - core-gateway-internal.envoy-gateway-system.svc.cluster.local
              authentication:
                kubernetes-sa:
                  kubernetesTokenReview:
                    audiences:
                      - core-gateway-internal
                api-key:
                  apiKey:
                    selector:
                      matchLabels:
                        kuadrant.io/apikey-for: internal-gateway
                  credentials:
                    authorizationHeader:
                      prefix: Bearer
              response:
                success:
                  headers:
                    # Identity resolution (ADR-0021). A trusted service (LibreChat)
                    # may forward the END-USER's Keycloak sub in `X-LibreChat-User`;
                    # when present we attribute the request to that USER — so a
                    # person's LibreChat + opencode usage share ONE account/budget.
                    # Otherwise (cron-jobs / raw service calls) we fall back to the
                    # authenticated identity: SA username (TokenReview) or the apiKey
                    # Secret name. Envoy lowercases request.headers keys.
                    "x-account-id":
                      plain:
                        expression: '"x-librechat-user" in request.headers && request.headers["x-librechat-user"] != "" ? request.headers["x-librechat-user"] : (has(auth.identity.user) ? string(auth.identity.user.username) : string(auth.identity.metadata.name))'
                    # Per-user monthly-budget bucket on the same key as the account
                    # (no separate org for forwarded users); services hit the
                    # uncapped internal tier, so this is moot for them.
                    "x-org-id":
                      plain:
                        expression: '"x-librechat-user" in request.headers && request.headers["x-librechat-user"] != "" ? request.headers["x-librechat-user"] : (has(auth.identity.user) ? string(auth.identity.user.username) : string(auth.identity.metadata.name))'
                    # Tier: forwarded user → role→tier (X-LibreChat-Role == "pro" →
                    # pro else free; ADJUST "pro" to match your Keycloak
                    # librechat_roles value for paid users). No forwarded user → the
                    # uncapped "internal" service tier (burst-only).
                    "x-billing-plan":
                      plain:
                        expression: '"x-librechat-user" in request.headers && request.headers["x-librechat-user"] != "" ? (("x-librechat-role" in request.headers && request.headers["x-librechat-role"] == "pro") ? "pro" : "free") : "internal"'
                    # Metering (ADR-0011): user-id = the end user (or service); azp =
                    # ALWAYS the authenticated service/SA that forwarded it; email =
                    # the forwarded user email when present.
                    "x-oidc-user-id":
                      plain:
                        expression: '"x-librechat-user" in request.headers && request.headers["x-librechat-user"] != "" ? request.headers["x-librechat-user"] : (has(auth.identity.user) ? string(auth.identity.user.username) : string(auth.identity.metadata.name))'
                    "x-oidc-azp":
                      plain:
                        expression: 'has(auth.identity.user) ? string(auth.identity.user.username) : string(auth.identity.metadata.name)'
                    "x-oidc-email":
                      plain:
                        # Forwarded end-user email (LibreChat → X-LibreChat-Email)
                        # when present & non-empty; else a PLANE-QUALIFIED sentinel
                        # (never "") so the source is obvious at a glance, distinct
                        # from the external plane's bare "missing:email":
                        #   missing:librechat:email — a forwarded LibreChat user the
                        #     app did not forward an email for (actionable gap)
                        #   missing:service:email   — a non-human caller (cron/SA),
                        #     which legitimately has no email
                        # Both keep the row OUT of per-user (human) panels (the
                        # board excludes "(missing|unstamped):.*") while staying
                        # visible in Overall.
                        expression: '"x-librechat-email" in request.headers && request.headers["x-librechat-email"] != "" ? request.headers["x-librechat-email"] : ("x-librechat-user" in request.headers && request.headers["x-librechat-user"] != "" ? "missing:librechat:email" : "missing:service:email")'
                    # Display name — the internal plane previously OMITTED this
                    # entirely, so every internal request (all LibreChat traffic
                    # + every cron/service caller) was nameless in the dashboard.
                    # Resolution order:
                    #   1. forwarded end-user name (LibreChat → X-LibreChat-Name)
                    #   2. a FORWARDED user with no name → "missing:librechat:name"
                    #      (a real gap; LibreChat should forward the name header) —
                    #      plane-qualified to distinguish from the external plane's
                    #      bare "missing:name"
                    #   3. a non-forwarded caller (cron-job / service) → its OWN
                    #      authenticated identity (SA username or apiKey Secret
                    #      name) so internal SERVICES are named in the Top-15
                    #      instead of collapsing under one anonymous bucket.
                    "x-oidc-name":
                      plain:
                        expression: '"x-librechat-name" in request.headers && request.headers["x-librechat-name"] != "" ? request.headers["x-librechat-name"] : ("x-librechat-user" in request.headers && request.headers["x-librechat-user"] != "" ? "missing:librechat:name" : (has(auth.identity.user) ? string(auth.identity.user.username) : string(auth.identity.metadata.name)))'

            # ── Catch-all deny (security backstop, ADR-0021) ───────────────────
            catch-all:
              # ANY host NOT claimed by a more-specific AuthConfig above —
              # direct-IP calls, an unknown/forged Host, or a future route bound
              # without auth. `supersedingHostSubsets: true` (on the instance)
              # lets this "*" coexist; the specific hosts always win. The lone
              # identity method can NEVER succeed (an apiKey whose selector matches
              # a label NO Secret carries) → Authorino returns **401**. Closes the
              # bypass where hitting the Envoy endpoint by IP (no/foreign Host)
              # skipped the per-host auth entirely.
              hosts:
                - "*"
              authentication:
                deny-all:
                  apiKey:
                    selector:
                      matchLabels:
                        kuadrant.io/never-matches: deny-all

    destination:
      namespace: converse-gateway

  # --- Lightbridge Backend ---
  # Lightbridge App-of-Apps orchestrator (ADR-0019, mirrors `coder`). Replaces
  # the old flat single-Application app; emits three child Applications
  # (lightbridge-secrets wave 0, lightbridge-db wave 1, lightbridge-app wave 2)
  # from charts/lightbridge. Components are api (main) + mcp only — opa (removed
  # per ADR-0021) and usage are dropped, along with lightbridge-usage-db. As a
  # control object (it emits Application CRs) this entry is controlPlane: true —
  # the children themselves target home-remote. Name kept `lightbridge-backend`
  # so the root app entry's identity is stable.
  - name: lightbridge-backend
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    controlPlane: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/lightbridge
      helm:
        releaseName: lightbridge
        valuesObject: {}
    destination:
      namespace: converse

  # --- lightbridge-repo-auth (ADR-0047) ---
  # GitHub-App webhook control plane + the /v1/resolve binding the gateway's
  # Authorino calls. Plain workload → home-remote (default). EXTERNAL private
  # repo: pin a commit SHA (doesn't ride the ai-helm release tag) — ⚠️ ArgoCD
  # needs read creds for the private repo. depsOverlay folds in the webhook
  # ingress Certificate (Source B). Secrets: webhook/internal-token/private-key
  # via the chart's ExternalSecret (ssegning-aws repo_auth_*); the DB `repoauth`
  # Database + role + password Secret live on lightbridge-main-db
  # (charts/lightbridge-db). ⚠️ ghcr package is private today — the image pulls
  # only if it's made public OR an imagePullSecret is added (see #393).
  - name: lightbridge-repo-auth
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    depsOverlay: environments/prod/deps/lightbridge-repo-auth
    source:
      repoURL: https://github.com/ADORSYS-GIS/lightbridge-repo-auth
      targetRevision: f45cf0ee38cc0a16aaa57a903f9e900d8a6bc22a
      path: charts/lightbridge-repo-auth
      helm:
        releaseName: lightbridge-repo-auth
        valuesObject:
          image:
            tag: sha-f45cf0e
          ingress:
            enabled: true
          env:
            # Numeric App id from the registered GitHub App (public, not secret).
            RA__GITHUB__APP_ID: "3253522"
    destination:
      namespace: converse

  # --- Lightbridge Code Intelligence ---
  # The GitHub-App code-review / repo-Q&A system (repo:
  # vymalo/lightbridge-code-intelligence): Rust control plane + Next.js web console
  # + Neo4j. Postgres/pgvector is REUSED from the lightbridge-main-db CNPG cluster via
  # a dedicated `codeintel` role + database (charts/lightbridge-db). Plain workload →
  # home-remote (default).
  #
  # CONTINUOUS DEPLOY — argocd-image-updater + git write-back (vymalo-shop pattern).
  # Multi-source: the chart is release-pinned (Source A), but the two image tags are
  # read from the APP repo's main via a $values source (Source B). image-updater picks
  # the newest *signed* sha-<gitsha> from GHCR and commits it back into that file, which
  # ArgoCD then auto-syncs — so deploys don't need an ai-helm release. The selecting
  # ImageUpdater CR lives in home-os (charts/argocd-image-updater). Image tags are
  # therefore NOT set here; they live in the app repo at
  # deploy/envs/production/values.yaml (image-updater owns them).
  - name: lightbridge-code-intelligence
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      # SSA dry-run diff: ESO and the CNPG/StatefulSet controllers stamp defaulted
      # fields (on the ExternalSecrets + the Neo4j StatefulSet) that the chart never
      # declares, which otherwise show a permanent cosmetic OutOfSync + selfHeal churn.
      # ServerSideDiff ignores those server-owned fields so the app reads Synced.
      argocd.argoproj.io/compare-options: ServerSideDiff=true
      # Two images in one app, aliased `cp` (control-plane) + `web`.
      argocd-image-updater.argoproj.io/image-list: cp=ghcr.io/vymalo/lightbridge-control-plane,disp=ghcr.io/vymalo/lightbridge-control-plane,web=ghcr.io/vymalo/lightbridge-web
      # ── control-plane ──
      argocd-image-updater.argoproj.io/cp.update-strategy: newest-build
      argocd-image-updater.argoproj.io/cp.allow-tags: regexp:^sha-[0-9a-f]+$
      argocd-image-updater.argoproj.io/cp.force-update: "true"
      argocd-image-updater.argoproj.io/cp.helm.image-name: lci.controllers.control-plane.containers.main.image.repository
      argocd-image-updater.argoproj.io/cp.helm.image-tag: lci.controllers.control-plane.containers.main.image.tag
      argocd-image-updater.argoproj.io/cp.signature-type: cosign
      argocd-image-updater.argoproj.io/cp.cosign.certificate-oidc-issuer: https://token.actions.githubusercontent.com
      argocd-image-updater.argoproj.io/cp.cosign.certificate-identity-regexp: ^https://github\.com/vymalo/lightbridge-code-intelligence/\.github/workflows/build-images\.yml@.*$
      # ── dispatcher (SAME image as control-plane, role-selected) — keeps its tag in lockstep so it
      #    never lags the control-plane on a build (it's not a pod image-updater would otherwise see). ──
      argocd-image-updater.argoproj.io/disp.update-strategy: newest-build
      argocd-image-updater.argoproj.io/disp.allow-tags: regexp:^sha-[0-9a-f]+$
      argocd-image-updater.argoproj.io/disp.force-update: "true"
      argocd-image-updater.argoproj.io/disp.helm.image-name: lci.controllers.dispatcher.containers.main.image.repository
      argocd-image-updater.argoproj.io/disp.helm.image-tag: lci.controllers.dispatcher.containers.main.image.tag
      argocd-image-updater.argoproj.io/disp.signature-type: cosign
      argocd-image-updater.argoproj.io/disp.cosign.certificate-oidc-issuer: https://token.actions.githubusercontent.com
      argocd-image-updater.argoproj.io/disp.cosign.certificate-identity-regexp: ^https://github\.com/vymalo/lightbridge-code-intelligence/\.github/workflows/build-images\.yml@.*$
      # ── web ──
      argocd-image-updater.argoproj.io/web.update-strategy: newest-build
      argocd-image-updater.argoproj.io/web.allow-tags: regexp:^sha-[0-9a-f]+$
      argocd-image-updater.argoproj.io/web.force-update: "true"
      argocd-image-updater.argoproj.io/web.helm.image-name: lci.controllers.web.containers.main.image.repository
      argocd-image-updater.argoproj.io/web.helm.image-tag: lci.controllers.web.containers.main.image.tag
      argocd-image-updater.argoproj.io/web.signature-type: cosign
      argocd-image-updater.argoproj.io/web.cosign.certificate-oidc-issuer: https://token.actions.githubusercontent.com
      argocd-image-updater.argoproj.io/web.cosign.certificate-identity-regexp: ^https://github\.com/vymalo/lightbridge-code-intelligence/\.github/workflows/build-images\.yml@.*$
      # ── git write-back → the app repo's main (public repo, so only the commit
      # needs creds: the shared vymalo GitHub App, same as vymalo-shop). ──
      argocd-image-updater.argoproj.io/write-back-method: git
      argocd-image-updater.argoproj.io/git-branch: main
      argocd-image-updater.argoproj.io/git-repository: https://github.com/vymalo/lightbridge-code-intelligence.git
      # Leading slash = path absolute from the git repo ROOT. Without it a `helmvalues:`
      # target resolves relative to the app's chart SOURCE path
      # (charts/lightbridge-code-intelligence), so image-updater writes a wrong nested
      # file (charts/lightbridge-code-intelligence/deploy/...). vymalo/opfs dodge this
      # only because their chart is OCI (no source path); ours is path-based → slash required.
      argocd-image-updater.argoproj.io/write-back-target: helmvalues:/deploy/envs/production/values.yaml
      argocd-image-updater.argoproj.io/git-credentials: secret:argocd/github-app-creds--vymalo
      # ── argocd-notifications → GitHub Deployment status. `vymalo` is the
      # notifier service (GitHub App installation on the vymalo org); the
      # on-deployed / on-deploy-failed triggers + ssegning.me annotation
      # contract are defined in home-os charts/argocd. ──
      notifications.argoproj.io/subscribe.on-deployed.vymalo: ""
      notifications.argoproj.io/subscribe.on-deploy-failed.vymalo: ""
      notifications.ssegning.me/github-repo-url: https://github.com/vymalo/lightbridge-code-intelligence
      notifications.ssegning.me/github-revision: main
      notifications.ssegning.me/environment-url: https://code-intelligence.ai.camer.digital
    sources:
      # Source A — the chart. release-pinned like every ai-helm app; the release
      # script swaps this tag on each cut. Image tags come from Source B's $values.
      - repoURL: https://github.com/ADORSYS-GIS/ai-helm
        targetRevision: release-2026.06.21-v03
        path: charts/lightbridge-code-intelligence
        helm:
          releaseName: lightbridge-ci
          valueFiles:
            - $values/deploy/envs/production/values.yaml
          ignoreMissingValueFiles: true
      # Source B — image tags from the app repo's main; image-updater commits here.
      - repoURL: https://github.com/vymalo/lightbridge-code-intelligence.git
        targetRevision: main
        ref: values
    destination:
      namespace: converse

  # --- Lightbridge Code Intelligence — image-updater activation (control object) ---
  # The CRD-based argocd-image-updater controller only acts on an Application when
  # an ImageUpdater CR selects it. That CR is an argocd control object (it must live
  # in the in-cluster argocd namespace where the controller watches), so this entry
  # is controlPlane: true (ADR-0017) — the CR lands in-cluster/argocd, not home-remote.
  # GitOps-native replacement for the previously hand-applied CR in home-os
  # charts/argocd-image-updater (that chart is a manual `helm upgrade`, not synced).
  - name: lightbridge-code-intelligence-imageupdater
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    controlPlane: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/lightbridge-code-intelligence-imageupdater
      helm:
        releaseName: lightbridge-ci-imageupdater
    destination:
      namespace: argocd

  # --- Converse UI ---
  - name: converse-ui
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/converse-frontends
      # Pinned to a commit for a reproducible release (was HEAD). External repo —
      # bump this SHA deliberately when you want a newer converse-ui, then re-release.
      targetRevision: 500dba11e91d1385135802db5898c961debfe6e2
      path: charts/converse-frontend
      helm:
        releaseName: converse-ui
        valuesObject:
          conversefrontend:
            controllers:
              main:
                podDisruptionBudget:
                  # User-facing frontend: PDB ensures uptime during automated node maintenance.
                  maxUnavailable: 1
                containers:
                  frontend:
                    image:
                      repository: ghcr.io/adorsys-gis/converse-frontends
                      tag: sha-500dba1
                      pullPolicy: IfNotPresent
                    env:
                      EXPO_PUBLIC_BACKEND_URL: "https://self-service.ai.camer.digital"
                      EXPO_PUBLIC_USAGE_URL: "https://self-service.ai.camer.digital"
                      EXPO_PUBLIC_ANALYTICS_URL: "https://analytics.ai.camer.digital"
                      EXPO_PUBLIC_KEYCLOAK_ISSUER: "https://auth.verif.fyi/realms/camer-digital"
                      EXPO_PUBLIC_KEYCLOAK_CLIENT_ID: "converse-frontend"
                      EXPO_PUBLIC_KEYCLOAK_SCHEME: "self-service"
                      # JWT Audience validation - ensures tokens are intended for this API
                      EXPO_PUBLIC_KEYCLOAK_EXPECTED_AUDIENCE: "converse-frontend"
                      EXPO_PUBLIC_KEYCLOAK_AUDIENCE_REQUIRED: "true"
    destination:
      namespace: converse

  # --- LibreChat ---
  # NOTE: Phoenix (Arize) was removed; tracing is now served by Grafana Tempo
  # via the core-gateway `-traces` OpenTelemetryCollector -> Alloy -> Tempo path.
  - name: librechat
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    # Orchestrator — charts/librechart emits an ApplicationSet (a control
    # object). The ApplicationSet must land in-cluster/argocd where the
    # controller watches it; its child Applications deploy workloads to
    # home-remote. See ADR-0017.
    controlPlane: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/librechart
      helm:
        releaseName: librechat
        # No storageClass override — PVCs use the cluster's default
        # StorageClass (the leaf charts default to null).
        valuesObject: {}

    destination:
      namespace: converse-chat

  # --- MongoDB Backup ---
  - name: mongodb-backup
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/mongodb-backup
      helm:
        releaseName: mongodb-backup
        valuesObject:
          mongodb-backup:
            s3:
              secretName: librechat-s3-config
            controllers:
              main:
                cronjob:
                  successfulJobsHistory: 3
                  failedJobsHistory: 3
                  startingDeadlineSeconds: 30
                initContainers:
                  exporter:
                    env:
                      MONGODB_URI: mongodb://librechat-db-0.librechat-db-headless:27017, #librechat-db-1.librechat-db-headless:27017/?replicaSet=rs0
    destination:
      namespace: converse-chat

  # --- Models ---
  - name: models
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    # Orchestrator — charts/ai-models emits an ApplicationSet (a control
    # object). The ApplicationSet must land in-cluster/argocd where the
    # controller watches it; its child Applications deploy workloads to
    # home-remote. See ADR-0017.
    controlPlane: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/ai-models
      helm:
        releaseName: models
        valuesObject: { }
    destination:
      namespace: converse

  # --- Self-hosted model on the home GPU (ADR-0022) ---
  # KServe/Knative + vLLM + LMCache serving Qwen3-4B on the home RTX A2000.
  # `homeCluster: true` is the SINGLE sanctioned ADR-0017 exception: this
  # workload targets the cluster ArgoCD runs on (the home Talos cluster) — NOT
  # home-remote — because the GPU + KServe + Knative live there. The chart
  # renders the weights PVC + a one-time seed Job + the InferenceService + the
  # API-key ExternalSecret (sync-waves -2..1). The model is federated into the
  # Hetzner gateway as the `vllm-local-01` backend / `qwen3-4b-local` model in
  # charts/ai-models — so it inherits ADR-0021 JWT auth + rate limits there.
  # See docs/self-hosted-model-serving.md.
  - name: model-serving-qwen3-4b
    enabled: false                   # DISABLED at cutover 2026-06-08 — swapped by model-serving-qwen3-5 (one GPU). Re-enable to roll back.
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    homeCluster: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/model-serving-qwen3-4b
      helm:
        releaseName: model-serving-qwen3-4b
        valuesObject: { }
    destination:
      namespace: converse-poc
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # Self-hosted Qwen3.5-4B (Q4_K_M GGUF, llama.cpp) on the home GPU — the upgrade
  # candidate for qwen3-4b above. charts/model-serving-qwen3-5 renders the weights
  # PVC + GGUF seed Job + the llama-server StatefulSet (single container, native
  # --api-key, no Caddy) + Service + Ingress. Federated as the `llama-local-01`
  # backend / `qwen3-5-4b-local` model in charts/ai-models. Paper:
  # docs/models/qwen3.5-4b-q4.md; engine ADR-0032.
  #
  # ⚠️ STAGED (enabled:false) behind the load-gate (paper §5: a recent server-cuda
  # build must load the GGUF on the A2000). One GPU → one model, so CUTOVER =
  # set this enabled:true + the qwen3-4b app enabled:false (add the key) + flip the
  # ai-models qwen3-5-4b-local/qwen3-4b-local enabled flags, then cut a release +
  # repoint root. Rollback = the inverse.
  - name: model-serving-qwen3-5
    enabled: true                    # CUTOVER 2026-06-08: arch load-gate passed — live
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    homeCluster: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/model-serving-qwen3-5
      helm:
        releaseName: model-serving-qwen3-5
        valuesObject: { }
    destination:
      namespace: converse-poc
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # --- MCPs (App-of-Apps orchestrator, ADR-0027) ---
  # charts/mcps now emits an ApplicationSet (a control object) that generates
  # one child Application per MCP (mcps-brave, mcps-terraform, mcps-firecrawl,
  # mcps-context7, mcps-refero), each with its own in-chart ExternalSecret.
  # controlPlane: true — the ApplicationSet must land in-cluster/argocd where
  # the controller watches it; the children it generates deploy workloads to
  # home-remote (converse-mcp). See ADR-0017 + ADR-0027.
  - name: mcps
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    controlPlane: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: release-2026.06.21-v03
      path: charts/mcps
      helm:
        releaseName: mcps
        valuesObject: { }
    destination:
      namespace: converse-mcp

  # Coder was REMOVED 2026-06-06 (ADR-0027 supersedes ADR-0019) — not in use
  # for now. The charts/coder + charts/coder-db leaf charts and the
  # environments/*/deps/coder overlay were deleted; the coder orchestrator and
  # its children (coder-app, coder-db) are pruned by ArgoCD. Re-introduce via a
  # new ADR if Coder comes back.

