          # Lightbridge PDB Strategy: Handled via rawRessources because the upstream chart 
          # doesn't support controller PDBs natively. Ensure at least 1 instance is always available.
          rawRessources:
            - |
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: lightbridge-api-pdb
                namespace: {{ $.Release.Namespace }}
              spec:
                maxUnavailable: 1
                selector:
                  matchLabels:
                    app.kubernetes.io/instance: lightbridge
                    app.kubernetes.io/name: api
            - |
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: lightbridge-opa-pdb
                namespace: {{ $.Release.Namespace }}
              spec:
                maxUnavailable: 1
                selector:
                  matchLabels:
                    app.kubernetes.io/instance: lightbridge
                    app.kubernetes.io/name: opa
            - |
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: lightbridge-mcp-pdb
                namespace: {{ $.Release.Namespace }}
              spec:
                maxUnavailable: 1
                selector:
                  matchLabels:
                    app.kubernetes.io/instance: lightbridge
                    app.kubernetes.io/name: mcp
            - |
