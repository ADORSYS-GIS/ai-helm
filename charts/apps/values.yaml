          # Lightbridge PDB Strategy: Handled via rawRessources because the upstream chart 
          # doesn't support controller PDBs natively. Ensure at least 1 instance is always available.
          rawRessources:
            - |
              apiVersion: v1
              kind: LimitRange
              metadata:
                name: converse-defaults
                namespace: {{ $.Release.Namespace }}
              spec:
                limits:
                  - type: Container
                    defaultRequest:
