  # ─────────────────────────────────────────────────────────────────────────────
  # Observability: Loki — log aggregation store
  # Sync wave -1: alongside Mimir, before Grafana
  # Secrets required (via ESO):
  #   loki-s3:
  #     LOKI_S3_ACCESS_KEY_ID: <key>
  #     LOKI_S3_SECRET_ACCESS_KEY: <secret>
  # Buckets to create: converse-loki-chunks, converse-loki-ruler
  # ─────────────────────────────────────────────────────────────────────────────
  - name: loki
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-2"
    source:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 7.0.0
      chart: loki
      helm:
        releaseName: loki
        valuesObject:
          deploymentMode: SingleBinary

          loki:
            auth_enabled: false

            commonConfig:
              replication_factor: 1
              ring:
                instance_addr: 127.0.0.1
                kvstore:
                  store: inmemory

            memberlist:
              join_members: []

            schemaConfig:
              configs:
                - from: "2025-01-01"
                  store: tsdb
                  object_store: s3
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h

            storage:
              type: s3
              bucketNames:
                chunks: *s3-bucket
                ruler:  *s3-bucket
                admin:  *s3-bucket
              use_thanos_objstore: true
              object_store:
                type: s3
                storage_prefix: loki
                s3:
                  endpoint: *s3-endpoint
                  region: *s3-region
                  secret_access_key: ${LOKI_S3_SECRET_ACCESS_KEY}
                  access_key_id: ${LOKI_S3_ACCESS_KEY_ID}
                  insecure: false
                  http:
                    insecure_skip_verify: false

            limits_config:
              # ── Retention ──────────────────────────────────────────────
              # How long log chunks are kept before the compactor deletes them.
              # Requires compactor.retention_enabled: true to take effect.
              retention_period: 90d

              # ── Ingestion ───────────────────────────────────────────────
              ingestion_rate_mb: 8
              ingestion_burst_size_mb: 16

              # ── Query limits ────────────────────────────────────────────
              # Maximum time range a query can span.
              max_query_length: 0h       # 0 = unlimited
              # Maximum number of log entries returned per query.
              max_entries_limit_per_query: 5000

            compactor:
              # Enable time-based retention deletion.
              retention_enabled: true
              # Where delete requests are stored (must match object store type).
              delete_request_store: s3
              # How often the compactor runs.
              compaction_interval: 1h
              # How long before marked chunks are actually deleted.
              # Gives a window to cancel accidental deletions.
              retention_delete_delay: 2h
              # Number of workers processing delete requests in parallel.
              retention_delete_worker_count: 150

          # Disable memcached - not needed for single-binary mode
          # Must be at root level, not under loki.memcached
          chunksCache:
            enabled: false
          resultsCache:
            enabled: false

          # Loki canary - synthetic observability
          # Using Deployment kind (supported in chart 7.x) to avoid DaemonSet spawning 1 pod per node.
          lokiCanary:
            enabled: true
            kind: Deployment
            replicas: 1

          singleBinary:
            replicas: 1
            podDisruptionBudget:
              enabled: false
            # Enable environment variable expansion for S3 credentials
            extraArgs:
              - -config.expand-env=true
            extraEnvFrom:
              - secretRef:
                  name: loki-s3
            resources:
              requests: { cpu: 100m, memory: 256Mi }
              limits:   { cpu: 500m, memory: 2Gi   }
            persistence:
              enabled: true
              storageClass: linode-block-storage
              size: 10Gi

          ingester:       { replicas: 0 }
          querier:        { replicas: 0 }
          queryFrontend:  { replicas: 0 }
          queryScheduler: { replicas: 0 }
          distributor:    { replicas: 0 }
          compactor:      { replicas: 0 }
          indexGateway:   { replicas: 0 }
          bloomCompactor: { enabled: false }
          bloomGateway:   { enabled: false }

          # SimpleScalable mode components (must be 0 for SingleBinary)
          read:           { replicas: 0 }
          write:          { replicas: 0 }
          backend:        { replicas: 0 }

          gateway:
            enabled: true
            replicas: 1
            podDisruptionBudget:
              minAvailable: 1
            resources:
              requests: { cpu: 50m,  memory: 64Mi  }
              limits:   { cpu: 200m, memory: 128Mi }

          minio:
            enabled: false

    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability: Tempo — distributed trace store
  # Sync wave -1: alongside Mimir and Loki, before Grafana
  # Secrets required (via ESO):
  #   tempo-s3:
  #     TEMPO_S3_ACCESS_KEY: <key>
  #     TEMPO_S3_SECRET_KEY: <secret>
  # Bucket to create: converse-tempo-traces
  # ─────────────────────────────────────────────────────────────────────────────
  - name: tempo
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-2"
    source:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 1.9.0
      chart: tempo
      helm:
        releaseName: tempo
        valuesObject:
          replicas: 1

          podDisruptionBudget:
            enabled: false

          tempo:
            extraArgs:
              config.expand-env: "true"
            extraEnvFrom:
              - secretRef:
                  name: tempo-s3

            # ── Retention ────────────────────────────────────────────────
            # How long trace blocks are kept in S3.
            # Format: duration string (e.g. 720h = 30d, 2160h = 90d).
            retention: 720h

            storage:
              trace:
                backend: s3
                # ── WAL (Write-Ahead Log) ─────────────────────────────────
                # Local WAL buffers traces before flushing to S3.
                wal:
                  path: /var/tempo/wal
                  # How long a trace can stay in the WAL before being flushed.
                  ingestion_time_range_slack: 30s
                s3:
                  bucket:           *s3-bucket
                  endpoint:         *s3-endpoint
                  region:           *s3-region
                  prefix:           tempo
                  access_key:       ${TEMPO_S3_ACCESS_KEY}
                  secret_key:       ${TEMPO_S3_SECRET_KEY}
                  forcepathstyle:   true
                  insecure:         false

            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: 0.0.0.0:4317
                  http:
                    endpoint: 0.0.0.0:4318
              jaeger:
                protocols:
                  thrift_http:
                    endpoint: 0.0.0.0:14268
                  grpc:
                    endpoint: 0.0.0.0:14250

            metricsGenerator:
              enabled: true
              remoteWriteUrl: http://mimir-nginx.observability.svc.cluster.local/api/v1/push
              remoteWriteHeaders:
                X-Scope-OrgID: anonymous

            search:
              enabled: true

            # ── Compaction ────────────────────────────────────────────────
            # block_retention: how long blocks are kept in S3 before deletion.
            #   Must match tempo.retention above. Set here explicitly so it's
            #   visible alongside other compaction knobs.
            # compacted_block_retention: how long compacted (superseded) blocks
            #   are kept before deletion. Short value reduces storage waste.
            # compaction_window: blocks within this time window are compacted
            #   together. Larger = fewer but bigger blocks; smaller = more
            #   frequent compaction cycles.
            compactor:
              compaction:
                block_retention: 720h
                compacted_block_retention: 1h
                compaction_window: 1h

          # Fix filesystem permissions for WAL directory
          securityContext:
            fsGroup: 10001
            runAsUser: 10001
            runAsNonRoot: true

          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 6Gi   }

          persistence:
            enabled: true
            storageClass: linode-block-storage
            size: 5Gi

          serviceMonitor:
            enabled: true
            interval: 60s

    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability: Grafana — visualization, dashboards, unified alerting
  # Sync wave 0: after backends are up
  # Secrets required (via ESO):
  #   grafana-admin:
  #     admin-user:     admin
  #     admin-password: <strong-password>
  #   grafana-keycloak:
  #     client-secret: <keycloak-client-secret-for-grafana-realm-client>
  # Keycloak client to create: "grafana" in the camer-digital realm,
  #   redirect URI: https://grafana.ai.camer.digital/login/generic_oauth
  # ─────────────────────────────────────────────────────────────────────────────
  - name: grafana
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "0"
    source:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 9.4.5
      chart: grafana
      helm:
        releaseName: grafana
        valuesObject:
          replicas: 1

          admin:
            existingSecret: grafana-admin
            userKey:        admin-user
            passwordKey:    admin-password

          envFromSecrets:
            - name: grafana-keycloak

          grafana.ini:
            server:
              domain:   grafana.ai.camer.digital
              root_url: https://grafana.ai.camer.digital

            auth.generic_oauth:
              enabled:              true
              name:                 "CDigital"
              icon:                 signin
              client_id:            grafana
              client_secret:        $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
              scopes:               "openid profile email"
              auth_url:             "https://auth.verif.fyi/realms/camer-digital/protocol/openid-connect/auth"
              token_url:            "https://auth.verif.fyi/realms/camer-digital/protocol/openid-connect/token"
              api_url:              "https://auth.verif.fyi/realms/camer-digital/protocol/openid-connect/userinfo"
              role_attribute_path:  "contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'"
              allow_sign_up:        true
              auto_login:           false

            auth:
              disable_login_form: false

            unified_alerting:
              enabled: true
            unified_alerting.alertmanager:
              implementation: external
              # Points to the grafana-apprise-adapter which translates
              # Grafana webhook alerts into Apprise notifications.
              url: http://grafana-apprise-adapter.observability.svc.cluster.local:5000

            alerting:
              enabled: false

          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name:      Mimir
                  type:      prometheus
                  uid:       mimir
                  url:       http://mimir-nginx.observability.svc.cluster.local/prometheus
                  isDefault: true
                  jsonData:
                    timeInterval: 30s
                    httpMethod:   POST
                    httpHeaderName1: "X-Scope-OrgID"
                  secureJsonData:
                    httpHeaderValue1: "anonymous"

                - name: Loki
                  type: loki
                  uid:  loki
                  url:  http://loki-gateway.observability.svc.cluster.local
                  jsonData:
                    derivedFields:
                      - name:             TraceID
                        matcherRegex:     '"trace_id":"(\w+)"'
                        url:              "$${__value.raw}"
                        datasourceUid:    tempo
                    maxLines: 1000

                - name: Tempo
                  type: tempo
                  uid:  tempo
                  url:  http://tempo.observability.svc.cluster.local:3100
                  jsonData:
                    tracesToLogsV2:
                      datasourceUid:    loki
                      spanStartTimeShift: "-1m"
                      spanEndTimeShift:   "1m"
                      filterByTraceID:  true
                      filterBySpanID:   false
                      customQuery:      false
                    serviceMap:
                      datasourceUid:    mimir
                    nodeGraph:
                      enabled: true
                    search:
                      hide: false

                - name: Alertmanager
                  type: alertmanager
                  uid:  alertmanager
                  url:  http://mimir-nginx.observability.svc.cluster.local/alertmanager
                  jsonData:
                    implementation: mimir
                    httpHeaderName1: "X-Scope-OrgID"
                  secureJsonData:
                    httpHeaderValue1: "anonymous"

          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: kubernetes
                  orgId: 1
                  folder: "Kubernetes"
                  type: file
                  options:
                    path: /var/lib/grafana/dashboards/kubernetes
                - name: observability
                  orgId: 1
                  folder: "Observability Stack"
                  type: file
                  options:
                    path: /var/lib/grafana/dashboards/observability
                - name: infrastructure
                  orgId: 1
                  folder: "Infrastructure"
                  type: file
                  options:
                    path: /var/lib/grafana/dashboards/infrastructure
                - name: gitops
                  orgId: 1
                  folder: "GitOps"
                  type: file
                  options:
                    path: /var/lib/grafana/dashboards/gitops

          # alerting:
          #   contactpoints.yaml:
          #     apiVersion: 1
          #     contactPoints:
          #       - orgId: 1
          #         name: apprise
          #         receivers:
          #           - uid: apprise-webhook
          #             type: webhook
          #             settings:
          #               url: http://grafana-apprise-adapter.observability.svc.cluster.local:5000/notify/alerts
          #               httpMethod: POST
          #               payload:
          #                 template: |
          #                   {
          #                     "title": "{{ `{{ .CommonLabels.alertname }}` }}",
          #                     "message": "{{ `{{ if .CommonAnnotations.summary }}{{ .CommonAnnotations.summary }}{{ else }}{{ .CommonLabels.alertname }} is {{ .Status }}{{ end }}` }}",
          #                     "state": "alerting",
          #                     "imageUrl": "",
          #                     "tags": {}
          #                   }

          #   policies.yaml:
          #     apiVersion: 1
          #     policies:
          #       - orgId: 1
          #         receiver: apprise
          #         group_by:
          #           - grafana_folder
          #           - alertname
          #         group_wait: 30s
          #         group_interval: 1m
          #         repeat_interval: 2m

          #   rules.yaml:
          #     apiVersion: 1
          #     groups:
          #       - orgId: 1
          #         name: 1m group
          #         folder: Observability Stack
          #         interval: 1m
          #         rules:
          #           - uid: afm5fxdv88kxsa
          #             title: Pod OOMKilled
          #             condition: C
          #             data:
          #               - refId: A
          #                 relativeTimeRange:
          #                   from: 600
          #                   to: 0
          #                 datasourceUid: mimir
          #                 model:
          #                   editorMode: code
          #                   expr: |-
          #                     # Fires when a pod has been OOMKilled in the last 15m
          #                     increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[15m]) > 0
          #                   instant: true
          #                   intervalMs: 1000
          #                   legendFormat: __auto
          #                   maxDataPoints: 43200
          #                   range: false
          #                   refId: A
          #               - refId: B
          #                 relativeTimeRange:
          #                   from: 600
          #                   to: 0
          #                 datasourceUid: __expr__
