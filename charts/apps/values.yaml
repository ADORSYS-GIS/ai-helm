                    app.kubernetes.io/name: api
            - |
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: lightbridge-opa-pdb
                namespace: {{ $.Release.Namespace }}
              spec:
                maxUnavailable: 1
                selector:
                  matchLabels:
                    app.kubernetes.io/instance: lightbridge
                    app.kubernetes.io/name: opa
            - |
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: lightbridge-mcp-pdb
                namespace: {{ $.Release.Namespace }}
              spec:
                maxUnavailable: 1
                selector:
                  matchLabels:
                    app.kubernetes.io/instance: lightbridge
                    app.kubernetes.io/name: mcp
            - |
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: lightbridge-usage-pdb
                namespace: {{ $.Release.Namespace }}
              spec:
                maxUnavailable: 1
                selector:
                  matchLabels:
                    app.kubernetes.io/instance: lightbridge
                    app.kubernetes.io/name: usage
            - |
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: "{{ $.Release.Name }}-apis"
                namespace: {{ $.Release.Namespace }}
                annotations:
                  cert-manager.io/cluster-issuer: cert-home-cert-http
              spec:
                ingressClassName: traefik
                tls:
                - hosts:
                    - self-service.ai.camer.digital
                  secretName: self-service.ai.camer.digital-tls
                rules:
                - host: self-service.ai.camer.digital
                  http:
                    paths:
                    - path: /api/v1
                      pathType: Prefix
                      backend:
                        service:
                          name: {{ $.Release.Name }}-api
                          port:
                            number: 3000

                    - path: /usage/v1
                      pathType: Prefix
                      backend:
                        service:
                          name: {{ $.Release.Name }}-usage
                          port:
                            number: 3000
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: converse-ui
                          port:
                            number: 80
            - |
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: "{{ $.Release.Name }}-mcp"
                namespace: {{ $.Release.Namespace }}
                annotations:
                  cert-manager.io/cluster-issuer: cert-home-cert-http
              spec:
                ingressClassName: traefik
                tls:
                - hosts:
                    - mcp.ai.camer.digital
                  secretName: mcp.ai.camer.digital-tls
                rules:
                - host: mcp.ai.camer.digital
                  http:
                    paths:
                    - path: /mcp
                      pathType: Prefix
                      backend:
                        service:
                          name: {{ $.Release.Name }}-mcp
                          port:
                            number: 3000
                    - path: /.well-known/oauth-authorization-server
                      pathType: Prefix
                      backend:
                        service:
                          name: {{ $.Release.Name }}-mcp
                          port:
                            number: 3000
                    - path: /.well-known/openid-configuration
                      pathType: Prefix
                      backend:
                        service:
                          name: {{ $.Release.Name }}-mcp
                          port:
                            number: 3000
                    - path: /oauth/register
                      pathType: Prefix
                      backend:
                        service:
                          name: {{ $.Release.Name }}-mcp
                          port:
                            number: 3000
            - |
              apiVersion: traefik.io/v1alpha1
              kind: ServersTransport
              metadata:
                name: insecure-transport
                namespace: converse
              spec:
                insecureSkipVerify: true
            - |
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: authz-tls
                namespace: {{ $.Release.Namespace }}
              spec:
                secretName: authz-tls
                issuerRef:
                  name: self-signed-ca
                  kind: ClusterIssuer
                commonName: lightbridge.{{ $.Release.Namespace }}.svc.cluster.local
                dnsNames:
                  - "*.{{ $.Release.Namespace }}.svc.cluster.local"
                  - "*.{{ $.Release.Namespace }}.svc.cluster"
                  - "*.{{ $.Release.Namespace }}.svc"
                  - "*.{{ $.Release.Namespace }}"
                usages:
                  - server auth
                  - client auth
            - |
              # NOTE: RetentionPolicyFailed warning caused by MinIO incompatibility with
              # trailing slashes in destinationPath.
              #
              # Root cause: When barman-cloud calls ListObjectsV2 to enforce retention
              # policy, MinIO returns object names that cause XMinioInvalidObjectName errors
              # if destinationPath contains a trailing slash.
              #
              # Fix: Remove trailing slash from destinationPath.
              # See: https://github.com/cloudnative-pg/cloudnative-pg/issues/4890
              #
              # Wrong (fails with MinIO):
              #   destinationPath: s3://ai-ops-backups/lightbridge-main-db/
              #
              # Correct (works with MinIO):
              #   destinationPath: s3://ai-ops-backups/lightbridge-main-db
              apiVersion: barmancloud.cnpg.io/v1
              kind: ObjectStore
              metadata:
                name: lightbridge-main-db
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "1"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                retentionPolicy: "180d"
                configuration:
                  destinationPath: s3://ai-ops-backups/lightbridge-main-db
                  endpointURL: https://s3.ssegning.me
                  s3Credentials:
                    accessKeyId:
                      name: lightbridge-cnpg-s3
                      key: s3_access_key_id
                    secretAccessKey:
                      name: lightbridge-cnpg-s3
                      key: s3_secret_access_key
                    region:
                      name: lightbridge-cnpg-s3
                      key: s3_region_name
            - |
              # NOTE: RetentionPolicyFailed warning caused by MinIO incompatibility with
              # trailing slashes in destinationPath.
              #
              # Root cause: When barman-cloud calls ListObjectsV2 to enforce retention
              # policy, MinIO returns object names that cause XMinioInvalidObjectName errors
              # if destinationPath contains a trailing slash.
              #
              # Fix: Remove trailing slash from destinationPath.
              # See: https://github.com/cloudnative-pg/cloudnative-pg/issues/4890
              #
              # Wrong (fails with MinIO):
              #   destinationPath: s3://ai-ops-backups/lightbridge-usage-db/
              #
              # Correct (works with MinIO):
              #   destinationPath: s3://ai-ops-backups/lightbridge-usage-db
              apiVersion: barmancloud.cnpg.io/v1
              kind: ObjectStore
              metadata:
                name: lightbridge-usage-db
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "1"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                retentionPolicy: "180d"
                configuration:
                  destinationPath: s3://ai-ops-backups/lightbridge-usage-db
                  endpointURL: https://s3.ssegning.me
                  s3Credentials:
                    accessKeyId:
                      name: lightbridge-cnpg-s3
                      key: s3_access_key_id
                    secretAccessKey:
                      name: lightbridge-cnpg-s3
                      key: s3_secret_access_key
                    region:
                      name: lightbridge-cnpg-s3
                      key: s3_region_name
            - |
              # Alias services for stable DB endpoints - enables easy recovery switching
              apiVersion: v1
              kind: Service
              metadata:
                name: lightbridge-main-db-primary
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "1"
                  description: "Stable alias for lightbridge-main-db - switch traffic via selector"
                labels:
                  app.kubernetes.io/component: database
                  db-alias: "true"
              spec:
                type: ClusterIP
                ports:
                  - port: 5432
                    targetPort: 5432
                    protocol: TCP
                    name: postgres
                selector:
                  cnpg.io/cluster: lightbridge-main-db-restore
                  cnpg.io/instanceRole: primary
            - |
              apiVersion: v1
              kind: Service
              metadata:
                name: lightbridge-usage-db-primary
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "1"
                  description: "Stable alias for lightbridge-usage-db - switch traffic via selector"
                labels:
                  app.kubernetes.io/component: database
                  db-alias: "true"
              spec:
                type: ClusterIP
                ports:
                  - port: 5432
                    targetPort: 5432
                    protocol: TCP
                    name: postgres
                selector:
                  cnpg.io/cluster: lightbridge-usage-db-restore
                  cnpg.io/instanceRole: primary
            - |
              apiVersion: postgresql.cnpg.io/v1
              kind: Cluster
              metadata:
                name: lightbridge-main-db
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "2"
              spec:
                instances: 2
                imageName: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
                storage:
                  storageClass: linode-block-storage
                  size: "5Gi"
                plugins:
                  - name: barman-cloud.cloudnative-pg.io
                    isWALArchiver: true
                    parameters:
                      barmanObjectName: lightbridge-main-db
                      serverName: lightbridge-main-db
                postgresql:
                  parameters:
                    archive_timeout: "30min"
                resources:
                  limits:
                    cpu: 300m
                    memory: 1Gi
                  requests:
                    cpu: 200m
                    memory: 500Mi
            - |
              ---
              apiVersion: postgresql.cnpg.io/v1
              kind: ClusterImageCatalog
              metadata:
                name: lightbridge-usage-db
                namespace: {{ $.Release.Namespace }}
              spec:
                images:
                  - major: 17
                    image: timescale/timescaledb:2.21.1-pg17
              ---
              apiVersion: postgresql.cnpg.io/v1
              kind: Cluster
              metadata:
                name: lightbridge-usage-db
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "2"
              spec:
                instances: 2
                imageCatalogRef:
                  apiGroup: postgresql.cnpg.io
                  kind: ClusterImageCatalog
                  name: lightbridge-usage-db
                  major: 17
                storage:
                  storageClass: linode-block-storage
                  size: "10Gi"
                plugins:
                  - name: barman-cloud.cloudnative-pg.io
                    isWALArchiver: true
                    parameters:
                      barmanObjectName: lightbridge-usage-db
                      serverName: lightbridge-usage-db
                postgresql:
                  parameters:
                    archive_timeout: "30min"
                  shared_preload_libraries:
                    - timescaledb
                resources:
                  limits:
                    cpu: 300m
                    memory: 1Gi
                  requests:
                    cpu: 200m
                    memory: 500Mi
                postgresUID: 70
                postgresGID: 70
                bootstrap:
                  initdb:
                    postInitTemplateSQL:
                      - CREATE EXTENSION timescaledb VERSION '2.19.3';
                      - CREATE EXTENSION IF NOT EXISTS timescaledb;
            - |
              apiVersion: postgresql.cnpg.io/v1
              kind: ScheduledBackup
              metadata:
                name: lightbridge-main-db-daily
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "3"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                immediate: true
                schedule: "0 0 2 * * *"
                backupOwnerReference: self
                cluster:
                  name: lightbridge-main-db
                method: plugin
                pluginConfiguration:
                  name: barman-cloud.cloudnative-pg.io
            - |
              apiVersion: postgresql.cnpg.io/v1
              kind: ScheduledBackup
              metadata:
                name: lightbridge-usage-db-daily
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "3"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                immediate: true
                schedule: "0 0 2 * * *"
                backupOwnerReference: self
                cluster:
                  name: lightbridge-usage-db
                method: plugin
                pluginConfiguration:
                  name: barman-cloud.cloudnative-pg.io
            - |
              # PodMonitors so Grafana Alloy scrapes the CloudNativePG
              # per-instance metrics exporters (port 9187, name "metrics").
              # Manual PodMonitors are the recommended approach now that
              # .spec.monitoring.enablePodMonitor is deprecated.
              apiVersion: monitoring.coreos.com/v1
              kind: PodMonitor
              metadata:
                name: lightbridge-main-db
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "3"
              spec:
                selector:
                  matchLabels:
                    cnpg.io/cluster: lightbridge-main-db
                podMetricsEndpoints:
                  - port: metrics
                    interval: 30s
              ---
              apiVersion: monitoring.coreos.com/v1
              kind: PodMonitor
              metadata:
                name: lightbridge-usage-db
                namespace: {{ $.Release.Namespace }}
                annotations:
                  argocd.argoproj.io/sync-wave: "3"
              spec:
                selector:
                  matchLabels:
                    cnpg.io/cluster: lightbridge-usage-db
                podMetricsEndpoints:
                  - port: metrics
                    interval: 30s
    destination:
      namespace: converse

  # --- Converse UI ---
  - name: converse-ui
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://github.com/ADORSYS-GIS/converse-frontends
      targetRevision: HEAD
      path: charts/converse-frontend
      helm:
        releaseName: converse-ui
        valuesObject:
          conversefrontend:
            controllers:
              main:
                podDisruptionBudget:
                  # User-facing frontend: PDB ensures uptime during automated node maintenance.
                  maxUnavailable: 1
                containers:
                  frontend:
                    image:
                      repository: ghcr.io/adorsys-gis/converse-frontends
                      tag: sha-df5d442
                      pullPolicy: IfNotPresent
                    env:
                      EXPO_PUBLIC_BACKEND_URL: "https://self-service.ai.camer.digital"
                      EXPO_PUBLIC_USAGE_URL: "https://self-service.ai.camer.digital"
                      EXPO_PUBLIC_ANALYTICS_URL: "https://analytics.ai.camer.digital"
                      EXPO_PUBLIC_KEYCLOAK_ISSUER: "https://auth.verif.fyi/realms/camer-digital"
                      EXPO_PUBLIC_KEYCLOAK_CLIENT_ID: "converse-frontend"
                      EXPO_PUBLIC_KEYCLOAK_SCHEME: "self-service"
                      # JWT Audience validation - ensures tokens are intended for this API
                      EXPO_PUBLIC_KEYCLOAK_EXPECTED_AUDIENCE: "converse-frontend"
                      EXPO_PUBLIC_KEYCLOAK_AUDIENCE_REQUIRED: "true"
    destination:
      namespace: converse

  # --- LibreChat ---
  # NOTE: Phoenix (Arize) was removed; tracing is now served by Grafana Tempo
  # via the core-gateway `-traces` OpenTelemetryCollector -> Alloy -> Tempo path.
  - name: librechat
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    # Orchestrator — charts/librechart emits an ApplicationSet (a control
    # object). The ApplicationSet must land in-cluster/argocd where the
    # controller watches it; its child Applications deploy workloads to
    # home-remote. See ADR-0017.
    controlPlane: true
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: claude/magical-bohr-390242
      path: charts/librechart
      helm:
        releaseName: librechat
        valuesObject:
          search:
            persistence:
              storageClass: "linode-block-storage"
          db:
            persistence:
              storageClass: linode-block-storage

    destination:
      namespace: converse-chat

  # - name: librechat-admin-panel
  #   finalizers:
  #     - resources-finalizer.argocd.argoproj.io
  #   additionalAnnotations:
  #     argocd.argoproj.io/sync-wave: "1"
