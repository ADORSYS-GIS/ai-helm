global:

  s3:
    endpoint: &s3-endpoint s3.ssegning.me
    region: &s3-region us-east-1
    bucket: &s3-bucket monitoring  # Single bucket for all observability data

  domains:
    grafana: &grafana-domain grafana.ai.camer.digital

# ────────────────────────────────────────────────────────────────────────
# ArgoCD destination — the home-remote cluster every generated Application
# targets. Single source of truth for the cluster identity (was previously
# the hardcoded `lke560142-ctx` in the template — see ADR-0006, ADR-0017).
#
# Repo invariant: workloads must NEVER deploy to the cluster ArgoCD itself
# runs in. `templates/_helpers.tpl::apps.argocd.destinationClusterRef`
# hard-fails the render if this resolves to `in-cluster` /
# `https://kubernetes.default.svc` unless `allowInCluster: true`.
#
# Per-app `destination.namespace` (under each `applications[]` entry) still
# selects the namespace; the cluster identity is shared from here.
# ────────────────────────────────────────────────────────────────────────
argocd:
  # Prefix prepended to every generated Application name (so app `traefik`
  # → Application `aii-traefik`). Single source of truth — the template
  # references this, nothing is hardcoded. Note: the orchestrator children
  # (ai-models / librechart ApplicationSets) derive their names from their
  # own `helm.releaseName`, not this prefix, so they're unaffected.
  appNamePrefix: "aii-"
  # ── Two-tier destination model (ADR-0017) ──────────────────────────────
  # ArgoCD CONTROL objects (Application / ApplicationSet CRs) must live on
  # the cluster ArgoCD runs in (in-cluster), in the argocd namespace, so the
  # controllers watch them. WORKLOADS go to home-remote (the `destination`
  # block below). An app whose deployed content is itself a control object
  # (an orchestrator that emits an ApplicationSet) sets `controlPlane: true`
  # on its entry; the template then targets in-cluster/argocd instead.
  inClusterName: in-cluster
  controlPlaneNamespace: argocd
  destination:
    # Cluster context name registered in ArgoCD. Used verbatim as
    # `spec.destination.name`. This is the WORKLOAD destination.
    name: home-remote
    # Alternative to `name` — set a cluster API URL for
    # `spec.destination.server` instead. Leave empty to use `name`.
    server: ""
    # Escape hatch — only set true if you genuinely want in-cluster.
    allowInCluster: false

applications:

  # NOTE: Traefik (ingress controller + the `traefik` IngressClass) is
  # NOT deployed by this repo — it's installed externally (running in the
  # `traefik` namespace on the target cluster). Charts here still set
  # `ingressClassName: traefik` / `className: traefik` on their Ingresses;
  # those resolve to the external controller. Don't re-add a traefik
  # Application here.

  - name: opentelemetry-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      targetRevision: 0.106.0
      chart: opentelemetry-operator
      helm:
        releaseName: opentelemetry-operator
        valuesObject:
          pdb:
            create: true
            minAvailable: 1
            #maxUnavailable: 1
        # manager:
        #  collectorImage:
        #    repository: "otel/opentelemetry-collector-k8s"
    destination:
      namespace: opentelemetry-system

  # --- Observability: Prometheus Operator CRDs ---
  # CRDs only (no operator) — registers ServiceMonitor, PodMonitor, etc.
  - name: prometheus-operator-crds
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-3"
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 28.0.1
      chart: prometheus-operator-crds
      helm:
        releaseName: prometheus-operator-crds
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - Replace=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: Grafana Alloy ---
  # Unified telemetry collector — discovers ServiceMonitors and scrapes metrics.
  - name: alloy
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    source:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 1.0.1
      chart: alloy
      helm:
        releaseName: alloy
        valuesObject:
          controller:
            type: daemonset

          alloy:
            clustering:
              enabled: true
            mounts:
              varlog: true
            # Expose the OTLP receiver ports on the Alloy Service so in-cluster
            # OpenTelemetry collectors and SDKs can push traces / logs / metrics.
            extraPorts:
              - name: otlp-grpc
                port: 4317
                targetPort: 4317
                protocol: TCP
              - name: otlp-http
                port: 4318
                targetPort: 4318
                protocol: TCP
            configMap:
              content: |-
                logging {
                  level  = "info"
                  format = "logfmt"
                }

                // ── Metrics: remote-write to Mimir ─────────────────────────────
                prometheus.remote_write "default" {
                  endpoint {
                    url = "http://mimir-nginx.observability.svc.cluster.local/api/v1/push"
                    headers = {
                      "X-Scope-OrgID" = "anonymous",
                    }
                  }
                  external_labels = {
                    cluster = "ai-helm",
                  }
                }

                prometheus.relabel "global_sanitize" {
                  forward_to = [prometheus.remote_write.default.receiver]
                  rule {
                    action = "replace"
                    source_labels = ["__name__"]
                    target_label = "cluster_origin"
                    replacement = "alloy"
                  }
                }

                // ── ServiceMonitor / PodMonitor discovery ──────────────────────
                // clustering{} is REQUIRED here: Alloy runs as a DaemonSet with
                // clustering enabled, so without it every pod scrapes every
                // target and ships duplicate samples that Mimir rejects.
                prometheus.operator.servicemonitors "cluster" {
                  forward_to = [prometheus.relabel.global_sanitize.receiver]
                  clustering {
                    enabled = true
                  }
                }

                prometheus.operator.podmonitors "cluster" {
                  forward_to = [prometheus.relabel.global_sanitize.receiver]
                  clustering {
                    enabled = true
                  }
                }

                // ── Node / kubelet / cAdvisor scraping ─────────────────────────
                // Supplies the container_* (cAdvisor) and kubelet_* series the
                // Kubernetes dashboards depend on. Scraped through the API server
                // proxy so no kubelet host-certificate handling is needed.
                discovery.kubernetes "nodes" {
                  role = "node"
                }

                discovery.relabel "kubelet" {
                  targets = discovery.kubernetes.nodes.targets
                  rule {
                    action       = "replace"
                    target_label = "__address__"
                    replacement  = "kubernetes.default.svc.cluster.local:443"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_node_name"]
                    regex         = "(.+)"
                    action        = "replace"
                    target_label  = "__metrics_path__"
                    replacement   = "/api/v1/nodes/${1}/proxy/metrics"
                  }
                }

                discovery.relabel "cadvisor" {
                  targets = discovery.kubernetes.nodes.targets
                  rule {
                    action       = "replace"
                    target_label = "__address__"
                    replacement  = "kubernetes.default.svc.cluster.local:443"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_node_name"]
                    regex         = "(.+)"
                    action        = "replace"
                    target_label  = "__metrics_path__"
                    replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
                  }
                }

                prometheus.scrape "kubelet" {
                  targets         = discovery.relabel.kubelet.output
                  forward_to      = [prometheus.relabel.global_sanitize.receiver]
                  job_name        = "kubelet"
                  scheme          = "https"
                  scrape_interval = "60s"
                  clustering { enabled = true }
                  bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                  tls_config {
                    ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  }
                }

                prometheus.scrape "cadvisor" {
                  targets         = discovery.relabel.cadvisor.output
                  forward_to      = [prometheus.relabel.global_sanitize.receiver]
                  job_name        = "cadvisor"
                  scheme          = "https"
                  scrape_interval = "60s"
                  clustering { enabled = true }
                  bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                  tls_config {
                    ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  }
                }

                // ── Kubernetes API server ───────────────────────────────────────
                prometheus.scrape "apiserver" {
                  targets = [{
                    __address__ = "kubernetes.default.svc.cluster.local:443",
                  }]
                  forward_to      = [prometheus.relabel.global_sanitize.receiver]
                  job_name        = "apiserver"
                  scheme          = "https"
                  metrics_path    = "/metrics"
                  scrape_interval = "60s"
                  clustering { enabled = true }
                  bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                  tls_config {
                    ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  }
                }

                // ── CoreDNS ────────────────────────────────────────────────────
                discovery.kubernetes "coredns" {
                  role = "pod"
                  namespaces {
                    names = ["kube-system"]
                  }
                  selectors {
                    role  = "pod"
                    label = "k8s-app=kube-dns"
                  }
                }

                discovery.relabel "coredns" {
                  targets = discovery.kubernetes.coredns.targets
                  rule {
                    source_labels = ["__meta_kubernetes_pod_ip"]
                    action        = "replace"
                    target_label  = "__address__"
                    replacement   = "$1:9153"
                  }
                }

                prometheus.scrape "coredns" {
                  targets         = discovery.relabel.coredns.output
                  forward_to      = [prometheus.relabel.global_sanitize.receiver]
                  job_name        = "coredns"
                  scrape_interval = "60s"
                  clustering { enabled = true }
                }

                // ── Logs: tail this node's pod logs ────────────────────────────
                local.file_match "pod_logs" {
                  path_targets = [{
                    __path__ = "/var/log/pods/*/*/*.log",
                    job       = "kubernetes-pods",
                  }]
                }

                loki.source.file "pod_logs" {
                  targets    = local.file_match.pod_logs.targets
                  forward_to = [loki.process.kubernetes_labels.receiver]
                }

                loki.process "kubernetes_labels" {
                  stage.regex {
                    expression = "/var/log/pods/(?P<namespace>[^/]+?)_(?P<pod>[^/]+)_[a-fA-F0-9-]+/(?P<container>[^/]+)/"
                  }
                  stage.labels {
                    values = {
                      namespace = "namespace",
                      pod       = "pod",
                      container = "container",
                    }
                  }
                  stage.json {
                    expressions = { level = "level", trace_id = "trace_id" }
                  }
                  stage.labels {
                    values = { level = "level" }
                  }
                  forward_to = [loki.write.default.receiver]
                }

                loki.write "default" {
                  endpoint {
                    url = "http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push"
                  }
                  external_labels = {
                    cluster = "ai-helm",
                  }
                }

                // ── OTLP receiver: fan telemetry out to the LGTM stack ─────────
                // In-cluster OpenTelemetry collectors / SDKs push here; Alloy
                // routes traces → Tempo, logs → Loki, metrics → Mimir.
                otelcol.receiver.otlp "default" {
                  grpc { endpoint = "0.0.0.0:4317" }
                  http { endpoint = "0.0.0.0:4318" }
                  output {
                    traces  = [otelcol.exporter.otlp.tempo.input]
                    logs    = [otelcol.exporter.loki.default.input]
                    metrics = [otelcol.exporter.prometheus.default.input]
                  }
                }

                otelcol.exporter.otlp "tempo" {
                  client {
                    endpoint = "tempo.observability.svc.cluster.local:4317"
                    tls { insecure = true }
                  }
                }

                otelcol.exporter.loki "default" {
                  // Route OTel logs through a per-user-attribution stage so
                  // dashboards can break down by Keycloak user_id / azp.
                  // See docs/per-user-observability.md.
                  forward_to = [loki.process.ai_gateway_user_attribution.receiver]
                }

                // Promote selected JSON fields from Envoy AI Gateway access
                // logs into Loki labels.
                //
                // Cardinality budget:
                //   user_id  — Keycloak `sub` (UUID per user). Bounded by
                //              user count; safe up to a few thousand.
                //   azp      — Keycloak client_id. Bounded by client count
                //              (<20 today). Very cheap.
                //
                // user_name is intentionally NOT promoted (display field).
                // Lines without these fields (e.g. non-gateway logs flowing
                // through the same OTLP receiver) pass through unchanged —
                // stage.json silently no-ops on missing keys, and
                // stage.labels skips empty values.
                loki.process "ai_gateway_user_attribution" {
                  stage.json {
                    expressions = {
                      user_id = "user_id",
                      azp     = "azp",
                    }
                  }
                  stage.labels {
                    values = {
                      user_id = "user_id",
                      azp     = "azp",
                    }
                  }
                  forward_to = [loki.write.default.receiver]
                }

                otelcol.exporter.prometheus "default" {
                  forward_to = [prometheus.relabel.global_sanitize.receiver]
                }

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi

          serviceMonitor:
            enabled: true
            interval: "60s"

          rbac:
            create: true
          serviceAccount:
            create: true

    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: kube-state-metrics ---
  # Exposes Kubernetes object state (kube_pod_*, kube_deployment_*, kube_node_*,
  # etc.) as Prometheus metrics. This is NOT the same as metrics-server — the
  # metrics-server app only serves the Kubernetes Metrics API (kubectl top / HPA)
  # and is not scrapeable. Without kube-state-metrics the Kubernetes and
  # Infrastructure dashboards have no source data.
  # Its ServiceMonitor is discovered automatically by Alloy.
  - name: kube-state-metrics
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 5.25.1
      chart: kube-state-metrics
      helm:
        releaseName: kube-state-metrics
        valuesObject:
          # ServiceMonitor so Alloy's prometheus.operator.servicemonitors scrapes it.
          prometheus:
            monitor:
              enabled: true
              interval: 60s
          resources:
            requests: { cpu: 50m,  memory: 128Mi }
            limits:   { cpu: 250m, memory: 256Mi }
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: prometheus-node-exporter ---
  # DaemonSet exposing per-node hardware/OS metrics (node_cpu_*, node_memory_*,
  # node_filesystem_*, node_network_*). Required by the K8s Nodes / Global
  # dashboards. Its ServiceMonitor is discovered automatically by Alloy.
  - name: node-exporter
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      # 4.55.0 per audit (16 minors bump; metrics surface stable).
      targetRevision: 4.55.0
      chart: prometheus-node-exporter
      helm:
        releaseName: node-exporter
        valuesObject:
          prometheus:
            monitor:
              enabled: true
              interval: 60s
          resources:
            requests: { cpu: 50m,  memory: 32Mi }
            limits:   { cpu: 200m, memory: 64Mi }
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # --- Observability: grafana-operator ---
  # Installs the grafana-operator controller + its CRDs (Grafana,
  # GrafanaDashboard, GrafanaFolder, GrafanaDatasource, GrafanaContactPoint,
  # GrafanaAlertRuleGroup). The operator runs cluster-wide.
  #
  # The cluster's actual Grafana workload is still the `grafana` app below
  # (vanilla grafana/grafana chart, sync-wave 0). The operator manages content
  # only — it talks to grafana via the admin API in EXTERNAL mode. The wiring
  # lives in the `observability-dashboards` app (sync-wave 1) which ships the
  # `Grafana` CR and folders / dashboards / datasources.
  #
  # Cutover from sidecar-discovered dashboards: not applicable here — the
  # existing grafana app loads dashboards via the chart's `dashboards:` map
  # (file-provider, baked into the deployment), not via the sidecar. New
  # dashboards go through CRs; existing in-values dashboards stay until
  # migrated one-by-one. See docs/grafana-operator-and-dashboards.md.
  #
  # NOTE: chart version pinned to a known-good. Verify against
  # `helm search repo grafana-operator` before bumping.
  - name: grafana-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-1"
    source:
      repoURL: oci://ghcr.io/grafana/helm-charts
      # 5.23.0 (2026-05-21) per audit. Adds automatic restart-on-secret-change.
      targetRevision: v5.23.0
      chart: grafana-operator
      helm:
        releaseName: grafana-operator
        valuesObject:
          # Cluster-wide watch: operator picks up CRs from any namespace.
          namespaceScope: false
          leaderElection:
            enabled: true
          metricsService:
            enabled: true
            type: ClusterIP
          serviceMonitor:
            enabled: true
          resources:
            requests: { cpu: 50m,  memory: 64Mi  }
            limits:   { cpu: 250m, memory: 256Mi }
    destination:
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability: Mimir — long-term metrics store + built-in Alertmanager
  # Sync wave -1: backends before Grafana
  # Secrets required (via ESO):
  #   mimir-s3:
  #     MIMIR_S3_ACCESS_KEY_ID: <linode-or-custom-s3-access-key>
  #     MIMIR_S3_SECRET_ACCESS_KEY: <linode-or-custom-s3-secret-key>
  # Buckets to create before first sync:
  #   converse-mimir-blocks, converse-mimir-alertmanager, converse-mimir-ruler
  # ─────────────────────────────────────────────────────────────────────────────
  - name: mimir
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-2"
    source:
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 5.3.0
      chart: mimir-distributed
      helm:
        releaseName: mimir
        valuesObject:
          fullnameOverride: mimir

          global:
            extraEnvFrom:
              - secretRef:
                  name: mimir-s3

          mimir:
            structuredConfig:
              multitenancy_enabled: false

              ingester:
                ring:
                  replication_factor: 1
                  zone_awareness_enabled: false

              store_gateway:
                sharding_ring:
                  replication_factor: 1
                  zone_awareness_enabled: false

              common:
                storage:
                  backend: s3
                  s3:
                    endpoint: *s3-endpoint
                    access_key_id: ${MIMIR_S3_ACCESS_KEY_ID}
                    secret_access_key: ${MIMIR_S3_SECRET_ACCESS_KEY}

              blocks_storage:
                storage_prefix: blocks
                s3:
                  bucket_name: *s3-bucket
              alertmanager_storage:
                storage_prefix: alertmanager
                s3:
                  bucket_name: *s3-bucket
              ruler_storage:
                storage_prefix: ruler
                s3:
                  bucket_name: *s3-bucket

              alertmanager:
                enable_api: true
                external_url: https://grafana.ai.camer.digital/alerting

              limits:
                # ── Retention ──────────────────────────────────────────────
                # How long blocks are kept in S3 before the compactor deletes them.
                # Set to 0d to disable retention (keep forever).
                compactor_blocks_retention_period: 90d

                # ── Ingestion ───────────────────────────────────────────────
                ingestion_rate: 30000
                ingestion_burst_size: 50000
                max_global_series_per_user: 2000000
                # Allow samples up to 10m behind the latest ingested timestamp.
                # Prevents rejections from Alloy self-scrape timing skew.
                out_of_order_time_window: 10m

                # ── Query ────────────────────────────────────────────────────
                # Raise the query-frontend concurrency cap to prevent 429s when
                # multiple dashboard panels fire simultaneous queries.
                max_outstanding_requests_per_tenant: 1000

              compactor:
                # How often the compactor runs a cleanup cycle.
                compaction_interval: 1h
                # How long the compactor waits before deleting blocks marked for deletion.
                # Gives time to abort accidental deletions.
                deletion_delay: 12h

          ingester:
            replicas: 1
            zoneAwareReplication:
              enabled: false
            podDisruptionBudget:
              enabled: false
            persistence:
              enabled: true
              storageClass: linode-block-storage
              size: 10Gi
            resources:
              requests: { cpu: 200m, memory: 512Mi }
              limits:   { cpu: 1,    memory: 2Gi   }

          distributor:
            replicas: 1
            podDisruptionBudget:
              enabled: false
            resources:
              requests: { cpu: 100m, memory: 256Mi }
              limits:   { cpu: 500m, memory: 1Gi   }

          querier:
            replicas: 1
            podDisruptionBudget:
              enabled: false
            resources:
              requests: { cpu: 100m, memory: 256Mi }
              limits:   { cpu: 500m, memory: 1Gi   }

          query_frontend:
            replicas: 1
            podDisruptionBudget:
              enabled: false
            resources:
              requests: { cpu: 200m, memory: 256Mi }
              limits:   { cpu: 1,    memory: 1Gi   }

          query_scheduler:
            enabled: false

          store_gateway:
            replicas: 1
            zoneAwareReplication:
              enabled: false
            podDisruptionBudget:
              enabled: false
            resources:
              requests: { cpu: 100m, memory: 256Mi }
              limits:   { cpu: 500m, memory: 1Gi   }

          compactor:
            replicas: 1
            podDisruptionBudget:
              enabled: false
            resources:
              requests: { cpu: 100m, memory: 256Mi }
              limits:   { cpu: 500m, memory: 2Gi   }

          alertmanager:
            enabled: true
            replicas: 1
            podDisruptionBudget:
              enabled: false
            resources:
              requests: { cpu: 50m,  memory: 64Mi  }
              limits:   { cpu: 200m, memory: 256Mi }
            # fallbackConfig: |
            #   route:
            #     receiver: blackhole
            #   receivers:
            #     - name: blackhole

          ruler:
            enabled: false

          nginx:
            enabled: true
            replicas: 1
            podDisruptionBudget:
              enabled: false
            resources:
              requests: { cpu: 50m,  memory: 64Mi  }
              limits:   { cpu: 200m, memory: 128Mi }

          minio:
            enabled: false

          # Disable all memcached caches - not needed for small-scale deployment
          # Note: memcached section has no 'enabled' flag - controlled by individual caches
          memcachedExporter:
            enabled: false

          chunks-cache:
            enabled: false
          
          index-cache:
            enabled: false
          
          metadata-cache:
            enabled: false
          
          results-cache:
            enabled: false

          serviceMonitor:
            enabled: true
            interval: 60s

          extraObjects:
            - apiVersion: v1
              kind: ResourceQuota
              metadata:
                name: observability-quota
                namespace: observability
              spec:
                hard:
                  requests.cpu: "8"
                  requests.memory: "17Gi"
                  limits.cpu: "24"
                  limits.memory: "25Gi"
                  count/pods: "60"
            - apiVersion: v1
              kind: LimitRange
              metadata:
                name: observability-defaults
                namespace: observability
              spec:
                limits:
                  - type: Container
                    defaultRequest: { cpu: 100m, memory: 128Mi }
                    default:        { cpu: 1000m, memory: 1Gi }
                    max:            { cpu: "8",  memory: 18Gi   }
            # NetworkPolicy for observability namespace
            # To disable: comment out or remove this entire block
            # - apiVersion: networking.k8s.io/v1
            #   kind: NetworkPolicy
            #   metadata:
            #     name: observability-allow-ingress
