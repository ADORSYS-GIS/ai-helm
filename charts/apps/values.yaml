  # --- Coder ---
  - name: coder
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "2"
    sources:
      - repoURL: oci://ghcr.io/coder/chart/coder
        targetRevision: 2.29.5
        chart: coder
        helm:
          releaseName: coder
          valuesObject:
            coder:
              env:
                - name: CODER_PG_CONNECTION_URL
                  valueFrom:
                    secretKeyRef:
                      name: coder-cnpg-app
                      key: uri
                - name: CODER_PG_OPTIONS
                  value: "sslmode=disable"
                - name: CODER_ACCESS_URL
                  value: "https://coder.ai.camer.digital"
                - name: CODER_WILDCARD_ACCESS_URL
                  value: "*.serverless.coder.ai.camer.digital"
                - name: CODER_OIDC_ISSUER_URL
                  value: "https://accounts.camer.digital/realms/camer-digital"
                - name: CODER_OIDC_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: coder-keycloak-secret
                      key: client_id
                - name: CODER_OIDC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: coder-keycloak-secret
                      key: client_secret
                - name: CODER_OIDC_SCOPES
                  value: "openid,profile,email,offline_access"
                - name: CODER_OIDC_ICON_URL
                  value: "https://www.keycloak.org/resources/images/logo.svg"
                - name: CODER_OIDC_SIGN_IN_TEXT
                  value: "Sign in with Keycloak"
                - name: CODER_EXPERIMENTS
                  value: "oauth2,mcp-server-http"
                - name: CODER_FIRST_USER_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: coder-admin-secret
                      key: username
                - name: CODER_FIRST_USER_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: coder-admin-secret
                      key: password
              tolerations:
                - key: ai.camer.digital/offline-work
                  operator: Equal
                  value: dev-container
              resources:
                requests:
                  cpu: 1000m
                  memory: 1024Mi
                limits:
                  cpu: 2000m
                  memory: 4096Mi
              service:
                type: ClusterIP
              ingress:
                enable: true
                className: traefik
                annotations:
                  cert-manager.io/cluster-issuer: cert-home-cert-http
                host: "coder.ai.camer.digital"
                tls:
                  enable: true
                  secretName: coder.ai.camer.digital-tls
    destination:
      namespace: coder
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true
    rawRessources:
      - |
        apiVersion: barmancloud.cnpg.io/v1
        kind: ObjectStore
        metadata:
          name: coder-barman-store
          namespace: coder
          annotations:
            argocd.argoproj.io/sync-wave: "1"
            argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
        spec:
          configuration:
            destinationPath: s3://ai-ops-backups/coder-cnpg-backups/
            endpointURL: https://s3.ssegning.me
            s3Credentials:
              accessKeyId:
                name: coder-s3-config
                key: s3_access_key_id
              secretAccessKey:
                name: coder-s3-config
                key: s3_secret_access_key
              region:
                name: coder-s3-config
                key: s3_region_name
      - |
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: coder-cnpg
          namespace: coder
          annotations:
            argocd.argoproj.io/sync-wave: "2"
        spec:
          instances: 2
          plugins:
            - name: barman-cloud.cloudnative-pg.io
              isWALArchiver: true
              parameters:
                barmanObjectName: coder-barman-store
                serverName: coder-cnpg
          storage:
            size: 10Gi
          bootstrap:
            initdb:
              database: coder
              owner: coder

