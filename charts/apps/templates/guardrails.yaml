{{- if .Values.extraObjects }}
{{- /* Extract unique namespaces from extraObjects */ -}}
{{- $namespaces := dict -}}
{{- range .Values.extraObjects -}}
{{- $metadata := index . "metadata" | default (dict) -}}
{{- $namespace := index $metadata "namespace" | default "" -}}
{{- if $namespace -}}
{{- $_ := set $namespaces $namespace true -}}
{{- end -}}
{{- end -}}

{{- /* Create namespaces first with sync-wave "0" before quotas are applied */ -}}
{{- range $ns, $_ := $namespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    kubernetes.io/metadata.name: {{ $ns }}
{{- end }}

{{- /* Apply LimitRange/ResourceQuota (sync-wave removed for testing) */ -}}
{{- range .Values.extraObjects }}
---
{{ toYaml . }}
{{- end }}
{{- end }}
