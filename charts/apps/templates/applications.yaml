{{- range .Values.applications }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  {{- with .additionalAnnotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
  {{- with .additionalLabels }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" . "context" $ ) | nindent 4 }}
  {{- end }}
  name: {{ $.Values.argocd.appNamePrefix }}{{ .name }}
  {{- with .namespace }}
  namespace: {{ . }}
  {{- end }}
  {{- with .finalizers }}
  finalizers:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  project: ai
  {{- /*
    Multi-source "umbrella" assembly (ADR-0018). An app entry may set
    `depsOverlay: environments/<env>/deps/<app>` to attach a kustomize source
    that emits its app-scoped dependency CRs (ingress Certificate, app-scoped
    ExternalSecret). The deps source always points at THIS repo
    (argocd.selfRepoURL @ argocd.selfTargetRevision). When `depsOverlay` is
    set we MUST emit `sources:` (plural); the singular `source:` block is kept
    intact and folded in as the first element — so a workload's big
    `valuesObject` never needs re-indenting.
  */}}
  {{- $depsSource := dict }}
  {{- if .depsOverlay }}
  {{- $depsSource = dict "repoURL" $.Values.argocd.selfRepoURL "targetRevision" $.Values.argocd.selfTargetRevision "path" .depsOverlay }}
  {{- end }}
  {{- if .sources }}
  sources:
    {{- if .depsOverlay }}
    {{- toYaml (append .sources $depsSource) | nindent 4 }}
    {{- else }}
    {{- toYaml .sources | nindent 4 }}
    {{- end }}
  {{- else if .source }}
  {{- if .depsOverlay }}
  sources:
    {{- toYaml (list .source $depsSource) | nindent 4 }}
  {{- else }}
  source:
    {{- toYaml .source | nindent 4 }}
  {{- end }}
  {{- end }}
  destination:
    {{- if .controlPlane }}
    # This app deploys ArgoCD CONTROL objects (Application / ApplicationSet
    # CRs) — e.g. an orchestrator that emits an ApplicationSet. Those must
    # live on the cluster ArgoCD runs in (local), in the argocd namespace,
    # so the Application/ApplicationSet controllers watch them. The
    # workloads they fan out to still target home-remote (set on the
    # generated child Applications / the ApplicationSet template). ADR-0017.
    server: {{ $.Values.argocd.inClusterServer | default "https://kubernetes.default.svc" | quote }}
    namespace: {{ $.Values.argocd.controlPlaneNamespace | default "argocd" | quote }}
    {{- else }}
    {{- include "apps.argocd.destinationClusterRef" $.Values.argocd.destination | nindent 4 }}
    namespace: {{ .destination.namespace }}
    {{- end }}
  {{- /*
    Pod Security Standards elevation (global.namespacePodSecurity). If this
    app's target namespace is listed, ArgoCD labels the CreateNamespace-managed
    namespace so hostPath / host-network workloads pass Pod Security admission
    on clusters that enforce a stricter default (k3s/Hetzner = baseline).
    Keyed by the workload namespace; control-plane apps (argocd ns) are not
    elevated. Applied to every app in the namespace → consistent, no contention.
  */}}
  {{- $nsForPolicy := "" }}
  {{- if .controlPlane }}
  {{- $nsForPolicy = ($.Values.argocd.controlPlaneNamespace | default "argocd") }}
  {{- else if .destination }}
  {{- $nsForPolicy = .destination.namespace }}
  {{- end }}
  {{- $psLevel := index ($.Values.global.namespacePodSecurity | default dict) ($nsForPolicy | default "") }}
  syncPolicy:
    {{- if $psLevel }}
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: {{ $psLevel | quote }}
        pod-security.kubernetes.io/enforce-version: latest
    {{- end }}
    {{- if .syncPolicy }}
    {{- toYaml .syncPolicy | nindent 4 }}
    {{- else }}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
      - SkipDryRunOnMissingResource=true
    automated:
      enabled: true
      prune: true
      selfHeal: true
    {{- end }}
  {{- with .revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  {{- with .ignoreDifferences }}
  ignoreDifferences:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .resourceInclusions }}
  resourceInclusions: {{ . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .resourceExclusions }}
  resourceExclusions: {{ . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .info }}
  info:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}