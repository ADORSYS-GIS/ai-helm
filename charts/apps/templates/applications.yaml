{{- range .Values.applications }}
{{- if not (eq .enabled false) }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  {{- with .additionalAnnotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
  {{- with .additionalLabels }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" . "context" $ ) | nindent 4 }}
  {{- end }}
  name: {{ $.Values.argocd.appNamePrefix }}{{ .name }}
  {{- with .namespace }}
  namespace: {{ . }}
  {{- end }}
  {{- with .finalizers }}
  finalizers:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # INVARIANT: every Application from this repo lives in the `ai` AppProject —
  # hardcoded (NOT a per-app value) so an app entry can't accidentally land
  # elsewhere. Orchestrators (ai-models/librechart/coder/observability) likewise
  # set their children to `argocd.project: ai`. Keep it that way.
  project: ai
  {{- /*
    Multi-source "umbrella" assembly (ADR-0018 + ADR-0055). An app entry may set
    `depsOverlay: environments/<env>/deps/<app>` to attach a kustomize source
    that emits its app-scoped dependency CRs (ingress Certificate, app-scoped
    ExternalSecret). The deps source points at `argocd.depsRepoURL @
    depsTargetRevision`, which DEFAULT to selfRepoURL/selfTargetRevision (THIS
    repo) — flip them to the values repo at the ADR-0055 environments/ cutover.
    When `depsOverlay` is set we MUST emit `sources:` (plural); the singular
    `source:` block is kept intact and folded in as the first element — so a
    workload's big `valuesObject` never needs re-indenting.

    OCI mode (ADR-0055): an app entry sets `chart: <name>` to consume that chart
    from the OCI registry (`argocd.chartRegistry` @ `argocd.chartVersionRange`,
    a floating semver range — immutability is gone, the newest published chart
    wins each reconcile) and pull its image-tag / per-env values from the values
    repo via a `$values` ref source. argocd-image-updater write-back commits the
    image tag into that values file. `$values` REQUIRES plural `sources:` and
    exactly ONE `ref:` source (we own it here — an entry must not declare its
    own `ref`). Apps WITHOUT `chart:` keep the legacy path/tag source verbatim,
    so the OCI rollout is per-app and backward-compatible.
  */}}
  {{- $depsSource := dict }}
  {{- if .depsOverlay }}
  {{- $depsSource = dict "repoURL" ($.Values.argocd.depsRepoURL | default $.Values.argocd.selfRepoURL) "targetRevision" ($.Values.argocd.depsTargetRevision | default $.Values.argocd.selfTargetRevision) "path" .depsOverlay }}
  {{- end }}
  {{- if .chart }}
  {{- /* ── OCI mode ── */}}
  {{- $env := $.Values.argocd.env | default "prod" }}
  {{- $valuesFile := .valuesFile | default (printf "environments/%s/values/%s.yaml" $env .name) }}
  {{- $helm := dict "releaseName" (.releaseName | default .name) "valueFiles" (list (printf "$values/%s" $valuesFile)) "ignoreMissingValueFiles" true }}
  {{- with .valuesObject }}{{- $_ := set $helm "valuesObject" . }}{{- end }}
  {{- /* OCI Helm: the chart name is part of the repoURL PATH (chart: "."), not a
         separate `chart:` field. With a registry repoURL + `chart:`, ArgoCD lists
         tags at the registry path (`<registry>/tags/list`) — the wrong, non-existent
         repo — and 403s on semver-range resolution. Full-path repoURL + `chart: "."`
         is the form every working OCI app on the cluster uses (kserve, grafana-operator,
         arc-runners) and the one verified to resolve a range. */}}
  {{- $chartRepoURL := printf "%s/%s" (trimSuffix "/" $.Values.argocd.chartRegistry) .chart }}
  {{- $chartSource := dict "repoURL" $chartRepoURL "chart" "." "targetRevision" ($.Values.argocd.chartVersionRange | default ">=0.0.0") "helm" $helm }}
  {{- $valuesSource := dict "repoURL" $.Values.argocd.valuesRepoURL "targetRevision" ($.Values.argocd.valuesTargetRevision | default "main") "ref" "values" }}
  {{- $ociSources := list $chartSource $valuesSource }}
  {{- if .depsOverlay }}{{- $ociSources = append $ociSources $depsSource }}{{- end }}
  sources:
    {{- toYaml $ociSources | nindent 4 }}
  {{- else if .sources }}
  sources:
    {{- if .depsOverlay }}
    {{- toYaml (append .sources $depsSource) | nindent 4 }}
    {{- else }}
    {{- toYaml .sources | nindent 4 }}
    {{- end }}
  {{- else if .source }}
  {{- if .depsOverlay }}
  sources:
    {{- toYaml (list .source $depsSource) | nindent 4 }}
  {{- else }}
  source:
    {{- toYaml .source | nindent 4 }}
  {{- end }}
  {{- end }}
  destination:
    {{- if .controlPlane }}
    # This app deploys ArgoCD CONTROL objects (Application / ApplicationSet
    # CRs) — e.g. an orchestrator that emits an ApplicationSet. Those must
    # live on the cluster ArgoCD runs in (local), in the argocd namespace,
    # so the Application/ApplicationSet controllers watch them. The
    # workloads they fan out to still target home-remote (set on the
    # generated child Applications / the ApplicationSet template). ADR-0017.
    server: {{ $.Values.argocd.inClusterServer | default "https://kubernetes.default.svc" | quote }}
    namespace: {{ $.Values.argocd.controlPlaneNamespace | default "argocd" | quote }}
    {{- else if .homeCluster }}
    # ADR-0022 exception to ADR-0017: this WORKLOAD targets the cluster ArgoCD
    # runs on (the home Talos cluster) — NOT home-remote — because the GPU +
    # KServe + Knative that serve the model live there. Unlike `controlPlane`,
    # it keeps the app's own workload namespace (it is not a control object).
    # The destination guard would normally refuse an in-cluster workload, so we
    # call it with allowInCluster:true to take the single sanctioned exception.
    {{- include "apps.argocd.destinationClusterRef" (dict "server" ($.Values.argocd.inClusterServer | default "https://kubernetes.default.svc") "allowInCluster" true) | nindent 4 }}
    namespace: {{ .destination.namespace }}
    {{- else }}
    {{- include "apps.argocd.destinationClusterRef" $.Values.argocd.destination | nindent 4 }}
    namespace: {{ .destination.namespace }}
    {{- end }}
  {{- /*
    Pod Security Standards elevation (global.namespacePodSecurity). If this
    app's target namespace is listed, ArgoCD labels the CreateNamespace-managed
    namespace so hostPath / host-network workloads pass Pod Security admission
    on clusters that enforce a stricter default (k3s/Hetzner = baseline).
    Keyed by the workload namespace; control-plane apps (argocd ns) are not
    elevated. Applied to every app in the namespace → consistent, no contention.
  */}}
  {{- $nsForPolicy := "" }}
  {{- if .controlPlane }}
  {{- $nsForPolicy = ($.Values.argocd.controlPlaneNamespace | default "argocd") }}
  {{- else if .destination }}
  {{- $nsForPolicy = .destination.namespace }}
  {{- end }}
  {{- $psLevel := index ($.Values.global.namespacePodSecurity | default dict) ($nsForPolicy | default "") }}
  syncPolicy:
    {{- if $psLevel }}
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: {{ $psLevel | quote }}
        pod-security.kubernetes.io/enforce-version: latest
    {{- end }}
    {{- if .syncPolicy }}
    {{- toYaml .syncPolicy | nindent 4 }}
    {{- else }}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
      - SkipDryRunOnMissingResource=true
    automated:
      enabled: true
      prune: true
      selfHeal: true
    {{- end }}
  {{- with .revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  {{- with .ignoreDifferences }}
  ignoreDifferences:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .resourceInclusions }}
  resourceInclusions: {{ . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .resourceExclusions }}
  resourceExclusions: {{ . | toYaml | nindent 4 }}
  {{- end }}
  {{- with .info }}
  info:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}{{/* enabled gate — set `enabled: false` on an app entry to stage it without rendering its Application */}}
{{- end }}