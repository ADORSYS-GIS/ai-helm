# GitLab CI/CD configuration for OpenCode
# Translated from .github/workflows/opencode.yml

stages:
  - review

# Variables like LIGHTBRIDGE_API_KEY, LIGHTBRIDGE_BASE_URL, and GITLAB_TOKEN 
# should be configured in your GitLab project's Settings > CI/CD > Variables.


.opencode-base:
  image: node:20-slim
  interruptible: true
  before_script:
    - apt-get update && apt-get install -y git curl
    - npm install -g opencode-ai
    - git config --global user.name "OpenCode Bot"
    - git config --global user.email "opencode-bot@users.noreply.gitlab.com"
    # Ensure we can push changes if the agent decides to (optional)
    - |
      if [ -n "$GITLAB_TOKEN" ]; then
        git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi

opencode-auto-review:
  extends: .opencode-base
  stage: review
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - echo "Running Auto PR Review..."
    - npx opencode-ai run --agent auto-review --model "lightbridge/gemini-3.1-flash-lite"
  after_script:
    - |
      if [ "$CI_JOB_STATUS" == "failed" ] && [ -n "$CI_MERGE_REQUEST_IID" ] && [ -n "$GITLAB_TOKEN" ]; then
        echo "Reporting failure to GitLab MR..."
        curl --request POST --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
          --data-urlencode "body=🤖 Review failed. [View logs]($CI_JOB_URL)" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
      fi

opencode-manual-review:
  extends: .opencode-base
  stage: review
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  script:
    - echo "Running Manual PR Review..."
    - npx opencode-ai run --agent manual-review --model "lightbridge/glm-5"
  after_script:
    - |
      if [ "$CI_JOB_STATUS" == "failed" ] && [ -n "$CI_MERGE_REQUEST_IID" ] && [ -n "$GITLAB_TOKEN" ]; then
        echo "Reporting failure to GitLab MR..."
        curl --request POST --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
          --data-urlencode "body=🤖 Manual review failed. [View logs]($CI_JOB_URL)" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
      fi

opencode-issue-task:
  extends: .opencode-base
  stage: review
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
  script:
    - echo "Running Issue Task..."
    - npx opencode-ai run --agent build --model "lightbridge/glm-5"
  # Note: Issue reporting in GitLab requires the issue IID, which isn't always available in push pipelines.
